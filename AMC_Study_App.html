with a systolic ejection murmur (often radiating to carotids), syncope, angina. Not a recognised feature of Wilson's disease.\n- **PDA (Patent Ductus Arteriosus)**: Would present with a continuous 'machinery' murmur. A congenital defect, not associated with Wilson's.\n- **VSD (Ventricular Septal Defect)**: Would present with a pansystolic murmur. A congenital defect, not associated with Wilson's.\n- **ASD (Atrial Septal Defect)**: Would often present with a wide, fixed split S2 and a systolic flow murmur. A congenital defect, not associated with Wilson's.\n\n### 📚 Relevant Guidelines\n- **[American Association for the Study of Liver Diseases (AASLD) Practice Guideline: Wilson Disease](https://aasldpubs.onlinelibrary.wiley.com/doi/full/10.1002/hep.29896)**: Details the multisystem involvement of Wilson disease, including rare cardiac manifestations like cardiomyopathy and arrhythmias.\n- **[European Association for the Study of the Liver (EASL) Clinical Practice Guidelines: Wilson’s disease](https://www.journal-of-hepatology.eu/article/S0168-8278(12)00540-9/fulltext)**: Comprehensive guidelines covering diagnosis and management, acknowledging extra-hepatic involvement.\n- **[UpToDate: Wilson disease: Clinical manifestations, diagnosis, and natural history](https://www.uptodate.com/contents/wilson-disease-clinical-manifestations-diagnosis-and-natural-history)**: Lists cardiac involvement (cardiomyopathy, arrhythmias) among the potential clinical features.", "image_path": ""}, {"id": 34660, "date": "2026-02-20T23:27:18+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 70-year-old woman presents with syncope. ECG shows complete heart block. What is the best treatment?", "options": "A. Atropine only\nB. Beta blocker\nC. Permanent pacemaker\nD. Digoxin\nE. Calcium channel blocker", "answer": "C. Permanent pacemaker", "explanation": "### ✅ Correct Answer: C. Permanent pacemaker\n\n**Clinical Reasoning:**\n1.  **Presentation:** Syncope in an elderly patient with ECG-confirmed complete (third-degree) heart block is a classic and high-risk scenario. Syncope in this context is often due to a Stokes-Adams attack, caused by cerebral hypoperfusion during prolonged asystole or severe bradycardia.\n2.  **Pathophysiology:** Complete heart block involves complete dissociation between the atria and ventricles. The atria beat independently (under sinus or other atrial control), while the ventricles are driven by a slow, unreliable escape rhythm (e.g., junctional or idioventricular). This escape rhythm is insufficient to maintain adequate cardiac output, especially during exertion or stress, leading to symptoms like syncope, dizziness, or heart failure.\n3.  **Management:** According to all major guidelines, **permanent pacemaker implantation is the definitive, first-line treatment for symptomatic third-degree (complete) heart block.** Atropine (Option A) is a temporary measure used in acute, unstable bradycardia (e.g., in the emergency setting or with myocardial ischemia) but is not a long-term solution. Beta-blockers (B), digoxin (D), and calcium channel blockers (E) are all negative chronotropes/dromotropes and would worsen bradycardia and conduction block, making them absolutely contraindicated.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Atropine only**: Atropine is a parasympatholytic agent used for acute, symptomatic bradycardia (e.g., in emergency or peri-arrest situations). It is a temporary measure and does not address the underlying permanent conduction system disease. It is ineffective and inappropriate as definitive therapy for chronic symptomatic complete heart block.\n- **B. Beta blocker**: Beta-blockers are contraindicated as they decrease heart rate and slow atrioventricular (AV) conduction. In complete heart block, they would further suppress any potential escape rhythms, potentially leading to asystole and worsening symptoms.\n- **D. Digoxin**: Digoxin increases vagal tone and can slow AV conduction. It is used to control ventricular rate in atrial fibrillation but is harmful in AV block as it can further depress the escape rhythm and is not a treatment for bradycardia.\n- **E. Calcium channel blocker**: Non-dihydropyridine calcium channel blockers (e.g., verapamil, diltiazem) slow AV nodal conduction and are contraindicated in AV block. They would exacerbate bradycardia and are not a treatment for this condition.\n\n### 📚 Relevant Guidelines\n- **[American Heart Association/American College of Cardiology/Heart Rhythm Society (AHA/ACC/HRS) Guideline for the Evaluation and Management of Patients With Bradycardia and Cardiac Conduction Delay]**: Provides Class I recommendations for permanent pacemaker implantation in patients with third-degree AV block associated with symptoms (like syncope) or ventricular arrhythmias presumed due to the block. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000628\n- **[Therapeutic Guidelines: Cardiovascular (eTG Australia)]**: States that permanent pacing is indicated for symptomatic third-degree AV block. It outlines the assessment and management of bradyarrhythmias in the Australian context. — https://tgldcdp.tg.org.au/viewTopic?topicfile=cardiac-arrhythmias-bradycardia&guidelineName=Cardiovascular#toc_d1e297\n- **[European Society of Cardiology (ESC) Guidelines on cardiac pacing and cardiac resynchronization therapy]**: Strongly recommends permanent pacing for symptomatic third-degree AV block (Class I recommendation). — https://academic.oup.com/eurheartj/article/42/35/3427/6358043", "image_path": ""}, {"id": 34662, "date": "2026-02-20T23:27:45+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 65-year-old man presents with chest pain for 2 hours. ECG shows ST elevation in leads II, III, and aVF. Which artery is most likely occluded?", "options": "A. Left anterior descending\nB. Left circumflex\nC. Right coronary artery\nD. Diagonal branch\nE. Posterior descending artery", "answer": "C. Right coronary artery", "explanation": "### ✅ Correct Answer: C. Right coronary artery\n\n**Clinical Reasoning:**\n1.  **ECG Localization:** ST-segment elevation myocardial infarction (STEMI) is diagnosed based on specific ECG patterns that correspond to the area of ischemic myocardium and the occluded coronary artery.\n2.  **Inferior Wall MI:** ST elevation in leads II, III, and aVF is the classic pattern for an **inferior wall myocardial infarction**. These leads 'look' at the inferior surface of the heart.\n3.  **Coronary Artery Anatomy:** In the majority of patients (approximately 80-90%, right-dominant circulation), the **right coronary artery (RCA)** supplies the inferior wall of the left ventricle via its posterior descending artery (PDA) branch. Occlusion of the RCA proximal to the PDA branch causes inferior STEMI.\n4.  **Key Associations:** An inferior STEMI from RCA occlusion can be associated with:\n    *   **Bradyarrhythmias:** Due to ischemia of the sinoatrial (SA) and atrioventricular (AV) nodes, which are often supplied by the RCA.\n    *   **Right ventricular (RV) infarction:** Suspected if ST elevation is seen in lead III > lead II, and especially if there is ST elevation in right-sided leads (V4R). RV infarction is a strong predictor of RCA occlusion.\n    *   **Posterior involvement:** ST depression in anterior leads (V1-V3) may indicate posterior extension, often supplied by the RCA's PDA or left circumflex artery.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Left anterior descending (LAD)**: The LAD supplies the anterior wall and septum. Occlusion causes ST elevation in anterior leads (V1-V4) and possibly high lateral leads (I, aVL). It does not cause isolated inferior lead ST elevation.\n- **B. Left circumflex artery (LCx)**: The LCx can supply the inferior wall in a left-dominant or co-dominant circulation (10-20% of cases). While it is a possible cause, the **RCA is the most common and statistically \"most likely\"** culprit for an isolated inferior STEMI. LCx occlusions more often present with lateral (I, aVL, V5-V6) or posterior changes.\n- **D. Diagonal branch**: A branch of the LAD. It supplies part of the anterior-lateral wall. Occlusion would cause ST elevation in anterior or high lateral leads, not inferior leads.\n- **E. Posterior descending artery (PDA)**: The PDA is typically the terminal branch of the RCA (or LCx) that runs in the posterior interventricular groove. While its occlusion is part of an RCA occlusion causing inferior STEMI, the question asks for the **most likely occluded artery**. The primary culprit is the RCA itself, proximal to the PDA. Stating the PDA alone is too specific and misses the main vessel.\n\n### 📚 Relevant Guidelines\n- **[American Heart Association/American College of Cardiology (AHA/ACC) Guideline for the Management of Patients With ST-Elevation Myocardial Infarction]**: Details the diagnosis (including ECG interpretation for localization), immediate management, and reperfusion strategies for STEMI. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000001136\n- **[CSANZ (Cardiac Society of Australia and New Zealand) Guidelines for the management of acute coronary syndromes]**: Provides Australian-specific protocols for ACS management, including ECG interpretation and coronary anatomy correlation. — https://www.csanz.edu.au/wp-content/uploads/2023/11/ACS_Guidelines_2023_FINAL.pdf\n- **[UpToDate: ECG tutorial: Myocardial ischemia and infarction]**: A comprehensive resource for understanding ECG patterns of ischemia and infarction, including coronary artery territory localization. — https://www.uptodate.com/contents/ecg-tutorial-myocardial-ischemia-and-infarction", "image_path": ""}, {"id": 34693, "date": "2026-02-21T05:40:56+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 45-year-old man presents with sudden onset of severe, tearing chest pain that radiates to his back. On examination, his blood pressure is 180/100 mmHg in the right arm and 140/85 mmHg in the left arm. Which of the following is the most likely diagnosis?", "options": "A. Acute myocardial infarction\nB. Aortic dissection\nC. Pulmonary embolism\nD. Pericarditis\nE. Pneumothorax", "answer": "B. Aortic dissection", "explanation": "### ✅ Correct Answer: B. Aortic dissection\n\nThe patient presents with the classic triad of aortic dissection: sudden onset, severe tearing/ripping chest pain that radiates to the back, and a blood pressure differential between arms (>20 mmHg systolic difference). The pathophysiology involves a tear in the aortic intima, allowing blood to enter the media and create a false lumen. This typically occurs in patients with hypertension (as evidenced here), connective tissue disorders (e.g., Marfan syndrome), or aortic abnormalities. The pain is maximal at onset (unlike MI where it builds), and radiation to the back is characteristic. The blood pressure difference occurs when the dissection involves the aortic arch and compromises blood flow to one subclavian artery. Immediate management involves urgent imaging (CT angiography), blood pressure control (beta-blockers then vasodilators), and surgical consultation for type A dissections.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Acute myocardial infarction**: MI pain is typically described as pressure, squeezing, or tightness, builds over minutes, and radiates to the left arm, jaw, or epigastrium. It does not cause a significant blood pressure difference between arms unless there's pre-existing vascular disease.\n- **C. Pulmonary embolism**: Presents with pleuritic chest pain, dyspnea, tachycardia, and hypoxemia. Pain is not tearing nor radiates to the back, and there is no blood pressure differential between arms.\n- **D. Pericarditis**: Pain is sharp, pleuritic, positional (worse lying flat, better sitting forward), and may have a pericardial friction rub. No blood pressure differential between arms.\n- **E. Pneumothorax**: Sudden onset of pleuritic chest pain with dyspnea. Tension pneumothorax causes hypotension but equally in both arms, and pain does not radiate to the back.\n\n### 📚 Relevant Guidelines\n- **American Heart Association/American College of Cardiology (AHA/ACC) Guideline for the Diagnosis and Management of Aortic Disease**: Provides comprehensive recommendations on classification, imaging, and management of aortic dissection — https://www.ahajournals.org/doi/10.1161/CIR.0000000000001106\n- **Therapeutic Guidelines (eTG) – Cardiovascular**: Australian guidelines for emergency management of hypertensive emergencies including aortic dissection — https://tgldcdp.tg.org.au/viewTopic?topicfile=cardiovascular-emergencies&guidelineName=Cardiovascular#toc_d1e289\n- **UpToDate – Clinical features and diagnosis of acute aortic dissection**: Detailed review of presentation, differential diagnosis, and diagnostic testing — https://www.uptodate.com/contents/clinical-features-and-diagnosis-of-acute-aortic-dissection", "image_path": "photo_2026-02-21_05-40-56 (1).jpg"}, {"id": 34724, "date": "2026-02-21T05:54:58+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A patient with a history of previous abdominal surgery presents with colicky pain and vomiting. Abdominal X-ray shows dilated loops with air-fluid levels. What is the likely diagnosis?", "options": "A. Large bowel obstruction\nB. Paralytic ileus\nC. Small bowel obstruction\nD. Perforated ulcer", "answer": "C", "explanation": "### ✅ Correct Answer: C. Small bowel obstruction\n\nThe clinical picture is classic for a mechanical small bowel obstruction (SBO). The key features are:\n1.  **History of previous abdominal surgery**: This is the most common risk factor for SBO due to intra-abdominal adhesions, which account for ~75% of cases.\n2.  **Colicky (intermittent, cramping) pain**: This is characteristic of mechanical obstruction as peristalsis works against a fixed point.\n3.  **Vomiting**: Early and often bilious vomiting is common in proximal SBO.\n4.  **Abdominal X-ray findings**: Dilated loops of small bowel (typically >3 cm diameter, centrally located, with valvulae conniventes visible across the lumen) and air-fluid levels are the hallmark radiographic signs of SBO. In large bowel obstruction, the colon is dilated, and air-fluid levels are less prominent unless the ileocecal valve is incompetent.\n\n**Management Pearls for AMC**: Initial management is \"drip and suck\" (IV fluids and nasogastric decompression). CT abdomen is the gold standard for diagnosis and determining the need for surgery (e.g., signs of strangulation, complete obstruction).", "image_path": ""}, {"id": 34725, "date": "2026-02-21T05:55:09+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 45-year-old man develops severe shoulder pain after laparoscopic cholecystectomy. What is the most likely cause?", "options": "A. Surgical site infection\nB. Bile leak\nC. Referred diaphragmatic irritation from CO₂ insufflation\nD. Gallstone pancreatitis", "answer": "C", "explanation": "### ✅ Correct Answer: C. Referred diaphragmatic irritation from CO₂ insufflation\n\nThis is a classic post-laparoscopy complication. The pathophysiology involves:\n1.  **CO₂ Insufflation**: During laparoscopy, the peritoneal cavity is inflated with carbon dioxide to create a working space.\n2.  **Phrenic Nerve Irritation**: Residual CO₂ gas can irritate the diaphragm. The phrenic nerve (C3-C5) supplies sensory fibers to the diaphragm, and its irritation is referred to its somatic dermatomes, which include the shoulder tip (via the supraclavicular nerves, C3-C4).\n3.  **Timing**: This pain typically occurs in the immediate post-operative period (first 24-48 hours) and is often severe but self-limiting as the gas is absorbed.\n\n**Why other serious causes are less likely**: While bile leak (biloma) or pancreatitis can cause pain, they typically present with more systemic signs (fever, peritonitis, elevated bilirubin/amylase) and abdominal pain, not isolated severe shoulder pain as the primary complaint immediately after surgery.", "image_path": ""}, {"id": 34855, "date": "2026-03-03T12:04:20+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 22-year-old lady came for certification for part time job. She had diarrhoea and fever 2-3 days ago and other some people in that area suffering same symptoms and test Salmonella. What should you ask for intervention?", "options": "A. What is her part time job\nB. Recent history of school excursion\nC. Injection adenosine\nD. Carotid message\nE. Injection lignocaine", "answer": "A. What is her part time job", "explanation": "### ✅ Correct Answer: A. What is her part time job\n\nThis is a public health scenario involving a potential Salmonella outbreak. The key clinical reasoning is:\n\n1. **Public Health Priority**: When a notifiable disease like Salmonella is identified in multiple people in an area, the primary concern is identifying the source to prevent further cases. This is a core public health function.\n\n2. **Occupational Risk Assessment**: The patient is seeking certification for a part-time job. The nature of her job is critical. If she works in food handling, childcare, healthcare, or aged care, she could be a significant risk for transmitting Salmonella to vulnerable populations. Public health guidelines mandate excluding infectious individuals from such roles until they are no longer a transmission risk (typically 48 hours after symptoms resolve and with negative stool cultures in some cases).\n\n3. **Outbreak Investigation**: While asking about a school excursion (Option B) might identify a common exposure, it is less directly relevant to the immediate action required for her certification. The most urgent intervention is to determine if her job poses a public health risk.\n\n4. **Incorrect Interventions**: Options C, D, and E are acute cardiac management drugs/procedures completely unrelated to a gastrointestinal infection and public health response.\n\n**Management Pearl for AMC**: Always consider the public health implications of infectious diseases, especially regarding occupational health and exclusion criteria for food handlers and healthcare workers.\n\n### ❌ Why the Other Options Are Wrong\n\n- **B. Recent history of school excursion**: While relevant for contact tracing and identifying a potential common source in an outbreak investigation, it is not the most immediate *intervention* required for her job certification. The primary intervention is to assess her fitness for work based on her job role.\n- **C. Injection adenosine**: This is an antiarrhythmic drug used for terminating supraventricular tachycardia. It has no role in the management of Salmonella gastroenteritis or public health assessment.\n- **D. Carotid message**: Likely a typo for 'carotid massage', a vagal maneuver used in the diagnosis and treatment of certain tachyarrhythmias. It is irrelevant to this infectious disease scenario.\n- **E. Injection lignocaine**: A local anesthetic and class Ib antiarrhythmic. It is not indicated for Salmonella infection or public health management.\n\n### 📚 Relevant Guidelines\n\n- **National Health and Medical Research Council (NHMRC) - Australian Guidelines for the Prevention and Control of Infection in Healthcare**: Provides specific recommendations on exclusion periods for healthcare workers with gastroenteritis. — https://www.nhmrc.gov.au/about-us/publications/australian-guidelines-prevention-and-control-infection-healthcare-2019\n- **Food Standards Australia New Zealand (FSANZ) - Food Safety Standards**: Mandates that food handlers must not engage in food handling if they are suffering from a food-borne illness. — https://www.foodstandards.gov.au/code/Pages/default.aspx\n- **Therapeutic Guidelines (eTG) - Gastrointestinal**: Provides clinical guidance on the management of infectious diarrhoea, including notification and public health measures. — https://tgldcdp.tg.org.au/etgAccess", "image_path": "photo_2026-03-03_12-04-20 (1).jpg"}, {"id": 34856, "date": "2026-03-03T13:30:02+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A lady admitted for appendicectomy 3 days ago. She got catheterization for urinary problem and catheter out 1 day ago. She is about to discharge today and her urine C&S E.coli x 10^5. How to manage?", "options": "1) Discharge\n2) Don’t discharge\n3) Urine culture and microscope\n4) Give Trimethoprim and discharge", "answer": "1) Discharge", "explanation": "### ✅ Correct Answer: 1) Discharge\n\nThis scenario describes **asymptomatic bacteriuria (ASB)** in a postoperative patient. The clinical reasoning is as follows:\n\n1. **Definition of ASB**: The presence of significant bacteriuria (≥10^5 CFU/mL of a single organism) in a patient **without symptoms or signs referable to the urinary tract**. The patient is \"about to discharge,\" implying she is clinically well with no mention of dysuria, fever, suprapubic pain, or flank pain.\n\n2. **Context**: The bacteriuria is likely catheter-associated. Indwelling urinary catheters are a major risk factor for ASB. The catheter has been removed.\n\n3. **Evidence-Based Management**: According to major guidelines (IDSA, Therapeutic Guidelines Australia), **ASB should not be treated** in most patient populations, including postoperative non-pregnant women, unless prior to certain urologic procedures. Treatment does not improve outcomes, can lead to adverse drug effects, and promotes antimicrobial resistance.\n\n4. **Key Exceptions for Treatment**: Treatment is only indicated for ASB in pregnant women and patients undergoing invasive urological procedures where mucosal bleeding is anticipated. This patient does not fall into these categories.\n\n5. **Discharge Planning**: Since she is asymptomatic and the finding is incidental, she can be safely discharged without antibiotics. Patient education about symptoms of UTI to watch for would be appropriate.\n\n**AMC Pearl**: Always distinguish between asymptomatic bacteriuria (do not treat) and symptomatic urinary tract infection (treat). A positive culture alone is not an indication for antibiotics.\n\n### ❌ Why the Other Options Are Wrong\n\n- **2) Don’t discharge**: There is no clinical justification to delay discharge. She is asymptomatic, and the bacteriuria itself is not a reason for ongoing inpatient care.\n- **3) Urine culture and microscope**: The diagnostic workup is already complete. The urine culture and sensitivity (C&S) result is provided (E.coli >10^5). A repeat test or microscopy is unnecessary as it will not change management in an asymptomatic patient.\n- **4) Give Trimethoprim and discharge**: This is incorrect management. Prescribing antibiotics for asymptomatic bacteriuria is against guidelines, exposes the patient to unnecessary side effects (e.g., rash, nausea, risk of C. difficile), and contributes to antibiotic resistance. Trimethoprim might also be an inappropriate empirical choice depending on local resistance patterns.\n\n### 📚 Relevant Guidelines\n\n- **Therapeutic Guidelines (eTG) - Urinary Tract Infections**: States clearly that \"asymptomatic bacteriuria is common and usually should not be treated,\" except in pregnancy and prior to invasive urological procedures. — https://tgldcdp.tg.org.au/etgAccess\n- **Infectious Diseases Society of America (IDSA) Guidelines for ASB**: The definitive international guideline recommending against screening for or treating ASB in most patient groups, including catheterized patients. — https://www.idsociety.org/practice-guideline/asymptomatic-bacteriuria/\n- **Choosing Wisely Australia (RACP)**: Includes a recommendation to \"Don’t treat asymptomatic bacteriuria with antibiotics,\" highlighting it as a common low-value practice. — https://www.choosingwisely.org.au/recommendations/racp2", "image_path": ""}, {"id": 34889, "date": "2026-03-03T15:18:35+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 55-year-old woman with rheumatoid arthritis, currently managed with methotrexate 15 mg weekly, presents to her general practitioner after a household contact developed a herpes zoster rash on the trunk two days ago. She has no history of chickenpox or shingles and is concerned about her risk of infection given her immunosuppressive therapy. What is the most appropriate next step to prevent varicella-zoster virus infection?", "options": "A. Administer varicella-zoster immune globulin\nB. Reassure that no action is required\nC. Order varicella-zoster virus IgG serology\nD. Administer the varicella vaccine\nE. Commence oral aciclovir prophylactically", "answer": "A. Administer varicella-zoster immune globulin", "explanation": "### ✅ Correct Answer: A. Administer varicella-zoster immune globulin\n\nThis patient is a susceptible, immunocompromised individual (on methotrexate) with a significant exposure to varicella-zoster virus (VZV). She has no history of chickenpox or shingles, placing her at high risk for primary VZV infection (chickenpox), which can be severe and even fatal in immunocompromised adults. The key principles are:\n1.  **Post-Exposure Prophylaxis (PEP):** For immunocompromised, VZV-susceptible individuals with a significant exposure, varicella-zoster immune globulin (VZIG) is the standard of care. It provides passive immunity to prevent or attenuate infection.\n2.  **Timing is Critical:** VZIG is most effective when given as soon as possible after exposure, ideally within 96 hours (up to 10 days may still offer some benefit). The contact's rash appeared two days ago, making this intervention timely.\n3.  **Contraindication of Live Vaccine:** The varicella vaccine is a live-attenuated virus and is contraindicated in immunocompromised patients, ruling out option D.\n4.  **Role of Serology:** While checking VZV IgG serology (option C) might seem logical to confirm susceptibility, in this high-risk scenario with a known exposure, guidelines recommend administering VZIG immediately without waiting for serology results, as delay reduces efficacy. Serology can be done concurrently, but treatment should not be withheld.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Reassure that no action is required**: This is incorrect and dangerous. An immunocompromised, likely VZV-naïve patient has a high risk of severe primary infection. Doing nothing is not an acceptable management strategy.\n- **C. Order varicella-zoster virus IgG serology**: While checking immunity status is part of the workup, in this urgent post-exposure scenario for a high-risk patient, definitive prophylaxis (VZIG) should not be delayed while awaiting results. VZIG should be given presumptively.\n- **D. Administer the varicella vaccine**: The varicella vaccine is a live-attenuated virus vaccine. It is contraindicated in immunocompromised patients, including those on methotrexate for rheumatoid arthritis, due to the risk of causing vaccine-strain viral disease.\n- **E. Commence oral aciclovir prophylactically**: Oral antiviral prophylaxis is not the standard first-line post-exposure prophylaxis for immunocompromised patients. VZIG is preferred. Antivirals like aciclovir are used for treatment of active infection, not for primary prevention in this context.\n\n### 📚 Relevant Guidelines\n- **[The Australian Immunisation Handbook (ATAGI)]**: Guidelines for varicella (chickenpox) - includes post-exposure prophylaxis recommendations for immunocompromised individuals. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/varicella-chickenpox\n- **[Therapeutic Guidelines (eTG) - Dermatology]**: Management of herpes zoster and varicella, including post-exposure prophylaxis. — https://tgldcdp.tg.org.au/etgAccess\n- **[UpToDate - Prevention of varicella-zoster virus infection in immunocompromised patients]**: Detailed review of post-exposure management. — https://www.uptodate.com/contents/prevention-of-varicella-zoster-virus-infection-in-the-immunocompromised-host", "image_path": ""}, {"id": 34891, "date": "2026-03-03T15:26:50+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "**A 56-year old lady is brought to the emergency department by an ambulance. She developed right leg weakness and left sided facial droop an hour ago. She has past medical history of hypertension, hyperlipidemia and peptic ulcer disease (GI bleeding two weeks ago). On examination, her blood pressure is 130/85mmHg, respiratory rate is 18 breaths per minute, heart rate is 110 beats per minutes and oxygen saturation is 100% at room air. On the neurological examination, she is found to have hypertonia and reduced power in the right leg, and right-sided facial palsy. The Babinski sign is positive. CT scan of the brain does not show any evidence of an intracranial bleed.ECG shows sinus rhythm. Which of the following is the most appropriate therapy for this patient?**", "options": "A. Heparin\nB. Warfarin\nC. Clopidogrel\nD. Aspirin\nE. Thrombolysis", "answer": "D. Aspirin", "explanation": "### ✅ Correct Answer: D. Aspirin\n\nThis patient presents with an acute ischemic stroke (clinical findings: right leg weakness, right-sided facial palsy, hypertonia, positive Babinski; CT brain excludes haemorrhage) within a very narrow therapeutic window (1 hour from onset). However, a critical absolute contraindication to thrombolysis is present.\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** Acute ischemic stroke in the left internal capsule or cortex (causing right-sided motor signs).\n2.  **Contraindication to Thrombolysis (Option E):** The patient has a **history of peptic ulcer disease with GI bleeding two weeks ago**. This is a major recent bleeding risk and an absolute contraindication for intravenous alteplase (thrombolysis) according to all major stroke guidelines. The benefits do not outweigh the high risk of life-threatening gastrointestinal or intracranial haemorrhage.\n3.  **Standard Antiplatelet Therapy:** For an acute ischemic stroke where thrombolysis is not indicated, the immediate standard of care is the administration of antiplatelet therapy, specifically aspirin. Aspirin 150-300 mg should be given orally (or via nasogastric tube if swallowing impaired) as soon as possible after haemorrhage is excluded by CT, ideally within 48 hours.\n4.  **Why not other antiplatelets/anticoagulants?**\n    - **Clopidogrel (C):** While used for secondary prevention, it is not the standard *immediate* therapy in the hyperacute setting. Aspirin is first-line. Dual antiplatelet therapy (e.g., aspirin + clopidogrel) may be used for minor strokes/TIAs, but this patient has a significant stroke and a recent bleed, making dual therapy higher risk.\n    - **Heparin/Warfarin (A & B):** Therapeutic anticoagulation (heparin, warfarin) is not indicated for acute treatment of non-cardioembolic ischemic stroke. It increases the risk of haemorrhagic transformation, especially with a recent GI bleed. Anticoagulation is reserved for specific indications like atrial fibrillation, which she does not have (sinus rhythm on ECG).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Heparin**: Full-dose anticoagulation with heparin is not recommended for acute treatment of most ischemic strokes due to an increased risk of haemorrhagic conversion and extracranial bleeding, particularly in a patient with a very recent GI bleed. It is used only for specific indications like arterial dissection or cardioembolic stroke with high early recurrence risk, which are not present here.\n- **B. Warfarin**: Warfarin is a long-term oral anticoagulant, not an acute therapy. It takes days to become therapeutic and would be contraindicated given the recent major GI bleed. It is used for secondary prevention in conditions like atrial fibrillation.\n- **C. Clopidogrel**: Clopidogrel is an antiplatelet agent used for secondary stroke prevention. However, in the immediate hours of an acute ischemic stroke, aspirin is the first-line antiplatelet agent. Starting clopidogrel alone is not standard acute therapy. Furthermore, with a recent GI bleed, adding a second antiplatelet increases bleeding risk unnecessarily.\n- **E. Thrombolysis**: Intravenous alteplase is the gold standard for acute ischemic stroke presenting within 4.5 hours. However, it has strict contraindications. **A history of gastrointestinal or urinary tract haemorrhage within the previous 21 days is an absolute contraindication.** This patient's GI bleed two weeks ago (14 days) firmly rules out this option due to an unacceptably high risk of causing severe or fatal haemorrhage.\n\n### 📚 Relevant Guidelines\n- **[Australian Clinical Guidelines for Stroke Management (Stroke Foundation)]**: Comprehensive guidelines for acute stroke management, including indications and contraindications for thrombolysis and antiplatelet therapy. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[Therapeutic Guidelines (eTG) - Neurology]**: Management of acute ischemic stroke, including antiplatelet and thrombolytic therapy. — https://tgldcdp.tg.org.au/etgAccess\n- **[UpToDate - Initial assessment and management of acute ischemic stroke]**: Detailed review of acute treatment options and contraindications. — https://www.uptodate.com/contents/initial-assessment-and-management-of-acute-ischemic-stroke", "image_path": ""}, {"id": 34912, "date": "2026-03-04T00:49:20+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_00-49-20 (1).jpg"}, {"id": 34913, "date": "2026-03-04T01:05:50+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_01-05-50 (1).jpg"}, {"id": 34914, "date": "2026-03-04T01:07:29+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_01-07-29 (1).jpg"}, {"id": 34915, "date": "2026-03-04T01:16:01+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_01-16-01 (1).jpg"}, {"id": 34916, "date": "2026-03-04T01:17:24+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_01-17-24 (1).jpg"}, {"id": 34917, "date": "2026-03-04T02:05:23+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_02-05-23 (1).jpg"}, {"id": 34918, "date": "2026-03-04T02:06:09+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_02-06-09 (1).jpg"}, {"id": 34922, "date": "2026-03-04T15:30:12+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_15-30-12 (1).jpg"}, {"id": 34924, "date": "2026-03-04T15:32:53+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "", "options": "", "answer": "", "explanation": "", "image_path": "photo_2026-03-04_15-32-53 (1).jpg"}, {"id": 34953, "date": "2026-03-05T08:45:26+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 72-year-old woman has the abrupt onset of right face and hand weakness, disturbed speech production, and a right homonymous hemianopsia. This is most likely attributable to occlusion of which of the following arteries?", "options": "A. Left middle cerebral artery\nB. Left anterior cerebral artery\nC. Left vertebrobasilar artery\nD. Right anterior choroidal artery\nE. Left posterior inferior cerebellar artery (PICA)", "answer": "A", "explanation": "### ✅ Correct Answer: A. Left middle cerebral artery\n\n**Clinical Reasoning:**\n- **Right face and hand weakness:** The primary motor cortex (precentral gyrus) for the face and hand is supplied by the **middle cerebral artery (MCA)**. The MCA is the largest branch of the internal carotid artery and supplies the lateral convexity of the cerebral hemisphere, including the primary motor and sensory cortices for the face, arm, and hand, as well as Broca's and Wernicke's areas for language.\n- **Disturbed speech production (aphasia):** This indicates a **left hemisphere lesion** (in a right-handed individual, which is assumed unless stated otherwise). Broca's area (inferior frontal gyrus) and the adjacent motor cortex for speech articulation are supplied by the **left MCA**.\n- **Right homonymous hemianopsia:** This indicates a lesion affecting the optic radiations or primary visual cortex in the left occipital lobe. The **MCA** supplies the optic radiations as they course through the temporal and parietal lobes (Meyer's loop and dorsal pathway).\n- **Combination of findings:** The triad of **contralateral hemiparesis (face and arm > leg), aphasia (if dominant hemisphere), and contralateral homonymous hemianopia** is classic for a **left MCA stroke**. The MCA occlusion affects the lateral surface of the hemisphere, encompassing motor, sensory, language, and visual pathway areas.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Left anterior cerebral artery (ACA):** ACA supplies the medial frontal and parietal lobes, including the leg area of the motor cortex. An ACA stroke typically causes **contralateral leg weakness > arm**, with possible gait apraxia and urinary incontinence. It does not cause aphasia or homonymous hemianopia.\n- **C. Left vertebrobasilar artery:** The vertebrobasilar system supplies the brainstem, cerebellum, and occipital lobes. Occlusion causes **brainstem signs** (e.g., cranial nerve deficits, ataxia, vertigo, crossed sensory/motor deficits) or **bilateral visual field defects** (cortical blindness). It does not typically cause isolated face/arm weakness and aphasia.\n- **D. Right anterior choroidal artery:** This small artery supplies the posterior limb of the internal capsule, globus pallidus, and optic tract. Occlusion can cause a classic triad: **contralateral hemiparesis, hemianesthesia, and homonymous hemianopia**. However, it does **not** cause aphasia (as it would be on the right side, non-dominant for language).\n- **E. Left posterior inferior cerebellar artery (PICA):** PICA is a branch of the vertebral artery supplying the inferior cerebellum and lateral medulla. Occlusion causes **lateral medullary syndrome (Wallenberg's syndrome)**: ipsilateral facial pain/temperature loss, Horner syndrome, ataxia, vertigo, and contralateral body pain/temperature loss. It does not cause cortical signs like aphasia or hemiparesis.\n\n### 📚 Relevant Guidelines\n- **[National Stroke Foundation (Australia) Clinical Guidelines for Stroke Management]**: Comprehensive Australian guidelines for stroke diagnosis, imaging, and management — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[American Heart Association/American Stroke Association (AHA/ASA) Guidelines for the Early Management of Patients With Acute Ischemic Stroke]**: International standard for acute stroke care, including vascular territory localization — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n- **[UpToDate: Overview of the evaluation of stroke]**: Detailed review of stroke syndromes and vascular territories — https://www.uptodate.com/contents/overview-of-the-evaluation-of-stroke", "image_path": ""}, {"id": 34954, "date": "2026-03-05T08:45:44+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 65-year-old woman comes to the physician complaining of periodic headaches in the temporal region, visual disturbances, and neck stiffness.  Appropriate empiric medical therapy is initiated, and biopsy of a scalp artery confirms giant cell arteritis.  The patient is very compliant with treatment.  She comes to the physician 6 months later with slowly progressive muscle weakness.  Her headaches have resolved, but she has difficulty climbing stairs and getting up from a chair.  Her blood pressure is 120/70 mm Hg, pulse is 82/min, and respirations are 12/min.  Physical examination shows 4/5 muscle power in her proximal lower extremities bilaterally.  Her serum creatine kinase level and erythrocyte sedimentation rate are normal.  Which of the following is the most likely cause of this patient’s current complaints?", "options": "A. Drug-induced myopathy\nB. Inflammatory myositis\nC. Mononeuritis multiplex\nD. Multiple sclerosis\nE. Neuromuscular junction disease", "answer": "A", "explanation": "### ✅ Correct Answer: A. Drug-induced myopathy\n\n**Clinical Reasoning:**\n- **Context:** The patient has biopsy-proven **giant cell arteritis (GCA)**, which is treated with **high-dose glucocorticoids (prednisone)** as first-line therapy.\n- **Timeline:** Symptoms develop **6 months after starting treatment**, which is consistent with a chronic complication of long-term corticosteroid use.\n- **Clinical features:**\n  - **Proximal muscle weakness:** Difficulty climbing stairs and rising from a chair indicates **proximal myopathy**, classic for steroid myopathy.\n  - **Normal CK:** In steroid myopathy, creatine kinase is typically **normal or only mildly elevated**, distinguishing it from inflammatory myopathies (like polymyositis) where CK is markedly elevated.\n  - **Normal ESR:** The erythrocyte sedimentation rate is normal, indicating the GCA is well-controlled (headaches resolved), so active vasculitis is unlikely to be causing the weakness.\n  - **Symmetrical involvement:** Bilateral proximal weakness is typical of metabolic/toxic myopathies rather than focal neuropathies.\n- **Pathophysiology:** Glucocorticoids cause a **catabolic myopathy** by inhibiting protein synthesis, promoting protein breakdown, and altering muscle carbohydrate metabolism. It preferentially affects **type IIb fast-twitch muscle fibers**, leading to proximal weakness.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Inflammatory myositis:** While inflammatory myopathies (e.g., polymyositis) can cause proximal weakness, they are typically associated with **markedly elevated CK levels** (often 5-50x normal). The normal CK and temporal relationship to steroid therapy make this unlikely. Inflammatory myositis could coexist with GCA (as part of polymyalgia rheumatica spectrum), but the normal CK and response to steroids point away from active inflammation.\n- **C. Mononeuritis multiplex:** This is an asymmetric, multifocal neuropathy involving individual peripheral nerves. It can occur in vasculitides like GCA but typically presents with **asymmetric sensory and motor deficits** in specific nerve distributions (e.g., foot drop, wrist drop). The **symmetrical proximal weakness** and normal ESR make this unlikely.\n- **D. Multiple sclerosis:** MS is a demyelinating disease of the central nervous system with relapsing-remitting neurological deficits (e.g., optic neuritis, sensory symptoms, brainstem signs). It does not typically cause isolated, progressive proximal muscle weakness without other neurological findings. The age (65) is also atypical for MS onset.\n- **E. Neuromuscular junction disease:** Conditions like myasthenia gravis cause **fatigable weakness** that typically affects ocular/bulbar muscles first, then may progress to limb weakness. Proximal weakness can occur but is usually **fluctuating** and worsens with activity. Normal CK and absence of ptosis/diplagia/dysphagia make this unlikely.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (Australia): Rheumatology - Giant cell arteritis and polymyalgia rheumatica]**: Australian guidelines on GCA management including steroid dosing and monitoring for adverse effects — https://tgldcdp.tg.org.au/viewTopic?topicfile=rheumatology-giant-cell-arteritis-polymyalgia-rheumatica&guidelineName=Rheumatology#toc_d1e289\n- **[British Society for Rheumatology (BSR) Guideline on Diagnosis and Treatment of Giant Cell Arteritis]**: Comprehensive guidelines including management of steroid complications — https://academic.oup.com/rheumatology/article/59/3/e1/5581232\n- **[UpToDate: Major side effects of systemic glucocorticoids]**: Detailed review of steroid-induced myopathy — https://www.uptodate.com/contents/major-side-effects-of-systemic-glucocorticoids", "image_path": ""}, {"id": 34956, "date": "2026-03-05T08:46:19+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E", "explanation": "### ✅ Correct Answer: E. Neurocysticercosis\n\n**Clinical Reasoning:**\n- **Epidemiology:** Neurocysticercosis is the **most common parasitic infection of the CNS worldwide** and a leading cause of acquired epilepsy in endemic regions (Latin America, Asia, Africa).\n- **Clinical presentation:**\n  - **Seizures:** Generalized tonic-clonic seizures are the **most common presentation** (70-90% of cases).\n  - **Confusion:** Can occur due to post-ictal state or increased intracranial pressure from multiple lesions.\n  - **Cystic lesions on MRI:** \"Numerous well-defined cystic lesions throughout the cerebral cortex\" is classic for neurocysticercosis. The cysts are typically **small, round, and well-defined**, often with a **scolex (dot) inside** (seen on MRI).\n  - **Extra-neurological clues:**\n    - **Swelling over right eye:** Could represent a **subcutaneous cyst** (cysticerci can lodge in muscles/subcutaneous tissue).\n    - **Tenderness in right testis:** May indicate **orchitis** or a cysticercal cyst in the testis (rare but reported).\n- **Pathophysiology:** Caused by the larval stage of the pork tapeworm *Taenia solium*. Humans ingest eggs from contaminated food/water → eggs hatch in intestine → larvae migrate to tissues (brain, muscle, eyes) → form cysts → inflammatory reaction when cysts degenerate → seizures.\n- **Diagnosis:** MRI findings + clinical presentation + epidemiology are highly suggestive. Serology (ELISA for antibodies) can confirm.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Cerebral metastases:** Metastatic brain tumors typically occur in **older adults** with a known primary cancer (e.g., lung, breast, melanoma). They usually present with **progressive neurological deficits**, headaches, or signs of increased ICP. While they can cause seizures, the **age (18)** and **multiple well-defined cystic lesions** are atypical for metastases (which are usually solid or necrotic, not purely cystic).\n- **B. Progressive multifocal leukoencephalopathy (PML):** PML is a **demyelinating disease** caused by JC virus in **immunocompromised patients** (HIV, immunosuppressive therapy). MRI shows **multifocal white matter lesions** (not cortical cysts), typically without mass effect. Presentation is with progressive neurological deficits (weakness, vision loss, cognitive changes), not acute seizures with cystic cortical lesions.\n- **C. Cerebral vasculitis:** Can cause multifocal brain lesions due to ischemia/infarction. Lesions are typically **ischemic** (wedge-shaped, following vascular territories) rather than **well-defined cysts**. Presentation often includes headache, cognitive changes, focal deficits, and systemic symptoms (fever, weight loss). The classic cystic appearance on MRI is not typical.\n- **D. Neurosyphilis:** Can present with diverse neurological manifestations (meningitis, stroke, dementia, tabes dorsalis). **Gummas** (granulomatous lesions) can occur but are **rare and solitary**, not \"numerous cystic lesions throughout the cortex.\" Seizures are uncommon. The patient's age and presentation don't fit the typical profile (usually older adults with risk factors).\n\n### 📚 Relevant Guidelines\n- **[World Health Organization (WHO) Guidelines on Taeniasis/Cysticercosis]**: International guidelines on diagnosis and management — https://www.who.int/publications/i/item/9789241516276\n- **[Infectious Diseases Society of America (IDSA) Clinical Practice Guidelines for the Diagnosis and Treatment of Neurocysticercosis]**: Evidence-based management guidelines — https://academic.oup.com/cid/article/66/8/e49/4851816\n- **[Therapeutic Guidelines (Australia): Central nervous system infections]**: Australian guidelines on parasitic CNS infections — https://tgldcdp.tg.org.au/viewTopic?topicfile=central-nervous-system-infections&guidelineName=Antibiotic#toc_d1e317", "image_path": "photo_2026-03-05_08-46-19 (1).jpg"}, {"id": 34967, "date": "2026-03-05T23:11:17+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech. The patient was in his usual state of health last night but awoke this morning with these symptoms. He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease. The patient does not drink alcohol regularly but has a 45-pack-year history. Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia. CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery. The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility. Forty-eight hours later, he becomes obtunded. Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min. Physical examination now shows complete right hemiplegia and deviation of the eyes to the left. Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E. Repeat CT scan of the head", "explanation": "### ✅ Correct Answer: E. Repeat CT scan of the head\n\nThis patient presents with a classic clinical scenario of **malignant middle cerebral artery (MCA) infarction** with subsequent neurological deterioration. The step-by-step clinical reasoning is as follows:\n\n1.  **Initial Presentation & Diagnosis:** The patient had a large left MCA territory ischemic stroke, confirmed by CT scan. The clinical findings (right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia) are consistent with a dominant hemisphere MCA stroke.\n2.  **Clinical Deterioration:** After 48 hours, the patient becomes obtunded with new signs of complete right hemiplegia and leftward eye deviation. This timeline (2-5 days post-stroke) is classic for the development of **cerebral edema** secondary to a large hemispheric infarction.\n3.  **Pathophysiology of Malignant Edema:** In large MCA strokes, cytotoxic edema peaks around 2-5 days. The swelling can lead to increased intracranial pressure (ICP), midline shift, and potentially transtentorial herniation. The new eye deviation (towards the side of the lesion) suggests uncal herniation. The mild fever is a common non-infectious sequela of large strokes (central fever).\n4.  **Immediate Diagnostic Imperative:** Before initiating any specific therapy for suspected edema (like hyperosmolar agents), it is **critical to confirm the diagnosis and rule out other causes of deterioration** (e.g., hemorrhagic transformation, new infarction). A **non-contrast CT head is the fastest, most accessible test** to assess for mass effect, midline shift, effacement of basal cisterns, and hemorrhagic conversion. This information is essential to guide urgent management decisions, including potential surgical decompression (hemicraniectomy).\n5.  **Why This is the Best Next Step:** In a deteriorating stroke patient, imaging is the priority to confirm the suspected complication and exclude contraindications to therapies. Empiric treatment without imaging is dangerous, and MRI, while more detailed, is slower and less practical in an acute, obtunded patient.\n\n### ❌ Why the Other Options Are Wrong\n\n-   **A. Blood cultures and empiric antibiotics**: While fever is present, the primary issue is neurological deterioration in a known large stroke. The fever is more likely central (due to the stroke itself) than infectious at this early stage. Starting antibiotics without a clear source of infection and before assessing for cerebral edema is incorrect and delays definitive management.\n-   **B. Intravenous hypertonic saline and observation** & **C. Intravenous mannitol and observation**: Both are treatments for cerebral edema and increased ICP. However, administering them **empirically** without first confirming the presence and severity of edema/herniation on imaging is inappropriate. Imaging is needed to assess the degree of midline shift and rule out hemorrhage (a relative contraindication for mannitol). Furthermore, in malignant MCA infarction, these are temporizing measures, and the definitive management may be surgical decompression, which requires imaging for planning.\n-   **D. MRI of the head**: MRI (especially DWI) is superior for detecting acute ischemia and can provide detailed information. However, in an **acutely deteriorating, obtunded patient**, CT is faster, more readily available, and sufficient to diagnose life-threatening complications like significant edema, hemorrhage, and herniation. The delay and logistical challenges of MRI make it a less appropriate *first* test in this emergency setting.\n\n### 📚 Relevant Guidelines\n\n-   **Stroke Foundation Australia (Clinical Guidelines for Stroke Management)**: Provides comprehensive guidance on the management of acute ischemic stroke, including monitoring for and management of complications like cerebral edema and herniation. — [https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management](https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management)\n-   **American Heart Association/American Stroke Association (AHA/ASA Guidelines for the Early Management of Patients With Acute Ischemic Stroke)**: Details the recognition and management of malignant cerebral edema post-stroke, emphasizing the role of urgent neuroimaging and consideration of decompressive hemicraniectomy. — [https://www.ahajournals.org/doi/10.1161/STR.0000000000000211](https://www.ahajournals.org/doi/10.1161/STR.0000000000000211)\n-   **UpToDate: \"Malignant Middle Cerebral Artery Infarction\"**: A clinical resource summarizing the pathophysiology, diagnosis (highlighting CT findings), and management strategies for this specific life-threatening complication. — [https://www.uptodate.com/contents/malignant-middle-cerebral-artery-infraction](https://www.uptodate.com/contents/malignant-middle-cerebral-artery-infraction)", "image_path": ""}, {"id": 34987, "date": "2026-03-06T20:27:57+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 30-year-old woman comes to the emergency department due to worsening, bilateral lower extremity weakness and numbness for the past 4 days.  She has had no fever, headache, or back pain, but she had an incident of urinary incontinence today.  The patient has no other medical conditions and takes no medications.  She does not use tobacco, alcohol, or illicit drugs.  Temperature is 37 C (98.6 F), blood pressure is 110/60 mm Hg, pulse is 72/min, and respirations are 16/min.  On physical examination, the patient is alert and oriented with normal comprehension and speech.  The pupils are equal and reactive, and there is no facial weakness.  Upper extremity muscle strength is normal with normal reflexes, but both legs are diffusely weak.  Bilateral lower extremity deep tendon reflexes are increased with extensor plantar response.  Sensation to pinprick is decreased below the level of the umbilicus, and vibratory sensation is absent in the toes.  Which of the following is the most likely cause of this patient’s current symptoms?", "options": "A. Autoimmune demyelination of peripheral nerves\nB. Compression of cauda equina nerve roots\nC. Embolic occlusion of the anterior spinal artery\nD. Segmental inflammation of the spinal cord\nE. Vitamin B12 nutritional deficiency", "answer": "D. Segmental inflammation of the spinal cord", "explanation": "### ✅ Correct Answer: D. Segmental inflammation of the spinal cord\n\nThe patient presents with a subacute (4-day) onset of bilateral lower extremity weakness and numbness, urinary incontinence, and a distinct sensory level at the umbilicus. The neurological exam reveals **upper motor neuron (UMN) signs** in the legs (increased reflexes, extensor plantar response) and a **sensory level** to pinprick at T10 (umbilicus). The combination of bilateral motor and sensory deficits with a clear sensory level, UMN signs, and sphincter involvement localizes the lesion to the **spinal cord** (myelopathy). The absence of fever, headache, or back pain makes infectious or compressive causes less likely. The subacute progression and UMN findings are classic for **transverse myelitis**, which is an inflammatory, demyelinating process affecting a segment of the spinal cord, often associated with autoimmune conditions like multiple sclerosis or neuromyelitis optica spectrum disorder (NMOSD).\n\n**Key Clinical Reasoning:**\n1.  **Localization:** The sensory level (umbilicus = T10) and bilateral UMN signs below that level point definitively to a spinal cord lesion, not peripheral nerves or nerve roots.\n2.  **Pathophysiology:** Transverse myelitis involves inflammation across one or more spinal cord segments, disrupting ascending sensory and descending motor tracts. This explains the bilateral deficits, sensory level, and early bladder involvement.\n3.  **Timeline:** Subacute progression over days is typical for inflammatory demyelination, as opposed to the sudden onset of vascular causes (anterior spinal artery syndrome) or the very slow progression of nutritional deficiencies.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Autoimmune demyelination of peripheral nerves:** This describes conditions like Guillain-Barré syndrome (GBS) or chronic inflammatory demyelinating polyneuropathy (CIDP). GBS typically presents with *ascending* symmetric weakness, *areflexia* (not hyperreflexia), and often involves cranial nerves. It does not produce a sensory level or UMN signs.\n- **B. Compression of cauda equina nerve roots:** Cauda equina syndrome is a surgical emergency involving compression of the lumbosacral nerve roots *below* the conus medullaris. It presents with *lower motor neuron* signs in the legs (flaccid weakness, reduced reflexes), saddle anesthesia, and urinary/bowel retention or incontinence. The presence of UMN signs (hyperreflexia, Babinski) and a sensory level at T10 rules this out, as the cauda equina is at L1-L2 and below.\n- **C. Embolic occlusion of the anterior spinal artery:** This causes *anterior spinal artery syndrome*, characterized by *sudden*, catastrophic onset of bilateral motor paralysis and loss of pain/temperature sensation below the level of infarction, with *preservation of proprioception and vibratory sense* (dorsal columns supplied by posterior spinal arteries). This patient has a subacute onset and, critically, has lost vibratory sensation, which is inconsistent with an anterior cord syndrome.\n- **E. Vitamin B12 nutritional deficiency:** This causes **subacute combined degeneration (SCD)** of the spinal cord, which affects the dorsal columns (proprioception, vibration) and corticospinal tracts. While it can cause UMN signs and sensory loss, it is typically *slowly progressive* over weeks to months, not days. It is also often associated with macrocytic anemia and other systemic signs, which are absent here. The rapid 4-day progression makes B12 deficiency very unlikely as the primary cause.\n\n### 📚 Relevant Guidelines\n- **[MS Australia - Clinical Management of Multiple Sclerosis]**: Includes diagnostic criteria and management for demyelinating events like transverse myelitis. — https://www.msaustralia.org.au/wp-content/uploads/2021/10/MS-Clinician-Handbook-2021.pdf\n- **[UpToDate - Transverse Myelitis]**: Comprehensive review of etiology, clinical features, diagnosis, and management of transverse myelitis. — https://www.uptodate.com/contents/transverse-myelitis\n- **[NICE Guideline NG127 - Multiple sclerosis in adults: management]**: Covers diagnosis and management of relapses including myelitis. — https://www.nice.org.uk/guidance/ng127", "image_path": ""}, {"id": 34989, "date": "2026-03-06T20:31:06+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 35-year-old woman comes to the office due to persistent rhinorrhea.  The patient has clear drainage from the right side of her nose that increases when she has a bowel movement or bends over to pick something off the floor.  On examination, the external nose appears normal, the turbinates are pink, and the septum is straight.  There is a small amount of clear fluid from her right nostril.  The remainder of the examination is normal.  Which of the following additional history is most important for establishing a diagnosis in this patient?", "options": "A. Family history\nB. Illicit drug use\nC. Prior seasonal allergies\nD. Recent head trauma\nE. Use of decongestant sprays", "answer": "D. Recent head trauma", "explanation": "### ✅ Correct Answer: D. Recent head trauma\n\nThe key clinical feature is **unilateral, clear rhinorrhea that increases with maneuvers that raise intracranial pressure** (Valsalva during bowel movement, bending over). This is classic for **cerebrospinal fluid (CSF) rhinorrhea**, which is a leak of CSF from the subarachnoid space into the nasal cavity. The most common cause is **trauma**, which can fracture the cribriform plate or other skull base structures, creating a communication. A history of recent (or even remote) head trauma is therefore the most critical piece of information to seek. The clear fluid can be tested for beta-2 transferrin to confirm it is CSF.\n\n**Key Clinical Reasoning:**\n1.  **Laterality & Character:** Unilateral, persistent, clear drainage is suspicious for CSF leak. Allergic rhinitis is typically bilateral and associated with other symptoms (sneezing, itchy eyes).\n2.  **Provoking Factors:** Drainage exacerbated by actions that increase intracranial pressure (bending, straining) is a hallmark of CSF rhinorrhea, as the pressure gradient forces fluid out through the defect.\n3.  **Examination:** The normal appearance of the nasal mucosa (pink turbinates, straight septum) argues against inflammatory causes like allergic rhinitis (which would show pale, boggy turbinates) or rhinitis medicamentosa from decongestant overuse.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Family history:** While family history is relevant for atopic conditions like allergic rhinitis, it is not the *most important* factor here. The unilateral nature and specific exacerbating factors point away from a simple allergic etiology.\n- **B. Illicit drug use:** Intranasal drug use (e.g., cocaine) can cause mucosal irritation, ulceration, and rhinorrhea, but it is typically not clear, unilateral, and specifically provoked by Valsalva. It is a less likely and less specific cause than trauma for this presentation.\n- **C. Prior seasonal allergies:** A history of allergies might suggest allergic rhinitis, but again, the unilateral presentation and clear provocation by pressure changes are atypical. Allergic rhinitis is usually bilateral, seasonal/trigger-based, and associated with other allergic symptoms.\n- **E. Use of decongestant sprays:** Overuse of topical decongestants (e.g., oxymetazoline) causes **rhinitis medicamentosa**, a rebound congestion and rhinorrhea when the medication wears off. The rhinorrhea is not typically unilateral, clear, and pressure-provoked. The exam would also likely show erythematous, irritated nasal mucosa.\n\n### 📚 Relevant Guidelines\n- **[UpToDate - Cerebrospinal fluid (CSF) rhinorrhea]**: Detailed review of etiology (traumatic vs. spontaneous), diagnosis (including beta-2 transferrin testing), and management. — https://www.uptodate.com/contents/cerebrospinal-fluid-csf-rhinorrhea\n- **[Therapeutic Guidelines (eTG) - Otolaryngology]**: Australian guidelines covering the assessment and referral for conditions like CSF leak. — https://tgldcdp.tg.org.au/etgaccess\n- **[RACGP - Red flags in otorhinolaryngology]**: Guidance for GPs on when to suspect and refer for serious ENT conditions, including CSF leak. — https://www.racgp.org.au/afp/2015/december/red-flags-in-otorhinolaryngology", "image_path": ""}, {"id": 34990, "date": "2026-03-06T20:31:21+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 25 year old male patient who attends with right-sided ear discomfort. He tells you that he has had discomfort for a few months and has a feeling like his ear is ‘blocked’. He is a keen early morning surfer and thinks that the blocked feeling might just be some trapped water in his ears. He has not noticed any ear discharge. He has no fevers and feels systemically well. However, the aching sensation is getting progressively worse in his right ear and he is keen to know if there is any problem.\n\nYou perform an otoscopic examination of his ears and note the following finding on both left and right sides:\n\n\n\nWhat is the most appropriate advice to provide to him today about his ear complaint?", "options": "A. Advise him that he has an increased risk of developing otitis externa and conductive hearing loss\nB. Advise him that he will require oral flucloxacillin 500mg 6 hourly for five days\nC. Advise him that the condition is aggravated by sand in the auditory canals\nD. Advise him that wearing ear plugs while surfing will assist with resolution of the condition.\nE. Advise him that he will require an urgent review with an Ear Nose Throat (ENT) surgeon due to the malignant potential of this condition", "answer": "A. Advise him that he has an increased risk of developing otitis externa and conductive hearing loss", "explanation": "### ✅ Correct Answer: A. Advise him that he has an increased risk of developing otitis externa and conductive hearing loss\n\nThe clinical scenario describes a **surfer** with chronic ear discomfort, a blocked sensation, and otoscopic findings (implied by the context and common in surfers) of **exostoses** (also known as surfer's ear). Exostoses are benign bony growths in the external auditory canal caused by chronic cold water and wind exposure. They narrow the canal, trapping water and debris, which predisposes to **otitis externa** (swimmer's ear) and can cause a **conductive hearing loss** if they become large enough to occlude the canal. The appropriate advice is to educate the patient about these risks and recommend preventive measures (like ear plugs) to prevent progression. Exostoses are **not malignant** and do not typically require urgent surgical review unless they are causing significant complications.\n\n**Key Clinical Reasoning:**\n1.  **Patient Profile & History:** A surfer with chronic, water-exposure-related ear symptoms is classic for external auditory canal exostoses.\n2.  **Nature of the Condition:** Exostoses are benign, slow-growing bony growths. They are not infections (so antibiotics are not indicated) and have no malignant potential.\n3.  **Complications:** The primary risks are recurrent otitis externa (due to water trapping) and conductive hearing loss (due to physical obstruction).\n4.  **Management:** The cornerstone is **prevention** of progression and complications through the use of well-fitted ear plugs or a neoprene hood while surfing.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Advise him that he will require oral flucloxacillin 500mg 6 hourly for five days:** Flucloxacillin is an antibiotic for bacterial infections (e.g., cellulitis, otitis externa with significant surrounding inflammation). There is no evidence of acute infection here (no discharge, fever, or systemic symptoms). Exostoses themselves are not an infectious process.\n- **C. Advise him that the condition is aggravated by sand in the auditory canals:** While sand can irritate the ear, it is not the primary etiological factor for exostoses. The key aggravating factor is **cold water and wind exposure**, not sand. This advice is incomplete and misleading.\n- **D. Advise him that wearing ear plugs while surfing will assist with resolution of the condition.** This option is partially correct in recommending ear plugs, but it is incorrect in stating they will lead to *resolution*. Ear plugs are a **preventive** measure to stop progression and reduce complication risk. Established exostoses do not resolve spontaneously; they may require surgical removal if they cause significant problems.\n- **E. Advise him that he will require an urgent review with an Ear Nose Throat (ENT) surgeon due to the malignant potential of this condition:** This is incorrect and alarmist. Exostoses are **benign** bony growths with **no malignant potential**. Referral to ENT is considered for large, symptomatic exostoses causing recurrent infections or significant hearing loss, but it is not *urgent* and is certainly not due to cancer risk.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Otitis externa and otitis media]**: Australian guidelines for the management of common ear conditions, including prevention in high-risk groups. — https://www.racgp.org.au/afp/2017/may/otitis-externa-and-otitis-media\n- **[Therapeutic Guidelines (eTG) - Dermatology (Otitis externa)]**: Provides guidance on management and prevention of otitis externa, relevant to patients with exostoses. — https://tgldcdp.tg.org.au/etgaccess\n- **[Diving and Hyperbaric Medical Society (Australasia) - Guidelines]**: Often include advice on ear conditions related to water exposure, including exostoses. — https://www.dhms.org/guidelines.html", "image_path": ""}, {"id": 34996, "date": "2026-03-06T20:38:00+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 54-year-old woman presents to the emergency department with complaints of sudden onset vertigo, nausea, vomiting and hearing loss in her left ear. Vertigo provoked with changes in head position. On examination, her vitals are within the normal range. Hearing is decreased on the left side on whisper test. Rinne and Weber tests establish sensorineural deafness of the left ear. She has also nystagmus with the rapid eye to the left side. The rest of the examination is inconclusive. Which one of the following could be the most likely diagnosis?", "options": "A. Labyrinthitis\nB. Vestibular neuronitis\nC. Acoustic neuroma\nD. Meniere's disease\nE. Lateral medullary syndrome", "answer": "A. Labyrinthitis", "explanation": "### ✅ Correct Answer: A. Labyrinthitis\n\n**Clinical Reasoning:**\n1. **Key Features:** The patient presents with the classic triad of **acute vestibular syndrome**: vertigo, nausea/vomiting, and nystagmus. The critical distinguishing feature is **sensorineural hearing loss (SNHL)** in the affected ear.\n2. **Pathophysiology:** Labyrinthitis is inflammation of the inner ear labyrinth, typically viral (or less commonly bacterial), affecting both the vestibular (balance) and cochlear (hearing) components. This explains the concurrent vertigo and hearing loss.\n3. **Exam Findings:**\n   - **Provoked by head position:** Common in peripheral vestibular disorders.\n   - **Unilateral SNHL:** Confirmed by Rinne (positive on both sides, but louder on the right with Weber) and Weber (lateralizes to the right/contralateral ear), indicating left-sided cochlear nerve involvement.\n   - **Nystagmus:** The rapid phase is **towards the unaffected side** (leftward nystagmus suggests right-beating nystagmus, which is typical in acute left-sided peripheral lesions). The description \"rapid eye to the left side\" is ambiguous but typically means the fast component is leftward.\n4. **Timeline:** Sudden onset is characteristic of acute labyrinthitis.\n5. **Management Pearl:** Primarily supportive (anti-emetics, vestibular sedatives like promethazine). Differentiating from central causes (e.g., stroke) is crucial; the presence of hearing loss strongly points to a peripheral labyrinthine cause rather than a brainstem stroke.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vestibular neuronitis**: This involves inflammation of the vestibular nerve (CN VIII) but **spares the cochlear branch**. Therefore, it presents with severe vertigo, nausea, vomiting, and nystagmus but **NO hearing loss**. The presence of SNHL in this case rules out vestibular neuronitis.\n- **C. Acoustic neuroma**: This is a benign Schwann cell tumor of the vestibulocochlear nerve. It typically presents with **progressive, not sudden**, unilateral sensorineural hearing loss, often with tinnitus and imbalance. Vertigo is less common than unsteadiness. The acute onset in this case is not typical for a slow-growing tumor.\n- **D. Meniere's disease**: Characterized by a classic triad of **episodic** vertigo (lasting 20 minutes to several hours), **fluctuating** SNHL, tinnitus, and aural fullness. Attacks are recurrent, not a single sudden event. The hearing loss in Meniere's often fluctuates and is low-frequency initially, which doesn't perfectly match the acute, persistent presentation described.\n- **E. Lateral medullary syndrome (Wallenberg syndrome)**: This is a **central** cause of vertigo due to posterior inferior cerebellar artery (PICA) stroke. It presents with crossed sensory deficits (ipsilateral face, contralateral body), ipsilateral Horner's syndrome, ataxia, and dysphagia. Crucially, it **does not cause hearing loss** because the cochlear nuclei are located more rostrally in the brainstem. The absence of other brainstem signs and the presence of hearing loss make this unlikely.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (Neurology) – Vertigo**: Provides diagnostic criteria and management for acute vestibular syndromes, including labyrinthitis and vestibular neuronitis. — https://tgldcdp.tg.org.au/viewTopic?topicfile=vertigo&guidelineName=Neurology\n- **BMJ Best Practice – Labyrinthitis**: Outlines the clinical features, differential diagnosis, and evidence-based management of labyrinthitis. — https://bestpractice.bmj.com/topics/en-gb/3000225\n- **UpToDate – Evaluation of the patient with vertigo**: A comprehensive resource for differentiating peripheral vs. central causes of vertigo, emphasizing the importance of the HINTS exam in acute settings. — https://www.uptodate.com/contents/evaluation-of-the-patient-with-vertigo", "image_path": ""}, {"id": 35015, "date": "2026-03-07T04:27:59+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Young man HIT by a squash ball while playing, apart from headache which resolved by analgesic he complained of decreased in vision. On examination, his visual acuity was 6/12 in the left eye; right eye was 6/6 asking the most likely cause?", "options": "A. vitreous hemorrhage\nB. retinal detachment\nC. zygomatic fracture\nD. orbital floor fracture", "answer": "D. orbital floor fracture", "explanation": "### ✅ Correct Answer: D. orbital floor fracture\n\n**Clinical Reasoning:**\n1. **Mechanism of Injury:** A squash ball is a high-velocity projectile that can cause a 'blowout' fracture of the orbit. The sudden increase in intraorbital pressure from the impact forces the thin orbital floor (maxillary bone) to fracture, while the stronger orbital rim often remains intact.\n2. **Key Clinical Features:**\n   - **Unilateral visual acuity reduction (6/12 in left eye):** This is a hallmark of orbital floor fracture. The fracture can cause entrapment of the inferior rectus muscle or orbital fat, leading to diplopia and impaired vision. The inferior rectus muscle may become tethered, restricting upward gaze and causing vertical diplopia that worsens on upward gaze.\n   - **Delayed presentation:** The patient initially had headache that resolved with analgesics, then developed visual symptoms - this timeline is characteristic of orbital fractures where swelling and muscle entrapment may become more apparent after initial trauma.\n   - **Absence of other findings:** No mention of floaters/flashes (retinal detachment) or significant hyphema/vitreous hemorrhage.\n3. **Pathophysiology:** The orbital floor is the thinnest wall of the orbit. When a non-penetrating object strikes the eye, hydraulic pressure transmits through the orbital contents, causing the floor to fracture into the maxillary sinus. This can lead to:\n   - Enophthalmos (sunken eye)\n   - Infraorbital nerve anesthesia (numbness of cheek, upper lip, upper teeth)\n   - Diplopia with restricted upward gaze\n   - Possible muscle entrapment causing a 'trapdoor' fracture (more common in children)\n4. **Management Pearls for AMC:**\n   - **Immediate assessment:** CT orbit is the imaging modality of choice to confirm diagnosis and assess for muscle entrapment.\n   - **Surgical indications:** Significant enophthalmos (>2mm), persistent diplopia in primary gaze, large fracture (>50% of floor), or muscle entrapment with positive forced duction test.\n   - **Conservative management:** Small fractures without entrapment or significant enophthalmos can be managed with antibiotics (to prevent orbital cellulitis from sinus communication) and close follow-up.\n\n### ❌ Why the Other Options Are Wrong\n- **A. vitreous hemorrhage**: Typically presents with sudden painless vision loss, floaters, and reduced red reflex. More common in diabetic retinopathy, retinal tears, or trauma with direct globe injury. The mechanism here (squash ball) is more likely to cause orbital fracture than direct vitreous hemorrhage without other globe trauma signs.\n- **B. retinal detachment**: Presents with photopsia (flashing lights), floaters, and a curtain-like shadow across visual field. Usually not isolated to trauma from a squash ball without other signs of globe injury. The visual acuity reduction in retinal detachment is often more severe and progressive.\n- **C. zygomatic fracture**: Would typically cause trismus (difficulty opening mouth), flattening of cheek contour, and step deformity at infraorbital rim. While zygomatic fractures can involve the orbit, isolated orbital floor fracture is more specific to this mechanism. Zygomatic fractures usually cause more obvious facial deformity and malocclusion.\n\n### 📚 Relevant Guidelines\n- **Royal Australian and New Zealand College of Ophthalmologists (RANZCO)**: Clinical practice guidelines for orbital fractures including assessment, imaging, and indications for surgery — https://ranzco.edu\n- **Therapeutic Guidelines (eTG)**: Management of facial fractures including antibiotic prophylaxis for orbital floor fractures communicating with sinuses — https://tgldcdp.tg.org.au\n- **UpToDate**: Evaluation and management of orbital fractures, including the 'white-eyed blowout fracture' in children — https://www.uptodate.com/contents/orbital-fractures", "image_path": ""}, {"id": 35065, "date": "2026-03-10T01:01:39+00:00", "source_group": "AMC Part 1 general discussion by
