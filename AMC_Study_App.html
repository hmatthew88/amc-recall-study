    <script>
        const questionsData = [{"id": 34160, "date": "2026-01-20T13:51:31+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "### ✅ Correct Answer: A. Uterine rupture\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** The patient is a multiparous woman (gravida 3 para 2) in active labor, which is a classic risk factor for uterine rupture, especially if she has a history of prior cesarean section or uterine surgery (though not explicitly stated, multiparity itself is a risk).\n2.  **Pathognomonic Triad:** The scenario describes the classic triad of uterine rupture:\n    *   **Sudden, severe abdominal pain** with **abrupt cessation of contractions** (loss of uterine tone).\n    *   **Maternal hemodynamic instability** (hypotension, tachycardia) suggesting intra-abdominal bleeding.\n    *   **Fetal distress** (persistent bradycardia) and **change in fetal station** (presenting part no longer engaged), indicating the fetus has extruded into the abdominal cavity.\n3.  **Supporting Features:** The presence of only minimal vaginal bleeding is characteristic, as hemorrhage from a uterine rupture is often concealed intra-abdominally. This contrasts with placental abruption, which typically presents with significant, often painful, vaginal bleeding.\n4.  **Immediate Implication:** This is an obstetric emergency requiring immediate laparotomy for maternal resuscitation and delivery of the fetus.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding and sudden fetal bradycardia following rupture of fetal vessels, often at the time of membrane rupture. It does not cause cessation of contractions, severe maternal pain, or a change in fetal station.\n- **C. Amniotic fluid embolism**: Presents with sudden maternal cardiovascular collapse (dyspnea, hypoxia, hypotension, seizures, coagulopathy) and fetal distress, typically during or shortly after delivery. It is not associated with a change in fetal station or cessation of contractions due to loss of uterine integrity.\n- **D. Placental abruption**: Presents with painful, often dark vaginal bleeding, uterine tenderness/hypertonicity (\"woody\" or tetanic uterus), and fetal distress. Contractions typically continue or increase in frequency; the presenting part remains engaged.\n- **E. Cord prolapse**: Presents with variable or persistent fetal decelerations/bradycardia following rupture of membranes, often with a palpable cord on vaginal examination. It does not cause maternal hemodynamic instability, severe abdominal pain, or cessation of contractions.\n\n### 📚 Relevant Guidelines\n- **RANZCOG Management of Uterine Rupture (Statement C-Obs 43)**: Provides guidelines on risk factors, diagnosis, and management of uterine rupture in labour. — https://ranzcog.edu.au/statements-guidelines/obstetrics/uterine-rupture-(c-obs-43)\n- **Therapeutic Guidelines (eTG) – Obstetrics Emergencies**: Covers the acute management of major obstetric haemorrhage and emergencies including uterine rupture. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate – Uterine Rupture: Unscarred and Scarred Uterus**: Detailed review of pathogenesis, clinical features, diagnosis, and management. — https://www.uptodate.com/contents/uterine-rupture-unscarred-and-scarred-uterus", "image_path": ""}, {"id": 34161, "date": "2026-01-20T13:52:26+00:00", "stem": "**A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?**", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis", "explanation": "### ✅ Correct Answer: B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\n\n**Clinical Reasoning:**\n1.  **Step 1: Assess the Primary Disorder.**\n    *   pH 7.34 indicates acidaemia.\n    *   Bicarbonate (HCO3-) is low at 20 mEq/L (normal ~24), suggesting a metabolic acidosis.\n    *   PCO2 is 38 mm Hg (normal ~40). For a simple metabolic acidosis, the expected respiratory compensation is calculated by Winter's formula: **Expected PCO2 = (1.5 × HCO3-) + 8 ± 2**. Here, Expected PCO2 = (1.5 × 20) + 8 = 38 mm Hg. The measured PCO2 (38) matches the expected compensation *perfectly*. This initially suggests a simple metabolic acidosis with appropriate compensation.\n2.  **Step 2: Calculate the Anion Gap (AG).**\n    *   AG = Na - (Cl + HCO3) = 140 - (98 + 20) = **22 mEq/L** (normal ~8-12, or adjusted for albumin: normal AG = 2 × [albumin g/dL] = 2×3.0 = 6; so an AG of 22 is significantly elevated). This confirms a **High Anion Gap Metabolic Acidosis (HAGMA)**.\n3.  **Step 3: Apply the Delta-Delta (Δ/Δ) Ratio to Check for a Hidden Disorder.**\n    *   ΔAG = Measured AG - Normal AG = 22 - 12 = 10.\n    *   ΔHCO3 = Normal HCO3 - Measured HCO3 = 24 - 20 = 4.\n    *   **Δ/Δ Ratio = ΔAG / ΔHCO3 = 10 / 4 = 2.5.**\n    *   **Interpretation:** A ratio > 2 suggests the presence of a **concurrent metabolic alkalosis**. The high AG acidosis has lowered the HCO3, but the concurrent metabolic alkalosis is propping the HCO3 up higher than expected from the AG increase alone. If this were a simple HAGMA, the Δ/Δ ratio would be ~1-1.5.\n4.  **Step 4: Clinical Correlation.** The patient has CKD (predisposing to HAGMA from retained acids) and has had 3 days of vomiting (causing loss of gastric acid, leading to metabolic alkalosis). Dehydration from vomiting also worsens renal perfusion, exacerbating the HAGMA. This is a classic presentation of a mixed acid-base disorder.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis**: Incorrect. The PCO2 is not elevated (38 mm Hg); it is appropriately compensating for the metabolic acidosis. There is no primary respiratory acidosis.\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation**: Incorrect. The pH is acidic, not alkaline. A simple metabolic alkalosis would have a high HCO3 and an elevated PCO2 for compensation.\n- **D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation**: Incorrect. While the respiratory compensation is appropriate, the Δ/Δ ratio of 2.5 reveals a second, hidden metabolic alkalosis, making it a mixed disorder.\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis**: Incorrect. The PCO2 is not low; it is normal and appropriately compensating. There is no primary respiratory alkalosis (which would involve a low PCO2 driving the pH up).\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Acid-Base Disorders**: Provides a structured approach to diagnosing and managing acid-base disturbances in clinical practice. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate – Approach to the adult with metabolic acidosis**: Comprehensive review including anion gap, delta-delta, and clinical causes. — https://www.uptodate.com/contents/approach-to-the-adult-with-metabolic-acidosis\n- **KDIGO Clinical Practice Guideline for Chronic Kidney Disease**: Discusses metabolic complications of CKD, including metabolic acidosis. — https://kdigo.org/guidelines/ckd-evaluation-and-management/", "image_path": ""}, {"id": 34187, "date": "2026-01-22T12:46:55+00:00", "stem": "A 45-year-old male presented with sharp, burning, stabbing pain in the lateral aspect of the right foot. You suspect L5-S1 radiculopathy. Which of the following is lost in L5-S1 disc prolapse?", "options": "A. Knee jerk\nB. Dorsiflexion of big toe and foot\nC. Inversion of foot\nD. Eversion of foot\nE. Ankle jerk", "answer": "E. Ankle jerk", "explanation": "### ✅ Correct Answer: E. Ankle jerk\n\n**Clinical Reasoning:**\n- **L5-S1 Disc Prolapse:** Typically compresses the **S1 nerve root** (L5-S1 disc level affects the S1 nerve root as it exits below the L5 vertebra).\n- **S1 Nerve Root Function:**\n  - **Motor:** Plantar flexion of the foot (gastrocnemius, soleus) and eversion (peroneus longus and brevis).\n  - **Sensory:** Lateral foot and posterior calf (S1 dermatome).\n  - **Reflex:** **Ankle jerk (Achilles reflex)** – mediated by the S1 nerve root via the tibial nerve.\n- **Key Diagnostic Features:**\n  - Pain radiating to the **lateral foot** (S1 dermatome).\n  - Weakness in **plantar flexion** (difficulty standing on toes).\n  - **Reduced or absent ankle jerk** – a classic sign of S1 radiculopathy.\n- **Why Not L5?** L5 radiculopathy (e.g., L4-L5 disc) affects dorsiflexion (foot drop), big toe extension, and hip abduction, but **ankle jerk is preserved** (S1 intact).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Knee jerk**: Mediated by **L3-L4** nerve roots (patellar reflex). Not affected in L5-S1 pathology.\n- **B. Dorsiflexion of big toe and foot**: Primarily **L5** function (tibialis anterior, extensor hallucis longus). L5-S1 disc prolapse affects S1, not L5.\n- **C. Inversion of foot**: Mainly **L4** (tibialis posterior). Not a primary S1 function.\n- **D. Eversion of foot**: **S1** (peroneus longus and brevis) – this **is** affected in S1 radiculopathy, but the question asks for what is **lost**. While eversion weakness may occur, the **ankle jerk** is the most specific and consistently lost reflex in S1 compression. However, note that eversion is also partly L5/S1; the clearest answer is the reflex loss.\n\n### 📚 Relevant Guidelines\n- **[NICE Clinical Knowledge Summaries: Sciatica]** – Covers assessment and management of lumbar radiculopathy, including neurological examination findings for specific nerve roots. — https://cks.nice.org.uk/topics/sciatica/\n- **[Therapeutic Guidelines: Neurology]** – Provides evidence-based recommendations for the diagnosis and management of radiculopathy and disc prolapse. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etgcomplete\n- **[UpToDate: Lumbar spinal stenosis: Pathophysiology, clinical features, and diagnosis]** – Detailed review of nerve root anatomy, clinical features, and diagnostic evaluation. — https://www.uptodate.com/contents/lumbar-spinal-stenosis-pathophysiology-clinical-features-and-diagnosis", "image_path": ""}, {"id": 34188, "date": "2026-01-22T12:56:19+00:00", "stem": "After a left elbow injury, a 55-year-old man develops weakness of the long flexors of the right thumb and index finger. He is also unable to do forearm pronation on the same side. Which one of the nerves is involved?", "options": "A. Radial nerve\nB. Median nerve\nC. Anterior interosseous nerve\nD. Posterior interosseous nerve\nE. Ulnar nerve", "answer": "C. Anterior interosseous nerve", "explanation": "### ✅ Correct Answer: C. Anterior interosseous nerve\n\n**Clinical Reasoning:**\n- **Anatomy:** The **anterior interosseous nerve (AIN)** is a pure motor branch of the **median nerve** that arises in the forearm.\n- **Functions of AIN:**\n  - **Flexor pollicis longus (FPL):** Flexes the interphalangeal joint of the thumb.\n  - **Flexor digitorum profundus (FDP) to index (and sometimes middle) finger:** Flexes the distal interphalangeal joints.\n  - **Pronator quadratus:** Primary muscle for forearm pronation (especially with elbow flexed).\n- **Clinical Presentation (AIN Syndrome):**\n  - **Weakness of thumb and index finger flexion:** Inability to make an \"OK\" sign (forms a triangle instead – **pinch deformity**).\n  - **Weakness of forearm pronation:** Especially with elbow flexed (pronator teres, innervated by main median nerve, is intact for pronation with elbow extended).\n  - **No sensory loss:** AIN is purely motor.\n- **Mechanism:** Often due to trauma (e.g., elbow injury), compression, or idiopathic neuritis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Radial nerve**: Innervates **extensors** of the wrist, fingers, and thumb (wrist drop). No role in finger flexion or pronation.\n- **B. Median nerve (main branch)**: Innervates pronator teres, FCR, palmaris longus, and thenar muscles. AIN is a branch of the median nerve. **Proximal median nerve injury** would cause **sensory loss** (palmar aspect of thumb, index, middle, and radial half of ring finger) and thenar weakness (opposition), which are **not** described here.\n- **D. Posterior interosseous nerve**: Branch of the radial nerve. Innervates **extensors** of the wrist and fingers (except ECRL). Causes **finger and wrist extension weakness**, not flexion or pronation.\n- **E. Ulnar nerve**: Innervates FDP to ring and little fingers, intrinsic hand muscles (claw hand). Causes **sensory loss** in ulnar 1.5 fingers and weakness of adduction/abduction of fingers. Does not affect thumb/index flexion or pronation.\n\n### 📚 Relevant Guidelines\n- **[American Academy of Orthopaedic Surgeons: Nerve Injuries About the Elbow]** – Reviews anatomy, diagnosis, and management of peripheral nerve injuries around the elbow. — https://www.aaos.org/quality/clinical-practice-guidelines/\n- **[UpToDate: Anterior interosseous neuropathy]** – Detailed discussion of AIN syndrome, including etiology, clinical features, and treatment. — https://www.uptodate.com/contents/anterior-interosseous-neuropathy\n- **[BMJ Best Practice: Peripheral nerve injuries]** – Provides a structured approach to diagnosis and management of nerve injuries. — https://bestpractice.bmj.com/topics/en-gb/1201", "image_path": ""}, {"id": 34189, "date": "2026-01-22T12:57:17+00:00", "stem": "You are working as a resident medical officer at a local children hospital in Adelaide. You are seeing a 1-week old baby for complete neonatal examination. All the physical examination is unremarkable except the following findings:\n– The knees were at different heights when the hips and knees were flexed.\n– Asymmetric skin folds and limited abduction of the affected hip were also seen.\nWhat is the most likely diagnosis?", "options": "A. Osgood-Schlatter disease\nB. Slipped capital femoral epiphysis\nC. Developmental dysplasia of the hip\nD. Femoral head fracture\nE. Legg-Calve-Perthes disease", "answer": "C. Developmental dysplasia of the hip", "explanation": "### ✅ Correct Answer: C. Developmental dysplasia of the hip\n\n**Clinical Reasoning:**\n- **Developmental Dysplasia of the Hip (DDH):** Spectrum of abnormal development of the hip joint, ranging from laxity to complete dislocation.\n- **Key Examination Findings in Neonates/Infants:**\n  - **Galeazzi Sign (Allis Sign):** With hips and knees flexed, the knees are at **different heights** – shorter on the affected side due to posterior displacement of the femoral head.\n  - **Asymmetric skin folds:** Thigh or gluteal folds.\n  - **Limited hip abduction:** Especially when hip is flexed (Barlow and Ortolani maneuvers are for reducible/dislocatable hips in newborns; limited abduction is a later sign of established dislocation).\n  - **Ortolani (\"clunk\" of reduction) and Barlow (dislocation) maneuvers** are the primary tests in newborns.\n- **Epidemiology:** More common in females, breech presentation, family history.\n- **Timing:** This presentation at **1 week** is classic for DDH detected on routine neonatal examination.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Osgood-Schlatter disease**: An **overuse injury** (traction apophysitis of tibial tubercle) in **adolescents** (10-15 years). Presents with knee pain and swelling. Not seen in neonates.\n- **B. Slipped capital femoral epiphysis (SCFE)**: Occurs in **adolescents** (often obese), presenting with hip/knee pain and **limping**. The femoral head slips posteriorly and inferiorly. Not a neonatal condition.\n- **D. Femoral head fracture**: Would present with acute pain, swelling, and inability to move the limb following **significant trauma** (e.g., birth trauma, which is rare). Not consistent with isolated examination findings in a well neonate.\n- **E. Legg-Calve-Perthes disease**: **Avascular necrosis** of the femoral head in **children** (4-8 years). Presents with insidious hip pain, limping, and limited internal rotation. Not a neonatal condition.\n\n### 📚 Relevant Guidelines\n- **[RACP: Position Statement: Developmental Dysplasia of the Hip]** – Australian guidelines for early detection and management of DDH. — https://www.racp.edu.au/docs/default-source/advocacy-library/developmental-dysplasia-of-the-hip-position-statement.pdf\n- **[RCH Melbourne Clinical Practice Guideline: Developmental Dysplasia of the Hip]** – Detailed assessment and management algorithm for DDH. — https://www.rch.org.au/clinicalguide/guideline_index/Developmental_dysplasia_of_the_hip_DDH/\n- **[UpToDate: Developmental dysplasia of the hip: Clinical features and diagnosis]** – Comprehensive review of epidemiology, risk factors, and examination findings. — https://www.uptodate.com/contents/developmental-dysplasia-of-the-hip-clinical-features-and-diagnosis", "image_path": ""}, {"id": 34190, "date": "2026-01-22T12:57:37+00:00", "stem": "Three months ago you started Mary, aged 73, on residronate 35mg weekly, after she was diagnosed with osteoporosis confirmed with bone mineral density (BMD). Her presenting symptom at that time was back pain. Examination revealed height decrease and mild kyphosis, as well as tenderness over thoracic vertebrae. Despite being on residronate, not only did her symptoms persist, she also developed pain over new areas of her thoracic. Investigations have established new osteoporotic fractures. Which one of the following would be the most appropriate management option for her?", "options": "A. Continue residronate at the same dose\nB. Switch to alendronate\nC. Increase the dose of residronate\nD. Switch to zoledronic acid\nE. Switch to teriparatide", "answer": "E. Switch to teriparatide", "explanation": "### ✅ Correct Answer: E. Switch to teriparatide\n\n**Clinical Reasoning:**\n- **Scenario:** Elderly woman with **established osteoporosis** (baseline fractures, height loss, kyphosis) who has **suffered new vertebral fractures** while on **first-line oral bisphosphonate (risedronate)** for 3 months.\n- **Treatment Failure:** Bisphosphonates (like risedronate, alendronate, zoledronic acid) are **antiresorptive** agents. They reduce bone loss but have limited ability to **rebuild bone**. **New fractures while on therapy** indicate **inadequate response or treatment failure**.\n- **Teriparatide (recombinant PTH):**\n  - **Anabolic agent:** Stimulates **new bone formation**, significantly increasing bone density and improving bone microarchitecture.\n  - **Indication:** First-line for **severe osteoporosis** (multiple fractures, very low BMD) or **patients who fail or cannot tolerate bisphosphonates**.\n  - **Efficacy:** Superior to bisphosphonates in reducing vertebral and non-vertebral fracture risk in high-risk patients.\n  - **Duration:** Limited to 18-24 months due to osteosarcoma risk (rodent studies).\n- **Why Not Another Bisphosphonate?** Switching to another bisphosphonate (alendronate or IV zoledronic acid) is unlikely to be effective if she has already failed one. Zoledronic acid is more potent but still antiresorptive.\n- **Monitoring:** Ensure adequate calcium/vitamin D intake. Consider transition to an antiresorptive (e.g., bisphosphonate or denosumab) after teriparatide course to maintain gains.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Continue residronate at the same dose**: The patient has **clearly failed** this therapy (new fractures). Continuing is inappropriate.\n- **B. Switch to alendronate**: Both are **oral bisphosphonates** with similar mechanisms. Switching within the same drug class after treatment failure is not recommended; anabolic therapy is preferred.\n- **C. Increase the dose of residronate**: Standard weekly dose (35mg) is already optimal. There is no evidence that dose escalation improves fracture prevention in non-responders.\n- **D. Switch to zoledronic acid**: A more potent **IV bisphosphonate**, but still an **antiresorptive**. While sometimes used after oral bisphosphonate failure, **teriparatide is superior for bone formation** in patients with multiple fractures and is the guideline-recommended next step for severe cases.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Endocrinology - Osteoporosis]** – Australian evidence-based recommendations for osteoporosis management, including treatment algorithms for treatment failure. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Endocrinology&frompage=etgcomplete\n- **[RACGP: Osteoporosis prevention, diagnosis and management in postmenopausal women and men over 50 years of age]** – Practical Australian guidelines for GPs. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/osteoporosis\n- **[UpToDate: Treatment of osteoporosis in postmenopausal women]** – Detailed discussion of treatment options, including anabolic therapy for high-risk patients. — https://www.uptodate.com/contents/treatment-of-osteoporosis-in-postmenopausal-women", "image_path": ""}, {"id": 34211, "date": "2026-01-23T13:24:33+00:00", "stem": "A 32-year-old woman is brought to the hospital due to sudden-onset left-sided weakness. According to the family, she has had fatigue, malaise, and decreased appetite over the last several weeks. She attributed these symptoms to a “viral infection” and treated herself with over-the-counter acetaminophen. Her temperature is 37.4 C (99.4 F), blood pressure is 140/86 mm Hg, and pulse is 82/min. The patient appears confused and agitated. Lungs are clear to auscultation. A 2/6 holosystolic murmur is heard at the cardiac apex. Extremity examination reveals left-sided muscle strength is 1/5 with hyperactive deep tendon reflexes. Babinski sign is present on the left side. Laboratory results are as follows:\n\nHemoglobin 10.2 g/dL\nPlatelets 64,000/mm3\nLeukocytes 6,800/mm3\nBlood urea nitrogen 18 mg/dL\nCreatinine 70 umol/L\nAntinuclear antibody (ANA) positive\nRapid plasma reagin (RPR) positive\nCerebrospinal fluid cell counts are normal, and cultures are negative. Which of the following is the most likely diagnosis in this patient?", "options": "A. Antiphospholipid syndrome\nB. Multiple sclerosis\nC. Neurosyphilis\nD. Polyarteritis nodosa\nE. Rheumatic fever", "answer": "C. Neurosyphilis", "explanation": "### ✅ Correct Answer: C. Neurosyphilis\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** The patient presents with a **sudden-onset focal neurological deficit** (left-sided weakness, hyperreflexia, Babinski sign) consistent with an ischemic stroke. This is a classic manifestation of **meningovascular syphilis**, a form of neurosyphilis where *Treponema pallidum* infection causes endarteritis obliterans, leading to vessel inflammation, thrombosis, and stroke, particularly in young adults.\n2.  **Supporting Systemic & Lab Findings:**\n    *   **Constitutional Symptoms:** Weeks of fatigue, malaise, and anorexia suggest a chronic systemic infection.\n    *   **Cardiac Finding:** The holosystolic murmur (likely mitral regurgitation) is a known complication of tertiary syphilis causing **syphilitic aortitis**, which can lead to aortic root dilation and valve incompetence.\n    *   **Haematological Findings:** Mild anemia (Hb 10.2) and thrombocytopenia (Plt 64,000) can be seen in chronic infections like syphilis.\n    *   **Serology:** A positive **Rapid Plasma Reagin (RPR)** is a non-treponemal test highly suggestive of active or past syphilis infection. The positive ANA is a non-specific finding that can be seen in many conditions, including infections, and does not override the specific RPR result.\n    *   **CSF Findings:** Normal cell counts and negative cultures help rule out acute bacterial meningitis or viral encephalitis, which is consistent with the chronic, vasculitic process of meningovascular syphilis.\n3.  **Pathophysiology:** *Treponema pallidum* invades the central nervous system early. In the tertiary stage (years later), it can cause a proliferative endarteritis affecting medium and large vessels (Huebner's arteritis), leading to ischemic stroke. The combination of stroke in a young person, systemic symptoms, cardiac murmur, and positive syphilis serology is highly characteristic.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Antiphospholipid syndrome (APS):** While APS is a major cause of stroke in young adults and can cause thrombocytopenia, it lacks the specific systemic clues present here. APS is not associated with a holosystolic murmur from aortitis or a positive RPR. Diagnosis requires specific antiphospholipid antibodies (lupus anticoagulant, anticardiolipin, anti-β2-glycoprotein I).\n- **B. Multiple sclerosis (MS):** MS typically presents with relapsing-remitting neurological symptoms (e.g., optic neuritis, sensory deficits, internuclear ophthalmoplegia) over time, not a single, sudden, devastating stroke-like event. MS does not cause systemic symptoms like fever, cardiac murmurs, or positive syphilis serology.\n- **D. Polyarteritis nodosa (PAN):** PAN is a systemic vasculitis affecting medium-sized arteries. It can cause stroke, fever, malaise, and mononeuritis multiplex. However, it is strongly associated with **hepatitis B virus infection**, not syphilis. Typical findings include hypertension (from renal artery involvement), skin lesions (livedo reticularis, nodules), and mesenteric ischemia. Cardiac involvement in PAN is usually coronary arteritis, not valvular disease. A positive RPR is not diagnostic for PAN.\n- **E. Rheumatic fever:** This is a post-streptococcal condition that can cause **carditis** (leading to mitral regurgitation murmurs) and **Sydenham's chorea** (a neurological movement disorder). However, it does not cause focal stroke syndromes or positive syphilis serology. The neurological manifestation of rheumatic fever is chorea, not hemiparesis with upper motor neuron signs.\n\n### 📚 Relevant Guidelines\n- **Australian STI Management Guidelines (University of Sydney)**: Provide comprehensive guidance on the diagnosis, staging, and management of syphilis, including neurosyphilis. — [https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/](https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/)\n- **Therapeutic Guidelines: Antibiotic (eTG)**: Contains detailed recommendations for the antibiotic treatment of all stages of syphilis, including specific regimens for neurosyphilis (e.g., high-dose intravenous penicillin G). — [https://tgldcdp.tg.org.au/etgaccess](https://tgldcdp.tg.org.au/etgaccess)\n- **World Health Organization (WHO) - Guidelines for the treatment of Treponema pallidum (syphilis)**: International evidence-based treatment guidelines. — [https://www.who.int/publications/i/item/9789241550096](https://www.who.int/publications/i/item/9789241550096)", "image_path": ""}, {"id": 34248, "date": "2026-01-26T09:42:53+00:00", "stem": "Identify the nerve injury based on the clinical description.", "options": "A. Wrist drop\nB. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger\nC. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\nD. Branch of radial nerve, purely motor; for wrist, finger and thumb extension\nE. Injury causes claw hand, decreased finger abduction and sensory loss of little finger", "answer": "C", "explanation": "### ✅ Correct Answer: C. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\n\nThis option accurately describes the **Anterior Interosseous Nerve (AIN)**, a purely motor branch of the median nerve. Injury to the AIN results in the inability to perform the 'OK' sign (or 'pinch' sign) due to paralysis of the flexor pollicis longus (FPL) and flexor digorium profundus (FDP) to the index finger. Weakness in pronation occurs due to involvement of the pronator quadratus. This is a classic 'purely motor' median nerve palsy with no sensory loss, distinguishing it from a main median nerve injury (e.g., carpal tunnel syndrome).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Wrist drop**: This is characteristic of **radial nerve injury** (e.g., Saturday night palsy, humeral shaft fracture). It affects wrist, finger, and thumb extensors, not a branch of the median nerve.\n- **B. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger**: This describes a **main median nerve injury at the wrist** (e.g., carpal tunnel syndrome). Thumb opposition weakness is due to thenar muscle (abductor pollicis brevis, opponens pollicis) involvement. The sensory loss pattern (palmar aspect of thumb, index, middle, and lateral half of ring finger) is classic for median nerve distribution. This option includes sensory loss, whereas the correct answer specifies a *purely motor* branch.\n- **D. Branch of radial nerve, purely motor; for wrist, finger and thumb extension**: This describes the **Posterior Interosseous Nerve (PIN)**, a purely motor branch of the radial nerve. Injury causes finger and thumb extension weakness but spares wrist extension (radial nerve proper innervates extensor carpi radialis longus/brevis). This is not a median nerve branch.\n- **E. Injury causes claw hand, decreased finger abduction and sensory loss of little finger**: This describes an **ulnar nerve injury** (e.g., at the elbow - cubital tunnel syndrome). The 'claw hand' (hyperextension at MCP joints, flexion at IP joints) is due to loss of intrinsic muscle function. Sensory loss involves the little finger and medial half of the ring finger.\n\n### 📚 Relevant Guidelines\n- **[eTG Complete - Musculoskeletal]**: Provides detailed descriptions of peripheral nerve injuries, examination, and management — https://tgldcdp.tg.org.au/etgcomplete\n- **[UpToDate - Overview of Upper Extremity Peripheral Nerve Syndromes]**: Comprehensive review of anatomy, clinical features, and diagnosis of nerve injuries including anterior interosseous nerve syndrome — https://www.uptodate.com/contents/overview-of-upper-extremity-peripheral-nerve-syndromes\n- **[RANZCR - Clinical Radiology Guidelines]**: For imaging (MRI, ultrasound) in suspected nerve entrapment or injury — https://www.ranzcr.com/college/document-library/clinical-radiology-guidelines", "image_path": ""}, {"id": 34282, "date": "2026-01-29T06:43:15+00:00", "stem": "A 34-year-old multigravida presents for prenatal care in the second trimester. She admits to a past history of substance abuse but states she has been clean for 6 months. With her second pregnancy she experienced a preterm delivery at 34 weeks' gestation of a male neonate who died within the first day of life. She states that at delivery the baby was swollen with skin lesions and that the placenta was very large. She was treated with antibiotics but she does not remember the name or other details. On a routine prenatal panel with this current pregnancy she is found to have a positive VDRL (Venereal Disease Research Laboratory) test. What is the recommended mode of delivery?", "options": "a. Vaginal\nb. Cesarean\nc. Forcep assisted\nd. Vacuum assisted", "answer": "a. Vaginal", "explanation": "### ✅ Correct Answer: a. Vaginal\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The patient has a positive VDRL test, indicating syphilis. The history of a previous pregnancy with a stillborn, hydropic (swollen) neonate, skin lesions, and a large placenta is classic for **congenital syphilis**. This confirms she has had untreated syphilis in the past.\n2.  **Key Principle:** The primary goal in managing syphilis in pregnancy is to **prevent congenital transmission to the fetus**. Transmission occurs transplacentally, primarily during the second and third trimesters, and is related to maternal spirochetemia.\n3.  **Mode of Delivery:** **Cesarean delivery is NOT indicated solely for maternal syphilis.** The route of transmission is hematogenous (via the placenta), not via contact with the birth canal during delivery. Therefore, performing a cesarean section does not reduce the risk of fetal infection if the mother has not been treated.\n4.  **Management Priority:** The critical intervention is **prompt maternal treatment with penicillin** (benzathine penicillin G), which is highly effective at curing the mother and preventing fetal infection. The recommended mode of delivery should be based on standard obstetric indications (e.g., fetal distress, failure to progress), not the presence of syphilis.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Cesarean**: This is incorrect because syphilis is transmitted transplacentally, not during passage through the birth canal. A cesarean section does not prevent congenital syphilis if the mother is untreated. It is only indicated for standard obstetric reasons.\n- **c. Forcep assisted**: This is an operative vaginal delivery technique. Like a cesarean, it is not indicated for the management of maternal syphilis. Its use is determined by factors like prolonged second stage or fetal compromise, not infectious disease status.\n- **d. Vacuum assisted**: This is another operative vaginal delivery method. It shares the same reasoning as forceps; it is not a recommended intervention specifically for syphilis and should be used based on standard obstetric criteria.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (Antibiotic) – Syphilis**: Provides detailed recommendations for the diagnosis and treatment of syphilis in adults, including specific regimens for pregnant women. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etgcomplete\n- **Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) – Prenatal Screening**: While not a specific syphilis guideline, RANZCOG endorses routine antenatal screening for syphilis and other infections, with management following Therapeutic Guidelines. — https://ranzcog.edu.au/womens-health/patient-information-resources\n- **Centers for Disease Control and Prevention (CDC) – Sexually Transmitted Infections Treatment Guidelines**: An internationally respected source with clear guidance that cesarean delivery is not indicated for syphilis. — https://www.cdc.gov/std/treatment-guidelines/syphilis.htm", "image_path": ""}, {"id": 34283, "date": "2026-01-29T06:44:14+00:00", "stem": "A 58-year-old man presents with complaint of progressive difficulty in walking for the past few months. He denies any pain or pins and needles. On examinations, he drags his left foot while walking. On the left side, ankle tendon reflexes are exaggerated, the strength of plantar flexion and dorsifiexion are decreased and are 4/5. Sensation is intact. The right foot is completely normal. Plantar reflexes are equivocal bilaterally. The rest of physical examination including neurologic exam of the face and upper extremities are unremarkable. Lesions of which one of the following parts could be the mostly likely cause to this presentation?", "options": "A. Common peroneal nerve\nB. LS/51 nerve root\nC. Cervical spine\nD. Brainstem\nE. Cerebral cortex", "answer": "C. Cervical spine", "explanation": "### ✅ Correct Answer: C. Cervical spine\n\n**Clinical Reasoning:**\n1.  **Localising the Lesion:** The patient has a **left-sided lower motor neuron (LMN) foot drop** (weak dorsiflexion and plantar flexion, foot drag) combined with **upper motor neuron (UMN) signs** in the same limb (exaggerated ankle reflexes). Sensation is intact.\n2.  **Key Neurological Principle:** This combination of **ipsilateral UMN and LMN signs in the same limb** is classic for a **spinal cord lesion** affecting the **corticospinal tract** (causing UMN signs) and the **ventral horn cells or nerve roots** at the same level (causing LMN signs). This is known as a \"**myeloradiculopathy**.\"\n3.  **Why Cervical Spine?**\n    - **Cervical Myelopathy:** A cervical spinal cord compression (e.g., from spondylosis, disc herniation) can cause UMN signs in the legs (spasticity, hyperreflexia).\n    - **Concomitant Radiculopathy:** If the compression also affects the **C8 or T1 nerve roots** (which contribute to the lower trunk of the brachial plexus and ultimately the ulnar nerve), it can cause LMN weakness in the intrinsic hand muscles. However, the question states the upper extremities are unremarkable. More relevantly, a cervical lesion affecting the **cord itself** can impinge on the **anterior horn cells** supplying the leg, causing an LMN pattern weakness at that level, though this is less common than a pure radiculopathy. The exam finding of combined UMN/LMN in one leg strongly points to a spinal cord process.\n    - **Excluding Other Options:** The intact sensation argues against a pure nerve root or peripheral nerve lesion (which typically have sensory deficits). The unilateral, focal nature argues against a diffuse cerebral cortex process.\n4.  **Final Localisation:** The most likely single lesion explaining **ipsilateral UMN and LMN signs in one lower limb** is within the **cervical spinal cord**, affecting the descending corticospinal tracts and the anterior horn cells or exiting nerve roots at that level.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Common peroneal nerve**: A common peroneal nerve palsy causes a **pure LMN foot drop** (weakness of dorsiflexion and eversion) with sensory loss on the dorsum of the foot and lateral calf. It does **not** cause exaggerated reflexes (UMN signs).\n- **B. LS/51 nerve root**: An L5 or S1 radiculopathy (e.g., from a herniated disc) typically causes **LMN weakness** in specific muscle groups (e.g., L5: foot dorsiflexion; S1: plantar flexion), **sensory loss** in a dermatomal pattern, and **pain**. It would cause **diminished or absent reflexes** (ankle jerk for S1), not exaggerated ones.\n- **D. Brainstem**: Brainstem lesions can cause \"crossed signs\" (e.g., ipsilateral cranial nerve deficits with contralateral body weakness/sensory loss). This patient has no cranial nerve or upper limb findings, making a brainstem lesion unlikely.\n- **E. Cerebral cortex**: A lesion in the motor cortex (e.g., stroke, tumor) would cause a **contralateral** UMN hemiparesis (affecting face, arm, and leg to varying degrees). It would not cause an isolated LMN foot drop with ipsilateral UMN signs. The findings would be purely UMN, not a mix of UMN and LMN.\n\n### 📚 Relevant Guidelines\n- **UpToDate – Evaluation of the patient with weakness**: Provides a systematic framework for localising neurological lesions based on clinical findings, including the distinction between UMN, LMN, and spinal cord syndromes. — https://www.uptodate.com/contents/approach-to-the-patient-with-muscle-weakness\n- **BMJ Best Practice – Cervical Spondylosis**: Details the presentation of cervical myelopathy and radiculopathy, which can present with mixed UMN and LMN signs. — https://bestpractice.bmj.com/topics/en-gb/462\n- **Neurological Society of Australasia**: While not a single guideline, resources and position statements on the management of common spinal disorders align with this clinical reasoning. — https://www.neurosociety.com.au/", "image_path": ""}, {"id": 34304, "date": "2026-01-30T07:40:42+00:00", "stem": "A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "D", "explanation": "### ✅ Correct Answer: D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\n\n**Step-by-step clinical reasoning:**\n\n1. **Primary disorder identification:**\n   - pH 7.34 indicates acidemia (normal 7.35-7.45)\n   - Bicarbonate 20 mEq/L is low (normal 22-28), indicating metabolic acidosis\n   - PCO2 38 mm Hg is within normal range (35-45)\n\n2. **Anion gap calculation:**\n   - Anion Gap = Na - (Cl + HCO3) = 140 - (98 + 20) = 22 mEq/L\n   - Normal anion gap is 8-12 mEq/L (or up to 16 with correction for albumin)\n   - Albumin correction: For every 1 g/dL decrease in albumin below 4.0, add 2.5 to the anion gap\n   - Corrected AG = 22 + (2.5 × (4.0-3.0)) = 24.5 mEq/L\n   - This confirms a high anion gap metabolic acidosis (HAGMA)\n\n3. **Compensation assessment:**\n   - For metabolic acidosis, expected respiratory compensation: PCO2 = (1.5 × HCO3) + 8 ± 2\n   - Expected PCO2 = (1.5 × 20) + 8 = 38 mm Hg\n   - Measured PCO2 is 38 mm Hg, indicating appropriate respiratory compensation\n\n4. **Delta-delta gap analysis:**\n   - Delta gap = (Measured AG - Normal AG) / (Normal HCO3 - Measured HCO3)\n   - Normal AG = 12 (using mid-range), Normal HCO3 = 24\n   - Delta gap = (22 - 12) / (24 - 20) = 10 / 4 = 2.5\n   - Delta gap > 2 suggests pure HAGMA without metabolic alkalosis\n   - Alternative: Change in AG (ΔAG = 10) ≈ Change in HCO3 (ΔHCO3 = 4), suggesting pure HAGMA\n\n5. **Clinical correlation:**\n   - Patient has stage 4 CKD (creatinine 4.5 mg/dL) with dehydration\n   - Uremic acidosis is a common cause of HAGMA in CKD\n   - Nausea/vomiting could theoretically cause metabolic alkalosis, but the dominant acid-base disturbance here is HAGMA\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis**: Incorrect because PCO2 is normal (38 mm Hg), not elevated. Respiratory acidosis requires PCO2 > 45 mm Hg.\n- **B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis**: Incorrect because delta-delta gap analysis doesn't support a concomitant metabolic alkalosis. The bicarbonate is low (20), not elevated.\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation**: Incorrect because pH is acidic (7.34), not alkaline. Metabolic alkalosis would have pH > 7.45 and elevated bicarbonate.\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis**: Incorrect because PCO2 is normal (38 mm Hg), not low. Respiratory alkalosis requires PCO2 < 35 mm Hg.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) — Acid-base disorders**: Provides comprehensive approach to diagnosing and managing acid-base disturbances in clinical practice — https://tgldcdp.tg.org.au/viewTopic?topicfile=acid-base-disorders\n- **Kidney Health Australia — Chronic Kidney Disease Management**: Guidelines for managing metabolic complications of CKD including metabolic acidosis — https://kidney.org.au/cms_uploads/docs/ckd-management-in-general-practice-handbook.pdf\n- **UpToDate — Approach to the adult with metabolic acidosis**: Evidence-based clinical decision support for acid-base disorder evaluation — https://www.uptodate.com/contents/approach-to-the-adult-with-metabolic-acidosis", "image_path": ""}, {"id": 34308, "date": "2026-01-30T13:02:48+00:00", "stem": "A 45-year-old woman presents to the emergency department with a 2-day history of leg pain and swelling following what she describes as \"a small scratch\" from gardening. On examination, there is mild erythema and tenderness over the anterior shin with minimal induration. Vital signs are BP, 135/82; P, 88; T, 37.9°C (100.2°F). Point-of-care ultrasound of the affected area is performed. Which of the following ultrasound findings is most concerning and requires immediate surgical consultation?", "options": "A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\nB. Hypoechoic strands between subcutaneous fat tissue\nC. Hyperechoic linear structure with multiple parallel reverberation artifacts\nD. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues\nE. Noncompressible hypoechoic tubular structure in the deep posterior compartment", "answer": "A", "explanation": "### ✅ Correct Answer: A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\n\n**Step-by-step clinical reasoning:**\n\n1. **Clinical context:**\n   - Gardening injury → potential for soil contamination with Clostridium or other gas-producing organisms\n   - Leg pain/swelling with erythema and low-grade fever → possible necrotizing fasciitis\n   - Vital signs show tachycardia (HR 88) and mild fever (37.9°C)\n\n2. **Ultrasound findings interpretation:**\n   - **Option A:** \"Highly echogenic areas with posterior acoustic shadowing in the fascial planes\"\n     - This describes **gas in tissues** (subcutaneous emphysema)\n     - Gas appears hyperechoic (bright) with \"dirty shadowing\" or reverberation artifacts\n     - Gas in fascial planes is a hallmark of necrotizing fasciitis\n     - Requires immediate surgical consultation for debridement\n\n3. **Why this is most concerning:**\n   - Necrotizing fasciitis is a surgical emergency with high mortality\n   - Gas in tissues suggests infection with gas-producing organisms (Clostridium perfringens, mixed aerobes/anaerobes)\n   - Early surgical intervention is critical for survival\n   - The LRINEC score (Laboratory Risk Indicator for Necrotizing Fasciitis) would be high with this finding\n\n4. **Management implications:**\n   - Immediate broad-spectrum antibiotics (covering MRSA, gram-negatives, anaerobes)\n   - Urgent surgical consultation for exploration and debridement\n   - ICU admission likely required\n\n### ❌ Why the Other Options Are Wrong\n- **B. Hypoechoic strands between subcutaneous fat tissue**: This describes **cellulitis** - hypoechoic strands represent edema and inflammation in subcutaneous tissue. Concerning but not an immediate surgical emergency.\n- **C. Hyperechoic linear structure with multiple parallel reverberation artifacts**: This describes a **foreign body** (e.g., wood splinter, glass). Requires removal but not immediately life-threatening unless causing vascular compromise.\n- **D. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues**: This describes **abscess formation** - anechoic = fluid collection, posterior enhancement = through transmission. Requires drainage but not an immediate surgical emergency for necrotizing infection.\n- **E. Noncompressible hypoechoic tubular structure in the deep posterior compartment**: This describes **deep vein thrombosis (DVT)**. Hypoechoic = blood clot, noncompressible = positive for DVT. Requires anticoagulation but not surgical emergency unless phlegmasia cerulea dolens.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) — Skin and soft tissue infections**: Guidelines for management of cellulitis, abscesses, and necrotizing fasciitis — https://tgldcdp.tg.org.au/viewTopic?topicfile=skin-soft-tissue-infections\n- **Australian Commission on Safety and Quality in Health Care — Management of Necrotizing Fasciitis**: Clinical care standard for early recognition and management — https://www.safetyandquality.gov.au/standards/clinical-care-standards/necrotising-fasciitis-clinical-care-standard\n- **UpToDate — Necrotizing soft tissue infections**: Comprehensive review of diagnosis and management — https://www.uptodate.com/contents/necrotizing-soft-tissue-infections", "image_path": ""}, {"id": 34310, "date": "2026-01-30T13:41:32+00:00", "stem": "A 28-year-old man presents with altered mental status and vomiting after falling from a ladder. Vital signs are BP, 100/65; P, 55. His Glasgow Coma Scale score is 8. Neurological examination reveals anisocoria with sluggish pupillary responses. He requires emergency intubation for airway protection. Which induction agent is most appropriate?", "options": "A. Fentanyl\nB. Propofol\nC. Ketamine\nD. Etomidate\nE. Midazolam", "answer": "C", "explanation": "### ✅ Correct Answer: C. Ketamine\n\n**Step-by-step clinical reasoning:**\n\n1. **Clinical scenario analysis:**\n   - Head trauma from fall → likely traumatic brain injury (TBI)\n   - GCS 8 → severe brain injury (GCS ≤ 8 = coma)\n   - Anisocoria with sluggish pupils → possible uncal herniation or raised ICP\n   - Bradycardia (HR 55) with hypotension (BP 100/65) → Cushing's triad component (bradycardia + hypertension is classic, but hypotension can occur in severe cases)\n\n2. **Goals for induction in TBI:**\n   - Maintain cerebral perfusion pressure (CPP = MAP - ICP)\n   - Avoid agents that increase intracranial pressure (ICP)\n   - Provide hemodynamic stability (avoid hypotension)\n   - Provide adequate sedation and analgesia to prevent coughing/gagging during intubation\n\n3. **Why ketamine is optimal:**\n   - **Hemodynamic stability:** Ketamine causes sympathetic stimulation → increases heart rate and blood pressure\n   - **Maintains CPP:** By increasing MAP without significantly increasing ICP in ventilated patients\n   - **Recent evidence:** Traditional teaching that ketamine increases ICP has been challenged; multiple studies show it's safe in TBI when used with proper ventilation\n   - **Analgesic properties:** Provides both sedation and analgesia\n   - **Bronchodilation:** Beneficial if there's concomitant chest trauma\n\n4. **Comparison with other agents:**\n   - **Etomidate:** Causes adrenal suppression → problematic in critical illness\n   - **Propofol:** Causes significant vasodilation and hypotension → reduces CPP dangerously\n   - **Midazolam:** Slow onset, can cause hypotension\n   - **Fentanyl:** Pure opioid → minimal sedation, can cause hypotension and bradycardia\n\n5. **Supporting evidence:**\n   - 2019 Brain Trauma Foundation guidelines: Ketamine is not contraindicated in TBI\n   - Multiple RCTs show ketamine does not increase ICP when used with controlled ventilation\n   - Ketamine's hemodynamic profile is ideal for hypotensive trauma patients\n\n### ❌ Why the Other Options Are Wrong\n- **A. Fentanyl**: Pure opioid analgesic with minimal sedative properties. Can cause hypotension and bradycardia (already present), worsening cerebral perfusion. Not adequate as sole induction agent.\n- **B. Propofol**: Potent vasodilator that causes significant hypotension. In a patient with BP 100/65 and possible raised ICP, propofol would dangerously reduce cerebral perfusion pressure (CPP = MAP - ICP).\n- **D. Etomidate**: Traditionally favored for hemodynamic stability but causes adrenal suppression by inhibiting 11β-hydroxylase. In critical illness/trauma, this can lead to relative adrenal insufficiency and worse outcomes.\n- **E. Midazolam**: Benzodiazepine with slow onset of action. Can cause hypotension, especially in hypovolemic patients. Less predictable than ketamine for rapid sequence intubation in trauma.\n\n### 📚 Relevant Guidelines\n- **Brain Trauma Foundation — Guidelines for the Management of Severe Traumatic Brain Injury**: Evidence-based recommendations including prehospital and emergency department management — https://braintrauma.org/guidelines/guidelines-for-the-management-of-severe-tbi-4th-ed\n- **Australian and New Zealand College of Anaesthetists — Guidelines for Emergency Intubation**: Recommendations for drug selection in various clinical scenarios — https://www.anzca.edu.au/resources/college-publications/pdfs/Professional%20Documents/PS51%20Guideline%20on%20emergency%20intubation.pdf\n- **Therapeutic Guidelines Australia (eTG) — Head injury**: Management guidelines for traumatic brain injury in emergency settings — https://tgldcdp.tg.org.au/viewTopic?topicfile=head-injury", "image_path": ""}, {"id": 34319, "date": "2026-02-01T10:18:47+00:00", "stem": "A 62-year-old woman comes to the office due to upper extremity weakness and numbness. Three days ago, the patient was involved in a motor vehicle collision in which a truck rear-ended her vehicle. The patient did not hit her head or lose consciousness but experienced a tingling and burning sensation in all extremities, which she attributed to the stress of the accident. Since then, she has had numbness in her upper extremities and clumsiness of her hands. She reports difficulty picking up objects but has had no leg weakness or bowel or bladder disturbance. The patient is upset that the other driver refused to accept fault but reports no other ongoing stressors. She has a history of hypertension and osteoarthritis. Vital signs are within normal limits. Neck and back examination show no deformity or tenderness. There is weakness of hand grip bilaterally, and the triceps reflex is decreased on both sides. Decreased pinprick sensation is present on the fingers. The remainder of the neurologic examination is normal. Cervical spine x-ray reveals no vertebral dislocation or fracture, but diffuse spondylotic changes are present. Which of the following is the most likely cause of this patient’s symptoms?", "options": "A. Acute stress disorder\nB. Brachial plexus injury\nC. Malingering\nD. Postconcussion syndrome\nE. Spinal cord injury", "answer": "E. Spinal cord injury", "explanation": "### ✅ Correct Answer: E. Spinal cord injury\n\nThe patient presents with a classic picture of **central cord syndrome**, a type of incomplete spinal cord injury, which is the most likely diagnosis given the clinical and radiological findings.\n\n**Step-by-step clinical reasoning:**\n1. **Mechanism:** The patient experienced a hyperextension injury to the neck during a rear-end motor vehicle collision (whiplash). This is a classic mechanism for central cord syndrome, especially in older adults with pre-existing cervical spondylosis.\n2. **Pathophysiology:** The cervical spine x-ray shows 'diffuse spondylotic changes'. In cervical spondylosis, osteophytes and a narrowed spinal canal make the cord vulnerable. Hyperextension causes pinching of the spinal cord between anterior osteophytes and the posterior ligamentum flavum, injuring the centrally located corticospinal tracts that supply the upper limbs more than the lower limbs.\n3. **Clinical Features:** The symptoms align perfectly with central cord syndrome:\n   - **Upper extremity weakness > lower extremity weakness:** She has hand clumsiness and grip weakness but no leg weakness.\n   - **Sensory deficits:** Numbness and decreased pinprick in the fingers (dermatomal pattern C6-T1).\n   - **Dissociated motor loss:** The triceps reflex (C7) is decreased, consistent with a cord level lesion.\n   - **No bowel/bladder involvement:** The sacral tracts are often spared initially.\n   - **No head injury:** Rules out postconcussion syndrome.\n4. **Examination Findings:** The absence of neck tenderness or deformity does not rule out spinal cord injury, especially one without fracture/dislocation (which is common in central cord syndrome). The neurological findings are focal and bilateral, pointing to a central nervous system lesion.\n\n**Management Pearl for AMC:** In a patient with neck trauma and neurological deficits, even with a normal x-ray, an MRI is the definitive imaging to assess for spinal cord injury. Initial management includes spinal immobilisation and neurosurgical consultation.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Acute stress disorder:** While the patient mentions stress, her symptoms are specific, bilateral, and localised to a neurological pattern (C6-T1 distribution). Acute stress disorder does not cause objective neurological signs like decreased reflexes and specific sensory deficits.\n- **B. Brachial plexus injury:** This typically causes unilateral symptoms following traction injury. The patient's symptoms are bilateral and symmetric, which is highly unusual for a brachial plexus injury. Furthermore, the mechanism (hyperextension) is more consistent with spinal cord injury.\n- **C. Malingering:** The patient has objective neurological signs (decreased triceps reflexes, weakness) that are reproducible and follow an anatomically plausible pattern (central cord syndrome). There is no clear secondary gain pattern described.\n- **D. Postconcussion syndrome:** The patient explicitly did not hit her head or lose consciousness, which are prerequisites for a concussion. The symptoms are focal neurological deficits, not the diffuse cognitive, somatic, and emotional symptoms characteristic of postconcussion syndrome.\n\n### 📚 Relevant Guidelines\n- **[NICE Guideline NG41: Spinal Injury: Assessment and Initial Management]**: Provides evidence-based recommendations for the assessment and early management of spinal cord injury, including imaging and neurological assessment. — https://www.nice.org.uk/guidance/ng41\n- **[UpToDate: Central Cord Syndrome]**: Detailed review of the pathophysiology, clinical presentation, diagnosis, and management of central cord syndrome. — https://www.uptodate.com/contents/central-cord-syndrome\n- **[Therapeutic Guidelines (eTG): Neurological Trauma]**: Australian guidelines covering the initial assessment and management of traumatic spinal cord injuries. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34320, "date": "2026-02-01T10:20:36+00:00", "stem": "A newborn is delivered vaginally at term. The baby breathes quietly during sleep but develops **loud noisy breathing when awake or crying**. Physical examination is otherwise normal, and oxygen saturation is stable. What is the **most likely diagnosis**?", "options": "a. Subglottic stenosis\nb. Vocal cord paralysis\nc. Tracheomalacia\nd. Laryngomalacia\ne. Choanal atresia", "answer": "d. Laryngomalacia", "explanation": "### ✅ Correct Answer: d. Laryngomalacia\n\nThis is a classic presentation of **laryngomalacia**, the most common cause of stridor in infants.\n\n**Step-by-step clinical reasoning:**\n1. **Key Clinical Feature:** The stridor is **positional and effort-dependent**. It is loudest **when awake or crying** (increased respiratory effort) and improves or disappears **during sleep** (relaxation). This is pathognomonic for laryngomalacia.\n2. **Pathophysiology:** Laryngomalacia is a congenital flaccidity of the supraglottic laryngeal structures (epiglottis, arytenoids). During inspiration, especially when the infant is active, agitated, or feeding, these structures are sucked into the airway, causing inspiratory stridor. When the infant is calm or asleep, the negative inspiratory pressure is lower, and the stridor diminishes.\n3. **Supporting Features:**\n   - **Term, vaginally delivered newborn:** Typical presentation age.\n   - **Otherwise normal examination and stable sats:** Laryngomalacia is often an isolated finding without other congenital anomalies. Infants usually feed well and thrive (\"happy stridorous baby\"). Severe cases can cause feeding difficulties or failure to thrive, but this is not described here.\n4. **Differential Exclusion:** The pattern of stridor (inspiratory, variable) immediately points to a supraglottic obstruction, which is characteristic of laryngomalacia.\n\n**Management Pearl for AMC:** Laryngomalacia is typically a benign, self-limiting condition that improves by 12-18 months of age. Management is conservative (reassurance, feeding support). Referral to a paediatric ENT is indicated if there are red flags: feeding difficulties, failure to thrive, apnoea, cyanosis, or significant retractions.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Subglottic stenosis:** This causes fixed, biphasic (inspiratory and expiratory) stridor that is constant and does not improve with sleep. It is often associated with a history of prolonged intubation.\n- **b. Vocal cord paralysis:** Typically presents with a weak cry/aphonia and stridor that is constant or biphasic, not variable with state/activity. Unilateral paralysis may cause hoarseness; bilateral paralysis causes severe stridor and respiratory distress.\n- **c. Tracheomalacia:** Causes **expiratory** stridor or a low-pitched, \"barking\" cough. Symptoms often worsen with agitation, crying, or feeding (like laryngomalacia) but the stridor is primarily expiratory. It is also associated with conditions like vascular rings.\n- **e. Choanal atresia:** Presents with **obligate nasal obstruction**. A neonate is an obligate nasal breather, so bilateral choanal atresia causes severe respiratory distress and cyanosis at birth that improves when the baby cries (opens the mouth). It does not cause variable stridor related to the awake state.\n\n### 📚 Relevant Guidelines\n- **[RACGP: The red flag for infant stridor]**: A practical guide for GPs on assessing stridor in infants, including when to refer. — https://www1.racgp.org.au/ajgp/2019/september/the-red-flag-for-infant-stridor\n- **[UpToDate: Laryngomalacia]**: Comprehensive review of the etiology, clinical features, diagnosis, and management of laryngomalacia. — https://www.uptodate.com/contents/laryngomalacia\n- **[Sydney Children's Hospitals Network: Stridor in Children]**: A clinical practice guideline covering assessment and management of stridor, including laryngomalacia. — https://www.schn.health.nsw.gov.au/files/fact-sheets/condition-stridor-en.pdf", "image_path": ""}, {"id": 34331, "date": "2026-02-02T11:20:12+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "A. Ondansetron\nB. Methylprednisolone\nC. Folic acid\nD. Potassium chloride\nE. Thiamine", "answer": "E", "explanation": "### ✅ Correct Answer: E. Thiamine\n\n**Clinical Reasoning:**\nThis patient has severe hyperemesis gravidarum with significant weight loss (4 kg in 3 weeks), dehydration, ketonuria, and metabolic alkalosis from persistent vomiting. She is at high risk for thiamine (vitamin B1) deficiency due to prolonged poor oral intake and vomiting. Administering dextrose-containing IV fluids without prior thiamine supplementation can precipitate Wernicke encephalopathy in thiamine-deficient patients. Dextrose metabolism increases thiamine demand, rapidly depleting already low stores, leading to acute neurological deterioration characterized by confusion, ataxia, and ophthalmoplegia. Thiamine is water-soluble, non-toxic, and should be given prophylactically before dextrose in any malnourished patient or those with prolonged vomiting/alcohol use disorder. In hyperemesis gravidarum management, IV fluid resuscitation with normal saline is first-line, followed by thiamine (typically 100 mg IV), then dextrose-containing solutions if needed for metabolic support.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: While ondansetron is an effective antiemetic for hyperemesis gravidarum, it is not required *immediately before* dextrose infusion. It addresses symptom control but does not prevent the neurological complication (Wernicke encephalopathy) triggered by dextrose in a thiamine-deficient state.\n- **B. Methylprednisolone**: Corticosteroids may be considered for refractory hyperemesis gravidarum but are not an urgent pre-dextrose requirement. They carry potential fetal risks and are not first-line for acute metabolic support preparation.\n- **C. Folic acid**: Folic acid supplementation is crucial in early pregnancy for neural tube defect prevention but does not need to be given urgently IV before dextrose. It does not prevent acute complications from dextrose administration.\n- **D. Potassium chloride**: While hypokalaemia may occur from vomiting and require correction, it is not an immediate prerequisite before dextrose infusion. Thiamine deficiency takes priority due to the risk of irreversible neurological damage.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) – Hyperemesis Gravidarum**: Recommends thiamine supplementation (100 mg daily, IV or IM) for women with hyperemesis gravidarum requiring hospital admission, especially before dextrose-containing fluids. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hyperemesis-gravidarum&guidelineName=Women%27s%20Health\n- **RANZCOG (Royal Australian and New Zealand College of Obstetricians and Gynaecologists) – Management of Nausea and Vomiting in Pregnancy**: States that thiamine should be administered to all women admitted with hyperemesis gravidarum, particularly before dextrose infusion. — https://ranzcog.edu.au/womens-health/guidelines\n- **NICE Guidelines – Antenatal Care**: Recommends considering intravenous thiamine for women with severe vomiting in pregnancy, especially if hospitalised. — https://www.nice.org.uk/guidance/ng201", "image_path": ""}, {"id": 34332, "date": "2026-02-02T11:26:24+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A", "explanation": "### ✅ Correct Answer: A. Uterine rupture\n\n**Clinical Reasoning:**\nThis multiparous woman (gravida 3 para 2) presents with the classic tetrad of uterine rupture: 1) **Sudden, severe abdominal pain** during labour; 2) **Cessation of contractions** (uterine inertia); 3) **Maternal hypovolaemic shock** (tachycardia, hypotension); and 4) **Fetal compromise** (persistent bradycardia). The change in fetal station with disengagement of the presenting part is pathognomonic, as the fetus may be partially extruded into the abdominal cavity. Minimal vaginal bleeding is characteristic because haemorrhage is often concealed intra-abdominally. Uterine rupture is an obstetric emergency requiring immediate laparotomy, delivery, and repair or hysterectomy. Risk factors include previous uterine surgery (especially classical caesarean), multiparity, and obstructed labour.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding and fetal bradycardia following rupture of fetal vessels, typically after membrane rupture. It does not cause sudden severe abdominal pain, cessation of contractions, or maternal shock unless there is massive fetal haemorrhage.\n- **C. Amniotic fluid embolism**: Presents with sudden cardiovascular collapse, dyspnoea, and coagulopathy, often during or after delivery. While fetal bradycardia occurs, it does not typically cause a change in fetal station or cessation of contractions as primary features.\n- **D. Placental abruption**: Presents with painful, tense uterus, often with dark vaginal bleeding and fetal distress. Contractions usually continue (may become hypertonic), and there is no change in fetal station. Maternal shock is proportional to visible blood loss.\n- **E. Cord prolapse**: Presents with sudden fetal bradycardia after membrane rupture, with cord palpable on vaginal exam. Maternal vital signs remain normal unless prolonged fetal distress leads to distress. Abdominal pain and cessation of contractions are not typical.\n\n### 📚 Relevant Guidelines\n- **RANZCOG – Management of Uterine Rupture**: Outlines diagnosis and immediate management of uterine rupture, emphasizing the need for rapid surgical intervention. — https://ranzcog.edu.au/womens-health/guidelines\n- **WHO – Managing Complications in Pregnancy and Childbirth**: Includes guidance on recognition and emergency management of uterine rupture. — https://www.who.int/publications/i/item/9241545879\n- **UpToDate – Uterine Rupture**: Details risk factors, clinical presentation, diagnosis, and management of uterine rupture in labour. — https://www.uptodate.com/contents/uterine-rupture-after-previous-cesarean-delivery", "image_path": ""}, {"id": 34335, "date": "2026-02-02T11:59:58+00:00", "stem": "A 62-year-old man presents with recurrent episodes of dizziness precipitated when he looks upwards while painting his ceiling. Each episode lasts several minutes. He has vascular risk factors including hypertension and diabetes. There is no hearing loss or tinnitus. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo\nB. Vestibular neuritis\nC. Ménière’s disease\nD. Vertebrobasilar ischaemia\nE. Acoustic neuroma", "answer": "D", "explanation": "### ✅ Correct Answer: D. Vertebrobasilar ischaemia\n\n**Clinical Reasoning:**\nThis elderly patient with vascular risk factors (hypertension, diabetes) presents with **position-triggered vertigo lasting several minutes** when looking upwards (neck extension). This history is classic for vertebrobasilar insufficiency (VBI), a form of posterior circulation TIA/stroke. Neck extension can compromise vertebral artery flow, especially in the setting of atherosclerosis, leading to transient brainstem/cerebellar ischaemia. Key differentiating features from peripheral causes: 1) **Duration**: VBI vertigo typically lasts minutes (as here), while BPPV lasts seconds; 2) **Triggers**: Neck movement (not just head position change) is characteristic; 3) **Risk factors**: Atherosclerotic disease is prominent; 4) **Associated symptoms**: Although none are reported here, VBI often includes diplopia, dysarthria, ataxia, or sensory symptoms. The absence of auditory symptoms (hearing loss, tinnitus) makes Ménière's and acoustic neuroma unlikely.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: Characterized by brief episodes of vertigo (usually <1 minute) triggered by specific head movements (e.g., rolling over in bed, looking up). It is not typically provoked by sustained neck extension and is not associated with vascular risk factors. Episodes are seconds, not minutes.\n- **B. Vestibular neuritis**: Presents with acute, severe, continuous vertigo lasting days, not brief positional episodes. It is often preceded by viral illness and includes nausea/vomiting, not triggered by specific positions.\n- **C. Ménière’s disease**: Triad of episodic vertigo (minutes to hours), fluctuating sensorineural hearing loss, tinnitus, and aural fullness. The absence of auditory symptoms excludes this diagnosis.\n- **E. Acoustic neuroma**: Typically presents with unilateral progressive hearing loss, tinnitus, and imbalance, not episodic position-triggered vertigo. Vertigo is less common than unsteadiness.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation Australia – Clinical Guidelines for Stroke Management**: Includes assessment and management of vertebrobasilar ischaemia/TIA, emphasizing urgent evaluation in patients with posterior circulation symptoms. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **NICE – Stroke and TIA**: Guidelines for diagnosis and management of TIA, including posterior circulation events. — https://www.nice.org.uk/guidance/ng128\n- **UpToDate – Vertebrobasilar Insufficiency**: Reviews clinical features, diagnosis, and management of vertebrobasilar ischaemia. — https://www.uptodate.com/contents/vertebrobasilar-insufficiency", "image_path": ""}, {"id": 34336, "date": "2026-02-02T12:00:33+00:00", "stem": "A 45-year-old man presents with recurrent flushing, pruritus, abdominal cramping, and episodes of syncope after alcohol intake. He has a history of unexplained anaphylaxis following a bee sting. On examination, there are multiple brownish macules consistent with urticaria pigmentosa. Blood tests show a persistently elevated serum tryptase level of 28 ng/mL. What is the most likely diagnosis?", "options": "A. Carcinoid syndrome\nB. Pheochromocytoma\nC. Systemic mastocytosis\nD. Hereditary angioedema\nE. Zollinger–Ellison syndrome", "answer": "C", "explanation": "### ✅ Correct Answer: C. Systemic mastocytosis\n\n**Clinical Reasoning:**\nThis patient presents with the classic triad of systemic mastocytosis: 1) **Cutaneous findings**: Urticaria pigmentosa (brownish macules that urticate when stroked – Darier's sign); 2) **Systemic mediator symptoms**: Flushing, pruritus, abdominal cramping (from histamine release), and syncope (from hypotension); 3) **Triggers**: Alcohol is a well-known precipitant of mast cell degranulation. The history of anaphylaxis after a bee sting further supports mast cell disorder. **Persistently elevated serum tryptase** (>20 ng/mL) is a major diagnostic criterion for systemic mastocytosis. Tryptase is a mast cell-specific protease released during degranulation. The combination of urticaria pigmentosa, anaphylaxis, alcohol-triggered symptoms, and high tryptase is pathognomonic.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Carcinoid syndrome**: Causes flushing, diarrhoea, and abdominal cramping, but typically associated with **hepatic metastases** (allowing serotonin to reach systemic circulation). Flushing is often prolonged and cyanotic. Urticaria pigmentosa is not present, and tryptase is not elevated. Symptoms are not specifically triggered by alcohol.\n- **B. Pheochromocytoma**: Presents with **paroxysmal hypertension**, headache, sweating, and palpitations, not flushing and pruritus. Syncope is rare. Urticaria pigmentosa and elevated tryptase are not features.\n- **D. Hereditary angioedema**: Characterized by recurrent episodes of **non-pruritic, non-pitting angioedema** without urticaria, often involving face, extremities, or bowel (causing abdominal pain). Flushing and urticaria pigmentosa are absent. Tryptase is normal.\n- **E. Zollinger–Ellison syndrome**: Manifests with **severe peptic ulcer disease** and diarrhoea due to gastrinoma. Flushing, urticaria pigmentosa, and anaphylaxis are not features. Tryptase is normal.\n\n### 📚 Relevant Guidelines\n- **Australasian Society of Clinical Immunology and Allergy (ASCIA) – Mastocytosis**: Provides diagnostic criteria and management guidelines for mastocytosis in Australia. — https://www.allergy.org.au/patients/mastocytosis\n- **WHO Classification of Tumours – Mastocytosis**: Defines diagnostic criteria including tryptase levels and bone marrow findings. — https://tumourclassification.iarc.who.int/chapters/52\n- **UpToDate – Systemic Mastocytosis**: Details clinical features, diagnosis, and management of systemic mastocytosis. — https://www.uptodate.com/contents/systemic-mastocytosis-clinical-presentations-diagnosis-and-management", "image_path": ""}, {"id": 34344, "date": "2026-02-02T22:42:40+00:00", "stem": "A 68-year-old man presents with a 2-year history of gradually progressive muscle weakness. He reports difficulty climbing stairs and rising from a chair. He also notices reduced grip strength and difficulty holding cutlery.\n\nOn examination:\n • Weakness of quadriceps and finger flexors\n • Mild muscle wasting\n • No skin rash\n • CK is mildly elevated\n • EMG shows myopathic changes\n • Muscle biopsy shows rimmed vacuoles\n\nHe has had minimal response to high-dose corticosteroids.\n\nWhat is the most likely diagnosis?", "options": "A. Polymyositis\nB. Dermatomyositis\nC. Immune-mediated necrotizing myopathy\nD. Inclusion body myositis\nE. Antisynthetase syndrome", "answer": "D", "explanation": "### ✅ Correct Answer: D. Inclusion body myositis\n\nThis patient's presentation is classic for inclusion body myositis (IBM). The key diagnostic features include:\n1. **Demographics**: Elderly male (typical for IBM, which has male predominance).\n2. **Clinical Pattern**: Insidiously progressive weakness over years (2-year history). The specific pattern of weakness is highly characteristic: **asymmetric quadriceps weakness** (difficulty climbing stairs, rising from chair) and **asymmetric finger flexor weakness** (difficulty holding cutlery, reduced grip strength). This selective involvement of l
