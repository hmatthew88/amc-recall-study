    <script>
        const questionsData = [{"id": 29170, "date": "2026-02-12T02:01:50+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 76-year-old woman who looks after her grandchild has received the following vaccinations: COVID-19 vaccine, pertussis vaccine within the last 5 years, and pneumococcal vaccine 20 years ago. Which additional vaccine should be given?", "options": "A. RSV vaccine\nB. Pertussis vaccine\nC. Influenza vaccine", "answer": "C. Influenza vaccine", "explanation": "### ✅ Correct Answer: C. Influenza vaccine\n\n**Clinical Reasoning:**\n1. **Patient Profile:** 76-year-old woman (elderly) who is a grandparent caregiver (increased risk of exposure to respiratory infections from children).\n2. **Vaccination History Analysis:**\n   - **COVID-19:** Already received (appropriate for age/risk).\n   - **Pertussis:** Received within last 5 years. According to Australian guidelines, a single adult pertussis booster is recommended, and repeat vaccination within 5 years is not routinely indicated unless in specific circumstances (e.g., pregnancy, healthcare workers).\n   - **Pneumococcal:** Received 20 years ago. For adults aged ≥70 years, a single dose of pneumococcal vaccine (13vPCV followed by 23vPPV 12 months later) is recommended. However, the question doesn't ask about pneumococcal vaccination specifically.\n3. **Annual Influenza Vaccine:** The **influenza vaccine is recommended annually for all adults aged ≥65 years** in Australia (ATAGI). This is a **standard, yearly requirement** regardless of other vaccinations. Her caregiver status further supports this recommendation to protect both herself and the grandchild.\n4. **RSV Vaccine Consideration:** RSV vaccine (Arexvy) is approved in Australia for adults aged ≥60 years but is **not yet on the National Immunisation Program (NIP) for all elderly**. It's recommended for those with specific risk factors (chronic conditions). The question doesn't mention comorbidities, so it's not the **most urgent** routine vaccination compared to influenza.\n\n**Conclusion:** The annual influenza vaccine is the **most appropriate and necessary** vaccine to administer based on her age and the fact that it's required yearly, unlike the other options which are either not due (pertussis) or not universally recommended without specific indications (RSV).", "image_path": ""}, {"id": 29221, "date": "2026-02-12T19:21:53+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A patient presents with bradycardia and is hemodynamically unstable. What is the most appropriate immediate management?", "options": "A. Administer atropine 0.5 mg IV\nB. Start transcutaneous (external) pacing\nC. Administer adrenaline 1 mg IV\nD. Insert a transvenous pacemaker\nE. Administer isoprenaline infusion", "answer": "B. Start transcutaneous (external) pacing", "explanation": "### ✅ Correct Answer: B. Start transcutaneous (external) pacing\n\n**Clinical Reasoning:**\n1.  **Scenario:** Hemodynamically unstable bradycardia. This is defined by the presence of signs/symptoms due to the slow heart rate, such as hypotension, altered mental status, signs of shock, ischemic chest pain, or acute heart failure.\n2.  **Immediate Management (ACLS/ALS Algorithm):** For unstable bradycardia, the first step after confirming instability and supporting ABCs is pharmacologic intervention with **atropine**. However, the question stem implies a scenario where pharmacologic therapy is either ineffective, not appropriate, or there is no time to wait for it to work.\n3.  **Why Transcutaneous Pacing (TCP) is Correct:**\n    *   **Speed and Accessibility:** TCP is the fastest method to establish a reliable heart rate in an emergency. It can be initiated within minutes using a defibrillator/monitor with pacing capability, which is standard equipment in resuscitation areas.\n    *   **Bridge to Definitive Therapy:** TCP is a **temporary** measure to stabilize the patient while preparing for **transvenous pacing**, which is the definitive treatment but takes longer to establish (requires sterile procedure, central venous access, fluoroscopy/echocardiography guidance in many cases).\n    *   **Guideline Sequence:** The standard algorithm (e.g., Australian Resuscitation Council, ALS) is: Identify and treat cause → If unstable, give **atropine** → If ineffective or not suitable (e.g., high-grade AV block, asystole), proceed immediately to **transcutaneous pacing** → Prepare for **transvenous pacing**.\n    *   **Key Point:** The statement \"we need to do Transvenous pacing\" in the original message is the *definitive goal*, but in an AMC exam context, the immediate, first-line procedural intervention for an unstable patient is **transcutaneous pacing**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Administer atropine 0.5 mg IV**: Atropine is the first-line *drug* for unstable bradycardia. However, in a scenario where the patient is immediately identified as needing pacing, it may be because they have a high-grade AV block (e.g., third-degree) where atropine is often ineffective, or the instability is so severe that waiting for drug effect is unsafe. Pacing provides immediate rate control.\n- **C. Administer adrenaline 1 mg IV**: A 1 mg IV dose of adrenaline is the standard dose for **cardiac arrest** (pulseless rhythms like VF, PEA, asystole). For symptomatic bradycardia, if atropine fails, the next step is pacing, not adrenaline. Adrenaline infusions at much lower doses (2-10 mcg/min) can be used as a temporizing measure, but are not as reliable or rapid as pacing.\n- **D. Insert a transvenous pacemaker**: This is the definitive management for prolonged or refractory bradycardia and is the correct *next step* after initial stabilization. However, it is not the **immediate** action because it requires a sterile procedure, venous access, and often imaging guidance, which takes valuable time in an unstable patient.\n- **E. Administer isoprenaline infusion**: Isoprenaline is a positive chronotrope and can be used for refractory bradycardia, but it is **not** a first-line agent. It can precipitate arrhythmias and increase myocardial oxygen demand, making it risky, especially in ischemic heart disease. Pacing is a safer and more controlled method of increasing heart rate.\n\n### 📚 Relevant Guidelines\n- **[Australian Resuscitation Council (ARC) & New Zealand Resuscitation Council (NZRC) - ALS Guidelines]**: Management of symptomatic bradycardia. Clearly outlines the algorithm: Atropine first, then transcutaneous pacing, followed by transvenous pacing or drug infusions. — [https://resus.org.au/guidelines/](https://resus.org.au/guidelines/)\n- **[Therapeutic Guidelines (eTG) - Cardiovascular]**: Provides detailed guidance on the management of bradyarrhythmias, including indications for temporary pacing. — [https://tgldcdp.tg.org.au/](https://tgldcdp.tg.org.au/)\n- **[UpToDate - Temporary cardiac pacing]**: Reviews indications, techniques, and comparisons of transcutaneous versus transvenous pacing in emergency settings. — [https://www.uptodate.com/contents/temporary-cardiac-pacing](https://www.uptodate.com/contents/temporary-cardiac-pacing)", "image_path": "photo_2026-02-12_19-21-53.jpg"}, {"id": 29246, "date": "2026-02-13T12:29:32+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A registered nurse working in your facility confides in you that she has recently begun a personal relationship with an individual who was previously a patient on the psychiatry ward where she was assigned. What is the most appropriate action for you to take?", "options": "a. Advise the nurse to immediately terminate the relationship due to ethical concerns.\nb. Document the conversation in your personal notes and monitor the situation.\nc. Report the matter to the Nursing and Midwifery Board of Australia through AHPRA\nd. Inform your senior medical director or the head of the psychiatric department for internal review.\ne. Inform the patient's current treating psychiatrist about the", "answer": "d", "explanation": "### ✅ Correct Answer: d. Inform your senior medical director or the head of the psychiatric department for internal review.\n\nThis is the most appropriate initial action. The scenario describes a potential breach of professional boundaries by a nurse, specifically a dual relationship with a former psychiatric patient. This raises significant ethical and professional conduct concerns, as it may exploit the inherent power imbalance from the prior therapeutic relationship and could compromise patient welfare.\n\n**Step-by-step clinical reasoning:**\n1.  **Immediate Concern:** The primary duty is to protect the former patient, who is in a vulnerable position due to their psychiatric history and the prior nurse-patient relationship.\n2.  **Your Role:** As a colleague who has been confided in, you have an ethical obligation to act. However, you are not the nurse's direct supervisor or regulator. The most appropriate first step is to escalate the matter internally to the appropriate management or governance body within your facility (e.g., senior medical director, head of department, clinical governance unit).\n3.  **Why Internal Review First:** This allows for a formal, confidential assessment of the situation by those with the authority to investigate, gather facts, and determine the appropriate course of action. They can assess the specifics (e.g., when the therapeutic relationship ended, the patient's capacity, any potential coercion) and decide on the necessary steps, which may include counseling for the nurse, a formal report to AHPRA, or other disciplinary measures.\n4.  **AMC Context:** This tests knowledge of professional responsibilities, boundaries, and the correct hierarchical pathway for reporting concerns about a colleague's conduct.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Advise the nurse to immediately terminate the relationship due to ethical concerns.**: While the relationship is ethically problematic, it is not your role as a colleague to give direct personal advice or instructions to the nurse. This bypasses proper governance channels and may not address the underlying professional breach adequately.\n- **b. Document the conversation in your personal notes and monitor the situation.**: This is a passive and insufficient response. 'Monitoring' is inappropriate given the serious ethical breach and potential harm to a vulnerable former patient. It fails in your duty to take proactive steps to manage the risk.\n- **c. Report the matter to the Nursing and Midwifery Board of Australia through AHPRA.**: Reporting directly to AHPRA is a very serious step, typically reserved for when internal processes have failed, the conduct is egregious, or there is an immediate serious risk. The initial step should be an internal review to assess the situation before potentially making a formal notification to the national regulator.\n- **e. Inform the patient's current treating psychiatrist about the**: This option is incomplete in the text, but the intent is to inform the patient's doctor. This breaches the nurse's confidentiality unnecessarily as the first step and may not be the most direct way to address the nurse's professional misconduct. The primary issue is the nurse's conduct, not the patient's clinical care, which would be addressed through the proper internal review process.\n\n### 📚 Relevant Guidelines\n- **Medical Board of Australia - Good medical practice: A code of conduct**: Section 8.2 (Professional boundaries) and Section 8.4 (Reporting concerns about colleagues) outline the duty to maintain professional boundaries and the appropriate steps to take if concerned about a colleague's conduct. — [https://www.medicalboard.gov.au/codes-guidelines-policies/code-of-conduct.html](https://www.medicalboard.gov.au/codes-guidelines-policies/code-of-conduct.html)\n- **Nursing and Midwifery Board of Australia - Code of Conduct for Nurses**: Principle 2 (Shared decision-making) and Principle 3 (Cultural practice and respectful relationships) explicitly prohibit sexual or inappropriate personal relationships with former patients, especially where a power imbalance exists. It also outlines the framework for mandatory reporting. — [https://www.nursingmidwiferyboard.gov.au/codes-guidelines-statements/professional-standards/code-of-conduct-for-nurses.aspx](https://www.nursingmidwiferyboard.gov.au/codes-guidelines-statements/professional-standards/code-of-conduct-for-nurses.aspx)\n- **Australian Health Practitioner Regulation Agency (AHPRA) - Guidelines for mandatory notifications**: These guidelines help practitioners understand when they are legally required to report a concern about another practitioner. While this scenario likely warrants a report, the pathway usually involves internal escalation first. — [https://www.ahpra.gov.au/Notifications/mandatory-notifications.aspx](https://www.ahpra.gov.au/Notifications/mandatory-notifications.aspx)", "image_path": ""}, {"id": 29265, "date": "2026-02-14T08:31:19+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 13-year-old girl is brought by her mother to see their general practitioner for advice regarding contraception. The daughter, who has just started her menstrual periods, has severe learning difficulties and attends a co-educational special day school. Since diagnosis of epilepsy at age 10 she has had good seizure control with phenytoin. Which one of the following is the most appropriate contraception?", "options": "A. Combined OCP containing 50 mcg of ethinyl estradiol.\nB. Combined OCP containing drospirenone as the progestogen.\nC. Medroxyprogesterone 150 mg injection.\nD. Etonogestrel 68 mg implant.\nE. Levonorgestrel-releasing intrauterine device.", "answer": "C. Medroxyprogesterone 150 mg injection.", "explanation": "### ✅ Correct Answer: C. Medroxyprogesterone 150 mg injection.\nThe most appropriate contraception for this patient is the progestogen-only injectable (Depot Medroxyprogesterone Acetate - DMPA). The key clinical reasoning is as follows:\n1.  **Enzyme Induction by Phenytoin:** Phenytoin is a potent hepatic enzyme inducer (CYP450 system). This significantly increases the metabolism of both estrogen and progestogen components in combined hormonal contraceptives (CHCs, options A & B) and the etonogestrel implant (option D), leading to a high risk of contraceptive failure. While a higher-dose estrogen pill (50 mcg, option A) is sometimes suggested to counteract this, it is not the safest or most reliable first-line choice.\n2.  **Safety Profile:** DMPA is a progestogen-only method. While its effectiveness might be slightly reduced by enzyme inducers, the reduction is less pronounced than with CHCs, and it remains a highly effective contraceptive. Crucially, it avoids the increased risk of venous thromboembolism (VTE) associated with estrogen-containing methods, which is an important consideration.\n3.  **Patient Factors:** The patient is 13 years old with severe learning difficulties. DMPA offers a long-acting (3-month), user-independent method, which is ideal for someone who may have difficulty with daily pill adherence or managing menstrual hygiene. It also often leads to amenorrhea, which can be beneficial. While a Levonorgestrel IUD (option E) is a highly effective and long-acting progestogen-only method, its insertion in a young adolescent, especially one with learning difficulties, would likely require sedation or general anesthesia, posing practical and ethical challenges that make it a less suitable first-line option in this specific scenario.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Combined OCP containing 50 mcg of ethinyl estradiol.**: Phenytoin's enzyme-inducing effect drastically reduces the bioavailability of both estrogen and progestogen, leading to high failure rates. Using a 50 mcg pill attempts to compensate but is not the standard of care due to the increased VTE risk from high-dose estrogen and the remaining uncertainty about efficacy.\n- **B. Combined OCP containing drospirenone as the progestogen.**: Contains estrogen and is therefore subject to the same enzyme induction and failure risk as option A. Drospirenone has no advantage in this context and carries its own specific VTE risk profile.\n- **D. Etonogestrel 68 mg implant.**: The etonogestrel implant's effectiveness is significantly reduced by enzyme-inducing drugs like phenytoin. It is generally not recommended for women on such medications due to unacceptably high failure rates.\n- **E. Levonorgestrel-releasing intrauterine device.**: While the LNG-IUD is a highly effective progestogen-only method not affected by liver enzyme induction, its insertion in a 13-year-old with severe learning difficulties is not the most practical first choice. It would typically require procedural sedation or general anesthesia, which involves additional risk and complexity compared to a simple injection.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Endocrinology (Contraception)]**: Provides Australian recommendations on contraceptive choice, including specific guidance for women taking enzyme-inducing medications. — https://tgldcdp.tg.org.au/etgAccess\n- **[Faculty of Sexual & Reproductive Healthcare (FSRH) UKMEC)]**: The UK Medical Eligibility Criteria for Contraceptive Use provides a global standard, with clear recommendations that combined hormonal contraception and the etonogestrel implant are generally not recommended (UKMEC 3/4) for women on enzyme-inducing drugs. — https://www.fsrh.org/standards-and-guidance/documents/ukmec-2016-summary-sheets/\n- **[RANZCOG Guidelines - Long-Acting Reversible Contraception (LARC)]**: Supports the use of LARC methods in adolescents, noting that DMPA and LNG-IUD are both suitable options, with choice dependent on individual circumstances. — https://ranzcog.edu.au/womens-health/patient-information-resources/long-acting-reversible-contraception-larc", "image_path": ""}, {"id": 29284, "date": "2026-02-14T10:24:59+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old woman presents with one week of vaginal bleeding. She has been amenorrhoeic since age 42 when she underwent lumpectomy, postoperative radiotherapy and adjuvant chemotherapy for an estrogen receptor-positive breast malignancy. Since then she has been on tamoxifen. Which one of the following is the most likely diagnosis?", "options": "A. Tamoxifen-stimulated follicle development\nB. Endometrial polyp\nC. Endometrial cancer\nD. Endometrial atrophy\nE. Endometrial metastases", "answer": "C. Endometrial cancer", "explanation": "### ✅ Correct Answer: C. Endometrial cancer\n\n**Clinical Reasoning:**\n1. **Patient Profile & History:** The patient is a 45-year-old woman with a history of estrogen receptor-positive breast cancer treated with lumpectomy, radiotherapy, chemotherapy, and ongoing tamoxifen therapy. She has been amenorrhoeic for 3 years (since age 42), likely due to chemotherapy-induced ovarian failure or suppression.\n2. **Tamoxifen Mechanism & Risk:** Tamoxifen is a selective estrogen receptor modulator (SERM). In breast tissue, it acts as an estrogen antagonist, but in the endometrium, it has a partial *agonist* effect. This estrogenic stimulation of the endometrium increases the risk of endometrial hyperplasia, polyps, and notably, **endometrial cancer**.\n3. **Presenting Symptom:** The new onset of vaginal bleeding after 3 years of amenorrhoea is a **red flag** for endometrial pathology in a postmenopausal woman (she is functionally postmenopausal due to treatment-induced ovarian failure). In any postmenopausal woman with bleeding, endometrial cancer must be ruled out.\n4. **Likelihood:** Given the strong association between tamoxifen use and endometrial cancer, this is the most probable diagnosis. While tamoxifen can also cause polyps (Option B), cancer is the more serious and directly linked concern in this clinical scenario, especially with new bleeding after amenorrhoea.\n5. **Next Steps:** The definitive diagnostic test would be an **endometrial biopsy** or hysteroscopy with biopsy to confirm the diagnosis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Tamoxifen-stimulated follicle development**: This is incorrect. The patient is amenorrhoeic and functionally postmenopausal (likely from chemotherapy). Follicle development requires active ovarian function, which she does not have. Tamoxifen does not stimulate ovarian follicles in this context.\n- **B. Endometrial polyp**: While tamoxifen use significantly increases the risk of endometrial polyps (a common finding), the clinical presentation of new postmenopausal bleeding in a tamoxifen user raises a higher suspicion for malignancy. Polyps are possible, but cancer is the more critical and likely diagnosis to consider first.\n- **D. Endometrial atrophy**: This is a common cause of postmenopausal bleeding. However, in a patient on tamoxifen, the endometrium is typically *stimulated*, not atrophic. Tamoxifen's estrogenic effect on the endometrium makes atrophy very unlikely.\n- **E. Endometrial metastases**: While breast cancer can metastasize, metastasis to the endometrium is exceedingly rare. The more common concern in a patient with a history of breast cancer on tamoxifen is a *new primary* endometrial cancer, not metastatic disease.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (Endocrinology) / RANZCOG**: Discusses the management of abnormal uterine bleeding and the increased risk of endometrial pathology with tamoxifen therapy. — https://www.ranzcog.edu.au/statements-guidelines\n- **Cancer Australia**: Guidelines on the management of hormone receptor-positive breast cancer, including monitoring for side effects of adjuvant endocrine therapy like tamoxifen. — https://www.canceraustralia.gov.au/publications-and-resources/cancer-australia-publications/tamoxifen-and-endometrial-cancer\n- **UpToDate**: \"Endometrial carcinoma: Epidemiology, risk factors, and prevention\" and \"Tamoxifen and uterine cancer\" detail the strong association and recommended surveillance. — https://www.uptodate.com/contents/endometrial-carcinoma-epidemiology-risk-factors-and-prevention", "image_path": ""}, {"id": 29294, "date": "2026-02-14T13:20:21+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 25-year-old woman presents with two days of intermittent sharp lower abdominal pain. Her last normal menstrual period commenced three weeks ago. Her cycle varies in length between 32 and 35 days. She has never been pregnant and is not currently sexually active. On examination her BMI is 28, BP 115/70 mmHg, pulse rate 92/min and temperature 37.1°C. There is tenderness to palpation in the left iliac fossa. A pelvic ultrasound shows that the uterus and right ovary are of normal size and appearance, but there is a cystic structure in the left ovary. This structure is 4.5 cm in diameter, unilocular and thin walled. Which one of the following is the most likely diagnosis?", "options": "A. Preovulatory developing follicle\nB. Follicular cyst.\nC. Corpus luteum cyst.\nD. Benign cystic teratoma.\nE. Endometrioma.", "answer": "B. Follicular cyst.", "explanation": "### ✅ Correct Answer: B. Follicular cyst.\n\n**Clinical Reasoning:**\n1. **Timing in Menstrual Cycle:** The patient's last menstrual period (LMP) was 3 weeks ago. With a cycle length of 32-35 days, she is likely in the late follicular phase, approaching ovulation (which typically occurs around day 14 in a 28-day cycle, but later in a longer cycle). A structure present at this time is most consistent with a dominant follicle or a cyst derived from a follicle that failed to ovulate.\n2. **Ultrasound Characteristics:** The cyst is described as **unilocular, thin-walled, and 4.5 cm**. These are classic sonographic features of a simple **follicular cyst**. Follicular cysts are common, functional cysts that result from the failure of a follicle to either ovulate or regress.\n3. **Clinical Presentation:** She presents with acute, intermittent pain. A follicular cyst can cause pain due to rapid expansion, bleeding into the cyst, or torsion (though torsion is less common with simple cysts). The tenderness in the left iliac fossa correlates with the left ovarian cyst found on ultrasound.\n4. **Exclusion of Other Pathologies:**\n   - She is **not sexually active**, making a corpus luteum cyst (which forms *after* ovulation) less likely, though not impossible if she ovulated earlier.\n   - The simple, thin-walled appearance argues against a teratoma (which often has mixed echogenicity, fat, calcifications) or an endometrioma (which typically appears as a \"ground-glass\" homogeneous cyst, often bilateral).\n5. **Management:** For a simple cyst <5 cm in a premenopausal woman, expectant management is typically recommended, as most resolve spontaneously within a few cycles.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Preovulatory developing follicle**: A dominant follicle in the preovulatory phase is usually 2.0-2.5 cm in diameter. A 4.5 cm structure is too large for a normal developing follicle and is more indicative of a cyst (a follicle that has continued to grow beyond the normal size).\n- **C. Corpus luteum cyst**: This forms *after* ovulation. Given her LMP was 3 weeks ago and her cycle is long, ovulation may have occurred recently. However, corpus luteum cysts often have a thicker, more vascularized wall and may contain internal echoes (blood). The description \"thin walled\" and \"unilocular\" is more classic for a follicular cyst. The history of not being sexually active doesn't rule it out but makes it a less likely primary consideration.\n- **D. Benign cystic teratoma (dermoid cyst)**: These are common ovarian neoplasms in this age group. However, on ultrasound, they are rarely simple and unilocular. They typically contain echogenic foci (hair, teeth, fat) creating a heterogeneous appearance. The described simple cyst does not fit.\n- **E. Endometrioma (chocolate cyst)**: These are cysts filled with old blood from endometriosis. Their classic ultrasound appearance is a **unilocular cyst with homogeneous low-level internal echoes (\"ground-glass\" appearance)**. A simple, anechoic (clear) cyst as described is not typical for an endometrioma.\n\n### 📚 Relevant Guidelines\n- **RANZCOG (Royal Australian and New Zealand College of Obstetricians and Gynaecologists)**: Guidelines on the management of ovarian cysts in premenopausal women. — https://www.ranzcog.edu.au/statements-guidelines\n- **Therapeutic Guidelines Australia (Endocrinology)**: Covers the diagnosis and management of functional ovarian cysts. — https://tgldcdp.tg.org.au/\n- **UpToDate**: \"Evaluation and management of ruptured ovarian cyst\" and \"Ovarian cysts: Clinical manifestations and diagnosis\" provide detailed diagnostic criteria. — https://www.uptodate.com/contents/evaluation-and-management-of-ruptured-ovarian-cyst", "image_path": ""}, {"id": 29312, "date": "2026-02-14T17:18:05+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Appointed as community leader in rural area with high level of alcoholism. Most effective for prevention?", "options": "A. Pamphlets\nB. Education using celebrity\nC. Government grant and psychosocial support\nD. Talk to community personally", "answer": "C. Government grant and psychosocial support", "explanation": "### ✅ Correct Answer: C. Government grant and psychosocial support\n\nThis is correct because it represents a comprehensive, evidence-based public health approach to alcohol harm prevention in high-risk communities. The clinical reasoning is:\n\n1. **Public Health Framework**: The most effective interventions for substance abuse prevention follow a multi-level approach addressing social determinants, not just individual education. Government grants enable sustainable funding for community programs, while psychosocial support addresses underlying risk factors like poverty, unemployment, and mental health issues that drive alcoholism.\n\n2. **Evidence Hierarchy**: Systematic reviews show that environmental interventions (policy, funding, community support) have greater population-level impact than individual educational approaches. Pamphlets (A) and celebrity education (B) are low-intensity, awareness-based strategies with limited effectiveness in high-prevalence settings.\n\n3. **Rural Context**: Rural areas often have limited resources, higher stigma, and fewer treatment options. Government grants can establish local services, while psychosocial support (counseling, support groups, family interventions) directly addresses the root causes.\n\n4. **AMC Exam Focus**: The AMC emphasizes evidence-based public health interventions. The most comprehensive option addressing both structural (funding) and individual (support) factors aligns with Australian public health principles.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Pamphlets**: This is a passive, low-intensity educational approach with minimal evidence for changing behavior in high-prevalence communities. Pamphlets may increase awareness but don't address the structural and psychosocial drivers of alcoholism.\n- **B. Education using celebrity**: While celebrity endorsements can raise awareness, they are primarily marketing tools with limited evidence for sustained behavior change in addiction prevention. They lack the comprehensive support needed for high-risk populations.\n- **D. Talk to community personally**: Although community engagement is important, one-on-one conversations alone are insufficient for population-level prevention. This approach lacks scalability, sustainability, and the structural support needed to address systemic issues.\n\n### 📚 Relevant Guidelines\n\n- **National Health and Medical Research Council (NHMRC) - Australian Guidelines to Reduce Health Risks from Drinking Alcohol**: Provides evidence-based recommendations for alcohol harm reduction, emphasizing population-level interventions and support systems — https://www.nhmrc.gov.au/health-advice/alcohol\n- **World Health Organization (WHO) - SAFER Initiative**: A global alcohol control framework highlighting policy interventions, community action, and treatment services as most effective — https://www.who.int/initiatives/SAFER\n- **Therapeutic Guidelines Australia - Psychosocial interventions for alcohol use disorders**: Evidence-based guidance on comprehensive approaches including psychosocial support — https://tgldcdp.tg.org.au/", "image_path": ""}, {"id": 29314, "date": "2026-02-14T17:44:33+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old man presents with a 2-day history of fever, headache, and myalgia. He returned from a camping trip in rural Victoria one week ago. On examination, he has a temperature of 39.2°C, conjunctival injection, and a faint macular rash on his trunk. Laboratory tests show thrombocytopenia and elevated liver enzymes. Which of the following is the most likely diagnosis?", "options": "A. Dengue fever\nB. Leptospirosis\nC. Rickettsial infection (e.g., Queensland tick typhus)\nD. Epstein-Barr virus infection\nE. Hepatitis A", "answer": "C. Rickettsial infection (e.g., Queensland tick typhus)", "explanation": "### ✅ Correct Answer: C. Rickettsial infection (e.g., Queensland tick typhus)\nThe patient's presentation is classic for a spotted fever group rickettsiosis, such as Queensland tick typhus (caused by *Rickettsia australis*). The key clinical features are:\n1.  **Epidemiology:** History of outdoor activity (camping) in rural Victoria, which is an endemic area for Australian tick typhus.\n2.  **Clinical Triad:** Fever, headache, and myalgia are hallmark symptoms.\n3.  **Key Signs:** The presence of an **eschar** (which may be subtle or absent) is highly suggestive, but the described 'faint macular rash' on the trunk is typical. Conjunctival injection is also a common finding.\n4.  **Laboratory Findings:** Thrombocytopenia and elevated liver enzymes (transaminitis) are characteristic laboratory abnormalities in rickettsial infections.\n5.  **Pathophysiology:** *Rickettsia* are obligate intracellular bacteria transmitted by tick bites. They infect endothelial cells, causing vasculitis, which explains the rash, fever, and potential for multi-organ involvement (e.g., liver).\n\n### ❌ Why the Other Options Are Wrong\n-   **A. Dengue fever**: While dengue causes fever, headache, myalgia ('breakbone fever'), rash, and thrombocytopenia, the classic rash is often petechial or a 'white islands in a red sea' pattern. Severe retro-orbital pain and arthralgia are more prominent. Dengue is not endemic in rural Victoria; it is associated with tropical northern Queensland and international travel to endemic regions.\n-   **B. Leptospirosis**: This can present with fever, headache, myalgia (especially calf pain), conjunctival suffusion (similar to injection), and transaminitis. However, severe leptospirosis often features renal impairment (elevated creatinine) and hyperbilirubinemia, which are not highlighted here. The primary risk factor is exposure to water contaminated by animal urine, not specifically a camping/tick exposure history.\n-   **D. Epstein-Barr virus infection**: Infectious mononucleosis causes fever, headache, and transaminitis. However, it typically presents with prominent pharyngitis, lymphadenopathy (especially posterior cervical), and significant fatigue. Thrombocytopenia is uncommon and not a classic feature. The rash is usually non-specific if present, unless triggered by amoxicillin.\n-   **E. Hepatitis A**: This primarily causes an acute hepatitis syndrome with prominent nausea, vomiting, right upper quadrant pain, jaundice, and very high transaminases (often in the 1000s IU/L). While fever and myalgia can occur in the prodromal phase, the absence of jaundice and the presence of a rash and thrombocytopenia make this unlikely.\n\n### 📚 Relevant Guidelines\n-   **Australian Therapeutic Guidelines (Antibiotic) - Rickettsial infections**: Provides diagnostic criteria and recommended first-line treatment (doxycycline) for spotted fever group rickettsioses in Australia. — https://tgldcdp.tg.org.au/viewTopic?topicfile=rickettsial-infections\n-   **Australian Department of Health - Queensland tick typhus**: Outlines the epidemiology, clinical features, and public health management of this notifiable disease. — https://www.health.gov.au/diseases/queensland-tick-typhus\n-   **UpToDate - Clinical manifestations and diagnosis of spotted fever group rickettsioses**: A detailed review of the global spotted fever group, including Australian-specific pathogens. — https://www.uptodate.com/contents/clinical-manifestations-and-diagnosis-of-spotted-fever-group-rickettsioses", "image_path": ""}, {"id": 29354, "date": "2026-02-15T06:43:55+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old woman presents with irregular heavy periods for the past six months. Prior to this, her menstrual cycle consisted of five days of moderate bleeding every 30 days. She is not currently sexually active and is not using contraception. Her BMI is 27. No abnormality is detected on general and pelvic examinations. Her haemoglobin is 115g/L (115-165). Her cervical screening test four months ago was negative for HPV. Which one of the following is the most likely cause of her symptoms?", "options": "A. Endometrial carcinoma\nB. Anovulatory cycles\nC. Submucous fibroids\nD. Adenomyosis\nE. Endometrial polyps", "answer": "B", "explanation": "### ✅ Correct Answer: B. Anovulatory cycles\n\n**Clinical Reasoning:**\n1. **Patient Profile & Presentation:** A 45-year-old woman (perimenopausal age) with a recent 6-month history of irregular heavy bleeding (menorrhagia/metrorrhagia) after a history of regular cycles. This is a classic presentation of dysfunctional uterine bleeding (DUB) due to anovulation.\n2. **Pathophysiology:** During perimenopause, ovarian follicular activity declines, leading to irregular ovulation. Without ovulation, there is no corpus luteum formation, resulting in unopposed estrogen stimulation of the endometrium. This leads to irregular, asynchronous, and often heavy shedding of the endometrial lining.\n3. **Examination & Investigations:**\n   - Normal pelvic exam: Makes structural causes (large fibroids, significant adenomyosis) less likely.\n   - BMI 27 (overweight, not obese): While obesity is a risk factor for endometrial hyperplasia/carcinoma due to increased peripheral aromatization of androgens to estrogen, her BMI alone is not a strong indicator here, especially with a normal exam.\n   - Hemoglobin 115 g/L: At the lower limit of normal, indicating possible iron deficiency from chronic blood loss, consistent with heavy periods.\n   - Negative HPV/cervical screening: Rules out cervical pathology as a cause.\n4. **Key Diagnostic Point:** In a woman of perimenopausal age with irregular heavy bleeding and a normal pelvic examination, anovulatory cycles (anovulatory DUB) are the most common cause. This is a diagnosis of exclusion after structural and pathological causes are considered less likely based on history and exam.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Endometrial carcinoma**: While age >45 is a risk factor, endometrial cancer typically presents with postmenopausal bleeding. In perimenopausal women, it would be a concern, but it is less likely than anovulatory cycles as the *most common* cause. Key red flags for carcinoma (e.g., very high BMI, history of PCOS, unopposed estrogen therapy) are not strongly present. A normal pelvic exam does not rule it out, but it makes it less probable as the primary cause without other risk factors.\n- **C. Submucous fibroids**: These are a common cause of heavy menstrual bleeding (menorrhagia). However, they often cause *regular* heavy periods, not necessarily the new-onset *irregularity* described. Furthermore, a normal pelvic examination makes the presence of large, clinically detectable fibroids less likely, though small submucous fibroids could be missed on exam and require ultrasound for diagnosis.\n- **D. Adenomyosis**: Typically presents with progressively worsening dysmenorrhea (painful periods) and menorrhagia, often in multiparous women in their 40s. The absence of noted pain on history and a normal pelvic exam (adenomyosis can cause a diffusely enlarged, boggy uterus) makes this less likely as the primary diagnosis.\n- **E. Endometrial polyps**: Can cause intermenstrual or heavy bleeding. However, like fibroids, they might not necessarily cause the cycle irregularity classically seen with anovulation. They are often asymptomatic and are also a possibility, but anovulation is statistically more common in this age group presenting with this pattern.\n\n### 📚 Relevant Guidelines\n\n- **RACGP - Management of heavy menstrual bleeding (2021)**: Provides a diagnostic approach to heavy menstrual bleeding, emphasizing history, examination, and appropriate investigations. It highlights that anovulatory cycles are common in adolescents and perimenopausal women. — https://www.racgp.org.au/afp/2021/september/heavy-menstrual-bleeding\n- **Therapeutic Guidelines (eTG) - Gynaecology**: Details the evaluation and management of abnormal uterine bleeding, including the role of pelvic ultrasound and endometrial biopsy in perimenopausal women. — https://tgldcdp.tg.org.au/etgAccess\n- **American College of Obstetricians and Gynecologists (ACOG) - Diagnosis of Abnormal Uterine Bleeding in Reproductive-Aged Women (Practice Bulletin No. 128, 2023)**: Provides a structured PALM-COEIN classification system for causes. This patient's presentation fits \"Ovulatory Dysfunction\" (O) in the COEIN half of the acronym. — https://www.acog.org/clinical/clinical-guidance/practice-bulletin/articles/2023/07/diagnosis-of-abnormal-uterine-bleeding-in-reproductive-aged-women", "image_path": ""}, {"id": 29366, "date": "2026-02-15T10:23:45+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "73-year-old woman had a three-day history of constipation, no passage of fecal or gas for 72 hours, abdomen distended, CT scan description was given which is like 11 cm dilated cecum, entirely dilated large intestine with a stenotic lesion at sigmoid, rectum empty. Most appropriate treatment.", "options": "1. stent colostomy.\n2. cecal colostomy.\n3. sigmoid colectomy.", "answer": "3. sigmoid colectomy.", "explanation": "### ✅ Correct Answer: 3. sigmoid colectomy.\nThis patient presents with acute large bowel obstruction secondary to a stenotic lesion at the sigmoid colon, likely due to malignancy (most common cause in this age group). The CT findings are classic for a closed-loop obstruction with a competent ileocecal valve, leading to massive cecal dilation (11 cm). A cecal diameter >10-12 cm is a critical risk factor for impending perforation and cecal ischemia. The definitive and most appropriate treatment for a patient with a localized, resectable obstructing lesion in the sigmoid colon, who is not in extremis, is a sigmoid colectomy (with primary anastomosis or Hartmann's procedure, depending on intraoperative findings and patient stability). This addresses the cause, removes the tumor, and relieves the obstruction. In the context of the AMC exam, for a patient with localized disease, reasonable fitness, and high risk of perforation, resection is preferred over diversion alone.\n\n### ❌ Why the Other Options Are Wrong\n- **1. stent colostomy.**: This is incorrect. A colonic stent is typically used as a *bridge to surgery* in elective settings or for palliation in patients with metastatic disease or prohibitive surgical risk. It is not the definitive treatment for a resectable lesion in a patient who is a surgical candidate, especially with signs of impending perforation (cecal dilation >10 cm). Stenting carries risks of perforation itself and does not address the underlying malignancy.\n- **2. cecal colostomy.**: This is incorrect. A cecostomy or cecal colostomy is a decompressive procedure that does not address the primary pathology (the stenotic sigmoid lesion). It leaves the obstructing cancer in place and is generally reserved for patients who are critically ill and cannot tolerate a definitive resection. Given the patient's presentation (3-day history, not described as septic or in shock), definitive surgery is the standard of care.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Gastrointestinal (eTG)**: Management of large bowel obstruction and colorectal cancer — https://tgldcdp.tg.org.au/viewTopic?topicfile=colorectal-cancer&guidelineName=Gastrointestinal#toc_d1e289\n- **Royal Australasian College of Surgeons (RACS)**: Guidelines on the management of obstructing colorectal cancer — https://www.surgeons.org/media/3kfq0nwz/2019-11-12_fellowship_guide_colorectal_cancer.pdf\n- **UpToDate**: Acute colonic pseudo-obstruction (Ogilvie's syndrome) and management of large bowel obstruction — https://www.uptodate.com/contents/acute-colonic-pseudo-obstruction-ogilvies-syndrome", "image_path": ""}, {"id": 29371, "date": "2026-02-15T10:41:13+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 21-year-old primigravid woman presents with a two day history of lower abdominal pain. She is currently 14 weeks gestation. She is otherwise well and eating normally. At the time of her previous antenatal visit at 11 weeks gestation, her uterus was noted to be retroverted but of expected size. On examination her BP is 105/65 mmHg, pulse 76/min and temperature is 37.8°C. Which one of the following is the most likely diagnosis?", "options": "A. Impaction of a retroverted gravid uterus\nB. Urinary tract infection\nC. Complication of a corpus luteum cyst\nD. Tubal ectopic pregnancy\nE. Acute appendicitis", "answer": "A. Impaction of a retroverted gravid uterus", "explanation": "### ✅ Correct Answer: A. Impaction of a retroverted gravid uterus\nThis is a classic presentation of an incarcerated/impacted retroverted gravid uterus. The key clues are: 1) **Gestational age (14 weeks)**: The uterus normally ascends out of the pelvis between 12-16 weeks. A retroverted uterus can become trapped in the sacral hollow, causing impaction. 2) **History of retroversion at 11 weeks**: This is a known risk factor. 3) **Symptoms**: Lower abdominal pain, often with urinary symptoms (retention, frequency), though not explicitly stated here. 4) **Vital signs**: Mild low-grade fever (37.8°C) can be present due to urinary stasis or low-grade inflammation, but the patient is hemodynamically stable, arguing against acute surgical pathology like appendicitis or ruptured ectopic. The pain is lower abdominal, not migratory to the right iliac fossa (appendicitis). At 14 weeks, a tubal ectopic would likely have ruptured, causing significant hemorrhage and instability. A corpus luteum cyst typically regresses by 10-12 weeks and is less likely to cause new pain at 14 weeks.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Urinary tract infection**: While UTI is common in pregnancy and can cause lower abdominal pain and low-grade fever, the specific history of a known retroverted uterus at 11 weeks makes impaction a more direct and likely diagnosis. UTIs more commonly present with dysuria, urgency, and frequency, which are not mentioned.\n- **C. Complication of a corpus luteum cyst**: The corpus luteum supports pregnancy until 8-10 weeks, after which the placenta takes over. By 14 weeks, it has usually regressed. Complications like hemorrhage or torsion are rare at this stage and would not be linked to the known uterine retroversion.\n- **D. Tubal ectopic pregnancy**: This is highly unlikely at 14 weeks gestation. An ectopic pregnancy would typically rupture well before this, causing severe pain, hemodynamic instability (tachycardia, hypotension), and signs of intraperitoneal bleeding. The patient is stable with normal vitals.\n- **E. Acute appendicitis**: Appendicitis pain classically starts periumbilically and migrates to the right iliac fossa (McBurney's point). The description is of lower abdominal pain without migration. While appendicitis can occur in pregnancy, the specific clue of the retroverted uterus points more strongly to impaction.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Obstetrics & Gynaecology (eTG)**: Management of common pregnancy complications and pelvic pain in early pregnancy — https://tgldcdp.tg.org.au/viewTopic?topicfile=gynaecological-pain&guidelineName=Women%27s%20Health\n- **RANZCOG (Royal Australian and New Zealand College of Obstetricians and Gynaecologists)**: Management of early pregnancy complications — https://ranzcog.edu.au/womens-health/patient-information-resources/early-pregnancy-complications\n- **UpToDate**: Incarceration of the gravid uterus — https://www.uptodate.com/contents/incarceration-of-the-gravid-uterus", "image_path": ""}, {"id": 29422, "date": "2026-02-16T14:23:06+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old man presents with a 3-day history of painful rash on his left flank. The rash consists of grouped vesicles on an erythematous base, following a dermatomal distribution. He describes a burning pain that started 2 days before the rash appeared. He has no significant past medical history. What is the most appropriate management?", "options": "A. Oral acyclovir\nB. Topical acyclovir cream\nC. Oral valacyclovir\nD. Intravenous acyclovir\nE. Oral famciclovir", "answer": "C. Oral valacyclovir", "explanation": "### ✅ Correct Answer: C. Oral valacyclovir\n\n**Clinical Reasoning:**\n1. **Diagnosis:** The presentation is classic for herpes zoster (shingles) - prodromal burning pain followed by unilateral dermatomal vesicular rash.\n2. **Timing:** Treatment is most effective when started within 72 hours of rash onset. This patient presents within this window (3-day history).\n3. **Treatment Goals:** Reduce acute pain, accelerate healing, and potentially reduce the risk of postherpetic neuralgia.\n4. **Agent Selection:** Oral valacyclovir is preferred over oral acyclovir due to its superior bioavailability (54% vs 10-20%), allowing for less frequent dosing (three times daily vs five times daily) and better compliance. Famciclovir is also appropriate but valacyclovir is often first-line in Australian guidelines.\n5. **Severity Assessment:** The patient has no signs of disseminated disease, ocular involvement (if V1 distribution), or immunosuppression, so oral therapy is sufficient. IV acyclovir is reserved for severe cases, immunocompromised patients, or CNS involvement.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Oral acyclovir**: While effective, it has poor bioavailability requiring frequent dosing (5 times daily) and is generally less preferred than valacyclovir or famciclovir for immunocompetent adults.\n- **B. Topical acyclovir cream**: Topical antivirals have limited penetration and are ineffective for treating herpes zoster; systemic therapy is required.\n- **D. Intravenous acyclovir**: Reserved for severe cases (disseminated disease, immunocompromised patients, CNS involvement, or ophthalmic involvement with severe disease). This immunocompetent patient with localized dermatomal rash does not meet criteria for IV therapy.\n- **E. Oral famciclovir**: This is also an appropriate first-line treatment (500mg three times daily for 7 days). However, between options C and E, valacyclovir is often listed as preferred in guidelines due to extensive evidence and dosing convenience. The distinction in an exam context often comes down to the specific wording - valacyclovir is typically the 'most appropriate' first-line choice.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Dermatology**: Herpes zoster (shingles) management in immunocompetent adults — recommends oral valacyclovir 1g three times daily for 7 days OR famciclovir 250mg three times daily for 7 days, started within 72 hours of rash onset. https://tgldcdp.tg.org.au/viewTopic?topicfile=herpes-virus-infections&guidelineName=Dermatology#toc_d1e289\n- **RACGP - Herpes zoster**: Clinical guidance for diagnosis and management in primary care — emphasizes early antiviral treatment to reduce complications. https://www.racgp.org.au/afp/2012/september/herpes-zoster\n- **Australian Prescriber - Managing herpes zoster in primary care**: Review of treatment options and evidence — confirms valacyclovir and famciclovir as preferred over acyclovir. https://www.nps.org.au/australian-prescriber/articles/managing-herpes-zoster-in-primary-care", "image_path": "photo_2026-02-16_14-23-06.jpg"}, {"id": 29454, "date": "2026-02-17T04:44:41+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Which one is first line treatment for eosinophilic esophagitis: PPI or steroid?", "options": "A. Proton pump inhibitor (PPI)\nB. Steroid (e.g., fluticasone)", "answer": "A. Proton pump inhibitor (PPI)", "explanation": "### ✅ Correct Answer: A. Proton pump inhibitor (PPI)\nEosinophilic esophagitis (EoE) is a chronic, immune-mediated inflammatory condition of the esophagus. The current evidence-based, stepwise approach to initial management is to first rule out or treat potential contributing factors, with a PPI trial being the cornerstone. This is because:\n1.  **PPI-Responsive Esophageal Eosinophilia (PPI-REE):** A significant subset of patients with esophageal eosinophilia have symptoms and histologic findings that resolve completely with PPI therapy alone. This entity is now considered part of the EoE spectrum. A high-dose PPI trial (e.g., omeprazole 40mg daily) for 8 weeks is both diagnostic and therapeutic.\n2.  **Pathophysiology:** PPIs may work not only by acid suppression but also through direct anti-inflammatory effects on the esophageal epithelium.\n3.  **Standard Clinical Pathway:** Major guidelines (see below) recommend starting with an 8-week trial of high-dose PPI. Endoscopic and histologic re-evaluation is performed after this trial. If eosinophil counts remain high (>15 per high-power field), the diagnosis of PPI-refractory EoE is confirmed, and topical corticosteroids become the first-line *specific* pharmacologic therapy.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Steroid (e.g., fluticasone)**: Topical swallowed corticosteroids (fluticasone or budesonide) are highly effective first-line *specific* pharmacologic therapy **for confirmed PPI-refractory EoE**. However, they are not the absolute first step. Initiating steroids without a prior PPI trial would miss diagnosing and effectively treating patients with PPI-REE, potentially leading to unnecessary long-term steroid use. Therefore, while steroids are a first-line *EoE-specific drug*, the PPI trial comes first in the overall management algorithm.\n\n### 📚 Relevant Guidelines\n- **[American Gastroenterological Association (AGA) Institute and Joint Task Force on Allergy-Immunology Practice Parameters]**: Clinical Practice Update on the Management of Eosinophilic Esophagitis — Provides the stepwise algorithm starting with PPI trial, then dietary elimination or topical steroids. [https://www.gastrojournal.org/article/S0016-5085(20)30229-2/fulltext](https://www.gastrojournal.org/article/S0016-5085(20)30229-2/fulltext)\n- **[UpToDate]**: Treatment of eosinophilic esophagitis — Details the evidence for the PPI-first approach and subsequent therapies. [https://www.uptodate.com/contents/treatment-of-eosinophilic-esophagitis](https://www.uptodate.com/contents/treatment-of-eosinophilic-esophagitis)\n- **[Therapeutic Guidelines (eTG) Australia]**: While the RACGP/Handbook may have a concise summary, eTG provides detailed therapeutic advice. Searching \"eosinophilic esophagitis\" in eTG would align with the international stepwise approach, acknowledging the role of PPIs. [https://tgldcdp.tg.org.au/](https://tgldcdp.tg.org.au/)", "image_path": ""}, {"id": 29475, "date": "2026-02-17T09:33:55+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "What will we choose?", "options": "A. PPI followed by topical budesonide if the symptoms persist\nB. Endoscopy and biopsy\nC. PPI therapy alone\nD. Topical steroids alone\nE. H2 receptor antagonists", "answer": "A. PPI followed by topical budesonide if the symptoms persist", "explanation": "### ✅ Correct Answer: A. PPI followed by topical budesonide if the symptoms persist\n\n**Clinical Reasoning:**\n1. **Initial Presentation:** A patient with chronic GERD symptoms (heartburn, regurgitation) should first be managed empirically with a PPI (e.g., omeprazole, pantoprazole). This is standard first-line therapy for suspected GERD and serves as both a diagnostic and therapeutic trial.\n2. **Failure of Initial Therapy:** If symptoms persist despite 8 weeks of adequate PPI therapy, this raises suspicion for **Eosinophilic Oesophagitis (EoE)** or other causes of refractory symptoms.\n3. **Diagnostic Pathway:** The next step is **upper endoscopy with biopsies** (multiple biopsies from proximal and distal oesophagus) to confirm the diagnosis of EoE (≥15 eosinophils per high-power field).\n4. **First-line Treatment for EoE:** Once EoE is confirmed, the **first-line pharmacological treatment is topical (swallowed) corticosteroids** (fluticasone or budesonide). These are superior to continued PPI therapy alone for inducing histological remission in EoE.\n5. **Stepwise Approach:** Therefore, the correct sequence is: **PPI trial → if symptoms persist → endoscopy/biopsy → if EoE confirmed → topical corticosteroids.** Option A accurately captures this stepwise, evidence-based management approach.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Endoscopy and biopsy**: While this is the diagnostic gold standard for EoE, it is not the *first* step. Current guidelines recommend an initial 8-week PPI trial for patients with typical GERD symptoms before proceeding to endoscopy, unless alarm features (dysphagia, weight loss, bleeding) are present.\n- **C. PPI therapy alone**: PPIs are first-line for GERD and may induce remission in some patients with EoE (PPI-responsive oesophageal eosinophilia). However, for confirmed EoE with persistent symptoms, topical corticosteroids are first-line. PPI monotherapy is insufficient as definitive treatment for EoE.\n- **D. Topical steroids alone**: Topical corticosteroids are first-line for *confirmed* EoE. However, initiating them without a prior PPI trial or endoscopic confirmation is not standard. The PPI trial is an important initial step to rule out PPI-responsive conditions and avoid unnecessary steroid use.\n- **E. H2 receptor antagonists**: H2RAs (e.g., ranitidine) are less effective than PPIs for both GERD and EoE. They are not recommended as first-line therapy in this context and have a limited role in modern management algorithms.\n\n### 📚 Relevant Guidelines\n- **[Australian Therapeutic Guidelines (eTG) – Gastroenterology]**: Provides stepwise management for dyspepsia/GERD and outlines the diagnostic pathway for refractory symptoms, including consideration of EoE. — https://tgldcdp.tg.org.au/viewTopic?topicfile=gastrointestinal-problems-dyspepsia\n- **[RACGP – Managing reflux and dyspepsia in adults]**: Australian primary care guideline recommending initial PPI trial and indications for referral for endoscopy. — https://www.racgp.org.au/afp/2019/june/managing-reflux-and-dyspepsia-in-adults/\n- **[International Consensus Guidelines for Eosinophilic Oesophagitis (AGREE)]**: States that after failed PPI trial, endoscopy with biopsies is indicated for diagnosis, and topical corticosteroids are first-line therapy for EoE. — https://pubmed.ncbi.nlm.nih.gov/29306940/", "image_path": "photo_2026-02-17_09-33-55.jpg"}, {"id": 29594, "date": "2026-02-19T11:35:23+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A mother presents with her 4-year-old daughter because she is concerned about her daughter's \"abnormal genitalia”. On examination there is fusion of the labia majora. Which one of the following is the most appropriate management?", "options": "A. Examination under anaesthesia\nB. Local corticosteroid ointment\nC. Local oestrogen cream\nD. Incision of fused labia\nE. Review in 6 months", "answer": "C", "explanation": "### ✅ Correct Answer: C. Local oestrogen cream\n\nThis is a classic presentation of **labial adhesions (labial fusion)** in a prepubertal girl. The condition occurs due to low oestrogen levels in childhood, which makes the vulvar epithelium thin and susceptible to inflammation and microtrauma. This leads to the formation of a thin, avascular midline membrane that fuses the labia minora (and sometimes appears to involve the labia majora).\n\n**Clinical Reasoning:**\n1.  **Pathophysiology:** The low oestrogen state of prepubertal girls is the key. Oestrogen promotes epithelial maturation, thickness, and glycogen production. Its absence makes the tissue fragile.\n2.  **Diagnosis:** The diagnosis is clinical. The fusion is typically a thin, translucent, midline membrane with a visible raphe. It is almost always asymptomatic but causes parental concern about appearance or potential urinary issues (e.g., spraying, dribbling).\n3.  **Management:** First-line treatment is **topical oestrogen cream (e.g., conjugated oestrogen cream)** applied sparingly to the line of fusion for 2–6 weeks. The oestrogen thickens and cornifies the epithelium, causing the adhesions to separate spontaneously in the majority of cases. Parental education on gentle application and the expectation of resolution is crucial.\n4.  **AMC Pearl:** This is a common, benign condition managed conservatively. Surgical intervention is reserved for rare, complex cases or when medical therapy fails and the child is symptomatic.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Examination under anaesthesia:** This is overly invasive for a condition that is almost always diagnosed clinically and managed medically. EUA is reserved for cases where there is diagnostic uncertainty (e.g., concern for ambiguous genitalia, imperforate hymen) or severe urinary retention, which is not described here.\n- **B. Local corticosteroid ointment:** While potent topical corticosteroids are sometimes used for inflammatory vulvar conditions like lichen sclerosus, they are not the first-line treatment for simple labial adhesions. Their role is less established than oestrogen cream for this specific condition.\n- **D. Incision of fused labia:** Surgical separation (manual or sharp) is **contraindicated** as first-line management. It is painful, carries risks of infection and bleeding, and adhesions frequently recur if the underlying low-oestrogen state is not addressed. It is a last resort for refractory, symptomatic cases.\n- **E. Review in 6 months:** While a period of observation can be reasonable for asymptomatic, minor adhesions, the mother is explicitly concerned. Active management with reassurance and topical oestrogen is the standard of care to address the concern and resolve the condition. Passive observation misses an effective, simple treatment opportunity.\n\n### 📚 Relevant Guidelines\n- **[The Royal Children's Hospital Melbourne - Clinical Practice Guideline: Labial Adhesions]**: Provides a clear diagnostic and management algorithm for labial adhesions, recommending topical oestrogen as first-line treatment. — https://www.rch.org.au/clinicalguide/guideline_index/Labial_adhesions/\n- **[American Academy of Pediatrics - Clinical Report: Evaluation and Management of Labial Adhesions in Prepubertal Girls]**: A comprehensive review affirming the use of topical oestrogen cream as the primary medical therapy. — https://publications.aap.org/pediatrics/article/138/6/e20162903/60510/Clinical-Report-Evaluation-and-Management-of\n- **[UpToDate: Labial adhesions]**: A detailed, evidence-based summary of the condition, its etiology, and management, confirming topical estrogen as first-line therapy. — https://www.uptodate.com/contents/labial-adhesions", "image_path": ""}, {"id": 29619, "date": "2026-02-19T19:56:07+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 6-year-old girl presents with labial fusion. She is otherwise well and asymptomatic. What is the most appropriate management?", "options": "A. Surgical separation under general anaesthesia\nB. Topical betamethasone cream\nC. Topical fusidic acid cream\nD. Topical testosterone cream\nE. Reassurance and observation", "answer": "E. Reassurance and observation", "explanation": "### ✅ Correct Answer: E. Reassurance and observation\nLabial fusion (labial adhesions) in prepubertal girls is a common, benign condition caused by hypoestrogenic state. The adhesions are typically thin, midline, and asymptomatic. In an asymptomatic child with no urinary symptoms (like urinary retention, spraying, or recurrent UTIs), the standard management is reassurance and observation. Most cases resolve spontaneously with the onset of puberty due to increased endogenous estrogen. Active intervention is only indicated if there are complications such as urinary symptoms, discomfort, or recurrent local infections.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Surgical separation under general anaesthesia**: Surgical intervention is rarely indicated and considered a last resort due to risks of anaesthesia, pain, and high recurrence rates without concomitant estrogen therapy. It is not appropriate for an asymptomatic case.\n- **B. Topical betamethasone cream**: Topical corticosteroids are not standard treatment for labial fusion. They are used for inflammatory dermatoses (e.g., lichen sclerosus) but not for simple, asymptomatic adhesions.\n- **C. Topical fusidic acid cream**: Fusidic acid is an antibiotic used for bacterial skin infections (e.g., impetigo). There is no evidence of infection in this scenario, making antibiotic treatment unnecessary and inappropriate.\n- **D. Topical testosterone cream**: Testosterone cream is not used for labial fusion. Topical estrogen cream (not testosterone) is a second-line medical treatment if intervention is required for symptomatic cases, but it is not first-line for asymptomatic patients.\n\n### 📚 Relevant Guidelines\n- **Royal Children's Hospital Melbourne Clinical Practice Guidelines**: Management of Labial Adhesions — Provides clear guidance on conservative management for asymptomatic cases and indications for treatment. https://www.rch.org.au/clinicalguide/guideline_index/Labial_adhesions/\n- **American Academy of Pediatrics (AAP) Clinical Report**: Evaluation and Management of Labial Adhesions in Prepubertal Girls — Recommends observation for asymptomatic adhesions and outlines medical treatment options when necessary. https://publications.aap.org/pediatrics/article/146/6/e2020014071/92417/Clinical-Report-Evaluation-and-Management-of\n- **Therapeutic Guidelines (eTG)**: Dermatology chapter — Discusses management of common paediatric dermatological conditions, including principles of when to treat. https://tgldcdp.tg.org.au/", "image_path": "photo_2026-02-19_19-56-07.jpg"}, {"id": 29628, "date": "2026-02-20T01:30:29+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "What is the management for multiple small pulmonary emboli if the patient is already on enoxaparin?", "options": "A. Continue enoxaparin and add warfarin, then stop enoxaparin once INR is therapeutic\nB. Stop enoxaparin and start rivaroxaban\nC. Continue enoxaparin alone as long-term therapy\nD. Insert an inferior vena cava filter\nE. Continue enoxaparin and arrange for urgent pulmonary embolectomy", "answer": "A. Continue enoxaparin and add warfarin, then stop enoxaparin once INR is therapeutic", "explanation": "### ✅ Correct Answer: A. Continue enoxaparin and add warfarin, then stop enoxaparin once INR is therapeutic\nFor a patient diagnosed with pulmonary embolism (PE) who is already on therapeutic enoxaparin, the standard management is to overlap enoxaparin with a vitamin K antagonist (warfarin) for at least 5 days and until the INR is ≥2.0 for 24 hours. This is because warfarin has an initial pro-thrombotic effect by reducing proteins C and S before fully inhibiting factors II, VII, IX, and X. Stopping enoxaparin immediately upon starting warfarin can lead to thrombosis extension or recurrence. The patient should be bridged safely. For multiple small PEs, the treatment principle is the same as for a larger PE, provided the patient is haemodynamically stable.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Stop enoxaparin and start rivaroxaban**: Direct oral anticoagulants (DOACs) like rivaroxaban are first-line for many PEs. However, if a patient is already stabilised on therapeutic enoxaparin, switching abruptly is not the standard protocol. The correct approach would be to stop enoxaparin and start the DOAC at the time the next enoxaparin dose is due, but this option does not specify this safe transition and is less precise than the established bridging protocol with warfarin in this specific scenario.\n- **C. Continue enoxaparin alone as long-term therapy**: Long-term therapy with low-molecular-weight heparin (LMWH) like enoxaparin is reserved for specific situations (e.g., cancer-associated thrombosis, severe renal impairment, pregnancy). It is not the standard long-term therapy for most patients with PE due to cost, inconvenience, and similar efficacy of oral agents.\n- **D. Insert an inferior vena cava filter**: IVC filters are indicated when there is a contraindication to anticoagulation (e.g., active major bleeding) or if recurrent PE occurs despite adequate anticoagulation. They are not first-line management for a patient who can tolerate and is already on anticoagulation.\n- **E. Continue enoxaparin and arrange for urgent pulmonary embolectomy**: Surgical or catheter-directed embolectomy is reserved for massive PE with haemodynamic instability (e.g., hypotension, shock) or failure of thrombolysis. 'Multiple small PEs' in a patient already on enoxaparin suggests stability, not an indication for invasive intervention.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Cardiovascular: Venous thromboembolism**: Provides detailed algorithms for initiation and bridging of anticoagulation for PE, including overlap therapy. https://tgldcdp.tg.org.au/etgAccess\n- **American Society of Hematology (ASH) 2020 Guidelines for Management of Venous Thromboembolism**: Recommends overlapping parenteral anticoagulation with a VKA for at least 5 days. https://www.ashpublications.org/blood/article/136/19/2124/461696/American-Society-of-Hematology-2020-guidelines-for\n- **National Institute for Health and Care Excellence (NICE) CG144 - Venous thromboembolic diseases**: Covers diagnosis, management, and follow-up of PE, including treatment initiation. https://www.nice.org.uk/guidance/cg144", "image_path": ""}, {"id": 29665, "date": "2026-02-20T10:35:03+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "An 89-year-old hostel resident takes amitriptyline and temazepam. Which medication is most concerning in older adults?", "options": "A. Amlodipine\nB. Perindopril\nC. Frusemide\nD. Amitriptyline\nE. Temazepam", "answer": "D. Amitriptyline", "explanation": "### ✅ Correct Answer: D. Amitriptyline\n\nAmitriptyline is a tricyclic antidepressant (TCA) that is strongly discouraged for use in older adults due to its potent anticholinergic, sedative, and orthostatic hypotensive effects. In the elderly, these side effects significantly increase the risk of:\n1.  **Falls and Fractures:** Anticholinergic effects cause confusion, sedation, and blurred vision. Orthostatic hypotension increases dizziness. Combined with the sedative effects of temazepam, the fall risk is multiplicative.\n2.  **Cognitive Impairment:** Strong anticholinergic medications are linked to accelerated cognitive decline and delirium.\n3.  **Cardiac Toxicity:** TCAs can cause QT prolongation and arrhythmias, which are more dangerous in an older population.\n4.  **Beers Criteria:** Amitriptyline is explicitly listed as a \"Potentially Inappropriate Medication\" in the American Geriatrics Society Beers Criteria® and is similarly flagged in Australian guidelines (e.g., NPS MedicineWise, RACGP). The key principle is to avoid medications with high anticholinergic burden in the elderly. While temazepam (Option E) is also concerning and should be avoided due to increased sedation and fall risk, amitriptyline typically carries a higher overall risk profile due to its multiple adverse effect mechanisms.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Amlodipine**: A calcium channel blocker commonly used for hypertension. While it can cause peripheral oedema and dizziness, it is not considered a high-risk medication in the same category as strong anticholinergics or long-acting benzodiazepines for the elderly. Dose adjustment is key.\n- **B. Perindopril**: An ACE inhibitor used for hypertension and heart failure. It is generally safe in the elderly but requires monitoring for renal function, hyperkalaemia, and hypotension (especially first-dose). It is not flagged as a \"most concerning\" medication in standard geriatric prescribing guides.\n- **C. Frusemide**: A loop diuretic. Concerns include dehydration, electrolyte disturbances (hypokalaemia, hyponatraemia), and incontinence. It requires careful monitoring but is often necessary for conditions like heart failure. The risk is manageable with supervision and is not primarily anticholinergic or centrally sedating.\n- **E. Temazepam**: A benzodiazepine. It is indeed concerning in older adults due to increased sensitivity, leading to sedation, cognitive impairment, delirium, and falls. It is also on the Beers Criteria list. However, when compared directly with amitriptyline in this question, amitriptyline is often considered *more* concerning because it adds significant anticholinergic burden to the sedative burden, creating a \"perfect storm\" for adverse events. The question asks for the \"most concerning,\" and the combination of high anticholinergic burden + sedation typically tips the scale toward the TCA.\n\n### 📚 Relevant Guidelines\n- **American Geriatrics Society Beers Criteria®**: Internationally recognized list of Potentially Inappropriate Medications (PIMs) for older adults. Strongly recommends avoiding tertiary amine TCAs like amitriptyline and benzodiazepines. — [https://doi.org/10.1111/jgs.18372](https://doi.org/10.1111/jgs.18372)\n- **NPS MedicineWise (Australia) - Anticholinergic burden**: Provides a clinical tool and guidance on assessing and reducing anticholinergic burden, explicitly listing amitriptyline as a high-risk medication. — [https://www.nps.org.au/news/anticholinergic-burden](https://www.nps.org.au/news/anticholinergic-burden)\n- **Therapeutic Guidelines (eTG) - Psychotropic**: Australian guidelines advise against using TCAs like amitriptyline as first-line for depression in the elderly due to adverse effects and recommend safer alternatives like SSRIs. — [https://tgldcdp.tg.org.au/](https://tgldcdp.tg.org.au/)", "image_path": ""}, {"id": 29688, "date": "2026-02-20T16:56:17+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 9-year-old girl is seen in general practice because of parental concern about her frequent upper respiratory tract infections over the last 18 months. Her height and weight are appropriate for her age. Physical examination is normal.\n\nA full blood count shows:-\n\nHaemoglobin 102 g/L (115-155)\nMean Cell Volume 69 fL (80-100)\nMean Cell Haemoglobin 26 pg (27-32)\nWhite Cell Count 8.4 x 109/L (4.0-11.0)\nPlatelet count 320 x 109/L (150-400)\nWhich one of the following is the most appropriate next investigation?", "options": "Red cell folate\nSerum Vitamin B12\nSweat test\nSerum ferritin\nSerum immunoglobulin", "answer": "D. Serum ferritin", "explanation": "### ✅ Correct Answer: D. Serum ferritin\n\n**Clinical Reasoning:**\n1. **Pattern Recognition:** The FBC shows a microcytic hypochromic anemia (Hb 102 g/L, MCV 69 fL, MCH 26 pg). This is the classic hematological picture of iron deficiency anemia.\n2. **Patient Context:** A 9-year-old girl with normal growth parameters and frequent URIs. Iron deficiency is the most common cause of anemia in this age group worldwide, often due to inadequate dietary intake, growth spurts, or menarche (though less likely at 9). The frequent infections could be a red herring or a consequence of mild immune dysfunction from chronic anemia, but they are not the primary diagnostic clue.\n3. **Diagnostic Pathway:** For confirmed microcytic hypochromic anemia, the first-line investigation is to assess iron stores. Serum ferritin is the most sensitive and specific single test for diagnosing iron deficiency (low ferritin = low iron stores). It is the recommended initial test in Australian paediatric guidelines.\n4. **Why Not Other Causes of Microcytosis?** While thalassemia trait is a differential, the clinical scenario (frequent infections, no mention of ethnicity/family history) and the degree of microcytosis and anemia are more suggestive of iron deficiency. Serum ferritin will confirm this. If ferritin is normal, hemoglobin electrophoresis (for thalassemia) would be the next logical step, but it's not listed.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Red cell folate**: This investigates macrocytic anemia (folate deficiency), not microcytic anemia. The MCV is low, not high.\n- **B. Serum Vitamin B12**: Also investigates macrocytic anemia (B12 deficiency). It is not indicated for a microcytic picture.\n- **C. Sweat test**: This is the diagnostic test for cystic fibrosis (CF). While children with CF can have frequent respiratory infections and sometimes nutritional deficiencies leading to anemia, the presentation here is not typical (normal growth, only URIs, no chronic cough/gastrointestinal symptoms). It is not the first-line test for isolated microcytic anemia.\n- **E. Serum immunoglobulin**: This would investigate an underlying immunodeficiency causing frequent infections. While the history mentions frequent URIs, the child has normal growth and a normal physical exam, making severe primary immunodeficiency less likely. The key abnormal finding is the anemia, which should be investigated first. Investigating the infections without addressing the clear hematological abnormality is not the most appropriate next step.\n\n### 📚 Relevant Guidelines\n- **RACGP - Red Book (Guidelines for preventive activities in general practice)**: Includes guidance on iron deficiency screening in children — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/red-book\n- **Therapeutic Guidelines (eTG) - Haematology**: Provides diagnostic algorithms for iron deficiency anemia — https://tgldcdp.tg.org.au/etgAccess\n- **Royal Children's Hospital Melbourne - Clinical Practice Guideline on Iron Deficiency**: Provides detailed investigation and management pathways for children — https://www.rch.org.au/clinicalguide/guideline_index/Iron_deficiency/", "image_path": ""}, {"id": 29690, "date": "2026-02-20T17:06:35+00:00", "source_group": "", "stem": "A 75-year-old woman with a history of depression, hypertension, and chronic constipation is brought to the emergency department by her family. Over the past week, she has become increasingly confused, agitated, and has been experiencing visual hallucinations. She has also complained of a dry mouth, blurred vision, and difficulty passing urine. On examination, she is tachycardic, has dilated pupils, and is found to have a distended bladder. Her medication list includes amitriptyline, oxybutynin, and diphenhydramine (for sleep). Which of the following is the most likely underlying mechanism for her presentation?", "options": "A. Excessive dopaminergic activity in the mesolimbi
