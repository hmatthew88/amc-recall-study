ong finger flexors and quadriceps is a hallmark of IBM.\n3. **Examination Findings**: Mild muscle wasting is consistent with chronic myopathy.\n4. **Absence of Rash**: No skin rash excludes dermatomyositis.\n5. **Investigations**: \n   - Mild CK elevation (typical for IBM, unlike polymyositis/dermatomyositis which often have significant elevation).\n   - EMG shows myopathic changes (consistent with all inflammatory myopathies).\n   - **Muscle biopsy showing rimmed vacuoles** is the pathological hallmark of IBM.\n6. **Treatment Response**: Poor response to corticosteroids is characteristic of IBM, which is generally refractory to immunosuppressive therapy, unlike other inflammatory myopathies.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Polymyositis**: Typically presents with subacute proximal symmetric weakness, significant CK elevation, and usually responds to corticosteroids. The chronic progressive course, specific pattern of weakness (finger flexors), rimmed vacuoles on biopsy, and poor steroid response argue against polymyositis.\n- **B. Dermatomyositis**: Characterized by skin manifestations (heliotrope rash, Gottron's papules) which are absent here. The weakness pattern is typically symmetric and proximal. The biopsy would show perifascicular atrophy, not rimmed vacuoles.\n- **C. Immune-mediated necrotizing myopathy**: Presents with acute/subacute severe weakness, very high CK levels, and biopsy shows necrotic fibers without inflammation or rimmed vacuoles. Typically associated with statin use or anti-SRP/anti-HMGCR antibodies. The chronic course and biopsy findings are inconsistent.\n- **E. Antisynthetase syndrome**: Characterized by myositis, interstitial lung disease, fever, Raynaud's phenomenon, mechanic's hands, and arthritis. The absence of these systemic features and the specific biopsy findings make this unlikely.\n\n### 📚 Relevant Guidelines\n- **[UpToDate - Inclusion Body Myositis]**: Comprehensive review of clinical features, diagnosis, and management of IBM — https://www.uptodate.com/contents/inclusion-body-myositis\n- **[Muscle & Nerve Journal - 119th ENMC International Workshop]**: Diagnostic criteria and management guidelines for inclusion body myositis — https://onlinelibrary.wiley.com/doi/10.1002/mus.20766\n- **[Therapeutic Guidelines - Neurology]**: Australian guidelines for the management of inflammatory myopathies — https://tgldcdp.tg.org.au/viewTopic?topicfile=inflammatory-myopathies&guidelineName=Neurology#toc_d1e289", "image_path": ""}, {"id": 34347, "date": "2026-02-03T06:01:54+00:00", "stem": "An 8-year-old girl presents with recurrent abdominal pain for several months, often missing school. There is no tenderness, normal urinalysis, and no systemic features. What is the most appropriate next step?", "options": "a. Abdominal ultrasound\nb. CT scan\nc. MRI abdomen\nd. No further investigation – reassurance\ne. Stool culture", "answer": "A", "explanation": "### ✅ Correct Answer: a. Abdominal ultrasound\n\nThis child presents with **recurrent abdominal pain (RAP)** fulfilling Apley's criteria: pain occurring at least once per month for 3 consecutive months, severe enough to affect activities (missing school), with no identifiable organic cause after initial assessment (no tenderness, normal urinalysis, no systemic features like fever, weight loss, or growth failure).\n\n**Clinical Reasoning**:\n1. **First-line approach to RAP**: After thorough history and physical examination (which has been done), the next step is **targeted investigation** based on 'red flag' symptoms or specific pointers. While many cases are functional (e.g., functional abdominal pain disorder), organic causes must be reasonably excluded.\n2. **Why ultrasound?**: Abdominal ultrasound is non-invasive, radiation-free, and excellent for screening for common organic causes in children such as:\n   - Mesenteric adenitis\n   - Constipation\n   - Renal abnormalities (despite normal urinalysis, structural issues may exist)\n   - Gallbladder or liver issues\n   - Intussusception (though acute presentation is more typical)\n   - Ovarian pathology (relevant in girls approaching puberty)\n3. **Avoiding over-investigation**: CT and MRI are not first-line due to radiation (CT) or cost/access issues (MRI). They are reserved for when ultrasound is inconclusive and high suspicion of pathology remains.\n4. **Not immediate reassurance**: While functional disorders are common, jumping straight to reassurance (option D) without a basic screening ultrasound may miss treatable organic causes and reduce family confidence in the diagnosis.\n5. **Stool culture**: Indicated if there's diarrhea, blood in stool, or travel history, which isn't mentioned.\n\n### ❌ Why the Other Options Are Wrong\n- **b. CT scan**: Unnecessary as first-line due to ionizing radiation exposure in children. Should only be considered if ultrasound is inconclusive and there's high suspicion of serious pathology (e.g., malignancy, complicated appendicitis).\n- **c. MRI abdomen**: Expensive, often requires sedation in children, and not routinely indicated for initial workup of recurrent abdominal pain without specific indications.\n- **d. No further investigation – reassurance**: While functional abdominal pain is common, current best practice recommends a **positive diagnosis** approach. A normal ultrasound provides objective reassurance to both clinician and family, increasing acceptance of a functional diagnosis and avoiding unnecessary future investigations.\n- **e. Stool culture**: Only indicated if infectious gastroenteritis is suspected (e.g., diarrhea, fever, exposure history). The chronic, recurrent nature without diarrhea makes acute infection unlikely.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Recurrent abdominal pain in children]**: Australian guidelines for assessment and management in primary care — https://www.racgp.org.au/afp/2013/december/recurrent-abdominal-pain-in-children/\n- **[Rome IV Criteria - Functional Gastrointestinal Disorders]**: Diagnostic criteria for functional abdominal pain disorders in children — https://theromefoundation.org/rome-iv/rome-iv-criteria/\n- **[NICE CG99 - Constipation in children and young people]**: Guidelines highlighting constipation as a common cause of recurrent abdominal pain — https://www.nice.org.uk/guidance/cg99", "image_path": ""}, {"id": 34370, "date": "2026-02-03T10:33:45+00:00", "stem": "A 35-year-old mother brings her 8-year-old daughter to the pediatric clinic for a routine check-up. The mother expresses concern about the timing of the HPV vaccine for her daughter. She has heard mixed recommendations and is unsure when it is best to start the vaccination. Which of the following is the most appropriate recommendation for the HPV vaccination for Emily?", "options": "a. Give the HPV vaccine now.\nb. Wait until Emily is 10 years old to start the HPV vaccination series.\nc. Delay vaccination until Emily is sexually active.\nd. Start the HPV vaccination series when Emily turns 18 years old.", "answer": "a", "explanation": "### ✅ Correct Answer: a. Give the HPV vaccine now.\nThe Australian National Immunisation Program (NIP) recommends routine HPV vaccination for adolescents aged 12-13 years. However, the vaccine is approved and most effective when administered **before the onset of sexual activity**, as it is a prophylactic vaccine designed to prevent infection with oncogenic HPV strains. The Australian Technical Advisory Group on Immunisation (ATAGI) states that the vaccine can be given from age 9. While the routine school-based program typically occurs in Year 7 (around age 12-13), administering it earlier (e.g., age 8) at a parent's request during a routine visit is clinically appropriate and aligns with the principle of completing the vaccination series prior to potential exposure. The immune response in children aged 9-14 is robust, and the schedule is only two doses (0 and 6-12 months) if started before age 15, compared to three doses if started at 15 or older. Therefore, vaccinating now is the best proactive health measure.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Wait until Emily is 10 years old to start the HPV vaccination series.**: While 10 is closer to the routine schedule, there is no specific clinical or immunological advantage to waiting until 10 vs. 8 years old. The recommendation is to vaccinate in early adolescence (9-14 years). Delaying without a specific reason may miss an opportunity if the child does not present for vaccination later.\n- **c. Delay vaccination until Emily is sexually active.**: This is incorrect and dangerous. The HPV vaccine is prophylactic, not therapeutic. Its maximum benefit is achieved **before** any exposure to HPV. Waiting until after sexual debut significantly reduces its effectiveness, as the individual may already be infected with one or more HPV strains covered by the vaccine.\n- **d. Start the HPV vaccination series when Emily turns 18 years old.**: This is too late according to Australian guidelines. While the vaccine is licensed for use up to age 45, the routine funded program and maximum benefit are for adolescents. Starting at 18 would require a three-dose schedule and offers less benefit due to the higher likelihood of prior HPV exposure.\n\n### 📚 Relevant Guidelines\n- **[Australian Technical Advisory Group on Immunisation (ATAGI) – HPV vaccination]** – Provides the Australian recommendations for HPV vaccination schedule, target age groups, and catch-up vaccinations. — https://www.health.gov.au/sites/default/files/documents/2022/03/atagi-advice-on-hpv-vaccination-for-people-aged-9-to-14-years_0.pdf\n- **[The Royal Australian College of General Practitioners (RACGP) – Guidelines for preventive activities in general practice)** – Includes recommendations on HPV vaccination as part of adolescent preventive healthcare. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practi\n- **[National Immunisation Program (NIP) Schedule]** – Outlines the funded routine vaccination schedule, including HPV vaccine at age 12-13 years. — https://www.health.gov.au/health-topics/immunisation/immunisation-throughout-life/national-immunisation-program-schedule", "image_path": ""}, {"id": 34374, "date": "2026-02-03T10:49:35+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia), indicating hypovolaemic shock. In acute haemorrhage, the haemoglobin level is an unreliable initial indicator of severity due to haemodilution lag; the key triggers for transfusion are clinical signs of shock and ongoing blood loss. Immediate transfusion is part of resuscitation to restore circulating volume and oxygen-carrying capacity. For stable, chronic anaemias (options A, B, D, E), transfusion is rarely the first-line treatment and is guided by symptoms and underlying cause, not by a specific Hb threshold alone.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is chronic, stable anaemia. First-line management is oral iron supplementation and treating the cause (menorrhagia). Transfusion is not indicated in asymptomatic or minimally symptomatic patients.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: Although patients with cardiac disease may be transfused at a higher threshold (e.g., Hb <80 g/L) to prevent cardiac ischaemia, this patient is asymptomatic and stable. Transfusion is not immediately required; investigation and treatment of the underlying cause is priority.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is a stable, chronic anaemia (likely iron deficiency). She is well and asymptomatic. Management is oral iron, not transfusion.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This Hb level is only mildly low. Chemotherapy-induced anaemia is typically managed with erythropoiesis-stimulating agents and iron if symptomatic, not transfusion, especially at this level with only mild fatigue.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority (Australia) - Patient Blood Management Guidelines: Module 2 - Perioperative]**: Provides evidence-based recommendations for red blood cell transfusion, emphasising a restrictive strategy (Hb <70 g/L for most stable patients) and that transfusion should be based on clinical assessment, not Hb alone. — https://www.blood.gov.au/pbm-module-2\n- **[Therapeutic Guidelines (Australia) - Blood and blood products]**: Outlines indications for red cell transfusion, including acute blood loss with haemodynamic instability and symptomatic anaemia. — https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-blood-products\n- **[Choosing Wisely Australia - Red blood cell transfusion]**: Recommends avoiding transfusion in haemodynamically stable patients with Hb >70-80 g/L without symptoms. — https://www.choosingwisely.org.au/recommendations/racp", "image_path": ""}, {"id": 34375, "date": "2026-02-03T10:49:51+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a well-known oxidant drug that can precipitate acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic: a young man of Middle Eastern descent (higher prevalence of G6PD deficiency) presents with acute haemolysis (dark urine from haemoglobinuria, jaundice, fatigue, pallor) following exposure to a triggering agent. The lab findings confirm intravascular haemolysis: low Hb, elevated reticulocytes (compensatory bone marrow response), elevated indirect bilirubin (from haemoglobin breakdown), and the presence of \"bite cells\" and blister cells on the blood film. These are red cell morphological changes characteristic of oxidative damage, where Heinz bodies (denatured haemoglobin) are pitted by the spleen, creating bite cells. Dapsone is a potent oxidant used for conditions like dermatitis herpetiformis and leprosy, and is a classic exam trigger for G6PD deficiency haemolysis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is not a significant oxidant stressor and is generally safe in G6PD deficiency at therapeutic doses. It does not typically cause haemolysis in this context.\n- **B. Amoxicillin**: Penicillins like amoxicillin are not common triggers for haemolysis in G6PD deficiency. They are more associated with immune-mediated haemolytic anaemia via drug-induced antibodies, not oxidative damage.\n- **D. Metformin**: This is an antidiabetic drug and is not known to cause oxidative haemolysis. It is not a trigger for G6PD deficiency.\n- **E. Prednisolone**: This is a corticosteroid used to treat various inflammatory conditions. It does not have oxidant properties and is not a cause of haemolysis in G6PD deficiency; in fact, it may be used in the treatment of some immune-mediated haemolytic anaemias.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (Australia) - G6PD deficiency]**: Lists drugs to avoid in G6PD deficiency, including dapsone, sulfonamides, nitrofurantoin, and primaquine. — https://tgldcdp.tg.org.au/viewTopic?topicfile=g6pd-deficiency\n- **[UpToDate - Glucose-6-phosphate dehydrogenase deficiency]**: Comprehensive review of pathophysiology, triggers (including dapsone), and management. — https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-deficiency\n- **[WHO - Glucose-6-phosphate dehydrogenase deficiency]**: Provides a global perspective and list of unsafe medications. — https://www.who.int/news-room/fact-sheets/detail/glucose-6-phosphate-dehydrogenase-deficiency", "image_path": ""}, {"id": 34416, "date": "2026-02-04T10:43:06+00:00", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech. The patient was in his usual state of health last night but awoke this morning with these symptoms. He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease. The patient does not drink alcohol regularly but has a 45-pack-year history. Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia. CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery. The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility. Forty-eight hours later, he becomes obtunded. Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min. Physical examination now shows complete right hemiplegia and deviation of the eyes to the left. Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E. Repeat CT scan of the head", "explanation": "### ✅ Correct Answer: E. Repeat CT scan of the head\n\nThis patient presents with a classic scenario of **malignant middle cerebral artery (MCA) infarction** with clinical deterioration at 48 hours. The key clinical reasoning is:\n\n1. **Clinical Timeline**: The patient had a large left MCA stroke confirmed on initial CT. At 48 hours post-stroke, he develops new neurological deterioration (obtundation, complete hemiplegia, eye deviation). This timing aligns with the peak period for cerebral edema following large hemispheric infarcts (typically 2-5 days).\n\n2. **Pathophysiology**: Large MCA infarcts cause cytotoxic edema that peaks around days 2-5, leading to increased intracranial pressure (ICP), midline shift, and potential herniation. The clinical signs (obtundation, eye deviation) suggest worsening mass effect and possible uncal herniation.\n\n3. **Diagnostic Imperative**: A repeat non-contrast CT head is the **most urgent and appropriate** next step to assess for:\n   - Significant cerebral edema\n   - Midline shift (>5mm is often used as a surgical threshold)\n   - Hemorrhagic transformation\n   - Early signs of herniation\n\n4. **Management Implications**: Confirming significant edema/mass effect would guide urgent interventions such as:\n   - Consideration of decompressive hemicraniectomy (which has proven mortality benefit in selected patients <60 years with malignant MCA infarction)\n   - Medical management with hyperosmolar therapy (mannitol or hypertonic saline)\n   - Neurocritical care monitoring\n\n5. **Why Not Other Imaging First?**: MRI, while more sensitive for acute ischemia, takes longer, may not be readily available in all emergency settings, and does not change the immediate management decision regarding surgical decompression. The repeat CT is faster and sufficient to assess for life-threatening complications.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Blood cultures and empiric antibiotics**: While the patient has a low-grade fever (38.3°C), this is commonly seen in stroke patients due to central fever, infection, or inflammatory response to brain injury. However, the **acute neurological deterioration takes precedence** over a fever workup. Starting antibiotics without identifying a source could delay definitive management of the cerebral edema.\n\n- **B. Intravenous hypertonic saline and observation** and **C. Intravenous mannitol and observation**: Both are treatments for cerebral edema and increased ICP. However, **initiating these without imaging confirmation** is inappropriate because:\n   - The diagnosis of significant edema/mass effect needs radiographic confirmation\n   - These agents have side effects (electrolyte disturbances, renal impairment, rebound edema)\n   - If there is a surgical lesion (like significant midline shift), medical management alone may be insufficient, and decompressive surgery should be considered\n   - The decision between hypertonic saline vs. mannitol depends on various factors including volume status and serum osmolality\n\n- **D. MRI of the head**: While MRI (especially DWI) is more sensitive for acute ischemia and can better delineate the infarct size, it is **not the best next step** because:\n   - It takes significantly longer than CT\n   - Patient with obtundation may not be stable for MRI\n   - The management decision (medical vs. surgical) for malignant edema can be made based on CT findings\n   - MRI does not provide additional urgent information that would change immediate management\n\n### 📚 Relevant Guidelines\n\n- **Australian Clinical Guidelines for Stroke Management**: Provides comprehensive recommendations for monitoring and managing complications after stroke, including cerebral edema and indications for repeat imaging. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n\n- **European Stroke Organisation (ESO) Guidelines for Decompressive Hemicraniectomy in Malignant Middle Cerebral Artery Infarction**: Specific guidelines on patient selection, timing, and benefits of surgical intervention. — https://www.eso-stroke.org/eso-guideline/decompressive-hemicraniectomy-in-malignant-middle-cerebral-artery-infarction/\n\n- **American Heart Association/American Stroke Association (AHA/ASA) Guidelines for the Early Management of Patients With Acute Ischemic Stroke**: Includes recommendations for monitoring and managing neurological deterioration, including repeat imaging. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211", "image_path": ""}, {"id": 34417, "date": "2026-02-04T10:43:16+00:00", "stem": "A mother is concerned that her child has stopped seeing friends and discarded his laptop, claiming he was receiving special messages from Facebook. There is social withdrawal and odd beliefs. What is the most important mental function to assess?", "options": "a. Self-esteem\nb. Insight\nc. Mood\nd. Judgment\ne. Reality testing", "answer": "e. Reality testing", "explanation": "### ✅ Correct Answer: e. Reality testing\n\n**Clinical Reasoning:**\n\n1. **Presentation Analysis**: The patient exhibits several red flags for a psychotic disorder:\n   - **Social withdrawal**: Stopped seeing friends\n   - **Odd behavior**: Discarded laptop due to delusional belief\n   - **Delusional ideation**: Belief in receiving \"special messages from Facebook\" - this represents a likely delusion of reference (where neutral stimuli are believed to have special personal significance)\n\n2. **Reality Testing Defined**: This refers to the ability to distinguish between internally generated experiences (thoughts, feelings, perceptions) and external reality. Impaired reality testing is the **cardinal feature** of psychotic disorders.\n\n3. **Why This Takes Precedence**:\n   - The belief about Facebook messages suggests a **break from reality** (delusion)\n   - Assessing reality testing helps differentiate between:\n     * **Psychotic disorders** (schizophrenia, schizophreniform, brief psychotic disorder) - impaired reality testing\n     * **Mood disorders with psychotic features** - reality testing impaired only during mood episodes\n     * **Personality disorders** (e.g., schizotypal) - may have odd beliefs but generally maintain reality testing\n     * **Normal adolescent development** - would maintain intact reality testing\n\n4. **Diagnostic Implications**: Impaired reality testing, when present with other symptoms (delusions, hallucinations, disorganized speech/behavior), forms the basis for diagnosing psychotic disorders according to DSM-5 and ICD-11 criteria.\n\n5. **Assessment Approach**: The clinician would explore:\n   - Nature and conviction of the Facebook belief\n   - Whether the patient recognizes this as unusual or impossible\n   - Presence of other psychotic symptoms (hallucinations, thought disorder)\n   - Impact on functioning\n\n### ❌ Why the Other Options Are Wrong\n\n- **a. Self-esteem**: While self-esteem issues are common in mental health disorders, they are not the **most important** to assess here. Low self-esteem might occur in depression or personality disorders, but it doesn't help differentiate psychotic disorders from other conditions. The presence of delusional beliefs takes diagnostic precedence.\n\n- **b. Insight**: Insight refers to awareness of having a mental illness and need for treatment. While important for treatment engagement and prognosis, it's not the **primary** assessment when psychotic symptoms are suspected. Many patients with early psychosis lack insight, but assessing the psychotic symptoms themselves comes first.\n\n- **c. Mood**: Mood assessment is important to rule out mood disorders with psychotic features. However, the presentation described (social withdrawal due to delusional beliefs) points more toward a primary psychotic disorder rather than a primary mood disorder. Reality testing impairment helps make this differentiation.\n\n- **d. Judgment**: Judgment refers to the ability to make appropriate decisions. While impaired judgment often accompanies psychotic disorders, it is a **secondary consequence** of impaired reality testing. If someone believes Facebook is sending them special messages, their judgment about discarding the laptop flows from this delusion. Assessing the underlying reality testing is more fundamental.\n\n### 📚 Relevant Guidelines\n\n- **Royal Australian and New Zealand College of Psychiatrists (RANZCP) Clinical Practice Guidelines for the Management of Schizophrenia and Related Disorders**: Provides comprehensive guidance on assessment, diagnosis, and management of psychotic disorders, emphasizing the importance of assessing reality testing. — https://www.ranzcp.org/clinical-guidelines-publications/clinical-guidelines-publications-library/schizophrenia-clinical-practice-guidelines\n\n- **National Institute for Health and Care Excellence (NICE) Guidelines [CG178] Psychosis and schizophrenia in adults: prevention and management**: Includes assessment recommendations for suspected psychosis, focusing on core symptoms including delusions and hallucinations. — https://www.nice.org.uk/guidance/cg178\n\n- **DSM-5 Diagnostic Criteria for Schizophrenia Spectrum and Other Psychotic Disorders**: The standard diagnostic manual defining impaired reality testing as a core feature of psychotic disorders. — American Psychiatric Association, Diagnostic and Statistical Manual of Mental Disorders, Fifth Edition", "image_path": ""}, {"id": 34418, "date": "2026-02-04T10:44:02+00:00", "stem": "A post-op appendectomy patient on day 7 develops diarrhea, right-sided abdominal pain, normal temperature. Likely diagnosis?", "options": "(a) Pelvic abscess\n(b) Wound dehiscence\n(c) Clostridioides difficile colitis\n(d) Small bowel obstruction\n(e) Urinary tract infection", "answer": "(c) Clostridioides difficile colitis", "explanation": "### ✅ Correct Answer: (c) Clostridioides difficile colitis\n\n**Clinical Reasoning:**\n\n1. **Temporal Relationship**: Symptoms developing **7 days post-appendectomy** is classic for healthcare-associated infections, particularly those related to antibiotic exposure.\n\n2. **Key Clinical Features**:\n   - **Diarrhea**: The most prominent symptom, which is characteristic of C. difficile infection (CDI)\n   - **Right-sided abdominal pain**: Can occur in CDI, particularly with more severe colitis\n   - **Normal temperature**: CDI can present without fever, especially in early or mild cases\n\n3. **Risk Factors**:\n   - Recent surgery (appendectomy)\n   - Almost certainly received perioperative antibiotics (commonly given for appendicitis)\n   - Healthcare exposure (hospitalization)\n\n4. **Pathophysiology**:\n   - Antibiotics disrupt normal colonic flora\n   - Allows overgrowth of C. difficile\n   - Toxin production (TcdA and TcdB) causes inflammation, fluid secretion, and mucosal damage\n   - Can range from mild diarrhea to severe pseudomembranous colitis\n\n5. **Why This Fits Best**:\n   - The combination of diarrhea + abdominal pain post-antibiotics is highly suggestive\n   - Timing (day 7) aligns with typical CDI onset (often 5-10 days after antibiotic initiation)\n   - Other postoperative complications typically present differently (see below)\n\n### ❌ Why the Other Options Are Wrong\n\n- **(a) Pelvic abscess**: Typically presents with **fever**, localized pain (often suprapubic or deep pelvic), and possibly a palpable mass on rectal exam. Diarrhea is not a typical feature. Patients usually appear systemically unwell with elevated inflammatory markers.\n\n- **(b) Wound dehiscence**: Presents with **wound issues** - drainage, separation, erythema, or pain at the surgical site. Diarrhea is not associated with superficial wound problems. Deep wound infections might cause fever but not diarrhea.\n\n- **(d) Small bowel obstruction**: Presents with **obstructive symptoms**: nausea, vomiting, abdominal distension, **absolute constipation** (no passage of flatus or feces), and colicky abdominal pain. Diarrhea would be unusual in complete or partial SBO. Post-operative adhesions causing SBO typically occur later (weeks to years after surgery).\n\n- **(e) Urinary tract infection**: While common post-operatively (especially with catheterization), UTI typically presents with **urinary symptoms** (dysuria, frequency, urgency), suprapubic pain, and often fever. Diarrhea is not a typical feature. Right-sided abdominal pain would be unusual for an uncomplicated UTI.\n\n### 📚 Relevant Guidelines\n\n- **Therapeutic Guidelines Australia (Antibiotic) - Clostridioides difficile infection**: Provides Australian-specific guidance on diagnosis, management, and prevention of CDI, including post-operative settings. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etg\n\n- **Australian Commission on Safety and Quality in Health Care - Antimicrobial Stewardship Clinical Care Standard**: Includes recommendations for preventing and managing healthcare-associated infections including CDI. — https://www.safetyandquality.gov.au/standards/clinical-care-standards/antimicrobial-stewardship-clinical-care-standard\n\n- **European Society of Clinical Microbiology and Infectious Diseases (ESCMID): Update of treatment guidance document for Clostridioides difficile infection**: Evidence-based guidelines for diagnosis and management. — https://www.clinicalmicrobiologyandinfection.com/article/S1198-743X(23)00692-4/fulltext", "image_path": ""}, {"id": 34434, "date": "2026-02-04T13:40:28+00:00", "stem": "A 35-year-old woman presents with a 3-month history of intermittent abdominal pain, bloating, and altered bowel habits (alternating diarrhea and constipation). She reports no weight loss, nocturnal symptoms, or rectal bleeding. Physical examination is unremarkable, and basic blood tests (FBC, CRP, coeliac serology) are normal. Colonoscopy performed 6 months ago for family history of colorectal cancer was normal. What is the most likely diagnosis?", "options": "A. Inflammatory bowel disease\nB. Coeliac disease\nC. Irritable bowel syndrome\nD. Microscopic colitis\nE. Colorectal cancer", "answer": "C. Irritable bowel syndrome", "explanation": "### ✅ Correct Answer: C. Irritable bowel syndrome\n\nThe patient's presentation is classic for irritable bowel syndrome (IBS): chronic abdominal pain (≥3 months) associated with altered bowel habits, bloating, and absence of alarm features (no weight loss, nocturnal symptoms, rectal bleeding, or abnormal inflammatory markers). The Rome IV criteria for IBS require recurrent abdominal pain at least 1 day/week in the last 3 months, associated with ≥2 of: related to defecation, associated with change in frequency of stool, or associated with change in form of stool. Normal investigations (blood tests, recent normal colonoscopy) support a functional disorder diagnosis after organic causes have been excluded.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Inflammatory bowel disease**: Typically presents with alarm features like weight loss, rectal bleeding, nocturnal diarrhea, and elevated inflammatory markers (CRP). The normal CRP and absence of these features make IBD unlikely.\n- **B. Coeliac disease**: While it can cause bloating and altered bowel habits, it typically presents with weight loss, fatigue, nutrient deficiencies, and positive coeliac serology (which was normal in this case).\n- **D. Microscopic colitis**: Presents with chronic watery diarrhea, not alternating bowel habits. Diagnosis requires colonoscopy with biopsy showing characteristic histological changes.\n- **E. Colorectal cancer**: Would be unlikely in a 35-year-old without alarm features (bleeding, weight loss, iron deficiency) and with a recent normal colonoscopy.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Irritable bowel syndrome in adults]**: Australian guidelines for diagnosis and management of IBS in primary care — https://www.racgp.org.au/afp/2017/august/irritable-bowel-syndrome-in-adults\n- **[Therapeutic Guidelines - Gastrointestinal]**: Evidence-based recommendations for IBS management — https://tgldcdp.tg.org.au/viewTopic?topicfile=gastrointestinal-disorders&guidelineName=Gastrointestinal#toc_d1e298\n- **[Rome Foundation - Rome IV Criteria]**: Diagnostic criteria for functional gastrointestinal disorders — https://theromefoundation.org/rome-iv/rome-iv-criteria/", "image_path": "photo_2026-02-04_13-40-28.jpg"}, {"id": 34481, "date": "2026-02-05T22:25:56+00:00", "stem": "A patient presents with episodic palpitations and hyperventilation. A resting ECG is normal, and the heart rhythm is regular. What is the **most appropriate next investigation**?", "options": "a. Troponin levels\nb. Echocardiography\nc. Chest X-ray\nd. Exercise stress test\ne. Ambulatory ECG", "answer": "e", "explanation": "### ✅ Correct Answer: e. Ambulatory ECG\n\n**Clinical Reasoning:**\n1. **Presentation:** The patient has *episodic* palpitations and hyperventilation. The key word is 'episodic' – symptoms are not constant.\n2. **Initial Workup:** A resting ECG is normal and the heart is regular *at rest*. This rules out persistent arrhythmias but does not capture the rhythm *during symptoms*.\n3. **Goal of Investigation:** The most appropriate test is one that can correlate symptoms with cardiac rhythm. An ambulatory ECG (Holter monitor for 24-48 hours, or an event recorder for longer periods) is designed specifically for this purpose. It allows for continuous or symptom-triggered recording to detect paroxysmal arrhythmias (e.g., SVT, atrial fibrillation, VT) or to confirm sinus rhythm during symptoms (which may point towards anxiety or other non-cardiac causes).\n4. **Hyperventilation Context:** Hyperventilation can be a symptom of an arrhythmia (e.g., due to anxiety from palpitations) or a primary cause (anxiety disorder leading to sinus tachycardia). Capturing the rhythm during an episode is crucial for differentiation.\n5. **AMC Context:** This is a classic 'next best step' question for palpitations. After history, examination, and a normal resting ECG, ambulatory monitoring is the cornerstone of investigating intermittent symptoms.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Troponin levels**: This is a biomarker for myocardial injury (e.g., acute coronary syndrome, myocarditis). It is not indicated for the investigation of episodic palpitations in a stable patient with a normal resting ECG, as it does not diagnose rhythm disturbances.\n- **b. Echocardiography**: This assesses cardiac structure and function (valves, chambers, ejection fraction). It is important if there is suspicion of structural heart disease (e.g., murmur, heart failure) or if an arrhythmia is confirmed, but it is not the first-line test to *capture* an episodic rhythm disturbance.\n- **c. Chest X-ray**: Primarily evaluates lung fields, mediastinum, and cardiac silhouette size. It has a very low yield in the isolated investigation of palpitations, unless there are specific signs of heart failure, pulmonary disease, or other chest pathology.\n- **d. Exercise stress test**: This is indicated when symptoms are *exertional* (e.g., chest pain, dyspnoea, or palpitations provoked by exercise). The stem does not specify an exertional component ('episodic' is broader). A stress test can provoke arrhythmias, but ambulatory monitoring is more appropriate for capturing spontaneous, non-exertional episodes.\n\n### 📚 Relevant Guidelines\n- **RACGP - Guidelines for preventive activities in general practice (Red Book) - Cardiovascular disease risk assessment**: Discusses initial assessment of symptoms like palpitations, including history and examination, before proceeding to investigations like ECG and ambulatory monitoring. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-pr\n- **American Heart Association (AHA) / American College of Cardiology (ACC) / Heart Rhythm Society (HRS) Guideline for the Management of Patients With Atrial Fibrillation**: While focused on AF, these guidelines emphasize the role of ambulatory monitoring (Holter, event recorders) for detecting paroxysmal arrhythmias in patients with symptoms like palpitations. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000935\n- **UpToDate - Approach to the patient with palpitations**: Provides a detailed, evidence-based algorithm where ambulatory ECG monitoring is the recommended next step after initial evaluation (history, physical, resting ECG) for patients with episodic palpitations. — https://www.uptodate.com/contents/approach-to-the-patient-with-palpitations", "image_path": ""}, {"id": 34492, "date": "2026-02-06T05:19:37+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E. Neurocysticercosis", "explanation": "### ✅ Correct Answer: E. Neurocysticercosis\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** The patient is a young adult with new-onset generalized tonic-clonic seizures and confusion. This is the most common presentation of neurocysticercosis, accounting for up to 70% of cases in endemic areas.\n2.  **Imaging Finding:** MRI shows \"numerous well-defined cystic lesions throughout the cerebral cortex.\" This is the classic radiological finding for neurocysticercosis, where the larvae of *Taenia solium* (cysticerci) encyst in the brain parenchyma. The description matches the \"starry sky\" appearance on imaging.\n3.  **Supporting Clues:** The patient has swelling over the right eye and testicular tenderness. While neurocysticercosis primarily affects the CNS, cysticerci can lodge in other tissues like muscle (causing palpable nodules) and, rarely, the eye (causing visual symptoms or proptosis). These extra-neurological findings support a systemic parasitic infection.\n4.  **Pathophysiology:** Infection occurs via the fecal-oral route by ingesting eggs of the pork tapeworm, *Taenia solium*. The larvae hatch, penetrate the intestinal wall, and disseminate via the bloodstream, with a tropism for the brain, muscle, and subcutaneous tissues. The cysts cause symptoms through mass effect and, more importantly, an inflammatory response when they begin to degenerate.\n5.  **Management Pearls:**\n    *   **Diagnosis:** Serology (ELISA or immunoblot for cysticercal antibodies) and characteristic neuroimaging are key. Stool studies for ova are not helpful for diagnosing neurocysticercosis (they diagnose intestinal taeniasis).\n    *   **Treatment:** Management is staged. For active parenchymal disease with seizures, first-line treatment is anti-seizure medication (e.g., levetiracetam) + antiparasitic therapy (albendazole, often with corticosteroids like dexamethasone to mitigate the inflammatory response). Surgery (excision or shunt) is reserved for hydrocephalus, large cysts causing mass effect, or intraventricular cysts.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Cerebral metastases:** While metastases can present with seizures and multiple brain lesions, they are exceedingly rare in an otherwise healthy 18-year-old without a known primary cancer. Metastatic lesions are typically irregular, enhancing masses with surrounding edema, not numerous, well-defined, non-enhancing cysts scattered diffusely throughout the cortex.\n- **B. Progressive multifocal leukoencephalopathy (PML):** PML is a demyelinating disease caused by JC virus reactivation, almost exclusively seen in severely immunocompromised patients (e.g., AIDS, immunosuppressive therapy). It presents with progressive neurological deficits (e.g., weakness, vision loss, cognitive decline) and MRI shows asymmetric, confluent white matter lesions without mass effect, not discrete cortical cysts.\n- **C. Cerebral vasculitis:** Vasculitis can cause seizures and confusion due to ischemia or hemorrhage. Imaging may show infarcts in multiple vascular territories, hemorrhages, or vessel wall enhancement on angiography. It does not cause multiple, discrete, well-defined cystic lesions throughout the cortex.\n- **D. Neurosyphilis:** Tertiary syphilis can cause seizures and confusion (general paresis) or focal deficits (meningovascular syphilis). MRI findings are non-specific (cortical atrophy, infarcts, gummas). Gummas are rare, solitary, enhancing mass lesions, not multiple diffuse cysts. The presentation lacks other stigmata of syphilis (e.g., rash, Argyll Robertson pupils).\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) – Neurology]**: Provides Australian recommendations for the diagnosis and management of neurocysticercosis, including antiparasitic and anti-inflammatory therapy. — https://tgldcdp.tg.org.au/viewTopic?topicfile=neurocysticercosis&guidelineName=Neurology\n- **[World Health Organization (WHO) – Taeniasis/Cysticercosis]**: Offers comprehensive guidelines on the diagnosis, treatment, and public health aspects of neurocysticercosis, a major neglected tropical disease. — https://www.who.int/news-room/fact-sheets/detail/taeniasis-cysticercosis\n- **[Centers for Disease Control and Prevention (CDC) – Parasites - Cysticercosis]**: A detailed resource on the lifecycle, clinical manifestations, diagnosis, and treatment of cysticercosis. — https://www.cdc.gov/parasites/cysticercosis/index.html", "image_path": "photo_2026-02-06_05-19-37.jpg"}, {"id": 34493, "date": "2026-02-06T05:20:57+00:00", "stem": "A one-day-old boy is reviewed on the maternity ward with his parents. He was born at term via spontaneous vaginal delivery. He has no significant medical history and takes no regular medications. His parents express concern about the appearance of their child's face. On examination, he appears well with vital signs within normal limits. There is a distinct abnormality in the upper lip, characterised by a separation extending from the midline to the base of the nose on the left side. The defect appears to involve only the upper lip and does not extend to the palate.\n\nWhich one of the following is the most likely cause of this condition?", "options": "Maternal alcohol use\nMaternal cytomegalovirus infection\nMaternal folate deficiency\nMaternal cocaine use\nMaternal diabetes", "answer": "Maternal folate deficiency", "explanation": "### ✅ Correct Answer: Maternal folate deficiency\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The description is classic for a **unilateral cleft lip without cleft palate**. This is one of the most common congenital anomalies.\n2.  **Established Aetiological Link:** Periconceptional **folate deficiency** is the most strongly established and modifiable risk factor for neural tube defects (NTDs) and orofacial clefts (cleft lip ± cleft palate). Folate is crucial for DNA synthesis and cellular division during embryogenesis, particularly in the 4th to 8th weeks of gestation when the facial prominences fuse.\n3.  **Public Health Context:** This is a high-yield AMC point. Population-based studies and randomized controlled trials have consistently shown that folic acid supplementation (400-500 mcg daily) before conception and during the first trimester significantly reduces the risk of both NTDs and orofacial clefts. This is a cornerstone of prenatal care and public health messaging in Australia and worldwide.\n4.  **Why This Over Others:** While other teratogens can cause facial anomalies, the isolated cleft lip is most classically associated with nutritional (folate) and genetic factors.\n\n### ❌ Why the Other Options Are Wrong\n- **Maternal alcohol use:** Alcohol is a potent teratogen causing Fetal Alcohol Spectrum Disorder (FASD). Characteristic features include microcephaly, smooth philtrum, thin vermilion border, short palpebral fissures, and neurodevelopmental impairment. It does not typically cause an isolated, well-defined cleft lip.\n- **Maternal cytomegalovirus (CMV) infection:** Congenital CMV is the most common viral cause of congenital infection. It can cause microcephaly, intracranial calcifications, sensorineural hearing loss, chorioretinitis, and hepatosplenomegaly. It is not a recognized cause of isolated cleft lip.\n- **Maternal cocaine use:** Cocaine use in pregnancy is associated with placental abruption, preterm birth, intrauterine growth restriction, and congenital cardiac anomalies. While it may increase the risk of various malformations due to vascular disruption, it is not the *most likely* or most specific cause of an isolated cleft lip compared to folate deficiency.\n- **Maternal diabetes:** Poorly controlled pre-gestational diabetes (not gestational diabetes) is a significant teratogen. It increases the risk of major congenital anomalies, most notably **caudal regression syndrome/sacral agenesis**, cardiac defects (e.g., transposition of the great arteries), and neural tube defects. The risk of orofacial clefts is elevated but to a lesser degree than for the anomalies listed above; therefore, it is not the *most likely* cause in this specific presentation.\n\n### 📚 Relevant Guidelines\n- **[The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) – Pre-pregnancy Counselling]**: Recommends folic acid supplementation (at least 400 mcg daily) for all women planning pregnancy to reduce the risk of neural tube defects and other congenital anomalies. — https://ranzcog.edu.au/womens-health/patient-information-resources/pre-pregnancy-counselling\n- **[Therapeutic Guidelines (eTG) – Pregnancy]**: Outlines the recommendation for folic acid supplementation (0.5 mg daily) starting at least one month before conception and continuing for the first trimester. — https://tgldcdp.tg.org.au/viewTopic?topicfile=pregnancy-preconception-care&guidelineName=Women%27s%20Health\n- **[National Health and Medical Research Council (NHMRC) – Australian Dietary Guidelines]**: Includes the public health recommendation for women of child-bearing age to consume adequate folate from foods and consider supplementation to prevent neural tube defects. — https://www.eatforhealth.gov.au", "image_path": ""}, {"id": 34594, "date": "2026-02-17T12:56:49+00:00", "stem": "A 40-year-old man with ankylosing spondylitis, who has been in long-term remission on methotrexate (MTX) and ibuprofen, seeks advice as he is about to get married and plans to start a family. What is the most appropriate medication advice?", "options": "A. Discontinue both MTX and ibuprofen\nB. Discontinue MTX but continue ibuprofen\nC. Continue both medications unchanged\nD. Discontinue ibuprofen but continue MTX\nE. Switch to alternative disease-modifying therapy", "answer": "E. Switch to alternative disease-modifying therapy", "explanation": "### ✅ Correct Answer: E. Switch to alternative disease-modifying therapy\n\n**Clinical Reasoning:**\n1. **Methotrexate (MTX) in Pregnancy Planning:** MTX is a known teratogen (Category D in Australia) and is contraindicated in both males and females planning conception. It can cause severe birth defects (methotrexate embryopathy) and is associated with impaired spermatogenesis in males. Current guidelines recommend discontinuing MTX at least 3 months prior to conception in both partners.\n2. **Ibuprofen and NSAIDs:** While ibuprofen is generally considered safer than MTX, high-dose or chronic use of NSAIDs can impair fertility in males by reducing prostaglandin synthesis, which is important for normal spermatogenesis and erectile function. For a man actively trying to conceive, it is prudent to discontinue or minimize NSAID use.\n3. **Disease Management:** The patient is in remission, but ankylosing spondylitis is a chronic condition. Simply stopping all therapy (Option A) risks a disease flare. The goal is to maintain remission with a pregnancy-safe regimen.\n4. **Appropriate Alternative:** The correct approach is to switch MTX to a disease-modifying antirheumatic drug (DMARD) that is safe for conception. **Sulfasalazine** is the classic DMARD of choice for men planning conception, as it has no known adverse effects on male fertility or fetal outcomes. Biologics like TNF-alpha inhibitors (e.g., adalimumab, etanercept) are also considered safe in men trying to conceive. Therefore, 'switching therapy' is the comprehensive and safest advice.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Discontinue both MTX and ibuprofen**: While discontinuing MTX is correct, stopping all medication without providing an alternative risks a disease flare of ankylosing spondylitis, which could itself impact quality of life and potentially fertility.\n- **B. Discontinue MTX but continue ibuprofen**: Discontinuing MTX is correct. However, continuing ibuprofen is suboptimal as chronic NSAID use can impair male fertility. Furthermore, this option does not address the need for ongoing disease control with a safe DMARD.\n- **C. Continue both medications unchanged**: This is dangerous. Continuing methotrexate is contraindicated in men planning conception due to its teratogenic risk and effects on sperm. It violates standard pre-conception counselling guidelines.\n- **D. Discontinue ibuprofen but continue MTX**: Discontinuing ibuprofen is a minor positive step, but continuing MTX is the major error. The teratogenic risk of MTX far outweighs any concern regarding ibuprofen.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Rheumatology**: Provides recommendations on the use of DMARDs and biologics in pregnancy and pre-conception for both men and women. — https://tgldcdp.tg.org.au/viewTopic?topicfile=rheumatological-conditions-pregnancy#toc_d1e289\n- **Australian Rheumatology Association (ARA) Position Statement**: 'Medication use in pregnancy and breastfeeding' includes guidance for men planning conception, specifically advising cessation of methotrexate. — https://rheumatology.org.au/for-patients/patient-resources/medication-use-in-pregnancy-and-breastfeeding\n- **Royal Australian College of General Practitioners (RACGP) – Preconception Care**: Guidelines include counselling on medication safety prior to pregnancy, covering partners' medications. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice/individuals-and-families/preconception-care", "image_path": ""}, {"id": 34615, "date": "2026-02-18T12:09:08+00:00", "stem": "A 55-year-old man presents with a 2-month history of progressive dyspnoea on exertion, fatigue, and intermittent chest discomfort. He has a history of hypertension for 10 years, poorly controlled despite being on three antihypertensive medications. On examination, his blood pressure is 180/100 mmHg in both arms. He has a loud systolic murmur heard best over the epigastrium and radiating to the back. His serum creatinine is 150 µmol/L (baseline 90 µmol/L 6 months ago). What is the most likely diagnosis?", "options": "A. Coarctation of the aorta\nB. Phaeochromocytoma\nC. Renal artery stenosis\nD. Primary hyperaldosteronism\nE. Cushing's syndrome", "answer": "C. Renal artery stenosis", "explanation": "### ✅ Correct Answer: C. Renal artery stenosis\n\n**Clinical Reasoning:**\n1. **Patient Profile & Presentation:** A middle-aged male with longstanding, resistant hypertension (on three drugs, BP 180/100) and new-onset renal impairment (creatinine rising from 90 to 150 µmol/L) is classic for atherosclerotic renal artery stenosis (RAS).\n2. **Key Clinical Clues:**\n   - **Resistant Hypertension:** Failure to control BP despite multiple agents is a hallmark.\n   - **Renal Impairment:** A rise in creatinine, especially after starting an ACE inhibitor/ARB (though not explicitly stated here, it's a common scenario), suggests renovascular disease. Even without an ACEi, atherosclerotic disease can cause ischemic nephropathy.\n   - **Auscultatory Finding:** An epigastric/abdominal bruit (systolic murmur radiating to the back) is a specific, though not sensitive, sign of renal artery stenosis.\n   - **Atherosclerosis Risk:** Age 55, hypertension history aligns with atherosclerotic etiology (more common than fibromuscular dysplasia in this age group).\n3. **Pathophysiology:** Atherosclerotic plaque at the ostium of the renal artery → decreased renal perfusion → activation of the renin-angiotensin-aldosterone system (RAAS) → vasoconstriction and sodium retention → severe hypertension. Chronic ischemia leads to progressive renal fibrosis and decline in GFR.\n4. **Diagnostic Approach:** The initial test of choice is a **Doppler ultrasound of the renal arteries** (non-invasive, assesses blood flow velocity). If high clinical suspicion with inconclusive ultrasound, CT angiography or MR angiography can be used. Renal arteriography remains the gold standard. **Renal function tests (including creatinine) are essential baseline tests** but are not diagnostic.\n5. **Management Pearls for AMC:**\n   - **Medical Therapy:** Strict BP control (target <130/80 mmHg). First-line includes a combination of a **calcium channel blocker** (e.g., amlodipine) and a **thiazide diuretic**. An ACE inhibitor/ARB is highly effective but must be used with extreme caution due to risk of acute kidney injury; start at low dose with close monitoring of creatinine and potassium.\n   - **Revascularization:** Reserved for patients with truly resistant hypertension, recurrent flash pulmonary edema, or progressive renal decline despite optimal medical therapy. Stenting is common for atherosclerotic ostial lesions.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Coarctation of the aorta:** Typically presents in younger individuals. Key findings are **radio-femoral delay** and **upper limb hypertension with lower limb hypotension**. An epigastric bruit is not characteristic; a murmur is usually heard over the left scapula. It does not explain the acute rise in creatinine.\n- **B. Phaeochromocytoma:** Presents with **paroxysmal symptoms** (headache, sweating, palpitations, hypertension). Hypertension is often episodic, not consistently severe and resistant. No characteristic abdominal bruit. Renal impairment is not a typical feature unless from malignant hypertension crisis.\n- **D. Primary hyperaldosteronism (Conn's syndrome):** Causes hypertension with **hypokalaemia** (muscle weakness, cramps, polyuria). It is often associated with metabolic alkalosis. There is no abdominal bruit or typically a rapid decline in renal function. Screening involves aldosterone-to-renin ratio.\n- **E. Cushing's syndrome:** Presents with characteristic features: central obesity, moon face, buffalo hump, purple striae, proximal myopathy, and hyperglycaemia. Hypertension is common but not usually this severe or resistant in isolation. No abdominal bruit or specific link to acute renal impairment.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Cardiovascular (eTG)**: Provides detailed guidance on the diagnosis and management of hypertension, including investigation and treatment of secondary causes like renal artery stenosis. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hypertension-adults\n- **Kidney Health Australia: Chronic Kidney Disease (CKD) Management in Primary Care**: Covers the detection and management of CKD, including when to suspect and investigate for renovascular disease. — https://kidney.org.au/cms_uploads/docs/ckd-management-in-primary-care-handbook.pdf\n- **American Heart Association (AHA) Scientific Statement on Renal Artery Stenosis**: A comprehensive review of the diagnosis, management, and evidence for intervention in renal artery stenosis. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000351", "image_path": ""}, {"id": 34628, "date": "2026-02-19T09:09:28+00:00", "stem": "A 68-year-old woman on warfarin presents after a minor fall. She is fully conscious (GCS 15). No vomiting. No headache. Normal exam. What is the most appropriate next step?", "options": "A) Discharge\nB) CT brain\nC) Observe for 4 hours\nD) Reassure only", "answer": "B) CT brain", "explanation": "### ✅ Correct Answer: B. CT brain\n\n**Clinical Reasoning:**\n1.  **High-Risk Patient:** This patient is on warfarin, a potent anticoagulant, which significantly increases the risk of intracranial hemorrhage (ICH) even after minor trauma. The risk of delayed ICH is also higher in anticoagulated patients.\n2.  **Clinical Presentation:** While she is asymptomatic (GCS 15, no headache, normal exam), this does NOT rule out a significant intracranial bleed. Patients on anticoagulants can have a \"lucid interval\" before neurological deterioration. A normal neurological exam at presentation is not a reliable predictor of the absence of ICH in this population.\n3.  **Guideline-Based Management:** Current emergency and trauma guidelines (e.g., NICE, American College of Emergency Physicians) strongly recommend urgent non-contrast CT brain for all patients on therapeutic anticoagulation (warfarin, DOACs) who present with head injury, regardless of the presence or absence of symptoms. This is a critical safety step to identify life-threatening bleeds early.\n4.  **Why Not Observation/Discharge:** Options involving observation (C) or discharge (A, D) are inappropriate and dangerous. They fail to address the immediate, high-priority need to rule out a bleed. Management should be guided by imaging findings, not observation alone.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Discharge**: Discharging an anticoagulated patient after head trauma without imaging is unsafe and violates standard care guidelines, as it misses the opportunity to detect a potentially fatal intracranial hemorrhage.\n- **C) Observe for 4 hours**: Observation alone is insufficient. A patient on warfarin can deteriorate after 4 hours. Imaging must precede any decision to observe, as the observation plan depends on a negative CT scan.\n- **D) Reassure only**: This is negligent. Reassurance is only appropriate after a serious pathology (like intracranial bleed) has been ruled out via imaging in this high-risk group.\n\n### 📚 Relevant Guidelines\n- **NICE Guideline NG232 (Head injury: assessment and early management)**: Recommends an immediate CT head for adults who have sustained a head injury and are on anticoagulant treatment (except aspirin alone), regardless of other risk factors. — https://www.nice.org.uk/guidance/ng232\n- **Therapeutic Guidelines (eTG) – Neurology**: Supports urgent neuroimaging for head injury in patients taking anticoagulants due to the high risk of intracranial hemorrhage. — https://tgldcdp.tg.org.au/etgaccess\n- **Choosing Wisely Australia (RACP)**: Implicitly supports appropriate imaging in high-risk scenarios to avoid missed diagnoses, which aligns with this case. — https://www.choosingwisely.org.au/recommendations/racp", "image_path": ""}, {"id": 34629, "date": "2026-02-19T09:10:07+00:00", "stem": "A 56-year-old poorly controlled diabetic female presents with sudden onset of binocular diplopia. She also has associated headaches. Her left eye appears to be deviated out and downwards. Pupillary examination shows mydriasis in the left eye. Which of the following investigation/examination is MOST relevant to rule out underlying cause in this case? (WHAT IS THE PROBABLE DIAGNOSIS AND THE MOST LIKELY VESSEL INVOLVED)", "options": "A. Blood pressure monitoring\nB. Cerebral angiography\nC. Hirschberg/corneal light reflection test\nD. Thyroid function tests", "answer": "B. Cerebral angiography", "explanation": "### ✅ Correct Answer: B. Cerebral angiography\n\n**Clinical Reasoning:**\n1.  **Probable Diagnosis:** The clinical picture is classic for a **third cranial nerve (CN III) palsy**. Key features are:\n    *   **Binocular diplopia:** Worse when looking in the direction of the affected muscle (medial rectus).\n    *   **Eye position:** \"Deviated out and downwards\" due to unopposed action of the lateral rectus (CN VI) and superior oblique (CN IV).\n    *   **Pupillary involvement:** **Mydriasis** (dilated pupil) is the critical finding. A \"pupil-involving\" or \"surgical\" CN III palsy suggests external compression of the nerve, most ominously by a **posterior communicating artery (PCom) aneurysm**.\n2.  **Why Pupil Involvement is Key:** Diabetic or hypertensive microvascular ischemia typically causes a \"pupil-sparing\" CN III palsy (where the pupil is normal). The presence of mydriasis shifts the concern from a medical cause to a **neurosurgical emergency**.\n3.  **Most Relevant Investigation:** To rule out a PCom aneurysm, **cerebral angiography** (either CT angiography or digital subtraction angiography) is the most direct and definitive investigation. This is the gold standard for visualizing cerebral aneurysms.\n4.  **Most Likely Vessel Involved:** The **posterior communicating artery (PCom)** is the most common site for an aneurysm causing a compressive CN III palsy. The nerve runs directly adjacent to this artery.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood pressure monitoring**: While important for general management of a diabetic patient and relevant for hypertensive microvascular causes, it does not rule out an aneurysm. A pupil-involving palsy requires urgent imaging regardless of BP.\n- **C. Hirschberg/corneal light reflection test**: This is a **diagnostic examination** that would confirm the presence of strabismus (misalignment) but does **not** rule out the underlying cause (aneurysm). It describes the finding, not the etiology.\n- **D. Thyroid function tests**: These are relevant for thyroid eye disease (which can cause diplopia and proptosis) but not for a sudden-onset, pupil-involving CN III palsy. The history and exam are not suggestive of thyroid pathology.\n\n### 📚 Relevant Guidelines\n- **UpToDate: 'Third cranial nerve (oculomotor nerve) palsy in adults'**: States that an acute, painful, pupil-involving third nerve palsy is a neurologic emergency requiring urgent evaluation for a posterior communicating artery aneurysm, typically with CT angiography. — https://www.uptodate.com/contents/third-cranial-nerve-oculomotor-nerve-palsy-in-adults\n- **American Heart Association/American Stroke Association Guidelines**: While focused on stroke, they emphasize the need for urgent vascular imaging in cases of acute cranial neuropathies with concerning features to rule out aneurysmal compression. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n- **RANZCO (Royal Australian and New Zealand College of Ophthalmologists) Clinical Guidelines**: Support urgent neuroimaging for any acute, pupil-involving third nerve palsy. — https://ranzco.edu/", "image_path": ""}, {"id": 34631, "date": "2026-02-19T10:02:53+00:00", "stem": "A Child with Hemophilia A. Without trauma he has a pain in his knee which started 30 mins ago. Knee is swollen and the movement is restricted. What is the first action in management?", "options": "A) Factor VI\nB) Factor VII\nC) Factor VIII\nD) Aspiration of the fluid", "answer": "C) Factor VIII", "explanation": "### ✅ Correct Answer: C. Factor VIII\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** This is a classic presentation of a **spontaneous hemarthrosis** (bleeding into the joint) in a patient with **Hemophilia A** (Factor VIII deficiency). The acute onset of pain, swelling, and restricted movement in a large joint (knee) is highly characteristic.\n2.  **Pathophysiology:** In Hemophilia A, the lack of Factor VIII impairs the intrinsic pathway of the coagulation cascade, leading to an inability to form a stable fibrin clot. This results in prolonged bleeding, including into joints.\n3.  **First and Most Critical Action:** The immediate priority is to **stop the bleeding** by replacing the deficient clotting factor. **Factor VIII concentrate** is the specific, definitive treatment. Early factor replacement minimizes pain, reduces joint damage, and prevents long-term complications like hemophilic arthropathy.\n4.  **Management Sequence:** The standard approach is \"**RICE + Factor**\": Rest, Ice, Compression, Elevation **after** immediate factor replacement. Aspiration (Option D) is **contraindicated** as an initial step because it can introduce infection and potentially worsen bleeding if done before factor replacement.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Factor VI**: Factor VI does not exist in modern coagulation theory. It is a historical misnomer and is not a real therapeutic product.\n- **B) Factor VII**: Recombinant Factor VIIa is used as a **bypassing agent** for patients with inhibitors (antibodies) to Factor VIII or IX. It is not the first-line treatment for standard Hemophilia A without inhibitors.\n- **D) Aspiration of the fluid**: Aspiration (arthrocentesis) is **not** the first action and is generally **avoided** in acute hemarthrosis. The priority is factor replacement to stop the bleeding. Aspiration may be considered in rare, severe cases **only after** adequate factor replacement, and even then, it is controversial due to infection risk.\n\n### 📚 Relevant Guidelines\n- **World Federation of Hemophilia (WFH) Guidelines for the Management of Hemophilia**: Clearly state that the mainstay of treatment for acute bleeding episodes is prompt replacement of the missing clotting factor (Factor VIII for Hemophilia A). — https://www1.wfh.org/publication/files/pdf-1867.pdf\n- **Therapeutic Guidelines (eTG) – Haematology**: Recommend immediate administration of factor VIII concentrate for acute joint bleeds in Hemophilia A. Emphasize that treatment should not be delayed. — https://tgldcdp.tg.org.au/etgaccess\n- **Australian Haemophilia Centre Directors' Organisation (AHCDO)**: Provides Australian-specific protocols for the management of hemophilia, reinforcing early factor replacement as critical. — http://www.ahcdo.org.au/", "image_path": ""}, {"id": 34636, "date": "2026-02-19T12:22:34+00:00", "stem": "19 year old child with abnormal LFT, tremor, behaviour changes, decline academic performance. Physical exam show mild hepatomegaly, no alcohol use, Wilson disease suspected. Patient tachypnoeic, no murmur. Most likely diagnosis?", "options": "Aortic stenosis\nCardiomyopathy\nPDA\nVSD\nASD", "answer": "B. Cardiomyopathy", "explanation": "### ✅ Correct Answer: B. Cardiomyopathy\n\nThis is correct because Wilson's disease (hepatolenticular degeneration) is an autosomal recessive disorder of copper metabolism that causes copper accumulation in various organs, most notably the liver and basal ganglia. The classic triad is liver disease, neuropsychiatric symptoms (tremor, behavioural changes, cognitive decline), and Kayser-Fleischer rings. A key cardiac manifestation of Wilson's disease is **cardiomyopathy**, which can present as dilated, hypertrophic, or restrictive cardiomyopathy. The patient's tachypnoea in this context is highly suggestive of heart failure secondary to cardiomyopathy. Copper deposition in the myocardium leads to inflammation, fibrosis, and impaired systolic/diastolic function. This is a well-documented, though less common, extra-hepatic and extra-neurological feature of Wilson's disease.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Aortic stenosis**: This is typically a valvular heart disease of older adults (calcific) or congenital (bicuspid aortic valve). It presents with a characteristic systolic murmur (ejection click, crescendo-decrescendo) radiating to the carotids, which the stem explicitly states is absent ('no murmur'). It has no known association with Wilson's disease.\n- **C. PDA**: Patent Ductus Arteriosus is a congenital heart defect causing a continuous 'machinery' murmur. It is usually diagnosed in infancy or childhood, not at age 19 in the context of a systemic metabolic disease like Wilson's. There is no pathophysiological link.\n- **D. VSD**: Ventricular Septal Defect is a congenital defect causing a pansystolic murmur at the left lower sternal border. Like PDA, it is not associated with Wilson's disease and would typically present much earlier in life with specific auscultatory findings.\n- **E. ASD**: Atrial Septal Defect causes a wide, fixed split S2 and often a systolic flow murmur. It is congenital and not related to copper metabolism disorders. The presentation with tachypnoea could be from heart failure, but the specific context of Wilson's disease points to cardiomyopathy as the direct complication.\n\n### 📚 Relevant Guidelines\n- **[European Association for the Study of the Liver (EASL) Clinical Practice Guidelines: Wilson's disease]**: Comprehensive guidelines covering diagnosis and management, including discussion of extra-hepatic manifestations like cardiomyopathy. — https://www.journal-of-hepatology.eu/article/S0168-8278(12)00104-5/fulltext\n- **[American Association for the Study of Liver Diseases (AASLD) Guideline: Diagnosis and Treatment of Wilson's Disease]**: Details the multisystem nature of the disease, including potential cardiac involvement. — https://aasldpubs.onlinelibrary.wiley.com/doi/full/10.1002/hep.29810\n- **[UpToDate: Wilson Disease: Clinical Manifestations, Diagnosis, and Natural History]**: Reviews the spectrum of clinical features, noting that cardiac manifestations (e.g., cardiomyopathy, arrhythmias) can occur. — https://www.uptodate.com/contents/wilson-disease-clinical-manifestations-diagnosis-and-natural-history", "image_path": ""}, {"id": 34667, "date": "2026-02-20T23:29:21+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia). In acute haemorrhage, the initial haemoglobin level can be misleading as haemodilution has not yet occurred; the key indication for transfusion is the clinical picture of hypovolaemic shock. Immediate transfusion is part of the resuscitation strategy alongside fluid resuscitation and definitive control of the bleeding source. The other patients have chronic anaemia or stable conditions where transfusion is not the first-line management and carries more risk than benefit.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is a case of **chronic, stable anaemia**. The patient is haemodynamically stable with minimal symptoms. The first-line management is **oral iron supplementation** and investigation/treatment of the underlying cause (menorrhagia). Transfusion is rarely indicated and carries risks (e.g., transfusion reactions, iron overload).\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with cardiac disease may have a higher transfusion threshold (often Hb <80 g/L) to prevent myocardial ischaemia, this patient is **asymptomatic** and the anaemia is **chronic**. The priority is to investigate the cause of the normocytic anaemia (e.g., chronic kidney disease, myelodysplasia) rather than immediate transfusion.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This represents a **postpartum anaemia**, likely due to blood loss at delivery. The patient is **well and asymptomatic**. Management involves oral iron therapy and monitoring. Transfusion is not indicated in an asymptomatic, stable patient.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This Hb level (95 g/L) is only mildly low. In chemotherapy-induced anaemia, guidelines typically recommend considering erythropoiesis-stimulating agents or transfusion only when Hb falls below **80 g/L** or if the patient is symptomatic. \"Mild fatigue\" alone does not warrant immediate transfusion.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority (Australia) - Patient Blood Management Guidelines]** — Module 2: Perioperative. Provides clear criteria for red cell transfusion, emphasising haemodynamic status and active bleeding over a single Hb number. — https://www.blood.gov.au/pbm-module-2\n- **[Choosing Wisely Australia - RACP Recommendations]** — Advises against red blood cell transfusion for stable, chronic anaemia in the absence of symptoms or active bleeding. — https://www.choosingwisely.org.au/recommendations/racp2\n- **[UpToDate - Indications and hemoglobin thresholds for red blood cell transfusion in the adult]** — Reviews evidence for transfusion thresholds in various clinical scenarios, including acute haemorrhage and chronic anaemia. — https://www.uptodate.com/contents/indications-and-hemoglobin-thresholds-for-red-blood-cell-transfusion-in-the-adult", "image_path": ""}, {"id": 34668, "date": "2026-02-20T23:29:29+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a **well-known, potent oxidant stressor** that can precipitate acute haemolytic anaemia in individuals with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic for acute haemolysis: sudden onset of symptoms (dark urine from haemoglobinuria, jaundice, fatigue) following an oxidative insult. The laboratory findings confirm haemolytic anaemia (low Hb, elevated reticulocytes, elevated indirect bilirubin). The peripheral blood film showing **\"bite cells\" and blister cells** is characteristic of oxidative damage to red blood cells, where Heinz bodies (denatured haemoglobin) are pitted by the spleen, leaving a \"bite\" in the cell membrane. While other drugs can cause haemolysis in G6PD deficiency, dapsone is among the most common and potent triggers listed.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is **not** a common trigger for haemolysis in G6PD deficiency. It is generally considered safe at therapeutic doses. High doses can cause hepatic toxicity via a different mechanism (glutathione depletion), but this does not typically present with the acute haemolytic picture described.\n- **B. Amoxicillin**: Penicillins like amoxicillin are **not** typical oxidant stressors. They are more commonly associated with immune-mediated haemolytic anaemia (via drug-induced antibodies, not G6PD deficiency) or other adverse reactions like rash, but they do not precipitate haemolysis in G6PD deficiency.\n- **D. Metformin**: Metformin is an antidiabetic drug and is **not** known to cause oxidative haemolysis. Its side effects are gastrointestinal or, rarely, lactic acidosis.\n- **E. Prednisolone**: Prednisolone is a corticosteroid used to treat various inflammatory conditions. It is **not** an oxidant drug and does not trigger haemolysis in G6PD deficiency. In fact, steroids may sometimes be used in the management of certain types of immune haemolysis.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - G6PD Deficiency]** — Lists drugs to be avoided in G6PD deficiency, including dapsone, sulfonamides, nitrofurantoin, and primaquine. — https://tgldcdp.tg.org.au/viewTopic?topicfile=glucose-6-phosphate-dehydrogenase-deficiency\n- **[UpToDate - Diagnosis and management of glucose-6-phosphate dehydrogenase deficiency]** — Provides a comprehensive list of drugs and other triggers
