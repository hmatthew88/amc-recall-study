D-dimer test\n\nThis patient presents with classic features of pulmonary embolism (PE): acute dyspnoea, pleuritic chest pain, haemoptysis, and recent prolonged immobilisation (long-haul flight). She has tachycardia and tachypnoea with mild hypoxaemia, but a normal chest X-ray. According to validated clinical decision rules like the Wells' criteria or revised Geneva score, she would have a moderate pre-test probability for PE.\n\n**Step-by-step clinical reasoning:**\n1. **Initial assessment:** The patient is haemodynamically stable (no hypotension, syncope, or signs of right heart strain). In stable patients with suspected PE, the standard diagnostic pathway begins with clinical probability assessment followed by D-dimer testing in those with low or intermediate probability.\n2. **Role of D-dimer:** D-dimer is a highly sensitive (but non-specific) test for venous thromboembolism (VTE). A negative D-dimer in a patient with low or intermediate pre-test probability effectively rules out PE and avoids unnecessary radiation exposure from CT pulmonary angiography (CTPA).\n3. **Why not immediate imaging?** Direct progression to CTPA or V/Q scan is reserved for patients with high pre-test probability or those with a positive D-dimer. In this moderate-probability, stable patient, D-dimer is the appropriate gatekeeper test.\n4. **AMC exam context:** The AMC emphasises cost-effective, evidence-based sequencing of investigations. Ordering a D-dimer first aligns with Australian guidelines (eTG, RACP) which advocate using it to safely reduce imaging rates.\n\n### ❌ Why the Other Options Are Wrong\n- **A. CT pulmonary angiography**: While definitive for diagnosing PE, it involves radiation and contrast exposure. It is not the *initial* test in a stable patient with moderate pre-test probability; it follows a positive D-dimer or is used directly only in high-probability cases.\n- **B. Ventilation-perfusion (V/Q) scan**: Useful when CTPA is contraindicated (e.g., renal impairment, contrast allergy) or in pregnancy. However, it is not the first-line test and often requires a preceding chest X-ray (which is normal here) and clinical probability assessment. It is less readily available and more complex to interpret than a D-dimer.\n- **D. Lower limb Doppler ultrasound**: This diagnoses deep vein thrombosis (DVT). While finding a DVT would warrant anticoagulation (and imply possible PE), a negative study does not rule out PE. It is not the most appropriate *initial* test for suspected PE; it is typically used if symptoms suggest DVT or if imaging for PE is equivocal.\n- **E. Echocardiography**: May show signs of right heart strain in massive PE but has poor sensitivity for smaller emboli. It is not a diagnostic test for PE; it is used for risk stratification in confirmed cases or in unstable patients to assess cardiac function.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) – Venous Thromboembolism]**: Provides Australian recommendations for diagnosis and management of PE, including the use of clinical prediction rules and D-dimer testing. — https://tgldcdp.tg.org.au/etgAccess\n- **[RACP – EVOLVE Choosing Wisely Recommendations]**: Advises against imaging for PE without prior clinical probability assessment and D-dimer testing where appropriate. — https://evolve.edu.au/pdfs/EVOLVE_Thrombosis_5Things.pdf\n- **[European Society of Cardiology (ESC) Guidelines on Acute Pulmonary Embolism]**: Internationally recognised, evidence-based guidelines that detail diagnostic algorithms using pre-test probability and D-dimer. — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Acute-Pulmonary-Embolism-Diagnosis-and-Management-of", "image_path": ""}, {"id": 31139, "date": "2026-03-18T15:37:10+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "What should be the 1st line treatment for post partum psychosis?", "options": "A. Antipsychotic\nB. ECT", "answer": "A. Antipsychotic", "explanation": "### ✅ Correct Answer: A. Antipsychotic\nPostpartum psychosis is a psychiatric emergency requiring urgent hospital admission. First-line treatment involves:\n1. **Immediate hospitalisation** for safety monitoring (risk of harm to self/infant).\n2. **Antipsychotic medication** (e.g., olanzapine, risperidone, quetiapine) as the primary pharmacological intervention to control psychotic symptoms (delusions, hallucinations, thought disorder).\n3. **Mood stabilisers** (e.g., lithium, valproate) are often added if there is a prominent manic component, as postpartum psychosis is frequently a manifestation of bipolar disorder.\n4. **ECT** is considered a second-line treatment for severe, treatment-resistant cases or when a rapid response is needed due to high suicide risk or catatonia, but it is not first-line.\n5. **Supportive care** includes mother-infant bonding support, psychoeducation, and involvement of partner/family.\n\n### ❌ Why the Other Options Are Wrong\n- **B. ECT**: While effective and sometimes used in severe or medication-resistant postpartum psychosis, ECT is not first-line. It is reserved for cases where antipsychotics are ineffective, poorly tolerated, or when there is an immediate life-threatening risk (e.g., severe suicidality, catatonia, refusal to eat/drink) requiring rapid symptom resolution.\n\n### 📚 Relevant Guidelines\n- **Royal Australian and New Zealand College of Psychiatrists (RANZCP) Clinical Practice Guidelines for Mood Disorders**: Provide specific recommendations for managing perinatal psychiatric disorders, including postpartum psychosis — [https://www.ranzcp.org/clinical-guidelines-and-resources/clinical-practice-guidelines/mood-disorders](https://www.ranzcp.org/clinical-guidelines-and-resources/clinical-practice-guidelines/mood-disorders)\n- **Therapeutic Guidelines (Psychiatry)**: Australian evidence-based guidelines recommending antipsychotics as first-line pharmacological treatment for psychosis, including in the postpartum period — [https://tgldcdp.tg.org.au/guideLine?guidelinePage=Psychiatry&frompage=etgge](https://tgldcdp.tg.org.au/guideLine?guidelinePage=Psychiatry&frompage=etgge)\n- **UpToDate: Postpartum psychosis**: Reviews clinical features, differential diagnosis, and management, stating that antipsychotics are first-line, with ECT as an option for severe or refractory cases — [https://www.uptodate.com/contents/postpartum-psychosis](https://www.uptodate.com/contents/postpartum-psychosis)", "image_path": ""}, {"id": 31142, "date": "2026-03-18T18:06:29+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old woman presents with brown nipple discharge when pressure is applied above the nipple. What is the most likely diagnosis?", "options": "1. Intraductal carcinoma\n2. Paget disease of nipple\n3. Breast carcinoma\n4. Mammary duct ectasia", "answer": "4. Mammary duct ectasia", "explanation": "### ✅ Correct Answer: 4. Mammary duct ectasia\nMammary duct ectasia is the most likely cause of a brown (often described as greenish, brown, or black), thick, sticky, non-bloody nipple discharge in a perimenopausal woman (typically 40s-50s). The discharge is usually bilateral, multi-ductal, and often provoked by pressure around the nipple (peripheral pressure). The pathophysiology involves dilation and inflammation of the subareolar ducts, often with inspissated secretions. This is a benign, non-cancerous condition. While malignancy must always be considered in the differential for nipple discharge, the characteristics here (brown colour, elicited by pressure, age) strongly favour a benign cause like duct ectasia. Management involves reassurance, good breast support, and sometimes cessation of smoking (a risk factor). Imaging (mammography/ultrasound) and duct excision may be considered if diagnosis is uncertain or symptoms are bothersome.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Intraductal carcinoma**: Intraductal carcinoma (DCIS) can cause nipple discharge, but it is typically unilateral, single-duct, and often bloody or serosanguinous. A brown, multi-duct discharge provoked by pressure is not the classic presentation.\n- **2. Paget disease of nipple**: Paget disease presents with eczematous changes of the nipple (erythema, scaling, crusting, ulceration), often with an underlying ductal carcinoma. Nipple discharge may occur but is not the primary feature; the skin changes are the hallmark.\n- **3. Breast carcinoma**: While invasive breast cancer can cause nipple discharge, it is less common as a presenting symptom. When it does occur, the discharge is more likely to be unilateral, spontaneous, bloody, and associated with a palpable mass or other concerning features on imaging. The described scenario is more characteristic of a benign process.\n\n### 📚 Relevant Guidelines\n- **RACGP - Breast symptoms**: Provides a structured approach to evaluating breast symptoms including nipple discharge, emphasising the importance of distinguishing benign from malignant causes. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice/early-detection-of-cancers/breast-cancer\n- **Therapeutic Guidelines (eTG) - Breast disorders**: Discusses the management of benign breast conditions, including mammary duct ectasia. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate - Nipple discharge**: Provides a detailed evidence-based review of causes, evaluation, and management of nipple discharge, highlighting the features of benign etiologies like duct ectasia. — https://www.uptodate.com/contents/nipple-discharge", "image_path": ""}, {"id": 31145, "date": "2026-03-18T18:15:39+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Pt on enoxaparin and has developed diffuse small pulmonary embolism but pt is normal but has mild sob. What u will do?", "options": "1.increase dose\n2. Stop and change to apaxiban\n3.thrombolysis", "answer": "2. Stop and change to apaxiban", "explanation": "### ✅ Correct Answer: 2. Stop and change to apaxiban\nThe patient has a breakthrough pulmonary embolism (PE) while on therapeutic enoxaparin (a low molecular weight heparin - LMWH). The key points are: 'diffuse small PE' (suggesting a new event despite prophylaxis/therapy), 'pt is normal' (likely meaning haemodynamically stable), and 'mild sob' (symptomatic but not in shock). A breakthrough VTE on therapeutic anticoagulation suggests treatment failure, which can be due to subtherapeutic dosing, non-adherence, or less commonly, heparin resistance or cancer. The standard management is to switch to a different class of anticoagulant. Direct oral anticoagulants (DOACs) like apixaban are first-line for VTE treatment in most patients. Therefore, stopping enoxaparin and switching to a therapeutic dose of apixaban is appropriate. Increasing the enoxaparin dose (option 1) is not standard; if failure is confirmed, switching agents is preferred. Thrombolysis (option 3) is reserved for massive PE with haemodynamic instability, which is not present here.\n\n### ❌ Why the Other Options Are Wrong\n- **1.increase dose**: Simply increasing the dose of the same agent (enoxaparin) is not the recommended strategy for a confirmed breakthrough VTE on therapeutic anticoagulation. It implies the current regimen is ineffective, and switching to an alternative agent (e.g., a DOAC or a different LMWH/fondaparinux) is the standard approach after confirming adherence and checking anti-Xa levels if indicated.\n- **3.thrombolysis**: Systemic thrombolysis is indicated for massive PE with persistent hypotension/shock (haemodynamically unstable PE). This patient is described as 'normal' with only mild shortness of breath, fitting a 'low-risk' or 'submassive' PE category. Thrombolysis in this context carries significant bleeding risk without proven mortality benefit.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Venous thromboembolism**: Outlines the management of acute PE, including treatment of breakthrough events and the role of DOACs like apixaban. — https://tgldcdp.tg.org.au/etgAccess\n- **American Society of Hematology (ASH) 2020 Guidelines for management of VTE**: Addresses management of recurrent VTE on anticoagulation, recommending assessment of adherence and consideration of switching anticoagulant class. — https://ashpublications.org/bloodadvances/article/4/19/4693/463998/American-Society-of-Hematology-2020-guidelines-for\n- **European Society of Cardiology (ESC) 2019 Guidelines for acute PE**: Defines risk stratification (massive, submassive, low-risk) and clearly states thrombolysis is for haemodynamically unstable patients only. — https://academic.oup.com/eurheartj/article/40/14/1188/5079111", "image_path": ""}, {"id": 31158, "date": "2026-03-19T05:59:30+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "56-year-old female patient presents with pale and cold hands. She has an arteriovenous (AV) fistula in her left arm for hemodialysis. After dialysis, she experiences swelling and tingling in the same arm, which resolves by the next morning. Chest X-ray and labs are unremarkable. What is the most likely cause of her symptoms?", "options": "Brachial artery thrombosis\nRadial artery thrombosis\nAV fistula influx stenosis\nAV fistula outflux stenosis\nAV fistula infection", "answer": "D. AV fistula outflux stenosis", "explanation": "### ✅ Correct Answer: D. AV fistula outflux stenosis\n\n**Clinical Reasoning:**\n\n1. **Pathophysiology:** The patient has a hemodialysis AV fistula in her left arm. The symptoms described—swelling and tingling after dialysis that resolves overnight—are classic for **venous outflow stenosis**. \n\n2. **Mechanism:** During hemodialysis, blood is rapidly withdrawn from the fistula and returned after passing through the dialysis machine. If there is a stenosis (narrowing) in the **outflow (venous) limb** of the fistula, it creates resistance to the return of blood. This leads to **venous hypertension** and congestion in the arm distal to the fistula.\n\n3. **Key Diagnostic Features:**\n   - **Swelling (edema):** Caused by increased venous pressure and fluid extravasation.\n   - **Tingling (paresthesia):** Results from compression of nerves due to edema and congestion.\n   - **Pale and cold hands (at baseline):** This is a separate but common finding in dialysis patients due to underlying vascular disease, but it's not the acute issue.\n   - **Temporal pattern:** Symptoms occur **after dialysis** when blood flow through the fistula is high, and **resolve overnight** as venous pressure normalizes with rest and reduced flow.\n\n4. **Management Pearls:**\n   - Diagnosis is confirmed with **fistula ultrasound** showing elevated velocities and narrowing at the outflow site.\n   - Treatment involves **angioplasty** to dilate the stenotic segment.\n   - This is a common complication of AV fistulas and a major cause of fistula failure.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Brachial artery thrombosis**: This would cause acute limb ischemia with **constant** severe pain, pallor, pulselessness, paresthesia, and paralysis (the 5 Ps). It would not cause transient swelling that resolves overnight.\n- **B. Radial artery thrombosis**: Similar to brachial thrombosis, this would cause acute ischemic symptoms in the radial distribution, not transient post-dialysis swelling and tingling.\n- **C. AV fistula influx stenosis**: This refers to **arterial inflow** stenosis. This would cause problems with **dialysis adequacy** (poor blood flow during dialysis) and possibly steal syndrome, but not primarily post-dialysis swelling and venous congestion.\n- **E. AV fistula infection**: This would present with **local signs of infection** (redness, warmth, tenderness, purulent discharge) and systemic symptoms (fever). The transient, post-dialysis swelling without infectious signs makes this unlikely.\n\n### 📚 Relevant Guidelines\n\n- **[Kidney Health Australia - Caring for Australasians with Renal Impairment (KHA-CARI) Guidelines]**: Vascular access for hemodialysis — covers surveillance, complications, and management of AV fistulas. — https://www.cari.org.au/guidelines/vascular-access\n- **[Therapeutic Guidelines: Nephrology]**: Management of hemodialysis access complications including stenosis and thrombosis. — https://tgldcdp.tg.org.au/nephrology\n- **[UpToDate - Hemodialysis arteriovenous fistula complications]**: Detailed review of diagnosis and management of outflow stenosis and other fistula complications. — https://www.uptodate.com/contents/hemodialysis-arteriovenous-fistula-complications", "image_path": ""}, {"id": 31186, "date": "2026-03-19T15:18:15+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old man with end-stage renal disease on hemodialysis via a left brachiocephalic arteriovenous fistula presents with progressive swelling of his left hand and forearm over the past 2 months. He also reports intermittent tingling and numbness in his fingers. On examination, the fistula has a palpable thrill and audible bruit. The swelling is non-pitting and extends from the hand to the mid-forearm. What is the most likely cause of these symptoms?", "options": "A. Inflow stenosis\nB. Venous hypertension\nC. Outflow stenosis\nD. Arterial steal syndrome\nE. Deep vein thrombosis", "answer": "C. Outflow stenosis", "explanation": "### ✅ Correct Answer: C. Outflow stenosis\n\n**Clinical Reasoning:**\n1. **Pathophysiology:** Outflow stenosis refers to a narrowing in the venous outflow tract of the arteriovenous fistula (AVF), typically in the central veins (subclavian, brachiocephalic, or superior vena cava) or the anastomotic site. This obstruction impedes venous return from the limb, leading to increased venous pressure and congestion.\n2. **Key Diagnostic Features:**\n   - **Swelling (edema):** The most common presentation is progressive, non-pitting edema of the hand, forearm, and sometimes the entire arm. This is due to impaired venous drainage.\n   - **Neurological symptoms:** Tingling and numbness (as in this case) can occur due to compression of adjacent nerves (e.g., median nerve) from the swelling or from venous engorgement.\n   - **Preserved thrill and bruit:** The fistula remains patent (thrill and bruit present), but the outflow obstruction causes congestion 'backing up' into the limb.\n   - **Timeline:** Symptoms develop gradually over weeks to months, consistent with the 2-month history here.\n3. **Management Pearls:** Diagnosis is confirmed with Doppler ultrasound or fistulogram. Treatment involves angioplasty (with or without stenting) to relieve the stenosis and restore normal flow.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Inflow stenosis**: Inflow stenosis (arterial inflow narrowing) typically presents with **reduced flow into the fistula**, leading to **difficult cannulation, prolonged bleeding post-dialysis, or poor dialysis efficiency (high venous pressures)**. It does not cause swelling of the hand/forearm; instead, it might cause coolness or pallor distal to the stenosis.\n- **B. Venous hypertension**: This is a broad term and is actually a **consequence** of outflow stenosis, not a distinct primary cause. In the context of AVF complications, venous hypertension is the pathophysiological mechanism by which outflow stenosis causes swelling. However, as a listed option, it is less specific than 'outflow stenosis' which identifies the precise anatomical lesion.\n- **D. Arterial steal syndrome**: This occurs when the AVF 'steals' arterial blood flow away from the distal limb, leading to **ischemic symptoms**: coolness, pain, pallor, paresthesia, and potentially tissue necrosis. The hand may appear **pale and cool**, not swollen. Symptoms are often exacerbated during dialysis or with fistula compression.\n- **E. Deep vein thrombosis (DVT)**: While an upper extremity DVT can cause swelling, it is less common in this specific context. An AVF-associated DVT would likely cause **acute** onset of swelling, pain, and redness, and might compromise the fistula (loss of thrill/bruit). The chronic, progressive swelling with preserved thrill/bruit points more toward a stenotic rather than thrombotic process.\n\n### 📚 Relevant Guidelines\n- **Kidney Health Australia - Caring for Australasians with Renal Impairment (KHA-CARI) Guidelines**: Provide comprehensive guidelines on the surveillance and management of vascular access complications in hemodialysis patients. — https://www.cari.org.au/guidelines/access/access.html\n- **Therapeutic Guidelines (eTG) - Renal Medicine**: Includes sections on the management of end-stage kidney disease and complications of dialysis access. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate - Complications of arteriovenous hemodialysis access**: A detailed, evidence-based review of the evaluation and management of AVF complications, including outflow stenosis. — https://www.uptodate.com/contents/complications-of-arteriovenous-hemodialysis-access", "image_path": "photo_2026-03-19_15-18-15.jpg"}, {"id": 31195, "date": "2026-03-19T15:53:49+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "60 years old woman presents with progressive shortness of breath and orthopnoea. On examination bilateral basal crackles and ankle oedema. Echo shows dilated cardiomyopathy. Most appropriate treatment:", "options": "1. Beta-blockers\n2. ACE Inhibitors\n3. Diuretics", "answer": "3. Diuretics", "explanation": "### ✅ Correct Answer: 3. Diuretics\n\nThis patient presents with acute decompensated heart failure (ADHF) secondary to dilated cardiomyopathy, evidenced by progressive dyspnoea, orthopnoea, bilateral basal crackles (pulmonary oedema), and peripheral oedema. In the acute setting, the immediate priority is symptom relief by reducing preload and pulmonary congestion. Diuretics (specifically loop diuretics like furosemide) are first-line for rapid decongestion. They promote diuresis, reduce intravascular volume, decrease ventricular filling pressures, and alleviate pulmonary and systemic oedema. Beta-blockers and ACE inhibitors are crucial for long-term management to reduce mortality and disease progression in heart failure with reduced ejection fraction (HFrEF), but they are NOT initiated during acute decompensation. Beta-blockers can worsen acute failure by negatively impacting inotropy and chronotropy, and ACE inhibitors can cause hypotension and renal impairment in a volume-depleted state. Therefore, diuretics are the most appropriate initial treatment.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Beta-blockers**: Beta-blockers are contraindicated in acute decompensated heart failure. They have negative inotropic and chronotropic effects that can further reduce cardiac output and exacerbate symptoms in an unstable patient. They are initiated only after the patient is euvolemic and stable, typically before discharge or in outpatient follow-up.\n- **2. ACE Inhibitors**: While ACE inhibitors are cornerstone therapy for chronic heart failure to reduce afterload, remodelling, and mortality, they are not first-line in acute pulmonary oedema. Starting them during acute decompensation can precipitate hypotension (especially if the patient is diuresed) and worsen renal perfusion, leading to acute kidney injury.\n\n### 📚 Relevant Guidelines\n- **[National Heart Foundation of Australia & Cardiac Society of Australia and New Zealand: Guidelines for the Prevention, Detection, and Management of Heart Failure in Australia 2018]**: Provides comprehensive guidance on acute and chronic heart failure management, emphasizing diuretics for symptomatic relief in ADHF. — https://www.heartfoundation.org.au/getmedia/7f7e2ee6-2181-408e-9c60-10f3c6e7d5d2/HF_Guidelines_2018_FINAL_WEB_READY.pdf\n- **[Therapeutic Guidelines: Cardiovascular (eTG)]**: Details pharmacological management of heart failure, including the acute use of loop diuretics for fluid overload. — https://tgldcdp.tg.org.au/viewTopic?topicfile=heart-failure-management&guidelineName=Cardiovascular\n- **[European Society of Cardiology (ESC) Guidelines for the diagnosis and treatment of acute and chronic heart failure 2021]**: International standard recommending diuretics for relief of congestive symptoms in acute heart failure. — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Acute-and-Chronic-Heart-Failure", "image_path": ""}, {"id": 31218, "date": "2026-03-20T03:32:32+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old man presents with acute low back pain without radiculopathy or red flags. According to the provided image (photo_2026-03-20_03-32-32.jpg), the question asks about the appropriate initial pharmacological management.", "options": "A. Start with NSAIDs first\nB. Start with paracetamol first, then NSAIDs\nC. Start with opioids\nD. Start with muscle relaxants (e.g., diazepam)\nE. Start with gabapentin", "answer": "B. Start with paracetamol first, then NSAIDs", "explanation": "### ✅ Correct Answer: B. Start with paracetamol first, then NSAIDs\n\nFor acute non-specific low back pain without red flags (like cauda equina syndrome, infection, malignancy, or major trauma), the initial pharmacological management follows a stepwise approach prioritizing safety and minimizing side effects. Paracetamol is recommended as first-line due to its favorable safety profile, minimal gastrointestinal and renal side effects, and proven efficacy for mild to moderate pain. If pain persists or is inadequate with paracetamol, NSAIDs (like ibuprofen or naproxen) can be added or used as second-line agents. This approach aligns with the principle of using the simplest, safest intervention first (paracetamol) before escalating to agents with more potential adverse effects (NSAIDs).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Start with NSAIDs first**: While NSAIDs are effective for musculoskeletal pain, they are not recommended as absolute first-line before trying paracetamol due to their higher risk of gastrointestinal, renal, and cardiovascular adverse effects, especially with prolonged use. Guidelines recommend paracetamol as the initial agent.\n- **C. Start with opioids**: Opioids are generally not recommended for acute non-specific low back pain due to risks of dependence, sedation, constipation, and respiratory depression. They are reserved for severe pain not responsive to first- and second-line agents, and only for short-term use if absolutely necessary.\n- **D. Start with muscle relaxants (e.g., diazepam)**: Benzodiazepines like diazepam are not first-line for acute low back pain. They have sedative effects, risk of dependence, and limited evidence for superior efficacy over paracetamol or NSAIDs. Non-benzodiazepine muscle relaxants (e.g., cyclobenzaprine) may be considered in some cases but are still not first-line.\n- **E. Start with gabapentin**: Gabapentin is an anticonvulsant used for neuropathic pain (e.g., radiculopathy, sciatica). For non-specific low back pain without neuropathic features, it is not indicated and has side effects like dizziness, sedation, and weight gain.\n\n### 📚 Relevant Guidelines\n- **RACGP (Royal Australian College of General Practitioners) - Guideline for the management of acute musculoskeletal pain**: Recommends paracetamol as first-line pharmacological treatment for acute low back pain, followed by NSAIDs if needed. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/musculoskeletal-pain\n- **Therapeutic Guidelines (eTG) - Musculoskeletal pain**: Advises a stepwise approach: simple analgesics (paracetamol) first, then consider adding NSAIDs. Emphasizes avoiding opioids and benzodiazepines for routine management. — https://tgldcdp.tg.org.au/etgAccess\n- **NICE (National Institute for Health and Care Excellence) - Low back pain and sciatica in over 16s**: Recommends offering paracetamol and/or NSAIDs, considering paracetamol first due to lower risk of side effects. — https://www.nice.org.uk/guidance/ng59", "image_path": "photo_2026-03-20_03-32-32.jpg"}, {"id": 31280, "date": "2026-03-21T06:25:32+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 28-year-old primigravida at 32 weeks gestation presents with painless vaginal bleeding. Ultrasound shows a low-lying placenta covering the internal os. What is the most appropriate immediate management?", "options": "A. Arrange cross-match and blood products\nB. Perform a digital vaginal examination\nC. Administer corticosteroids for fetal lung maturity\nD. Induce labour\nE. Perform an emergency caesarean section", "answer": "A. Arrange cross-match and blood products", "explanation": "### ✅ Correct Answer: A. Arrange cross-match and blood products\n\n**Clinical Reasoning:**\n1. **Diagnosis:** The presentation of painless vaginal bleeding in the third trimester with ultrasound showing a low-lying placenta covering the internal os is classic for **major placenta previa**.\n2. **Pathophysiology:** In placenta previa, the placenta implants in the lower uterine segment, over or near the internal cervical os. As the cervix effaces and dilates, placental vessels tear, leading to painless, often profuse, vaginal bleeding. The bleeding is maternal in origin.\n3. **Immediate Priorities:** The primary risk is **life-threatening haemorrhage** leading to maternal hypovolaemic shock and fetal compromise. Therefore, the immediate management focuses on **resuscitation preparedness**.\n4. **Step-by-Step Management:**\n   - **First:** Assess maternal and fetal stability (vitals, fetal heart rate).\n   - **Second:** Secure intravenous access with large-bore cannulas.\n   - **Third:** **Arrange cross-match and blood products** (packed red blood cells, fresh frozen plasma, cryoprecipitate) as a critical preparatory step for potential massive transfusion.\n   - **Fourth:** Admit for close monitoring. Avoid any vaginal examination (digital or speculum) as it can provoke catastrophic bleeding.\n   - **Fifth:** If the patient is stable and bleeding settles, manage conservatively with bed rest, monitoring, and plan for elective caesarean section at 36-37 weeks (or earlier if bleeding recurs or labour begins). Corticosteroids (e.g., betamethasone) are given if delivery is anticipated before 34 weeks to promote fetal lung maturity, but this is not the *most immediate* action compared to preparing for haemorrhage.\n5. **AMC Exam Pearl:** For any antepartum haemorrhage (APH), especially with a history suggestive of placenta previa, the immediate actions are **resuscitation (IV access, fluids), investigation (group and hold/cross-match, ultrasound), and preparation for possible emergency delivery**. 'Arrange cross-match and blood' is the foundational step before any other intervention.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Perform a digital vaginal examination**: **Absolutely contraindicated** in suspected placenta previa. A digital examination can disrupt the placenta over the os, causing immediate, severe, and life-threatening haemorrhage. Diagnosis is made by ultrasound, not physical examination.\n- **C. Administer corticosteroids for fetal lung maturity**: While important for a preterm fetus (32 weeks), this is a **secondary management step** after ensuring maternal stability and preparing for potential haemorrhage. It is not the most immediate action when the primary threat is acute blood loss.\n- **D. Induce labour**: **Contraindicated** in major placenta previa. Vaginal delivery is not possible if the placenta covers the os; the definitive delivery method is **caesarean section**. Induction would be dangerous and ineffective.\n- **E. Perform an emergency caesarean section**: Not indicated *immediately* if the mother and fetus are **stable**. The goal is to prolong pregnancy to improve fetal maturity unless there is persistent heavy bleeding, maternal instability, or fetal distress. Emergency surgery is reserved for unstable patients.\n\n### 📚 Relevant Guidelines\n- **[RANZCOG - Management of Placenta Previa and Placenta Accreta Spectrum Disorder]**: Provides comprehensive guidelines on diagnosis, antenatal management, and delivery planning for placenta previa, emphasising avoidance of vaginal examination and preparation for haemorrhage. — https://ranzcog.edu.au/womens-health/statements-guidelines/obstetrics/placenta-previa-accreta\n- **[Therapeutic Guidelines (eTG) - Obstetrics]**: Covers the management of antepartum haemorrhage, including resuscitation principles and the use of blood products. — https://tgldcdp.tg.org.au/viewTopic?topicfile=obstetric-bleeding&guidelineName=Women%27s%20Health\n- **[UpToDate - Placenta Previa: Management]**: Detailed evidence-based review of management steps, including the timing of delivery and the importance of blood product availability. — https://www.uptodate.com/contents/placenta-previa-management", "image_path": "photo_2026-03-21_06-25-32.jpg"}, {"id": 31295, "date": "2026-03-21T09:11:13+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Thalassemia couple question (husband didn’t know his status but wife was a carrier)", "options": "A. Genetic counselling\nB. Check husband status", "answer": "B", "explanation": "### ✅ Correct Answer: B. Check husband status\n\nThis is correct because the immediate next step in managing a couple where one partner is a known thalassemia carrier is to determine the carrier status of the other partner. This is a fundamental principle of preconception/prenatal screening. The wife is already identified as a carrier. The husband's status is unknown. Before any meaningful genetic counselling can occur regarding specific risks and options (e.g., prenatal diagnosis, IVF with preimplantation genetic testing), the factual risk must be quantified. If the husband is also a carrier, the couple has a 25% risk with each pregnancy of having a child with a major thalassemia syndrome (e.g., beta-thalassemia major). If he is not a carrier, the risk is negligible for major disease (children would be carriers or unaffected). Therefore, checking the husband's status (via full blood count, haemoglobin electrophoresis, or DNA testing as indicated) is the essential first action to inform the subsequent counselling process.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Genetic counselling**: While genetic counselling is absolutely indicated and crucial for this couple, it is not the *next step* given the presented information. Effective genetic counselling requires specific risk information. Providing counselling without knowing the husband's status would be incomplete and potentially inefficient, as the discussion would be hypothetical. The counselling session would logically be scheduled *after* the husband's test results are available to discuss the concrete risks and management options.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Prenatal Screening and Diagnosis of Chromosomal and Genetic Abnormalities in the Fetus**: This guideline outlines the approach to carrier screening, including for haemoglobinopathies like thalassemia, and emphasizes testing the partner of a known carrier to assess fetal risk. — https://ranzcog.edu.au/womens-health/guidelines/prenatal-screening-and-diagnosis-of-chromosomal-and-genetic\n- **Therapeutic Guidelines (eTG) - Haematology**: Provides guidance on the laboratory diagnosis of thalassemia and related haemoglobinopathies, which is the basis for 'checking husband status'. — https://tgldcdp.tg.org.au/etgAccess\n- **NSW Health - Haemoglobinopathy Carrier Testing**: A practical clinical pathway that recommends testing the partner of a known carrier as the immediate follow-up step. — https://www.health.nsw.gov.au/hepatitis/Pages/haemoglobinopathies-carrier-testing.aspx", "image_path": ""}, {"id": 31296, "date": "2026-03-21T09:19:44+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Is antibiotics indicated for prophylaxis in turp?", "options": "A\nB", "answer": "A", "explanation": "### ✅ Correct Answer: A. Yes\n\nAntibiotic prophylaxis is indicated for Transurethral Resection of the Prostate (TURP). TURP is classified as a clean-contaminated or contaminated urological procedure due to the manipulation of the urethra and prostate, which are colonised with bacteria. The procedure carries a significant risk of postoperative infections, including bacteriuria, urinary tract infection (UTI), and potentially bacteraemia or sepsis. Prophylactic antibiotics reduce the incidence of postoperative infectious complications. The choice of antibiotic should cover common uropathogens (e.g., *Escherichia coli*, *Proteus* spp., *Enterococcus* spp.) and is typically given as a single dose within 60 minutes before the procedure. Common agents include a cephalosporin (e.g., cefazolin) or trimethoprim. This is a standard of care supported by surgical and urological guidelines worldwide.\n\n### ❌ Why the Other Options Are Wrong\n- **B. No**: This is incorrect. Withholding antibiotic prophylaxis for TURP would deviate from established clinical guidelines and increase the patient's risk of preventable postoperative infections, leading to increased morbidity, longer hospital stays, and higher healthcare costs. The evidence clearly supports the use of prophylaxis for this procedure.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Antibiotic: Surgical Prophylaxis**: Specifically lists TURP as a procedure requiring surgical antibiotic prophylaxis. Recommends a single dose of an appropriate agent (e.g., cefazolin, trimethoprim) preoperatively. — https://tgldcdp.tg.org.au/etgAccess\n- **American Urological Association (AUA) Best Practice Statement on Urologic Surgery Antimicrobial Prophylaxis**: Recommends antimicrobial prophylaxis for all patients undergoing TURP. — https://www.auanet.org/guidelines/antimicrobial-prophylaxis-guideline\n- **National Institute for Health and Care Excellence (NICE) - Surgical site infections: prevention and treatment**: Provides a framework for antibiotic prophylaxis, supporting its use in procedures like TURP where there is a clear benefit. — https://www.nice.org.uk/guidance/ng125", "image_path": ""}, {"id": 31298, "date": "2026-03-21T09:37:02+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Preg women with left lower limb redness, warm and pain. Next step", "options": "Start lmwh\nAspirin", "answer": "Start lmwh", "explanation": "### ✅ Correct Answer: Start lmwh\n\nThis is correct because the presentation (unilateral lower limb redness, warmth, and pain in a pregnant woman) is highly suggestive of a deep vein thrombosis (DVT) until proven otherwise. Pregnancy is a hypercoagulable state due to physiological changes (increased clotting factors, venous stasis, vascular injury). The next critical step is to immediately commence therapeutic anticoagulation with Low Molecular Weight Heparin (LMWH), such as enoxaparin, while arranging definitive diagnostic imaging (usually compression ultrasound of the limb). LMWH is the anticoagulant of choice in pregnancy as it does not cross the placenta, is effective, and has a favourable safety profile. Starting treatment empirically is crucial to prevent thrombus extension and life-threatening complications like pulmonary embolism. Aspirin is not appropriate for acute treatment of suspected DVT.\n\n### ❌ Why the Other Options Are Wrong\n- **Aspirin**: Aspirin is an antiplatelet agent, not an anticoagulant. It is ineffective for the acute treatment or prevention of extension of venous thromboembolism (VTE), which is primarily a fibrin-rich clot. In pregnancy, low-dose aspirin is used for specific indications like preeclampsia prophylaxis in high-risk women, but it has no role in the management of acute DVT. Using aspirin alone in this scenario would be inadequate and potentially dangerous, allowing the thrombus to progress.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Diagnosis and Management of Pregnancy-related Venous Thromboembolism**: States that suspected VTE in pregnancy requires immediate treatment-dose LMWH while awaiting diagnostic confirmation. — https://ranzcog.edu.au/womens-health/guidelines/pregnancy-related-venous-thromboembolism\n- **Therapeutic Guidelines (eTG) - Cardiovascular: Venous thromboembolism**: Recommends prompt initiation of therapeutic anticoagulation (LMWH) for suspected DVT, especially in high-risk settings like pregnancy. — https://tgldcdp.tg.org.au/etgAccess\n- **American College of Chest Physicians (CHEST) Guidelines - Antithrombotic Therapy for VTE Disease**: Recommends LMWH over other agents for the treatment of acute VTE in pregnancy. — https://journal.chestnet.org/article/S0012-3692(21)01507-3/fulltext", "image_path": ""}, {"id": 31331, "date": "2026-03-23T03:33:54+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 64-year-old man presents to the emergency department with right arm pain. Two days ago, he fell while weeding the garden, resulting in immediate pain in his right arm. It has not improved, so he attended the emergency department. He has also experienced worsening back pain and constipation over the last six months. He has had no pain elsewhere. His daughter reports he is more forgetful than usual. He has a history of prostate cancer treated with surgery five years ago.\nOn examination, he has tenderness along his right humerus, with significantly reduced range of motion at his right shoulder. His right arm is neurovascularly intact distally. He has tenderness of his lumbar spine, worse on the right, but preserved range of motion. His lower limb neurological examination is unremarkable. His abdominal examination is normal.\nAn X-ray of his right humerus shows a fracture line through some lytic areas in the metaphysis and diaphysis. An X-ray of his lumbar spine shows several small lytic lesions in the vertebral bodies. An abdominal X-ray demonstrates faecal loading. He has no leg oedema. His laboratory results show:\n • Haemoglobin 91 g/l (132-172)\n • Creatinine 70 µmol/l (60-110)\n • Urea 4.1 mmol/L (3.0-8.0)\n • Mean Corpuscular Volume 90fL (80-100)\n • Platelet Count 159 x 10^9/L (150-450)\n • Sodium 137 mmol/L (135-145)\n • Potassium 4.1 mmol/L (3.5-5.1)\n • Chloride 107 mmol/L (98-107)\n • Bicarbonate 24 mmol/L (22-30)\n • Glucose 4.9 mmol/L (3.9-5.8)\n • Calcium 2.85 mmol/L (2.15-2.55)\n\nMost likely cause of patient current condition?", "options": "Multiple myeloma\nParaneoplastic syndrome\nAmyloidosis\nMetastatic spread\nSpinal cord decompression", "answer": "A. Multiple myeloma", "explanation": "### ✅ Correct Answer: A. Multiple myeloma\n\n**Clinical Reasoning:**\n1. **Key Features:** The patient presents with a pathological fracture (right humerus) through lytic bone lesions, hypercalcemia (2.85 mmol/L), normocytic anaemia (Hb 91 g/L, MCV 90fL), and chronic back pain with vertebral lytic lesions. These are classic features of multiple myeloma.\n2. **Pathophysiology:** Multiple myeloma is a plasma cell dyscrasia characterized by bone marrow infiltration by malignant plasma cells, leading to:\n   - **Bone destruction:** Lytic lesions due to increased osteoclast activity (RANKL activation) and decreased osteoblast function.\n   - **Hypercalcemia:** From bone resorption (explains constipation and cognitive changes like forgetfulness).\n   - **Anaemia:** Bone marrow infiltration and renal impairment (though creatinine is normal here).\n   - **Renal impairment:** Often present but not in this case (creatinine 70 µmol/L).\n3. **Diagnostic Clues:**\n   - **Lytic bone lesions** on X-ray (humerus and spine) are characteristic of myeloma (vs. blastic or mixed lesions in prostate cancer metastases).\n   - **Hypercalcemia** with normal phosphate and renal function suggests humoral hypercalcemia of malignancy (PTHrP-mediated or osteoclast activation).\n   - **Normocytic anaemia** is common.\n   - Absence of prostate-specific antigen (PSA) data, but history of treated prostate cancer (surgery 5 years ago) raises differential of metastases, but lytic lesions are atypical for prostate cancer (usually blastic).\n4. **Management Pearls:** Initial workup includes serum protein electrophoresis (SPEP), urine protein electrophoresis (UPEP), serum free light chains, and bone marrow biopsy. Acute management focuses on hydration, bisphosphonates for hypercalcemia, and analgesia.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Paraneoplastic syndrome:** While hypercalcemia can be paraneoplastic (e.g., PTHrP from squamous cell carcinoma), the constellation of lytic bone lesions, anaemia, and hypercalcemia is more specific for myeloma. Paraneoplastic syndromes typically involve remote effects without direct bone infiltration.\n- **C. Amyloidosis:** Can be associated with myeloma (AL amyloidosis) but usually presents with nephrotic syndrome, cardiomyopathy, neuropathy, or macroglossia. Isolated lytic bone lesions are not typical.\n- **D. Metastatic spread:** Prostate cancer metastases are usually **blastic** (sclerotic) on X-ray, not lytic. Lytic metastases suggest lung, thyroid, renal cell, or myeloma. Given the history, prostate cancer recurrence is possible but less likely due to lytic nature.\n- **E. Spinal cord decompression:** Not a cause but a complication (e.g., from vertebral collapse). The question asks for the cause of the current condition (lytic lesions, hypercalcemia, etc.).\n\n### 📚 Relevant Guidelines\n- **[Cancer Council Australia – Multiple Myeloma Guidelines](https://wiki.cancer.org.au/australia/Guidelines:Multiple_myeloma):** Australian guidelines for diagnosis, staging, and management of multiple myeloma.\n- **[International Myeloma Working Group (IMWG) Criteria](https://www.imwg.myeloma.org/international-myeloma-working-group-imwg-criteria-for-the-diagnosis-of-multiple-myeloma):** Diagnostic criteria for multiple myeloma and related disorders.\n- **[UpToDate – Clinical Features, Laboratory Manifestations, and Diagnosis of Multiple Myeloma](https://www.uptodate.com/contents/clinical-features-laboratory-manifestations-and-diagnosis-of-multiple-myeloma):** Detailed review of myeloma presentation and diagnostic workup.", "image_path": ""}, {"id": 31362, "date": "2026-03-23T10:22:44+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 55-year-old man with a history of hypertension presents for a routine check-up. He is currently taking hydrochlorothiazide 25 mg daily. His blood pressure is 150/95 mmHg. He has no other medical conditions. Which of the following is the most appropriate next step in management?", "options": "A. Add methyldopa\nB. Add indapamide\nC. Add lisinopril\nD. Increase hydrochlorothiazide dose\nE. Switch to amlodipine", "answer": "C. Add lisinopril", "explanation": "### ✅ Correct Answer: C. Add lisinopril\n\n**Clinical Reasoning:**\n1.  **Scenario:** The patient has uncontrolled hypertension (150/95 mmHg) despite being on hydrochlorothiazide (HCTZ) 25 mg daily, which is a standard first-line thiazide diuretic dose.\n2.  **Guideline-Based Approach:** According to major hypertension guidelines (e.g., NICE, AHA/ACC), when a patient's blood pressure remains above target on monotherapy, the next step is typically to add a second agent from a different class, not to increase the dose of the first agent or switch to another monotherapy. This is the principle of combination therapy.\n3.  **Rationale for ACE Inhibitor (Lisinopril):** In a patient with uncomplicated hypertension (no specific compelling indications like heart failure, diabetes, or CKD), the preferred add-on agents are usually from the classes of ACE inhibitors (or ARBs), calcium channel blockers (CCBs), or thiazide-like diuretics. Adding an ACE inhibitor like lisinopril provides a complementary mechanism of action (vasodilation via RAAS inhibition) to the diuretic, improving efficacy with a favorable side effect profile. It is a common and effective second-line choice.\n4.  **Why Not Other Options:** Increasing the HCTZ dose (D) leads to more side effects (hypokalemia, hyperuricemia) with minimal additional BP benefit. Switching entirely (E) abandons a partially effective therapy. Methyldopa (A) is reserved for specific situations like pregnancy. Adding another thiazide/thiazide-like diuretic (B, indapamide) is not standard as it duplicates the mechanism without significant additive benefit and increases electrolyte disturbance risk.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Add methyldopa**: Methyldopa is a centrally acting alpha-2 agonist. It is **not** a first- or second-line agent for routine hypertension in non-pregnant adults. Its use is primarily limited to hypertension in pregnancy due to its safety profile. It has significant side effects (sedation, dry mouth, depression) and is not preferred for general management.\n- **B. Add indapamide**: Indapamide is a thiazide-like diuretic. Adding it to hydrochlorothiazide would be **duplicative therapy** from the same pharmacological class. This is not recommended as it increases the risk of adverse effects like hypokalemia, hyponatremia, and hyperuricemia without providing a synergistic antihypertensive effect compared to adding an agent from a different class.\n- **D. Increase hydrochlorothiazide dose**: While increasing from 12.5 mg to 25 mg provides a good BP response, further dose escalation **beyond 25 mg daily** yields minimal additional antihypertensive benefit while significantly increasing the risk of metabolic adverse effects (hypokalemia, hyperglycemia, hyperuricemia). Guideline-recommended practice is to add a second agent rather than maximize the dose of the first.\n- **E. Switch to amlodipine**: Switching to a different monotherapy (amlodipine, a CCB) is a less optimal strategy than **adding** a second agent. The patient has shown some response to HCTZ, so the most effective approach is to build on that response with combination therapy. A switch might be considered if there were intolerance or a compelling contraindication to the first agent, which is not the case here.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Cardiovascular (eTG)**: Provides Australian recommendations for hypertension management, including the use of combination therapy. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hypertension&guidelineName=Cardiovascular\n- **National Institute for Health and Care Excellence (NICE) Guideline NG136**: \"Hypertension in adults: diagnosis and management\" recommends ACE inhibitors (or ARBs) as first-line treatment and details step-up therapy. — https://www.nice.org.uk/guidance/ng136\n- **American College of Cardiology/American Heart Association (AHA/ACC) Guideline for the Prevention, Detection, Evaluation, and Management of High Blood Pressure in Adults**: Recommends a similar approach of adding a second agent from a different class if target BP is not achieved with monotherapy. — https://www.ahajournals.org/doi/10.1161/HYP.0000000000000065", "image_path": "photo_2026-03-23_10-22-44.jpg"}, {"id": 31379, "date": "2026-03-23T13:34:38+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 32-year-old man presents with a six month history of increasing difficulty in urinating. He is able to start without any problems, but has to strain to pass urine. Whilst it does take increasing longer, he feels that he can empty his bladder. There is some dribbling at the end of micturition. He does not have any frequency and he only gets up to void at night if he has a large quantity of liquid to drink in the evenings. His medical history is unremarkable, apart from a pelvic fracture from a motorbike crash when he was 21. The physical examination, including a digital rectal examination is unremarkable and his bladder is not distended. Which one of the following is the most appropriate investigation?", "options": "Prostate specific antigen\nCT abdomen and pelvis\nTrans-rectal ultrasound-guided biopsy (TRUS)\nUrethroscopy\nRetrograde urethrogram", "answer": "5. Retrograde urethrogram", "explanation": "### ✅ Correct Answer: 5. Retrograde urethrogram\n\n**Clinical Reasoning:**\n1.  **Key History:** A 32-year-old man with obstructive urinary symptoms (straining, prolonged voiding, terminal dribbling) and a history of pelvic trauma (motorcycle crash with pelvic fracture at age 21). The onset is gradual over six months.\n2.  **Pathophysiology:** Pelvic fractures are a classic cause of urethral injury, which can lead to the formation of a **urethral stricture** as scar tissue forms during healing. A stricture is a narrowing of the urethral lumen, causing obstructive lower urinary tract symptoms (LUTS). The patient's young age and specific trauma history make benign prostatic hyperplasia (BPH) or prostate cancer highly unlikely.\n3.  **Examination Findings:** A normal digital rectal exam (DRE) rules out a significantly enlarged or suspicious prostate as the cause. A non-distended bladder suggests he is not in acute retention, but chronic obstruction is present.\n4.  **Diagnostic Choice:** The **retrograde urethrogram (RUG)** is the gold-standard initial imaging investigation for diagnosing a urethral stricture. It involves injecting contrast dye into the urethral meatus under fluoroscopy to visualize the urethral lumen, identify the location, length, and severity of the stricture.\n5.  **Management Pathway:** Confirming a stricture with RUG guides further management, which may include urethral dilation, visual internal urethrotomy, or urethroplasty.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Prostate specific antigen (PSA)**: This is a screening and monitoring test for prostate cancer. It is not indicated in a 32-year-old man, especially with a history pointing strongly to a post-traumatic urethral stricture. Prostate cancer is exceedingly rare at this age, and BPH is not a consideration.\n- **2. CT abdomen and pelvis**: While CT can show pelvic anatomy and complications, it is not the best first-line test for evaluating the urethral lumen. It involves radiation and is less specific for diagnosing a urethral stricture compared to a dedicated urethrogram. It might be used later if complex anatomy or associated injuries are suspected.\n- **3. Trans-rectal ultrasound-guided biopsy (TRUS)**: This is a diagnostic procedure for prostate cancer when there is a suspicious DRE or elevated PSA. There is no indication for prostate biopsy in this young patient with a normal DRE and a clear alternative diagnosis (post-traumatic stricture).\n- **4. Urethroscopy**: This is a direct visual examination of the urethra using a cystoscope. While diagnostic, it is generally considered after initial imaging (like a RUG) has identified a stricture, as it allows for concurrent intervention (e.g., visual internal urethrotomy). It is more invasive than RUG and is not typically the *first* investigation.\n\n### 📚 Relevant Guidelines\n- **Royal Australian College of Surgeons (RACS) / Urological Society of Australia and New Zealand (USANZ)**: Guidelines for the management of urethral stricture disease detail the diagnostic workup, emphasizing retrograde urethrogram as a key initial investigation. — [https://www.usanz.org.au/uploads/9/7/8/0/97806905/urethral_stricture_disease_guideline.pdf](https://www.usanz.org.au/uploads/9/7/8/0/97806905/urethral_stricture_disease_guideline.pdf)\n- **Therapeutic Guidelines (eTG) – Urology**: Provides concise advice on the investigation of lower urinary tract symptoms, including the role of imaging in suspected urethral stricture. — [https://tgldcdp.tg.org.au/viewTopic?topicfile=urinary-tract-strictures#toc_d1e241](https://tgldcdp.tg.org.au/viewTopic?topicfile=urinary-tract-strictures#toc_d1e241)\n- **European Association of Urology (EAU) Guidelines on Urethral Strictures**: Internationally recognized guidelines that recommend retrograde urethrography as the primary diagnostic modality for anterior urethral strictures. — [https://uroweb.org/guideline/urological-trauma/](https://uroweb.org/guideline/urological-trauma/)", "image_path": ""}, {"id": 31433, "date": "2026-03-24T10:22:26+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Man came with Complaint of pain in great toe had 2 mm ulcer ulcerwith no surrounding erythema what to do next", "options": "Seab\nPlain xray foot\nCt scan", "answer": "Plain xray foot", "explanation": "### ✅ Correct Answer: B. Plain xray foot\nThis patient presents with a painful great toe ulcer (2mm) without surrounding erythema. The key clinical reasoning is as follows:\n\n1. **Clinical Suspicion**: A painful ulcer on the great toe, especially in the absence of significant inflammation (no surrounding erythema), should raise immediate suspicion for underlying **osteomyelitis** or **bone involvement**. The great toe is a common site for neuropathic ulcers in patients with diabetes or peripheral arterial disease, but pain is a prominent feature here.\n\n2. **First-line Diagnostic Step**: According to standard guidelines (e.g., Infectious Diseases Society of America - IDSA, and Australian eTG), when a diabetic foot ulcer is present and there is suspicion of underlying osteomyelitis (based on location, chronicity, or probe-to-bone test), the **initial imaging investigation is a plain X-ray of the foot**.\n\n3. **Why X-ray First?**:\n   - It is readily available, low-cost, and non-invasive.\n   - It can show classic signs of osteomyelitis such as cortical destruction, periosteal reaction, or sequestrum formation.\n   - While it may not be sensitive in early osteomyelitis (changes can take 10-14 days to appear), it is the recommended first test to look for bony abnormalities or foreign bodies.\n\n4. **Management Pathway**: If the X-ray is negative but clinical suspicion remains high, the next step would be advanced imaging (MRI is preferred over CT for soft tissue and bone marrow detail) or a bone biopsy.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Seab**: This appears to be a typo/misspelling, possibly meaning \"swab\" or \"culture\". While wound swabs for culture and sensitivity are important in managing infected ulcers, they are not the *first* or *next* step when there is pain and suspicion of bone involvement. Swabs alone cannot diagnose osteomyelitis and may grow colonizing flora rather than true pathogens. The priority is to assess for deep infection/bone involvement.\n- **C. Ct scan**: A CT scan provides excellent bony detail and can be useful, but it is **not the first-line imaging test** for suspected osteomyelitis in the foot. MRI is superior for evaluating bone marrow edema and soft tissue involvement. CT involves higher radiation exposure and cost. Guidelines recommend plain X-ray first, followed by MRI if needed.\n\n### 📚 Relevant Guidelines\n- **[Infectious Diseases Society of America (IDSA) - Diabetic Foot Infection Guidelines]**: Provides evidence-based recommendations on diagnosis and management of diabetic foot infections, including when to suspect and how to investigate osteomyelitis. — https://www.idsociety.org/practice-guideline/diabetic-foot-infection/\n- **[Therapeutic Guidelines (eTG) - Diabetic Foot]**: Australian guidelines covering assessment, investigation, and management of diabetic foot complications, including the role of imaging. — https://tgldcdp.tg.org.au/etgAccess\n- **[International Working Group on the Diabetic Foot (IWGDF) Guidelines]**: Comprehensive international guidelines on prevention and management of diabetic foot disease, including diagnostic pathways for osteomyelitis. — https://iwgdfguidelines.org/guidelines/", "image_path": ""}, {"id": 31455, "date": "2026-03-24T17:45:15+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old man presents to the emergency department with a painful, swollen right knee after a fall. On examination, the knee is flexed and internally rotated. He is unable to extend or laterally rotate the knee due to pain. What is the most likely diagnosis?", "options": "A. Patellar dislocation\nB. Anterior cruciate ligament (ACL) tear\nC. Posterior cruciate ligament (PCL) tear\nD. Meniscal tear\nE. Knee joint effusion", "answer": "A. Patellar dislocation", "explanation": "### ✅ Correct Answer: A. Patellar dislocation\n\n**Clinical Reasoning:**\n1.  **Mechanism & Presentation:** The patient has a history of a fall, a common mechanism for patellar dislocation. The classic presentation is a painful, swollen knee held in a flexed position.\n2.  **Key Physical Exam Findings:** The inability to actively extend the knee and the inability to laterally rotate it are highly specific signs. In a patellar dislocation, the patella is displaced laterally, and the quadriceps mechanism is disrupted, preventing active extension. Attempts at lateral rotation are painful and restricted due to the displaced patella and associated soft tissue injury.\n3.  **'Locked Knee' Differential:** While a meniscal tear can also cause a 'locked knee', it typically presents with mechanical symptoms (catching, locking) and pain on specific maneuvers (McMurray's test). The inability to laterally rotate is not a classic feature of a meniscal tear.\n4.  **Immediate Management:** This is an orthopedic emergency requiring urgent reduction, typically performed with sedation. Post-reduction, imaging (X-ray) is needed to rule out an osteochondral fracture, a common associated injury.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Anterior cruciate ligament (ACL) tear**: Presents with a history of a 'pop', immediate swelling (hemarthrosis), instability (positive Lachman test, pivot shift), and difficulty bearing weight. The knee is not typically held in a fixed, flexed, internally rotated position, and active extension is usually possible, albeit painful.\n- **C. Posterior cruciate ligament (PCL) tear**: Often from a dashboard injury. Presents with posterior knee pain, a positive posterior drawer test, and possible sag sign. It does not cause the specific inability to extend or laterally rotate the knee seen in this scenario.\n- **D. Meniscal tear**: Causes joint line tenderness, effusion, and mechanical symptoms like locking or catching during specific movements. While it can limit full extension ('locked knee'), it does not typically prevent active extension or cause the specific rotational limitation described.\n- **E. Knee joint effusion**: This is a sign, not a diagnosis. It is a non-specific finding present in all the above conditions (traumatic hemarthrosis) and many others (e.g., gout, septic arthritis). It does not explain the specific positional deformity and functional deficits.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Musculoskeletal (eTG) - Knee injuries]**: Provides an overview of the assessment and immediate management of acute knee injuries, including patellar dislocation. — https://tgldcdp.tg.org.au/viewTopic?topicfile=knee-injuries\n- **[UpToDate - Patellar dislocation and instability in adults]**: Detailed evidence-based review on mechanisms, clinical features, reduction techniques, and follow-up care. — https://www.uptodate.com/contents/patellar-dislocation-and-instability-in-adults\n- **[RACGP - Acute knee injuries]**: A guideline for general practitioners on the assessment and initial management of acute knee injuries, relevant for the AMC primary care context. — https://www.racgp.org.au/afp/2015/januaryfebruary/acute-knee-injuries", "image_path": "photo_2026-03-24_17-45-15.jpg"}, {"id": 31458, "date": "2026-03-24T18:10:18+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 28-year-old woman presents with a 2-day history of severe headache, neck stiffness, and photophobia. She has a temperature of 38.5°C. On examination, Kernig's sign is positive. What is the most urgent initial investigation?", "options": "A. Lumbar puncture\nB. Blood cultures\nC. CT head\nD. MRI brain\nE. Throat swab", "answer": "C. CT head", "explanation": "### ✅ Correct Answer: C. CT head\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The clinical triad of fever, headache, neck stiffness, and photophobia is classic for **bacterial meningitis**. A positive Kernig's sign (pain on knee extension with hip flexed) further supports meningeal irritation.\n2.  **Urgent Priority - Rule Out Contraindication:** Before performing a lumbar puncture (LP), which is the definitive diagnostic test for meningitis, it is **critical to rule out raised intracranial pressure (ICP)**. Performing an LP in the presence of a space-occupying lesion (e.g., brain abscess, tumor) or significantly raised ICP can lead to cerebral herniation, which is fatal.\n3.  **Indications for CT before LP:** Guidelines (e.g., IDSA) recommend a non-contrast CT head prior to LP in patients with specific 'red flag' features. These include: immunocompromised state, history of CNS disease, new-onset seizure, papilloedema, abnormal level of consciousness, or focal neurological deficits. While this patient is alert, the severity of symptoms and the need to exclude other pathologies make a pre-LP CT the standard of care in the emergency setting to ensure safety.\n4.  **Sequence of Management:** The most urgent step is to **secure the airway, breathing, and circulation (ABCs)**, obtain IV access, and administer empiric antibiotics (e.g., ceftriaxone) **immediately**, ideally within 30-60 minutes of presentation. Blood cultures should be taken **before** antibiotics. The CT head is then performed **urgently** to facilitate safe LP. Delaying antibiotics for the CT or LP is inappropriate if there will be a significant delay.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Lumbar puncture**: This is the definitive diagnostic test to identify the causative organism and guide therapy. However, it is **not** the most urgent *initial* investigation because it must be preceded by a clinical assessment for contraindications, often including a CT head, to prevent herniation.\n- **B. Blood cultures**: These are **crucial** and should be drawn immediately upon presentation, before antibiotics are given. They increase the diagnostic yield. However, they are part of the initial workup alongside clinical stabilization and do not carry the same urgent procedural safety requirement as ruling out raised ICP before an LP.\n- **D. MRI brain**: While more sensitive than CT for detecting early cerebritis, abscesses, or meningeal enhancement, it is less readily available, takes longer, and is not the recommended first-line imaging test in an acute, unstable patient. CT is faster and sufficient to exclude major contraindications to LP.\n- **E. Throat swab**: This is not relevant to the diagnosis of meningitis. It might be considered in the workup for other infections (e.g., pharyngitis) but plays no role in the urgent management of suspected meningitis.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Antibiotic (eTG) - Meningitis]**: Provides Australian-specific recommendations for empiric antibiotic therapy, diagnostic workup (including pre-LP CT indications), and management. — https://tgldcdp.tg.org.au/viewTopic?topicfile=central-nervous-system-infections\n- **[Infectious Diseases Society of America (IDSA) - Clinical Practice Guidelines for Acute Bacterial Meningitis]**: Evidence-based guidelines on diagnosis and management, including clear criteria for neuroimaging before lumbar puncture. — https://www.idsociety.org/practice-guideline/acute-bacterial-meningitis/\n- **[NICE Guideline CG102 - Meningitis (bacterial) and meningococcal septicaemia in under 16s]**: Although paediatric-focused, its principles on urgent antibiotic administration and careful assessment before LP are widely applicable. — https://www.nice.org.uk/guidance/cg102", "image_path": "photo_2026-03-24_18-10-18.jpg"}, {"id": 31495, "date": "2026-03-25T19:39:23+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old woman presents with a 2-month history of progressive dyspnea on exertion, fatigue, and orthopnea. She has a history of rheumatic fever as a child. On examination, she has a low-pitched diastolic murmur heard best at the apex with the patient in the left lateral decubitus position. There is also an opening snap heard shortly after S2. What is the most likely diagnosis?", "options": "A. Aortic stenosis\nB. Aortic regurgitation\nC. Mitral stenosis\nD. Mitral regurgitation\nE. Tricuspid regurgitation", "answer": "C. Mitral stenosis", "explanation": "### ✅ Correct Answer: C. Mitral stenosis\n\n**Clinical Reasoning:**\n1. **History:** The patient's history of rheumatic fever is a classic risk factor for rheumatic heart disease, with mitral stenosis being the most common sequela (50-60% of cases).\n2. **Symptoms:** Progressive dyspnea on exertion, fatigue, and orthopnea are typical of left atrial pressure elevation and pulmonary congestion due to mitral valve obstruction.\n3. **Examination Findings:**\n   - **Low-pitched diastolic murmur at apex:** Characteristic of mitral stenosis, often described as a rumbling diastolic murmur.\n   - **Left lateral decubitus position:** Enhances auscultation of mitral stenosis murmur.\n   - **Opening snap:** A high-pitched sound heard shortly after S2, caused by sudden tensing of the stenotic mitral valve leaflets during opening. This is pathognomonic for mitral stenosis with mobile valve leaflets.\n4. **Pathophysiology:** Rheumatic fever causes fusion of mitral valve commissures, thickening and shortening of chordae tendineae, and calcification, leading to narrowed valve orifice and impaired left ventricular filling.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Aortic stenosis:** Presents with systolic murmur (crescendo-decrescendo) heard best at the right upper sternal border radiating to carotids. Symptoms include syncope, angina, and heart failure. No opening snap.\n- **B. Aortic regurgitation:** Presents with early diastolic decrescendo murmur heard best at left lower sternal border. Associated with wide pulse pressure, bounding pulses, and no opening snap.\n- **D. Mitral regurgitation:** Presents with holosystolic murmur heard best at apex radiating to axilla. No opening snap; may have S3 gallop.\n- **E. Tricuspid regurgitation:** Presents with holosystolic murmur heard best at left lower sternal border increasing with inspiration. Associated with jugular venous distension and hepatic pulsation. No opening snap.\n\n### 📚 Relevant Guidelines\n- **RACGP (Cardiovascular Disease):** Provides guidelines on diagnosis and management of valvular heart diseases in primary care — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/cardiovascular\n- **Therapeutic Guidelines (Cardiovascular):** Evidence-based recommendations for management of valvular heart disease — https://tgldcdp.tg.org.au/guideLine?guideLineCode=Cardiovascular\n- **American Heart Association (AHA/ACC Valvular Heart Disease Guidelines):** Comprehensive guidelines on diagnosis and management of valvular heart diseases — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000923", "image_path": "photo_2026-03-25_19-39-23.jpg"}, {"id": 31510, "date": "2026-03-26T07:22:48+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 60-year-old man with a history of hypertension and smoking presents with acute onset of severe, tearing chest pain radiating to the back. On examination, his blood pressure is 180/100 mmHg in the right arm and 140/90 mmHg in the left arm. He has a diastolic murmur heard best at the right sternal border. What is the most likely diagnosis?", "options": "A. Myocardial infarction\nB. Pulmonary embolism\nC. Aortic dissection\nD. Pneumothorax\nE. Pericarditis", "answer": "C. Aortic dissection", "explanation": "### ✅ Correct Answer: C. Aortic dissection\n\n**Clinical Reasoning:**\n1. **History:** Hypertension and smoking are major risk factors for aortic dissection. The acute onset of severe, tearing chest pain radiating to the back is classic for aortic dissection.\n2. **Examination Findings:**\n   - **Blood pressure difference (>20 mmHg) between arms:** Suggests involvement of the aortic arch branches, commonly seen in Stanford type A dissections.\n   - **Diastolic murmur at right sternal border:** May indicate aortic regurgitation due to dissection extending to the aortic root, causing valve incompetence.\n3. **Pathophysiology:** Aortic dissection involves a tear in the aortic intima, allowing blood to enter the media layer and create a false lumen. This can compromise branch vessels (causing pulse deficits) and extend to the aortic valve (causing regurgitation).\n4. **Stanford Classification:** Type A (involving ascending aorta) requires urgent surgical intervention; Type B (distal to left subclavian) is often managed medically.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Myocardial infarction:** Typically presents with pressure-like chest pain, often with associated symptoms (nausea, diaphoresis). No pulse deficit or diastolic murmur unless complicating with ventricular septal defect or papillary muscle rupture.\n- **B. Pulmonary embolism:** Presents with pleuritic chest pain, dyspnea, tachycardia. May have risk factors like immobility, hypercoagulable states. No pulse deficit or diastolic murmur.\n- **D. Pneumothorax:** Presents with sudden pleuritic chest pain and dyspnea. Examination reveals unilateral hyperresonance and diminished breath sounds. No pulse deficit or diastolic murmur.\n- **E. Pericarditis:** Presents with sharp, pleuritic chest pain relieved by sitting forward. Examination may reveal pericardial friction rub. No pulse deficit or diastolic murmur.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (Cardiovascular):** Management of aortic dissection and other acute aortic syndromes — https://tgldcdp.tg.org.au/guideLine?guideLineCode=Cardiovascular\n- **American Heart Association (AHA/ACC Thoracic Aortic Disease Guidelines):** Comprehensive guidelines on diagnosis and management of aortic dissection — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000477\n- **RACGP (Cardiovascular Emergencies):** Guidelines for recognition and initial management of cardiovascular emergencies in primary care — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/cardiovascular", "image_path": "photo_2026-03-26_07-22-48.jpg"}, {"id": 31547, "date": "2026-03-27T00:27:45+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 45-year-old man presents with severe epigastric pain radiating to the back. He has a history of alcohol abuse. On examination, he is tachycardic and tender in the epigastrium. Serum amylase and lipase are normal. Abdominal ultrasound shows a normal pancreas. What is the most appropriate next step in management?", "options": "A. Discharge with analgesia\nB. Repeat serum amylase in 6 hours\nC. CT abdomen with contrast\nD. MRCP\nE. Endoscopic ultrasound", "answer": "C. CT abdomen with contrast", "explanation": "### ✅ Correct Answer: C. CT abdomen with contrast\n\n**Clinical Reasoning:**\n1. **Presentation:** A 45-year-old man with alcohol abuse history presents with classic symptoms of acute pancreatitis (severe epigastric pain radiating to the back, tachycardia, epigastric tenderness).\n2. **Diagnostic Dilemma:** Despite normal serum amylase/lipase and normal ultrasound, clinical suspicion for pancreatitis remains high. Normal enzymes do NOT exclude pancreatitis, especially in:\n   - Late presentation (enzyme levels may have normalized)\n   - Hypertriglyceridemia-induced pancreatitis\n   - Chronic pancreatitis exacerbation\n3. **Imaging Rationale:**\n   - **Ultrasound** is first-line but has poor sensitivity for pancreatic inflammation (especially with bowel gas). It's primarily used to assess for gallstones and biliary dilation.\n   - **Contrast-enhanced CT (CECT)** is the gold standard for diagnosing acute pancreatitis and assessing severity. It can detect pancreatic necrosis, peripancreatic fluid collections, and complications even when enzymes are normal.\n4. **Management Priority:** In suspected pancreatitis with normal enzymes but high clinical suspicion, CECT is indicated to:\n   - Confirm/exclude diagnosis\n   - Assess for complications (necrosis, pseudocysts)\n   - Guide further management (ICU vs. ward, need for intervention)\n5. **AMC Exam Context:** This tests the concept that pancreatitis is primarily a clinical diagnosis. Normal enzymes don't rule it out, and imaging should proceed when suspicion remains high.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Discharge with analgesia**: Incorrect and dangerous. Patient has high-risk features (alcohol abuse, classic pain pattern, tachycardia). Discharging without definitive diagnosis could miss severe pancreatitis or other critical pathology.\n- **B. Repeat serum amylase in 6 hours**: Not the best next step. While enzyme levels can fluctuate, the patient needs definitive imaging given the clinical presentation. Waiting delays diagnosis and management of potential complications.\n- **D. MRCP**: Used for biliary/pancreatic duct imaging, not first-line for acute pancreatitis diagnosis. Indicated if biliary cause suspected (e.g., dilated ducts on ultrasound) or for chronic pancreatitis evaluation. Not appropriate here as initial diagnostic test.\n- **E. Endoscopic ultrasound**: Highly sensitive for pancreatic pathology but invasive, not readily available, and not first-line for acute pancreatitis diagnosis. Used for tissue sampling, staging, or evaluating cystic lesions.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (Gastrointestinal)**: Provides Australian-specific recommendations for diagnosis and management of acute pancreatitis, including imaging indications — https://tgldcdp.tg.org.au/viewTopic?topicfile=gastrointestinal-conditions&guidelineName=Gastrointestinal#toc_d1e287\n- **American College of Gastroenterology (ACG) Guidelines**: International standard for acute pancreatitis management, detailing diagnostic criteria and imaging pathways — https://journals.lww.com/ajg/fulltext/2013/09000/american_college_of_gastroenterology_guideline_.11.aspx\n- **RACGP Handbook**: Australian primary care guidance on when to refer suspected pancreatitis and appropriate initial investigations — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/managing-acute-pancreatitis", "image_path": "photo_2026-03-27_00-27-45.jpg"}, {"id": 31574, "date": "2026-03-27T10:06:23+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A lactating mom with chills (added newly) and features of lactational mastitis also has a hard mass in the upper quadrant of the same breast, with axillary nodal enlargement. Oral flucloxacillin has no adverse drug reactions but is not tolerated. Next management?", "options": "Ultrasound\nFNAC\nIV flucloxacillin\nCephalexin\nStop breastfeeding immediately", "answer": "A. Ultrasound", "explanation": "### ✅ Correct Answer: A. Ultrasound\n\n**Clinical Reasoning:**\n1. **Red Flags for Breast Abscess/Cancer:** The presentation of a 'hard mass' with axillary lymphadenopathy in a lactating woman with mastitis symptoms (chills, fever) raises suspicion for complications like a breast abscess or, less likely, inflammatory breast cancer. A persistent hard mass despite antibiotic therapy requires imaging to rule out an abscess (which would need drainage) or other pathology.\n2. **Stepwise Management in Mastitis:** For simple lactational mastitis, first-line management is oral antibiotics (e.g., flucloxacillin), analgesia, and continued breastfeeding/emptying of the breast. How
