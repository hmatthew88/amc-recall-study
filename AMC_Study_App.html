oid dairy products**: This is the management for cow's milk protein allergy (CMPA) in a breastfed infant. While CMPA can cause vomiting and diarrhea (often with blood/mucus), the sequence of *diarrhea followed by constipation* is not typical. CMPA does not cause true, persistent constipation and obstructive symptoms in a neonate. Avoiding maternal dairy is not the first-line intervention for suspected Hirschsprung's.\n- **2. lactulose**: Lactulose is an osmotic laxative used for chronic constipation in older children and adults. It is **contraindicated in the acute management of suspected neonatal intestinal obstruction** as it can worsen distension and is ineffective if there is a mechanical/functional obstruction. Its use could delay diagnosis and lead to complications like perforation or worsening enterocolitis.\n\n### 📚 Relevant Guidelines\n- **Royal Children's Hospital Melbourne - Hirschsprung's Disease**: Provides a comprehensive clinical practice guideline covering presentation, emergency management (including rectal washouts), diagnosis, and surgical intervention. — https://www.rch.org.au/clinicalguide/guideline_index/Hirschsprungs_disease/\n- **Paediatric Society of New Zealand - Constipation in Infants and Children**: Includes a red flag section for Hirschsprung's disease (failure to pass meconium, abdominal distension, vomiting) and outlines the appropriate diagnostic pathway, emphasizing the avoidance of laxatives in the neonatal period without proper assessment. — https://www.paediatrics.org.nz/for-health-professionals/clinical-guidelines/constipation\n- **Surgical Management of Hirschsprung Disease - UpToDate**: Details the clinical features and acute management, highlighting that initial therapy focuses on decompression with rectal irrigation and stabilization prior to definitive surgery. — https://www.uptodate.com/contents/surgical-management-of-hirschsprung-disease", "image_path": ""}, {"id": 30724, "date": "2026-03-10T11:50:27+00:00", "source_group": "", "stem": "Seven-day baby presented with bilious vomiting, feeding intermittently, no fever, vital stable, asking what to do initially. Ultrasound abdomen, barium enema, X-ray abdomen.", "options": "Ultrasound abdomen\nBarium enema\nX-ray abdomen", "answer": "X-ray abdomen", "explanation": "### ✅ Correct Answer: X-ray abdomen\n\n**Clinical Reasoning:**\n1.  **Red Flag Presentation:** Bilious vomiting in a neonate (especially in the first few weeks of life) is a **surgical emergency until proven otherwise**. It signifies a potential intestinal obstruction distal to the ampulla of Vater.\n2.  **First-Line Investigation:** The **supine and erect/decubitus abdominal X-ray** is the fastest, most readily available, and most informative initial imaging study. It can quickly identify or exclude several critical diagnoses:\n    - **Midgut volvulus:** May show a \"double bubble\" sign (duodenal atresia) or, if incomplete, simply dilated stomach and proximal duodenum with a paucity of distal gas. This is the most time-critical diagnosis.\n    - **Other obstructions:** Can show dilated bowel loops, air-fluid levels, and calcifications (e.g., meconium ileus).\n    - **Necrotizing enterocolitis (NEC):** Can show pneumatosis intestinalis, portal venous gas, or free air (though fever is often present with NEC).\n3.  **Stable Vitals:** The fact that vitals are stable does not rule out a surgical emergency. It means the child can undergo immediate imaging without prior resuscitation in this specific scenario, but the urgency remains.\n4.  **Sequential Workup:** The X-ray guides the next steps. If it suggests malrotation/volvulus, an **upper gastrointestinal contrast study** is the next test to confirm. If it suggests Hirschsprung's or distal atresia, a **contrast enema** (barium enema) may be indicated. Ultrasound can be useful for evaluating pyloric stenosis (non-bilious vomiting) or intussusception (rare in 7-day-olds), but it is not the first-line test for bilious vomiting.\n\n### ❌ Why the Other Options Are Wrong\n- **Ultrasound abdomen**: While ultrasound is non-invasive and useful for specific conditions (e.g., hypertrophic pyloric stenosis, intussusception), it is operator-dependent and less reliable than an X-ray for providing a rapid, overall survey of bowel gas pattern and free air. It is not the recommended first test for the undifferentiated neonate with bilious vomiting. It may miss malrotation without volvulus.\n- **Barium enema**: This is a more specific test, often used as a *second-line* investigation. It is diagnostic for conditions like Hirschsprung's disease (showing a transition zone) or meconium ileus/plug. Performing a barium enema *first* in a neonate with bilious vomiting is dangerous, as it could delay the diagnosis of a midgut volvulus, which requires immediate surgery. The contrast enema should be performed after an X-ray has ruled out obvious perforation and helped narrow the differential.\n\n### 📚 Relevant Guidelines\n- **Royal Children's Hospital Melbourne - Bilious Vomiting in the Neonate**: Explicitly states that bilious vomiting is a surgical emergency and that the **initial investigation is an abdominal X-ray**. — https://www.rch.org.au/clinicalguide/guideline_index/Bilious_vomiting_in_the_neonate/\n- **Sydney Children's Hospitals Network - Vomiting in Infants**: Algorithm for management highlights bilious vomiting as a red flag and recommends abdominal X-ray as the first imaging modality. — https://www.schn.health.nsw.gov.au/files/fact-sheets/vomiting_in_infants-en.pdf\n- **NICE Guideline - Suspected lower gastrointestinal obstruction in neonates**: Recommends plain abdominal radiography as the first-line investigation for suspected obstruction. — https://www.nice.org.uk/guidance/ng201/chapter/Recommendations#imaging-for-suspected-lower-gastrointestinal-obstruction", "image_path": ""}, {"id": 30726, "date": "2026-03-10T12:00:21+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A newborn presents with bilious vomiting. An abdominal X-ray is performed. What is the most likely diagnosis?", "options": "A. Malrotation with midgut volvulus\nB. Duodenal atresia\nC. Hypertrophic pyloric stenosis\nD. Necrotizing enterocolitis\nE. Meconium ileus", "answer": "A. Malrotation with midgut volvulus", "explanation": "### ✅ Correct Answer: A. Malrotation with midgut volvulus\n\n**Clinical Reasoning:**\n1.  **Presentation:** Bilious vomiting in a newborn is a surgical emergency until proven otherwise. It is the cardinal sign of a high intestinal obstruction distal to the ampulla of Vater.\n2.  **Pathophysiology:** Malrotation is a congenital anomaly where the intestines fail to complete their normal rotation and fixation during fetal development. This creates a narrow mesenteric pedicle, predisposing to a midgut volvulus—a twisting of the small intestine around the superior mesenteric artery. This can lead to rapid intestinal ischemia and necrosis.\n3.  **Key Diagnostic Features:** While the initial message only states \"X ray,\" the classic finding on an **abdominal X-ray** for malrotation/volvulus may be a **paucity of gas** or a **gasless abdomen** if the volvulus is complete. However, X-rays can be normal or non-specific. The **definitive diagnostic test** is an **upper gastrointestinal (UGI) series**, which would show an abnormal position of the duodenojejunal junction (not crossing to the left of the spine at the level of the duodenal bulb) and a \"corkscrew\" or \"beak\" sign of the twisted duodenum/jejunum. An **abdominal ultrasound** can also be used to assess the relationship of the superior mesenteric vessels (the \"whirlpool sign\").\n4.  **Management:** This is a **true surgical emergency**. Immediate resuscitation, nasogastric decompression, and urgent surgical exploration (Ladd's procedure) are required to untwist the volvulus, lyse abnormal peritoneal bands (Ladd's bands), and place the bowel in a non-rotated, safe position.\n5.  **Timeline & Vitals:** As discussed in the thread, symptoms typically present **within the first few weeks of life** (often within days). A patient may initially have stable vitals, but their condition can deteriorate rapidly with signs of shock (tachycardia, hypotension) as bowel ischemia progresses. The absence of unstable vitals at presentation does not rule out this diagnosis; it underscores the urgency of diagnosis before deterioration occurs.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Duodenal atresia**: Presents with **non-bilious vomiting** (obstruction is proximal to the ampulla of Vater) immediately after birth. The classic X-ray finding is the **\"double bubble\" sign** (dilated stomach and duodenal bulb with no distal gas). It is not a surgical emergency in the same sense as volvulus, though it requires repair.\n- **C. Hypertrophic pyloric stenosis**: Presents at **3-6 weeks of age** with **non-bilious, projectile vomiting**. The infant is typically hungry and may have a palpable \"olive\" in the epigastrium. Diagnosis is confirmed by ultrasound showing a thickened pyloric muscle.\n- **D. Necrotizing enterocolitis (NEC)**: A disease of prematurity, though it can occur in term infants. Presents with feeding intolerance, abdominal distension, bloody stools, and systemic signs of sepsis. X-ray may show **pneumatosis intestinalis** (gas in the bowel wall) or portal venous gas.\n- **E. Meconium ileus**: Often the first presentation of cystic fibrosis. Presents with failure to pass meconium, abdominal distension, and bilious vomiting. X-ray may show a **soap-bubble appearance** in the right lower quadrant (Neuhauser's sign) due to mixed air and meconium.\n\n### 📚 Relevant Guidelines\n- **Royal Children's Hospital Melbourne - Clinical Practice Guidelines: Vomiting - Infant**: Provides a structured approach to diagnosing the cause of vomiting in infants, including red flags for surgical causes like bilious vomiting. — https://www.rch.org.au/clinicalguide/guideline_index/vomiting_infant/\n- **Surgical Management of Intestinal Malrotation in Infants and Children (UpToDate)**: A comprehensive, evidence-based review covering the embryology, diagnosis, and emergency surgical management of malrotation and volvulus. — https://www.uptodate.com/contents/surgical-management-of-intestinal-malrotation-in-infants-and-children\n- **eTG complete (Therapeutic Guidelines) - Paediatric Gastrointestinal Disorders**: While more focused on medical management, it provides context for differential diagnosis and initial stabilization. — https://tgldcdp.tg.org.au/etgcomplete", "image_path": ""}, {"id": 30759, "date": "2026-03-11T00:41:31+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "18-month-old baby with progressive inguinal swelling. Mother first noticed it while showering; swelling increases when the baby cries. On examination, the baby is unsettled and inguinal swelling is visible.", "options": "A) Refer to ED\nB) Observe at home\nC) Refer to pediatric surgeon", "answer": "A) Refer to ED", "explanation": "### ✅ Correct Answer: A) Refer to ED\n\nThis is a case of a **suspected inguinal hernia in an infant** with concerning features warranting emergency assessment. The clinical reasoning is as follows:\n\n1.  **Clinical Presentation:** An 18-month-old with an inguinal swelling that increases with crying (increased intra-abdominal pressure) is classic for an inguinal hernia. The key concerning feature is that the **baby is 'unsettled'**. In a pre-verbal child, this is a critical red flag for pain or discomfort, which raises suspicion for **incarceration or strangulation**, even if not explicitly stated. Irritability can be the primary sign of a compromised hernia.\n2.  **Pathophysiology & Risk:** Inguinal hernias in infants are almost always indirect, due to a patent processus vaginalis. The risk of incarceration is highest in the first year of life but remains significant. An incarcerated hernia (irreducible) can progress to strangulation (compromised blood supply), leading to bowel ischemia, necrosis, and sepsis—a surgical emergency.\n3.  **Management Priority:** The unsettled state transforms this from an elective surgical referral to a potential emergency. The immediate priority is **urgent evaluation in an Emergency Department (ED)**. The ED can:\n    *   Perform a definitive assessment for signs of incarceration (tenderness, erythema, firmness, systemic signs).\n    *   Attempt gentle manual reduction if incarcerated but not strangulated.\n    *   Initiate resuscitation if needed (NBM, IV fluids, analgesia).\n    *   Arrange urgent surgical review and operation. The definitive management is surgery (herniotomy), but the pathway for an unstable or potentially compromised hernia is through the ED for stabilization and urgent surgical referral, not direct outpatient referral.\n\n### ❌ Why the Other Options Are Wrong\n- **B) Observe at home**: This is dangerously incorrect. Observation is never appropriate for a symptomatic (unsettled) infant with a known inguinal hernia due to the high and rapid risk of incarceration and strangulation. Delaying care could lead to bowel loss or death.\n- **C) Refer to pediatric surgeon**: While ultimately correct for definitive management, this is not the **next appropriate initial step** given the clinical context. A direct outpatient referral is for **asymptomatic, reducible hernias**. The baby's unsettled state mandates immediate assessment to rule out a surgical emergency, which is best done in an ED setting where resuscitation and urgent surgical consultation can occur if needed.\n\n### 📚 Relevant Guidelines\n- **[Royal Children's Hospital Melbourne - Clinical Practice Guidelines: Inguinal Hernia](https://www.rch.org.au/clinicalguide/guideline_index/Inguinal_hernia/)**: States that irreducible/incarcerated inguinal hernias require **urgent referral to the Emergency Department**. For symptomatic hernias, prompt surgical referral is indicated, with the ED being the appropriate point of entry for acute concerns.\n- **[eTG (Therapeutic Guidelines) - Paediatric Surgery](https://tgldcdp.tg.org.au/viewTopic?topicfile=paediatric-surgery&guidelineName=Paediatric#toc_d1e289)**: Discusses that inguinal hernias in children require surgical repair. It notes that incarceration is an emergency requiring prompt reduction and surgery.\n- **[UpToDate - Inguinal hernia in children](https://www.uptodate.com/contents/inguinal-hernia-in-children)**: Clearly differentiates management: **Emergency department referral** for signs of incarceration (pain, irritability, vomiting, erythema) versus **routine surgical referral** for asymptomatic, reducible hernias.", "image_path": ""}, {"id": 30764, "date": "2026-03-11T01:06:41+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "patient who recently had chemotherapy presents with **fever**. Blood tests reveal a **neutrophil count < 500/μL**. On examination, the patient appears well apart from the fever.\n\n**What is the next appropriate initial management?**", "options": "A) Chest X-ray\nB) Ultrasound\nC) Blood culture \nD) IV Piperacillin-Tazobactam", "answer": "D) IV Piperacillin-Tazobactam", "explanation": "### ✅ Correct Answer: D) IV Piperacillin-Tazobactam\n\nThis is a classic presentation of **Febrile Neutropenia (FN)**, a **medical emergency** in oncology patients. The clinical reasoning follows the \"time-to-antibiotics\" principle:\n\n1.  **Definition & Risk:** The patient has fever and severe neutropenia (Absolute Neutrophil Count < 500/μL, often defined as < 1000/μL with expected decline). This combination defines febrile neutropenia. Despite appearing well, these patients are at extremely high risk for rapid clinical deterioration from overwhelming sepsis, as they lack the neutrophils to mount an inflammatory response. Infections can be occult and progress with frightening speed.\n2.  **Pathophysiology:** The mucosal damage from chemotherapy allows translocation of gut flora (often Gram-negative bacilli like *E. coli*, *Klebsiella*, *Pseudomonas*). Neutropenia masks typical signs of infection (e.g., no pus, minimal lung consolidation on early CXR).\n3.  **Management Priority - The Golden Hour:** International guidelines unanimously stress that **empirical broad-spectrum IV antibiotics must be administered within ONE HOUR of presentation** (the \"golden hour\") after rapid assessment. This takes precedence over all diagnostic tests except those that can be obtained without delaying antibiotics (e.g., blood cultures drawn during IV cannulation). The goal is to cover the most likely and most lethal pathogens immediately.\n4.  **Antibiotic Choice:** **IV Piperacillin-Tazobactam** is a first-line, broad-spectrum antipseudomonal beta-lactam recommended in many febrile neutropenia guidelines (e.g., Australian Consensus Guidelines). It provides coverage against Gram-negatives (including *Pseudomonas*), many Gram-positives, and anaerobes.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Chest X-ray**: While important in the initial workup, it is **not the *next* step**. Obtaining a CXR should not delay the administration of life-saving antibiotics. It can be done concurrently or immediately after antibiotics are given.\n- **B) Ultrasound**: This is too non-specific and is not part of the immediate mandatory workup for febrile neutropenia. It may be indicated later if a specific focus (e.g., hepatobiliary, renal) is suspected.\n- **C) Blood culture**: This is a **critical diagnostic test** and should be collected **immediately**. However, it is still not the *next appropriate initial management* over antibiotics. The correct sequence is: **Simultaneously** collect blood cultures (and other relevant cultures) **WHILE** setting up for and administering IV antibiotics. The act of giving antibiotics is the definitive therapeutic intervention that must not wait for culture results.\n\n### 📚 Relevant Guidelines\n- **[Australian Consensus Guidelines 2021 for the Management of Febrile Neutropenia in Adult Cancer Patients](https://www.mja.com.au/journal/2021/215/3/antimicrobial-therapy-adult-cancer-patients-febrile-neutropenia-2021-update)**: Mandates **empirical antibiotic therapy within 1 hour** of presentation. Recommends Piperacillin-tazobactam as a first-line empiric monotherapy for patients without specific risk factors for resistant organisms.\n- **[eTG (Therapeutic Guidelines) - Febrile neutropenia](https://tgldcdp.tg.org.au/viewTopic?topicfile=febrile-neutropenia&guidelineName=Antibiotic#toc_d1e237)**: States \"**Give the first dose of empirical antibiotic therapy immediately** (within 1 hour)...\" and lists Piperacillin–tazobactam as a first-choice empiric regimen.\n- **[National Comprehensive Cancer Network (NCCN) Guidelines: Prevention and Treatment of Cancer-Related Infections](https://www.nccn.org/guidelines/guidelines-detail?category=3&id=1457)**: Emphasizes the critical importance of rapid administration of empiric antibiotics, with a goal of within 60 minutes, for febrile neutropenia.", "image_path": ""}, {"id": 30790, "date": "2026-03-11T09:21:43+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A teacher charged with sexual abuse awaiting court nearings says he wanna commit suicide. Feels depressed. Which of the following would carry most risk for him to try suicide?", "options": "A. Friend attempted suicide\nB. Planning for suicide\nC. Feeling depressed\nD. Living alone\nE. Searching suicide attempt plans in Internet", "answer": "B. Planning for suicide", "explanation": "### ✅ Correct Answer: B. Planning for suicide\n\nThis is correct because in suicide risk assessment, **specific suicide planning** is one of the highest risk factors for imminent suicide attempt. The patient is already in a high-stress situation (facing criminal charges), has expressed suicidal ideation ('wanna commit suicide'), and reports feeling depressed. Among the options, having a concrete plan indicates progression from ideation to intent, which significantly elevates acute risk. Clinical guidelines emphasize that detailed planning (method, time, means) requires urgent intervention, often hospitalization, regardless of other factors.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Friend attempted suicide**: While a history of suicide attempts in close contacts is a risk factor, it is generally considered a **moderate** risk factor rather than the highest. It increases vulnerability but does not indicate the same level of immediate intent as active planning by the patient themselves.\n- **C. Feeling depressed**: Depression is a significant **predisposing** and **chronic** risk factor for suicide, but the presence of depressive symptoms alone does not necessarily indicate imminent risk. Many depressed patients do not attempt suicide. The question asks for the factor carrying 'most risk' for a suicide **try**—active planning is more directly predictive of an attempt.\n- **D. Living alone**: Social isolation is a known risk factor, but it is again a **moderate/background** factor. It may reduce the chances of intervention but does not directly indicate the patient's current intent or plan to act.\n- **E. Searching suicide attempt plans in Internet**: This indicates preoccupation and may be a warning sign, but it is less definitive than having a **personal, concrete plan**. Searching online could represent information gathering without a firm intent to act imminently.\n\n### 📚 Relevant Guidelines\n- **RACGP - Assessing and managing patients at risk of suicide**: Provides a structured approach to suicide risk assessment in primary care, highlighting planning and intent as critical high-risk indicators. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/suicide-prevention-and-management\n- **Therapeutic Guidelines (Psychiatry) - Suicide risk assessment**: Details risk stratification, listing specific planning and preparation as key high-risk criteria requiring urgent management. — https://tgldcdp.tg.org.au/viewTopic?topicfile=suicide-risk-assessment\n- **Beyond Blue - Clinical practice guidelines for depression and suicide prevention**: Emphasizes that a concrete suicide plan is a major red flag necessitating immediate safety planning and often hospitalization. — https://www.beyondblue.org.au/mental-health/resources-and-information/for-health-professionals/clinical-guidelines", "image_path": ""}, {"id": 30803, "date": "2026-03-11T13:44:03+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A woman presents with **headache**. She has **some animals at home**. Lumbar puncture shows:\n • **Low glucose**\n • **High protein**\n • **Mixed pleocytosis** (both polymorphonuclear and mononuclear cells)\n\n**What is the most likely diagnosis?**", "options": "1. TB meningitis\n2. Cryptococcal meningitis", "answer": "1. TB meningitis", "explanation": "### ✅ Correct Answer: 1. TB meningitis\n\nThis is correct because the CSF profile described is **classic for tuberculous (TB) meningitis**: low glucose (hypoglycorrhachia), high protein, and a mixed pleocytosis (lymphocytic predominance but can have neutrophils early on). The 'animals at home' clue is a red herring for cryptococcal meningitis (often associated with bird droppings), but cryptococcal meningitis typically shows **lymphocytic** pleocytosis (not mixed), and while protein is high and glucose low, the mixed cellularity is less characteristic. TB meningitis has a more subacute to chronic presentation with headache, and the CSF formula is a key discriminator. In an immunocompetent patient (not stated as immunocompromised), TB is a more common cause of chronic meningitis with this CSF profile than cryptococcal disease.\n\n### ❌ Why the Other Options Are Wrong\n- **2. Cryptococcal meningitis**: This is typically seen in **immunocompromised** patients (e.g., HIV, transplant). While exposure to birds/soil is a risk factor, the CSF in cryptococcal meningitis usually shows a **lymphocytic** pleocytosis, not a mixed one. India ink stain or cryptococcal antigen would be positive. The absence of mention of immunocompromise and the presence of mixed pleocytosis make TB more likely.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (CNS infections) - Tuberculous meningitis**: Details the clinical features and classic CSF findings of TB meningitis, including low glucose, high protein, and lymphocytic/mixed pleocytosis. — https://tgldcdp.tg.org.au/viewTopic?topicfile=tuberculosis-meningitis\n- **eTG (Meningitis and encephalitis)**: Provides differential diagnosis based on CSF analysis, highlighting TB meningitis's characteristic profile. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate - Clinical features and diagnosis of tuberculous meningitis**: Confirms the typical CSF abnormalities and contrasts them with other chronic meningitides like cryptococcal. — https://www.uptodate.com/contents/tuberculous-meningitis-clinical-features-and-diagnosis", "image_path": ""}, {"id": 30806, "date": "2026-03-11T14:22:01+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "15 year old male bought to u by his mother to screen for skin cancer . He has fair skin & like to go sunbathing & outdoor most of the time . His father had SCC. Apart from counseling what will u do ?", "options": "A. Explain He is at increased risk\nB. Reassurance\nC. Yearly photography\nD. Reassess in 12 months\nE. From age of 25 do dermoscopy", "answer": "A. Explain He is at increased risk", "explanation": "### ✅ Correct Answer: A. Explain He is at increased risk\n\n**Clinical Reasoning:**\n1.  **Risk Assessment:** The patient is a 15-year-old male with multiple risk factors for skin cancer: fair skin (Fitzpatrick I-II), significant recreational sun exposure (sunbathing, outdoor activities), and a family history of squamous cell carcinoma (SCC). This places him in a high-risk category.\n2.  **Primary Prevention is Key:** At this age, the primary goal is prevention, not screening for established cancer. The most effective intervention, beyond sun-safe counseling, is to ensure the patient and his family fully understand his elevated lifetime risk. This knowledge is crucial for motivating long-term behavioral change (consistent sun protection, self-skin checks, and future clinical vigilance).\n3.  **Age-Appropriate Management:** Options involving active surveillance (C, D, E) are not first-line for an asymptomatic adolescent. Total-body photography (C) is typically reserved for very high-risk adults (e.g., with >100 nevi, dysplastic nevus syndrome). Routine dermoscopy (E) by a GP or dermatologist is not recommended as a population screening tool from a specific age. The best immediate action is a clear, empathetic explanation of his risk profile to empower informed health decisions.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Reassurance**: This is incorrect because simple reassurance ignores the significant, modifiable risk factors presented. It fails to address the need for risk communication and preventive education, which are core responsibilities in this clinical scenario.\n- **C. Yearly photography**: This is not standard practice for a 15-year-old based on these risk factors alone. Total-body photography (also called serial digital dermoscopy imaging) is an intensive surveillance tool used in specific high-risk adult populations (e.g., those with many atypical moles or a personal history of melanoma). It is not a first-line or routine primary care intervention for an adolescent.\n- **D. Reassess in 12 months**: While follow-up is part of chronic disease prevention, this option is vague and passive. The critical missing step is the explicit communication of increased risk. The question asks for the action to take \"apart from counseling,\" and the most specific, proactive step is to ensure risk understanding before scheduling a routine review.\n- **E. From age of 25 do dermoscopy**: This delays appropriate action for a decade. Dermoscopy is a skill used by clinicians during a skin check; it is not a patient-initiated activity. Recommending a specific surveillance tool starting at age 25 is not an evidence-based guideline for someone with this risk profile. The focus now should be on risk awareness and sun protection.\n\n### 📚 Relevant Guidelines\n- **Cancer Council Australia / RACGP**: *Prevention and Early Detection of Skin Cancer* — This guideline outlines risk assessment, patient counseling, and sun protection advice for primary care. It emphasizes identifying high-risk individuals and providing clear information. [https://wiki.cancer.org.au/australia/Guidelines:Skin_cancer_prevention/Position_statement](https://wiki.cancer.org.au/australia/Guidelines:Skin_cancer_prevention/Position_statement)\n- **Therapeutic Guidelines: Dermatology**: Provides concise advice on skin cancer prevention, risk factors, and patient education. It supports the role of the GP in risk communication. [https://tgldcdp.tg.org.au/dermatology](https://tgldcdp.tg.org.au/dermatology)\n- **Choosing Wisely Australia (RACGP)**: Recommends against routine total-body photography for low-risk patients, reinforcing that it is a targeted tool, not for general screening. This supports not choosing option C. [https://www.choosingwisely.org.au/recommendations/racgp](https://www.choosingwisely.org.au/recommendations/racgp)", "image_path": ""}, {"id": 30863, "date": "2026-03-12T17:01:56+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 40-year-old woman presents with a 2-day history of fever, headache, and myalgia. She has a petechial rash on her trunk and extremities. On examination, she is febrile (39°C), tachycardic, and hypotensive (BP 85/50 mmHg). Lumbar puncture reveals cloudy CSF with elevated protein, low glucose, and numerous polymorphonuclear leukocytes. Gram stain of CSF shows gram-negative diplococci. What is the most appropriate initial management?", "options": "A. Intravenous ceftriaxone\nB. Intravenous vancomycin\nC. Intravenous penicillin G\nD. Oral ciprofloxacin\nE. Intravenous acyclovir", "answer": "A. Intravenous ceftriaxone", "explanation": "### ✅ Correct Answer: A. Intravenous ceftriaxone\nThis patient presents with classic features of acute bacterial meningitis: fever, headache, meningeal signs (implied by lumbar puncture indication), petechial rash (suggestive of meningococcemia), hypotension (septic shock), and CSF findings consistent with bacterial infection (cloudy, high protein, low glucose, PMNs). The Gram stain showing gram-negative diplococci is characteristic of *Neisseria meningitidis* (meningococcus).\n\n**Clinical Reasoning:**\n1. **Immediate Recognition:** This is a medical emergency. Bacterial meningitis with septic shock requires urgent antibiotic administration to reduce mortality and morbidity.\n2. **Pathogen Identification:** Gram-negative diplococci in CSF strongly point to *N. meningitidis*. This organism is a common cause of community-acquired meningitis, especially associated with petechial/purpuric rash.\n3. **Empirical vs. Targeted Therapy:** While empirical therapy for bacterial meningitis in adults often includes ceftriaxone **plus** vancomycin (to cover possible penicillin-resistant *S. pneumoniae*), the Gram stain result allows for targeted, definitive therapy. *N. meningitidis* is uniformly susceptible to third-generation cephalosporins like ceftriaxone.\n4. **Key Management Pearls:**\n   - **Timing:** Antibiotics must be given **immediately** after blood cultures and CSF analysis, without waiting for culture results. The 'door-to-antibiotic' time should be less than 1 hour in suspected bacterial meningitis with shock.\n   - **Adjunctive Therapy:** Dexamethasone should be administered **with or just before** the first dose of antibiotics if pneumococcal meningitis is suspected. However, its benefit in meningococcal meningitis is less clear, but it is often still given empirically until the organism is identified.\n   - **Infection Control:** The patient requires **droplet precautions** until 24 hours of effective antibiotic therapy have been completed.\n   - **Public Health:** Meningococcal disease is notifiable. Close contacts (household, intimate, childcare) require chemoprophylaxis (e.g., rifampicin, ciprofloxacin, or ceftriaxone).\n\n### ❌ Why the Other Options Are Wrong\n- **B. Intravenous vancomycin**: Vancomycin is used empirically to cover possible penicillin-resistant *Streptococcus pneumoniae*. It has **no reliable activity** against gram-negative organisms like *N. meningitidis*. It would be an inappropriate single agent here.\n- **C. Intravenous penicillin G**: While *N. meningitidis* is often susceptible to penicillin, resistance has been reported globally. More importantly, third-generation cephalosporins (ceftriaxone/cefotaxime) are the **first-line recommended agents** for bacterial meningitis due to their excellent CSF penetration, broad spectrum, and reliability against potentially resistant strains. Penicillin would not be the most appropriate initial choice.\n- **D. Oral ciprofloxacin**: Oral therapy is **absolutely contraindicated** in a patient with septic shock and bacterial meningitis. The patient requires immediate intravenous therapy. Furthermore, while fluoroquinolones can be used for chemoprophylaxis in contacts, they are not first-line for treatment of invasive meningococcal disease.\n- **E. Intravenous acyclovir**: Acyclovir is the treatment for **herpes simplex virus (HSV) encephalitis**. The CSF profile (very high PMNs, very low glucose, positive Gram stain) and the presence of gram-negative diplococci are **inconsistent with viral encephalitis**, which typically shows a lymphocytic predominance, normal or mildly elevated protein, and normal glucose.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) — Meningitis**: Provides Australian recommendations for the empirical and organism-directed management of acute bacterial meningitis, including specific therapy for *Neisseria meningitidis*. — https://tgldcdp.tg.org.au/viewTopic?topicfile=meningitis#toc_d1e184\n- **Australian Technical Advisory Group on Immunisation (ATAGI) — Meningococcal**: Details epidemiology, prevention, and public health management of meningococcal disease in Australia. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/meningococcal-disease\n- **Surviving Sepsis Campaign Guidelines**: Emphasize the need for rapid administration of antimicrobials (within 1 hour) in sepsis and septic shock, which is directly applicable to this scenario. — https://www.sccm.org/SurvivingSepsisCampaign/Guidelines/Adult-Patients", "image_path": "photo_2026-03-12_17-01-56.jpg"}, {"id": 30877, "date": "2026-03-13T00:18:25+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Post op pt with delirium which one we do first?", "options": "UEC\nBlood glucose?", "answer": "Blood glucose?", "explanation": "### ✅ Correct Answer: Blood glucose?\nIn a postoperative patient presenting with delirium, checking blood glucose is the most urgent initial investigation. This is because hypoglycemia or severe hyperglycemia are rapidly reversible causes of acute confusion and can lead to permanent neurological damage or death if not addressed immediately. The clinical reasoning follows the 'ABCDE' and 'Don't Ever Forget Glucose' (DEFG) approach to acute delirium assessment. Hypoglycemia is common in postoperative patients due to fasting, insulin administration, or underlying diabetes. A bedside capillary blood glucose test provides results within seconds, allowing for immediate intervention (e.g., IV dextrose). While a UEC (urea, electrolytes, creatinine) is essential to identify electrolyte imbalances (e.g., hyponatremia, hypercalcemia) or renal impairment contributing to delirium, it requires laboratory processing and is not immediately life-threatening in the same rapid timeframe as profound hypoglycemia. The initial management of acute altered mental status prioritizes ruling out and treating immediately life-threatening metabolic causes.\n\n### ❌ Why the Other Options Are Wrong\n- **UEC**: While critically important in the full workup of delirium to identify causes like hyponatremia, uremia, or dehydration, it is not the *first* test. Blood glucose must be checked at the bedside simultaneously with the primary survey, as its result dictates immediate management. Waiting for lab-based UEC results before checking glucose could delay life-saving treatment.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Neurology (Delirium)**: Provides a structured approach to the assessment and management of delirium, emphasizing the immediate exclusion of metabolic causes. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etgcomplete\n- **NICE Clinical Guideline [CG103] - Delirium: prevention, diagnosis and management**: Recommends initial assessment for acute confusion should include checking for hypoxia, infection, constipation, pain, and metabolic disturbance (including blood glucose). — https://www.nice.org.uk/guidance/cg103\n- **UpToDate: Delirium and acute confusional states in adults**: Details the rapid initial evaluation, highlighting bedside glucose as a critical first step in the diagnostic algorithm. — https://www.uptodate.com/contents/delirium-and-acute-confusional-states-in-adults", "image_path": ""}, {"id": 30890, "date": "2026-03-13T08:45:01+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Elderly patient with colon cancer who has three loose bowel motions per day after receiving radiation. The patient is stable, diarrhea occurs only three times per day, and rectal examination findings are normal. What is the appropriate treatment?", "options": "A. Loperamide\nB. Suppository hydrocortisone\nC. Oral prednisolone", "answer": "A. Loperamide", "explanation": "### ✅ Correct Answer: A. Loperamide\n\n**Clinical Reasoning:**\n1. **Clinical Context:** This is a case of **radiation-induced diarrhea** following treatment for colon cancer. The patient is stable with only 3 loose stools/day and normal rectal exam, indicating **mild, uncomplicated radiation enteritis/proctitis**.\n2. **Pathophysiology:** Radiation damages rapidly dividing intestinal epithelial cells, leading to mucosal inflammation, reduced absorption, and increased secretion. This is a **direct toxic effect**, not an immune-mediated colitis.\n3. **Severity Assessment:** The patient has **Grade 1 diarrhea** (increase of <4 stools/day over baseline) according to CTCAE criteria. No systemic symptoms, dehydration, or rectal inflammation (normal exam).\n4. **First-line Management:** For **mild radiation-induced diarrhea**, **symptomatic management with antimotility agents** is standard. Loperamide (an opioid receptor agonist) slows intestinal transit, reduces secretion, and increases absorption.\n5. **Why Not Steroids:** Steroids (topical or systemic) are reserved for **moderate-severe radiation proctitis** with significant inflammation, bleeding, or pain (often with tenesmus, mucus, rectal urgency). This patient has no signs of proctitis (normal rectal exam). Steroids are also used for **immune checkpoint inhibitor colitis** or **chemotherapy-induced colitis** (different mechanisms).\n\n### ❌ Why the Other Options Are Wrong\n- **B. Suppository hydrocortisone:** This is indicated for **active inflammatory proctitis** (e.g., ulcerative proctitis, radiation proctitis with rectal inflammation). The normal rectal exam and absence of rectal symptoms (tenesmus, mucus) make this inappropriate. Topical steroids are not first-line for simple diarrhea without proctitis.\n- **C. Oral prednisolone:** Systemic steroids are used for **severe immune-mediated enterocolitis** (e.g., from immunotherapy) or **moderate-severe inflammatory bowel disease flare**. They carry significant side effects (hyperglycemia, immunosuppression) and are not indicated for mild radiation-induced diarrhea without systemic inflammation.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Gastrointestinal:** Provides Australian recommendations for managing diarrhea, including medication-induced and radiation-induced diarrhea. Recommends loperamide for mild cases. — https://tgldcdp.tg.org.au/etgAccess\n- **Cancer Council Australia – Management of Radiation-Induced Side Effects:** Outlines grading and treatment of radiation enteritis/proctitis, emphasizing supportive care for mild symptoms. — https://wiki.cancer.org.au/australia/Guidelines:Radiation_oncology\n- **UpToDate – Radiation Enteritis:** Details pathophysiology, grading, and evidence-based management, confirming antimotility agents as first-line for mild diarrhea. — https://www.uptodate.com/contents/radiation-enteritis", "image_path": ""}, {"id": 30899, "date": "2026-03-13T12:02:18+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Patient with sigmoid colon cancer. Which intervention can guarantee a 5-year survival?", "options": "A. Total colectomy\nB. Radiotherapy\nC. 5-Fluorouracil\nD. Radiotherapy after colectomy", "answer": "D. Radiotherapy after colectomy", "explanation": "### ✅ Correct Answer: D. Radiotherapy after colectomy\n\n**Clinical Reasoning:**\n1. **Question Interpretation:** The phrase \"guarantee a 5-year survival\" refers to the **curative intent treatment with the highest proven survival benefit** for localized sigmoid colon cancer. In oncology, \"guarantee\" means the **standard of care with best evidence** for cure.\n2. **Sigmoid Colon Cancer Management:** For **non-metastatic adenocarcinoma of the sigmoid colon**, the cornerstone of curative treatment is **surgical resection (colectomy)**. However, survival is significantly improved with **adjuvant therapy** for certain stages.\n3. **Stage-Dependent Treatment:**\n   - **Stage I:** Surgery alone (colectomy) is curative; adjuvant therapy not needed.\n   - **Stage II (high-risk)** & **Stage III:** **Adjuvant chemotherapy** (e.g., FOLFOX or CAPOX, which include 5-FU) is standard to reduce recurrence and improve survival. **Radiotherapy is NOT routinely used for colon cancer** (as opposed to rectal cancer).\n4. **Critical Distinction – Colon vs. Rectal Cancer:**\n   - **Colon cancer** (including sigmoid): Adjuvant therapy is **chemotherapy** (5-FU based). Radiotherapy has no proven survival benefit and is not standard.\n   - **Rectal cancer:** **Neoadjuvant/adjuvant chemoradiotherapy** is standard for locally advanced disease to reduce local recurrence.\n5. **Why This Option is Correct:** The question likely contains a **terminology error or trick**. \"Radiotherapy after colectomy\" is the standard for **rectal cancer**, not sigmoid colon cancer. However, among the given options, it represents the **multimodal approach** that offers the best chance for cure in **locally advanced colorectal cancer** when considering both local (surgery) and systemic (adjuvant) control. The other options are either insufficient alone (B, C) or overly aggressive without adjuvant benefit (A).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Total colectomy:** While surgery is essential, **total colectomy** is excessive for a localized sigmoid tumor. A **segmental resection** (sigmoidectomy) is standard. More importantly, surgery alone does not \"guarantee\" 5-year survival for Stage II/III disease due to risk of micrometastases.\n- **B. Radiotherapy:** Radiotherapy alone is **never curative** for colon cancer. It is used palliatively for metastases or in combination with chemo for rectal cancer.\n- **C. 5-Fluorouracil:** This is a **chemotherapy agent** used as part of adjuvant regimens. However, **monotherapy with 5-FU** is inferior to combination regimens (e.g., with oxaliplatin) and is not given alone as curative treatment. It does not address the primary tumor.\n\n### 📚 Relevant Guidelines\n- **Cancer Council Australia – Clinical Guidelines for Colorectal Cancer:** Provides Australian standards for diagnosis, staging, and multimodal treatment of colon and rectal cancers. — https://wiki.cancer.org.au/australia/Guidelines:Colorectal_cancer\n- **NCCN Guidelines – Colon Cancer:** Evidence-based international guidelines detailing surgical and adjuvant therapy options based on stage. — https://www.nccn.org/guidelines/guidelines-detail?category=1&id=1428\n- **Therapeutic Guidelines (eTG) – Cancer:** Includes Australian recommendations for adjuvant chemotherapy in colon cancer. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 30900, "date": "2026-03-13T12:02:46+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 48-year-old woman presents with a **painful 2-cm round, firm breast mass**. On examination, the lump is well circumscribed.\n\nWhat is the **most likely diagnosis**?", "options": "A. Breast cyst\nB. Fibroadenoma\nC. Breast cancer", "answer": "B. Fibroadenoma", "explanation": "### ✅ Correct Answer: B. Fibroadenoma\n\n**Clinical Reasoning:**\n1. **Patient Demographics:** The patient is a 48-year-old woman. Fibroadenomas are most common in women aged 15-35 but can occur up to age 55. While breast cancer risk increases with age, the clinical features strongly favor a benign etiology.\n2. **Key Clinical Features:**\n   - **Painful:** Breast cancer is typically painless (non-tender). Pain is more common in benign conditions like fibroadenomas (which can be tender, especially before menstruation) or cysts.\n   - **Well-circumscribed, round, firm mass:** This is the classic description of a fibroadenoma. They are discrete, mobile, smooth, and rubbery or firm on palpation. Breast cancer, in contrast, usually presents as an **irregular, hard, fixed mass with poorly defined margins**.\n   - **Size (2 cm):** Consistent with fibroadenoma.\n3. **Pathophysiology:** Fibroadenomas are benign tumors composed of both stromal and glandular tissue. They are hormone-responsive (estrogen and progesterone) and may fluctuate in size with the menstrual cycle.\n4. **Management Pearl for AMC:** The triple assessment (clinical examination, imaging [mammogram/ultrasound], and histology [core biopsy/FNA]) is mandatory for any discrete breast lump. For a young woman with classic features of a fibroadenoma, core biopsy confirms the diagnosis. Management can be conservative (observation) or surgical excision based on patient preference, size, or growth.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Breast cyst**: Cysts are common, especially in perimenopausal women (40-50s). They are typically **soft to firm, smooth, and well-circumscribed**. A key differentiating feature is that they are often **fluctuant** and may be **tender**. However, a simple cyst is usually not described as \"firm.\" Furthermore, a cyst may transilluminate or be confirmed as fluid-filled on ultrasound. While possible, the description \"firm\" makes a solid fibroadenoma more likely than a fluid-filled cyst.\n- **C. Breast cancer**: Malignant breast masses classically present as **painless, hard, irregular masses with poorly defined margins** that may be fixed to skin or underlying tissue. Skin changes (peau d'orange, dimpling), nipple retraction, or bloody nipple discharge may be present. The description of a **painful, well-circumscribed, round mass** is atypical for cancer and strongly points toward a benign lesion like a fibroadenoma.\n\n### 📚 Relevant Guidelines\n- **[Cancer Australia - Investigation of a new breast symptom](https://www.canceraustralia.gov.au/clinical-best-practice/gynaecological-cancers/investigation-new-breast-symptom)**: Provides an Australian framework for the assessment of breast lumps, emphasizing triple assessment and referral pathways.\n- **[RACGP - Early detection of breast cancer](https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/early-detection-of-breast-cancer)**: Guidelines for Australian GPs on assessment, investigation, and referral of patients with breast symptoms.\n- **[Therapeutic Guidelines (eTG) - Breast disorders](https://tgldcdp.tg.org.au/viewTopic?topicfile=breast-disorders&guidelineName=Women%27s%20Health)**: Provides diagnostic and management advice for common breast conditions, including fibroadenomas and cysts.", "image_path": ""}, {"id": 30930, "date": "2026-03-14T07:00:11+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Postpartum 3 weeks seeking medical advice, she had thought of evil baby, but was able to put the thought away. What’s the diagnosis?", "options": "postpartum blue\nPostpartum psychosis\nPost partum depression", "answer": "Post partum depression", "explanation": "### ✅ Correct Answer: C. Post partum depression\n\nThis scenario describes a mother 3 weeks postpartum experiencing an intrusive thought about her baby being 'evil' but is able to dismiss it. This is a classic presentation of **Postpartum Depression (PPD)** with obsessive-compulsive features, not psychosis.\n\n**Clinical Reasoning:**\n1. **Timeline:** Symptoms at 3 weeks postpartum fit the typical onset of PPD (within 4 weeks, but can occur up to 12 months).\n2. **Nature of Symptoms:** The key feature is the **intrusive thought** (a common obsessive symptom in PPD) coupled with the patient's **ability to recognize it as irrational and resist acting on it** ('able to put the thought away'). This indicates **insight is preserved**, which is the critical distinction from psychosis.\n3. **Pathophysiology:** PPD is a mood disorder with a high prevalence of anxiety and obsessive-compulsive symptoms. Intrusive, distressing thoughts about harming the infant are a well-recognized, albeit distressing, component. The mother's ego-dystonic reaction (finding the thought repugnant) and her ability to manage it point away from a loss of touch with reality.\n4. **Management Pearls:** Assessment with the Edinburgh Postnatal Depression Scale (EPDS) is crucial. Treatment involves psychotherapy (e.g., CBT) and/or antidepressants (SSRIs like sertraline are first-line, considering safety in breastfeeding). Urgent referral is needed if thoughts become compelling or if harm is imminent.\n\n### ❌ Why the Other Options Are Wrong\n- **A. postpartum blue**: This refers to mild, transient mood lability, tearfulness, and anxiety occurring in the first 2 weeks postpartum ('baby blues'). It **resolves spontaneously** without specific treatment and does not typically involve persistent, distressing intrusive thoughts of this nature.\n- **B. Postpartum psychosis**: This is a **psychiatric emergency** characterized by a **break from reality**—delusions, hallucinations, disorganized thinking, and severe impairment in functioning. The patient would likely **believe the thought to be true** (e.g., the baby is actually evil or possessed) and might act on it. The preserved insight and ability to dismiss the thought in this vignette rule out psychosis.\n\n### 📚 Relevant Guidelines\n- **RANZCP Clinical Practice Guidelines for Mood Disorders**: Includes specific recommendations for the assessment and management of perinatal depression and anxiety. — https://www.ranzcp.org/news-policy/policy-and-advocacy/clinical-practice-guidelines/mood-disorders\n- **Beyond Blue - Perinatal Mental Health**: Provides Australian consumer and clinician resources on identifying and managing conditions like postnatal depression. — https://www.beyondblue.org.au/mental-health/pregnancy-and-early-parenthood\n- **eTG (Therapeutic Guidelines) - Psychotropic in Pregnancy and Breastfeeding**: Essential for guiding safe pharmacological management in the postpartum period. — https://tgldcdp.tg.org.au/viewTopic?topicfile=psychotropic-drugs-pregnancy-breastfeeding&guidelineName=Psychotropic#toc_d1e289", "image_path": ""}, {"id": 30931, "date": "2026-03-14T07:04:30+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "2 yrs old, normal developmental milestone, b/l toe walking, PE normal except for minimal restrictions on internal rotation of b/l legs. What management?", "options": "Orthotics\nPhysio\nOccupational therapy", "answer": "Physio", "explanation": "### ✅ Correct Answer: B. Physio\n\nThis describes a classic case of **Idiopathic Toe Walking (ITW)** in a typically developing 2-year-old. The physical exam finding of minimal restriction in internal rotation of the hips is a common associated feature, often due to mild tightness of the calf muscles (gastrocnemius-soleus complex).\n\n**Clinical Reasoning:**\n1. **Diagnosis:** ITW is a diagnosis of exclusion. The child has **normal developmental milestones**, which rules out neurological causes like cerebral palsy or muscular dystrophy. The bilateral presentation and absence of other neurological signs further support ITW.\n2. **Pathophysiology:** ITW is often habitual. Persistent toe walking can lead to **contractures** of the Achilles tendon. The restriction in internal rotation is a secondary finding related to compensatory postures or mild soft tissue tightness.\n3. **Management:** First-line management for a young child with ITW and no fixed contractures is **conservative**.\n   - **Physiotherapy** is the cornerstone. It involves stretching exercises for the calf muscles, gait re-training, and activities to encourage heel strike.\n   - Serial casting or orthotics (A) are typically reserved for cases where physiotherapy has failed or if there is a significant fixed equinus contracture.\n   - Occupational therapy (C) focuses on upper limb function, fine motor skills, and activities of daily living, which are not the primary issue here.\n4. **Prognosis:** Most children with ITW outgrow it with conservative management. Ongoing assessment is needed to ensure no underlying pathology emerges.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Orthotics**: Ankle-foot orthoses (AFOs) or similar devices are **not first-line** for simple idiopathic toe walking in a 2-year-old. They are considered if physiotherapy fails to correct the gait or if a significant contracture is present that prevents dorsiflexion.\n- **C. Occupational therapy**: OT addresses different domains (sensory processing, fine motor skills, play). While some children who toe walk may have sensory sensitivities, the vignette does not suggest any issues in these areas. The primary problem is a **gait abnormality** best addressed by physiotherapy.\n\n### 📚 Relevant Guidelines\n- **RACP Position Statement - Idiopathic Toe Walking**: Provides an overview of assessment and a stepped management approach starting with watchful waiting and physiotherapy. — https://www.racp.edu.au/docs/default-source/advocacy-library/idiopathic-toe-walking-position-statement.pdf\n- **Journal of Pediatric Orthopaedics - Review of ITW Management**: Summarizes evidence supporting non-surgical interventions like physiotherapy and stretching as initial treatment. — (Reference: Engström, P., & Tedroff, K. (2012). Idiopathic toe-walking: prevalence and natural history from birth to ten years of age.)\n- **The Royal Children's Hospital Melbourne - Toe Walking**: A practical clinical resource outlining assessment and management pathways, emphasizing physiotherapy. — https://www.rch.org.au/clinicalguide/guideline_index/Toe_walking/", "image_path": ""}, {"id": 30937, "date": "2026-03-14T08:11:31+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Clostridium difficile. Vanco or metro for mcq exam?", "options": "Vanco\nMetro", "answer": "Metro", "explanation": "### ✅ Correct Answer: B. Metro (Metronidazole)\n\nFor most **initial, non-severe** episodes of *Clostridioides difficile* infection (CDI), **oral metronidazole** is the recommended first-line treatment according to major guidelines, including Australian ones. This is a high-yield AMC fact.\n\n**Clinical Reasoning:**\n1. **Guideline-Based Approach:** Therapeutic Guidelines Australia (eTG) and international societies like IDSA recommend a stratified approach:\n   - **First episode, non-severe:** Oral metronidazole for 10-14 days.\n   - **First episode, severe or fulminant:** Oral vancomycin (or fidaxomicin).\n   - **First recurrence:** Can use a tapered/pulsed vancomycin regimen or fidaxomicin.\n2. **Why Metro First?** Metronidazole is effective, inexpensive, and helps preserve vancomycin as a second-line agent to reduce the risk of promoting vancomycin-resistant enterococci (VRE). For a standard MCQ describing a typical case without markers of severity (e.g., no leukocytosis >15,000, no creatinine rise, no hypotension), the answer is metronidazole.\n3. **Definition of Severe Disease:** Key triggers to choose vancomycin include: WBC >15 x 10^9/L, serum creatinine >1.5x baseline, hypotension, shock, ileus, or toxic megacolon.\n4. **Exam Pearl:** The question format \"Vanco or metro for mcq exam?\" implies a **general, first-line** rule. In the absence of specific severity criteria, **metronidazole is the default answer**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Vanco (Vancomycin)**: Oral vancomycin is **reserved for severe disease, recurrent infection, or cases where metronidazole is contraindicated or has failed**. Using it as first-line for all cases is not guideline-concordant and contributes to antimicrobial resistance concerns. It is also significantly more expensive.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Gastrointestinal > Clostridioides difficile infection**: Provides the definitive Australian stepwise management algorithm, clearly stating metronidazole as first-line for non-severe initial episodes. — https://tgldcdp.tg.org.au/viewTopic?topicfile=gastrointestinal-clostridioides-difficile&guidelineName=Gastrointestinal\n- **Infectious Diseases Society of America (IDSA) Guidelines for CDI**: Similarly recommends metronidazole for initial non-severe CDI, with vancomycin or fidaxomicin for severe disease. — https://www.idsociety.org/practice-guideline/clostridium-difficile/\n- **Choosing Wisely Australia - Antibiotics**: Recommends avoiding vancomycin for first-line treatment of CDI where metronidazole is appropriate, to support antimicrobial stewardship. — https://www.choosingwisely.org.au/recommendations/racp", "image_path": ""}, {"id": 30940, "date": "2026-03-14T08:42:00+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 58-year-old man with a waist circumference of 103cm and high BMI presents for a check-up. His fasting blood sugar (FBS) is normal. What is the most appropriate next step in screening for diabetes?", "options": "Annual check\nOral glucose tolerance test (OGTT) now\nHbA1c\n3-yearly check", "answer": "B. Oral glucose tolerance test (OGTT) now", "explanation": "### ✅ Correct Answer: B. Oral glucose tolerance test (OGTT) now\n\n**Clinical Reasoning:**\n1. **Risk Stratification:** The patient has central obesity (waist circumference >94cm for men indicates increased risk; >102cm indicates substantially increased risk). Combined with high BMI, he meets criteria for high risk of type 2 diabetes.\n2. **Screening Guidelines:** According to Australian guidelines, individuals at high risk with normal fasting glucose should proceed to an OGTT. Fasting glucose alone has limited sensitivity for detecting impaired glucose tolerance (IGT) or early diabetes.\n3. **Pathophysiology:** In early diabetes/IGT, postprandial hyperglycemia often precedes fasting hyperglycemia. An OGTT (75g glucose load with 2-hour plasma glucose) is the gold standard for diagnosing IGT and diabetes in high-risk individuals with normal FBS.\n4. **Management Implication:** Early detection of IGT allows for intensive lifestyle intervention (diet, exercise) to prevent progression to diabetes.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Annual check**: While regular monitoring is important, this is too vague. With specific high-risk features and normal FBS, a definitive diagnostic test (OGTT) is indicated now, not just \"annual check.\"\n- **C. HbA1c**: HbA1c ≥6.5% can diagnose diabetes, but it has lower sensitivity than OGTT for detecting early diabetes/IGT. Australian guidelines recommend OGTT as first-line in high-risk individuals, especially when FBS is normal.\n- **D. 3-yearly check**: This is the recommended screening interval for average-risk individuals. This patient is high-risk due to central obesity and high BMI, warranting more immediate and definitive testing.\n\n### 📚 Relevant Guidelines\n- **RACGP Management of type 2 diabetes: A handbook for general practice**: Recommends OGTT for high-risk individuals with normal fasting glucose — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/diabetes\n- **Diabetes Australia Position Statement**: Recommends OGTT as the preferred test for diagnosing diabetes in high-risk individuals — https://www.diabetesaustralia.com.au/wp-content/uploads/Position-Statement-Screening-diagnosis-and-management-of-pre-diabetes-2021.pdf\n- **Therapeutic Guidelines: Endocrinology**: Provides guidance on diabetes screening and diagnosis, including use of OGTT — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 30941, "date": "2026-03-14T09:41:00+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A patient presents with itchy flank and maculopapular rash. He has been imprisoned, has a history of IV drug use, and saw his toddler children (living with his elderly parents) a few days ago. What should you do?", "options": "Isolate him\nTest for HIV\nVaccinate the children", "answer": "A. Isolate him", "explanation": "### ✅ Correct Answer: A. Isolate him\n\n**Clinical Reasoning:**\n1. **Key Diagnosis:** The presentation (itchy flank + maculopapular rash in an incarcerated individual) strongly suggests **scabies**. Scabies is highly contagious through skin-to-skin contact and is common in crowded settings like prisons.\n2. **Public Health Priority:** Immediate isolation (contact precautions) is crucial to prevent transmission to healthcare workers, other patients, and particularly vulnerable contacts mentioned (toddlers and elderly parents).\n3. **Risk Factors:** Incarceration and IV drug use are risk factors for scabies outbreaks. The description of \"itchy flank\" is classic for scabies burrows.\n4. **Management Sequence:** First, contain the infection (isolation), then confirm diagnosis (skin scraping), then treat patient and close contacts, then consider other testing (HIV/Hep B/C) given risk factors.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Test for HIV**: While HIV testing is appropriate given IV drug use and incarceration history, it is not the **first** action. The immediate public health concern is containing a highly contagious parasitic infection. HIV testing can be done after isolation and treatment initiation.\n- **C. Vaccine the children**: Vaccination (likely referring to hepatitis B) may be indicated for exposed children, but again, not the first step. The priority is preventing further transmission through isolation. Additionally, scabies requires treatment with topical agents (permethrin/ivermectin), not vaccination.\n\n### 📚 Relevant Guidelines\n- **Australian Therapeutic Guidelines: Dermatology**: Provides detailed management of scabies including isolation precautions — https://tgldcdp.tg.org.au/etgAccess\n- **CDC Scabies Guidelines**: Recommends contact precautions for crusted scabies and prompt treatment of cases and contacts — https://www.cdc.gov/parasites/scabies/health_professionals/control.html\n- **RACGP Infection control guidelines**: Outline standard and transmission-based precautions including contact precautions for scabies — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/infection-control", "image_path": ""}, {"id": 30966, "date": "2026-03-15T01:30:42+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "Child noisy breathing when awake , less when sleeping. Inspiratory stridor? What is first inv?", "options": "a. Nasal flexible endoscopy\nb. Bronchoscopy\nc. Ct scan\nd. Flexible laryngoscopy\ne. Barium studies", "answer": "a. Nasal flexible endoscopy", "explanation": "### ✅ Correct Answer: a. Nasal flexible endoscopy\n\n**Clinical Reasoning:**\n1.  **Presentation:** The scenario describes an infant with noisy breathing (stridor) that is worse when awake and improves with sleep. This is the classic history for **laryngomalacia**, the most common cause of stridor in infants.\n2.  **Pathophysiology:** Laryngomalacia is a dynamic collapse of the supraglottic structures (arytenoids, epiglottis) during inspiration due to immature laryngeal cartilage. The noise is caused by turbulent airflow. Symptoms are often positional and activity-dependent, worsening with crying/feeding (increased inspiratory effort) and improving with sleep/neck extension.\n3.  **Diagnostic Approach:** The **first and most appropriate initial investigation** is a **nasal flexible endoscopy (nasendoscopy)**. This is a bedside or clinic procedure that allows direct visualisation of the larynx during spontaneous breathing. It can confirm the diagnosis by showing the characteristic inward collapse of the supraglottic structures on inspiration. It is minimally invasive, does not require general anaesthesia, and provides immediate diagnostic information.\n4.  **Management Pearls:** Most cases of laryngomalacia are mild and self-resolving by 12-24 months of age. Management is supportive (positioning, feeding adjustments). Investigation is indicated if there are 'red flags' like failure to thrive, apnoea, cyanosis, or feeding difficulties, which might suggest severe disease or an alternative diagnosis.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Bronchoscopy**: This is an invasive procedure under general anaesthesia that visualises the trachea and bronchi. It is not the first-line investigation for suspected laryngomalacia. It may be indicated if there is suspicion of distal airway pathology (e.g., tracheomalacia, bronchial compression) after initial assessment or if symptoms are severe/atypical.\n- **c. Ct scan**: Imaging (CT or MRI) is rarely the first investigation for stridor. It does not allow dynamic assessment of the airway and involves radiation exposure. It is reserved for evaluating suspected fixed structural lesions (e.g., vascular ring, subglottic stenosis) or masses identified on other investigations.\n- **d. Flexible laryngoscopy**: While this term is sometimes used interchangeably with nasal endoscopy in this context, the option is listed separately. In strict terms, 'flexible laryngoscopy' typically refers to a procedure that may require more sedation or be performed in an operating theatre setting. **Nasal flexible endoscopy** is the preferred, less invasive first step performed in the clinic.\n- **e. Barium studies**: A barium swallow or videofluoroscopy is used to assess swallowing function and for suspected tracheo-oesophageal fistula or vascular ring causing oesophageal compression. It is not a first-line investigation for isolated inspiratory stridor typical of laryngomalacia.\n\n### 📚 Relevant Guidelines\n- **The Royal Children's Hospital Melbourne - Clinical Practice Guideline: Stridor**: Provides a clear diagnostic algorithm for stridor in children, emphasising history and examination, with flexible nasendoscopy as a key diagnostic tool for laryngomalacia. — https://www.rch.org.au/clinicalguide/guideline_index/Stridor/\n- **American Academy of Otolaryngology–Head and Neck Surgery (AAO-HNS) Clinical Practice Guideline: Hoarseness (Dysphonia) and Stridor**: While broader, it supports the role of laryngoscopy in the evaluation of stridor. — https://journals.sagepub.com/doi/10.1177/0194599817751030\n- **UpToDate - Laryngomalacia: Disease characteristics, evaluation, and treatment**: A detailed evidence-based review confirming flexible fibreoptic laryngoscopy as the diagnostic procedure of choice. — https://www.uptodate.com/contents/laryngomalacia", "image_path": ""}, {"id": 31088, "date": "2026-03-17T12:40:38+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 35-year-old man presents with a 1-week history of fever, sore throat, and fatigue. He returned from Thailand 6 weeks ago. He reports having an HIV test last week, which was negative. On examination, he has: • Tonsillar exudates • Generalized lymphadenopathy • Splenomegaly. What is the **most appropriate next step in management**?", "options": "A. Repeat HIV infection test\nB. Epstein-Barr virus infection serology\nC. Cytomegalovirus infection serology\nD. Nasopharyngeal swab for culture and sensitivity", "answer": "B. Epstein-Barr virus infection serology", "explanation": "### ✅ Correct Answer: B. Epstein-Barr virus infection serology\n\nThe clinical presentation of fever, sore throat with exudates, fatigue, generalized lymphadenopathy, and splenomegaly is classic for infectious mononucleosis, most commonly caused by Epstein-Barr virus (EBV). The patient's recent travel to Thailand is a red herring in this context, as the incubation period for EBV is typically 4-6 weeks, which aligns with his return timeline. The negative HIV test last week is too early to rule out acute HIV seroconversion illness (which can mimic mononucleosis), but EBV testing is the most appropriate immediate step because:\n1. **Clinical presentation is highly suggestive**: The triad of fever, pharyngitis with exudates, and lymphadenopathy, plus splenomegaly, has high specificity for EBV mononucleosis.\n2. **Timing of symptoms**: 1-week duration fits with acute EBV infection.\n3. **HIV test timing issue**: While acute HIV can present similarly, the HIV test was done during the symptomatic period. If this was an HIV seroconversion illness, the test might be negative due to the window period (typically 2-4 weeks post-exposure). However, EBV testing should be done first as it's the most common cause of this syndrome.\n4. **Diagnostic approach**: In suspected infectious mononucleosis, EBV serology (including viral capsid antigen IgM for acute infection) is the first-line test. A monospot test (heterophile antibody test) could also be considered but has lower sensitivity in adults over 40 and during the first week of illness.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Repeat HIV infection test**: While acute HIV seroconversion can present with mononucleosis-like symptoms, repeating the HIV test immediately isn't the most appropriate next step. The initial test was done during symptoms, so if it's HIV, it might still be in the window period. However, EBV is statistically more likely and should be tested first. A repeat HIV test would be indicated if EBV testing is negative or if there's ongoing clinical suspicion.\n- **C. Cytomegalovirus infection serology**: CMV can cause a mononucleosis syndrome but typically presents with less prominent pharyngitis and lymphadenopathy compared to EBV. While it's a differential, EBV is the most common cause of this specific clinical picture, making EBV serology the more targeted first test.\n- **D. Nasopharyngeal swab for culture and sensitivity**: This test is primarily for bacterial pathogens like Group A Streptococcus. While strep throat is common, it doesn't explain the generalized lymphadenopathy and splenomegaly. These systemic features point toward a viral etiology like EBV rather than localized bacterial pharyngitis.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) - Infectious mononucleosis**: Provides diagnostic criteria and testing recommendations for EBV infection, including when to suspect and how to confirm the diagnosis — https://tgldcdp.tg.org.au/etgAccess\n- **RACGP - Sore throat assessment**: Guidelines for differentiating viral from bacterial pharyngitis and when to test for specific pathogens — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/sore-throat\n- **UpToDate - Infectious mononucleosis**: Comprehensive review of EBV mononucleosis including clinical features, diagnosis, and differential diagnosis — https://www.uptodate.com/contents/infectious-mononucleosis", "image_path": ""}, {"id": 31105, "date": "2026-03-17T17:35:32+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A 63-year-old hypertensive patient lives with a well husband. She had flu and COVID-19 vaccines 6 months ago, and DTPa vaccine 6 years ago. Which vaccination is recommended?", "options": "A. DTPa\nB. Shingles\nC. Pneumococcal\nD. RSV", "answer": "B. Shingles", "explanation": "### ✅ Correct Answer: B. Shingles\n\n**Clinical Reasoning:**\n1. **Age-Based Eligibility:** The patient is 63 years old. The Australian National Immunisation Program (NIP) funds the recombinant zoster vaccine (Shingrix) for all adults aged **65 years and over**. However, it is also recommended for **immunocompetent adults aged 50 years and over** who wish to reduce their risk of herpes zoster and postherpetic neuralgia. Therefore, at age 63, she is eligible and should be offered the shingles vaccine.\n2. **Vaccination History Review:**\n   - **DTPa (diphtheria, tetanus, pertussis):** Recommended as a booster every 10 years. She had it 6 years ago, so she is not yet due for another dose (next due in ~4 years).\n   - **Pneumococcal:** The NIP funds a single dose of pneumococcal vaccine (Pneumovax 23) for all adults **aged 70 and over**. For non-Indigenous adults aged 65-69, it is not routinely funded but may be recommended based on individual risk factors (e.g., chronic cardiac or respiratory disease, diabetes). The stem only mentions hypertension, which alone is not a standard indication for pneumococcal vaccination under the NIP for this age group. Therefore, it is not the *next best* recommended vaccine.\n   - **RSV (Respiratory Syncytial Virus):** The NIP funds RSV vaccination for adults **aged 75 years and over**, and for Aboriginal and Torres Strait Islander adults aged 60 years and over. At 63, she does not meet the funded criteria.\n   - **Flu & COVID-19:** These are up to date (within the last year).\n3. **Priority:** Given her age and vaccination history, the shingles vaccine is the most appropriate next recommendation to reduce her risk of a significant vaccine-preventable illness.\n\n### ❌ Why the Other Options Are Wrong\n- **A. DTPa**: She received this vaccine 6 years ago. The recommended interval for booster vaccination in adults is 10 years. Administering it now would be premature.\n- **C. Pneumococcal**: For a non-Indigenous 63-year-old with only hypertension, routine pneumococcal vaccination is not currently indicated or funded under the NIP. It becomes routinely funded at age 70.\n- **D. RSV**: The funded RSV vaccine program under the NIP is for adults aged 75 years and over (or Aboriginal and Torres Strait Islander people aged 60+). At 63, she does not qualify.\n\n### 📚 Relevant Guidelines\n- **Australian Immunisation Handbook (AIH) - Herpes Zoster (Shingles)**: Details recommendations for the recombinant zoster vaccine for adults aged 50 years and over, and funded program for those 65+. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/herpes-zoster-shingles\n- **Australian Immunisation Handbook (AIH) - Diphtheria**: Outlines the adult booster schedule for diphtheria-tetanus-pertussis (dTpa) every 10 years. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/diphtheria\n- **National Immunisation Program (NIP) Schedule**: Provides the funded age-based schedule for pneumococcal and RSV vaccines. — https://www.health.gov.au/topics/immunisation/when-to-get-vaccinated/national-immunisation-program-schedule", "image_path": ""}, {"id": 31107, "date": "2026-03-17T17:41:00+00:00", "source_group": "Dr. Aaru’s AMC General Group", "stem": "A patient presents with a swelling in the midline of the neck that moves with swallowing. What is the next best investigation?", "options": "A. TSH\nB. Ultrasound\nC. Fine Needle Aspiration Cytology (FNAC)", "answer": "A. TSH", "explanation": "### ✅ Correct Answer: A. TSH\n\n**Clinical Reasoning:**\n1. **Presentation:** A midline neck swelling that moves with swallowing is classic for a **thyroid swelling** (e.g., goitre, thyroid nodule). The movement is due to the thyroid gland's attachment to the trachea via the pretracheal fascia.\n2. **First-Line Investigation:** According to Australian and international guidelines (e.g., RACGP, American Thyroid Association), the initial investigation for a suspected thyroid nodule or goitre is **thyroid function tests (TFTs)**, specifically starting with **Thyroid Stimulating Hormone (TSH)**.\n3. **Why TSH First?**\n   - **Determines Functional Status:** A suppressed TSH suggests a hyperfunctioning (\"hot\") nodule, which has a very low risk of malignancy and may not require immediate cytological evaluation. Management would focus on controlling hyperthyroidism.\n   - **Guides Further Imaging:** If TSH is normal or elevated, the next step is typically a **thyroid ultrasound** to characterize the nodule's size, features, and to identify any suspicious sonographic patterns (e.g., microcalcifications, hypoechogenicity, irregular margins).\n   - **Sequential Approach:** The standard algorithm is: **Clinical suspicion → TSH → (if TSH normal/low) Ultrasound → (if ultrasound shows suspicious features) FNAC.** Jumping straight to ultrasound or FNAC without checking TSH is not cost-effective and may lead to unnecessary invasive procedures for a hyperfunctioning nodule.\n4. **Answering the Follow-up:** If the option was \"TFT\" instead of \"TSH,\" the answer would remain the same, as TSH is the primary first-line test within a TFT panel.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Ultrasound**: While thyroid ultrasound is a crucial subsequent investigation, it is not the *first* test. Performing an ultrasound before checking TSH is not aligned with the stepwise diagnostic approach. Ultrasound is indicated after an abnormal or normal TSH to guide the need for FNAC.\n- **C. Fine Needle Aspiration Cytology (FNAC)**: FNAC is a diagnostic, not a screening, test. It is indicated based on specific ultrasound features (size and suspicious characteristics) of a nodule, especially after TSH is found to be normal or elevated. Performing FNAC without prior TSH and ultrasound assessment is inappropriate and invasive.\n\n### 📚 Relevant Guidelines\n- **Royal Australian College of General Practitioners (RACGP) - Neck Lumps**: Recommends initial investigation with TSH for thyroid lumps. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/neck-lumps\n- **American Thyroid Association (ATA) Management Guidelines for Adult Patients with Thyroid Nodules and Differentiated Thyroid Cancer**: Outlines the algorithm starting with serum TSH measurement. — https://www.liebertpub.com/doi/10.1089/thy.2015.0020\n- **Therapeutic Guidelines (eTG) - Thyroid disorders**: Provides a structured approach to investigating thyroid nodules, beginning with thyroid function tests. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 31118, "date": "2026-03-18T01:28:14+00:00", "source_group": "", "stem": "A 45-year-old woman presents with a 2-day history of sudden onset shortness of breath, pleuritic chest pain, and mild haemoptysis. She has no significant past medical history but recently completed a 12-hour flight. On examination, she is tachycardic (HR 110 bpm) and tachypnoeic (RR 24/min), with oxygen saturation of 92% on room air. Chest X-ray is normal. What is the most appropriate initial investigation?", "options": "A. CT pulmonary angiography\nB. Ventilation-perfusion (V/Q) scan\nC. D-dimer test\nD. Lower limb Doppler ultrasound\nE. Echocardiography", "answer": "C. D-dimer test", "explanation": "### ✅ Correct Answer: C.
