phils and eosinophils. This distinguishes it from other pustular conditions like pustular psoriasis or infectious pustulosis.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Immunofluorescence of lesion**: Direct immunofluorescence (DIF) is primarily used to diagnose autoimmune blistering diseases (e.g., pemphigus vulgaris, bullous pemphigoid) by detecting antibody deposits in the skin. It is not diagnostic for drug reactions like AGEP.\n- **C. Blood culture**: Blood cultures are essential for diagnosing bacteremia/sepsis. While this patient is immunocompromised and has pneumonia, the new pustular rash is temporally linked to a drug, not the infection. The pustules in AGEP are sterile, so blood cultures would not reveal the cause of the rash.\n- **D. Marrow biopsy**: A bone marrow biopsy is used for diagnosing and staging hematological malignancies (like his known conditions) or investigating cytopenias. It is not helpful for diagnosing a cutaneous drug eruption.\n\n### 📚 Relevant Guidelines\n- **UpToDate – Acute generalized exanthematous pustulosis (AGEP)**: Details the clinical presentation, diagnosis (emphasizing skin biopsy), and management of AGEP. — https://www.uptodate.com/contents/acute-generalized-exanthematous-pustulosis-agep\n- **Therapeutic Guidelines: Dermatology (eTG)**: Covers the approach to severe cutaneous adverse drug reactions. — https://tgldcdp.tg.org.au/etgAccess\n- **Australasian College of Dermatologists**: Provides resources on the recognition and management of severe drug eruptions. — https://www.dermcoll.edu.au/", "image_path": ""}, {"id": 35276, "date": "2026-03-29T12:03:42+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A patient has hyponatremia. Serum osmolality low, urine osmolality high, urine Na⁺ high. Diagnosis?", "options": "A. SIADH\nB. Dehydration\nC. Heart failure\nD. CKD\nE. Diuretics", "answer": "A", "explanation": "### ✅ Correct Answer: A. SIADH\n\n**Clinical Reasoning:**\n1. **Hyponatremia with Low Serum Osmolality:** This confirms true hypotonic hyponatremia, ruling out pseudohyponatremia (e.g., hyperlipidemia) and hypertonic hyponatremia (e.g., hyperglycemia).\n2. **High Urine Osmolality (>100 mOsm/kg, often >300 mOsm/kg):** The kidneys are inappropriately concentrating urine despite low serum osmolality. This indicates persistent ADH (vasopressin) activity, which should normally be suppressed in hypotonic states.\n3. **High Urine Sodium (>20-30 mmol/L, often >40 mmol/L):** This indicates the kidneys are not conserving sodium appropriately, ruling out hypovolemic states (where the kidneys avidly reabsorb sodium). The patient is effectively euvolemic or mildly hypervolemic from water retention.\n\n**Pathophysiology of SIADH:** Inappropriate, non-suppressible secretion of ADH leads to free water retention, dilutional hyponatremia, and mild volume expansion. This volume expansion triggers natriuresis (increased urine sodium) via atrial natriuretic peptide and suppression of the renin-angiotensin-aldosterone system, despite the low serum sodium.\n\n**Key Diagnostic Features (Bartter-Schwartz Criteria for SIADH):**\n- Hypotonic hyponatremia (Serum Osm <275 mOsm/kg)\n- Inappropriately concentrated urine (UOsm >100 mOsm/kg)\n- Euvolemic clinical status (no edema, no signs of dehydration)\n- Elevated urine sodium (>30 mmol/L) with normal salt and water intake\n- Normal thyroid, adrenal, renal, and cardiac function\n\n**Management Pearls (AMC Focus):** First-line treatment is fluid restriction. Severe or symptomatic cases may require hypertonic saline (3%) with close monitoring. Vaptans (vasopressin receptor antagonists) are second-line. Correct underlying cause (e.g., malignancy, CNS disorder, drugs).\n\n### ❌ Why the Other Options Are Wrong\n- **B. Dehydration (Hypovolemic Hyponatremia):** In dehydration, the body conserves both water *and* sodium. Urine osmolality is high (as ADH is appropriately secreted due to volume depletion), but **urine sodium is LOW (<20 mmol/L)** as the kidneys maximally reabsorb sodium via RAAS activation. The clinical picture would show signs of hypovolemia (tachycardia, dry mucous membranes, low JVP).\n- **C. Heart Failure (Hypervolemic Hyponatremia):** In heart failure, effective arterial blood volume is low, leading to non-osmotic ADH release and RAAS activation. Urine osmolality is high, but **urine sodium is typically LOW (<20 mmol/L)** due to avid sodium reabsorption. The patient presents with signs of fluid overload (edema, elevated JVP, pulmonary crackles).\n- **D. CKD (Chronic Kidney Disease):** Hyponatremia in advanced CKD is due to impaired diluting capacity. However, urine osmolality is often **fixed and low (isosthenuria, ~300 mOsm/kg)** due to loss of renal concentrating *and* diluting ability. Urine sodium can be variable but is not a reliable marker. The diagnosis is evident from elevated creatinine and reduced GFR.\n- **E. Diuretics (especially Thiazides):** Diuretics cause hyponatremia via multiple mechanisms (increased water intake, impaired diluting capacity). Thiazides classically cause **low urine sodium early on** (due to natriuresis) but it can become variable. The key is the **history of diuretic use**. Loop diuretics impair the countercurrent mechanism, often leading to a lower urine osmolality.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Endocrinology (Australia)]**: Management of hyponatremia, including diagnostic approach and treatment of SIADH — https://tgldcdp.tg.org.au/viewTopic?topicfile=hyponatraemia&guidelineName=Endocrinology\n- **[UpToDate: Diagnosis and treatment of hyponatremia]**: Detailed pathophysiology and diagnostic criteria for SIADH and other causes — https://www.uptodate.com/contents/diagnostic-evaluation-of-adults-with-hyponatremia\n- **[European Society of Endocrinology Clinical Practice Guideline]**: Comprehensive guideline on the diagnosis and treatment of hyponatremia — https://www.eje-online.org/content/170/3/G1", "image_path": ""}, {"id": 35292, "date": "2026-03-31T02:32:39+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 45-year-old man presents with a 2-day history of fever, productive cough with green sputum, and pleuritic chest pain. On examination, he is febrile (38.5°C), tachypnoeic (RR 24), and has dullness to percussion and bronchial breathing in the right lower zone. Chest X-ray confirms right lower lobe consolidation. Which organism is the MOST likely cause?", "options": "A. Streptococcus pneumoniae\nB. Haemophilus influenzae\nC. Mycoplasma pneumoniae\nD. Legionella pneumophila\nE. Staphylococcus aureus", "answer": "A. Streptococcus pneumoniae", "explanation": "### ✅ Correct Answer: A. Streptococcus pneumoniae\n\n**Clinical Reasoning:**\n- The patient presents with classic features of **community-acquired pneumonia (CAP)**: acute onset of fever, productive cough, pleuritic pain, and focal chest signs (dullness, bronchial breathing) with CXR confirmation of lobar consolidation.\n- **Streptococcus pneumoniae (pneumococcus)** is the **most common cause of typical CAP** in adults, accounting for 30-50% of cases. Its classic presentation includes:\n  - Sudden onset of rigors, high fever, productive (rusty) sputum, and pleuritic pain.\n  - Lobar consolidation on CXR.\n  - It is a gram-positive diplococcus and the leading bacterial cause of pneumonia worldwide.\n- Management: First-line is amoxicillin (or benzylpenicillin for severe cases) per Australian Therapeutic Guidelines. Macrolide (e.g., azithromycin) is added if atypical cover is needed (e.g., comorbidities, recent travel).\n\n### ❌ Why the Other Options Are Wrong\n- **B. Haemophilus influenzae**: More common in patients with **chronic lung disease (COPD)**, smokers, or the elderly. It typically causes a bronchopneumonia pattern rather than classic lobar consolidation.\n- **C. Mycoplasma pneumoniae**: An **atypical** pathogen causing \"walking pneumonia.\" Presents with **gradual onset**, dry cough, headache, myalgia, and often **extrapulmonary features** (e.g., rash, arthralgia). CXR may show patchy interstitial infiltrates, not dense lobar consolidation.\n- **D. Legionella pneumophila**: Associated with **atypical CAP**, often with **severe symptoms**, high fever, GI symptoms (diarrhoea), hyponatraemia, and elevated LFTs. More common in **outbreaks** (e.g., air-conditioning systems). Not the most common cause in a typical presentation.\n- **E. Staphylococcus aureus**: Typically causes **hospital-acquired or ventilator-associated pneumonia**. In the community, it's rare and associated with **influenza complications**, IV drug use, or endocarditis. Presents with rapid progression, cavitation on CXR.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Antibiotic (eTG)**]: Community-acquired pneumonia in adults — Provides Australian recommendations for diagnosis and empirical antibiotic therapy. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etgge\n- **[RACGP: Management of community-acquired pneumonia]** — Australian primary care guideline covering assessment, severity scoring, and treatment. — https://www.racgp.org.au/afp/2017/june/community-acquired-pneumonia\n- **[British Thoracic Society (BTS) Guidelines for CAP]** — International reference for diagnosis and management. — https://www.brit-thoracic.org.uk/quality-improvement/guidelines/cap/", "image_path": "photo_2026-03-31_02-32-39 (1).jpg"}, {"id": 35302, "date": "2026-03-31T12:33:51+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 60-year-old woman with a history of hypertension and type 2 diabetes presents with acute onset of severe, tearing chest pain radiating to the back. On examination, she is diaphoretic, hypertensive (BP 190/110 mmHg), and has a diastolic murmur heard best at the right sternal border. ECG shows sinus tachycardia with no ischaemic changes. What is the MOST appropriate initial imaging modality?", "options": "A. Transthoracic echocardiogram (TTE)\nB. CT pulmonary angiography (CTPA)\nC. MRI aorta\nD. CT aorta with contrast (CT aortogram)\nE. Coronary angiography", "answer": "D. CT aorta with contrast (CT aortogram)", "explanation": "### ✅ Correct Answer: D. CT aorta with contrast (CT aortogram)\n\n**Clinical Reasoning:**\n- The presentation is classic for **acute aortic dissection**: severe tearing chest pain radiating to the back, hypertension, and a diastolic murmur (suggesting aortic regurgitation from proximal dissection involving the aortic root).\n- **CT aortogram (contrast-enhanced CT of the aorta)** is the **first-line imaging modality** for suspected acute aortic dissection in the emergency setting because:\n  - It is **rapid, widely available, and highly sensitive/specific** (>95%).\n  - It can classify the dissection (Stanford A/B), identify the entry tear, assess involvement of major branches, and detect complications (e.g., pericardial effusion, mediastinal haematoma).\n  - It is superior to TTE for visualising the entire aorta.\n- Immediate management includes **aggressive blood pressure control** (IV beta-blocker + vasodilator like sodium nitroprusside) to reduce shear stress, followed by urgent cardiothoracic surgery consult for Type A dissections.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Transthoracic echocardiogram (TTE)**: Useful for **bedside assessment** if the patient is unstable, to detect complications like aortic regurgitation, pericardial effusion, or proximal dissection. However, it has **limited sensitivity** for distal aortic segments and is **not the definitive first-line** imaging for stable patients.\n- **B. CT pulmonary angiography (CTPA)**: Used to rule out **pulmonary embolism**, which can present with pleuritic chest pain and dyspnoea but not typically tearing pain radiating to the back or a diastolic murmur.\n- **C. MRI aorta**: Highly accurate for aortic dissection but **not appropriate in the acute setting** due to longer scan time, limited availability, and difficulty monitoring unstable patients. It is reserved for **stable, chronic dissections** or follow-up.\n- **E. Coronary angiography**: Invasive and used to diagnose **acute coronary syndromes**. While aortic dissection can cause coronary artery involvement (especially right coronary), angiography is **not the initial test** and may delay definitive diagnosis and management.\n\n### 📚 Relevant Guidelines\n- **[ESC Guidelines on Aortic Diseases]** — Comprehensive European guidelines covering diagnosis and management of aortic dissection, including imaging recommendations. — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Aortic-Diseases\n- **[American Heart Association (AHA) Scientific Statement on Aortic Dissection]** — Detailed review of diagnostic algorithms and acute management. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000475\n- **[Radiology Across Borders: Aortic Dissection Imaging]** — Australian-focused resource on appropriate imaging selection. — https://www.radiologyacrossborders.org/diagnostic_imaging/aortic_dissection/", "image_path": "photo_2026-03-31_12-33-51 (1).jpg"}, {"id": 35307, "date": "2026-04-01T03:17:53+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Woman in her 20s presents 4 months after a vaginal delivery with heavy vaginal bleeding for the past 3 months. Her menstrual periods were previously normal. She had a (Mirena) inserted at 6-week postpartum. No fever, pelvic pain, dyspareunia or offensive vaginal discharge. General examination and bimanual pelvic examination are normal. Speculum examination (Cervical picture was given) swollen, redden cervica Os with 5 o’clock position laceration. What is the most likely diagnosis?", "options": "A. Physiological cervical change after childbirth\nB. Cervical cancer\nC. Expulsion of intrauterine device\nD. Cervicitis\nE. Cervical ectropion", "answer": "C. Expulsion of intrauterine device", "explanation": "### ✅ Correct Answer: C. Expulsion of intrauterine device\n\n**Clinical Reasoning:**\n1. **Timeline & Presentation:** The patient presents with heavy vaginal bleeding starting 1 month after Mirena insertion (inserted at 6 weeks postpartum, bleeding for 3 months, presentation at 4 months postpartum). This pattern suggests a complication related to the IUD rather than normal postpartum changes or infection.\n2. **Key Examination Finding:** The speculum exam reveals a \"swollen, redden cervica Os with 5 o’clock position laceration.\" This is highly suggestive of partial expulsion or malposition of the IUD. The IUD stem can erode or irritate the cervical canal, causing inflammation, bleeding, and the appearance of a \"laceration\" at the os.\n3. **Absence of Infectious Symptoms:** No fever, pelvic pain, dyspareunia, or offensive discharge makes cervicitis less likely.\n4. **Postpartum IUD Considerations:** IUD expulsion rates are higher in postpartum women, especially if inserted before complete uterine involution (6-8 weeks). The described cervical findings are classic for an IUD stem protruding through the os.\n5. **Management Implication:** This requires speculum examination to visualize the IUD strings or stem, potentially removal, and consideration of alternative contraception.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Physiological cervical change after childbirth:** While cervical changes (ectropion, laceration) can occur postpartum, they typically present earlier and are not associated with heavy bleeding starting one month after IUD insertion. The timing and specific finding of a swollen os with laceration point to a foreign body effect.\n- **B. Cervical cancer:** Highly unlikely in a woman in her 20s without risk factors. Cervical cancer typically presents with contact bleeding, irregular bleeding, or discharge, but the acute onset post-IUD and the specific cervical finding are more indicative of IUD-related trauma.\n- **D. Cervicitis:** Usually presents with mucopurulent discharge, cervical friability, and possibly pelvic pain or dyspareunia. The absence of discharge, fever, and pain, plus the clear temporal relationship to IUD insertion, makes this less likely.\n- **E. Cervical ectropion:** A common, benign condition where columnar epithelium is visible on the ectocervix. It can cause postcoital or intermenstrual spotting but not typically heavy bleeding for 3 months. It also doesn't explain the \"laceration\" finding.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Long-acting reversible contraception**: Covers IUD insertion, complications (including expulsion and perforation), and management — https://ranzcog.edu.au/womens-health/guidelines/long-acting-reversible-contraception\n- **Therapeutic Guidelines (eTG) - Contraception**: Provides evidence-based recommendations on IUD use, complications, and differential diagnosis for abnormal bleeding — https://tgldcdp.tg.org.au/viewTopic?topicfile=contraception\n- **Faculty of Sexual & Reproductive Healthcare (FSRH) - Intrauterine contraception**: Detailed guidance on IUD expulsion rates, clinical features, and management (UK guideline, widely referenced) — https://www.fsrh.org/standards-and-guidance/documents/ceu-clinical-guidance-intrauterine-contraception/", "image_path": ""}, {"id": 35317, "date": "2026-04-01T12:38:40+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Vertigo, tinnitus, sensory neural hearing loss, no h/o of URTI, nystagmus on look at right and left, right eye Horner syndrome. What is the most likely diagnosis?", "options": "1. Acoustic neuroma\n2. Labyrinthitis\n3. Middle ear infection\n4. Basilar infarct", "answer": "4. Basilar infarct", "explanation": "### ✅ Correct Answer: 4. Basilar infarct\n\n**Clinical Reasoning:**\n1. **Constellation of Brainstem Signs:** The combination of vertigo, tinnitus, and sensorineural hearing loss points to involvement of the vestibulocochlear nerve (CN VIII). However, the presence of **right eye Horner syndrome** (ptosis, miosis, anhidrosis) indicates concurrent involvement of the sympathetic pathway, which travels through the brainstem (lateral medulla). This localizes the lesion to the lateral medulla or pons.\n2. **Nystagmus Pattern:** Nystagmus on looking both right and left suggests a central (brainstem/cerebellar) cause rather than a peripheral vestibular disorder. Peripheral nystagmus is typically horizontal/torsional and fatigable, with a fast phase away from the affected side.\n3. **Absence of URTI:** Makes acute labyrinthitis (typically post-viral) less likely.\n4. **Acoustic Neuroma Exclusion:** While acoustic neuroma (vestibular schwannoma) can cause unilateral sensorineural hearing loss, tinnitus, and vertigo, it does NOT cause Horner syndrome. Horner syndrome occurs with lesions affecting the sympathetic chain in the neck or brainstem, not the cerebellopontine angle where acoustic neuromas are found.\n5. **Middle Ear Infection Exclusion:** This typically causes conductive hearing loss, not sensorineural, and would not cause Horner syndrome.\n6. **Final Diagnosis - Lateral Medullary Syndrome (Wallenberg Syndrome):** This is a classic presentation of a posterior circulation stroke (often vertebral or posterior inferior cerebellar artery occlusion) affecting the lateral medulla. Key features include:\n   - Ipsilateral Horner syndrome (damage to descending sympathetic fibers)\n   - Ipsilateral ataxia (inferior cerebellar peduncle)\n   - Vertigo, nausea, nystagmus (vestibular nuclei)\n   - Ipsilateral facial sensory loss & contralateral body sensory loss (spinothalamic tract)\n   - Hoarseness, dysphagia (nucleus ambiguus)\n   - Ipsilateral facial palsy (rare)\n   The presence of Horner syndrome with audiovestibular symptoms is highly specific for this brainstem infarct.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Acoustic neuroma:** Presents with progressive unilateral sensorineural hearing loss, tinnitus, and vertigo due to compression of CN VIII at the cerebellopontine angle. It does not involve the sympathetic pathway, so Horner syndrome is not a feature. MRI would show a enhancing mass in the internal acoustic meatus.\n- **2. Labyrinthitis:** An inflammatory condition of the inner ear, usually viral. Presents with acute severe vertigo, nausea, vomiting, nystagmus, and possibly hearing loss/tinnitus. It is a peripheral disorder and does not involve the brainstem, so Horner syndrome and bidirectional nystagmus are not present.\n- **3. Middle ear infection (Otitis media):** Causes conductive hearing loss, ear pain, and possibly fever. Vertigo is uncommon unless complicated by labyrinthitis. It does not cause sensorineural hearing loss, Horner syndrome, or central pattern nystagmus.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation Australia - Clinical Guidelines for Stroke Management**: Provides diagnostic criteria and urgent management for posterior circulation stroke, including lateral medullary syndrome — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **National Institute for Health and Care Excellence (NICE) - Stroke and transient ischaemic attack in over 16s: diagnosis and initial management**: Covers recognition of posterior circulation stroke symptoms — https://www.nice.org.uk/guidance/ng128\n- **UpToDate - Lateral medullary syndrome (Wallenberg syndrome)**: Detailed pathophysiology, clinical features, and etiology — https://www.uptodate.com/contents/lateral-medullary-syndrome-wallenberg-syndrome", "image_path": ""}]; // To be populated via script injection

        let state = {
            currentGroup: null,
            allQuestions: [],
            filteredQuestions: [],
            currentIndex: 0
        };

        // Initialize App
        function init() {
            if (questionsData.length === 0) return;
            
            // Populate stats on landing page
            updateLandingStats();
            
            // Check if there was a previous session
            const lastGroup = localStorage.getItem('amc_last_group');
            if (lastGroup) {
                // We keep them on home page but allow quick resume
                console.log("Welcome back. Previous session in:", lastGroup);
            }
        }

        function updateLandingStats() {
            const jayseCount = questionsData.filter(q => q.source_group === 'AMC Part 1 general discussion by Dr Jayse').length;
            const aaruCount = questionsData.filter(q => q.source_group === 'Dr. Aaru’s AMC General Group').length;
            const otherCount = questionsData.length - jayseCount - aaruCount;

            document.getElementById('stats-jayse').innerText = `${jayseCount} Questions Available`;
            document.getElementById('stats-aaru').innerText = `${aaruCount} Questions Available`;
        }

        function selectGroup(groupName) {
            state.currentGroup = groupName;
            state.filteredQuestions = questionsData.filter(q => q.source_group === groupName);
            
            if (state.filteredQuestions.length === 0) {
                // Fallback for untagged if needed, or error
                if (groupName === 'Other') {
                    state.filteredQuestions = questionsData.filter(q => !q.source_group || (q.source_group !== 'AMC Part 1 general discussion by Dr Jayse' && q.source_group !== 'Dr. Aaru’s AMC General Group'));
                } else {
                    alert("No questions found for this group.");
                    return;
                }
            }

            // Restore progress
            const savedIndex = localStorage.getItem(`amc_progress_${groupName}`);
            state.currentIndex = savedIndex ? parseInt(savedIndex) : 0;
            if (state.currentIndex >= state.filteredQuestions.length) state.currentIndex = 0;

            localStorage.setItem('amc_last_group', groupName);
            
            showStudyView();
            renderQuestion();
        }

        function goHome() {
            document.getElementById('group-selection-view').classList.remove('hidden');
            document.getElementById('study-view').classList.add('hidden');
            document.getElementById('nav-dock').classList.add('hidden');
            state.currentGroup = null;
        }

        function showStudyView() {
            document.getElementById('group-selection-view').classList.add('hidden');
            document.getElementById('study-view').classList.remove('hidden');
            document.getElementById('nav-dock').classList.remove('hidden');
            document.getElementById('group-title-display').innerText = state.currentGroup === 'AMC Part 1 general discussion by Dr Jayse' ? 'Dr Jayse Recalls' : 'Dr. Aaru Recalls';
        }

        function renderQuestion() {
            const question = state.filteredQuestions[state.currentIndex];
            if (!question) return;

            // Reset UI
            document.getElementById('explanation-container').classList.add('hidden');
            document.getElementById('options-container').innerHTML = '';
            
            // Stem
            document.getElementById('question-stem').innerText = question.stem;
            
            // Image
            const imgContainer = document.getElementById('question-image-container');
            if (question.image_path) {
                document.getElementById('question-image').src = 'downloads/' + question.image_path;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            // Date Badge
            const dateBadge = document.getElementById('question-date-badge');
            if (question.date) {
                const dateObj = new Date(question.date);
                const formattedDate = dateObj.toLocaleDateString('en-AU', { 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
                dateBadge.innerText = `RECALL DATE: ${formattedDate}`;
                dateBadge.classList.remove('hidden');
            } else {
                dateBadge.classList.add('hidden');
            }

            // Options
            const options = parseOptions(question.options);
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-button w-full text-left p-6 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all font-light text-slate-200';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, question.answer, question.explanation);
                document.getElementById('options-container').appendChild(btn);
            });

            // Update Progress
            updateProgressUI();
            
            // Auto-save index
            localStorage.setItem(`amc_progress_${state.currentGroup}`, state.currentIndex);
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function parseOptions(optionsRaw) {
            if (!optionsRaw) return [];
            if (Array.isArray(optionsRaw)) return optionsRaw;
            // Split by newline if it's a string, or common delimiters
            return optionsRaw.split(/\n|(?=[A-E]\.\s|a-e\.\s)/).map(s => s.trim()).filter(s => s.length > 0);
        }

        function checkAnswer(button, selected, correct, explanation) {
            // Simple string matching for answer
            // Handles cases like "A. Text" vs "A" or "Text"
            const isCorrect = selected.trim() === correct.trim() || 
                              selected.startsWith(correct + ".") || 
                              correct.startsWith(selected.charAt(0) + ".");

            // Visual Feedback
            const allButtons = document.querySelectorAll('.option-button');
            allButtons.forEach(btn => {
                btn.disabled = true;
                if (btn.innerText.trim() === correct.trim() || btn.innerText.startsWith(correct + ".")) {
                    btn.classList.add('answer-correct');
                }
            });

            if (!isCorrect) {
                button.classList.add('answer-wrong');
            }

            // Display Explanation
            const expText = document.getElementById('explanation-text');
            expText.innerHTML = formatExplanation(explanation);
            document.getElementById('explanation-container').classList.remove('hidden');
            
            // Auto-scroll to explanation after a short delay
            setTimeout(() => {
                document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 300);
        }

        function formatExplanation(text) {
            if (!text) return "No explanation available.";
            // Simple markdown-to-html conversion for the specific format used by the processor
            return text
                .replace(/### (.*?)\n/g, '<h4 class="text-blue-400 font-bold text-lg mt-6 mb-2">$1</h4>')
                .replace(/\*\* (.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/- \*\*(.*?)\*\*/g, '<li class="ml-4 mb-2"><strong>$1</strong>')
                .replace(/(\r\n|\n|\r)/gm, '<br>');
        }

        function updateProgressUI() {
            const total = state.filteredQuestions.length;
            const current = state.currentIndex + 1;
            const percent = Math.round((current / total) * 100);

            document.getElementById('current-index').innerText = current;
            document.getElementById('total-count').innerText = total;
            document.getElementById('progress-percent').innerText = percent + '%';
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        function changeQuestion(step) {
            state.currentIndex += step;
            if (state.currentIndex < 0) state.currentIndex = 0;
            if (state.currentIndex >= state.filteredQuestions.length) {
                state.currentIndex = state.filteredQuestions.length - 1;
                alert("You've completed all questions in this group! Well done.");
            } else {
                renderQuestion();
            }
        }

        // Handle Keyboard Nav
        document.addEventListener('keydown', (e) => {
            if (state.currentGroup) {
                if (e.key === 'ArrowRight') changeQuestion(1);
                if (e.key === 'ArrowLeft') changeQuestion(-1);
            }
        });

        // Run Init
        window.onload = init;
    </script>
</body>

</html>
