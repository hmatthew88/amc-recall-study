that can induce haemolysis in G6PD-deficient individuals. — https://www.uptodate.com/contents/diagnosis-and-management-of-glucose-6-phosphate-dehydrogenase-deficiency\n- **[WHO - Glucose-6-phosphate dehydrogenase deficiency]** — A global health perspective on the condition, including common precipitants. — https://www.who.int/news-room/fact-sheets/detail/glucose-6-phosphate-dehydrogenase-deficiency", "image_path": ""}, {"id": 34669, "date": "2026-02-20T23:29:39+00:00", "stem": "A 64‑year‑old woman presents with progressive numbness and tingling in her feet and difficulty walking. She also reports fatigue. She has no history of alcohol misuse. Examination shows pallor, a broad‑based gait and impaired vibration sense in the lower limbs.\n\nInvestigations:\n\n• Hb: 82 g/L (115–155)\n\n• MCV: 112 fL (80–96)\n\n• Peripheral blood film: macro‑ovalocytes and hypersegmented neutrophils\n\n• Serum vitamin B₁₂: markedly low\n\n• Serum folate: normal\n\nWhat is the most appropriate initial treatment?", "options": "A. Oral folic acid\nB. Intramuscular hydroxocobalamin\nC. Oral vitamin B₁₂ tablets alone\nD. Red blood cell transfusion only", "answer": "B", "explanation": "### ✅ Correct Answer: B. Intramuscular hydroxocobalamin\n\nThis patient has a **severe vitamin B12 (cobalamin) deficiency** manifesting as both haematological (macrocytic anaemia with MCV 112 fL, macro-ovalocytes, hypersegmented neutrophils) and **neurological complications** (subacute combined degeneration of the cord: numbness, tingling, broad-based gait, impaired vibration sense). The presence of neurological symptoms is a key determinant of treatment. **Intramuscular (IM) hydroxocobalamin** is the standard initial treatment for severe B12 deficiency, especially with neurological involvement, because it ensures reliable and rapid repletion regardless of the underlying cause (e.g., pernicious anaemia with intrinsic factor deficiency or malabsorption). Oral B12 is not first-line in this scenario due to potential malabsorption and the need for certainty in correcting a severe, symptomatic deficiency.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Oral folic acid**: This is **contraindicated** as initial monotherapy. While folate can correct the anaemia of B12 deficiency, it will **exacerbate or fail to halt the neurological deterioration**. Administering folate without B12 can \"mask\" the anaemia while allowing irreversible neurological damage to progress.\n- **C. Oral vitamin B₁₂ tablets alone**: High-dose oral B12 can be effective for some causes of deficiency, but it is **not the first-line choice for a patient with severe neurological symptoms**. IM therapy guarantees absorption, which is critical when rapid correction is needed to prevent permanent neurological damage. Oral therapy is typically reserved for maintenance or mild, asymptomatic cases after initial IM loading.\n- **D. Red blood cell transfusion only**: Transfusion is **rarely indicated** in chronic, stable macrocytic anaemia, even with an Hb of 82 g/L. The patient is fatigued but not described as haemodynamically unstable. The definitive treatment is B12 replacement, which will correct the anaemia over weeks. Transfusion carries risks and does not address the underlying deficiency or the neurological pathology.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Vitamin B12 and folate deficiency]** — States that for neurological involvement due to B12 deficiency, initial treatment is with intramuscular hydroxocobalamin. — https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia-vitamin-b12-folate\n- **[British Society for Haematology - Guidelines for the diagnosis and treatment of cobalamin and folate disorders]** — Recommends intramuscular hydroxocobalamin as first-line treatment for patients with neurological involvement. — https://b-s-h.org.uk/guidelines/guidelines/diagnosis-and-treatment-of-cobalamin-and-folate-disorders/\n- **[UpToDate - Treatment of vitamin B12 and folate deficiencies]** — Details treatment regimens, emphasising parenteral therapy for severe deficiency or neurological symptoms. — https://www.uptodate.com/contents/treatment-of-vitamin-b12-and-folate-deficiencies", "image_path": ""}, {"id": 34695, "date": "2026-02-21T05:45:57+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** accompanied by **haemodynamic instability** (hypotension and tachycardia). In acute bleeding, the haemoglobin level is a poor indicator of the severity of blood loss in the initial stages, as haemodilution has not yet occurred. The priority is to restore circulating volume and oxygen-carrying capacity to prevent end-organ damage (e.g., myocardial infarction, acute kidney injury) and death. Transfusion in this context is guided by clinical signs of shock and active bleeding, not just the Hb number. For a patient with active bleeding and hypotension, immediate transfusion is a critical resuscitative measure alongside endoscopic or surgical intervention to control the bleed.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is a case of **chronic, stable anaemia**. The patient is haemodynamically stable and asymptomatic. The first-line management is oral iron supplementation and investigation/treatment of the underlying cause (menorrhagia). Transfusion is rarely indicated in chronic, stable iron deficiency anaemia and carries risks (e.g., transfusion reactions, iron overload).\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: Although this patient has ischaemic heart disease (a comorbidity that may lower the transfusion threshold), he is **asymptomatic at rest** with a chronic anaemia. Guidelines typically recommend transfusion for symptomatic anaemia or for acute coronary syndromes with Hb < 80 g/L or Hct < 0.24. In stable chronic anaemia, the focus should be on diagnosing the cause (e.g., anaemia of chronic disease, renal impairment) rather than immediate transfusion.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This represents a **postpartum anaemia**, likely due to blood loss at delivery. The patient is described as \"well\" and caring for her infant, indicating she is **haemodynamically stable and asymptomatic**. Postpartum anaemia is common and is typically managed with oral iron therapy if symptomatic. Transfusion is reserved for severe, symptomatic anaemia or ongoing bleeding.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: A Hb of 95 g/L is only **mildly low**. Fatigue is a common side effect of chemotherapy and may not be solely due to anaemia. Transfusion thresholds in oncology are typically lower (e.g., Hb < 80 g/L in asymptomatic patients, or < 100 g/L if symptomatic with cardiovascular disease). Mild fatigue alone does not warrant immediate transfusion.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority (Australia) - Patient Blood Management Guidelines](https://www.blood.gov.au/pbm-guidelines)**: Module 2 - Perioperative and Module 3 - Medical. These provide evidence-based recommendations on when to transfuse red blood cells, emphasising a restrictive strategy (transfuse when Hb < 70 g/L in stable patients, or < 80 g/L in patients with cardiovascular disease or active bleeding).\n- **[Therapeutic Guidelines (Australia) - Blood and blood products](https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-blood-products&guidelineName=Blood%20and%20blood%20products)**: Provides concise clinical advice on transfusion triggers, including for acute haemorrhage and chronic anaemia.\n- **[Choosing Wisely Australia - Recommendations on red blood cell transfusion](https://www.choosingwisely.org.au/recommendations/racp)**: Advocates against transfusion for stable, chronic anaemia without symptoms, promoting a more restrictive transfusion practice.", "image_path": ""}, {"id": 34696, "date": "2026-02-21T05:46:03+00:00", "stem": "A 68‑year‑old woman with long‑standing rheumatoid arthritis presents for review. She feels more tired than usual. There is no history of overt bleeding.\n\nInvestigations:\n\n• Hb: 96 g/L (115–155)\n• MCV: 86 fL (80–96)\n• Serum iron: 6 µmol/L (10–30)\n• Total iron‑binding capacity (TIBC): 30 µmol/L (45–72)\n• Ferritin: 400 µg/L (30–300)\n• CRP: elevated\n\nWhat is the most likely cause of her anaemia?", "options": "A. Iron deficiency anaemia\nB. Anaemia of chronic disease\nC. Vitamin B₁₂ deficiency\nD. Autoimmune haemolytic anaemia\nE. β‑thalassaemia trait", "answer": "B", "explanation": "### ✅ Correct Answer: B. Anaemia of chronic disease\n\nThe key to this question is interpreting the **iron studies in the context of chronic inflammation**. The patient has long-standing rheumatoid arthritis (a chronic inflammatory condition) and an elevated CRP, confirming active inflammation. The iron profile shows:\n- **Low serum iron** (6 µmol/L)\n- **Low TIBC** (30 µmol/L) – this is characteristic and differentiates it from iron deficiency.\n- **High ferritin** (400 µg/L) – ferritin is an acute phase reactant and is elevated in inflammation, masking any underlying iron deficiency. A ferritin > 100 µg/L in the setting of inflammation generally rules out concomitant iron deficiency.\n- **Normocytic anaemia** (MCV 86 fL) – typical for anaemia of chronic disease (ACD), also known as anaemia of inflammation.\n\n**Pathophysiology**: In chronic inflammation, cytokines (especially interleukin-6) increase hepatic production of hepcidin. Hepcidin blocks iron absorption from the gut and traps iron in macrophages, leading to low serum iron (functional iron deficiency) despite adequate total body iron stores (reflected by the high ferritin). The low TIBC is due to decreased transferrin synthesis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Iron deficiency anaemia**: In true iron deficiency, you would expect **low serum iron, HIGH TIBC** (as the body tries to increase iron transport), and **low ferritin** (the most specific marker). The high ferritin and low TIBC here are incompatible with isolated iron deficiency.\n- **C. Vitamin B₁₂ deficiency**: This causes a **macrocytic** anaemia (high MCV). The MCV here is normal (86 fL). Also, iron studies would not show this specific pattern.\n- **D. Autoimmune haemolytic anaemia**: This would typically show evidence of haemolysis on blood film (spherocytes, reticulocytosis), a positive direct Coombs test, and often an elevated bilirubin/LDH. The iron studies here are not suggestive of haemolysis.\n- **E. β‑thalassaemia trait**: This is a microcytic, hypochromic anaemia (low MCV and MCH) with a normal or elevated RBC count. The MCV is normal here (86 fL), and the iron studies show an inflammatory pattern, not the pattern of a haemoglobinopathy.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (Australia) - Anaemia](https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia&guidelineName=Haematology)**: Provides a diagnostic algorithm for anaemia, including the differentiation between iron deficiency anaemia and anaemia of chronic disease.\n- **[UpToDate - Anaemia of chronic disease/anemia of inflammation](https://www.uptodate.com/contents/anemia-of-chronic-disease-anemia-of-inflammation)**: Detailed review of the pathophysiology, diagnosis, and management of ACD.\n- **[RACP - Diagnostic approach to anaemia](https://www.racp.edu.au/news-and-events/news/news-archive/2018/diagnosing-anaemia)**: Offers a structured clinical approach to investigating anaemia, emphasising the importance of interpreting iron studies in context.", "image_path": ""}, {"id": 34805, "date": "2026-02-22T21:34:02+00:00", "stem": "A patient presents with vertical diplopia that worsens when looking down and to the right, and a head tilt to the left. The most probable diagnosis is:", "options": "A. CN 3 Palsy\nB. CN 4 Palsy\nC. CN 6 Palsy\nD. Internuclear ophthalmoplegia", "answer": "B", "explanation": "### ✅ Correct Answer: B. CN 4 Palsy\n\n**Clinical Reasoning:**\n- **Pathophysiology:** The trochlear nerve (CN IV) innervates the superior oblique muscle. Its primary action is intorsion (inward rotation) of the eye. Its secondary actions are depression (especially in adduction) and abduction. A palsy results in weakness of these actions.\n- **Key Diagnostic Features:**\n  1. **Vertical Diplopia:** Classic for CN IV palsy, as the unopposed action of the inferior oblique muscle causes the affected eye to be slightly elevated and extorted.\n  2. **Worsening on Downward Gaze:** The superior oblique is a primary depressor of the adducted eye. Looking down and to the right tests the right superior oblique (which depresses the right eye in adduction). Weakness here causes the image to separate vertically.\n  3. **Head Tilt (Bielschowsky Test):** The patient tilts their head *away* from the affected side to compensate for the extorsion and vertical misalignment. A head tilt to the left suggests a problem with the right superior oblique/CN IV, as tilting left uses the intact right intorters (superior rectus and superior oblique) to align the eyes. If the right CN IV is weak, tilting the head to the left will worsen the vertical deviation, confirming the diagnosis.\n- **Management Pearls:** The most common cause of an isolated CN IV palsy in adults is microvascular (diabetic/hypertensive), which typically resolves spontaneously over weeks to months. Neuroimaging (MRI brain) is indicated if there is trauma, other neurological signs, or no improvement after 3 months.\n\n### ❌ Why the Other Options Are Wrong\n- **A. CN 3 Palsy**: Presents with ptosis, mydriasis (pupil involvement), and an eye that is \"down and out\" due to unopposed action of LR (CN VI) and SO (CN IV). Diplopia is typically horizontal and vertical, not isolated to downward gaze. Head tilt is not a classic compensatory mechanism.\n- **C. CN 6 Palsy**: Causes isolated horizontal diplopia, worse on lateral gaze to the side of the lesion, due to weakness of the lateral rectus muscle. The eye is esotropic (turned inward) at rest. It does not cause vertical diplopia or a characteristic head tilt.\n- **D. Internuclear ophthalmoplegia (INO)**: Caused by a lesion in the medial longitudinal fasciculus (MLF). The hallmark is impaired adduction of the ipsilateral eye on horizontal gaze, with nystagmus in the abducting contralateral eye. Vertical eye movements and diplopia in downward gaze are not the primary features. A head tilt is not typical.\n\n### 📚 Relevant Guidelines\n- **[American Academy of Neurology (AAN) - Practice Parameter: The isolated ocular motor nerve palsy]**: Provides evidence-based recommendations on the evaluation and management of isolated cranial nerve palsies, including when neuroimaging is indicated. — https://www.neurology.org/doi/10.1212/WNL.56.11.1564\n- **[UpToDate - Trochlear nerve (fourth cranial nerve) palsy]**: Comprehensive review of etiology, clinical features, diagnostic approach, and management. — https://www.uptodate.com/contents/trochlear-nerve-fourth-cranial-nerve-palsy\n- **[Therapeutic Guidelines (eTG) - Neurology]**: Australian resource for the general management of neurological presentations, including cranial nerve palsies. — https://tgldcdp.tg.org.au/", "image_path": ""}, {"id": 34856, "date": "2026-03-03T13:30:02+00:00", "stem": "A lady admitted for appendicectomy 3 days ago. She got catheterization for urinary problem and catheter out 1 day ago. She is about to discharge today and her urine C&S E.coli x 10 power 5. How Mx?\n1) Discharge\n2) Don’t discharge\n3) Urine culture and microscope\n4) Give Trimethoprim and discharge", "options": "Discharge\nDon’t discharge\nUrine culture and microscope\nGive Trimethoprim and discharge", "answer": "4) Give Trimethoprim and discharge", "explanation": "### ✅ Correct Answer: 4. Give Trimethoprim and discharge\nThis patient has **asymptomatic bacteriuria (ASB)** in the context of recent urinary catheterization post-appendicectomy. ASB is defined as ≥10⁵ colony-forming units (CFU)/mL of a single uropathogen in a properly collected urine specimen from a person without signs or symptoms of urinary tract infection. However, in this specific post-operative, post-catheter scenario, treatment is indicated to prevent potential complications. The patient is asymptomatic (no dysuria, fever, flank pain) and ready for discharge. According to Australian guidelines, ASB should generally NOT be treated in non-pregnant, healthy adults. However, an exception is made for patients who have undergone recent urologic procedures where mucosal bleeding is expected (e.g., catheterization, cystoscopy). Treating with a short course of antibiotics like trimethoprim (a first-line agent for uncomplicated UTIs in Australia, assuming no allergies and local resistance patterns are favorable) is appropriate to prevent seeding of bacteria into the bloodstream or causing a clinical UTI post-discharge. The key is that she is otherwise well for discharge; treating and discharging is the most appropriate management to prevent readmission.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Discharge**: Discharging without treatment is incorrect because, although this is classic asymptomatic bacteriuria, the recent urinary catheterization is a modifying factor. Catheter-associated bacteriuria has a high risk of progressing to symptomatic infection or bacteremia if left untreated, especially in the immediate post-removal period. Discharging without treatment could lead to a symptomatic UTI or sepsis at home, requiring readmission.\n- **2. Don’t discharge**: Keeping her in hospital is unnecessary and not cost-effective. She has no systemic signs of infection (no fever, hemodynamically stable) and is otherwise recovering well from her appendicectomy. Hospital admission is reserved for symptomatic UTIs with systemic illness, pyelonephritis, or sepsis.\n- **3. Urine culture and microscope**: The urine culture and sensitivity (C&S) result is already available (E. coli >10⁵). Repeating the culture or doing microscopy at this point is redundant and does not change management. Microscopy would likely show pyuria and bacteria, confirming the culture result, but it does not provide additional actionable information. The decision to treat is based on the clinical context and the existing positive culture.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Antibiotic (eTG)**: Provides clear guidance on the management of asymptomatic bacteriuria and catheter-associated UTIs, including when treatment is indicated. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etgge\n- **Choosing Wisely Australia**: Recommends against treating asymptomatic bacteriuria in non-pregnant adults without specific risk factors, helping to define the general rule to which this case is an exception. — https://www.choosingwisely.org.au/recommendations/racgp\n- **Infection Control Guidelines (Australian Commission on Safety and Quality in Health Care)**: Includes recommendations for the management of catheter-associated urinary tract infections (CAUTI). — https://www.safetyandquality.gov.au/our-work/infection-prevention-and-control", "image_path": ""}, {"id": 34857, "date": "2026-03-03T13:31:07+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "Ondansetron\nMethylprednisolone\nFolic acid\nPotassium chloride\nThiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\nThis patient has **hyperemesis gravidarum (HG)**, a severe form of nausea and vomiting in pregnancy leading to weight loss (>5% of pre-pregnancy weight), dehydration, ketonuria, and electrolyte imbalances (metabolic alkalosis from loss of gastric acid). She requires hospital admission, IV rehydration, and antiemetics. A critical step in management, especially before administering **dextrose (glucose)**, is the administration of **thiamine (Vitamin B1)**. In states of chronic malnutrition and starvation (as seen in HG), thiamine stores are depleted. Administering a dextrose infusion without prior thiamine can precipitate **Wernicke's encephalopathy**, a acute neurological emergency caused by thiamine deficiency. Glucose metabolism requires thiamine as a cofactor; giving glucose increases metabolic demand and can rapidly consume the remaining thiamine, leading to confusion, ataxia, ophthalmoplegia, and permanent neurological damage. Therefore, thiamine (typically 100-300 mg IV) must be given BEFORE or concurrently with dextrose-containing fluids in any patient at risk of thiamine deficiency (chronic alcoholism, malnutrition, hyperemesis, prolonged vomiting).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: Ondansetron is a first-line antiemetic for HG and is often used. However, it has already been administered (the stem mentions diphenhydramine was given, implying other antiemetics are part of the regimen). The question specifically asks what is needed **immediately prior to dextrose infusion** for metabolic safety, not for further symptomatic control.\n- **B. Methylprednisolone**: Corticosteroids (e.g., methylprednisolone or prednisolone) are considered a **third-line** therapy for refractory HG after failure of first- and second-line antiemetics. They are not administered as an urgent measure prior to dextrose. Their use is also cautious in the first trimester due to a small potential risk of cleft palate.\n- **C. Folic acid**: Folic acid supplementation (400-500 mcg daily) is crucial in early pregnancy to prevent neural tube defects and is part of routine prenatal care. However, it is not an urgent requirement before dextrose infusion. It does not prevent Wernicke's encephalopathy.\n- **D. Potassium chloride**: Patients with HG and prolonged vomiting often have **hypokalemia** due to renal losses from metabolic alkalosis and poor intake. Potassium replacement is important and should be added to IV fluids **after** rehydration has established adequate urine output and serum potassium levels are known. However, it is not the **immediate** priority before dextrose to prevent a specific neurological complication. Thiamine takes precedence.\n\n### 📚 Relevant Guidelines\n- **RANZCOG (Royal Australian and New Zealand College of Obstetricians and Gynaecologists) Guideline: Management of Nausea and Vomiting in Pregnancy and Hyperemesis Gravidarum**: Explicitly recommends thiamine supplementation (oral or IV) for women admitted with HG, especially before dextrose infusion, to prevent Wernicke’s encephalopathy. — https://ranzcog.edu.au/womens-health/guidelines\n- **Therapeutic Guidelines: Endocrinology (eTG)**: Provides guidance on the management of nutritional deficiencies, including thiamine replacement in at-risk patients. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Endocrinology&frompage=etgge\n- **UpToDate: Hyperemesis Gravidarum**: Details the pathophysiology, management, and emphasizes the critical importance of thiamine repletion prior to carbohydrate loading. — https://www.uptodate.com/contents/hyperemesis-gravidarum", "image_path": ""}, {"id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 29-year-old woman has a cervical screening test showing **HPV 16 detected** with negative cytology. She is asymptomatic.\nWhat is the most appropriate next step?", "options": "a. Repeat HPV test in 12 months\nb. Refer for colposcopy\nc. Repeat cytology in 6 weeks\nd. Return to routine 5-year screening\ne. Perform excisional biopsy", "answer": "b", "explanation": "### ✅ Correct Answer: b. Refer for colposcopy\nHPV 16 is a high-risk oncogenic genotype with the strongest association with cervical cancer development. The Australian National Cervical Screening Program (NCSP) guidelines mandate immediate referral for colposcopy when HPV 16 or 18 is detected, irrespective of cytology results. This is because these genotypes carry a high risk of underlying high-grade cervical intraepithelial neoplasia (CIN2/3) or cancer, even when the cytology appears normal. The rationale is to allow for direct visualisation and biopsy of the transformation zone to identify and treat pre-cancerous lesions early, preventing progression to invasive carcinoma.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Repeat HPV test in 12 months**: This is the recommended pathway for women with a positive test for *non-16/18* HPV types and negative cytology, allowing time for viral clearance. It is not appropriate for HPV 16 due to its high oncogenic risk.\n- **c. Repeat cytology in 6 weeks**: This is not a standard management pathway in the Australian NCSP. Cytology alone is insufficient for risk stratification when a high-risk HPV type is known.\n- **d. Return to routine 5-year screening**: This is only appropriate for women with a negative HPV test result. A positive HPV 16 result indicates an active, high-risk infection requiring further investigation.\n- **e. Perform excisional biopsy**: This is a therapeutic, not a diagnostic, procedure. Excisional biopsy (e.g., LLETZ) is performed after a colposcopic assessment confirms a high-grade lesion. It is not the first step.\n\n### 📚 Relevant Guidelines\n- **Australian National Cervical Screening Program (NCSP) – Clinical Guidelines**: Provides the definitive algorithm for managing cervical screening results in Australia, including the specific pathway for HPV 16/18 positive results. — https://www.health.gov.au/resources/publications/national-cervical-screening-program-clinical-guidelines\n- **Therapeutic Guidelines (eTG) – Gynaecology**: Offers concise, evidence-based summaries on the investigation and management of abnormal cervical screening results. — https://tgldcdp.tg.org.au/viewTopic?topicfile=gynaecological-cancers-cervical-cancer-screening\n- **Cancer Council Australia – Cervical Cancer Screening**: A key resource for healthcare professionals and the public on the rationale and processes of the screening program. — https://www.cancer.org.au/cervical-cancer-screening", "image_path": ""}, {"id": 34922, "date": "2026-03-04T15:30:12+00:00", "stem": "A 3-week-old boy presents with non-bilious projectile vomiting after each feed. He is hungry and eager to feed again. On examination, you note a palpable 'olive' in the epigastrium. What is the most appropriate initial investigation?", "options": "A. Upper GI series (barium swallow)\nB. Abdominal ultrasound\nC. Abdominal X-ray\nD. Serum electrolytes\nE. Upper GI endoscopy", "answer": "B. Abdominal ultrasound", "explanation": "### ✅ Correct Answer: B. Abdominal ultrasound\n\n**Clinical Reasoning:**\nThe presentation is classic for **infantile hypertrophic pyloric stenosis (IHPS)**. Key features include:\n- **Age:** 3-6 weeks old (peak incidence).\n- **Symptoms:** Non-bilious, projectile vomiting after feeds, with the infant remaining hungry ('hungry vomiter').\n- **Examination:** Palpable 'olive' (hypertrophied pylorus) in the epigastrium, visible peristaltic waves.\n\n**Why Ultrasound is the Initial Investigation:**\n1. **First-line, non-invasive, and highly accurate:** It is the investigation of choice to confirm the diagnosis. It directly visualizes the hypertrophied pyloric muscle.\n2. **Diagnostic Criteria:** Ultrasound measures pyloric dimensions. The classic diagnostic criteria are:\n   - **Pyloric muscle thickness > 3-4 mm**\n   - **Pyloric channel length > 14-16 mm**\n3. **Avoids Radiation:** Unlike an upper GI series or X-ray, ultrasound uses no ionizing radiation, which is preferable in infants.\n4. **Rapid and Bedside Capability:** It can be performed quickly and is widely available.\n\n**Management Pathway:** Once confirmed by ultrasound, the definitive treatment is **pyloromyotomy (Ramstedt's procedure)**. Pre-operatively, correction of fluid and electrolyte imbalances (hypochloraemic, hypokalaemic metabolic alkalosis) is crucial, making serum electrolytes (Option D) an important *pre-operative* test, but not the *initial diagnostic* test.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Upper GI series (barium swallow):** This is a **second-line** investigation if ultrasound is equivocal or unavailable. It shows the 'string sign' (elongated, narrow pyloric channel) or 'shoulder sign' (indentation of the antrum). It involves radiation and is more invasive, so it is not the first choice.\n- **C. Abdominal X-ray:** May show a dilated stomach with little air distal to the pylorus ('single bubble' sign), but it is **non-specific and insensitive** for diagnosing IHPS. It cannot visualize the pyloric muscle morphology. It is more useful for ruling out other causes of obstruction.\n- **D. Serum electrolytes:** This is a **critical pre-operative test** but not the *initial diagnostic* test. Infants with IHPS often develop a **hypochloraemic, hypokalaemic metabolic alkalosis** due to loss of gastric acid. Correcting this is essential before surgery, but it does not confirm the anatomical diagnosis.\n- **E. Upper GI endoscopy:** This is **not indicated** for diagnosing IHPS. It is invasive, requires sedation/anesthesia, and does not provide the necessary anatomical detail of the pyloric muscle. It is used for evaluating mucosal lesions, not muscular hypertrophy.\n\n### 📚 Relevant Guidelines\n- **The Royal Children's Hospital Melbourne - Clinical Practice Guidelines: Pyloric Stenosis**: Provides a comprehensive overview of presentation, diagnosis (ultrasound first-line), and management in an Australian paediatric context. — [https://www.rch.org.au/clinicalguide/guideline_index/Pyloric_stenosis/](https://www.rch.org.au/clinicalguide/guideline_index/Pyloric_stenosis/)\n- **UpToDate - Infantile Hypertrophic Pyloric Stenosis**: Details the epidemiology, clinical features, diagnostic approach (emphasizing ultrasound), and surgical management. — [https://www.uptodate.com/contents/infantile-hypertrophic-pyloric-stenosis](https://www.uptodate.com/contents/infantile-hypertrophic-pyloric-stenosis)\n- **American College of Radiology (ACR) Appropriateness Criteria - Vomiting in Infants**: Rates ultrasound as the most appropriate initial imaging study for suspected pyloric stenosis. — [https://acsearch.acr.org/docs/69471/Narrative/](https://acsearch.acr.org/docs/69471/Narrative/)", "image_path": "photo_2026-03-04_15-30-12.jpg"}, {"id": 34924, "date": "2026-03-04T15:32:53+00:00", "stem": "A 45-year-old man presents with a 6-month history of progressive difficulty walking, stiffness in his legs, and urinary urgency. Neurological examination reveals increased tone and hyperreflexia in both lower limbs, with extensor plantar responses. There is no sensory level. MRI of the brain is normal. What is the most likely diagnosis?", "options": "A. Multiple sclerosis\nB. Cervical spondylotic myelopathy\nC. Vitamin B12 deficiency\nD. Hereditary spastic paraplegia\nE. Spinal cord tumour", "answer": "B. Cervical spondylotic myelopathy", "explanation": "### ✅ Correct Answer: B. Cervical spondylotic myelopathy\n\n**Clinical Reasoning:**\nThis is a classic presentation of a **chronic, progressive myelopathy**.\n- **Symptoms:** Progressive gait difficulty, leg stiffness (spasticity), and urinary urgency.\n- **Examination Signs:** **Upper motor neuron (UMN) signs** in the lower limbs (increased tone, hyperreflexia, extensor plantars) with **preserved sensation** (no sensory level).\n- **Key Clue - Normal Brain MRI:** This effectively rules out primary intracranial processes like multiple sclerosis (MS) plaques, which would typically show lesions.\n\n**Why Cervical Spondylotic Myelopathy (CSM) is Correct:**\n1. **Epidemiology:** It is the **most common cause of acquired spastic paraparesis in adults over 55**, but can present earlier, especially with predisposing factors.\n2. **Pathophysiology:** Degenerative changes (osteophyte formation, disc bulging, ligamentum flavum hypertrophy) in the cervical spine cause **chronic compression of the cervical spinal cord**.\n3. **Clinical Presentation:** Typically presents with a **slowly progressive** syndrome of:\n   - **Spastic paraparesis:** Stiff, clumsy legs, gait disturbance.\n   - **UMN signs** in the legs.\n   - **Possible subtle sensory changes or hand clumsiness,** but a clear sensory level may be absent, especially early on.\n   - Bladder symptoms (urgency) are common.\n4. **Diagnostic Pathway:** The next logical step after a normal brain MRI would be **MRI of the cervical spine**, which would show spinal canal stenosis and cord compression.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Multiple sclerosis:** While MS can present with progressive myelopathy (primary progressive MS), a **normal brain MRI makes this less likely**. Spinal MS would typically show cord lesions on MRI, but the absence of brain lesions in a progressive myelopathy of 6 months is atypical for a first presentation of MS. Relapsing-remitting course is more common.\n- **C. Vitamin B12 deficiency:** Can cause **subacute combined degeneration of the cord**, presenting with UMN signs, sensory ataxia, and peripheral neuropathy (leading to mixed UMN/LMN and sensory signs). The key missing feature here is **sensory impairment** (e.g., loss of vibration and proprioception), which is a hallmark. The presentation is often more subacute and symmetric.\n- **D. Hereditary spastic paraplegia (HSP):** A genetic disorder causing progressive spastic paraplegia. It is a **diagnosis of exclusion**. While it fits the pure motor UMN picture, the age of onset (45) is **late for most forms of HSP**, which typically begin in childhood or early adulthood. Family history is often positive. It would be considered after structural causes like CSM are ruled out.\n- **E. Spinal cord tumour:** Can cause a progressive myelopathy. However, the **chronic, slow progression over 6 months without significant pain or a clear sensory level** is more suggestive of a compressive/degenerative process like CSM. Intramedullary tumours might cause more sensory symptoms. Extradural tumours (e.g., metastases) often have a more rapid progression and are associated with pain.\n\n### 📚 Relevant Guidelines\n- **NICE Guideline [NG41] - Spinal Injury: Assessment and Initial Management**: Includes recognition of non-traumatic spinal cord compression, such as from spondylosis. — [https://www.nice.org.uk/guidance/ng41](https://www.nice.org.uk/guidance/ng41)\n- **Journal of Neurosurgery: Spine - Guidelines for the Management of Degenerative Cervical Myelopathy**: An international evidence-based guideline covering diagnosis and management. — [https://thejns.org/spine/view/journals/j-neurosurg-spine/31/1/article-p1.xml](https://thejns.org/spine/view/journals/j-neurosurg-spine/31/1/article-p1.xml)\n- **UpToDate - Cervical Spondylotic Myelopathy**: Details the clinical features, diagnostic evaluation (emphasizing cervical spine MRI), and treatment options. — [https://www.uptodate.com/contents/cervical-spondylotic-myelopathy](https://www.uptodate.com/contents/cervical-spondylotic-myelopathy)", "image_path": "photo_2026-03-04_15-32-53.jpg"}, {"id": 34979, "date": "2026-03-06T13:11:51+00:00", "stem": "A 35-year-old woman presents with a 2-day history of fever, headache, and myalgia. She has a petechial rash on her lower limbs and trunk. Her blood pressure is 90/60 mmHg, heart rate 120/min, and temperature 39°C. Lumbar puncture shows: WBC 1500/mm³ (90% neutrophils), protein 1.2 g/L, glucose 1.5 mmol/L (serum glucose 5.0 mmol/L). Gram stain of CSF shows gram-negative diplococci. What is the most appropriate initial management?", "options": "A. Intravenous ceftriaxone\nB. Intravenous benzylpenicillin\nC. Intravenous vancomycin plus ceftriaxone\nD. Oral ciprofloxacin\nE. Intravenous acyclovir", "answer": "A. Intravenous ceftriaxone", "explanation": "### ✅ Correct Answer: A. Intravenous ceftriaxone\n\nThe patient presents with classic features of acute bacterial meningitis: fever, headache, meningism (implied by LP), petechial rash (suggestive of meningococcal disease), and septic shock (hypotension, tachycardia). The CSF findings confirm bacterial meningitis: markedly elevated neutrophils (>1000/mm³), elevated protein (>0.45 g/L), and low glucose (CSF:serum ratio <0.4). Gram-negative diplococci on Gram stain are characteristic of *Neisseria meningitidis* (meningococcus).\n\n**Clinical Reasoning:**\n1. **Urgency:** Bacterial meningitis is a medical emergency requiring immediate empiric antibiotic therapy, ideally within 30-60 minutes of presentation, even before imaging if no contraindications exist.\n2. **Pathogen-Specific Treatment:** For suspected meningococcal meningitis in adults, ceftriaxone (or cefotaxime) is the first-line agent. It has excellent CSF penetration and covers *N. meningitidis*, *Streptococcus pneumoniae*, and *Haemophilus influenzae*.\n3. **Why Not Broader Coverage?** While some guidelines recommend adding vancomycin in areas with high penicillin/cephalosporin-resistant pneumococcal rates (Option C), this patient's Gram stain shows gram-negative diplococci, strongly pointing to *N. meningitidis*, which is uniformly sensitive to ceftriaxone. Therefore, monotherapy with ceftriaxone is appropriate and avoids unnecessary vancomycin use.\n4. **Supportive Care:** Alongside antibiotics, management includes fluid resuscitation for septic shock, close monitoring, and consideration of dexamethasone (if pneumococcal meningitis is suspected, though less critical here).\n\n### ❌ Why the Other Options Are Wrong\n- **B. Intravenous benzylpenicillin:** While historically used for meningococcal disease, many guidelines now recommend third-generation cephalosporins (ceftriaxone/cefotaxime) as first-line due to broader coverage (including penicillin-resistant pneumococcus) and better CSF penetration. Benzylpenicillin alone is not recommended as empiric therapy for community-acquired bacterial meningitis in most settings.\n- **C. Intravenous vancomycin plus ceftriaxone:** This combination is recommended for empiric treatment of suspected bacterial meningitis when the causative organism is unknown, especially in regions with high rates of cephalosporin-resistant *S. pneumoniae*. However, in this case, the Gram stain specifically identifies gram-negative diplococci (meningococcus), making vancomycin (which covers gram-positive bacteria) unnecessary and potentially contributing to antibiotic resistance and side effects.\n- **D. Oral ciprofloxacin:** Oral therapy is inappropriate for acute bacterial meningitis, which requires high-dose intravenous antibiotics to achieve adequate CSF concentrations. Ciprofloxacin has some activity against *N. meningitidis* but is not first-line for treatment of meningitis and should not be used orally in this critically ill patient.\n- **E. Intravenous acyclovir:** Acyclovir is used for herpes simplex virus (HSV) encephalitis, which typically presents with a subacute onset, personality changes, seizures, and CSF showing lymphocytic predominance, normal or mildly elevated protein, and normal glucose. This patient's acute presentation with neutrophilic CSF and gram-negative diplococci on stain is classic for bacterial, not viral, meningitis.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Meningitis**: Provides Australian recommendations for empiric and pathogen-directed therapy for bacterial meningitis in adults and children. — https://tgldcdp.tg.org.au/viewTopic?topicfile=meningitis&guidelineName=Antibiotic#toc_d1e289\n- **Meningitis Research Foundation (UK) – Management of Bacterial Meningitis**: Evidence-based guidelines covering diagnosis, antibiotic choice, and adjunctive therapies. — https://www.meningitis.org/meningitis/management\n- **Centers for Disease Control and Prevention (CDC) – Bacterial Meningitis**: Guidelines for treatment and prevention, including antibiotic resistance patterns. — https://www.cdc.gov/meningitis/bacterial.html", "image_path": "photo_2026-03-06_13-11-51.jpg"}, {"id": 34982, "date": "2026-03-06T13:26:42+00:00", "stem": "A 60-year-old man with a history of hypertension presents with sudden onset severe headache, vomiting, and neck stiffness. On examination, he is drowsy but rousable. There is no focal neurological deficit. CT brain shows hyperdensity in the basal cisterns. What is the most likely diagnosis?", "options": "A. Migraine with aura\nB. Bacterial meningitis\nC. Subarachnoid haemorrhage\nD. Tension-type headache\nE. Brain tumour", "answer": "C. Subarachnoid haemorrhage", "explanation": "### ✅ Correct Answer: C. Subarachnoid haemorrhage\n\n**Clinical Reasoning:**\n1. **Presentation:** Sudden onset severe headache (often described as 'thunderclap headache'), vomiting, and neck stiffness (meningism) are the classic triad of subarachnoid haemorrhage (SAH). The history of hypertension is a risk factor for intracranial aneurysm rupture.\n2. **Examination:** Altered consciousness (drowsiness) is common in SAH due to increased intracranial pressure or global cerebral irritation.\n3. **Imaging:** Non-contrast CT brain is the initial investigation of choice for suspected SAH. Hyperdensity (white appearance) in the basal cisterns, Sylvian fissures, or interhemispheric fissure represents acute blood in the subarachnoid space, which is pathognomonic for SAH. The sensitivity of CT within 6 hours of symptom onset is >95%.\n4. **Next Steps:** If CT is negative but clinical suspicion remains high, a lumbar puncture should be performed to look for xanthochromia (yellow discoloration of CSF due to bilirubin breakdown from RBCs).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Migraine with aura:** Migraine headaches are typically gradual in onset, throbbing, and associated with photophobia/phonophobia, nausea, and may have a preceding aura. They do not cause acute meningism or show blood in the basal cisterns on CT. While vomiting can occur, the 'thunderclap' nature and CT findings rule out migraine.\n- **B. Bacterial meningitis:** This can cause headache, vomiting, neck stiffness, and altered mental status. However, the onset is usually over hours to days with fever being prominent. CT brain in bacterial meningitis is usually normal or may show complications like hydrocephalus, but it does not show acute blood (hyperdensity) in the basal cisterns as the primary finding.\n- **D. Tension-type headache:** This presents as a bilateral, pressing/tightening headache of mild to moderate intensity, not associated with nausea, vomiting, or neurological symptoms. It does not have a sudden severe onset, meningism, or abnormal CT findings.\n- **E. Brain tumour:** Headaches from brain tumours are usually progressive over weeks to months, often worse in the morning or with Valsalva manoeuvres. They may be associated with focal neurological deficits or seizures. A sudden severe onset with meningism is not typical, and while a tumour might bleed (haemorrhagic metastasis), the CT finding of blood isolated to the subarachnoid space points primarily to SAH rather than an intraparenchymal lesion with secondary haemorrhage.\n\n### 📚 Relevant Guidelines\n- **National Institute for Health and Care Excellence (NICE) – Headaches in over 12s: diagnosis and management**: Includes guidance on recognition and referral for suspected subarachnoid haemorrhage. — https://www.nice.org.uk/guidance/cg150\n- **American Heart Association/American Stroke Association (AHA/ASA) – Guidelines for the Management of Aneurysmal Subarachnoid Hemorrhage**: Comprehensive guidelines on diagnosis, imaging, and management. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000436\n- **Therapeutic Guidelines (eTG) – Neurology**: Australian guidelines covering the assessment and management of acute headache including SAH. — https://tgldcdp.tg.org.au/viewTopic?topicfile=neurological-problems&guidelineName=Neurology", "image_path": "photo_2026-03-06_13-26-42.jpg"}, {"id": 35011, "date": "2026-03-07T03:39:58+00:00", "stem": "A 45-year-old man presents with sudden onset vertigo, nausea, and vomiting. On examination, he has nystagmus and hearing loss in the right ear. There is no facial weakness or other neurological deficits. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo (BPPV)\nB. Vestibular neuritis\nC. Ménière's disease\nD. Acoustic neuroma\nE. Vertebrobasilar insufficiency", "answer": "C. Ménière's disease", "explanation": "### ✅ Correct Answer: C. Ménière's disease\n\nThe patient presents with the classic triad of Ménière's disease: episodic vertigo, sensorineural hearing loss, and tinnitus (implied by 'HL' in the discussion). The key distinguishing features are:\n\n1. **Pathophysiology**: Endolymphatic hydrops - abnormal accumulation of endolymph in the cochlear duct and vestibular system.\n2. **Clinical Presentation**:\n   - Episodic vertigo lasting 20 minutes to several hours\n   - Fluctuating, low-frequency sensorineural hearing loss\n   - Tinnitus and aural fullness\n   - No other neurological deficits (rules out central causes)\n3. **Exam Findings**: Horizontal or rotatory nystagmus during attacks, positive Rinne test (sensorineural pattern), possible recruitment on audiometry.\n4. **Management**: First-line includes dietary sodium restriction, diuretics (e.g., hydrochlorothiazide), vestibular suppressants for acute attacks (e.g., prochlorperazine), and betahistine. Intratympanic steroids or gentamicin may be considered for refractory cases.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: Characterized by brief episodes of vertigo triggered by head position changes (e.g., rolling over in bed), typically lasting <1 minute. No hearing loss or tinnitus. Diagnosed with Dix-Hallpike maneuver.\n- **B. Vestibular neuritis**: Presents with acute, severe vertigo lasting days, with nausea/vomiting but NO hearing loss. Often preceded by viral illness. Nystagmus is unidirectional and horizontal.\n- **D. Acoustic neuroma (vestibular schwannoma)**: Typically presents with progressive unilateral sensorineural hearing loss and tinnitus, with vertigo being less prominent. May have cranial nerve involvement (facial numbness, weakness) as it grows. MRI shows cerebellopontine angle mass.\n- **E. Vertebrobasilar insufficiency**: Causes transient vertigo but is accompanied by other brainstem symptoms (diplopia, dysarthria, ataxia, weakness). Hearing loss is NOT a feature. Typically affects older patients with vascular risk factors.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (Neurology)**: Management of vertigo and Ménière's disease — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etgcomplete\n- **American Academy of Otolaryngology-Head and Neck Surgery**: Clinical Practice Guideline: Ménière's Disease — https://journals.sagepub.com/doi/10.1177/0194599819889675\n- **BMJ Best Practice**: Ménière's disease — https://bestpractice.bmj.com/topics/en-gb/466", "image_path": "photo_2026-03-07_03-39-58.jpg"}, {"id": 35015, "date": "2026-03-07T04:27:59+00:00", "stem": "Young man HIT by a squash ball while playing, apart from headache which resolved by analgesic he complained of decreased in vision. On examination, his visual acuity was 6/12 in the left eye; right eye was 6/6 asking the most likely cause?", "options": "A-vitreous hemorrhage\nB-retinal detachment\nC-zygomatic fracture\nD-orbital floor fracture", "answer": "B", "explanation": "### ✅ Correct Answer: B. Retinal detachment\n\n**Clinical Reasoning:**\n1.  **Mechanism:** A high-velocity squash ball impact to the eye is a classic cause of **traumatic retinal detachment**. The sudden compression and decompression of the globe can create a tractional or rhegmatogenous (tear-related) detachment.\n2.  **Presentation:** The patient reports a **decrease in vision** (6/12 in the affected eye) following blunt trauma. Headache is a non-specific associated symptom. This pattern of painless vision loss after trauma is highly suggestive of retinal detachment.\n3.  **Pathophysiology:** The impact can cause vitreous traction on the retina, leading to a retinal tear. Fluid then accumulates under the retina, causing it to detach. This results in the characteristic symptoms of vision loss, which may be described as a 'curtain' or 'shadow'.\n4.  **Urgency:** Traumatic retinal detachment is an **ophthalmic emergency** requiring urgent surgical referral (e.g., vitrectomy, scleral buckle) to prevent permanent vision loss.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Vitreous Hemorrhage**: While possible with trauma, it typically causes sudden painless vision loss described as 'floaters', 'cobwebs', or a reddish haze. Isolated vitreous hemorrhage without a retinal tear is less likely to be the *primary* cause of significant, persistent acuity loss (6/12) immediately after this mechanism. It is often a secondary finding to a retinal tear.\n- **C. Zygomatic Fracture**: This would cause periorbital swelling, bruising (raccoon eyes), pain, and possibly trismus (difficulty opening the mouth) or facial asymmetry. It does not directly explain a primary complaint of decreased visual acuity unless there is significant associated orbital injury.\n- **D. Orbital Floor Fracture (Blowout Fracture)**: This classically causes diplopia (especially on upward gaze), enophthalmos (sunken eye), infraorbital nerve paraesthesia (numb cheek), and possibly restriction of eye movements. While visual acuity *can* be affected by optic nerve injury or muscle entrapment, the isolated finding of reduced acuity without these other hallmark signs makes it less likely than a direct retinal injury.\n\n### 📚 Relevant Guidelines\n- **[Royal Australian and New Zealand College of Ophthalmologists (RANZCO) - Retinal Detachment]**: Provides guidelines on the diagnosis and management of retinal detachment, including traumatic cases. — https://ranzco.edu/ (Search for 'Retinal Detachment' resources)\n- **[Therapeutic Guidelines (eTG) - Eye Trauma]**: Offers evidence-based recommendations for the assessment and initial management of ocular trauma, including when to suspect serious posterior segment injuries. — https://tgldcdp.tg.org.au/etgaccess\n- **[UpToDate - Retinal Detachment]**: A comprehensive clinical resource covering the etiology, clinical features, diagnosis, and management of retinal detachment, with a section on traumatic causes. — https://www.uptodate.com/contents/retinal-detachment", "image_path": ""}, {"id": 35046, "date": "2026-03-09T07:42:09+00:00", "stem": "A 42-year-old man, who was involved in a motor vehicle accident, is being evaluated in the Emergency Department. On examination, he has stable vital signs and an oxygen saturation of 96% on room air; however, he has marked difficulty in breathing due to intractable chest wall pain, which is worse on inspiration. He only takes shallow breaths. On examination, multiple bruises and tender points are noted on his chest. A non-contrast CT scan of the chest reveals multiple bilateral rib fractures as well a small pneumothorax on the right side. Which one of the following options is the most appropriate immediate treatment to help him with breathing?", "options": "A. Intubation.\nB. Morphine.\nC. Chest strapping.\nD. Needle aspiration of the pneumothorax.\nE. Underwater-sealed chest drain.", "answer": "B. Morphine.", "explanation": "### ✅ Correct Answer: B. Morphine.\nThe patient has multiple rib fractures with a small pneumothorax but is haemodynamically stable with adequate oxygenation (SpO₂ 96%). His primary issue is **pain leading to splinting and shallow breathing**, which increases the risk of atelectasis and pneumonia. **Adequate analgesia** is the cornerstone of management for rib fractures to enable deep breathing and effective coughing. Morphine provides potent analgesia, reduces pain on inspiration, and helps prevent respiratory complications. The pneumothorax is small and not causing significant respiratory compromise (no tension physiology), so immediate drainage is not the priority. The key is to treat the pain to improve ventilation.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Intubation.**: Intubation is indicated for respiratory failure, severe hypoxia, or inability to protect the airway. This patient is maintaining oxygenation and ventilation; intubation carries risks and is not needed for pain management.\n- **C. Chest strapping.**: Chest strapping or binding is contraindicated in rib fractures as it restricts chest expansion, increases the risk of atelectasis, and may lead to pneumonia. It is an outdated practice.\n- **D. Needle aspiration of the pneumothorax.**: Needle aspiration is typically for primary spontaneous pneumothorax. In trauma, especially with a small pneumothorax in a stable patient, observation or chest drain insertion (if needed) is preferred. Aspiration is not the standard immediate intervention here.\n- **E. Underwater-sealed chest drain.**: Chest drain insertion is indicated for a large or symptomatic pneumothorax, haemothorax, or tension pneumothorax. This patient has a small pneumothorax and is stable; analgesia to improve breathing is the priority. A drain may be considered if the pneumothorax enlarges or causes respiratory compromise.\n\n### 📚 Relevant Guidelines\n- **Royal Australian College of General Practitioners (RACGP) - Chest trauma**: Management of rib fractures focuses on analgesia, deep breathing exercises, and monitoring for complications like pneumothorax — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines\n- **Therapeutic Guidelines (eTG) - Analgesia**: Recommendations for opioid use in acute pain management, including in trauma settings — https://tgldcdp.tg.org.au/etgaccess\n- **ATLS (Advanced Trauma Life Support) - Thoracic trauma**: Principles for managing rib fractures and pneumothorax, emphasizing analgesia and chest drain for specific indications — https://www.facs.org/quality-programs/trauma/atls", "image_path": ""}, {"id": 35047, "date": "2026-03-09T07:42:21+00:00", "stem": "Mother present to you as her son 16 year old is consuming alcohol and he came home drunken on weekend she left her father because he also use to drink now what about future you will tell mother", "options": "1. He is at risk drinking in future\n2. You can't tell anything it's early\n3. It's safe to drink on weekend", "answer": "1. He is at risk drinking in future", "explanation": "### ✅ Correct Answer: 1. He is at risk drinking in future\nEarly alcohol use in adolescence is a strong predictor of future alcohol-related problems, including dependence. The **family history** of paternal alcohol use adds a significant genetic and environmental risk factor. According to developmental and public health principles, early initiation of alcohol use is associated with increased risk of developing alcohol use disorder later in life. The mother's concern is valid, and the appropriate response is to acknowledge the risk and discuss preventive strategies, such as open communication, setting clear boundaries, and monitoring. Dismissing the concern (option 2) or normalizing underage drinking (option 3) is not clinically appropriate.\n\n### ❌ Why the Other Options Are Wrong\n- **2. You can't tell anything it's early**: This is incorrect because early alcohol use is a known risk factor. Clinical guidelines advise addressing underage drinking proactively. Dismissing the concern misses an opportunity for early intervention.\n- **3. It's safe to drink on weekend**: This is dangerous advice. Alcohol consumption under the age of 18 is illegal in Australia and harmful to developing brains. It normalizes risky behavior and ignores the family history risk.\n\n### 📚 Relevant Guidelines\n- **Australian Guidelines to Reduce Health Risks from Drinking Alcohol (NHMRC)**: Recommend that for people under 18 years, no alcohol is the safest option — https://www.nhmrc.gov.au/health-advice/alcohol\n- **RACGP - Adolescent health**: Guidance on discussing substance use with adolescents and families, including risk assessment and early intervention — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines\n- **WHO - Global strategy to reduce the harmful use of alcohol**: Highlights the risks of early initiation and family history — https://www.who.int/publications/i/item/9789241599931", "image_path": ""}, {"id": 35070, "date": "2026-03-10T04:57:20+00:00", "stem": "Boy with 6 weeks h/o breathlessness, cough, worsening of cough at night, patient started getting symptoms after starting football at school, h/o hay fever(+) patient had salbutamol for wheeze a/w viral infection in past and asking for management", "options": "ICS\nICS + LABA\nSalbutamol before sports\nSalbutamol before sports and at night", "answer": "A", "explanation": "### ✅ Correct Answer: A. ICS\n\nThis patient presents with a classic history of **exercise-induced asthma** and **probable mild persistent asthma**. The key features are:\n- **Chronic symptoms**: 6-week history of breathlessness and cough, worse at night.\n- **Exercise trigger**: Symptoms started with football at school.\n- **Atopic history**: Hay fever positive.\n- **Past wheeze**: Previous salbutamol use for viral-induced wheeze.\n\nAccording to Australian and international asthma guidelines (e.g., Australian Asthma Handbook), the **first-line controller therapy for mild persistent asthma in children is Inhaled Corticosteroids (ICS)**. This is because:\n1. **Pathophysiology**: Asthma involves chronic airway inflammation. ICS directly target this inflammation, reducing bronchial hyperresponsiveness and preventing symptoms.\n2. **Clinical features**: The chronicity (>4 weeks), nocturnal symptoms, and exercise trigger indicate persistent asthma requiring regular anti-inflammatory treatment, not just reliever therapy.\n3. **Stepwise approach**: For mild persistent asthma, Step 2 treatment is low-dose ICS monotherapy. Adding LABA (ICS+LABA) is reserved for Step 3 when symptoms are not controlled on ICS alone.\n4. **Prevention**: Regular ICS reduces airway inflammation, thereby preventing exercise-induced bronchoconstriction more effectively than pre-exercise salbutamol alone.\n\n### ❌ Why the Other Options Are Wrong\n- **B. ICS + LABA**: This combination is **not first-line** for mild persistent asthma. LABA should only be added if symptoms are uncontrolled on moderate-dose ICS (Step 3). This patient is treatment-naïve, so starting with ICS alone is appropriate.\n- **C. Salbutamol before sports**: This is **symptomatic relief only** and does not address the underlying chronic inflammation. It may provide short-term protection but does not prevent daily/nocturnal symptoms or reduce long-term risk.\n- **D. Salbutamol before sports and at night**: Similar to option C, this is **inadequate controller therapy**. Using SABA regularly (especially at night) indicates poor asthma control and increases risk of exacerbations. It does not modify the disease process.\n\n### 📚 Relevant Guidelines\n- **Australian Asthma Handbook (National Asthma Council Australia)**: Provides stepwise management for asthma in children, recommending low-dose ICS as first-line controller for mild persistent asthma. — https://www.asthmahandbook.org.au\n- **Therapeutic Guidelines: Respiratory (eTG)**: Recommends inhaled corticosteroids as preventive therapy for asthma with symptoms more than twice monthly. — https://tgldcdp.tg.org.au/etgaccess\n- **GINA (Global Initiative for Asthma)**: Global strategy for asthma management, aligning with Australian guidelines on ICS as foundational therapy. — https://ginasthma.org", "image_path": ""}];
        let questions = [];
        let currentIndex = 0;


        async function init() {
            try {
                // Data is now embedded directly to bypass CORS
                questions = questionsData;
                document.getElementById('total-count').innerText = questions.length;

                // Load saved progress
                const savedIndex = localStorage.getItem('amc_study_index');
                if (savedIndex !== null) {
                    currentIndex = parseInt(savedIndex, 10);
                    // Boundary check
                    if (currentIndex >= questions.length) currentIndex = 0;
                }

                renderQuestion();
            } catch (e) {
                console.error("Data load failed", e);
                document.getElementById('question-stem').innerText = "加载失败。";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[currentIndex];

            // Stats & Progress
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

            // Save progress
            localStorage.setItem('amc_study_index', currentIndex);

            // Reset UI
            document.getElementById('question-stem').innerText = q.stem;
            document.getElementById('explanation-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';


            // Options
            const options = q.options.split('\n');
            options.forEach(opt => {
                if (!opt.trim()) return;
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 transition-all text-slate-700 font-medium group";
                btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-lg bg-slate-100 group-hover:bg-blue-200 text-center leading-8 mr-4 text-sm font-bold text-slate-500 group-hover:text-blue-600 transition-all">&#8226;</span> ${opt}`;
                btn.onclick = () => selectOption(btn, opt, q.answer, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct, explanation) {
            // Check correct answer (fuzzy match)
            const isCorrect = selected.toLowerCase().includes(correct.toLowerCase()) ||
                correct.toLowerCase().includes(selected.toLowerCase());

            // Style all buttons
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.innerText.toLowerCase().includes(correct.toLowerCase())) {
                    b.classList.add('answer-correct');
                }
            });

            if (!isCorrect) {
                btn.classList.add('answer-wrong');
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = explanation;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Scroll to explanation
            setTimeout(() => {
                document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function exportProgress() {
            prompt('📤 你的进度码（在其他设备上导入）：', 'matt-' + (currentIndex + 1));
        }

        function importProgress() {
            const input = prompt('📥 输入进度码（如 matt-87）：');
            if (!input) return;
            const trimmed = input.trim();
            const match = trimmed.match(/-?(\d+)$/);
            if (match) {
                const num = parseInt(match[1], 10);
                if (num >= 1 && num <= questions.length) {
                    currentIndex = num - 1;
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    alert(`✅ 已跳转到第 ${num} 题。`);
                    return;
                }
            }
            alert(`⚠️ 格式错误，请输入如 matt-87 的进度码。`);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        init();
    </script>
</body>

</html>
