 Dr Jayse", "stem": "A 56-year-old man presents to the emergency department with complaint of diplopia. On examination, he has a right-sided ptosis. His visual acuity and visual fields are otherwise not impaired. His right eye is depressed inferiorly and laterally and he is not able to look at to the left side. The pupillary light reflex of the right eye is sluggish. The neurological examination is otherwise unremarkable. Which one of the following can be the most likely cause to this presentation?", "options": "A. Midbrain infarct\nB. Right 6th nerve palsy\nC. Posterior communicating artery aneurysm\nD. Right 4th nerve palsy\nE. A lesion in the occipital cortex", "answer": "C. Posterior communicating artery aneurysm", "explanation": "### ✅ Correct Answer: C. Posterior communicating artery aneurysm\n\n**Clinical Reasoning:**\nThe patient presents with a classic **painful, pupil-involving third cranial nerve (CN III) palsy**.\n\n1.  **Key Findings:**\n    *   **Diplopia:** Due to impaired extraocular muscle function.\n    *   **Right-sided ptosis:** Due to paralysis of the levator palpebrae superioris (CN III).\n    *   **Eye position:** 'Depressed inferiorly and laterally' describes a 'down and out' position, which is the resting state of an eye with a complete CN III palsy (unopposed action of lateral rectus [CN VI] and superior oblique [CN IV]).\n    *   **Inability to adduct (look medially):** Impaired medial rectus (CN III).\n    *   **Sluggish pupillary light reflex:** This is the **critical feature**. The parasympathetic fibers for pupillary constriction run on the *superficial* surface of the CN III fascicle. A compressive lesion (like an aneurysm) affects these fibers early, causing pupillary dilation and sluggishness. Ischemic lesions (e.g., from diabetes or hypertension) typically spare the pupil because they affect the vasa nervorum supplying the *central* part of the nerve.\n\n2.  **Pathophysiology:** A **posterior communicating artery (PComm) aneurysm** is the most common cause of an isolated, painful, pupil-involving CN III palsy in an adult. The aneurysm compresses the nerve as it passes near the junction of the internal carotid and posterior communicating arteries. This is a **neurological emergency** due to the risk of subarachnoid hemorrhage.\n\n3.  **Management Pearl:** Any patient with an acute, painful CN III palsy with pupillary involvement requires **urgent neuroimaging (CT angiography or MR angiography)** to rule out an aneurysm. Do not delay investigation.\n\n### ❌ Why the Other Options Are Wrong\n\n-   **A. Midbrain infarct:** A midbrain (Weber's syndrome) infarct can cause a CN III palsy, but it is typically associated with **contralateral hemiparesis** (due to involvement of the cerebral peduncle). The exam states the neurological exam is 'otherwise unremarkable,' making this less likely. Furthermore, an ischemic cause would typically spare the pupil.\n-   **B. Right 6th nerve palsy:** A lesion of CN VI (abducens nerve) causes **impaired abduction** of the eye (inability to look laterally), resulting in horizontal diplopia worse on lateral gaze. It does **not** cause ptosis, a 'down and out' eye position, or pupillary abnormalities.\n-   **D. Right 4th nerve palsy:** A lesion of CN IV (trochlear nerve) paralyzes the superior oblique muscle. The classic findings are **vertical or torsional diplopia** worst on looking down and in (e.g., reading or going down stairs), a compensatory head tilt (away from the side of the lesion), and **no ptosis or pupillary involvement**.\n-   **E. A lesion in the occipital cortex:** Occipital lobe lesions (e.g., from stroke) cause **visual field defects** (homonymous hemianopia), not diplopia or ptosis. Visual acuity and fields are stated to be intact in this case.\n\n### 📚 Relevant Guidelines\n\n-   **UpToDate: 'Third cranial nerve (oculomotor nerve) palsy in adults'**: Provides a comprehensive review of causes, clinical features, and the critical distinction between pupil-involving and pupil-sparing palsies, emphasizing the urgency of evaluating for an aneurysm. — https://www.uptodate.com/contents/third-cranial-nerve-oculomotor-nerve-palsy-in-adults\n-   **Therapeutic Guidelines (Neurology): 'Neuro-ophthalmological disorders'**: Australian evidence-based guidelines covering the assessment and management of cranial nerve palsies. — https://tgldcdp.tg.org.au/viewTopic?topicfile=neuro-ophthalmological-disorders&guidelineName=Neurology#toc_d1e288\n-   **American Heart Association/American Stroke Association (AHA/ASA): 'Guidelines for the Management of Patients With Unruptured Intracranial Aneurysms'**: Although focused on management, it underscores the importance of recognizing sentinel symptoms like a painful third nerve palsy. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211", "image_path": ""}, {"id": 35066, "date": "2026-03-10T01:02:11+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 72-year-old woman has the abrupt onset of right face and hand weakness, disturbed speech production, and a right homonymous hemianopsia. This is most likely attributable to occlusion of which of the following arteries?", "options": "A. Left middle cerebral artery\nB. Left anterior cerebral artery\nC. Left vertebrobasilar artery\nD. Right anterior choroidal artery\nE. Left posterior inferior cerebellar artery (PICA)", "answer": "A. Left middle cerebral artery", "explanation": "### ✅ Correct Answer: A. Left middle cerebral artery\n\n**Clinical Reasoning:**\nThis is a classic presentation of a **left Middle Cerebral Artery (MCA) superior division stroke**.\n\n1.  **Neuroanatomy & Localization:** The MCA is the most common site of ischemic stroke. Its territory includes:\n    *   **Primary motor and sensory cortex** for the **face and upper limb** (contralateral weakness/numbness). The leg is relatively spared as it is represented in the anterior cerebral artery (ACA) territory.\n    *   **Broca's area** (inferior frontal gyrus) in the dominant hemisphere (left in most individuals), responsible for **speech production**. Damage here causes **Broca's (expressive) aphasia** – 'disturbed speech production' with non-fluent, effortful speech but relatively preserved comprehension.\n    *   **Optic radiation fibers** in the temporal and parietal lobes, which, if damaged, cause a **contralateral homonymous hemianopia**.\n\n2.  **Applying to the Case:**\n    *   **Right-sided weakness (face and hand):** Contralateral to the lesion, implicating the left hemisphere.\n    *   **Disturbed speech production:** Implicates the dominant (left) hemisphere, specifically Broca's area.\n    *   **Right homonymous hemianopia:** Contralateral visual field defect from damage to the optic radiations in the left temporal/parietal lobe.\n    *   The combination of **motor deficit (face/arm > leg), expressive aphasia, and hemianopia** is the hallmark of a large **left MCA territory infarct**.\n\n3.  **Management Pearl:** This presentation is a clear-cut case for **urgent neuroimaging (CT brain)** to rule out hemorrhage, followed by assessment for **thrombolysis (alteplase)** or **thrombectomy** if presenting within the appropriate time windows and meeting criteria.\n\n### ❌ Why the Other Options Are Wrong\n\n-   **B. Left anterior cerebral artery (ACA):** ACA occlusion primarily affects the **medial frontal lobe**. It causes **contralateral leg weakness** (greater than arm/face), with possible sensory loss in the leg. It may cause executive dysfunction, apathy, or urinary incontinence. It does **not** cause aphasia or homonymous hemianopia.\n-   **C. Left vertebrobasilar artery:** The vertebrobasilar system supplies the **brainstem and cerebellum**. Occlusion causes **'crossed' neurological signs** (ipsilateral cranial nerve deficits with contralateral motor/sensory deficits), vertigo, ataxia, dysarthria, and diplopia. It does not typically cause isolated cortical signs like aphasia or hemianopia without significant brainstem findings.\n-   **D. Right anterior choroidal artery:** This artery supplies the **posterior limb of the internal capsule** and parts of the thalamus and optic tract. Occlusion classically causes the triad of **contralateral hemiparesis, hemisensory loss, and homonymous hemianopia**. However, it would not cause **aphasia** (a left cortical function). If this were a right-sided lesion, the symptoms would be on the left side of the body.\n-   **E. Left posterior inferior cerebellar artery (PICA):** PICA occlusion causes **lateral medullary (Wallenberg's) syndrome**. Findings include ipsilateral Horner's syndrome, facial sensory loss, ataxia, and dysphagia; with contralateral loss of pain/temperature sensation on the body. It does **not** cause significant limb weakness, aphasia, or cortical visual field defects.\n\n### 📚 Relevant Guidelines\n\n-   **Australian Clinical Guidelines for Stroke Management**: The definitive Australian resource for stroke diagnosis, imaging, and acute management (including thrombolysis and thrombectomy criteria). — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n-   **American Heart Association/American Stroke Association (AHA/ASA): 'Guidelines for the Early Management of Patients With Acute Ischemic Stroke'**: Provides detailed protocols for the emergency evaluation and treatment of ischemic stroke. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n-   **UpToDate: 'Initial assessment and management of acute stroke'**: A practical, evidence-based review of stroke syndromes, localization, and immediate management steps. — https://www.uptodate.com/contents/initial-assessment-and-management-of-acute-stroke", "image_path": ""}, {"id": 35070, "date": "2026-03-10T04:57:20+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Boy with 6 weeks h/o breathlessness, cough, worsening of cough at night, patient started getting symptoms after starting football at school, h/o hay fever(+) patient had salbutamol for wheeze a/w viral infection in past and asking for management\n1. ICS 2. ICS+ LABA\n3. Salbutamol before sports\n4. Salbutamol before sports and at night", "options": "1. ICS\n2. ICS+ LABA\n3. Salbutamol before sports\n4. Salbutamol before sports and at night", "answer": "1. ICS", "explanation": "### ✅ Correct Answer: 1. ICS\n\n**Clinical Reasoning:**\nThis boy presents with symptoms highly suggestive of **newly diagnosed, persistent asthma**.\n\n1.  **Diagnosis:** The history is classic: chronic symptoms (>6 weeks) of breathlessness and cough, **nocturnal worsening**, and **exercise-induced symptoms** (triggered by football). A history of hay fever (atopy) and previous wheeze responsive to salbutamol supports the diagnosis of asthma.\n\n2.  **Asthma Severity & Stepwise Management:** According to Australian and international guidelines (e.g., Australian Asthma Handbook), management follows a stepwise approach.\n    *   **Step 1 (Mild Intermittent):** Short-acting beta2-agonist (SABA, e.g., salbutamol) as needed. This patient's symptoms are **persistent** (present for 6 weeks), so he is beyond Step 1.\n    *   **Step 2 (Mild Persistent):** The cornerstone of initial **preventer** therapy is a **low-dose Inhaled Corticosteroid (ICS)**. This is the recommended first-line treatment for patients with persistent symptoms or those using a SABA more than twice a week. ICS reduces airway inflammation, controls symptoms, and reduces the risk of exacerbations.\n\n3.  **Why ICS Alone is Correct:**\n    *   **LABA (Long-Acting Beta2-Agonist)** is not indicated as initial monotherapy. ICS+LABA combination is typically reserved for **Step 3** (if symptoms are not controlled on low-dose ICS alone) or for patients with more severe disease at diagnosis.\n    *   **Salbutamol before sports (Option 3)** is a reliever strategy for **exercise-induced bronchoconstriction** but does **not** address the underlying chronic inflammation causing his daily/nocturnal symptoms. It is an adjunct, not primary management.\n    *   **Salbutamol before sports and at night (Option 4)** similarly provides only symptomatic relief and fails to institute preventive therapy.\n\n4.  **Management Pearl:** In addition to starting low-dose ICS, education is key: correct inhaler technique, written asthma action plan, and advice to use salbutamol as a reliever for breakthrough symptoms or before exercise.\n\n### ❌ Why the Other Options Are Wrong\n\n-   **2. ICS+ LABA**: Adding a LABA to ICS is **not first-line therapy** for newly diagnosed, mild persistent asthma. Guidelines recommend starting with ICS monotherapy and stepping up only if control is not achieved after 1-3 months. Starting with a combination inhaler is less appropriate and not cost-effective in this scenario.\n-   **3. Salbutamol before sports**: This addresses only one trigger (exercise) and provides **symptomatic relief only**. It does **not** treat the underlying airway inflammation responsible for his chronic daily and nocturnal symptoms, leaving him at risk of worsening asthma and exacerbations.\n-   **4. Salbutamol before sports and at night**: This is essentially using a SABA as a scheduled **preventer**, which is **incorrect and dangerous**. Regular SABA use can lead to tolerance, mask worsening inflammation, and is associated with poor outcomes and increased mortality. Preventer therapy must be an anti-inflammatory agent (ICS).\n\n### 📚 Relevant Guidelines\n\n-   **National Asthma Council Australia: 'Australian Asthma Handbook'**: The primary Australian guideline. It clearly outlines the stepwise management, stating that **low-dose ICS** is the preferred initial preventer therapy for adults and children with persistent asthma. — https://www.asthmahandbook.org.au/management/medicines/preventer-medicines\n-   **Global Initiative for Asthma (GINA) Report**: The international standard. GINA also recommends low-dose ICS as the preferred controller treatment for persistent asthma in adults, adolescents, and children aged 6-11 years. — https://ginasthma.org/gina-reports/\n-   **Therapeutic Guidelines (Respiratory): 'Asthma in children'**: Provides concise, evidence-based recommendations for the pharmacological management of childhood asthma in the Australian context. — https://tgldcdp.tg.org.au/viewTopic?topicfile=childhood-asthma&guidelineName=Respiratory", "image_path": ""}, {"id": 35112, "date": "2026-03-17T09:16:14+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "25-year-old woman-- ask about cervical screening. She reports never having had any sexual contact of any kind, She is otherwise healthy and vaccinated for HPV. She asks if she needs a screening test now. What is the most appropriate advice?", "options": "Proceed with cervical screening test now\nAdvise that screening is not required at present given no sexual activity\nDelay screening until age 30\nOffer colposcopy instead\nOffer yearly cytology rather than HPV test", "answer": "2. Advise that screening is not required at present given no sexual activity", "explanation": "### ✅ Correct Answer: 2. Advise that screening is not required at present given no sexual activity\nCervical screening aims to detect HPV infection and precancerous changes, which are sexually transmitted. The National Cervical Screening Program (NCSP) in Australia recommends starting screening at age 25 for individuals who have ever been sexually active. The key phrase is \"ever been sexually active,\" which includes any sexual contact involving the genital area. This patient reports **never having had any sexual contact of any kind**. Therefore, her risk of acquiring HPV is negligible, and screening is not indicated. Even though she is vaccinated, vaccination does not replace screening for those who are sexually active, but in her case, the absence of sexual activity is the determining factor. The appropriate advice is to defer screening until she becomes sexually active. If she remains sexually inactive, she does not require cervical screening.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Proceed with cervical screening test now**: Incorrect because screening is only recommended for individuals who have ever been sexually active. Initiating screening in someone with no sexual history is unnecessary and may cause undue anxiety and potential harm from false positives or overtreatment.\n- **3. Delay screening until age 30**: Incorrect. While the screening interval is 5 years from age 25-74, the issue is not her age but her lack of sexual activity. Delaying until 30 still implies she will eventually be screened, but she should not be screened at all until she becomes sexually active.\n- **4. Offer colposcopy instead**: Incorrect. Colposcopy is a diagnostic procedure for abnormal screening results, not a primary screening tool. It is inappropriate and invasive for an asymptomatic, low-risk individual with no screening indication.\n- **5. Offer yearly cytology rather than HPV test**: Incorrect. The Australian NCSP uses primary HPV testing every 5 years. Yearly cytology is outdated, not recommended, and again not indicated in someone with no sexual history.\n\n### 📚 Relevant Guidelines\n- **[National Cervical Screening Program (NCSP) - Australian Government]**: Guidelines for cervical screening in Australia, including commencement criteria for individuals who have never been sexually active. — https://www.health.gov.au/our-work/national-cervical-screening-program\n- **[The Royal Australian College of General Practitioners (RACGP) - Guidelines for preventive activities in general practice]**: Includes recommendations on cervical screening and managing patients with no sexual history. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice\n- **[Cancer Council Australia - Cervical screening]**: Patient and clinician resources outlining who needs screening. — https://www.cancer.org.au/cervical-screening", "image_path": ""}, {"id": 35153, "date": "2026-03-21T15:25:30+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A woman came to the clinic complaining of severe vertigo that is triggered when she gets out of bed. She also had another episode while she was hanging the clothes. On examination (a description of a manoeuvre done) she had immediate nystagmus when moved into a rapid supine position and turning head to right. Which one indicates the features of nystagmus seen in manoeuvre?", "options": "A. Persistent nystagmus when in position\nB. Lateral\nC. Disappearing after a couple of seconds when the manoeuvre is done\nD. Only when lying supine", "answer": "C. Disappearing after a couple of seconds when the manoeuvre is done", "explanation": "### ✅ Correct Answer: C. Disappearing after a couple of seconds when the manoeuvre is done\nThis is a classic description of **Benign Paroxysmal Positional Vertigo (BPPV)**, specifically involving the posterior semicircular canal. The key diagnostic manoeuvre is the **Dix-Hallpike test**. The hallmark features of nystagmus in BPPV are:\n1.  **Latency**: There is a brief delay (1-5 seconds) after the head is positioned before nystagmus and vertigo begin.\n2.  **Transience (Fatigue)**: The induced nystagmus and vertigo are intense but last only 10-30 seconds before subsiding, even if the head position is maintained.\n3.  **Torsional-Upbeating Nature**: The nystagmus is a combination of torsional (rotary) movement (towards the dependent ear) and vertical upbeating component. The stem mentions 'immediate nystagmus', but the key is its brief duration.\n4.  **Reversal**: When the patient sits back up, a less intense, reverse-direction nystagmus may occur.\n5.  **Habituation**: Repeating the manoeuvre leads to a decrease in the intensity of the response.\nThe patient's history of vertigo triggered by specific head movements (getting out of bed, hanging clothes) is highly characteristic. The correct answer describes the transient, fatigable nature of the nystagmus, which is pathognomonic for BPPV and differentiates it from central causes.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Persistent nystagmus when in position**: Persistent, non-fatiguing nystagmus in a provocative position is a **red flag** for a **central cause** (e.g., posterior fossa lesion like cerebellar infarction, multiple sclerosis). In BPPV, the nystagmus is transient.\n- **B. Lateral**: Purely horizontal nystagmus in the Dix-Hallpike position is atypical for classic posterior canal BPPV. Horizontal nystagmus may suggest **horizontal canal BPPV**, which is diagnosed with the **roll test**, not the Dix-Hallpike. The stem describes a manoeuvre consistent with Dix-Hallpike (supine with head turned), where the expected nystagmus is torsional-upbeating, not purely lateral.\n- **D. Only when lying supine**: This is incorrect because the nystagmus in BPPV is triggered by the **specific head-hanging position with head turn**, not simply by being supine. The critical element is the alignment of the posterior canal with gravity. Nystagmus may not occur if the head is supine but not turned or extended off the table.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) – Neurology]**: Provides diagnostic criteria and management steps for BPPV, including the Dix-Hallpike manoeuvre and canalith repositioning procedures (Epley manoeuvre). — https://tgldcdp.tg.org.au/etgAccess\n- **[Choosing Wisely Australia – Neurology]**: Recommends against routine imaging (CT/MRI) for typical BPPV without red flags, emphasising clinical diagnosis and physical treatment. — https://www.choosingwisely.org.au/recommendations/ranzcp\n- **[UpToDate – Benign paroxysmal positional vertigo]**: Detailed review of pathophysiology, diagnosis (including video examples of nystagmus), and evidence-based treatment. — https://www.uptodate.com/contents/benign-paroxysmal-positional-vertigo", "image_path": ""}, {"id": 35166, "date": "2026-03-23T11:44:50+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "2 years old child fit presented with fever, cough, rn in ED, T39.2, BP unrecordable, fitted, given intranasal midazolam 2 times but continue fit for another 15 mins, manage to get iv cannula, fbc normal, glucose 3.8, what is the next appropriate step?", "options": "(A) midazolam\n(B) Levetiracetam\n(C) Diazepam\n(D) Paracetamol\n(E) Glucose", "answer": "(E) Glucose", "explanation": "### ✅ Correct Answer: (E) Glucose\nThis child is in **established (refractory) convulsive status epilepticus**. The defining features are:\n1.  **Prolonged seizure**: Continuous clinical seizure activity for >5 minutes, or in this case, ongoing despite two doses of benzodiazepines (intranasal midazolam).\n2.  **Systemic instability**: Fever (T39.2), hypotension (BP unrecordable), and a history of cough suggest a serious underlying infection (e.g., meningitis, encephalitis, severe pneumonia) contributing to septic shock.\n3.  **Critical lab value**: Blood glucose is **3.8 mmol/L**. While this is within the normal fasting range for adults, in a critically ill, seizing child it represents **relative hypoglycaemia** and is an immediately reversible cause of seizure exacerbation. The brain's metabolic demand is massively increased during a seizure, and a glucose level at the lower end of normal is inadequate.\n\n**Step-by-step management priority:**\n- **A (Airway), B (Breathing), C (Circulation)**: The unrecordable BP mandates immediate fluid resuscitation and likely inotropic support for septic shock.\n- **Immediate metabolic correction**: After securing IV access, the **next specific step** is to correct potential metabolic drivers of the seizure. **Hypoglycaemia is the most urgent reversible cause.** A bolus of IV glucose (e.g., 5 mL/kg of 10% dextrose) should be administered immediately.\n- **Second-line anticonvulsant**: **After or concurrently with** glucose administration, a second-line IV anticonvulsant (like levetiracetam or phenytoin) is required, as benzodiazepines have failed. However, correcting hypoglycaemia takes precedence as it may terminate the seizure and is essential for brain survival.\n- **Identify & treat underlying cause**: Urgent investigations for infection (blood cultures, lumbar puncture if stable, chest X-ray) and broad-spectrum antibiotics are crucial.\n\n### ❌ Why the Other Options Are Wrong\n- **(A) midazolam / (C) Diazepam**: The child has already received **two doses of a benzodiazepine** (intranasal midazolam). Further benzodiazepines at this stage risk profound respiratory depression and hypotension without significant added anticonvulsant benefit. The standard protocol is to move to a **second-line agent** after failure of initial benzodiazepine therapy.\n- **(B) Levetiracetam**: This is a correct **second-line anticonvulsant** for status epilepticus. However, in this specific scenario with a borderline-low glucose level in a shocked child, **correcting hypoglycaemia is more urgent**. Levetiracetam would be given immediately after or alongside glucose.\n- **(D) Paracetamol**: This is for fever reduction and analgesia. While important for comfort and reducing metabolic demand, it is **not an emergency intervention** for ongoing status epilepticus and shock. It does not address the immediate life-threatening issues of hypoglycaemia and seizure activity.\n\n### 📚 Relevant Guidelines\n- **[APLS (Advanced Paediatric Life Support) Guidelines]**: The structured ABCDE approach for the critically ill child, with emphasis on checking and correcting glucose early in the management of status epilepticus. — https://www.alsg.org/en-gb/APLS\n- **[The Royal Children's Hospital Melbourne – Clinical Practice Guideline: Status Epilepticus]**: Provides a clear algorithm for management, specifying glucose check and correction as an immediate step after IV access is obtained in refractory cases. — https://www.rch.org.au/clinicalguide/guideline_index/Status_epilepticus/\n- **[Epilepsy Action Australia – Status Epilepticus in Children]**: Consumer and health professional resource outlining emergency management steps. — https://www.epilepsy.org.au/about-epilepsy/understanding-epilepsy/seizures/status-epilepticus/", "image_path": ""}, {"id": 35167, "date": "2026-03-23T11:55:44+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A football player is kicked in the abdomen and develops right upper quadrant pain. What is the next investigation?", "options": "1. FAST ultrasound\n2. CT abdomen\n3. X-ray abdomen\n4. MRI abdomen", "answer": "1. FAST ultrasound", "explanation": "### ✅ Correct Answer: 1. FAST ultrasound\nThis scenario describes a **blunt abdominal trauma** patient. The **next investigation** in the emergency department, following the primary survey (ABCDE) and resuscitation, is the **Focused Assessment with Sonography in Trauma (FAST) scan**.\n\n**Clinical Reasoning:**\n1.  **Mechanism & Site**: A kick to the abdomen is significant blunt force. Right Upper Quadrant (RUQ) pain raises immediate concern for injury to the **liver** (most common solid organ injured in blunt trauma), but also possible injuries to the right kidney, duodenum, or colon.\n2.  **FAST Scan Purpose**: The FAST scan is a rapid, bedside, non-invasive ultrasound performed in the trauma bay to detect **free intraperitoneal fluid**, which in the context of trauma is presumed to be blood until proven otherwise. It examines four areas: pericardium, hepatorenal recess (Morison's pouch), splenorenal recess, and pelvis.\n3.  **Why it's 'Next'**: It guides immediate management.\n    - **Positive FAST** (fluid in Morison's pouch for RUQ injury): Suggests significant haemorrhage. This may lead directly to **emergency laparotomy** if the patient is haemodynamically unstable, or to **CT scan** if stable, for detailed injury mapping.\n    - **Negative FAST**: Does not rule out all injury (e.g., hollow viscus, retroperitoneal, or solid organ injury without significant bleeding), but if the patient is stable, allows time for further evaluation (like CT).\n4.  **ATLS Protocol**: FAST is integrated into the standardised Advanced Trauma Life Support (ATLS) algorithm for the assessment of blunt abdominal trauma.\n\n### ❌ Why the Other Options Are Wrong\n- **2. CT abdomen**: CT with IV contrast is the **gold standard** for diagnosing and staging specific abdominal organ injuries in **stable** patients. However, it is **not the 'next' step**. It requires transporting a potentially unstable patient out of the resuscitation area. The FAST scan is performed first to triage for immediate life-threatening bleeding.\n- **3. X-ray abdomen**: Plain X-rays (erect CXR, AXR) have **very limited utility** in blunt abdominal trauma. They may show free air (from hollow viscus perforation) but are insensitive. They do not assess for solid organ injury or haemoperitoneum effectively and have been largely superseded by FAST and CT.\n- **4. MRI abdomen**: MRI has **no role** in the acute assessment of trauma. It is time-consuming, requires special non-ferromagnetic equipment, and is less accessible than CT. It is used for elective problem-solving, not emergency trauma imaging.\n\n### 📚 Relevant Guidelines\n- **[Advanced Trauma Life Support (ATLS) Student Course Manual]**: Defines the systematic approach to trauma assessment, placing the FAST scan within the secondary survey for abdominal trauma evaluation. — https://www.facs.org/quality-programs/trauma/atls\n- **[Royal Australasian College of Surgeons – Trauma Guidelines]**: Endorse the use of FAST in the initial assessment of blunt abdominal trauma in Australian practice. — https://www.surgeons.org/\n- **[Choosing Wisely Australia – Emergency Medicine]**: Recommends against routine CT for minor blunt abdominal trauma, advocating for clinical assessment and selective use of ultrasound/CT. — https://www.choosingwisely.org.au/recommendations/acem", "image_path": ""}, {"id": 35181, "date": "2026-03-23T12:16:42+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 64-year-old man presents to the emergency department with right arm pain. Two days ago, he fell while weeding the garden, resulting in immediate pain in his right arm. It has not improved, so he attended the emergency department. He has also experienced worsening back pain and constipation over the last six months. He has had no pain elsewhere. His daughter reports he is more forgetful than usual. He has a history of prostate cancer treated with surgery five years ago.\nOn examination, he has tenderness along his right humerus, with significantly reduced range of motion at his right shoulder. His right arm is neurovascularly intact distally. He has tenderness of his lumbar spine, worse on the right, but preserved range of motion. His lower limb neurological examination is unremarkable. His abdominal examination is normal.\nAn X-ray of his right humerus shows a fracture line through some lytic areas in the metaphysis and diaphysis. An X-ray of his lumbar spine shows several small lytic lesions in the vertebral bodies. An abdominal X-ray demonstrates faecal loading. He has no leg oedema. His laboratory results show:\n • Haemoglobin 91 g/l (132-172)\n • Creatinine 70 µmol/l (60-110)\n • Urea 4.1 mmol/L (3.0-8.0)\n • Mean Corpuscular Volume 90fL (80-100)\n • Platelet Count 159 x 10^9/L (150-450)\n • Sodium 137 mmol/L (135-145)\n • Potassium 4.1 mmol/L (3.5-5.1)\n • Chloride 107 mmol/L (98-107)\n • Bicarbonate 24 mmol/L (22-30)\n • Glucose 4.9 mmol/L (3.9-5.8)\n • Calcium 2.85 mmol/L (2.15-2.55)\n\nMost **likely cause of patient current condition?", "options": "Multiple myeloma\nParaneoplastic syndrome\nAmyloidosis\nMetastatic spread\nSpinal cord decompression", "answer": "A. Multiple myeloma", "explanation": "### ✅ Correct Answer: A. Multiple myeloma\n\nThe patient's presentation is classic for multiple myeloma. The key clinical clues are:\n1.  **Pathological fractures from lytic bone lesions:** The humerus fracture occurred through lytic areas on X-ray after minimal trauma (fall while weeding). The lumbar spine also shows multiple lytic lesions, explaining his chronic back pain.\n2.  **Hypercalcaemia:** Serum calcium is elevated at 2.85 mmol/L. This is a common feature in myeloma due to increased bone resorption, and it contributes to his symptoms of constipation, confusion (forgetfulness), and possibly renal impairment.\n3.  **Normocytic anaemia:** Haemoglobin is low (91 g/L) with a normal MCV. Anaemia in myeloma is often due to bone marrow infiltration by plasma cells and/or chronic disease.\n4.  **Absence of other typical features of prostate cancer metastasis:** While prostate cancer can metastasize to bone, it typically causes **sclerotic (blastic)** lesions, not purely lytic ones. The history of prostate cancer treated 5 years ago is a potential red herring.\n5.  **Clinical context:** The constellation of lytic bone lesions, hypercalcaemia, anaemia, and pathological fracture in an older adult is highly suggestive of multiple myeloma. The forgetfulness could be due to hypercalcaemia or, less likely, hyperviscosity syndrome.\n\n**Step-by-step reasoning for AMC:**\n- **First, identify the pattern:** Lytic bone lesions + hypercalcaemia + anaemia = \"CRAB\" features (Hypercalcaemia, Renal failure, Anaemia, Bone lesions). This patient has at least three (C, A, B).\n- **Second, consider the differential for lytic lesions:** Metastases (e.g., from lung, kidney, thyroid) are possible, but prostate cancer metastases are usually blastic. The classic triad for myeloma is often tested.\n- **Third, confirm with next steps:** The diagnosis would be confirmed with serum electrophoresis (showing a monoclonal band), urine for Bence Jones protein, and bone marrow biopsy showing >10% plasma cells.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Paraneoplastic syndrome**: This refers to remote effects of a cancer not due to direct invasion or metastasis (e.g., SIADH, Lambert-Eaton syndrome). While hypercalcaemia can be paraneoplastic (e.g., from PTHrP in lung cancer), the direct lytic bone destruction points to a primary bone marrow pathology like myeloma, not a remote effect.\n- **C. Amyloidosis**: This can be associated with multiple myeloma (AL amyloidosis) and cause similar symptoms (renal, cardiac). However, amyloidosis itself does not typically cause widespread **lytic bone lesions**; it's a complication of the underlying plasma cell dyscrasia, not the primary cause of the bone pathology seen here.\n- **D. Metastatic spread**: This is a strong distractor given the history of prostate cancer. However, **prostate cancer metastases are overwhelmingly osteoblastic (sclerotic)**, appearing as dense, white areas on X-ray. The description specifies \"lytic areas,\" which are punched-out, dark areas. This makes prostate metastasis much less likely than a primary bone marrow cancer like myeloma.\n- **E. Spinal cord decompression**: This is a complication (e.g., from vertebral collapse or epidural disease) rather than a primary diagnosis. The question asks for the \"most likely cause,\" which is the underlying disease process. The neurological exam is unremarkable, making acute cord compression less likely.\n\n### 📚 Relevant Guidelines\n- **[Cancer Council Australia - Multiple Myeloma Guidelines]**: Australian evidence-based guidelines for the diagnosis and management of multiple myeloma. — https://wiki.cancer.org.au/australia/Guidelines:Myeloma\n- **[UpToDate - Diagnosis of Multiple Myeloma]**: A detailed clinical resource covering diagnostic criteria (including the revised International Myeloma Working Group criteria), clinical features, and differential diagnosis. — https://www.uptodate.com/contents/diagnosis-of-multiple-myeloma\n- **[Therapeutic Guidelines (eTG) - Haematology]**: Australian therapeutic guidelines for the management of haematological malignancies, including initial workup and treatment principles for myeloma. — https://tgldcdp.tg.org.au/viewTopic?topicfile=haematological-malignancies&guidelineName=Haematology#toc_d1e289", "image_path": ""}, {"id": 35194, "date": "2026-03-23T14:49:03+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 32-year-old man presents with a six month history of increasing difficulty in urinating. He is able to start without any problems, but has to strain to pass urine. Whilst it does take increasing longer, he feels that he can empty his bladder. There is some dribbling at the end of micturition. He does not have any frequency and he only gets up to void at night if he has a large quantity of liquid to drink in the evenings. His medical history is unremarkable, apart from a pelvic fracture from a motorbike crash when he was 21. The physical examination, including a digital rectal examination is unremarkable and his bladder is not distended.\nWhich one of the following is the most appropriate investigation?", "options": "Prostate specific antigen\nCT abdomen and pelvis\nTrans-rectal ultrasound-guided biopsy (TRUS)\nUrethroscopy\nRetrograde urethrogram", "answer": "5. Retrograde urethrogram", "explanation": "### ✅ Correct Answer: 5. Retrograde urethrogram\n\nThis patient presents with obstructive lower urinary tract symptoms (LUTS): difficulty starting, straining, prolonged voiding, and terminal dribbling. The key historical clue is the remote history of a **pelvic fracture** from a motorbike crash. Pelvic fractures are a classic cause of **urethral stricture**, particularly in the bulbar or membranous urethra. The mechanism is shearing injury or disruption during the trauma, with fibrosis developing over time.\n\n**Clinical Reasoning:**\n1.  **Age & Presentation:** At 32, benign prostatic hyperplasia (BPH) and prostate cancer are extremely unlikely. A normal digital rectal examination (DRE) further rules out significant prostate pathology.\n2.  **Symptoms:** The symptoms are obstructive (difficulty initiating, straining, prolonged flow) rather than irritative (frequency, urgency, nocturia). This pattern is consistent with a fixed anatomical obstruction.\n3.  **Key History:** The remote pelvic trauma is the most significant risk factor for a urethral stricture. Strictures can develop years after the initial injury due to scar tissue formation.\n4.  **Investigations:**\n    *   **Retrograde urethrogram (RUG)** is the **first-line and most appropriate** imaging study to diagnose a urethral stricture. It involves injecting contrast into the urethral meatus under fluoroscopy to visualize the urethral lumen, identify the location, length, and severity of any stricture.\n    *   Other options are less appropriate: PSA is for prostate cancer screening (not indicated here), CT abdomen/pelvis is not the best first test for urethral pathology, TRUS is for prostate evaluation, and urethroscopy is often therapeutic/diagnostic but may be preceded by imaging.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Prostate specific antigen**: This is a screening and monitoring test for prostate cancer. In a 32-year-old man with a remote history of pelvic trauma and a normal DRE, prostate pathology is not the likely cause of his symptoms. PSA would not diagnose a urethral stricture.\n- **2. CT abdomen and pelvis**: While CT can show soft tissue and bone structures, it is not the optimal first-line investigation for evaluating the urethral lumen for a stricture. A retrograde urethrogram provides superior dynamic visualization of the urethra.\n- **3. Trans-rectal ultrasound-guided biopsy (TRUS)**: This is a diagnostic procedure for suspected prostate cancer, typically guided by an elevated PSA or abnormal DRE. There is no indication for prostate biopsy in this young patient with a normal DRE and a history pointing to urethral trauma.\n- **4. Urethroscopy**: This is an endoscopic procedure that allows direct visualization of the urethra. While it can diagnose a stricture, it is more invasive than a retrograde urethrogram and is often considered after imaging or as a combined diagnostic/therapeutic procedure (e.g., with dilation or incision). RUG is the standard initial diagnostic test.\n\n### 📚 Relevant Guidelines\n- **[Royal Australian College of Surgeons (RACS) / Urological Society of Australia and New Zealand (USANZ)]**: Guidelines on the management of urethral stricture disease detail the diagnostic approach, emphasizing history, physical exam, and imaging like retrograde urethrogram. — [https://www.usanz.org.au/uploads/2/7/0/4/27048085/urethral_stricture_disease_guideline.pdf](https://www.usanz.org.au/uploads/2/7/0/4/27048085/urethral_stricture_disease_guideline.pdf)\n- **[European Association of Urology (EAU) Guidelines on Urological Trauma]**: These guidelines discuss the late complications of pelvic fracture-associated urethral injuries, including stricture formation, and recommend retrograde urethrography for diagnosis. — [https://uroweb.org/guidelines/urological-trauma](https://uroweb.org/guidelines/urological-trauma)\n- **[UpToDate, 'Diagnosis and management of urethral stricture in men']**: Provides a detailed overview of the etiology, clinical presentation, and diagnostic workup, confirming retrograde urethrogram as a key diagnostic test. — [https://www.uptodate.com/contents/diagnosis-and-management-of-urethral-stricture-in-men](https://www.uptodate.com/contents/diagnosis-and-management-of-urethral-stricture-in-men)", "image_path": ""}, {"id": 35195, "date": "2026-03-23T14:49:19+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 27-year-old woman experiences 4-5 migraines per month, impacting her quality of life. She has a history of Generalised Anxiety Disorder (GAD) and asthma, and is on escitalopram and Implanon. Zolmitriptan provides acute relief. What is the best preventive treatment option?", "options": "Pizotifen 0.5 mg orally at night\nAmitriptyline 10 mg orally at night\nPropranolol 20 mg orally at night\nTopiramate 25 mg orally at night\nVerapamil 90 mg orally at night", "answer": "B. Amitriptyline 10 mg orally at night", "explanation": "### ✅ Correct Answer: B. Amitriptyline 10 mg orally at night\n\n**Clinical Reasoning:**\nThe patient requires preventive (prophylactic) therapy for migraine as she has 4-5 attacks per month (≥4 migraine days/month is a common threshold for considering prophylaxis). The choice must consider comorbidities and current medications.\n1.  **Comorbidities:** She has **Generalised Anxiety Disorder (GAD)** and **asthma**.\n2.  **Current Medications:** She is on **escitalopram (an SSRI)** for GAD and **Implanon** (progestogen-only contraceptive).\n3.  **Drug Profile Analysis:**\n    *   **Amitriptyline** is a tricyclic antidepressant (TCA) with proven efficacy for migraine prophylaxis. It is also effective for anxiety disorders and can be used adjunctively with SSRIs (like escitalopram) under supervision. It has no contraindication in asthma. Its sedating properties are beneficial when taken at night. Starting at a low dose (10 mg) is standard to minimize side effects.\n    *   **Propranolol** (a non-selective beta-blocker) is a first-line migraine preventive but is **relatively contraindicated in asthma** due to the risk of bronchoconstriction.\n    *   **Topiramate** is effective but has significant side effects (cognitive, teratogenic) and no specific benefit for her anxiety.\n    *   **Verapamil** is less commonly first-line and can cause constipation and edema.\n    *   **Pizotifen** can be used but is associated with weight gain and sedation; it is not first-line over amitriptyline in this context.\n4.  **Conclusion:** Amitriptyline addresses both migraine prevention and her comorbid anxiety, has a safe profile concerning her asthma, and is compatible with her current medications, making it the **best preventive option**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Pizotifen 0.5 mg orally at night**: Pizotifen is an antihistamine and serotonin antagonist used for migraine prevention. However, it is often considered after first-line options like amitriptyline or propranolol. It causes significant weight gain and sedation. It does not have the additional benefit of treating her comorbid anxiety disorder like amitriptyline does.\n- **C. Propranolol 20 mg orally at night**: Propranolol is a non-selective beta-blocker and a first-line agent for migraine prophylaxis. However, it is **relatively contraindicated in patients with asthma** due to its potential to block β2-receptors in the lungs, leading to bronchoconstriction and exacerbation of asthma. Given her asthma history, it is not the safest choice.\n- **D. Topiramate 25 mg orally at night**: Topiramate is an effective migraine preventive. However, it has notable side effects (paresthesia, cognitive slowing, word-finding difficulties) and is teratogenic (Category D). While she uses Implanon, the side-effect profile and lack of added benefit for her anxiety make it a less optimal first choice compared to amitriptyline.\n- **E. Verapamil 90 mg orally at night**: Verapamil, a calcium channel blocker, is sometimes used for migraine prevention, particularly in variants like hemiplegic migraine. It is generally not a first-line agent for typical migraine without aura. Common side effects include constipation, edema, and hypotension. It does not address her anxiety comorbidity.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (Australia) – Neurology]**: Provides evidence-based recommendations for migraine prophylaxis, listing amitriptyline, propranolol, and topiramate as options, and advises caution with beta-blockers in asthma. — [https://tgldcdp.tg.org.au/viewTopic?topicfile=acute-migraine-attack-management#toc_d1e346](https://tgldcdp.tg.org.au/viewTopic?topicfile=acute-migraine-attack-management)\n- **[American Headache Society Consensus Statement]**: Guidelines for preventive treatment of migraine, highlighting the importance of comorbidity (e.g., choosing amitriptyline for migraine with anxiety/depression) and contraindications (e.g., avoiding beta-blockers in asthma). — [https://headachejournal.onlinelibrary.wiley.com/doi/10.1111/head.14153](https://headachejournal.onlinelibrary.wiley.com/doi/10.1111/head.14153)\n- **[UpToDate, 'Preventive treatment of episodic migraine in adults']**: Discusses the selection of preventive therapy based on efficacy, side effects, and comorbid conditions, supporting amitriptyline as a preferred agent in patients with migraine and anxiety/depression. — [https://www.uptodate.com/contents/preventive-treatment-of-episodic-migraine-in-adults](https://www.uptodate.com/contents/preventive-treatment-of-episodic-migraine-in-adults)", "image_path": ""}, {"id": 35215, "date": "2026-03-27T22:17:05+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A child with asthma exacerbation. Already took salbutamol and ICS. Still not well. Which one is going to be the most effective drug?", "options": "1. oral prednisone\n2. mgso4\n3. amitriptyline", "answer": "1. oral prednisone", "explanation": "### ✅ Correct Answer: 1. oral prednisone\nSystemic corticosteroids (oral prednisone/prednisolone) are the cornerstone of treatment for moderate to severe asthma exacerbations, especially when the patient is not responding adequately to initial inhaled bronchodilators (SABA like salbutamol). The clinical reasoning is as follows:\n1.  **Pathophysiology**: An asthma exacerbation involves acute bronchoconstriction, airway inflammation, and mucus plugging. Inhaled corticosteroids (ICS) have a slow onset of action for controlling inflammation. Systemic corticosteroids act rapidly to reduce this underlying inflammation, decrease airway hyperresponsiveness, and enhance the effect of beta-2 agonists.\n2.  **Key Features & Management**: For a child not improving after initial SABA/ICS, the next step per guidelines is to add oral corticosteroids. A typical paediatric dose is 1-2 mg/kg (max 40-60 mg) of prednisolone daily for 3-5 days. This is standard care in both emergency and community settings to prevent progression and hospital admission.\n3.  **Exclusion of Others**: IV magnesium sulfate is a second-line agent for severe/life-threatening exacerbations unresponsive to first-line therapy, not the first choice after SABA/ICS failure. Amitriptyline is a tricyclic antidepressant with no role in acute asthma management.\n\n### ❌ Why the Other Options Are Wrong\n-   **2. mgso4**: Intravenous magnesium sulfate is reserved for severe or life-threatening asthma exacerbations (e.g., FEV1 or PEF < 40% predicted, silent chest, exhaustion) in the emergency department, after failure of aggressive therapy with SABA, ipratropium, and systemic corticosteroids. It is not the first-line or most effective drug for a typical child with an exacerbation not responding to initial therapy.\n-   **3. amitriptyline**: Amitriptyline is a tricyclic antidepressant used for chronic neuropathic pain, migraine prophylaxis, and depression. It has no bronchodilator or anti-inflammatory properties and plays no role in the management of acute asthma exacerbations.\n\n### 📚 Relevant Guidelines\n-   **[Australian Asthma Handbook (National Asthma Council Australia)]**: Provides evidence-based guidelines for the diagnosis and management of asthma across all age groups, including acute exacerbations in children. — https://www.asthmahandbook.org.au/acute-asthma/children\n-   **[Global Initiative for Asthma (GINA)]**: International strategy for asthma management and prevention, widely referenced and aligns with Australian standards for stepwise management of exacerbations. — https://ginasthma.org/\n-   **[Therapeutic Guidelines (eTG) - Respiratory]**: Australian clinical guidelines detailing drug therapy for asthma, including dosing for oral corticosteroids in exacerbations. — https://tgldcdp.tg.org.au/", "image_path": ""}, {"id": 35215, "date": "2026-03-27T22:17:05+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A man with systolic murmur radiating to the carotids with ECG and Holter done and normal. Next investigation?", "options": "1. TTE (Transthoracic echo)\n2. chest x ray\n3. nothing", "answer": "1. TTE (Transthoracic echo)", "explanation": "### ✅ Correct Answer: 1. TTE (Transthoracic echo)\nA systolic murmur that radiates to the carotids is highly characteristic of **Aortic Stenosis (AS)**. Radiation to the carotids occurs due to the high-velocity jet of blood passing through the stenotic aortic valve. The clinical reasoning is as follows:\n1.  **Pathophysiology & Key Features**: The classic murmur of AS is a crescendo-decrescendo (ejection) systolic murmur, best heard at the right upper sternal border (aortic area), radiating to the carotids. ECG and Holter monitor are primarily used to assess for arrhythmias or conduction defects (like LVH strain pattern) but are not diagnostic for valve morphology or severity.\n2.  **Diagnostic Pathway**: After identifying a suggestive murmur on physical exam, the **next and definitive investigation is Transthoracic Echocardiography (TTE)**. TTE is non-invasive and provides critical information: it visualises the valve structure (calcification, bicuspid vs. tricuspid), assesses the severity of stenosis (via valve area, peak velocity, and mean pressure gradient), and evaluates left ventricular function and hypertrophy.\n3.  **Why Not Other Options**: A chest X-ray may show calcification of the aortic valve or post-stenotic dilation of the ascending aorta, but it is neither sensitive nor specific for diagnosing or grading AS. Doing 'nothing' is incorrect because AS is a progressive condition with significant implications for prognosis and management (including timing of valve replacement).\n\n### ❌ Why the Other Options Are Wrong\n-   **2. chest x ray**: While a chest X-ray might show signs of long-standing severe AS (e.g., cardiomegaly, aortic valve calcification, post-stenotic dilation), it is an inadequate investigation to confirm the diagnosis, assess aetiology, or grade the severity of the stenosis. Echocardiography is the mandatory first-line imaging test.\n-   **3. nothing**: This is incorrect and potentially dangerous. Aortic stenosis is a serious condition that requires accurate diagnosis and monitoring. Leaving it undiagnosed misses the opportunity for appropriate follow-up, patient counselling (e.g., avoidance of strenuous sport in severe AS), and timely intervention (aortic valve replacement) to prevent complications like heart failure, syncope, or sudden cardiac death.\n\n### 📚 Relevant Guidelines\n-   **[CSANZ Guidelines for the Diagnosis and Management of Valvular Heart Disease]**: Australian guidelines outlining the investigation and management of valvular heart disease, including the central role of echocardiography in aortic stenosis. — https://www.csanz.edu.au/wp-content/uploads/2021/11/CSANZ-Valvular-Heart-Disease-Guidelines-2021.pdf\n-   **[ESC/EACTS Guidelines for the management of valvular heart disease]**: Comprehensive European guidelines, widely referenced, which state echocardiography is indicated (Class I) in all patients with a cardiac murmur suggestive of valvular heart disease. — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Valvular-Heart-Disease-Management-of\n-   **[UpToDate - Aortic Stenosis: Clinical manifestations and diagnosis]**: A detailed clinical resource confirming the diagnostic workup, highlighting echocardiography as the principal tool. — https://www.uptodate.com/contents/aortic-stenosis-clinical-manifestations-and-diagnosis", "image_path": ""}, {"id": 35215, "date": "2026-03-27T22:17:05+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "68 year old woman BMD score 0.5 in vertebra and -2.6 in femur after wrist fracture. What to do?", "options": "1. bmd after 12 months\n2. do nothing its normal\n3. x ray", "answer": "1. bmd after 12 months", "explanation": "### ✅ Correct Answer: 1. bmd after 12 months\nThis scenario describes a **fragility fracture** (wrist/Colles' fracture from a low-impact fall in a post-menopausal woman) with accompanying Bone Mineral Density (BMD) T-scores. The clinical reasoning is as follows:\n1.  **Interpretation of BMD Scores**: BMD is reported as a T-score (standard deviations from the mean peak bone mass of a young adult).\n    -   A T-score of **-2.6 at the femur** indicates **osteoporosis** (osteoporosis is defined as T-score ≤ -2.5).\n    -   A T-score of **0.5 at the vertebra** is within the **normal range** (normal is T-score ≥ -1.0).\n2.  **Clinical Significance**: The patient has a **confirmed diagnosis of osteoporosis** at the hip site. Furthermore, she has sustained a **fragility fracture**, which is a major clinical risk factor for future fractures, independent of BMD. According to guidelines (e.g., RACGP), a patient with a fragility fracture and a T-score ≤ -2.5 should be offered **pharmacological treatment** to reduce fracture risk.\n3.  **Management Pathway**: The correct action is not to do nothing. After initiating appropriate treatment (e.g., bisphosphonate, along with calcium/vitamin D supplementation and lifestyle advice), a follow-up BMD scan is typically performed **after 12-24 months of therapy** to monitor treatment response. Therefore, 'BMD after 12 months' is the correct answer, representing the appropriate follow-up plan after diagnosis and treatment initiation.\n\n### ❌ Why the Other Options Are Wrong\n-   **2. do nothing its normal**: This is incorrect and a dangerous conclusion. The femoral T-score of -2.6 is diagnostic of osteoporosis. The vertebral score is normal, but osteoporosis can be site-specific. The presence of a fragility fracture in the context of an osteoporotic BMD score mandates active management to prevent future, potentially more devastating fractures (e.g., hip or vertebral).\n-   **3. x ray**: An X-ray of the wrist has already been done to diagnose the fracture. Repeating an X-ray of the wrist or other sites is not the next step in managing the underlying osteoporosis. The diagnosis of osteoporosis is already confirmed by DEXA scan (BMD). The next steps involve treatment and monitoring with repeat BMD, not further plain radiography.\n\n### 📚 Relevant Guidelines\n-   **[RACGP - Osteoporosis prevention, diagnosis and management in postmenopausal women and men over 50 years of age]**: The key Australian guideline for GPs. It states that a fragility fracture in a person with a T-score ≤ -2.5 indicates high fracture risk and warrants pharmacological treatment. It recommends follow-up DXA 1–2 years after starting therapy. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/osteoporosis\n-   **[Therapeutic Guidelines (eTG) - Endocrine]**: Provides detailed recommendations on the pharmacological management of osteoporosis, including first-line agents and monitoring. — https://tgldcdp.tg.org.au/\n-   **[International Society for Clinical Densitometry (ISCD) Official Positions]**: Provides standards for BMD testing and reporting, including the use of the lowest T-score from hip, spine, or forearm for diagnosis. — https://iscd.org/learn/official-positions/", "image_path": ""}, {"id": 35219, "date": "2026-03-28T01:32:30+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Anterior interosseous nerve is a branch of which nerve", "options": "", "answer": "Median nerve", "explanation": "### ✅ Correct Answer: Median nerve.\nThe anterior interosseous nerve (AIN) is a pure motor branch of the median nerve. It arises from the median nerve in the proximal forearm, typically just distal to the pronator teres muscle. The AIN innervates three key muscles: flexor pollicis longus (FPL), pronator quadratus, and the lateral half of flexor digitorum profundus (FDP) to the index and middle fingers. This anatomical knowledge is crucial for diagnosing AIN syndrome (Kiloh-Nevin syndrome), which presents with weakness of the 'OK' sign (inability to flex the distal interphalangeal joint of the index finger and the interphalangeal joint of the thumb).\n\n### ❌ Why the Other Options Are Wrong\nThis is a single-answer recall question. The stem asks for the parent nerve of the AIN. Any other nerve (e.g., radial, ulnar, musculocutaneous) would be incorrect as they do not give rise to the AIN.\n\n### 📚 Relevant Guidelines\n- **[TeachMeAnatomy]**: Detailed description of the median nerve and its branches, including the anterior interosseous nerve. — https://teachmeanatomy.info/upper-limb/nerves/median-nerve/\n- **[OrthoBullets]**: Clinical review of Anterior Interosseous Nerve Syndrome, including anatomy, aetiology, and examination findings. — https://www.orthobullets.com/hand/6009/anterior-interosseous-nerve-syndrome\n- **[eTG complete]**: Australian therapeutic guidelines for the management of nerve compression syndromes (search for 'median nerve'). — https://tgldcdp.tg.org.au/", "image_path": ""}, {"id": 35230, "date": "2026-03-28T06:42:50+00:00", "source_group": "", "stem": "A patient with cirrhosis develops AKI. Urine Na⁺ is <10 mEq/L, FeNa <1%, but creatinine continues to rise despite fluids. Diagnosis?", "options": "A. Prerenal AKI\nB. ATN\nC. Hepatorenal syndrome\nD. GN\nE. Obstruction", "answer": "C. Hepatorenal syndrome", "explanation": "### ✅ Correct Answer: C. Hepatorenal syndrome\nHepatorenal syndrome (HRS) is a functional, prerenal type of acute kidney injury that occurs in patients with advanced cirrhosis and portal hypertension, often in the setting of ascites. The key diagnostic clue is the combination of a low urine sodium (<10 mEq/L) and low fractional excretion of sodium (FeNa <1%), which are classic for prerenal states, **but** the AKI does not improve with volume expansion (as indicated by the rising creatinine despite fluids). This distinguishes HRS from simple volume-responsive prerenal AKI. HRS is driven by severe renal vasoconstriction due to splanchnic vasodilation and activation of the renin-angiotensin-aldosterone and sympathetic nervous systems. Management involves vasoconstrictors (e.g., terlipressin) with albumin, and definitive treatment is liver transplantation.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Prerenal AKI**: While prerenal AKI also shows low urine Na and FeNa, it should respond to fluid resuscitation. The stem explicitly states creatinine continues to rise *despite fluids*, ruling out simple prerenal AKI.\n- **B. ATN (Acute Tubular Necrosis)**: ATN typically presents with a high urine sodium (>20 mEq/L) and FeNa >1-2% due to tubular damage and impaired reabsorption. The low values here are inconsistent with ATN.\n- **D. GN (Glomerulonephritis)**: GN often presents with active urinary sediment (RBCs, RBC casts), proteinuria, and variable urine sodium. It is not typically associated with the specific clinical scenario of advanced cirrhosis and refractory AKI with low urine sodium.\n- **E. Obstruction**: Post-renal obstruction would not typically present with such low urine sodium. It may cause anuria or fluctuating output, and diagnosis requires imaging (e.g., ultrasound showing hydronephrosis).\n\n### 📚 Relevant Guidelines\n- **[International Club of Ascites (ICA) - EASL Clinical Practice Guidelines]**: Diagnostic criteria and management of hepatorenal syndrome in cirrhosis. — https://www.journal-of-hepatology.eu/article/S0168-8278(18)32177-4/fulltext\n- **[Therapeutic Guidelines Australia (eTG) - Gastroenterology]**: Management of complications of cirrhosis, including ascites and hepatorenal syndrome. — https://tgldcdp.tg.org.au/etgAccess\n- **[UpToDate]**: Pathophysiology, diagnosis, and treatment of hepatorenal syndrome. — https://www.uptodate.com/contents/hepatorenal-syndrome", "image_path": ""}, {"id": 35246, "date": "2026-03-28T08:53:24+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A woman came three days after abortion at 7 weeks gestation. She got pregnant because she missed several contraceptive pills. No children before. She and her boyfriend don't want children for three years and want contraception. What will you recommend for her at this very moment?", "options": "A) IUCD\nB) POP\nC) Depo provera\nD) POP\nE) OCP", "answer": "A) IUCD", "explanation": "### ✅ Correct Answer: A) IUCD\nA levonorgestrel intrauterine device (LNG-IUD) or copper IUD is the most appropriate immediate post-abortion contraception. It can be inserted immediately (within 48 hours) or up to 4 weeks post-abortion. This provides highly effective, long-acting reversible contraception (LARC) that aligns with her 3-year plan. It is independent of user adherence (unlike pills, which she has already failed with), has rapid onset of action, and does not interfere with return to fertility when removed. Immediate insertion reduces the risk of repeat unintended pregnancy.\n\n### ❌ Why the Other Options Are Wrong\n- **B) POP**: Progestogen-only pills require strict daily adherence. Given her history of missed combined oral contraceptive pills (COCP), this method carries a high risk of repeat failure. They are less effective than LARC methods.\n- **C) Depo provera**: While a progestogen injection is effective and not user-dependent, it is not typically administered *immediately* post-abortion. There may be a recommended gap, and it does not provide the same rapid, highly effective coverage as an immediate IUD insertion. It also causes menstrual changes that some women find undesirable.\n- **D) POP**: This is a duplicate of option B.\n- **E) OCP**: Combined oral contraceptive pills are generally not recommended to start immediately post-abortion due to an increased risk of venous thromboembolism (VTE) in the post-procedure period. Furthermore, she has a demonstrated history of poor adherence to this method, making it a poor choice.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG)**: Guidance on long-acting reversible contraception, including immediate post-abortion insertion. — https://ranzcog.edu.au/womens-health/clinical-guidance/long-acting-reversible-contraception\n- **Therapeutic Guidelines (eTG)**: Contraception section, including post-abortion care and LARC methods. — https://tgldcdp.tg.org.au/viewTopic?topicfile=contraception\n- **Faculty of Sexual and Reproductive Healthcare (FSRH) UK**: Clinical guideline on intrauterine contraception, which supports immediate post-abortion insertion. — https://www.fsrh.org/standards-and-guidance/documents/cec-ceu-guidance-iuc-2015/", "image_path": ""}, {"id": 35247, "date": "2026-03-28T08:53:34+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A case of severe UTI. High fever with chills and abdominal pain. GFR is low (20 ml/min). Which of the following would you prescribe?", "options": "A. Trimethoprim\nB. Vancomycin\nC. Nitrofurantoin\nD. Amoxicillin\nE. Gentamicin", "answer": "A. Trimethoprim", "explanation": "### ✅ Correct Answer: A. Trimethoprim\nIn a patient with a severe UTI (likely pyelonephritis or urosepsis) and significantly impaired renal function (GFR 20 mL/min), antibiotic choice must consider both spectrum of activity (covering common uropathogens like *E. coli*) and pharmacokinetics in renal failure. Trimethoprim is primarily renally excreted and requires dose adjustment (e.g., halving the dose when GFR < 30 mL/min), but it remains a suitable oral option for treating UTIs in this context. It achieves good urinary and tissue concentrations. For a *severe* infection, initial IV therapy (e.g., ceftriaxone) might be indicated, but among the listed oral options, trimethoprim is the most appropriate, considering the others have more significant limitations.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vancomycin**: Vancomycin is not a first-line agent for community-acquired UTIs. It is reserved for suspected or proven serious infections with multidrug-resistant Gram-positive organisms (e.g., MRSA). Its use requires careful therapeutic drug monitoring due to nephrotoxicity risk, especially in a patient with existing renal impairment.\n- **C. Nitrofurantoin**: Nitrofurantoin is contraindicated when the estimated glomerular filtration rate (eGFR) is less than 60 mL/min, and its use is **absolutely contraindicated** when eGFR is < 30 mL/min (as in this case, GFR 20 mL/min). It is ineffective in renal impairment due to inadequate urinary concentration and carries a high risk of peripheral neuropathy and pulmonary toxicity.\n- **D. Amoxicillin**: While amoxicillin can be used in renal impairment with dose adjustment, high rates of resistance in *E. coli* (often >50%) make it a poor empirical choice for a severe UTI unless susceptibility is known. It is not recommended as first-line monotherapy for severe/complicated UTIs.\n- **E. Gentamicin**: Gentamicin is an aminoglycoside with concentration-dependent bactericidal activity. However, it is **nephrotoxic and ototoxic**. Its use in a patient with a baseline GFR of 20 mL/min is extremely high-risk and generally avoided unless no safer alternatives exist and with meticulous therapeutic drug monitoring. It would not be an appropriate first-choice oral/initial prescription.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Urinary tract infections**: Provides detailed recommendations on antibiotic choice, including in renal impairment and for pyelonephritis. — https://tgldcdp.tg.org.au/viewTopic?topicfile=urinary-tract-infections\n- **Kidney Health Australia - Caring for Australasians with Renal Impairment (CARI)**: Guidelines on drug dosing in renal impairment. — https://www.cariguidelines.org/\n- **Choosing Wisely Australia - Pathology**: Recommends against using nitrofurantoin when eGFR is <45 mL/min. — https://www.choosingwisely.org.au/recommendations/racgp", "image_path": ""}, {"id": 35259, "date": "2026-03-28T12:18:28+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Post-menopausal 56 year old lady with 3-4 week history of pain during sex. History of hysterectomy and posterior wall of rectum mesh repair (rectocele) 5 years back. Vaginal mucosa intact and rugae present. Urine exam normal. Mesh easily felt by examination. Asking initial management.", "options": "Use lubricants\nHRT\nRefer to previous gynaecologist\nUTI", "answer": "Use lubricants", "explanation": "### ✅ Correct Answer: Use lubricants\nThe most appropriate initial management for this patient is a trial of non-hormonal, conservative measures. She presents with dyspareunia (pain during sex) in the post-menopausal state. The examination notes intact vaginal mucosa with rugae, suggesting significant atrophy is not the primary issue. The key finding is that the mesh from her previous rectocele repair is easily palpable. The initial step in managing dyspareunia, especially when related to possible mechanical factors or mild atrophy, is to recommend vaginal lubricants and moisturisers during intercourse. This is a simple, safe, and effective first-line intervention before considering more invasive evaluations or treatments like hormone therapy or specialist referral.\n\n### ❌ Why the Other Options Are Wrong\n- **HRT**: Systemic or topical hormone replacement therapy (HRT) is a second-line treatment for dyspareunia primarily caused by genitourinary syndrome of menopause (vulvovaginal atrophy). While it may be considered if lubricants fail, it is not the *initial* step, especially as the examination did not note significant atrophy (rugae are present). HRT has contraindications and risks that require assessment before prescription.\n- **Refer to previous gynaecologist**: While referral may be warranted if conservative measures fail or if there is concern about mesh complications (e.g., erosion, pain), it is not the *initial* management. A GP should first attempt simple, evidence-based interventions. Immediate referral without a trial of first-line therapy is not appropriate.\n- **UTI**: The stem explicitly states \"Urine exam normal,\" ruling out a urinary tract infection as the cause of her dyspareunia. Therefore, managing for a UTI is incorrect.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian College of General Practitioners (RACGP) - Managing dyspareunia**: Guidelines on a stepped approach, starting with conservative measures. — https://www.racgp.org.au/afp/2017/june/dyspareunia\n- **Therapeutic Guidelines (eTG) - Menopause**: Recommendations on managing genitourinary symptoms, including the use of lubricants and topical oestrogens. — https://tgldcdp.tg.org.au/viewTopic?topicfile=menopause\n- **International Society for the Study of Women's Sexual Health (ISSWSH)**: Clinical consensus on the management of dyspareunia in postmenopausal women. — https://www.isswsh.org/guidelines", "image_path": ""}, {"id": 35260, "date": "2026-03-28T12:19:06+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Old age man with known OA, diabetes, HTN, osteoarthritis on PCM, metformin and perindopril/indapamide. Recently started atorvastatin 2-3 months ago. Drinks 2-3 glasses alcohol. Medicines/list given as a table with dose and duration. PCM- 1 gm QID since many years. Lab workup showing electrolyte normal, mildly deranged LFTs (AST, ALT, GGT), asking what is causing this.", "options": "Indapamide\nMetformin\nAtorvastatin\nAlcohol\nPCM", "answer": "Atorvastatin", "explanation": "### ✅ Correct Answer: Atorvastatin\nThe most likely cause of the **mild, isolated transaminase elevation (AST, ALT)** in this patient is atorvastatin. Statin-induced hepatotoxicity is a well-known side effect, typically presenting as an asymptomatic, mild-to-moderate elevation in liver enzymes (AST/ALT) without a concomitant rise in bilirubin. The timeline is key: the atorvastatin was started 2-3 months ago, which aligns with the onset of the biochemical abnormality. GGT may also be elevated due to statin use or concomitant alcohol. While other factors exist, the temporal relationship and pattern make atorvastatin the primary suspect.\n\n### ❌ Why the Other Options Are Wrong\n- **Indapamide**: Thiazide-like diuretics like indapamide are not commonly associated with a significant, isolated hepatocellular injury pattern (elevated AST/ALT). They more commonly cause hyponatraemia or hypokalaemia (electrolytes are normal here) or, rarely, cholestatic liver injury.\n- **Metformin**: Metformin is very rarely associated with hepatotoxicity. It is considered a safe drug regarding liver function and is not a common cause of elevated transaminases.\n- **Alcohol**: The patient consumes 2-3 standard drinks. This amount can cause elevated GGT (a marker of enzyme induction) and potentially mild AST/ALT elevation. However, in the context of a *new* medication started 2-3 months ago, the statin is a more direct and common cause for the *presenting* LFT derangement. Alcohol is a contributing factor but not the most likely primary cause given the history.\n- **PCM (Paracetamol)**: The patient takes paracetamol 1g QID (4g daily). This is at the upper limit of the recommended daily dose. While chronic excessive paracetamol use can cause liver injury, it typically requires higher cumulative doses or underlying liver disease. Given he has been on this dose \"for many years\" without prior issues, and a new potential hepatotoxin (atorvastatin) has been introduced, the statin is a more likely new inciting agent.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Lipid modification**: Discusses monitoring for statin-related myopathy and hepatotoxicity. — https://tgldcdp.tg.org.au/viewTopic?topicfile=lipid-modification\n- **National Prescribing Service (NPS MedicineWise) - Statins and liver function tests**: Outlines the approach to elevated LFTs in patients on statins. — https://www.nps.org.au/news/statins-and-liver-function-tests\n- **American College of Cardiology (ACC) Expert Consensus on Statin Intolerance**: Details the evaluation and management of statin-associated side effects, including liver enzyme elevations. — https://www.jacc.org/doi/10.1016/j.jacc.2016.07.753", "image_path": ""}, {"id": 35261, "date": "2026-03-28T12:19:35+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "Young boy came with pain and bleeding from ear. History of picking with stick during playing. On examination there is laceration of floor of ear and tympanic membrane rupture what is next?", "options": "1. Abx (eg Top Cipro)\n2. Urgent surgery\n3. Discharge and review in 3 weeks\n4. CT\n5. ENT Referral", "answer": "5. ENT Referral", "explanation": "### ✅ Correct Answer: 5. ENT Referral\nThis is a case of traumatic tympanic membrane (TM) perforation with an associated laceration of the external auditory canal (floor of the ear). The key management priorities are:\n1.  **Assessment of Injury Extent:** An ENT specialist is required to perform a thorough otomicroscopic examination to assess the size, location, and shape of the TM perforation, and to evaluate for any associated ossicular chain injury or facial nerve damage, which cannot be fully assessed in a primary care setting.\n2.  **Management of Perforation:** Most small, uncomplicated traumatic TM perforations heal spontaneously. However, an ENT can advise on optimal conditions for healing (e.g., keeping the ear dry, avoiding nose blowing) and may consider interventions like paper patching for larger perforations.\n3.  **Management of Laceration:** The laceration in the ear canal requires proper cleaning and assessment to rule out deeper injury or risk of stenosis. An ENT can manage this appropriately.\n4.  **Antibiotics:** Prophylactic oral or topical antibiotics (like Ciprofloxacin drops) are NOT routinely indicated for simple dry traumatic perforations, as they do not improve healing rates and may promote fungal infection. They are reserved for cases with signs of infection, contamination (e.g., water exposure), or in patients with underlying otitis media. This decision is best made by a specialist.\n5.  **Follow-up:** ENT follow-up ensures proper healing is monitored and any complications (like cholesteatoma formation or conductive hearing loss) are identified and managed early.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Abx (eg Top Cipro)**: Prophylactic antibiotics are not standard for clean, traumatic TM perforations. They are indicated only if there is evidence of active infection, contamination, or in specific high-risk cases. Initiating them without specialist review is not the best first step.\n- **2. Urgent surgery**: Surgery (tympanoplasty) is not an urgent intervention for acute traumatic perforation. It is considered only if the perforation fails to heal after several months of observation (typically 3-6 months) and is causing significant symptoms.\n- **3. Discharge and review in 3 weeks**: While many perforations are managed conservatively, discharging without specialist evaluation is inappropriate here due to the associated laceration in the ear canal. Furthermore, initial specialist assessment is crucial to establish a baseline and give correct immediate advice (e.g., ear protection).\n- **4. CT**: A CT scan of the temporal bones is not indicated initially. It is reserved for cases where there is clinical suspicion of a more severe injury, such as ossicular dislocation, temporal bone fracture (suggested by Battle's sign, hemotympanum, CSF otorrhoea, facial nerve palsy), or penetrating injury with suspected foreign body remnants. The history of a stick does raise suspicion, but the first step is clinical specialist assessment, not immediate imaging.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Otolaryngology (eTG)**: Provides evidence-based recommendations on the management of traumatic tympanic membrane perforations, including indications for referral and antibiotic use. — https://tgldcdp.tg.org.au/etgAccess\n- **Choosing Wisely Australia – ENT Australia**: Advises against routine use of antibiotics for uncomplicated acute tympanic membrane perforations. — https://www.choosingwisely.org.au/recommendations/ent-australia\n- **UpToDate – Traumatic Perforation of the Tympanic Membrane**: Details the evaluation, management, and indications for referral to otolaryngology. — https://www.uptodate.com/contents/traumatic-perforation-of-the-tympanic-membrane", "image_path": ""}, {"id": 35275, "date": "2026-03-29T12:02:36+00:00", "source_group": "AMC Part 1 general discussion by Dr Jayse", "stem": "A 57yr male with waldenstrom macroglobulinemia and myelodysplastic syndrome developed pneumonia. Penicillin given. After 2 days he developed maculopapular rash with some pustular lesion (no pic was there). What would lead to definitive diagnosis:", "options": "A. Skin biopsy\nB. Immunofluorescence of lesion\nC. Blood culture\nD. Marrow biopsy", "answer": "A. Skin biopsy", "explanation": "### ✅ Correct Answer: A. Skin biopsy\nThis patient has two hematological malignancies (Waldenström macroglobulinemia and MDS) and is immunocompromised. He developed a rash with pustular lesions 2 days after starting penicillin for pneumonia. The most critical diagnosis to consider is **acute generalized exanthematous pustulosis (AGEP)**, a severe, acute drug reaction often triggered by antibiotics like penicillins. AGEP is characterized by the rapid onset of numerous non-follicular sterile pustules on a background of edematous erythema, often with fever. The definitive diagnosis is made by **skin biopsy**, which shows characteristic histopathological findings: spongiform subcorneal and/or intraepidermal pustules, papillary dermal edema, and a perivascular infiltrate with neutro
