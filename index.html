oural changes, and declining academic performance. Physical exam shows mild hepatomegaly. Wilson disease is suspected. The patient is tachypnoeic with no murmur. What is the most likely cardiac diagnosis?", "options": "Aortic stenosis\nCardiomyopathy\nPatent ductus arteriosus (PDA)\nVentricular septal defect (VSD)\nAtrial septal defect (ASD)", "answer": "Cardiomyopathy", "explanation": "Wilson disease (hepatolenticular degeneration) is an autosomal recessive disorder of copper metabolism. Cardiac involvement occurs in up to 30% of patients, most commonly presenting as cardiomyopathy (often hypertrophic or dilated). The tachypnoea in this context suggests possible heart failure secondary to cardiomyopathy. While copper deposition can theoretically affect heart valves, cardiomyopathy is the most frequent and characteristic cardiac manifestation. The absence of a murmur makes structural defects like VSD, ASD, PDA, or aortic stenosis less likely. The combination of hepatic, neurological, and cardiac symptoms points to systemic copper deposition affecting multiple organs.", "image_path": "" }, { "id": 34660, "date": "2026-02-20T23:22:55+00:00", "stem": "A 70-year-old woman presents with syncope. ECG shows complete heart block. What is the best treatment?", "options": "A. Atropine only\nB. Beta blocker\nC. Permanent pacemaker\nD. Digoxin\nE. Calcium channel blocker", "answer": "C. Permanent pacemaker", "explanation": "Complete (third-degree) heart block is an indication for permanent pacemaker implantation, especially when symptomatic (e.g., syncope). According to Australian guidelines (CSANZ) and international standards (ACC/AHA), symptomatic third-degree AV block is a Class I indication for permanent pacing. Atropine is a temporary measure for bradycardia in emergency settings but does not address the chronic conduction defect. Beta-blockers, digoxin, and calcium channel blockers are contraindicated as they can worsen bradycardia.", "image_path": "" }, { "id": 34662, "date": "2026-02-20T23:27:45+00:00", "stem": "A 65-year-old man presents with chest pain for 2 hours. ECG shows ST elevation in leads II, III, and aVF. Which artery is most likely occluded?", "options": "A. Left anterior descending\nB. Left circumflex\nC. Right coronary artery\nD. Diagonal branch\nE. Posterior descending artery", "answer": "C. Right coronary artery", "explanation": "ST elevation in leads II, III, and aVF indicates an inferior wall myocardial infarction. The right coronary artery (RCA) supplies the inferior wall in about 80-90% of individuals (right-dominant circulation). The left circumflex artery supplies the inferior wall in the remaining 10-20% (left-dominant circulation), but RCA is the most common cause. The left anterior descending artery supplies the anterior wall, diagonal branches supply the lateral wall, and the posterior descending artery is typically a branch of the RCA (or LCX) and may be involved in inferior MIs but is not the primary artery listed.", "image_path": "" }, { "id": 34664, "date": "2026-02-20T23:28:58+00:00", "stem": "A patient presents with sudden chest pain radiating to the back. BP in right arm is 160/90 and left arm is 120/80. What is the most likely diagnosis?", "options": "A. Pulmonary embolism\nB. Aortic dissection\nC. MI\nD. Pericarditis\nE. Pneumonia", "answer": "B. Aortic dissection", "explanation": "Sudden tearing chest pain radiating to the back with a blood pressure difference (>20 mmHg) between arms is classic for aortic dissection (typically Stanford type A if ascending aorta involved). This difference occurs due to involvement of the brachiocephalic or subclavian arteries. Pulmonary embolism presents with pleuritic pain, dyspnoea, and tachycardia. MI pain is typically crushing and radiates to the left arm/jaw. Pericarditis pain is sharp, positional, and may have a friction rub. Pneumonia presents with fever, cough, and consolidation on exam.", "image_path": "" }, { "id": 34666, "date": "2026-02-20T23:29:13+00:00", "stem": "A 70‑year‑old man with long‑standing type 2 diabetes and hypertension has stage 4 chronic kidney disease (eGFR 20 mL/min/1.73 m²). He reports fatigue but no bleeding. Investigations show Hb 88 g/L, MCV 90 fL, ferritin 250 µg/L, transferrin saturation 30%, and normal B₁₂/folate. What is the most appropriate treatment specifically for his anaemia?", "options": "A. Regular red blood cell transfusions\nB. Oral iron supplementation\nC. High‑dose folic acid\nD. Erythropoiesis‑stimulating agent (e.g. erythropoietin)\nE. Prednisolone", "answer": "D. Erythropoiesis‑stimulating agent (e.g. erythropoietin)", "explanation": "This patient has anaemia of chronic kidney disease (normocytic, adequate iron stores). According to KDIGO guidelines, erythropoiesis-stimulating agents (ESAs) are indicated for symptomatic anaemia in CKD when Hb <100 g/L, provided iron stores are adequate (ferritin >100 µg/L and TSAT >20%). Transfusions are reserved for severe symptomatic anaemia or acute bleeding. Iron supplementation is not needed as stores are adequate. Folic acid is not indicated with normal levels. Prednisolone is for autoimmune haemolytic anaemia, not CKD anaemia.", "image_path": "" }, { "id": 34667, "date": "2026-02-20T23:29:21+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "According to Australian Red Cross Lifeblood guidelines and RACGP recommendations, immediate red blood cell transfusion is indicated for patients with active bleeding and haemodynamic instability. Option C describes a patient with acute blood loss (upper GI bleed), hypotension (BP 85/50 mmHg), tachycardia, and significant anaemia (Hb 78 g/L) - all signs of hypovolaemic shock requiring urgent volume resuscitation and blood transfusion. The other options describe stable patients without acute haemodynamic compromise: Option A has chronic anaemia with minimal symptoms; Option B has chronic anaemia without cardiac symptoms; Option D has postpartum anaemia but is well; Option E has mild anaemia with minimal symptoms. Transfusion thresholds are generally Hb <70 g/L for stable patients without cardiac disease, but acute bleeding with instability overrides specific Hb thresholds.", "image_path": "" }, { "id": 34668, "date": "2026-02-20T23:29:29+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus. Investigations: Hb: 70 g/L (130–170), Reticulocyte count: elevated, Indirect bilirubin: elevated, Peripheral blood film: 'bite cells' and blister cells. He is suspected to have G6PD deficiency. Which of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "Dapsone is a well-known oxidant drug that can precipitate acute haemolytic anaemia in patients with G6PD deficiency. G6PD deficiency is an X-linked disorder common in Middle Eastern populations that impairs the pentose phosphate pathway, reducing protection against oxidative stress. Common triggers include: 1) Anti-malarials (primaquine, dapsone), 2) Sulfonamides (including co-trimoxazole), 3) Nitrofurantoin, 4) Naphthalene (mothballs), 5) Fava beans. Dapsone is frequently used for Pneumocystis jirovecii prophylaxis and dermatological conditions. The clinical picture of acute intravascular haemolysis with dark urine (haemoglobinuria), jaundice, fatigue, bite cells (indicating oxidative damage to red cell membranes), and elevated reticulocytes is classic for G6PD deficiency triggered by an oxidant drug. Amoxicillin is not a typical trigger, paracetamol is safe, metformin is safe, and prednisolone is used to treat some forms of haemolysis.", "image_path": "" }, { "id": 34669, "date": "2026-02-20T23:29:39+00:00", "stem": "A 64‑year‑old woman presents with progressive numbness and tingling in her feet and difficulty walking. She also reports fatigue. She has no history of alcohol misuse. Examination shows pallor, a broad‑based gait and impaired vibration sense in the lower limbs. Investigations: Hb: 82 g/L (115–155), MCV: 112 fL (80–96), Peripheral blood film: macro‑ovalocytes and hypersegmented neutrophils, Serum vitamin B₁₂: markedly low, Serum folate: normal. What is the most appropriate initial treatment?", "options": "A. Oral folic acid\nB. Intramuscular hydroxocobalamin\nC. Oral vitamin B₁₂ tablets alone\nD. Red blood cell transfusion only", "answer": "B", "explanation": "The patient has megaloblastic anaemia with neurological symptoms (subacute combined degeneration of the cord) due to vitamin B12 deficiency. According to Therapeutic Guidelines and RACGP recommendations, the initial treatment for symptomatic B12 deficiency, especially with neurological involvement, is intramuscular hydroxocobalamin. Oral B12 alone (option C) is inadequate initially due to potential absorption issues (likely pernicious anaemia given age and presentation). Oral folic acid (option A) is contraindicated as it may worsen neurological symptoms by correcting anaemia while allowing neurological damage to progress. Red blood cell transfusion (option D) is rarely needed and not appropriate as primary treatment. Standard regimen: hydroxocobalamin 1mg IM daily for 5-7 days, then 1mg weekly for 4 weeks, then maintenance 1mg every 3 months lifelong if pernicious anaemia is confirmed.", "image_path": "" }, { "id": 34695, "date": "2026-02-21T05:45:57+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "According to Australian National Blood Authority guidelines and RACGP recommendations, immediate red blood cell transfusion is indicated for patients with active bleeding and hemodynamic instability (hypotension, tachycardia). Option C describes acute blood loss with signs of hypovolemic shock (BP 85/50, tachycardia), making transfusion urgent to restore circulating volume and oxygen-carrying capacity. The other options describe chronic or stable anemia where transfusion is not immediately indicated: A and D have chronic anemia without instability; B has chronic anemia without cardiac symptoms; E has mild anemia with minimal symptoms. In these cases, treatment should focus on addressing the underlying cause rather than transfusion.", "image_path": "" }, { "id": 34696, "date": "2026-02-21T05:46:03+00:00", "stem": "A 68‑year‑old woman with long‑standing rheumatoid arthritis presents for review. She feels more tired than usual. There is no history of overt bleeding. Investigations: Hb: 96 g/L (115–155), MCV: 86 fL (80–96), Serum iron: 6 µmol/L (10–30), Total iron‑binding capacity (TIBC): 30 µmol/L (45–72), Ferritin: 400 µg/L (30–300), CRP: elevated. What is the most likely cause of her anaemia?", "options": "A. Iron deficiency anaemia\nB. Anaemia of chronic disease\nC. Vitamin B₁₂ deficiency\nD. Autoimmune haemolytic anaemia\nE. β‑thalassaemia trait", "answer": "B", "explanation": "This patient has normocytic anaemia (MCV 86 fL) with biochemical features characteristic of anaemia of chronic disease (ACD): low serum iron, low TIBC, and elevated ferritin in the context of chronic inflammation (rheumatoid arthritis with elevated CRP). In ACD, ferritin is elevated due to it being an acute phase reactant, despite functional iron deficiency. This pattern distinguishes it from iron deficiency anaemia (where ferritin is low, TIBC is high, and serum iron is low). Vitamin B12 deficiency typically causes macrocytic anaemia. Autoimmune haemolytic anaemia would show evidence of haemolysis (reticulocytosis, elevated bilirubin/LDH). β‑thalassaemia trait shows microcytic anaemia with normal or elevated RBC count.", "image_path": "" }, { "id": 34697, "date": "2026-02-21T05:46:10+00:00", "stem": "A 64‑year‑old woman presents with progressive numbness and tingling in her feet and difficulty walking. She also reports fatigue. She has no history of alcohol misuse. Examination shows pallor, a broad‑based gait and impaired vibration sense in the lower limbs. Investigations: Hb: 82 g/L (115–155), MCV: 112 fL (80–96), Peripheral blood film: macro‑ovalocytes and hypersegmented neutrophils, Serum vitamin B₁₂: markedly low, Serum folate: normal. What is the most appropriate initial treatment?", "options": "Oral folic acid\nIntramuscular hydroxocobalamin\nOral vitamin B₁₂ tablets alone\nRed blood cell transfusion only", "answer": "Intramuscular hydroxocobalamin", "explanation": "The patient has clinical and laboratory features of vitamin B12 deficiency (megaloblastic anaemia with neurological symptoms — subacute combined degeneration of the cord). According to Therapeutic Guidelines and RACGP recommendations, initial treatment for symptomatic B12 deficiency, especially with neurological involvement, is intramuscular hydroxocobalamin. Oral B12 is not recommended initially in symptomatic or severe deficiency due to unreliable absorption. Folic acid alone can worsen neurological symptoms if given without B12. Transfusion is rarely needed and not appropriate as sole therapy.", "image_path": "" }, { "id": 34698, "date": "2026-02-21T05:46:17+00:00", "stem": "A 24‑year‑old man of Greek descent is found to be anaemic on routine screening. He is asymptomatic. There is no history of blood loss. Examination is unremarkable. Investigations: Hb: 115 g/L (130–170), MCV: 62 fL (80–96), RBC count: 6.4 × 10¹²/L (4.5–5.9), Ferritin: 120 µg/L (30–300), Serum iron: normal. What is the most likely diagnosis?", "options": "Iron deficiency anaemia\nAnaemia of chronic disease\nβ‑thalassaemia trait\nSideroblastic anaemia\nLead poisoning", "answer": "β‑thalassaemia trait", "explanation": "The key findings are microcytic anaemia (low MCV) with a normal to high RBC count and normal ferritin. This pattern is classic for β‑thalassaemia trait, which is common in individuals of Mediterranean descent. Iron deficiency typically shows low ferritin and low RBC count. Anaemia of chronic disease usually has normal or low-normal MCV and normal or low RBC count. Sideroblastic anaemia and lead poisoning can cause microcytosis but are less common and usually have other characteristic findings (e.g., basophilic stippling in lead poisoning).", "image_path": "" }, { "id": 34699, "date": "2026-02-21T05:46:28+00:00", "stem": "A 72-year-old man presents with syncope, exertional dyspnea, and angina. On examination, there is a harsh ejection systolic murmur radiating to the carotids. What is the most likely diagnosis?", "options": "Aortic stenosis\nAortic regurgitation\nMitral regurgitation\nHOCM", "answer": "Aortic stenosis", "explanation": "The classic triad of aortic stenosis is syncope, exertional dyspnea, and angina. The harsh ejection systolic murmur radiating to the carotids is characteristic. Aortic regurgitation produces an early diastolic murmur. Mitral regurgitation gives a pansystolic murmur radiating to the axilla. HOCM may have a systolic murmur but it increases with Valsalva and is not typically radiating to carotids.", "image_path": "" }, { "id": 34700, "date": "2026-02-21T05:46:37+00:00", "stem": "A 70-year-old man with atrial fibrillation is started on warfarin. After one week, his INR is 6.0 but he has no bleeding. What is the most appropriate next step?", "options": "Continue same dose\nStop warfarin and give vitamin K\nWithhold warfarin temporarily\nGive FFP", "answer": "Withhold warfarin temporarily", "explanation": "According to Therapeutic Guidelines and Australian consensus, for INR 5.0–9.0 without bleeding, management is to withhold 1–2 doses of warfarin and reduce maintenance dose when INR returns to therapeutic range. Vitamin K is not routinely indicated unless INR >9.0 or there is bleeding. FFP is reserved for major bleeding or urgent reversal.", "image_path": "" }, { "id": 34701, "date": "2026-02-21T05:46:43+00:00", "stem": "A 55-year-old man presents with severe tearing chest pain radiating to the back. Blood pressure is unequal in both arms. What is the most likely diagnosis?", "options": "Pulmonary embolism\nAortic dissection\nMI\nPericarditis", "answer": "Aortic dissection", "explanation": "Severe tearing chest pain radiating to the back and unequal blood pressure between arms are classic features of aortic dissection (commonly Stanford type A). Pulmonary embolism presents with pleuritic pain and dyspnea. MI is usually crushing, not tearing. Pericarditis pain is sharp, pleuritic, and relieved by sitting forward.", "image_path": "" }, { "id": 34702, "date": "2026-02-21T05:46:51+00:00", "stem": "A 28-year-old woman presents with syncope. On auscultation, there is a systolic murmur increasing with Valsalva maneuver. What is the most likely diagnosis?", "options": "Aortic stenosis\nHypertrophic obstructive cardiomyopathy (HOCM)\nMitral regurgitation\nPulmonary stenosis", "answer": "Hypertrophic obstructive cardiomyopathy (HOCM)", "explanation": "Syncope in a young adult with a systolic murmur that increases with Valsalva (which decreases preload and increases obstruction) is characteristic of HOCM. Aortic stenosis murmur decreases with Valsalva. Mitral regurgitation murmur may not change significantly. Pulmonary stenosis is less common and murmur may also decrease with Valsalva.", "image_path": "" }, { "id": 34703, "date": "2026-02-21T05:47:03+00:00", "stem": "A 40-year-old woman with lupus presents with pleuritic chest pain relieved by sitting forward. ECG shows diffuse ST elevation and PR depression. What is the most likely diagnosis?", "options": "Myocardial infarction\nPericarditis\nAortic dissection\nPulmonary embolism", "answer": "Pericarditis", "explanation": "Pleuritic chest pain relieved by sitting forward, in a patient with autoimmune disease (lupus), plus ECG findings of diffuse ST elevation and PR depression are diagnostic of acute pericarditis. MI shows regional ST changes. Aortic dissection presents with tearing pain. Pulmonary embolism may have pleuritic pain but not the characteristic ECG changes.", "image_path": "" }, { "id": 34704, "date": "2026-02-21T05:47:18+00:00", "stem": "A 58-year-old man presents with crushing central chest pain radiating to the left arm. ECG shows ST-segment elevation in leads II, III, and aVF. What is the most likely diagnosis?", "options": "Anterior MI\nLateral MI\nInferior MI\nPosterior MI", "answer": "Inferior MI", "explanation": "ST elevation in leads II, III, and aVF indicates an inferior wall myocardial infarction. Anterior MI shows ST elevation in V1–V4. Lateral MI in I, aVL, V5–V6. Posterior MI shows ST depression in V1–V3 with tall R waves.", "image_path": "" }, { "id": 34705, "date": "2026-02-21T05:47:26+00:00", "stem": "A 50-year-old man with long-standing hypertension presents with a displaced apex beat, basal crackles, and S3 gallop. What is the most likely diagnosis?", "options": "Right heart failure\nLeft ventricular failure\nConstrictive pericarditis\nCOPD exacerbation", "answer": "Left ventricular failure", "explanation": "Displaced apex beat (indicating left ventricular dilatation), basal crackles (pulmonary edema), and S3 gallop are classic signs of left ventricular failure, often due to hypertensive heart disease. Right heart failure presents with elevated JVP, peripheral edema, and hepatomegaly. Constrictive pericarditis has Kussmaul's sign and pericardial knock. COPD exacerbation presents with wheezing and hyperinflation.", "image_path": "" }, { "id": 34706, "date": "2026-02-21T05:47:36+00:00", "stem": "A 48-year-old man presents with hematemesis. Endoscopy reveals esophageal varices. After initial stabilization, which medication should be administered to prevent rebleeding?", "options": "Octreotide\nTerlipressin\nNon-selective beta-blocker (propranolol)\nVasopressin", "answer": "Non-selective beta-blocker (propranolol)", "explanation": "According to Australian and international guidelines (e.g., RACGP, AGA), non-selective beta-blockers (e.g., propranolol, nadolol) are first-line for secondary prevention of variceal bleeding, as they reduce portal pressure. Octreotide and terlipressin are used in acute bleeding episodes. Vasopressin is rarely used due to side effects.", "image_path": "" }, { "id": 34707, "date": "2026-02-21T05:47:44+00:00", "stem": "A 42-year-old woman presents with progressive dysphagia, heartburn, and skin tightening on the hands. Manometry shows hypotensive LES and absent peristalsis in lower esophagus. What is the most likely diagnosis?", "options": "Achalasia\nDiffuse esophageal spasm\nScleroderma\nPlummer–Vinson syndrome", "answer": "Scleroderma", "explanation": "The combination of dysphagia, heartburn (reflux), skin tightening (sclerodactyly), and manometry showing hypotensive lower esophageal sphincter (LES) and absent peristalsis is classic for scleroderma esophagus (systemic sclerosis). Achalasia shows hypertensive LES with incomplete relaxation. Diffuse esophageal spasm shows simultaneous contractions. Plummer–Vinson syndrome involves webs and iron deficiency.", "image_path": "" }, { "id": 34708, "date": "2026-02-21T05:48:02+00:00", "stem": "A 45-year-old man presents with dysphagia for solids and liquids. Manometry shows simultaneous, non-peristaltic contractions with normal LES relaxation. What is the most likely diagnosis?", "options": "Achalasia\nDiffuse esophageal spasm\nScleroderma esophagus\nPeptic stricture", "answer": "Diffuse esophageal spasm", "explanation": "Diffuse esophageal spasm is characterized by dysphagia for both solids and liquids and manometry showing simultaneous, non-peristaltic contractions with normal LES relaxation. Achalasia shows absent peristalsis and impaired LES relaxation. Scleroderma shows absent peristalsis with hypotensive LES. Peptic stricture causes mechanical obstruction, not manometric changes.", "image_path": "" }, { "id": 34709, "date": "2026-02-21T05:48:14+00:00", "stem": "A 38-year-old man presents with intermittent dysphagia, iron deficiency anemia, and glossitis. Barium swallow shows a post-cricoid web. What syndrome is most consistent with these findings?", "options": "Zenker’s diverticulum\nPlummer–Vinson syndrome\nAchalasia cardia\nSchatzki ring", "answer": "Plummer–Vinson syndrome", "explanation": "Plummer–Vinson (Paterson–Brown–Kelly) syndrome is characterized by the triad of dysphagia (due to post-cricoid web), iron deficiency anemia, and glossitis. Zenker’s diverticulum causes regurgitation. Achalasia causes dysphagia but not anemia or web. Schatzki ring is a lower esophageal ring associated with intermittent dysphagia but not typically with iron deficiency.", "image_path": "" }, { "id": 34710, "date": "2026-02-21T05:48:21+00:00", "stem": "A 32-year-old man presents with chronic diarrhea, steatorrhea, and weight loss. Biopsy of the jejunum shows villous atrophy and crypt hyperplasia. Anti-tTG antibodies are positive. What is the most likely deficiency he may develop?", "options": "Vitamin B12\nIron\nVitamin C\nVitamin K", "answer": "Iron", "explanation": "The presentation is classic for coeliac disease (positive anti-tTG, villous atrophy). Coeliac disease primarily affects the proximal small intestine, leading to iron malabsorption and iron deficiency anemia. Vitamin B12 deficiency is more common in Crohn's disease or pernicious anemia. Vitamin C and K deficiencies are less specific.", "image_path": "" }, { "id": 34711, "date": "2026-02-21T05:48:27+00:00", "stem": "A 40-year-old woman presents with recurrent upper abdominal pain and diarrhea. Fasting gastrin level is elevated, and secretin stimulation test is positive. What is the most likely diagnosis?", "options": "VIPoma\nZollinger–Ellison syndrome\nGastric carcinoma\nCarcinoid syndrome", "answer": "Zollinger–Ellison syndrome", "explanation": "Zollinger–Ellison syndrome is characterized by gastrin-secreting tumors (gastrinomas), causing recurrent peptic ulcers, abdominal pain, and diarrhea. Elevated fasting gastrin and a positive secretin stimulation test (paradoxical increase in gastrin) are diagnostic. VIPoma causes watery diarrhea. Gastric carcinoma may present with pain but not elevated gastrin. Carcinoid syndrome presents with flushing and diarrhea but not typically elevated gastrin.", "image_path": "" }, { "id": 34712, "date": "2026-02-21T05:48:34+00:00", "stem": "A 56-year-old man with a history of ulcerative colitis presents with fatigue, pruritus, and jaundice. LFTs show elevated ALP and GGT, with mild transaminitis. p-ANCA is positive, and MRCP reveals multifocal strictures and beading of intra- and extrahepatic bile ducts. What is the most likely diagnosis?", "options": "Primary biliary cholangitis\nPrimary sclerosing cholangitis\nAutoimmune hepatitis\nCholangiocarcinoma", "answer": "Primary sclerosing cholangitis", "explanation": "Primary sclerosing cholangitis (PSC) is strongly associated with inflammatory bowel disease, particularly ulcerative colitis. The classic presentation includes fatigue, pruritus, and jaundice with cholestatic liver enzymes (elevated ALP and GGT). MRCP findings of multifocal strictures and beading of bile ducts are pathognomonic. p-ANCA is positive in 65-85% of PSC cases. Primary biliary cholangitis typically affects middle-aged women with positive antimitochondrial antibodies. Autoimmune hepatitis shows predominant transaminitis. Cholangiocarcinoma may complicate PSC but presents with more rapid progression.", "image_path": "" }, { "id": 34713, "date": "2026-02-21T05:48:41+00:00", "stem": "A 55-year-old man presents with hematemesis and melena. He has a history of liver cirrhosis. What is the most likely source of bleeding?", "options": "Peptic ulcer\nEsophageal varices\nMallory-Weiss tear\nGastric cancer", "answer": "Esophageal varices", "explanation": "In patients with cirrhosis and portal hypertension, esophageal varices are the most common cause of upper GI bleeding, accounting for 50-60% of cases. Variceal bleeding is typically massive and presents with hematemesis and melena. Peptic ulcers are also common but less specifically associated with cirrhosis. Mallory-Weiss tears are usually preceded by retching. Gastric cancer typically presents with more insidious symptoms like weight loss and early satiety.", "image_path": "" }, { "id": 34714, "date": "2026-02-21T05:48:47+00:00", "stem": "A 40-year-old woman has pruritus, fatigue, and elevated ALP. Antimitochondrial antibody is positive. What is the most likely diagnosis?", "options": "Autoimmune hepatitis\nPrimary biliary cholangitis\nPrimary sclerosing cholangitis\nDrug-induced hepatitis", "answer": "Primary biliary cholangitis", "explanation": "Primary biliary cholangitis (PBC) typically affects middle-aged women with symptoms of pruritus and fatigue. Laboratory findings show cholestatic pattern with elevated alkaline phosphatase (ALP). Antimitochondrial antibody (AMA) is positive in 90-95% of PBC cases, making it highly specific. Autoimmune hepatitis shows predominant transaminitis with positive ANA/ASMA. Primary sclerosing cholangitis is associated with IBD and shows characteristic bile duct changes on imaging. Drug-induced hepatitis typically has temporal relationship with medication exposure.", "image_path": "" }, { "id": 34715, "date": "2026-02-21T05:48:54+00:00", "stem": "A 65-year-old man presents with progressive dysphagia and weight loss. Barium swallow shows a 'bird-beak' appearance. What is the most likely diagnosis?", "options": "Esophageal cancer\nAchalasia cardia\nPeptic stricture\nDiffuse esophageal spasm", "answer": "Achalasia cardia", "explanation": "Achalasia is characterized by failure of lower esophageal sphincter relaxation and absent peristalsis. The classic 'bird-beak' or 'rat-tail' appearance on barium swallow results from tapered narrowing at the gastroesophageal junction with proximal dilation. Progressive dysphagia to both solids and liquids is typical. Esophageal cancer usually shows irregular narrowing or filling defect. Peptic strictures are typically shorter and associated with reflux symptoms. Diffuse esophageal spasm shows 'corkscrew' or 'rosary bead' appearance.", "image_path": "" }, { "id": 34716, "date": "2026-02-21T05:49:02+00:00", "stem": "A 60-year-old alcoholic man presents with weight loss, jaundice, and a palpable non-tender gallbladder (Courvoisier sign). What is the most likely diagnosis?", "options": "Gallstones\nCarcinoma head of pancreas\nChronic pancreatitis\nHepatitis", "answer": "Carcinoma head of pancreas", "explanation": "Courvoisier's law states: 'If in the presence of jaundice the gallbladder is palpable, then the cause is unlikely to be gallstones.' A palpable, non-tender gallbladder (Courvoisier sign) with jaundice suggests malignant obstruction of the common bile duct, most commonly from pancreatic head carcinoma. Gallstones typically cause a shrunken, fibrotic gallbladder. Chronic pancreatitis may cause pain and pancreatic insufficiency. Hepatitis causes hepatocellular jaundice without gallbladder enlargement.", "image_path": "" }, { "id": 34717, "date": "2026-02-21T05:49:10+00:00", "stem": "A 35-year-old woman presents with right upper quadrant pain, fever, and jaundice. What is the most likely diagnosis?", "options": "Acute cholecystitis\nAcute cholangitis\nGallstone pancreatitis\nHepatitis A", "answer": "Acute cholangitis", "explanation": "Charcot's triad of right upper quadrant pain, fever, and jaundice is classic for acute cholangitis (biliary tract infection). This typically results from biliary obstruction (often from stones) with ascending infection. Acute cholecystitis presents with RUQ pain and fever but usually without jaundice unless there's common bile duct involvement. Gallstone pancreatitis presents with epigastric pain radiating to back. Hepatitis A causes prodromal symptoms before jaundice.", "image_path": "" }, { "id": 34718, "date": "2026-02-21T05:49:17+00:00", "stem": "A 30-year-old woman presents with watery diarrhea, flushing, and wheezing. What is the most likely diagnosis?", "options": "VIPoma\nCarcinoid syndrome\nMedullary thyroid carcinoma\nZollinger-Ellison syndrome", "answer": "Carcinoid syndrome", "explanation": "Carcinoid syndrome classically presents with flushing (84%), diarrhea (70%), and wheezing/bronchospasm (18%) due to secretion of serotonin and other vasoactive substances by metastatic neuroendocrine tumors, typically from midgut primaries. VIPoma causes profuse watery diarrhea (WDHA syndrome) without flushing. Medullary thyroid carcinoma may cause diarrhea from calcitonin but not flushing/wheezing. Zollinger-Ellison syndrome causes peptic ulcers and diarrhea from gastric acid hypersecretion.", "image_path": "" }, { "id": 34719, "date": "2026-02-21T05:50:54+00:00", "stem": "A 30-year-old woman with IBD presents with jaundice and elevated ALP. ERCP shows 'beading' of bile ducts. What is the most likely diagnosis?", "options": "Primary sclerosing cholangitis\nPrimary biliary cholangitis\nAutoimmune hepatitis\nCholedocholithiasis", "answer": "Primary sclerosing cholangitis", "explanation": "Primary sclerosing cholangitis (PSC) has strong association with inflammatory bowel disease (70% of cases). The characteristic ERCP finding is multifocal strictures and dilations creating a 'beaded' appearance of intra- and extrahepatic bile ducts. Patients present with cholestatic pattern (elevated ALP) and jaundice. Primary biliary cholangitis affects middle-aged women with positive AMA. Autoimmune hepatitis shows transaminitis. Choledocholithiasis shows filling defects rather than beading.", "image_path": "" }, { "id": 34722, "date": "2026-02-21T05:54:40+00:00", "stem": "A 30-year-old man presents with right lower quadrant pain, fever, and leukocytosis. What is the most appropriate next step?", "options": "CT abdomen\nMRI abdomen\nDiagnostic laparoscopy\nObservation", "answer": "CT abdomen", "explanation": "For suspected appendicitis in adults, CT abdomen with IV contrast is the most appropriate initial imaging study with sensitivity of 94% and specificity of 95%. It can confirm diagnosis, assess complications, and evaluate alternative diagnoses. MRI is reserved for pregnant patients. Diagnostic laparoscopy is therapeutic, not diagnostic. Observation without imaging may delay diagnosis of appendicitis or other surgical conditions.", "image_path": "" }, { "id": 34723, "date": "2026-02-21T05:54:46+00:00", "stem": "A 40-year-old female presents with breast pain and a tender fluctuant mass. She is febrile. What is the next step in management?", "options": "Mammogram\nNeedle aspiration of abscess\nOral antibiotics\nBreast biopsy", "answer": "Needle aspiration of abscess", "explanation": "This presentation is classic for breast abscess (fluctuant mass, pain, fever). The next step is needle aspiration for both diagnosis (Gram stain/culture) and treatment (drainage). Mammogram is not acute management and may be painful. Oral antibiotics alone are insufficient without drainage. Biopsy is for suspicious masses, not acute infective processes.", "image_path": "" }, { "id": 34724, "date": "2026-02-21T05:54:58+00:00", "stem": "A patient with a history of previous abdominal surgery presents with colicky pain and vomiting. Abdominal X-ray shows dilated loops with air-fluid levels. What is the likely diagnosis?", "options": "Large bowel obstruction\nParalytic ileus\nSmall bowel obstruction\nPerforated ulcer", "answer": "Small bowel obstruction", "explanation": "Small bowel obstruction (SBO) commonly presents with colicky abdominal pain, vomiting, and abdominal distension. History of previous abdominal surgery suggests adhesions as the most common cause (60-75% of SBO). Abdominal X-ray shows dilated small bowel loops (>3cm) with air-fluid levels and paucity of gas in colon. Large bowel obstruction shows peripheral colonic dilation. Paralytic ileus shows generalized dilation without transition point. Perforated ulcer shows free air.", "image_path": "" }, { "id": 34725, "date": "2026-02-21T05:55:09+00:00", "stem": "A 45-year-old man develops severe shoulder pain after laparoscopic cholecystectomy. What is the most likely cause?", "options": "Surgical site infection\nBile leak\nReferred diaphragmatic irritation from CO₂ insufflation\nGallstone pancreatitis", "answer": "Referred diaphragmatic irritation from CO₂ insufflation", "explanation": "Shoulder tip pain (often right) after laparoscopic surgery is classic for referred pain from diaphragmatic irritation due to residual CO₂ gas used for pneumoperitoneum. The phrenic nerve (C3-C5) innervates the diaphragm, with referred pain to shoulder (C4 dermatome). This typically resolves within 24-48 hours. Surgical site infection causes local pain. Bile leak causes peritonitis. Gallstone pancreatitis causes epigastric pain.", "image_path": "" }, { "id": 34821, "date": "2026-02-23T03:59:23+00:00", "stem": "A 28-year-old man with known haemophilia A presents to the emergency department with a painful, swollen knee after a minor fall. On examination, there is significant haemarthrosis. What is the most appropriate immediate management?", "options": "A. Aspirate the joint to relieve pressure\nB. Apply ice and compression bandage\nC. Administer intravenous factor VIII concentrate\nD. Administer tranexamic acid\nE. Administer desmopressin (DDAVP)", "answer": "C. Administer intravenous factor VIII concentrate", "explanation": "In haemophilia A (factor VIII deficiency), acute haemarthrosis requires immediate factor replacement to stop bleeding and prevent joint damage. According to Haemophilia Treatment Guidelines (e.g., Australian Haemophilia Centre Directors' Organisation), factor VIII concentrate is first-line. Joint aspiration is contraindicated before factor replacement as it can exacerbate bleeding. Ice and compression are adjuncts only. Tranexamic acid is an antifibrinolytic used as adjunctive therapy in mucosal bleeding but not first-line for haemarthrosis. Desmopressin is used in mild haemophilia A or von Willebrand disease but not severe haemophilia.", "image_path": "" }, { "id": 34830, "date": "2026-02-25T01:24:35+00:00", "stem": "A 10-year-old boy with severe haemophilia A presents with acute haemarthrosis of the right knee following a minor injury. What is the most appropriate initial step in management?", "options": "A. Perform immediate arthrocentesis to aspirate blood\nB. Administer intravenous factor VIII concentrate\nC. Administer intramuscular factor VIII concentrate\nD. Apply a compression bandage and observe\nE. Administer oral tranexamic acid", "answer": "B. Administer intravenous factor VIII concentrate", "explanation": "For acute haemarthrosis in haemophilia A, immediate factor VIII replacement is critical to stop bleeding, reduce pain, and prevent chronic arthropathy. Joint aspiration should not be performed prior to factor replacement as it may worsen bleeding. According to the World Federation of Hemophilia guidelines, factor VIII should be given intravenously (not intramuscularly) at a dose to achieve appropriate plasma levels. Compression and ice are supportive measures only. Tranexamic acid may be used as an adjunct but is not a substitute for factor replacement.", "image_path": "" }, { "id": 34831, "date": "2026-02-26T07:57:21+00:00", "stem": "A 25-year-old man presents with a left-sided scrotal swelling that is described as a 'bag of worms' on palpation. It is more prominent when standing and decreases when lying down. What is the most likely diagnosis?", "options": "A. Testicular torsion\nB. Epididymal cyst\nC. Varicocele\nD. Hydrocele\nE. Inguinal hernia", "answer": "C. Varicocele", "explanation": "Varicocele is an abnormal dilation of the pampiniform plexus of veins in the scrotum, commonly described as feeling like a 'bag of worms'. It is typically left-sided (due to anatomical drainage into the renal vein) and increases with standing/Valsalva due to venous pressure, and decreases when lying down. It is a common cause of male infertility. Testicular torsion presents with acute severe pain. Epididymal cysts are smooth, transilluminable swellings separate from the testis. Hydrocele is a fluid collection that transilluminates and does not change with position. Inguinal hernia may extend into scrotum but is reducible and has an expansile cough impulse.", "image_path": "" }, { "id": 34832, "date": "2026-02-26T08:01:02+00:00", "stem": "A 65-year-old man with a history of hypertension and diabetes presents with sudden onset of severe headache, vomiting, and left-sided weakness. CT brain shows a right basal ganglia haemorrhage. Which of the following is the most common cause of intracerebral haemorrhage in this age group?", "options": "A. Cerebral amyloid angiopathy\nB. Hypertensive vasculopathy\nC. Arteriovenous malformation\nD. Coagulopathy\nE. Tumour bleed", "answer": "B. Hypertensive vasculopathy", "explanation": "Hypertensive vasculopathy (chronic hypertension leading to lipohyalinosis and Charcot-Bouchard microaneurysms) is the most common cause of spontaneous intracerebral haemorrhage in adults, particularly in deep locations like basal ganglia, thalamus, pons, and cerebellum. Cerebral amyloid angiopathy is common in elderly normotensive patients and causes lobar haemorrhages. Arteriovenous malformations and tumours are less common causes. Coagulopathy (including anticoagulation) is an important risk factor but not the most common underlying vasculopathy. Management includes blood pressure control, reversal of coagulopathy if present, and neurosurgical evaluation for selected cases.", "image_path": "" }, { "id": 34833, "date": "2026-02-26T08:07:07+00:00", "stem": "A 45-year-old woman with epilepsy has been taking an antiepileptic drug for several years. She presents with gum hypertrophy, hirsutism, and coarse facial features. Which class of antiepileptic medication is most likely responsible?", "options": "A. Benzodiazepines\nB. Barbiturates\nC. Hydantoins\nD. Succinimides\nE. Carboxamides", "answer": "C. Hydantoins", "explanation": "Phenytoin (a hydantoin) is known to cause gingival hyperplasia/hypertrophy, hirsutism, and coarsening of facial features as long-term side effects. These effects are dose-related and more common with prolonged use. Phenytoin also causes folate deficiency, megaloblastic anaemia, peripheral neuropathy, and osteomalacia. Benzodiazepines (e.g., clonazepam) cause sedation and dependence. Barbiturates (e.g., phenobarbital) cause sedation and cognitive effects. Succinimides (e.g., ethosuximide) are used for absence seizures and can cause GI upset and blood dyscrasias. Carboxamides (e.g., carbamazepine) cause hyponatraemia, rash, and blood dyscrasias.", "image_path": "" }, { "id": 34834, "date": "2026-02-26T08:10:21+00:00", "stem": "A 70-year-old man with a history of multiple strokes presents with difficulty identifying objects by touch despite normal sensation. He can describe the size and texture but cannot name the object. This deficit is most likely due to a lesion in which area?", "options": "A. Primary somatosensory cortex\nB. Parietal association cortex (specifically supramarginal gyrus)\nC. Occipital lobe\nD. Frontal lobe\nE. Thalamus", "answer": "B. Parietal association cortex (specifically supramarginal gyrus)", "explanation": "Astereognosis (inability to identify objects by touch) with preserved basic sensation (touch, pressure, vibration) indicates a cortical sensory deficit, typically from a lesion in the parietal association cortex, particularly the supramarginal gyrus of the dominant hemisphere. This area integrates tactile information with memory to recognise objects. Primary somatosensory cortex (postcentral gyrus) lesions cause loss of basic sensation. Occipital lesions cause visual deficits. Frontal lesions affect executive function. Thalamic lesions can cause sensory loss or pain syndromes. This is distinct from agnosia (e.g., visual agnosia from occipitotemporal lesions).", "image_path": "" }, { "id": 34835, "date": "2026-02-26T08:11:44+00:00", "stem": "A 30-year-old woman presents with malar rash, photosensitivity, oral ulcers, and polyarthralgia. Laboratory tests show positive antinuclear antibody (ANA), anti-dsDNA antibodies, and low complement levels. Which of the following autoantibodies is most specific for this condition?", "options": "A. Anti-Ro/SSA\nB. Anti-La/SSB\nC. Anti-Smith (anti-Sm)\nD. Anti-ribonucleoprotein (anti-RNP)\nE. Anti-histone", "answer": "C. Anti-Smith (anti-Sm)", "explanation": "Anti-Smith (anti-Sm) antibody is highly specific for systemic lupus erythematosus (SLE), though not very sensitive (~30%). The clinical presentation with malar rash, photosensitivity, oral ulcers, arthralgia, positive ANA, anti-dsDNA, and low complement is classic for SLE. Anti-dsDNA is also specific and correlates with disease activity and lupus nephritis. Anti-Ro/SSA and anti-La/SSB are associated with Sjögren's syndrome and neonatal lupus. Anti-RNP is seen in mixed connective tissue disease. Anti-histone is associated with drug-induced lupus. Diagnosis of SLE requires meeting classification criteria (e.g., 2019 EULAR/ACR criteria).", "image_path": "" }, { "id": 34836, "date": "2026-02-26T10:02:44+00:00", "stem": "A 55-year-old man presents with progressive shortness of breath, orthopnoea, and paroxysmal nocturnal dyspnoea. Echocardiography shows left ventricular ejection fraction of 30%, dilated left ventricle, and global hypokinesis. There is no history of coronary artery disease. Which of the following is the most likely diagnosis?", "options": "A. Dilated cardiomyopathy\nB. Hypertrophic cardiomyopathy\nC. Restrictive cardiomyopathy\nD. Ischaemic cardiomyopathy\nE. Alcoholic cardiomyopathy", "answer": "A. Dilated cardiomyopathy", "explanation": "Dilated cardiomyopathy (DCM) is characterised by dilation and systolic dysfunction of the left ventricle (or both ventricles) in the absence of abnormal loading conditions (e.g., hypertension, valve disease) or coronary artery disease sufficient to cause global systolic impairment. Presentation includes heart failure symptoms. Echocardiography shows LV dilation, reduced ejection fraction, and global hypokinesis. Hypertrophic cardiomyopathy shows asymmetric septal hypertrophy and preserved EF. Restrictive cardiomyopathy shows normal LV size and function but impaired filling. Ischaemic cardiomyopathy would have evidence of CAD. Alcoholic cardiomyopathy is a subtype of DCM but requires history of significant alcohol use.", "image_path": "" }, { "id": 34837, "date": "2026-02-26T10:07:44+00:00", "stem": "A 70-year-old woman presents with a painful vesicular rash in the T4 dermatomal distribution. The rash began 3 days ago. She is otherwise well. What is the most appropriate management?", "options": "A. Oral acyclovir for 7 days\nB. Topical acyclovir cream\nC. Oral valaciclovir for 7 days\nD. Oral famciclovir for 7 days\nE. Supportive care only as >72 hours since onset", "answer": "C. Oral valaciclovir for 7 days", "explanation": "For herpes zoster (shingles) presenting within 72 hours of rash onset in an immunocompetent patient, antiviral therapy (acyclovir, valaciclovir, or famciclovir) is recommended to reduce duration of symptoms and risk of complications like postherpetic neuralgia. Valaciclovir (1000 mg TDS for 7 days) or famciclovir are preferred due to better bioavailability and simpler dosing than acyclovir (800 mg 5 times daily). Treatment is still recommended after 72 hours if new vesicles are forming, in ophthalmic zoster, or in immunocompromised/elderly patients. Topical antivirals are ineffective. Supportive care alone increases risk of complications.", "image_path": "" }, { "id": 34856, "date": "2026-03-03T13:30:02+00:00", "stem": "A 22-year-old lady came for certification for part time job. She had diarrhoea and fever 2-3 days ago and other some people in that area suffering same symptoms and test Salmonella. What should you ask for intervention?", "options": "What is her part time job\nRecent history of school excursion\nInjection adenosine\nCarotid message\nInjection lignocaine", "answer": "What is her part time job", "explanation": "This question addresses public health management of a Salmonella outbreak. According to Australian public health guidelines (CDNA National Guidelines for Public Health Units), when investigating a Salmonella outbreak, it's crucial to identify potential sources of infection. The patient's part-time job is highly relevant as she may work in food handling, childcare, healthcare, or aged care - all high-risk settings where she could transmit infection to vulnerable populations. This information determines whether she needs exclusion from work and what public health interventions are required. The other options are irrelevant: school excursion might be relevant for other outbreaks but less specific here; adenosine, carotid massage, and lignocaine are treatments for cardiac arrhythmias, not relevant to Salmonella infection management.", "image_path": "" }, { "id": 34857, "date": "2026-03-03T13:31:07+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "Ondansetron\nMethylprednisolone\nFolic acid\nPotassium chloride\nThiamine", "answer": "Thiamine", "explanation": "This question addresses the management of hyperemesis gravidarum with significant malnutrition. According to RANZCOG and Therapeutic Guidelines, thiamine (vitamin B1) MUST be administered before dextrose infusion in severely malnourished patients to prevent Wernicke's encephalopathy. Dextrose administration without thiamine can precipitate acute thiamine deficiency in patients with depleted stores, leading to this neurological emergency characterized by confusion, ataxia, and ophthalmoplegia. The patient's significant weight loss (4 kg in 3 weeks), ketonuria, and inability to eat indicate high risk. Other options: ondansetron is an antiemetic already considered; methylprednisolone is reserved for refractory cases; folic acid is important for neural tube development but not urgent here; potassium chloride may be needed for hypokalemia but doesn't prevent Wernicke's.", "image_path": "" }, { "id": 34858, "date": "2026-03-03T13:31:28+00:00", "stem": "A 42-year-old woman presents with progressive dyspnea. Physical examination shows decreased breath sounds and dullness to percussion over the right lower lung field. Chest x-ray shows a large right-sided pleural effusion that occupies approximately 60% of the hemithorax. The patient is hemodynamically stable. Therapeutic thoracentesis with removal of 1.6 L of straw-colored fluid is performed. Shortly after the procedure, the patient develops a cough and chest discomfort, and oxygen saturation drops to 88% on room air. What is the most likely complication?", "options": "A. Pneumothorax\nB. Pulmonary edema\nC. Hemothorax\nD. Pleuritis\nE. Pleural empyema", "answer": "B. Pulmonary edema", "explanation": "This scenario describes re-expansion pulmonary edema (RPE), a rare but potentially life-threatening complication of large-volume thoracentesis. RPE typically occurs when a large volume of pleural fluid (>1.5 L) is rapidly removed from a chronically collapsed lung. The pathophysiology involves increased capillary permeability in the re-expanded lung due to mechanical stress and reperfusion injury. Symptoms include cough, chest discomfort, hypoxemia, and occasionally pink frothy sputum. Risk factors include removal of >1.5 L of fluid, chronic effusion (>3 days), and complete lung collapse. Preventive measures include stopping the procedure if the patient develops chest discomfort or cough, and limiting initial drainage to 1-1.5 L. Management is supportive with oxygen and sometimes diuretics, though diuretics are controversial.", "image_path": "" }, { "id": 34859, "date": "2026-03-03T13:32:50+00:00", "stem": "A 34-year-old Aboriginal woman attends for cervical cancer screening follow-up. One year ago, her cervical screening test detected **high-risk HPV (non-16/18 types)** with **negative cytology**. She is asymptomatic. A repeat test performed now again detects **HPV non-16/18**, with no cytological abnormalities. What is the **most appropriate next step**?", "options": "a. Refer immediately for colposcopy\nb. Return to 5-yearly routine screening\nc. Perform HPV genotyping\nd. Repeat HPV testing in 12 months\ne. Perform excisional biopsy", "answer": "a. Refer immediately for colposcopy", "explanation": "According to the Australian National Cervical Screening Program (NCSP) guidelines, persistent detection of any oncogenic HPV (including non-16/18 types) at 12-month follow-up warrants referral for colposcopy, regardless of cytology results. The pathway is: Initial test → HPV (non-16/18) positive, cytology negative → Repeat test in 12 months. If the repeat test is again positive for any oncogenic HPV (even with negative cytology), refer to colposcopy. This is because persistent HPV infection is the key risk factor for developing high-grade cervical intraepithelial neoplasia (CIN 2/3). Aboriginal and Torres Strait Islander women have higher rates of cervical cancer and mortality, so following guidelines precisely is crucial.", "image_path": "" }, { "id": 34864, "date": "2026-03-03T13:44:10+00:00", "stem": "A 29-year-old woman has a cervical screening test showing **HPV 16 detected** with negative cytology. She is asymptomatic. What is the most appropriate next step?", "options": "a. Repeat HPV test in 12 months\nb. Refer for colposcopy\nc. Repeat cytology in 6 weeks\nd. Return to routine 5-year screening\ne. Perform excisional biopsy", "answer": "b. Refer for colposcopy", "explanation": "Per Australian NCSP guidelines, detection of HPV 16 or 18 (the highest-risk genotypes) on a primary screening test is an immediate trigger for referral to colposcopy, irrespective of the cytology result. This is due to the strong association of HPV 16/18 with the development of high-grade lesions and cervical cancer. The pathway bypasses the 12-month repeat test that is used for other oncogenic HPV types (non-16/18). Therefore, the correct management is direct referral.", "image_path": "" }, { "id": 34865, "date": "2026-03-03T13:44:39+00:00", "stem": "**A 37-year-old woman has HPV (non-16/18) detected with low-grade squamous intraepithelial lesion (LSIL) on cytology. What is the next step?**", "options": "a. Repeat HPV test in 12 months\nb. Refer for colposcopy\nc. Return to routine screening\nd. Perform cone biopsy\ne. HPV vaccination", "answer": "b. Refer for colposcopy", "explanation": "According to NCSP guidelines, any oncogenic HPV-positive result with ANY cytological abnormality (including LSIL, ASC-US, ASC-H, HSIL) warrants immediate referral for colposcopy. LSIL cytology in the presence of oncogenic HPV indicates a higher risk of underlying high-grade pathology than HPV-positive/cytology-negative results. Therefore, the patient should be referred directly for colposcopic assessment. Cone biopsy (d) is a treatment, not a first-line diagnostic step. HPV vaccination (e) is for prevention, not management of current infection.", "image_path": "" }, { "id": 34866, "date": "2026-03-03T13:44:52+00:00", "stem": "A 45-year-old woman has HPV (non-16/18) detected with negative cytology on her first screening test. What is the most appropriate management?", "options": "a. Immediate colposcopy\nb. Repeat HPV test in 12 months\nc. Repeat cytology in 6 months\nd. Return to 5-year screening\ne. Hysterectomy", "answer": "b. Repeat HPV test in 12 months", "explanation": "For a first-ever cervical screening test showing oncogenic HPV (non-16/18 types) with negative cytology, the recommended management is conservative surveillance. The Australian NCSP guidelines advise repeating the HPV test in 12 months. Most of these infections will clear spontaneously. Immediate colposcopy is not indicated. If the repeat test at 12 months is negative for oncogenic HPV, the patient can return to routine 5-yearly screening. If it remains positive, then referral for colposcopy is required.", "image_path": "" }, { "id": 34867, "date": "2026-03-03T13:45:05+00:00", "stem": "A 40-year-old woman had HPV (non-16/18) detected with negative cytology 12 months ago. Repeat testing now shows HPV not detected. Next step?", "options": "a. Colposcopy\nb. Repeat test in 12 months\nc. Return to routine 5-year screening\nd. Cone biopsy\ne. Annual cytology", "answer": "c. Return to routine 5-year screening", "explanation": "This follows the standard NCSP management pathway. The initial positive HPV (non-16/18) with negative cytology warranted a repeat test in 12 months. The clearance of the virus (HPV not detected) on the follow-up test indicates the infection has resolved. The patient therefore has a very low immediate risk of significant cervical pathology and should return to the routine 5-yearly screening interval. No further intervention or shortened surveillance is needed.", "image_path": "" }, { "id": 34868, "date": "2026-03-03T13:45:20+00:00", "stem": "A 33-year-old Aboriginal woman has HPV 16 detected and high-grade squamous intraepithelial lesion (HSIL) on cytology. What is the most appropriate next step?", "options": "a. Repeat HPV in 12 months\nb. Immediate colposcopy\nc. Repeat cytology in 6 weeks\nd. Return to screening\ne. Observation only", "answer": "b. Immediate colposcopy", "explanation": "This combination (HPV 16 + HSIL cytology) represents the highest risk finding in cervical screening. HPV 16 alone mandates colposcopy. HSIL cytology with any oncogenic HPV also mandates colposcopy. Therefore, immediate colposcopic assessment is unequivocally required. For Aboriginal and Torres Strait Islander women, who are a priority population due to higher burden of disease, timely and appropriate follow-up is especially critical. Delay (options a, c, e) or discharge to screening (d) would be inappropriate and potentially dangerous.", "image_path": "" }, { "id": 34889, "date": "2026-03-03T15:18:35+00:00", "stem": "A 55-year-old woman with rheumatoid arthritis, currently managed with methotrexate 15 mg weekly, presents to her general practitioner after a household contact developed a herpes zoster rash on the trunk two days ago. She has no history of chickenpox or shingles and is concerned about her risk of infection given her immunosuppressive therapy. What is the most appropriate next step to prevent varicella-zoster virus infection?", "options": "A. Administer varicella-zoster immune globulin\nB. Reassure that no action is required\nC. Order varicella-zoster virus IgG serology\nD. Administer the varicella vaccine\nE. Commence oral aciclovir prophylactically", "answer": "A. Administer varicella-zoster immune globulin", "explanation": "According to Australian guidelines (Therapeutic Guidelines, RACGP), varicella-zoster immune globulin (VZIG) is indicated for post-exposure prophylaxis in immunocompromised individuals (including those on methotrexate) with significant exposure to varicella or herpes zoster, regardless of their history. This patient is on methotrexate (an immunosuppressant) and has had close contact with an active case. VZIG should be administered within 96 hours of exposure to reduce the risk of severe infection. Serology (option C) is not appropriate as it delays time-sensitive prophylaxis. Varicella vaccine (option D) is contraindicated in immunocompromised patients. Aciclovir prophylaxis (option E) is not the standard first-line post-exposure prophylaxis in this context.", "image_path": "" }, { "id": 34891, "date": "2026-03-03T15:26:50+00:00", "stem": "A 56-year old lady is brought to the emergency department by an ambulance. She developed right leg weakness and left sided facial droop an hour ago. She has past medical history of hypertension, hyperlipidemia and peptic ulcer disease (GI bleeding two weeks ago). On examination, her blood pressure is 130/85mmHg, respiratory rate is 18 breaths per minute, heart rate is 110 beats per minutes and oxygen saturation is 100% at room air. On the neurological examination, she is found to have hypertonia and reduced power in the right leg, and right-sided facial palsy. The Babinski sign is positive. CT scan of the brain does not show any evidence of an intracranial bleed. ECG shows sinus rhythm. Which of the following is the most appropriate therapy for this patient?", "options": "A. Heparin\nB. Warfarin\nC. Clopidogrel\nD. Aspirin\nE. Thrombolysis", "answer": "D. Aspirin", "explanation": "This patient presents with an acute ischemic stroke (left-sided facial droop and right leg weakness indicate a right-sided upper motor neuron lesion, likely from a left middle cerebral artery territory infarct). The key contraindication here is the recent GI bleeding (two weeks ago), which is a major contraindication for thrombolysis (option E) and anticoagulants like heparin (option A) or warfarin (option B). According to stroke management guidelines (e.g., Australian Clinical Guidelines for Stroke Management), antiplatelet therapy (aspirin) is the first-line treatment for acute ischemic stroke when thrombolysis is contraindicated. Aspirin 150-300 mg should be given as soon as possible after a non-hemorrhagic stroke is confirmed by CT. Clopidogrel (option C) is not typically used as monotherapy in the acute setting unless there's a specific indication like aspirin allergy.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 29-year-old woman has a cervical screening test showing **HPV 16 detected** with negative cytology. She is asymptomatic. What is the most appropriate next step?", "options": "Repeat HPV test in 12 months\nRefer for colposcopy\nRepeat cytology in 6 weeks\nReturn to routine 5-year screening\nPerform excisional biopsy", "answer": "Refer for colposcopy", "explanation": "According to the Australian National Cervical Screening Program guidelines, detection of HPV types 16 or 18 warrants immediate referral for colposcopy, regardless of cytology results. This is because HPV 16 and 18 are the highest-risk oncogenic types, responsible for approximately 70% of cervical cancers. Even with negative cytology, these genotypes carry significant risk for underlying high-grade cervical intraepithelial neoplasia (CIN2/3).", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 37-year-old woman has HPV (non-16/18) detected with low-grade squamous intraepithelial lesion (LSIL) on cytology. What is the next step?", "options": "Repeat HPV test in 12 months\nRefer for colposcopy\nReturn to routine screening\nPerform cone biopsy\nHPV vaccination", "answer": "Refer for colposcopy", "explanation": "Australian guidelines recommend referral for colposcopy when any cytological abnormality (including LSIL) is detected alongside HPV (non-16/18). LSIL represents possible CIN1, and combined with HPV positivity, indicates active infection with risk of progression. Colposcopy allows visual assessment and targeted biopsy if indicated.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 45-year-old woman has HPV (non-16/18) detected with negative cytology on her first screening test. What is the most appropriate management?", "options": "Immediate colposcopy\nRepeat HPV test in 12 months\nRepeat cytology in 6 months\nReturn to 5-year screening\nHysterectomy", "answer": "Repeat HPV test in 12 months", "explanation": "For HPV (non-16/18) with negative cytology, the recommended management is repeat HPV testing in 12 months. Most HPV infections are transient and clear spontaneously within 12-24 months. This approach balances sensitivity for persistent infection (which carries higher cancer risk) with avoidance of unnecessary procedures for likely self-resolving infections.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 40-year-old woman had HPV (non-16/18) detected with negative cytology 12 months ago. Repeat testing now shows **HPV not detected**. Next step?", "options": "Colposcopy\nRepeat test in 12 months\nReturn to routine 5-year screening\nCone biopsy\nAnnual cytology", "answer": "Return to routine 5-year screening", "explanation": "Clearance of HPV infection (HPV not detected on repeat testing) indicates the infection has resolved. According to Australian guidelines, such patients can safely return to routine 5-yearly screening. This reflects the understanding that cleared infections no longer pose immediate cervical cancer risk.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 33-year-old Aboriginal woman has HPV 16 detected and high-grade squamous intraepithelial lesion (HSIL) on cytology. What is the most appropriate next step?", "options": "Repeat HPV in 12 months\nImmediate colposcopy\nRepeat cytology in 6 weeks\nReturn to screening\nObservation only", "answer": "Immediate colposcopy", "explanation": "The combination of HPV 16 (highest-risk genotype) with HSIL cytology represents the highest risk scenario for underlying CIN2/3 or invasive cancer. Immediate colposcopy is mandatory. Aboriginal and Torres Strait Islander women have higher cervical cancer incidence and mortality, making prompt assessment even more critical.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 50-year-old woman who has never been screened has HPV (non-16/18) with negative cytology. What is the next step?", "options": "Immediate colposcopy\nRepeat HPV in 12 months\nReturn in 5 years\nPerform excisional biopsy\nHPV genotyping", "answer": "Repeat HPV in 12 months", "explanation": "Management is based on current test results, not screening history. The same algorithm applies: HPV (non-16/18) with negative cytology → repeat HPV test in 12 months. This approach is evidence-based regardless of prior screening status.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 38-year-old woman has persistent HPV (non-16/18) with negative cytology at baseline and again at 12 months. Next step?", "options": "Return to routine screening\nRepeat HPV in another 12 months\nRefer for colposcopy\nExcisional biopsy\nCytology in 6 weeks", "answer": "Refer for colposcopy", "explanation": "Persistent HPV infection (detected at both baseline and 12-month follow-up) warrants colposcopic assessment, even with negative cytology. Persistent infection is a key risk factor for progression to high-grade lesions. Cytology has limited sensitivity, and colposcopy allows direct visualization of potentially subtle abnormalities.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 35-year-old woman has HPV not detected and negative cytology. Next step?", "options": "Colposcopy\nRepeat in 12 months\nRoutine 5-year screening\nAnnual cytology\nBiopsy", "answer": "Routine 5-year screening", "explanation": "A negative co-test (HPV not detected AND negative cytology) confers the lowest possible risk of cervical cancer. Australian guidelines recommend returning to routine 5-yearly screening intervals in this scenario. The negative predictive value of this combination exceeds 99%.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 42-year-old woman has HPV 18 detected with negative cytology. Next step?", "options": "Repeat HPV in 12 months\nColposcopy\nRepeat cytology in 6 months\nReturn to 5-year screening\nCone biopsy immediately", "answer": "Colposcopy", "explanation": "HPV 18, like HPV 16, is a highest-risk genotype that warrants immediate colposcopy regardless of cytology results. HPV 18 is particularly associated with adenocarcinoma, which may not be detected by cytology alone. Prompt assessment is essential.", "image_path": "" }, { "id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 30-year-old woman has HPV (non-16/18) detected with HSIL on cytology. Next step?", "options": "Repeat in 12 months\nColposcopy\nRoutine screening\nObservation\nHPV vaccination", "answer": "Colposcopy", "explanation": "Any high-grade cytological abnormality (HSIL) requires urgent colposcopic assessment, regardless of HPV subtype. HSIL correlates strongly with underlying CIN2/3. The HPV result provides additional risk stratification but doesn't change the need for colposcopy when HSIL is present.", "image_path": "" }, { "id": 34953, "date": "2026-03-05T08:45:26+00:00", "stem": "A 72-year-old woman has the abrupt onset of right face and hand weakness, disturbed speech production, and a right homonymous hemianopsia. This is most likely attributable to occlusion of which of the following arteries?", "options": "A. Left middle cerebral artery\nB. Left anterior cerebral artery\nC. Left vertebrobasilar artery\nD. Right anterior choroidal artery\nE. Left posterior inferior cerebellar artery (PICA)", "answer": "A. Left middle cerebral artery", "explanation": "The clinical presentation of right-sided face and hand weakness (upper motor neuron pattern), disturbed speech production (likely Broca's or global aphasia), and right homonymous hemianopsia localizes to the left hemisphere. Specifically, this combination of motor, language, and visual field deficits points to occlusion of the left middle cerebral artery (MCA). The MCA supplies the lateral surface of the cerebral hemisphere, including the primary motor and sensory cortices for the face and upper extremity, Broca's area (inferior frontal gyrus) in the dominant hemisphere, and the optic radiations (Meyer's loop) which, when damaged, cause contralateral homonymous hemianopsia. Anterior cerebral artery (ACA) occlusion typically affects the leg more than the face/hand. Vertebrobasilar artery occlusion causes brainstem or cerebellar signs. Anterior choroidal artery occlusion can cause hemiparesis and hemianopsia but typically spares language. PICA occlusion causes lateral medullary syndrome.", "image_path": "" }, { "id": 34954, "date": "2026-03-05T08:45:44+00:00", "stem": "A 65-year-old woman comes to the physician complaining of periodic headaches in the temporal region, visual disturbances, and neck stiffness. Appropriate empiric medical therapy is initiated, and biopsy of a scalp artery confirms giant cell arteritis. The patient is very compliant with treatment. She comes to the physician 6 months later with slowly progressive muscle weakness. Her headaches have resolved, but she has difficulty climbing stairs and getting up from a chair. Her blood pressure is 120/70 mm Hg, pulse is 82/min, and respirations are 12/min. Physical examination shows 4/5 muscle power in her proximal lower extremities bilaterally. Her serum creatine kinase level and erythrocyte sedimentation rate are normal. Which of the following is the most likely cause of this patient’s current complaints?", "options": "A. Drug-induced myopathy\nB. Inflammatory myositis\nC. Mononeuritis multiplex\nD. Multiple sclerosis\nE. Neuromuscular junction disease", "answer": "A. Drug-induced myopathy", "explanation": "The patient has giant cell arteritis (GCA), for which high-dose corticosteroids (e.g., prednisolone) are the cornerstone of treatment. After 6 months of compliance, she presents with proximal muscle weakness (difficulty climbing stairs, getting up from a chair), normal creatine kinase (CK), and normal ESR. This pattern is classic for steroid-induced myopathy. Steroid myopathy typically presents with proximal muscle weakness, normal CK (distinguishing it from inflammatory myopathies like polymyositis), and normal ESR (suggesting the GCA is controlled). Inflammatory myositis (B) would typically have elevated CK. Mononeuritis multiplex (C) presents with asymmetric sensory and motor deficits in specific nerve distributions. Multiple sclerosis (D) causes CNS deficits with relapsing-remitting course. Neuromuscular junction disease (E) like myasthenia gravis causes fatigable weakness, often with ocular/bulbar involvement.", "image_path": "" }, { "id": 34956, "date": "2026-03-05T08:46:19+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E. Neurocysticercosis", "explanation": "The presentation of seizures, confusion, and multiple cystic lesions in the cerebral cortex on MRI in a young adult is highly suggestive of neurocysticercosis, caused by the larval stage of the pork tapeworm Taenia solium. The additional findings of periorbital swelling (possibly from cysticercosis in ocular muscles or subcutaneous tissues) and testicular tenderness (may indicate cysticercosis in other tissues) support a disseminated parasitic infection. Cerebral metastases (A) are unlikely in an 18-year-old without a known primary malignancy. Progressive multifocal leukoencephalopathy (B) causes demyelinating lesions in immunocompromised patients. Cerebral vasculitis (C) typically presents with stroke-like deficits, not multiple cysts. Neurosyphilis (D) can cause various neurological manifestations but not typically multiple well-defined cortical cysts.", "image_path": "photo_2026-03-05_08-46-19.jpg" }];
        let questions = [];
        let currentIndex = 0;


        async function init() {
            try {
                // Data is now embedded directly to bypass CORS
                questions = questionsData;
                document.getElementById('total-count').innerText = questions.length;

                // Load saved progress
                const savedIndex = localStorage.getItem('amc_study_index');
                if (savedIndex !== null) {
                    currentIndex = parseInt(savedIndex, 10);
                    // Boundary check
                    if (currentIndex >= questions.length) currentIndex = 0;
                }

                renderQuestion();
            } catch (e) {
                console.error("Data load failed", e);
                document.getElementById('question-stem').innerText = "加载失败。";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[currentIndex];

            // Stats & Progress
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

            // Save progress
            localStorage.setItem('amc_study_index', currentIndex);

            // Reset UI
            document.getElementById('question-stem').innerText = q.stem;
            document.getElementById('explanation-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';


            // Options
            const options = q.options.split('\n');
            options.forEach(opt => {
                if (!opt.trim()) return;
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 transition-all text-slate-700 font-medium group";
                btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-lg bg-slate-100 group-hover:bg-blue-200 text-center leading-8 mr-4 text-sm font-bold text-slate-500 group-hover:text-blue-600 transition-all">&#8226;</span> ${opt}`;
                btn.onclick = () => selectOption(btn, opt, q.answer, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct, explanation) {
            // Check correct answer (fuzzy match)
            const isCorrect = selected.toLowerCase().includes(correct.toLowerCase()) ||
                correct.toLowerCase().includes(selected.toLowerCase());

            // Style all buttons
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.innerText.toLowerCase().includes(correct.toLowerCase())) {
                    b.classList.add('answer-correct');
                }
            });

            if (!isCorrect) {
                btn.classList.add('answer-wrong');
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = explanation;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Scroll to explanation
            setTimeout(() => {
                document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function exportProgress() {
            const label = prompt('📤 给你的进度起个名字（任意字符）：', 'mycode');
            if (!label) return;
            const safe = label.trim().replace(/[^a-zA-Z0-9\u4e00-\u9fa5_]/g, '');
            if (!safe) { alert('⚠️ 名字不能为空。'); return; }
            const code = safe + '-' + (currentIndex + 1);
            prompt('✅ 你的进度码（记住它，在其他设备上导入）：', code);
        }

        function importProgress() {
            const input = prompt('📥 输入你的进度码（如 mycode-87）：');
            if (!input) return;
            const trimmed = input.trim();
            // Parse: anything ending in -<number>
            const match = trimmed.match(/-(\d+)$/);
            if (match) {
                const num = parseInt(match[1], 10);
                if (num >= 1 && num <= questions.length) {
                    currentIndex = num - 1;
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    alert(`✅ 已跳转到第 ${num} 题。`);
                    return;
                }
            }
            // Fallback: pure number
            const num = parseInt(trimmed, 10);
            if (!isNaN(num) && num >= 1 && num <= questions.length) {
                currentIndex = num - 1;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert(`✅ 已跳转到第 ${num} 题。`);
            } else {
                alert(`⚠️ 无法识别。请输入正确的进度码（如 mycode-87）。`);
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        init();
    </script>
