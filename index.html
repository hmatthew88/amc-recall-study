    <script>
        const questionsData = [{"id": 34160, "date": "2026-01-20T13:51:31+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "### ✅ Correct Answer: A. Uterine rupture\n\n**Clinical Reasoning:**\n1. **Patient Profile:** Multiparous woman (gravida 3, para 2) is a classic risk factor for uterine rupture, especially with a history of prior cesarean sections (though not explicitly stated, the parity suggests possible prior uterine surgery).\n2. **Presenting Symptoms:** Sudden, severe abdominal pain during labor followed by abrupt cessation of contractions is a hallmark of uterine rupture. The uterus loses its ability to contract effectively.\n3. **Hemodynamic Instability:** Hypotension (BP 92/58) and tachycardia (P 124) indicate hypovolemic shock from intra-abdominal bleeding, which is common with uterine rupture.\n4. **Physical Exam Findings:** The change in fetal station with the presenting part no longer engaged is a pathognomonic sign of uterine rupture. The fetus or part of it may extrude into the abdominal cavity.\n5. **Fetal Status:** Persistent fetal bradycardia indicates acute fetal hypoxia/distress due to compromised placental blood flow or direct fetal compromise.\n6. **Vaginal Bleeding:** Minimal vaginal bleeding is typical as most bleeding is concealed intra-abdominally.\n\n**Management Pearl:** Uterine rupture is an obstetric emergency requiring immediate laparotomy, delivery of the fetus, and repair of the rupture or hysterectomy.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa:** Presents with painless vaginal bleeding and fetal bradycardia or decelerations following rupture of fetal vessels, typically during rupture of membranes. It does not cause cessation of contractions, severe maternal pain, or change in fetal station.\n- **C. Amniotic fluid embolism:** Presents with sudden cardiovascular collapse, hypoxia, and coagulopathy (DIC), often during or shortly after delivery. It is not characterized by a change in fetal station or abdominal pain; contractions may continue.\n- **D. Placental abruption:** Presents with painful, tender uterus, often with dark vaginal bleeding and fetal distress. Contractions typically continue (may become hypertonic), and there is no change in fetal station.\n- **E. Cord prolapse:** Presents with sudden fetal bradycardia/decelerations, especially after rupture of membranes, with a palpable cord on vaginal exam. Maternal pain and hemodynamic instability are not features.\n\n### 📚 Relevant Guidelines\n- **RANZCOG (Royal Australian and New Zealand College of Obstetricians and Gynaecologists) - Management of Uterine Rupture:** Provides guidance on diagnosis and management of uterine rupture, including risk factors and emergency surgical intervention. — https://ranzcog.edu.au/womens-health/guidelines/obstetric-emergencies\n- **Therapeutic Guidelines (eTG) - Obstetrics:** Covers the management of obstetric emergencies including uterine rupture. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Obstetrics&frompage=etg\n- **UpToDate - Uterine Rupture:** Detailed review of pathogenesis, clinical features, diagnosis, and management. — https://www.uptodate.com/contents/uterine-rupture-after-previous-cesarean-delivery", "image_path": ""}, {"id": 34161, "date": "2026-01-20T13:52:26+00:00", "stem": "**A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?**", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis", "explanation": "### ✅ Correct Answer: B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\n\n**Clinical Reasoning:**\n1. **Step 1: Assess the pH.** pH 7.34 indicates acidaemia.\n2. **Step 2: Assess the primary process.** Bicarbonate (HCO3-) is 20 mEq/L (low, normal ~24), indicating a metabolic acidosis.\n3. **Step 3: Calculate the Anion Gap (AG).** AG = Na - (Cl + HCO3) = 140 - (98 + 20) = 22. A normal AG is 8-12 mEq/L (or adjusted for albumin: normal AG ~ 2.5 x [albumin g/dL] = 7.5 for this patient). An AG of 22 indicates a high anion gap metabolic acidosis (HAGMA).\n4. **Step 4: Apply the Delta-Delta (ΔΔ) ratio to check for a mixed disorder.**\n   - ΔAG = Measured AG - Normal AG = 22 - 12 = 10 (using standard normal AG 12).\n   - ΔHCO3 = Normal HCO3 - Measured HCO3 = 24 - 20 = 4.\n   - ΔΔ ratio = ΔAG / ΔHCO3 = 10 / 4 = 2.5.\n   - **Interpretation:** In a simple HAGMA, for every 1 mEq/L increase in AG, HCO3 should decrease by ~1 mEq/L (ΔΔ ratio ~1). A ratio >1.5 suggests a concomitant metabolic alkalosis (because the HCO3 is higher than expected for the degree of AG increase). Here, the ratio of 2.5 strongly indicates a mixed HAGMA and metabolic alkalosis.\n5. **Step 5: Assess respiratory compensation.** Using Winter's formula for expected PCO2 in metabolic acidosis: Expected PCO2 = (1.5 x HCO3) + 8 ± 2 = (1.5*20)+8 = 38. The measured PCO2 is 38 mm Hg, which matches perfectly. This indicates appropriate respiratory compensation, not a primary respiratory disorder.\n6. **Clinical Correlation:** The patient has CKD (cause for HAGMA from retained acids) and presents with vomiting (cause for metabolic alkalosis from loss of gastric acid). Dehydration and pre-renal azotemia (high BUN:Cr ratio) are also present.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis:** Incorrect because the PCO2 is 38 mm Hg, which is the *expected* compensatory response, not an inappropriately high PCO2 indicating a primary respiratory acidosis.\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation:** Incorrect because the pH is acidic, not alkaline, and there is a clear high anion gap.\n- **D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation:** Incorrect because the ΔΔ ratio analysis reveals a concomitant metabolic alkalosis, making it a mixed disorder, not simple.\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis:** Incorrect because the PCO2 is not low for the degree of metabolic acidosis; it is appropriately compensated. A respiratory alkalosis would require a PCO2 lower than expected by Winter's formula.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Acid-Base Disorders:** Provides a structured approach to diagnosing and managing acid-base disturbances. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Renal&frompage=etg\n- **UpToDate - Simple and Mixed Acid-Base Disorders:** Detailed explanation of the stepwise approach and delta-delta calculations. — https://www.uptodate.com/contents/simple-and-mixed-acid-base-disorders\n- **KDIGO (Kidney Disease: Improving Global Outcomes) - CKD Evaluation and Management:** Includes management of metabolic acidosis in CKD. — https://kdigo.org/guidelines/ckd-evaluation-and-management/", "image_path": ""}, {"id": 34187, "date": "2026-01-22T12:46:55+00:00", "stem": "A 45-year-old male presented with sharp, burning, stabbing pain in the lateral aspect of the right foot. You suspect L5-S1 radiculopathy. Which of the following is lost in L5-S1 disc prolapse?", "options": "A. Knee jerk\nB. Dorsiflexion of big toe and foot\nC. Inversion of foot\nD. Eversion of foot\nE. Ankle jerk", "answer": "E. Ankle jerk", "explanation": "### ✅ Correct Answer: E. Ankle jerk\n\n**Clinical Reasoning:**\n- **L5-S1 Disc Prolapse:** Typically compresses the **S1 nerve root** (L5-S1 disc level affects the exiting S1 nerve root).\n- **S1 Nerve Root Function:**\n  - **Motor:** Plantar flexion of the foot (gastrocnemius, soleus) and eversion (peroneus longus and brevis).\n  - **Sensory:** Lateral foot and sole (S1 dermatome).\n  - **Reflex:** **Ankle jerk (Achilles reflex)** is mediated via the S1 nerve root (primarily).\n- **Key Point:** The patient's pain in the **lateral aspect of the foot** aligns with the S1 dermatome. Loss of the ankle jerk is a classic, objective sign of S1 radiculopathy.\n- **L5 vs. S1:** L5 radiculopathy (e.g., L4-L5 disc) affects dorsiflexion (foot drop) and big toe extension, with sensory loss on the dorsum of the foot and lateral calf. The ankle jerk is preserved in pure L5 lesions.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Knee jerk**: Mediated by the L3-L4 nerve roots (femoral nerve). Not affected by L5-S1 pathology.\n- **B. Dorsiflexion of big toe and foot**: Primarily an L5 function (tibialis anterior, extensor hallucis longus). Weakness suggests L5, not S1, involvement.\n- **C. Inversion of foot**: Primarily an L4 function (tibialis posterior). Not a key feature of S1 radiculopathy.\n- **D. Eversion of foot**: Although the peroneal muscles (eversion) are partly S1, eversion weakness is less specific and less reliable than loss of ankle jerk for diagnosing S1 radiculopathy. The ankle jerk is the most definitive sign listed.\n\n### 📚 Relevant Guidelines\n- **[NICE Clinical Knowledge Summaries: Sciatica]** — Covers assessment and management of lumbosacral radiculopathy, including neurological examination findings for specific nerve roots. — https://cks.nice.org.uk/topics/sciatica-lumbosacral-radicular-pain/\n- **[UpToDate: Lumbar spinal stenosis: Pathophysiology, clinical features, and diagnosis]** — Details the clinical presentation and examination findings of lumbar radiculopathies, including reflex changes. — https://www.uptodate.com/contents/lumbar-spinal-stenosis-pathophysiology-clinical-features-and-diagnosis\n- **[Therapeutic Guidelines (eTG): Neurological examination]** — Provides a structured approach to neurological examination, including reflex testing and myotome/dermatome maps. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34188, "date": "2026-01-22T12:56:19+00:00", "stem": "After a left elbow injury, a 55-year-old man develops weakness of the long flexors of the right thumb and index finger. He is also unable to do forearm pronation on the same side. Which one of the nerves is involved?", "options": "A. Radial nerve\nB. Median nerve\nC. Anterior interosseous nerve\nD. Posterior interosseous nerve\nE. Ulnar nerve", "answer": "C. Anterior interosseous nerve", "explanation": "### ✅ Correct Answer: C. Anterior interosseous nerve\n\n**Clinical Reasoning:**\n- **Anatomy:** The **Anterior Interosseous Nerve (AIN)** is a pure motor branch of the **median nerve** that arises in the forearm.\n- **AIN Innervation:**\n  1. **Flexor pollicis longus (FPL):** Flexes the interphalangeal joint of the thumb.\n  2. **Flexor digitorum profundus (FDP) to the index (and often middle) finger:** Flexes the distal interphalangeal joints.\n  3. **Pronator quadratus:** The primary muscle for forearm pronation when the elbow is flexed.\n- **Clinical Presentation:**\n  - **Weakness of long flexors of thumb and index finger:** Loss of FPL and FDP (index) function. The patient cannot make an \"OK\" sign (tip-to-tip pinch); instead, they make a \"pinch posture\" with extension of the thumb IP joint and index DIP joint.\n  - **Inability to pronate the forearm:** Weakness of pronator quadratus. Pronation may still be possible using pronator teres (innervated by the main median nerve proximal to the AIN branch), but it is weak, especially with the elbow flexed.\n- **Site of Injury:** The AIN can be injured by trauma (e.g., elbow fracture), compression (Kiloh-Nevin syndrome), or idiopathic neuritis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Radial nerve**: Innervates extensor muscles of the forearm and hand (wrist, finger, thumb extension). Injury causes wrist drop, not flexor weakness or pronation loss.\n- **B. Median nerve (main trunk)**: A proximal median nerve injury would cause the above AIN deficits PLUS thenar muscle weakness (opposition, abduction) and sensory loss over the palmar aspect of the thumb, index, middle, and lateral half of the ring finger. The scenario describes a pure motor deficit without mention of sensory loss or thenar wasting, pointing to an isolated AIN lesion.\n- **D. Posterior interosseous nerve**: A branch of the radial nerve. It innervates the extensor muscles of the forearm (except extensor carpi radialis longus). Injury causes finger and thumb extension weakness, not flexor weakness or pronation loss.\n- **E. Ulnar nerve**: Innervates the FDP to the ring and little fingers, most intrinsic hand muscles (hypothenar, interossei, lumbricals 3 & 4), and adductor pollicis. Injury causes claw hand deformity, sensory loss over the little finger and medial half of the ring finger, and weakness of finger abduction/adduction. It does not affect thumb/index flexors or pronation.\n\n### 📚 Relevant Guidelines\n- **[UpToDate: Overview of upper extremity peripheral nerve syndromes]** — Provides detailed anatomy, clinical features, and diagnosis of nerve injuries including anterior interosseous neuropathy. — https://www.uptodate.com/contents/overview-of-upper-extremity-peripheral-nerve-syndromes\n- **[American Academy of Orthopaedic Surgeons (AAOS): Nerve Injuries About the Elbow]** — Covers evaluation and management of traumatic nerve injuries around the elbow. — https://www.orthoinfo.org/en/diseases--conditions/nerve-injuries-about-the-elbow/\n- **[Therapeutic Guidelines (eTG): Neurological examination of the upper limb]** — Details motor testing for specific nerves and branches. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34189, "date": "2026-01-22T12:57:17+00:00", "stem": "You are working as a resident medical officer at a local children hospital in Adelaide. You are seeing a 1-week old baby for complete neonatal examination. All the physical examination is unremarkable except the following findings:\n– The knees were at different heights when the hips and knees were flexed.\n– Asymmetric skin folds and limited abduction of the affected hip were also seen.\nWhat is the most likely diagnosis?", "options": "A. Osgood-Schlatter disease\nB. Slipped capital femoral epiphysis\nC. Developmental dysplasia of the hip\nD. Femoral head fracture\nE. Legg-Calve-Perthes disease", "answer": "C. Developmental dysplasia of the hip", "explanation": "### ✅ Correct Answer: C. Developmental dysplasia of the hip\n\n**Clinical Reasoning:**\n- **Presentation:** A **1-week-old neonate** with findings on routine examination.\n- **Key Physical Signs of Developmental Dysplasia of the Hip (DDH):**\n  1. **Galeazzi Sign (Allis Sign):** \"Knees at different heights when the hips and knees are flexed.\" This indicates femoral shortening on the affected side due to hip dislocation.\n  2. **Asymmetric Skin Folds:** Asymmetry of the gluteal or thigh skin folds.\n  3. **Limited Abduction:** Restricted hip abduction, especially when the hip is flexed to 90 degrees. This is due to tight adductor muscles and the dislocated femoral head's mechanical block.\n  4. **Ortolani and Barlow Maneuvers** (not mentioned but crucial for diagnosis in infants): Detect reducible and dislocatable hips, respectively.\n- **Epidemiology:** DDH is a spectrum from laxity to complete dislocation, most commonly identified in the neonatal period or early infancy. Risk factors include breech presentation, family history, and female sex.\n- **Why This Fits:** The triad of Galeazzi sign, asymmetric folds, and limited abduction in a newborn is classic for DDH. Early detection is critical for successful non-surgical treatment (e.g., Pavlik harness).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Osgood-Schlatter disease**: An overuse injury (traction apophysitis) of the tibial tubercle in **adolescents** (typically 10-15 years old), presenting with anterior knee pain. Not relevant to a 1-week-old.\n- **B. Slipped capital femoral epiphysis (SCFE)**: A disorder of the **adolescent** hip (typically 10-16 years old) where the femoral head epiphysis displaces posteriorly. Presents with pain and limping. Not seen in neonates.\n- **D. Femoral head fracture**: An acute traumatic injury, highly unlikely in a 1-week-old without a history of significant trauma (e.g., difficult delivery). It would present with acute pain, swelling, and refusal to move the limb (pseudoparalysis), not just the described chronic-appearing signs.\n- **E. Legg-Calve-Perthes disease**: Idiopathic avascular necrosis of the femoral head, occurring in **children** (typically 4-8 years old). Presents with a limp and pain. Not a neonatal condition.\n\n### 📚 Relevant Guidelines\n- **[RACGP: Developmental dysplasia of the hip: from early detection to ultrasound screening]** — Australian guideline on detection, screening, and management of DDH. — https://www.racgp.org.au/afp/2013/september/developmental-dysplasia-of-the-hip\n- **[Royal Children's Hospital Melbourne Clinical Practice Guideline: Developmental Dysplasia of the Hip]** — Provides detailed assessment and management algorithms for DDH. — https://www.rch.org.au/clinicalguide/guideline_index/Developmental_dysplasia_of_the_hip_DDH/\n- **[Healthy Children (AAP): Hip Dysplasia]** — Overview of diagnosis and treatment from the American Academy of Pediatrics. — https://www.healthychildren.org/English/health-issues/conditions/orthopedic/Pages/Hip-Dysplasia.aspx", "image_path": ""}, {"id": 34190, "date": "2026-01-22T12:57:37+00:00", "stem": "Three months ago you started Mary, aged 73, on residronate 35mg weekly, after she was diagnosed with osteoporosis confirmed with bone mineral density (BMD). Her presenting symptom at that time was back pain. Examination revealed height decrease and mild kyphosis, as well as tenderness over thoracic vertebrae. Despite being on residronate, not only did her symptoms persist, she also developed pain over new areas of her thoracic. Investigations have established new osteoporotic fractures. Which one of the following would be the most appropriate management option for her?", "options": "A. Continue residronate at the same dose\nB. Switch to alendronate\nC. Increase the dose of residronate\nD. Switch to zoledronic acid\nE. Switch to teriparatide", "answer": "E. Switch to teriparatide", "explanation": "### ✅ Correct Answer: E. Switch to teriparatide\n\n**Clinical Reasoning:**\n- **Scenario:** An elderly woman with **established osteoporosis** (baseline fractures, height loss, kyphosis) who has suffered **new vertebral fractures** while on first-line oral bisphosphonate therapy (risedronate) for only **three months**.\n- **Key Concept – Treatment Failure/Inadequate Response:** The development of new fragility fractures while on anti-osteoporotic therapy indicates either non-adherence, malabsorption, or an inadequate therapeutic response. In this case, with ongoing symptoms and new fractures, a change in therapy is warranted.\n- **Teriparatide (Recombinant PTH 1-34):**\n  - **Mechanism:** An **anabolic agent** that stimulates new bone formation. This is in contrast to **antiresorptive agents** like bisphosphonates (risedronate, alendronate, zoledronic acid) which primarily slow bone loss.\n  - **Indication:** First-line for patients with **severe osteoporosis** (multiple fractures, very low BMD) or those who **fail or are intolerant to first-line bisphosphonate therapy**, as in this vignette.\n  - **Efficacy:** Superior to bisphosphonates in reducing the risk of new vertebral fractures in high-risk patients.\n  - **Treatment Duration:** Limited to 18-24 months lifetime due to theoretical osteosarcoma risk.\n- **Why Not Other Options:**\n  - Switching to another oral bisphosphonate (B) or increasing the dose (C) is unlikely to be effective if she has already failed one.\n  - Switching to intravenous zoledronic acid (D) is a potent antiresorptive but is still in the same drug class; teriparatide offers a different, anabolic mechanism which is preferred in this high-risk, treatment-failure scenario.\n  - Continuing the same therapy (A) is inappropriate given clear progression of disease.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Continue residronate at the same dose**: The patient has clear evidence of treatment failure (new fractures). Continuing an ineffective regimen is not appropriate.\n- **B. Switch to alendronate**: Alendronate is another oral bisphosphonate with a similar antiresorptive mechanism. Switching within the same drug class is not the optimal strategy for a patient who has fractured on therapy; an anabolic agent is preferred.\n- **C. Increase the dose of residronate**: The standard weekly dose (35mg) is the recommended therapeutic dose for osteoporosis. There is no established benefit from dose escalation for fracture prevention, and it may increase side effects (e.g., GI upset).\n- **D. Switch to zoledronic acid**: While zoledronic acid is a potent IV bisphosphonate and may be used in patients intolerant of oral bisphosphonates, it is still an **antiresorptive**. In a patient with new fractures on an oral bisphosphonate, guidelines favor switching to an **anabolic agent** (teriparatide) for its superior bone-forming effects in high-risk individuals.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG): Osteoporosis]** — Australian authority on osteoporosis management. Recommends teriparatide for severe osteoporosis or treatment failure. — https://tgldcdp.tg.org.au/etgAccess\n- **[Royal Australian College of General Practitioners (RACGP) Osteoporosis management]** — Provides a practical guide for GPs, including when to consider specialist referral and anabolic agents. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/osteoporosis\n- **[Endocrine Society Clinical Practice Guideline: Pharmacological Management of Osteoporosis in Postmenopausal Women]** — International guideline supporting the use of anabolic agents like teriparatide in high-risk patients. — https://academic.oup.com/jcem/article/104/5/1595/5418884", "image_path": ""}, {"id": 34211, "date": "2026-01-23T13:24:33+00:00", "stem": "A 32-year-old woman is brought to the hospital due to sudden-onset left-sided weakness. According to the family, she has had fatigue, malaise, and decreased appetite over the last several weeks. She attributed these symptoms to a “viral infection” and treated herself with over-the-counter acetaminophen. Her temperature is 37.4 C (99.4 F), blood pressure is 140/86 mm Hg, and pulse is 82/min. The patient appears confused and agitated. Lungs are clear to auscultation. A 2/6 holosystolic murmur is heard at the cardiac apex. Extremity examination reveals left-sided muscle strength is 1/5 with hyperactive deep tendon reflexes. Babinski sign is present on the left side. Laboratory results are as follows:\n\nHemoglobin 10.2 g/dL\nPlatelets 64,000/mm3\nLeukocytes 6,800/mm3\nBlood urea nitrogen 18 mg/dL\nCreatinine 70 umol/L\nAntinuclear antibody (ANA) positive\nRapid plasma reagin (RPR) positive\nCerebrospinal fluid cell counts are normal, and cultures are negative. Which of the following is the most likely diagnosis in this patient?", "options": "A. Antiphospholipid syndrome\nB. Multiple sclerosis\nC. Neurosyphilis\nD. Polyarteritis nodosa\nE. Rheumatic fever", "answer": "C. Neurosyphilis", "explanation": "### ✅ Correct Answer: C. Neurosyphilis\n\nThe patient presents with a classic triad for neurosyphilis: (1) **neurological deficits** (sudden-onset left-sided weakness, confusion, hyperreflexia, Babinski sign), (2) **cardiovascular involvement** (holosystolic murmur suggestive of mitral regurgitation, which can occur in tertiary syphilis due to aortitis affecting the aortic valve or causing mitral valve dilation), and (3) **serological evidence** (positive RPR).\n\n**Step-by-step clinical reasoning:**\n1. **Key diagnostic clues:** Positive RPR is highly specific for syphilis. The combination of a positive RPR with neurological symptoms (stroke-like presentation) and a cardiac murmur points to tertiary syphilis with neurovascular involvement.\n2. **Pathophysiology:** *Treponema pallidum* can invade the CNS early, but symptomatic neurosyphilis typically occurs years later. Meningovascular syphilis (a form of neurosyphilis) presents with stroke-like symptoms due to endarteritis obliterans of small/medium vessels, leading to ischemia. The murmur suggests cardiovascular syphilis (aortitis), which often coexists.\n3. **Supporting labs:** Mild anemia (Hb 10.2) and thrombocytopenia (platelets 64k) can be seen in chronic infections like syphilis. Positive ANA is a nonspecific finding that does not rule out syphilis; false-positive RPR can occur in autoimmune diseases, but here the clinical picture fits neurosyphilis.\n4. **CSF findings:** Normal cell counts and negative cultures are common in meningovascular syphilis; CSF-VDRL is the specific test but wasn't performed. The diagnosis is often made clinically with positive serology and compatible symptoms.\n5. **Management pearl:** For neurosyphilis, treatment is IV penicillin G for 10–14 days. Follow-up CSF exams are needed to ensure response.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Antiphospholipid syndrome**: While it can cause stroke and thrombocytopenia, it does not explain the cardiac murmur or positive RPR. Diagnosis requires specific antiphospholipid antibodies (lupus anticoagulant, anticardiolipin).\n- **B. Multiple sclerosis**: Typically presents with relapsing-remitting neurological deficits (optic neuritis, sensory symptoms) over time, not acute stroke-like weakness. MS does not cause cardiac murmurs, positive RPR, or thrombocytopenia.\n- **D. Polyarteritis nodosa**: A vasculitis affecting medium-sized arteries, which can cause neuropathy, renal involvement, and hypertension, but it is not associated with positive RPR or cardiac murmurs. PAN typically presents with systemic symptoms (fever, weight loss) and organ ischemia (e.g., mesenteric, renal).\n- **E. Rheumatic fever**: Follows group A streptococcal infection and causes carditis (murmur) and neurological symptoms (Sydenham chorea), but chorea is a movement disorder, not acute hemiparesis. Rheumatic fever does not cause positive RPR or thrombocytopenia.\n\n### 📚 Relevant Guidelines\n- **Australian STI Management Guidelines (University of Sydney)**: Provides comprehensive guidance on diagnosis and management of syphilis, including neurosyphilis — https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/\n- **Therapeutic Guidelines: Antibiotic (eTG)**: Details antibiotic regimens for neurosyphilis, including penicillin dosing — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etggep\n- **Centers for Disease Control and Prevention (CDC)**: Guidelines for syphilis testing and treatment, including neurosyphilis — https://www.cdc.gov/std/treatment-guidelines/syphilis.htm", "image_path": ""}, {"id": 34248, "date": "2026-01-26T09:42:53+00:00", "stem": "Identify the nerve injury based on the clinical description.", "options": "A. Wrist drop\nB. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger\nC. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\nD. Branch of radial nerve, purely motor; for wrist, finger and thumb extension\nE. Injury causes claw hand, decreased finger abduction and sensory loss of little finger", "answer": "C", "explanation": "### ✅ Correct Answer: C. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\n\nThis describes an injury to the **Anterior Interosseous Nerve (AIN)**, a purely motor branch of the median nerve. The 'OK sign' (making a circle with the thumb and index finger) tests the function of the flexor pollicis longus (FPL) and flexor digitorum profundus (FDP) to the index finger, both innervated by the AIN. Weakness of pronation occurs due to paralysis of the pronator quadratus. The AIN has no sensory component, so there is no associated sensory loss, which aligns perfectly with the description.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Wrist drop**: This is characteristic of **radial nerve injury** (e.g., Saturday night palsy). It affects wrist, finger, and thumb extensors, not the median nerve or the 'OK sign'.\n- **B. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger**: This describes a **median nerve injury at the wrist** (e.g., carpal tunnel syndrome affecting the recurrent thenar branch and palmar cutaneous branches). Thumb opposition is lost, but the 'OK sign' is typically preserved as the AIN is often spared. The sensory loss pattern is classic for median nerve distribution.\n- **D. Branch of radial nerve, purely motor; for wrist, finger and thumb extension**: This describes the **posterior interosseous nerve (PIN)**, a motor branch of the radial nerve. Injury causes finger and thumb extension weakness but **no wrist drop** (as extensor carpi radialis longus is often spared). It does not affect the 'OK sign' or pronation.\n- **E. Injury causes claw hand, decreased finger abduction and sensory loss of little finger**: This is classic for an **ulnar nerve injury** (e.g., at the elbow or wrist). The 'clawing' (hyperextension at MCP joints, flexion at IP joints) is due to loss of intrinsic muscle function. It does not affect the 'OK sign' or pronation.\n\n### 📚 Relevant Guidelines\n- **[eTG Complete - Peripheral Nerve Injuries]**: Comprehensive Australian therapeutic guideline covering the diagnosis, assessment, and management of traumatic peripheral nerve injuries. — https://tgldcdp.tg.org.au/viewTopic?topicfile=peripheral-nerve-injuries\n- **[Royal Australian College of Surgeons - Management of Peripheral Nerve Injuries]**: A clinical guideline outlining surgical and non-surgical management principles for nerve injuries in the Australian context. — https://www.surgeons.org/media/321421/management_of_peripheral_nerve_injuries.pdf\n- **[UpToDate - Overview of Upper Extremity Peripheral Nerve Syndromes]**: Detailed review of the anatomy, clinical presentation, and diagnosis of upper limb nerve entrapments and injuries. — https://www.uptodate.com/contents/overview-of-upper-extremity-peripheral-nerve-syndromes", "image_path": ""}, {"id": 34282, "date": "2026-01-29T06:43:15+00:00", "stem": "A 34-year-old multigravida presents for prenatal care in the second trimester. She admits to a past history of substance abuse but states she has been clean for 6 months. With her second pregnancy she experienced a preterm delivery at 34 weeks' gestation of a male neonate who died within the first day of life. She states that at delivery the baby was swollen with skin lesions and that the placenta was very large. She was treated with antibiotics but she does not remember the name or other details. On a routine prenatal panel with this current pregnancy she is found to have a positive VDRL (Venereal Disease Research Laboratory) test. What is the recommended mode of delivery?", "options": "a. Vaginal\nb. Cesarean\nc. Forcep assisted\nd. Vacuum assisted", "answer": "a. Vaginal", "explanation": "### ✅ Correct Answer: a. Vaginal\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The patient has a positive VDRL test, indicating syphilis. The history of a previous pregnancy with a hydropic, macerated fetus, a large placenta, and neonatal death is classic for congenital syphilis. The mother's past antibiotic treatment was likely for syphilis, but she now has a positive test, suggesting reinfection, relapse, or inadequate treatment.\n2.  **Key Principle:** The mode of delivery for a pregnant patient with syphilis is **not altered** by the infection itself. Syphilis is a systemic spirochetal infection (*Treponema pallidum*) transmitted transplacentally to the fetus, not during passage through the birth canal like some viral infections (e.g., HSV, HIV with high viral load).\n3.  **Management Priority:** The urgent intervention is **maternal treatment**, not cesarean delivery. Penicillin G is the only recommended therapy for syphilis in pregnancy and is highly effective at preventing transmission to the fetus, especially if initiated before the third trimester. Treatment cures the maternal infection and treats the fetus.\n4.  **Exam Focus:** This question tests the understanding that cesarean section is reserved for obstetrical indications or to prevent perinatal transmission of pathogens primarily acquired during delivery (e.g., active genital herpes lesions, HIV with high viral load despite ART). Syphilis does not fall into this category.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Cesarean**: Cesarean delivery is not indicated for maternal syphilis. It does not prevent congenital transmission, as the infection occurs transplacentally. Performing a cesarean without obstetrical indication exposes the mother to unnecessary surgical risks.\n- **c. Forcep assisted**: Instrumental vaginal delivery (forceps or vacuum) is indicated for specific obstetrical situations like prolonged second stage or fetal compromise, not for maternal infectious diseases like syphilis. Using instruments without indication increases risks of maternal and fetal trauma.\n- **d. Vacuum assisted**: Similar to forceps, vacuum-assisted delivery is an obstetrical tool for specific labor abnormalities. The presence of syphilis does not constitute an indication for instrumental delivery.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Syphilis**: Provides detailed guidance on diagnosis, staging, and treatment of syphilis in all populations, including specific recommendations for pregnant women. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Sexual%20Health&frompage=etg\n- **RANZCOG Statement on Syphilis in Pregnancy**: Outlines the antenatal screening, management, and follow-up for pregnant women with syphilis, confirming that the route of delivery is not altered. — https://ranzcog.edu.au/statements-guidelines/womens-health/antenatal-care/syphilis-in-pregnancy-statement\n- **Australian STI Management Guidelines (ASHM)**: Comprehensive guidelines for STI management, including syphilis in pregnancy, emphasizing penicillin as the treatment of choice. — https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/", "image_path": ""}, {"id": 34283, "date": "2026-01-29T06:44:14+00:00", "stem": "A 58-year-old man presents with complaint of progressive difficulty in walking for the past few months. He denies any pain or pins and needles. On examinations, he drags his left foot while walking. On the left side, ankle tendon reflexes are exaggerated, the strength of plantar flexion and dorsifiexion are decreased and are 4/5. Sensation is intact. The right foot is completely normal. Plantar reflexes are equivocal bilaterally. The rest of physical examination including neurologic exam of the face and upper extremities are unremarkable. Lesions of which one of the following parts could be the mostly likely cause to this presentation?", "options": "A. Common peroneal nerve\nB. LS/51 nerve root\nC. Cervical spine\nD. Brainstem\nE. Cerebral cortex", "answer": "C. Cervical spine", "explanation": "### ✅ Correct Answer: C. Cervical spine\n\n**Clinical Reasoning:**\n1.  **Localising the Lesion:** The patient has a **left-sided lower motor neuron (LMN) foot drop** (weak dorsiflexion/plantarflexion, foot drag) **combined with upper motor neuron (UMN) signs** in the same limb (exaggerated ankle reflexes). Sensation is intact. This is a classic **\"mixed\" or \"dissociated\" motor deficit** – LMN weakness at the level of the lesion with UMN signs below the lesion.\n2.  **Key Neurological Principle:** A single lesion causing both LMN and UMN signs in the same limb localizes to the **spinal cord**, specifically at the **cervical level**. Here's why:\n    - **LMN signs (weakness):** The anterior horn cells in the spinal cord (from ~C5 to S2) are the LMNs. A lesion at the cervical cord level (e.g., compression from spondylosis, tumor) can damage the anterior horn cells supplying the leg (via the lumbosacral plexus), causing LMN-type weakness in the foot.\n    - **UMN signs (hyperreflexia):** The corticospinal tracts descend in the spinal cord. The same cervical lesion compresses these tracts **below** the level of the arm/hand fibers (which are more medial), affecting the leg fibers and causing UMN signs (spasticity, hyperreflexia) in the leg.\n    - **No sensory loss:** The spinothalamic and dorsal columns are spared, explaining intact sensation.\n3.  **Why Not Other Options:** A peripheral nerve (A) or nerve root (B) lesion would cause pure LMN signs with sensory symptoms. A brainstem (D) lesion typically affects cranial nerves and long tracts bilaterally or contralaterally. A cerebral cortex (E) lesion (e.g., stroke) would cause a pure UMN deficit (weakness with hyperreflexia) affecting the entire contralateral side, not an isolated foot drop with mixed signs.\n4.  **Most Likely Pathology:** In a 58-year-old with progressive symptoms, **cervical spondylotic myelopathy** is the leading diagnosis, often presenting with mixed UMN/LMN signs in the legs.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Common peroneal nerve**: A common peroneal nerve palsy causes foot drop (weak dorsiflexion/eversion) with LMN signs (flaccid weakness, reduced/absent reflexes) and often sensory loss over the dorsum of the foot. It does **not** cause hyperreflexia (UMN sign).\n- **B. LS/51 nerve root**: An L5 or S1 radiculopathy (e.g., from a herniated disc) causes LMN weakness in specific myotomes, sensory loss in a dermatomal pattern, and pain/paresthesia. Reflexes would be **diminished** (ankle jerk for S1), not exaggerated. The history denies pain, and sensation is intact.\n- **D. Brainstem**: Brainstem lesions affect cranial nerve nuclei and long tracts. They can cause contralateral limb weakness (UMN) and/or ipsilateral cranial nerve palsies (e.g., facial weakness, gaze palsy). An isolated, progressive foot drop without cranial nerve or upper limb findings is not typical.\n- **E. Cerebral cortex**: A lesion in the motor cortex (e.g., parasagittal meningioma) can cause a contralateral UMN monoparesis affecting the leg. However, this would present with **pure UMN signs** (spastic weakness, hyperreflexia, upgoing plantar). The presence of LMN-type weakness (4/5, foot drag) in the same limb argues against a pure cortical lesion.\n\n### 📚 Relevant Guidelines\n- **NICE Guidelines [NG41] - Spinal Injury: Assessment and Initial Management**: Covers the assessment of suspected spinal cord compression, including history and examination findings that should raise suspicion. — https://www.nice.org.uk/guidance/ng41\n- **UpToDate - Cervical Spondylotic Myelopathy**: Details the pathophysiology, clinical features (including mixed UMN/LMN signs), diagnosis, and management of this common cause of spinal cord dysfunction in older adults. — https://www.uptodate.com/contents/cervical-spondylotic-myelopathy\n- **American Academy of Neurology - Practice Parameter: Cervical Spondylotic Myelopathy**: Evidence-based review of diagnostic and therapeutic modalities for this condition. — https://www.neurology.org/doi/10.1212/WNL.0b013e31823a5d30", "image_path": ""}, {"id": 34304, "date": "2026-01-30T07:40:42+00:00", "stem": "**A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?**", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "D", "explanation": "### ✅ Correct Answer: D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\n\n**Step-by-Step Clinical Reasoning:**\n\n1.  **Primary Acid-Base Disorder:** The patient has a low pH (7.34, normal 7.35-7.45), indicating acidemia. The bicarbonate is low (20 mEq/L, normal 22-28), pointing to a metabolic acidosis.\n2.  **Calculate the Anion Gap (AG):** AG = Na - (Cl + HCO3) = 140 - (98 + 20) = 22 mEq/L. This is a high anion gap metabolic acidosis (normal AG ~ 8-12 mEq/L, adjusted for albumin: normal AG = 2 x [albumin g/dL] + 4 = 2*3 + 4 = 10).\n3.  **Assess for Mixed Disorders:**\n    *   **Delta-Delta (ΔΔ) Ratio:** ΔAG = Measured AG - Normal AG = 22 - 10 = 12. ΔHCO3 = Normal HCO3 - Measured HCO3 = 24 - 20 = 4. ΔΔ Ratio = ΔAG / ΔHCO3 = 12 / 4 = 3.\n    *   **Interpretation:** A ΔΔ ratio > 2 suggests a concomitant metabolic alkalosis (as the bicarbonate is higher than expected for the rise in AG). However, this patient has significant vomiting (a cause of metabolic alkalosis) and is dehydrated, which can elevate the AG due to hemoconcentration. The clinical picture (vomiting + dehydration + CKD) is classic for a high AG metabolic acidosis (uremia) with a superimposed *non-anion gap* metabolic acidosis from volume contraction, not a metabolic alkalosis. The vomiting may be a consequence of uremia rather than a primary alkalotic driver. A ΔΔ ratio > 2 can also be seen in mixed high AG and normal AG metabolic acidosis, which fits here.\n4.  **Check Respiratory Compensation:** For a primary metabolic acidosis, the expected PCO2 is calculated by Winter's formula: Expected PCO2 = (1.5 x HCO3) + 8 ± 2 = (1.5*20) + 8 = 38 ± 2. The measured PCO2 is 38 mm Hg, which is **perfectly appropriate compensation**, ruling out a primary respiratory disorder (acidosis or alkalosis).\n5.  **Conclusion:** The patient has a **simple high anion gap metabolic acidosis** (likely due to uremia from her stage 4 CKD, with possible contribution from lactic acidosis due to hypoperfusion from dehydration) with **appropriate respiratory compensation**. There is no evidence of a primary respiratory disorder or a metabolic alkalosis severe enough to be classified as a mixed disorder in this scenario.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis**: Incorrect. The PCO2 of 38 mm Hg is exactly what is expected for appropriate respiratory compensation for the metabolic acidosis (Winter's formula: ~38). A respiratory acidosis would require a PCO2 **higher** than the expected compensatory range.\n- **B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis**: Incorrect. While vomiting can cause metabolic alkalosis, the dominant process here is acidemia (pH 7.34). The bicarbonate is low (20), not normal or elevated, which would be required for a significant metabolic alkalosis to be present. The ΔΔ ratio calculation can be misleading in complex states like uremia and dehydration.\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation**: Incorrect. The pH is acidic (7.34), not alkalotic. The bicarbonate is low (20), not high. This is the opposite of metabolic alkalosis.\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis**: Incorrect. The PCO2 of 38 mm Hg is appropriate compensation, not inappropriately low. A respiratory alkalosis would require a PCO2 **lower** than the expected compensatory range.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) — Acid-base disorders**: Provides a structured approach to diagnosing and managing acid-base disturbances, including the use of anion gap, delta-delta ratio, and expected compensation formulas. — https://tgldcdp.tg.org.au/viewTopic?topicfile=acid-base-disorders\n- **UpToDate — Approach to the adult with metabolic acidosis**: A comprehensive resource detailing the differential diagnosis, evaluation, and management of high anion gap and normal anion gap metabolic acidosis. — https://www.uptodate.com/contents/approach-to-the-adult-with-metabolic-acidosis\n- **KDIGO Clinical Practice Guideline for Acute Kidney Injury**: While focused on AKI, it covers the management of complications in CKD, including metabolic acidosis, which is a key feature of progressive renal failure. — https://kdigo.org/guidelines/acute-kidney-injury/", "image_path": ""}, {"id": 34308, "date": "2026-01-30T13:02:48+00:00", "stem": "A 45-year-old woman presents to the emergency department with a 2-day history of leg pain and swelling following what she describes as \"a small scratch\" from gardening. On examination, there is mild erythema and tenderness over the anterior shin with minimal induration. Vital signs are BP, 135/82; P, 88; T, 37.9°C (100.2°F). Point-of-care ultrasound of the affected area is performed. Which of the following ultrasound findings is most concerning and requires immediate surgical consultation?\n\n A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\n\n B. Hypoechoic strands between subcutaneous fat tissue\n\n C. Hyperechoic linear structure with multiple parallel reverberation artifacts\n\n D. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues\n\n E. Noncompressible hypoechoic tubular structure in the deep posterior compartment", "options": "A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\nB. Hypoechoic strands between subcutaneous fat tissue\nC. Hyperechoic linear structure with multiple parallel reverberation artifacts\nD. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues\nE. Noncompressible hypoechoic tubular structure in the deep posterior compartment", "answer": "A", "explanation": "### ✅ Correct Answer: A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\n\n**Step-by-Step Clinical Reasoning:**\n\n1.  **Clinical Context:** The patient has a history of minor trauma (scratch) and presents with pain, swelling, erythema, and low-grade fever. This suggests a soft tissue infection. The key is to differentiate between less severe conditions (e.g., cellulitis, abscess) and a **necrotizing soft tissue infection (NSTI)**, which is a surgical emergency.\n2.  **Ultrasound Findings Correlations:**\n    *   **Option A (Correct):** \"Highly echogenic areas with posterior acoustic shadowing in the fascial planes\" is the classic ultrasound finding for **gas in the tissue**. This is known as the \"dirty shadowing\" sign. In the context of a possible infection, this indicates gas-forming organisms (e.g., Clostridium perfringens in gas gangrene, or mixed aerobes/anaerobes in necrotizing fasciitis). The presence of gas in the fascial planes is a hallmark of NSTI and mandates immediate surgical consultation for debridement.\n    *   Option B: Hypoechoic strands in subcutaneous fat are typical of **cellulitis** (fluid and edema tracking along tissue planes). This is common and not an immediate surgical emergency.\n    *   Option C: A hyperechoic linear structure with reverberation artifacts describes a **foreign body** (e.g., a piece of wood or metal). While it may require removal, it is not typically an immediate surgical emergency unless there is associated deep infection or vascular compromise.\n    *   Option D: Discrete anechoic regions with posterior acoustic enhancement describe a simple **abscess** (a collection of pus). This requires drainage (which can often be done percutaneously) but is not synonymous with necrotizing infection.\n    *   Option E: A noncompressible hypoechoic tubular structure in a deep compartment describes a **deep vein thrombosis (DVT)**. This is a serious finding requiring anticoagulation, but it is not an infection and does not require immediate surgical consultation in this stable patient.\n3.  **Conclusion:** Among all findings, **gas in the fascial planes** is the most specific and alarming sign for a life-threatening necrotizing infection. It cannot be managed with antibiotics alone and requires urgent surgical exploration and debridement.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Hypoechoic strands between subcutaneous fat tissue**: This finding is consistent with **cellulitis**, a common and less severe soft tissue infection primarily managed with antibiotics and elevation. It does not indicate deep tissue necrosis or gas.\n- **C. Hyperechoic linear structure with multiple parallel reverberation artifacts**: This is characteristic of a **foreign body** (e.g., splinter). While it may cause infection and require removal, it is not an immediate surgical emergency like necrotizing fasciitis. Management involves foreign body removal and possible irrigation.\n- **D. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues**: This describes a well-defined **abscess**. It requires drainage (incision & drainage or ultrasound-guided aspiration) but is a localized collection. Necrotizing infections involve rapid spread along fascial planes, not a discrete collection.\n- **E. Noncompressible hypoechoic tubular structure in the deep posterior compartment**: This is the sonographic diagnosis of **deep vein thrombosis (DVT)**. While a serious condition requiring prompt anticoagulation, it is a vascular problem, not a surgical soft tissue infection. The clinical presentation is more suggestive of infection than DVT.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) — Cellulitis and necrotising skin and soft tissue infections**: Provides diagnostic criteria and urgent management pathways for distinguishing severe necrotizing infections from cellulitis. Emphasizes the need for immediate surgical review. — https://tgldcdp.tg.org.au/viewTopic?topicfile=skin-soft-tissue-infections\n- **Surgical Infection Society: 2018 Updated Guidelines on the Management of Necrotizing Soft Tissue Infections**: An international guideline detailing early diagnosis (including imaging findings), the critical importance of early surgical intervention, and antimicrobial therapy. — https://journals.lww.com/annalsofsurgery/Fulltext/2020/01000/2018_Updated_Recommendations_for_Management_of.28.aspx\n- **UpToDate — Necrotizing soft tissue infections**: Comprehensive review of etiology, clinical features, diagnostic imaging (including ultrasound findings of gas), and emergency management. — https://www.uptodate.com/contents/necrotizing-soft-tissue-infections", "image_path": ""}, {"id": 34310, "date": "2026-01-30T13:41:32+00:00", "stem": "**A 28-year-old man presents with altered mental status and vomiting after falling from a ladder. Vital signs are BP, 100/65; P, 55. His Glasgow Coma Scale score is 8. Neurological examination reveals anisocoria with sluggish pupillary responses. He requires emergency intubation for airway protection. Which induction agent is most appropriate?**\n\n A. Fentanyl\n\n B. Propofol\n\n C. Ketamine\n\n D. Etomidate\n\n E. Midazolam", "options": "A. Fentanyl\nB. Propofol\nC. Ketamine\nD. Etomidate\nE. Midazolam", "answer": "C", "explanation": "### ✅ Correct Answer: C. Ketamine\n\n**Step-by-Step Clinical Reasoning:**\n\n1.  **Clinical Scenario:** This is a trauma patient with a **severe traumatic brain injury (TBI)** evidenced by:\n    *   Mechanism: Fall from height.\n    *   Altered mental status (GCS 8).\n    *   Cushing's Triad signs: Hypertension (BP 100/65 is relatively high for a young man, especially post-fall with possible volume loss), Bradycardia (P 55), and irregular respirations (implied by need for intubation).\n    *   Anisocoria with sluggish pupils: Suggests possible uncal herniation and rising intracranial pressure (ICP).\n2.  **Goal of Induction in TBI:** The primary goals are to facilitate rapid sequence intubation (RSI) while **maintaining cerebral perfusion pressure (CPP)**. CPP = Mean Arterial Pressure (MAP) - Intracranial Pressure (ICP). It is critical to avoid drugs that cause hypotension (which drops MAP) or increase ICP.\n3.  **Agent Analysis:**\n    *   **Ketamine (Correct):** Historically controversial due to theoretical concerns about raising ICP. However, contemporary evidence (especially in *hemodynamically unstable or hypotensive* patients) shows that ketamine **does not increase ICP** when used with adequate ventilation and sedation, and it is superior because it **maintains or increases blood pressure and CPP** via sympathetic stimulation. This is crucial in this potentially hypovolemic trauma patient with a borderline BP.\n    *   Propofol: Causes significant **dose-dependent hypotension** and reduces MAP, which can catastrophically lower CPP in a patient with already compromised cerebral autoregulation. It is relatively contraindicated in hypovolemia or unstable TBI.\n    *   Etomidate: Excellent for hemodynamic stability in *non-trauma* patients. However, it causes adrenal suppression, which is detrimental in critical illness and trauma where a stress cortisol response is vital. It is generally avoided in trauma/sepsis.\n    *   Midazolam: Has a slower onset and can cause hypotension, especially in hypovolemic patients. It is less predictable than other agents for RSI.\n    *   Fentanyl: An opioid analgesic, not a sedative-hypnotic induction agent. It can cause hypotension and is not used alone for induction. It is often used as an adjunct for analgesia.\n4.  **Conclusion:** In this patient with signs of severe TBI and potential hemodynamic instability, **ketamine is the most appropriate induction agent** as it provides dissociative anesthesia, maintains hemodynamics, and does not adversely affect ICP when used appropriately.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Fentanyl**: This is a potent opioid analgesic, not a sedative-hypnotic induction agent. Used alone, it does not provide reliable unconsciousness for intubation. It can cause hypotension and chest wall rigidity. It is used as an adjunct for analgesia during RSI, not as the primary induction drug.\n- **B. Propofol**: A common induction agent but causes significant **vasodilation and myocardial depression**, leading to hypotension. In a trauma patient with possible blood loss and a need to maintain CPP, propofol can be dangerous and precipitate cardiovascular collapse.\n- **D. Etomidate**: Provides stable hemodynamics but causes **adrenocortical suppression** by inhibiting 11-beta-hydroxylase. This is particularly harmful in critically ill trauma patients who require a robust stress response. Its use in trauma/sepss is discouraged due to associated increased mortality.\n- **E. Midazolam**: A benzodiazepine with a slower onset of action compared to other agents, making it less ideal for RSI. It can cause **hypotension**, especially in volume-depleted patients, and has active metabolites leading to prolonged sedation.\n\n### 📚 Relevant Guidelines\n- **Brain Trauma Foundation: Guidelines for the Management of Severe Traumatic Brain Injury (4th Ed.)**: While not specifying a single drug, these guidelines emphasize the importance of avoiding hypotension (SBP < 100 mmHg for adults 50-69) and maintaining CPP. Ketamine's safety profile aligns with these goals. — https://braintrauma.org/guidelines/guidelines-for-the-management-of-severe-tbi-4th-ed\n- **Australian and New Zealand College of Anaesthetists (ANZCA) Guidelines on Acute Severe TBI**: Provides guidance on pre-hospital and emergency department management, including airway management principles that favor hemodynamic stability. — (Refer to ANZCA professional documents)\n- **UpToDate — Rapid sequence intubation in adults for emergency medicine and the critical care unit**: Discusses medication choices for RSI, including the updated evidence supporting ketamine in TBI and shock states. — https://www.uptodate.com/contents/rapid-sequence-intubation-in-adults-for-emergency-medicine-and-the-critical-care-unit", "image_path": ""}, {"id": 34319, "date": "2026-02-01T10:18:47+00:00", "stem": "A 62-year-old woman comes to the office due to upper extremity weakness and numbness. Three days ago, the patient was involved in a motor vehicle collision in which a truck rear-ended her vehicle. The patient did not hit her head or lose consciousness but experienced a tingling and burning sensation in all extremities, which she attributed to the stress of the accident. Since then, she has had numbness in the upper extremities and clumsiness of her hands. She reports difficulty picking up objects but has had no leg weakness or bowel or bladder disturbance. The patient is upset that the other driver refused to accept fault but reports no other ongoing stressors. She has a history of hypertension and osteoarthritis. Vital signs are within normal limits. Neck and back examination show no deformity or tenderness. There is weakness of hand grip bilaterally, and the triceps reflex is decreased on both sides. Decreased pinprick sensation is present on the fingers. The remainder of the neurologic examination is normal. Cervical spine x-ray reveals no vertebral dislocation or fracture, but diffuse spondylotic changes are present. Which of the following is the most likely cause of this patient’s symptoms?", "options": "A. Acute stress disorder\nB. Brachial plexus injury\nC. Malingering\nD. Postconcussion syndrome\nE. Spinal cord injury", "answer": "E. Spinal cord injury", "explanation": "### ✅ Correct Answer: E. Spinal cord injury\n\nThis patient presents with a **central cord syndrome**, a classic incomplete spinal cord injury, most likely due to **hyperextension injury** in the setting of pre-existing cervical spondylosis (as seen on x-ray). The clinical reasoning is as follows:\n\n1.  **Mechanism:** A rear-end motor vehicle collision is a classic cause of hyperextension injury, especially in older patients with cervical spondylosis. The spinal canal is already narrowed by osteophytes, and hyperextension causes pinching of the cord between the posterior inferior margin of the vertebral body anteriorly and the ligamentum flavum/bony lamina posteriorly.\n2.  **Clinical Features:** The presentation is textbook for central cord syndrome:\n    *   **Motor:** **Upper extremity weakness > lower extremity weakness.** The corticospinal tracts are arranged with fibers to the upper limbs more centrally. Weakness of hand grip and clumsiness (impaired fine motor) are hallmark findings.\n    *   **Sensory:** **Burning pain and sensory loss** (pinprick deficit in fingers) due to spinothalamic tract involvement. The \"cape\" or \"shawl\" distribution (shoulders and arms) is classic.\n    *   **Reflexes:** **Decreased triceps reflexes (C7)** indicate a lower motor neuron lesion at the level of cord injury, while reflexes below the lesion may be brisk (upper motor neuron signs), though not mentioned here.\n    *   **Sparing:** No leg weakness or bowel/bladder symptoms indicates relative sparing of the more laterally placed sacral tracts, typical for central cord syndrome.\n3.  **Imaging:** The x-ray showing **diffuse spondylotic changes** but no acute fracture/dislocation is a critical clue. This pre-existing stenosis makes the cord vulnerable to injury from seemingly minor trauma (like whiplash), where the cord is compressed during hyperextension.\n\n**Management Pearls for AMC:** Central cord syndrome is a **neurosurgical emergency**. Initial management includes spinal immobilisation, MRI to confirm the diagnosis and assess for cord compression/hematoma, and urgent neurosurgical consultation. Steroids (methylprednisolone) are controversial and not routinely recommended in current guidelines without neurosurgical input.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Acute stress disorder:** While the patient mentions stress, her symptoms are focal, objective (weakness, decreased reflexes, sensory deficit), and have a clear anatomical localisation to the cervical spinal cord. Acute stress disorder does not cause these specific neurological signs.\n- **B. Brachial plexus injury:** This typically presents with unilateral weakness and sensory loss in a specific nerve root or peripheral nerve distribution (e.g., Erb's or Klumpke's palsy). This patient has **bilateral**, symmetrical upper limb findings with triceps reflex depression, which points to a central (spinal cord) lesion rather than a peripheral plexus injury.\n- **C. Malingering:** There is no indication of secondary gain (e.g., ongoing litigation is not the focus, she is merely upset). The physical exam reveals objective neurological signs (decreased reflexes, weakness) that are difficult to feign consistently.\n- **D. Postconcussion syndrome:** This diagnosis requires a history of traumatic brain injury (TBI) with loss of consciousness, confusion, or amnesia. The stem explicitly states \"did not hit her head or lose consciousness.\" Symptoms are also not typical of postconcussion (e.g., headache, dizziness, cognitive fog); they are focal motor and sensory deficits.\n\n### 📚 Relevant Guidelines\n\n- **[NICE Guideline NG41: Spinal Injury: Assessment and Initial Management]**: Provides evidence-based recommendations for the assessment, imaging, and early management of traumatic spinal cord injury. — https://www.nice.org.uk/guidance/ng41\n- **[UpToDate: Central Cord Syndrome]**: A detailed clinical resource covering the pathophysiology, clinical features, diagnosis, and management of central cord syndrome. — https://www.uptodate.com/contents/central-cord-syndrome\n- **[Therapeutic Guidelines (eTG): Neurology - Spinal Cord Compression]**: Australian resource outlining the acute management of spinal cord compression, including traumatic injury. — https://tgldcdp.tg.org.au/viewTopic?topicfile=spinal-cord-compression&guidelineName=Neurology#toc_d1e289", "image_path": ""}, {"id": 34320, "date": "2026-02-01T10:20:36+00:00", "stem": "A newborn is delivered vaginally at term. The baby breathes quietly during sleep but develops loud noisy breathing when awake or crying. Physical examination is otherwise normal, and oxygen saturation is stable. What is the most likely diagnosis?", "options": "a. Subglottic stenosis\nb. Vocal cord paralysis\nc. Tracheomalacia\nd. Laryngomalacia\ne. Choanal atresia", "answer": "d. Laryngomalacia", "explanation": "### ✅ Correct Answer: d. Laryngomalacia\n\nThis is a classic presentation of **laryngomalacia**, the most common cause of stridor in infants. The clinical reasoning is based on the pathophysiology and typical history:\n\n1.  **Pathophysiology:** Laryngomalacia is a dynamic airway obstruction caused by the **inward collapse of floppy, immature supraglottic structures** (primarily the arytenoid cartilages and/or the epiglottis) during inspiration. The laryngeal tissues are underdeveloped and have poor tone.\n2.  **Key Diagnostic Features:**\n    *   **Timing of Stridor:** Symptoms are **worse with agitation, crying, or feeding**, and **improve when calm, asleep, or in the prone position**. Increased respiratory effort during crying generates greater negative inspiratory pressure, which sucks the floppy tissues inward, causing the characteristic **inspiratory stridor**. Quiet sleep reduces this effort.\n    *   **Age of Onset:** Typically presents within the first few weeks of life.\n    *   **Clinical Status:** The baby is otherwise well (\"physical examination is otherwise normal\") with **stable oxygenation**, indicating it is usually a self-limiting, benign condition. Failure to thrive or significant desaturation would suggest severe disease.\n3.  **Management Pearls for AMC:** Diagnosis is often clinical. Flexible nasopharyngolaryngoscopy is the gold standard for confirmation. Management is primarily **reassurance and monitoring** as >90% resolve spontaneously by 12-24 months. Parents are advised on positioning (upright during feeds) and monitoring for red flags (apnoea, cyanosis, poor weight gain). Severe cases may require surgical intervention (supraglottoplasty).\n\n### ❌ Why the Other Options Are Wrong\n\n- **a. Subglottic stenosis:** This causes fixed airway narrowing **below** the vocal cords. Stridor is typically **biphasic** (both inspiratory and expiratory) and constant, not variable with state of arousal. It may have a history of prolonged intubation.\n- **b. Vocal cord paralysis:** Stridor may be inspiratory or biphasic, but it is often associated with a **weak or hoarse cry** (due to impaired vocal cord adduction). It is not typically positional/state-dependent in the way described. It can be unilateral or bilateral.\n- **c. Tracheomalacia:** This is weakness of the tracheal walls, causing **expiratory stridor or wheeze** (collapsing on expiration), not primarily inspiratory. It may be associated with a \"barking\" or \"brassy\" cough. Symptoms often worsen with respiratory infections.\n- **e. Choanal atresia:** This is a **nasal** obstruction (bony or membranous blockage of the posterior nares). It presents with **cyclical cyanosis** – the baby is cyanotic when quiet (as obligate nasal breathers) and pink when crying (mouth breathing). It does not cause loud noisy breathing specifically when awake/crying; in fact, crying relieves the symptoms.\n\n### 📚 Relevant Guidelines\n\n- **[RCH Melbourne Clinical Practice Guideline: Stridor]**: A comprehensive Australian paediatric guideline covering the assessment, differential diagnosis, and management of stridor, with a clear section on laryngomalacia. — https://www.rch.org.au/clinicalguide/guideline_index/Stridor/\n- **[UpToDate: Laryngomalacia]**: Provides detailed information on the epidemiology, clinical features, evaluation, and management of laryngomalacia in infants. — https://www.uptodate.com/contents/laryngomalacia\n- **[American Academy of Otolaryngology–Head and Neck Surgery: Clinical Consensus Statement on Laryngomalacia]**: An authoritative evidence-based consensus on diagnosis and management. — https://journals.sagepub.com/doi/10.1177/0194599819834916", "image_path": ""}, {"id": 34331, "date": "2026-02-02T11:20:12+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "A. Ondansetron\nB. Methylprednisolone\nC. Folic acid\nD. Potassium chloride\nE. Thiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\nThiamine (Vitamin B1) must be administered before dextrose-containing solutions in malnourished patients, particularly those with hyperemesis gravidarum, to prevent precipitating Wernicke encephalopathy. This is a critical safety measure. The patient has classic features of severe hyperemesis gravidarum: persistent nausea/vomiting, inability to tolerate oral intake, weight loss (4 kg in 3 weeks), dehydration, metabolic alkalosis (from loss of gastric acid), and ketonuria (from starvation). In this state, thiamine stores are rapidly depleted. Administering dextrose without thiamine can precipitate acute Wernicke encephalopathy by increasing glucose metabolism, which further depletes the limited thiamine reserves required for carbohydrate metabolism in the brain. This can lead to the classic triad of confusion, ataxia, and ophthalmoplegia, which is a medical emergency. Thiamine is water-soluble, safe in pregnancy, and should be given IV before any glucose-containing fluids in patients at risk.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: This is an antiemetic used for nausea/vomiting in hyperemesis gravidarum. However, it has already been administered (diphenhydramine was given), and it is not a prerequisite for dextrose infusion. It does not prevent the metabolic complication in question.\n- **B. Methylprednisolone**: This is a corticosteroid sometimes used as a third-line treatment for refractory hyperemesis gravidarum. It is not required before dextrose and carries potential risks in early pregnancy (though evidence is mixed). It does not address the immediate metabolic risk.\n- **C. Folic acid**: This is a crucial prenatal vitamin for neural tube defect prevention, but it is not time-critical before dextrose administration. Deficiency does not cause acute encephalopathy from glucose infusion.\n- **D. Potassium chloride**: While patients with severe vomiting and metabolic alkalosis often have hypokalaemia (from renal potassium wasting and GI loss), and potassium replacement is important during fluid resuscitation, it is not an absolute prerequisite before dextrose to prevent a specific neurological emergency. Thiamine takes precedence.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines Australia (eTG) – Hyperemesis Gravidarum]**: Recommends thiamine supplementation (IV or IM) for all women admitted with hyperemesis gravidarum, especially before dextrose infusion, to prevent Wernicke encephalopathy. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hyperemesis-gravidarum&guidelineName=Women%27s%20Health\n- **[RANZCOG – Management of Nausea and Vomiting in Pregnancy and Hyperemesis Gravidarum]**: States that thiamine should be administered to all women requiring hospital admission for hyperemesis, particularly before IV dextrose. — https://ranzcog.edu.au/womens-health/statement-guidelines\n- **[UpToDate – Treatment of Hyperemesis Gravidarum]**: Emphasizes the importance of thiamine repletion prior to carbohydrate loading to prevent Wernicke's encephalopathy. — https://www.uptodate.com/contents/treatment-of-hyperemesis-gravidarum", "image_path": ""}, {"id": 34332, "date": "2026-02-02T11:26:24+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "### ✅ Correct Answer: A. Uterine rupture\nUterine rupture is a catastrophic obstetric emergency where there is a full-thickness disruption of the uterine wall. The classic presentation includes: 1) **Sudden, severe abdominal pain** (often described as 'tearing' or 'ripping'), 2) **Abrupt cessation of uterine contractions** (as the uterus loses its integrity), 3) **Maternal shock** (hypotension, tachycardia) from intra-abdominal haemorrhage, 4) **Fetal distress** (persistent bradycardia) due to acute placental separation and compromised blood flow, and 5) **Change in fetal station or presentation** (the presenting part may retract or become ballotable as the fetus or parts of it extrude into the abdomen). The key clue here is 'minimal vaginal bleeding' because bleeding is often concealed intraperitoneally. This patient's parity (G3P2) is a risk factor, especially if she has a prior uterine scar (e.g., from previous caesarean section), though the stem doesn't explicitly state it.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding at the time of membrane rupture, often with sudden fetal bradycardia due to fetal exsanguination from ruptured fetal vessels. It does not cause maternal abdominal pain, cessation of contractions, or maternal shock in the absence of significant maternal blood loss.\n- **C. Amniotic fluid embolism (AFE)**: Presents with acute onset of dyspnoea, hypoxia, cardiovascular collapse (hypotension, tachycardia), and coagulopathy, often followed by seizures or cardiac arrest. It is a maternal cardiorespiratory crisis. While fetal bradycardia occurs secondary to maternal collapse, the hallmark is respiratory distress, not severe abdominal pain or change in fetal station. Contractions may continue (often leading to uterine atony and postpartum haemorrhage).\n- **D. Placental abruption**: Presents with sudden onset of constant, severe abdominal pain, often with a 'woody', tender uterus. Vaginal bleeding is usually present (can be concealed). Fetal distress is common. However, contractions typically become hypertonic and frequent (tetanic), they do not 'stop abruptly'. There is no change in fetal station.\n- **E. Cord prolapse**: Presents with sudden fetal bradycardia or variable decelerations, often after membrane rupture. On examination, the umbilical cord is palpable in the vagina. It does not cause severe maternal abdominal pain, maternal shock, or cessation of contractions.\n\n### 📚 Relevant Guidelines\n- **[RANZCOG – Management of Uterine Rupture]**: Outlines the diagnosis and immediate management of uterine rupture, emphasizing the need for rapid recognition, resuscitation, and laparotomy. — https://ranzcog.edu.au/womens-health/statement-guidelines\n- **[UpToDate – Uterine Rupture: Unscarred and Scarred Uterus]**: Details the risk factors, clinical features, diagnosis, and management of uterine rupture. — https://www.uptodate.com/contents/uterine-rupture-unscarred-and-scarred-uterus\n- **[Therapeutic Guidelines Australia (eTG) – Intrapartum Care]**: Covers the recognition and management of intrapartum emergencies including uterine rupture. — https://tgldcdp.tg.org.au/viewTopic?topicfile=intrapartum-care&guidelineName=Women%27s%20Health", "image_path": ""}, {"id": 34335, "date": "2026-02-02T11:59:58+00:00", "stem": "A 62-year-old man presents with recurrent episodes of dizziness precipitated when he looks upwards while painting his ceiling. Each episode lasts several minutes. He has vascular risk factors including hypertension and diabetes. There is no hearing loss or tinnitus.\n\nWhat is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo\nB. Vestibular neuritis\nC. Ménière’s disease\nD. Vertebrobasilar ischaemia\nE. Acoustic neuroma", "answer": "D. Vertebrobasilar ischaemia", "explanation": "### ✅ Correct Answer: D. Vertebrobasilar ischaemia\nThis patient presents with vertigo triggered by neck extension (looking upwards), lasting **several minutes**, in the context of significant vascular risk factors (hypertension, diabetes). This is highly suggestive of **vertebrobasilar (posterior circulation) ischaemia**. Neck extension can compromise blood flow through the vertebral arteries, especially if there is underlying atherosclerosis or cervical spondylosis, leading to transient ischaemia of the brainstem and cerebellum (which control balance). The key differentiating feature from peripheral causes like BPPV is the **duration**: central causes (like vertebrobasilar ischaemia) often cause vertigo lasting minutes to hours, whereas BPPV causes brief episodes lasting seconds (<1 minute). The absence of auditory symptoms (hearing loss, tinnitus) makes peripheral labyrinthine disorders (Ménière's, acoustic neuroma) less likely.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: Characterized by brief episodes of vertigo (typically **10-30 seconds**) triggered by specific head movements (e.g., rolling over in bed, looking up, bending down). The hallmark is the short duration and latency/nystagmus seen on Dix-Hallpike manoeuvre. Episodes lasting 'several minutes' are atypical for classic BPPV.\n- **B. Vestibular neuritis**: Presents with a **single, prolonged episode** of severe vertigo lasting days to weeks, often with nausea, vomiting, and gait instability. It is not typically triggered by specific positions and recurs in brief episodes.\n- **C. Ménière’s disease**: Characterized by the triad of episodic vertigo (lasting 20 minutes to several hours), **fluctuating sensorineural hearing loss**, **tinnitus**,
