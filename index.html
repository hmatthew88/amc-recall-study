    <script>
        const questionsData = [{"id": 34160, "date": "2026-01-20T13:51:31+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A", "explanation": "### ✅ Correct Answer: A. Uterine rupture\n\n**Clinical Reasoning:**\n1.  **Classic Presentation:** The patient presents with the classic triad of uterine rupture: (a) sudden, severe abdominal pain; (b) cessation of contractions; and (c) maternal hemodynamic instability (tachycardia and hypotension).\n2.  **Key Examination Findings:** The change in fetal station with the presenting part no longer being engaged is a pathognomonic sign of uterine rupture, as the fetus or part of the fetus can move out of the uterus into the abdominal cavity.\n3.  **Fetal Status:** Persistent fetal bradycardia is a direct consequence of compromised uteroplacental blood flow and fetal hypoxia due to the rupture.\n4.  **Bleeding Pattern:** Minimal vaginal bleeding is common in uterine rupture, as the bleeding is often concealed intra-abdominally, leading to hypovolemic shock that is disproportionate to visible blood loss.\n5.  **Risk Factors:** The patient is gravida 3 para 2, indicating a multiparous uterus, which is a risk factor for uterine rupture, especially in the setting of a previous cesarean section (though not explicitly stated, it is a common association).\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding and fetal bradycardia or demise following rupture of fetal vessels, typically at the time of membrane rupture. It does not cause cessation of contractions, severe maternal pain, or change in fetal station.\n- **C. Amniotic fluid embolism**: Presents with acute onset of dyspnea, hypoxia, cardiovascular collapse, and coagulopathy (DIC). While it can cause fetal bradycardia, it is not associated with a change in fetal station or cessation of contractions as a primary feature. The hallmark is profound maternal respiratory distress.\n- **D. Placental abruption**: Presents with painful, dark vaginal bleeding, a tense/tender uterus, and fetal distress. Contractions typically become hypertonic and frequent, not absent. There is no change in fetal station.\n- **E. Cord prolapse**: Presents with sudden fetal bradycardia following rupture of membranes, often with a palpable cord on vaginal examination. It does not cause severe maternal abdominal pain, hemodynamic instability, or cessation of contractions.\n\n### 📚 Relevant Guidelines\n- **RANZCOG Management of Uterine Rupture**: Provides diagnostic criteria and management algorithms for suspected uterine rupture, emphasizing the need for immediate laparotomy. — https://ranzcog.edu.au/womens-health/guidelines/uterine-rupture\n- **eTG (Therapeutic Guidelines) – Obstetric Emergencies**: Covers the differential diagnosis and immediate management of acute abdominal pain and fetal distress in labour, including uterine rupture. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Obstetrics&frompage=etggep\n- **UpToDate – Uterine Rupture**: Detailed review of risk factors, clinical presentation, diagnosis, and management of uterine rupture during labour. — https://www.uptodate.com/contents/uterine-rupture-after-previous-cesarean-delivery", "image_path": ""}, {"id": 34161, "date": "2026-01-20T13:52:26+00:00", "stem": "**A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?**", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "B", "explanation": "### ✅ Correct Answer: B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\n\n**Clinical Reasoning:**\n1.  **Step 1: Assess the pH.** pH 7.34 indicates acidaemia.\n2.  **Step 2: Assess the Primary Process.** The bicarbonate (HCO3-) is low at 20 mEq/L (normal ~24), indicating a metabolic acidosis.\n3.  **Step 3: Calculate the Anion Gap (AG).** AG = Na - (Cl + HCO3) = 140 - (98 + 20) = 22. A normal AG is 8-12 mEq/L. An elevated AG (>12) confirms a **High Anion Gap Metabolic Acidosis (HAGMA)**. The common causes are remembered by the mnemonic **MUDPILES** (Methanol, Uremia, DKA, Paraldehyde, Iron/Isoniazid, Lactic acidosis, Ethylene glycol, Salicylates). Here, the markedly elevated BUN/Cr points to **Uremia** as the cause.\n4.  **Step 4: Check for Compensation.** For a primary metabolic acidosis, the expected respiratory compensation is calculated by Winter's formula: **Expected pCO2 = (1.5 x HCO3) + 8 ± 2**. Expected pCO2 = (1.5 x 20) + 8 = 38 mm Hg. The measured pCO2 is 38 mm Hg, indicating **appropriate respiratory compensation** (not a primary respiratory disorder). This rules out options A and E.\n5.  **Step 5: Calculate the Delta Gap (ΔGap) to uncover a hidden disorder.**\n    *   ΔGap = Measured AG - Normal AG = 22 - 12 = 10.\n    *   ΔHCO3 = Normal HCO3 - Measured HCO3 = 24 - 20 = 4.\n    *   If ΔGap ≈ ΔHCO3, it's a simple HAGMA. If ΔGap > ΔHCO3, there is an additional metabolic alkalosis. Here, ΔGap (10) is **greater than** ΔHCO3 (4). This indicates that for the degree of HAGMA, the bicarbonate is higher than expected, revealing a **concurrent metabolic alkalosis**.\n6.  **Step 6: Identify the Cause of the Metabolic Alkalosis.** The clinical history of vomiting and dehydration provides the cause. Vomiting leads to loss of gastric acid (HCl), resulting in a metabolic alkalosis. Dehydration (contraction alkalosis) and hypovolaemia (activating the renin-angiotensin-aldosterone system) also contribute.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis**: Incorrect. The pCO2 of 38 mm Hg is exactly what is expected for appropriate respiratory compensation for the metabolic acidosis (per Winter's formula). A respiratory acidosis would require a pCO2 **higher** than the predicted value.\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation**: Incorrect. The pH is acidic (7.34), not alkaline. A simple metabolic alkalosis would have a pH >7.45 and an elevated HCO3-.\n- **D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation**: Incorrect. While the HAGMA and respiratory compensation are correct, this option misses the coexisting metabolic alkalosis revealed by the delta gap calculation (ΔGap > ΔHCO3).\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis**: Incorrect. The pCO2 is not low enough to indicate a primary respiratory alkalosis. A respiratory alkalosis would require a pCO2 **lower** than the predicted compensatory value.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Acid-base disorders**: Provides a structured approach to diagnosing simple and mixed acid-base disorders, including the use of anion gap and delta gap. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Renal&frompage=etggep\n- **UpToDate – Approach to the adult with metabolic acidosis**: Detailed explanation of the stepwise approach, anion gap, delta gap, and clinical interpretation. — https://www.uptodate.com/contents/approach-to-the-adult-with-metabolic-acidosis\n- **KDIGO Clinical Practice Guideline for Acute Kidney Injury**: While focused on AKI, it includes management principles for the metabolic complications of renal failure, including acidosis. — https://kdigo.org/guidelines/acute-kidney-injury/", "image_path": ""}, {"id": 34187, "date": "2026-01-22T12:46:55+00:00", "stem": "A 45-year-old male presented with sharp, burning, stabbing pain in the lateral aspect of the right foot. You suspect L5-S1 radiculopathy. Which of the following is lost in L5-S1 disc prolapse?", "options": "A. Knee jerk\nB. Dorsiflexion of big toe and foot\nC. Inversion of foot\nD. Eversion of foot\nE. Ankle jerk", "answer": "E", "explanation": "### ✅ Correct Answer: E. Ankle jerk\n\nThe L5-S1 disc prolapse typically compresses the S1 nerve root. The S1 nerve root is primarily responsible for innervating the gastrocnemius and soleus muscles (via the tibial nerve), which are involved in plantar flexion. The ankle jerk (Achilles reflex) is a deep tendon reflex that tests the S1 nerve root integrity. A diminished or absent ankle jerk is a classic clinical sign of S1 radiculopathy. The pain described (lateral foot) aligns with the S1 dermatome, which covers the lateral aspect of the foot and the sole.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Knee jerk**: The knee jerk (patellar reflex) is primarily mediated by the L2-L4 nerve roots (mainly L4). It is not typically affected by an L5-S1 disc prolapse.\n- **B. Dorsiflexion of big toe and foot**: Dorsiflexion of the foot and big toe is primarily an L4 and L5 function (via the deep peroneal nerve). Weakness here is more characteristic of L4 or L5 radiculopathy, not S1.\n- **C. Inversion of foot**: Inversion of the foot is primarily an L4 function (via the tibial nerve). It is not a key finding in S1 radiculopathy.\n- **D. Eversion of foot**: Eversion of the foot is primarily an L5 function (via the superficial peroneal nerve). While L5-S1 disc herniation can sometimes affect the L5 root if it is far lateral, the classic presentation described (lateral foot pain, S1 dermatome) points to S1 compression, where eversion is typically preserved.\n\n### 📚 Relevant Guidelines\n- **NICE Clinical Guideline [NG59] – Low back pain and sciatica in over 16s**: Provides assessment and management recommendations for radiculopathy, including neurological examination findings for specific nerve roots. — https://www.nice.org.uk/guidance/ng59\n- **Therapeutic Guidelines (eTG) – Neurological disorders**: Includes information on the clinical assessment of radiculopathy and the correlation between neurological deficits and spinal nerve root levels. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate – Lumbar spinal stenosis: Pathophysiology, clinical features, and diagnosis**: Details the clinical presentation and examination findings of lumbar radiculopathies, including S1 nerve root involvement. — https://www.uptodate.com/contents/lumbar-spinal-stenosis-pathophysiology-clinical-features-and-diagnosis", "image_path": ""}, {"id": 34188, "date": "2026-01-22T12:56:19+00:00", "stem": "After a left elbow injury, a 55-year-old man develops weakness of the long flexors of the right thumb and index finger. He is also unable to do forearm pronation on the same side. Which one of the nerves is involved?", "options": "A. Radial nerve\nB. Median nerve\nC. Anterior interosseous nerve\nD. Posterior interosseous nerve\nE. Ulnar nerve", "answer": "C", "explanation": "### ✅ Correct Answer: C. Anterior interosseous nerve\n\nThe anterior interosseous nerve (AIN) is a pure motor branch of the median nerve that arises in the forearm. It innervates three key muscles:\n1. **Flexor pollicis longus (FPL)**: Flexes the interphalangeal joint of the thumb.\n2. **Flexor digitorum profundus (FDP) to the index (and sometimes middle) finger**: Flexes the distal interphalangeal joints.\n3. **Pronator quadratus**: The primary muscle for forearm pronation.\n\nThe clinical presentation—weakness of thumb and index finger flexion (loss of FPL and FDP to index) and inability to pronate the forearm (loss of pronator quadratus)—is classic for an AIN palsy (Kiloh-Nevin syndrome). The pronator teres (innervated by the main median nerve) is typically spared, so the patient can still initiate pronation but it is weak and the characteristic 'pinch' deformity (inability to make an 'OK' sign) may be present.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Radial nerve**: The radial nerve innervates extensor muscles of the forearm and hand (e.g., wrist, finger, and thumb extensors). It does not innervate any flexors or the pronator quadratus. Injury causes wrist drop, not the described flexor weakness.\n- **B. Median nerve (main trunk)**: A proximal median nerve injury would cause weakness of all median-innervated muscles, including thenar eminence muscles (opponens pollicis, abductor pollicis brevis, flexor pollicis brevis) leading to ape hand deformity, and sensory loss over the lateral palm and digits. The pronator teres (for pronation) and flexor carpi radialis would also be affected. The described isolated motor loss of specific deep flexors and pronator quadratus points to the AIN branch.\n- **D. Posterior interosseous nerve**: This is a branch of the radial nerve. It innervates the extensor muscles of the forearm (e.g., extensor digitorum, extensor carpi ulnaris). Injury causes finger and wrist extension weakness, not flexor or pronator weakness.\n- **E. Ulnar nerve**: The ulnar nerve innervates most intrinsic hand muscles (except thenar), the FDP to the ring and little fingers, and the flexor carpi ulnaris. Injury causes claw hand deformity, sensory loss over the medial hand, and weakness of finger abduction/adduction. It does not innervate the FPL, FDP to index, or pronator quadratus.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Neurological disorders**: Provides an overview of peripheral nerve injuries and their clinical presentations. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate – Anterior interosseous neuropathy**: Details the anatomy, etiology, clinical features, and diagnosis of AIN palsy. — https://www.uptodate.com/contents/anterior-interosseous-neuropathy\n- **American Academy of Orthopaedic Surgeons (AAOS) – Nerve Injuries About the Elbow**: Covers the evaluation and management of nerve injuries around the elbow, including median nerve and its branches. — https://www.aaos.org/", "image_path": ""}, {"id": 34189, "date": "2026-01-22T12:57:17+00:00", "stem": "You are working as a resident medical officer at a local children hospital in Adelaide. You are seeing a 1-week old baby for complete neonatal examination. All the physical examination is unremarkable except the following findings:\n– The knees were at different heights when the hips and knees were flexed.\n– Asymmetric skin folds and limited abduction of the affected hip were also seen.\nWhat is the most likely diagnosis?", "options": "A. Osgood-Schlatter disease\nB. Slipped capital femoral epiphysis\nC. Developmental dysplasia of the hip\nD. Femoral head fracture\nE. Legg-Calve-Perthes disease", "answer": "C", "explanation": "### ✅ Correct Answer: C. Developmental dysplasia of the hip\n\nDevelopmental dysplasia of the hip (DDH) is a spectrum of disorders where the femoral head has an abnormal relationship with the acetabulum, ranging from instability to complete dislocation. It is a classic finding on neonatal and infant screening examinations. The described signs are hallmark features:\n1. **Galeazzi sign (Allis sign)**: When the hips and knees are flexed, the knees are at different heights. This indicates femoral shortening on the affected side due to posterior dislocation of the hip.\n2. **Asymmetric skin folds**: Asymmetry of the gluteal or thigh folds can be a suggestive, but not definitive, sign.\n3. **Limited abduction**: In a dislocated hip, abduction is restricted due to tight adductor muscles and the mechanical block of the dislocated femoral head.\nOther classic signs include the Ortolani maneuver (a 'clunk' felt as the dislocated hip reduces) and the Barlow maneuver (dislocating an unstable hip). DDH is most common in first-born females, breech presentation, and with a family history.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Osgood-Schlatter disease**: This is an overuse injury causing inflammation at the tibial tuberosity apophysis. It presents in active adolescents (typically 10-15 years) with knee pain and tenderness, not in neonates.\n- **B. Slipped capital femoral epiphysis (SCFE)**: This is a displacement of the femoral head epiphysis posteriorly and inferiorly relative to the femoral neck. It presents in adolescents (often obese, during growth spurts) with hip/knee pain and limping, not in neonates.\n- **D. Femoral head fracture**: This is an acute traumatic injury, extremely rare in a 1-week-old without a history of significant trauma (e.g., birth trauma, which more commonly causes clavicle or humerus fractures). It would present with acute pain, swelling, and pseudoparalysis, not the classic screening signs of DDH.\n- **E. Legg-Calve-Perthes disease**: This is idiopathic avascular necrosis of the femoral head. It presents in children aged 4-8 years with a limp and hip pain. It is not a congenital or neonatal condition.\n\n### 📚 Relevant Guidelines\n- **RACGP – Developmental dysplasia of the hip: from early detection to adulthood**: Provides guidelines for screening, diagnosis, and management of DDH in the Australian context. — https://www.racgp.org.au/afp/2013/june/developmental-dysplasia-of-the-hip\n- **The Royal Children's Hospital Melbourne – Clinical Practice Guideline: Developmental Dysplasia of the Hip**: A detailed guideline on assessment and referral for suspected DDH. — https://www.rch.org.au/clinicalguide/guideline_index/Developmental_dysplasia_of_the_hip_DDH/\n- **Paediatrics & Child Health Division (The Royal Australasian College of Physicians) – Position Statement: Hip dysplasia in infants**: Outlines screening and early detection strategies. — https://www.racp.edu.au/", "image_path": ""}, {"id": 34190, "date": "2026-01-22T12:57:37+00:00", "stem": "Three months ago you started Mary, aged 73, on risedronate 35mg weekly, after she was diagnosed with osteoporosis confirmed with bone mineral density (BMD). Her presenting symptom at that time was back pain. Examination revealed height decrease and mild kyphosis, as well as tenderness over thoracic vertebrae. Despite being on risedronate, not only did her symptoms persist, she also developed pain over new areas of her thoracic. Investigations have established new osteoporotic fractures. Which one of the following would be the most appropriate management option for her?", "options": "A. Continue risedronate at the same dose\nB. Switch to alendronate\nC. Increase the dose of risedronate\nD. Switch to zoledronic acid\nE. Switch to teriparatide", "answer": "E", "explanation": "### ✅ Correct Answer: E. Switch to teriparatide\n\nThis patient has severe osteoporosis with multiple vertebral fractures occurring or progressing **while on** an oral bisphosphonate (risedronate). This scenario represents **treatment failure** or an **inadequate response** to first-line antiresorptive therapy. According to Australian and international guidelines, the next step for patients who fracture while on oral bisphosphonates, or who have very high fracture risk (as indicated by multiple fractures and significant height loss/kyphosis), is to switch to an **anabolic agent**.\n\n**Teriparatide** (recombinant human parathyroid hormone [PTH 1-34]) is an anabolic agent that stimulates new bone formation. It is indicated for the treatment of severe osteoporosis in postmenopausal women and men at high risk of fracture, particularly those who have failed or are intolerant to other therapies. It has been shown to significantly reduce the risk of new vertebral and nonvertebral fractures. The treatment course is usually limited to 18-24 months, after which antiresorptive therapy (like a bisphosphonate) is required to maintain bone density.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Continue risedronate at the same dose**: This is incorrect because the patient has already demonstrated treatment failure (new fractures while on therapy). Continuing the same regimen is unlikely to prevent further fractures.\n- **B. Switch to alendronate**: Alendronate is another oral bisphosphonate with a similar mechanism of action (antiresorptive). Switching within the same drug class after a clear failure is not the recommended strategy, as the patient may have a poor response to the entire class or issues with absorption/adherence.\n- **C. Increase the dose of risedronate**: Standard weekly dosing of risedronate (35 mg) is the approved therapeutic dose for osteoporosis. Increasing the dose is not standard practice and is not proven to be more effective in preventing fractures in this context.\n- **D. Switch to zoledronic acid**: Zoledronic acid is a potent intravenous bisphosphonate. While it is an option for patients intolerant of oral bisphosphonates, switching to another antiresorptive (even a more potent one) may still be suboptimal in a patient who is actively fracturing on therapy. Guidelines favor an anabolic agent (teriparatide) first in cases of severe treatment failure, followed later by an antiresorptive like zoledronic acid to consolidate gains.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Osteoporosis**: Provides Australian recommendations for the management of osteoporosis, including treatment algorithms for patients who fracture on therapy. — https://tgldcdp.tg.org.au/etgAccess\n- **RACGP – Osteoporosis prevention, diagnosis and management in postmenopausal women and men over 50 years of age**: A summary of key guidelines including indications for teriparatide. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/osteoporosis\n- **Endocrine Society of Australia – Position Statement: Management of Osteoporosis**: Details treatment options and sequencing, including the role of anabolic agents. — https://www.endocrinesociety.org.au/", "image_path": ""}, {"id": 34211, "date": "2026-01-23T13:24:33+00:00", "stem": "A 32-year-old woman is brought to the hospital due to sudden-onset left-sided weakness. According to the family, she has had fatigue, malaise, and decreased appetite over the last several weeks. She attributed these symptoms to a “viral infection” and treated herself with over-the-counter acetaminophen. Her temperature is 37.4 C (99.4 F), blood pressure is 140/86 mm Hg, and pulse is 82/min. The patient appears confused and agitated. Lungs are clear to auscultation. A 2/6 holosystolic murmur is heard at the cardiac apex. Extremity examination reveals left-sided muscle strength is 1/5 with hyperactive deep tendon reflexes. Babinski sign is present on the left side. Laboratory results are as follows:\n\nHemoglobin 10.2 g/dL\nPlatelets 64,000/mm3\nLeukocytes 6,800/mm3\nBlood urea nitrogen 18 mg/dL\nCreatinine 70 umol/L\nAntinuclear antibody (ANA) positive\nRapid plasma reagin (RPR) positive\nCerebrospinal fluid cell counts are normal, and cultures are negative. Which of the following is the most likely diagnosis in this patient?", "options": "A. Antiphospholipid syndrome\nB. Multiple sclerosis\nC. Neurosyphilis\nD. Polyarteritis nodosa\nE. Rheumatic fever", "answer": "C. Neurosyphilis", "explanation": "### ✅ Correct Answer: C. Neurosyphilis\n\nThe clinical presentation is highly suggestive of neurosyphilis, specifically meningovascular syphilis. The key diagnostic features are:\n\n1. **Neurological Deficit**: Sudden-onset left-sided weakness with upper motor neuron signs (hyperreflexia, Babinski sign) indicates a cerebrovascular event (stroke).\n2. **Positive RPR**: This is a non-treponemal test for syphilis. A positive result in this context is highly significant.\n3. **Constitutional Symptoms**: Weeks of fatigue, malaise, and decreased appetite are consistent with secondary syphilis.\n4. **Cardiac Finding**: The apical holosystolic murmur could represent a syphilitic aortitis leading to aortic regurgitation, though this is less common today. It is a classic historical association.\n5. **Haematological Abnormalities**: Mild anaemia and thrombocytopenia can be seen in secondary syphilis.\n6. **Normal CSF Cell Count**: In meningovascular syphilis, CSF may be normal or show only mild lymphocytic pleocytosis. A normal CSF does not rule it out, especially if the presentation is primarily vascular (infarction).\n7. **Positive ANA**: This is likely a false positive or incidental finding, which is common in syphilis (a 'biologic false positive' for autoimmune serology).\n\n**Clinical Reasoning**: The combination of a positive syphilis serology (RPR) with a stroke in a young adult, preceded by constitutional symptoms, is classic for meningovascular syphilis. The timeline fits: primary chancre (often missed) → secondary stage (weeks of systemic symptoms) → tertiary stage (neurological or cardiovascular manifestations years later). However, neurosyphilis can occur at any stage. The management priority is to confirm the diagnosis with a treponemal-specific test (e.g., TPPA) and CSF VDRL, then treat with intravenous penicillin G.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Antiphospholipid syndrome**: This is a strong contender as it causes thrombotic events in young adults. However, the positive RPR is a more direct and specific finding. APS would require specific antiphospholipid antibodies (lupus anticoagulant, anticardiolipin) for diagnosis, which are not mentioned. The murmur and preceding constitutional symptoms are less typical for APS.\n- **B. Multiple sclerosis**: MS typically presents with relapsing-remitting neurological deficits (e.g., optic neuritis, sensory symptoms, internuclear ophthalmoplegia), not a single, sudden, dense hemiparesis. It does not cause positive RPR or cardiac murmurs.\n- **D. Polyarteritis nodosa**: PAN is a systemic vasculitis that can cause mononeuritis multiplex, skin lesions, hypertension, and renal involvement. Stroke is not a common presentation. It is not associated with positive RPR or cardiac murmurs of this type.\n- **E. Rheumatic fever**: This follows Group A streptococcal infection and presents with migratory arthritis, carditis (which could cause a murmur), chorea, erythema marginatum, or subcutaneous nodules. It does not cause stroke or positive RPR. The neurological manifestation of rheumatic fever is Sydenham's chorea, not a sudden hemiparesis.\n\n### 📚 Relevant Guidelines\n\n- **Australian STI Management Guidelines (University of Sydney)**: Provides comprehensive guidance on the diagnosis and management of syphilis, including neurosyphilis. — https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/\n- **Therapeutic Guidelines: Antibiotic (eTG)**: Contains the definitive Australian recommendations for the treatment of all stages of syphilis, including neurosyphilis with intravenous penicillin. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etg\n- **Centers for Disease Control and Prevention (CDC) - Syphilis**: Although US-based, provides a clear and evidence-based overview of clinical stages, diagnostic testing, and treatment. — https://www.cdc.gov/std/treatment-guidelines/syphilis.htm", "image_path": ""}, {"id": 34248, "date": "2026-01-26T09:42:53+00:00", "stem": "Identify the nerve injury based on the clinical description.", "options": "A. Wrist drop\nB. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger\nC. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\nD. Branch of radial nerve, purely motor; for wrist, finger and thumb extension\nE. Injury causes claw hand, decreased finger abduction and sensory loss of little finger", "answer": "C", "explanation": "### ✅ Correct Answer: C. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\n\nThe description refers to the **Anterior Interosseous Nerve (AIN)**, a purely motor branch of the median nerve. Injury results in:\n- **Inability to make the 'OK' sign (or pinch sign)**: Due to paralysis of the flexor pollicis longus (FPL) and flexor diglicus profundus (FDP) to the index finger, preventing tip-to-tip pinch.\n- **Weak pronation**: Due to involvement of the pronator quadratus, especially noticeable when the elbow is flexed (isolating it from the stronger pronator teres).\n- **Pathophysiology**: The AIN innervates FPL, FDP to index/middle fingers, and pronator quadratus. It is often injured by trauma (e.g., forearm fractures) or compression (Kiloh-Nevin syndrome).\n- **Key diagnostic feature**: The patient cannot form a circle with thumb and index finger; instead, they produce a 'pinch' with hyperextension at the IP joints (Froment's sign is for ulnar nerve). No sensory loss, as AIN is purely motor.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Wrist drop**: This is classic for **radial nerve injury** (Saturday night palsy, humeral fracture). Affects extensors of wrist, fingers, and thumb. The AIN does not affect wrist extension.\n- **B. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger**: This describes **median nerve injury at the wrist** (e.g., carpal tunnel syndrome affecting the recurrent thenar branch and palmar cutaneous branches). Thumb opposition is lost due to thenar muscle weakness, and sensory loss involves thumb, index, middle, and lateral half of ring finger. The AIN is proximal and purely motor.\n- **D. Branch of radial nerve, purely motor; for wrist, finger and thumb extension**: This is the **posterior interosseous nerve (PIN)**, a motor branch of the radial nerve. Injury causes finger and thumb extension weakness but **spares wrist extension** (extensor carpi radialis longus is innervated proximally). The 'OK' sign and pronation are unaffected.\n- **E. Injury causes claw hand, decreased finger abduction and sensory loss of little finger**: This is classic **ulnar nerve injury** (e.g., at elbow or wrist). Clawing (hyperextension at MCP, flexion at IP joints) due to loss of lumbricals/interossei; sensory loss over little finger and ulnar half of ring finger. The AIN does not cause clawing or sensory loss.\n\n### 📚 Relevant Guidelines\n- **[eTG complete (Therapeutic Guidelines) – Neurology]**: Covers peripheral nerve injuries, examination, and management — https://tgldcdp.tg.org.au/etgcomplete\n- **[RACGP – Musculoskeletal and nerve examination]**: Guidelines for assessing upper limb nerve function in primary care — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines\n- **[UpToDate – Anterior interosseous neuropathy]**: Detailed pathophysiology, clinical features, and diagnostic approach — https://www.uptodate.com/contents/anterior-interosseous-neuropathy", "image_path": ""}, {"id": 34282, "date": "2026-01-29T06:43:15+00:00", "stem": "A 34-year-old multigravida presents for prenatal care in the second trimester. She admits to a past history of substance abuse but states she has been clean for 6 months. With her second pregnancy she experienced a preterm delivery at 34 weeks' gestation of a male neonate who died within the first day of life. She states that at delivery the baby was swollen with skin lesions and that the placenta was very large. She was treated with antibiotics but she does not remember the name or other details. On a routine prenatal panel with this current pregnancy she is found to have a positive VDRL (Venereal Disease Research Laboratory) test. What is the recommended mode of delivery", "options": "a.Vaginal\nb.Cesarean\nc.Forcep assisted\nd. Vacuum assisted", "answer": "a. Vaginal", "explanation": "### ✅ Correct Answer: a. Vaginal\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The patient has a positive VDRL test, indicating syphilis. The history of a previous neonate with hydrops fetalis (swelling), skin lesions, a large placenta, and early neonatal death is classic for **congenital syphilis**. The mother was likely treated during that pregnancy (hence the antibiotics), but this history confirms she has had syphilis for some time.\n2.  **Key Principle:** The mode of delivery for a pregnant person with syphilis is **not altered** by the infection itself. Syphilis is a systemic spirochetal infection (*Treponema pallidum*) that crosses the placenta, causing congenital infection. The risk to the fetus depends on the stage of maternal infection, adequacy of treatment, and timing of treatment relative to delivery.\n3.  **Management Focus:** The cornerstone of management is **prompt maternal treatment with penicillin** to treat the mother and prevent transmission to the fetus. The recommended regimen for syphilis in pregnancy is Benzathine penicillin G. The goal is to achieve adequate maternal treatment (typically completed at least 30 days before delivery for optimal fetal protection).\n4.  **Delivery Planning:** Cesarean delivery is **not indicated** solely for maternal syphilis. It does not prevent transmission, as the infection is hematogenous and transplacental. The decision for mode of delivery should be based on standard obstetric indications (e.g., fetal distress, failure to progress, placenta previa). Therefore, vaginal delivery is the recommended and expected mode.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Cesarean**: Cesarean section is not recommended for preventing congenital syphilis. The infection is transmitted via the placenta, not during passage through the birth canal. A C-section would be indicated only for standard obstetric reasons unrelated to syphilis.\n- **c. Forcep assisted**: Instrumental vaginal delivery (forceps) is an option for managing specific complications during the second stage of labor (e.g., prolonged second stage, maternal exhaustion). It is not a recommended *mode of delivery* specifically for syphilis and would only be used if such obstetric indications arise.\n- **d. Vacuum assisted**: Similar to forceps, vacuum-assisted delivery is an instrumental delivery method for specific obstetric indications. It is not the recommended mode of delivery for a patient with syphilis in the absence of those indications.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (Antibiotic) – Syphilis**: Provides the definitive Australian recommendations for the diagnosis and management of syphilis, including specific regimens for pregnant patients. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etgcomplete\n- **Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) Statement on Syphilis in Pregnancy**: Outlines the antenatal screening, management, and follow-up for syphilis in pregnancy, confirming that mode of delivery is not altered. — https://ranzcog.edu.au/news/statement-on-syphilis-in-pregnancy\n- **Australian STI Management Guidelines (ASHM) for Syphilis**: Comprehensive guidelines for STI management, including syphilis in pregnancy, emphasizing penicillin treatment and serological follow-up. — https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/", "image_path": ""}, {"id": 34283, "date": "2026-01-29T06:44:14+00:00", "stem": "A 58-year-old man presents with complaint of progressive difficulty in walking for the past few months. He denies any pain or pins and needles. On examinations, he drags his left foot while walking. On the left side, ankle tendon reflexes are exaggerated, the strength of plantar flexion and dorsifiexion are decreased and are 4/5. Sensation is intact. The right foot is completely normal. Plantar reflexes are equivocal bilaterally. The rest of physical examination including neurologic exam of the face and upper extremities are unremarkable. Lesions of which one of the following parts could be the mostly likely cause to this presentation?", "options": "A. Common peroneal nerve\nB. LS/51 nerve root\nC. Cervical spine\nD. Brainstem\nE. Cerebral cortex", "answer": "C. Cervical spine", "explanation": "### ✅ Correct Answer: C. Cervical spine\n\n**Clinical Reasoning:**\n1.  **Localising the Lesion:** The presentation is of a **progressive, painless, unilateral upper motor neuron (UMN) weakness** affecting the lower limb, with preserved sensation.\n    - **Key UMN Signs:** Exaggerated ankle reflexes (hyperreflexia) on the affected side.\n    - **Weakness Pattern:** Weakness of both dorsiflexion and plantarflexion (4/5) indicates involvement of the entire distal leg musculature, not just muscles supplied by a single peripheral nerve or root.\n    - **Sensation:** Intact sensation rules out a significant lesion in the sensory pathways at the level of the nerve root, spinal cord (if it affects the dorsal columns/spinothalamic tract), or brain.\n    - **Laterality:** The findings are strictly **unilateral** (left side only), which localises the lesion to a site where motor pathways for one side are compactly located, before they have crossed or after they have descended.\n2.  **Why Cervical Spine (Corticospinal Tract Lesion):**\n    - The corticospinal (pyramidal) tracts carry UMN signals from the cerebral cortex to the limbs. For the lower limb, these tracts are located in the **lateral funiculus of the spinal cord**.\n    - A unilateral lesion in the **cervical spinal cord** (e.g., from spondylosis, tumour, or demyelination like multiple sclerosis) can affect the descending lateral corticospinal tract serving the ipsilateral lower limb. Since the tracts for the arm are nearby, a careful exam might reveal subtle upper limb signs, but the question states the upper extremities are unremarkable, suggesting a lesion primarily affecting the leg fibres.\n    - This explains the pure motor UMN deficit (weakness, hyperreflexia) on one side with no sensory loss.\n3.  **Excluding Other Levels:**\n    - **Cerebral cortex (E)** or **Brainstem (D)**: A lesion here would likely cause **contralateral** weakness (as the corticospinal tracts cross in the medulla). The weakness here is ipsilateral (left-sided lesion causing left-sided weakness), pointing to a lesion **below the decussation** (i.e., in the spinal cord).\n    - **L5/S1 nerve root (B)**: This would cause a **lower motor neuron (LMN)** pattern: weakness in specific myotomes (e.g., L5: dorsiflexion; S1: plantarflexion), **diminished reflexes** (ankle jerk for S1), and almost always **sensory loss** and/or **radicular pain** in the corresponding dermatome. The presence of hyperreflexia and no pain/sensory loss rules this out.\n    - **Common peroneal nerve (A)**: This is an LMN lesion causing **foot drop** (weakness of dorsiflexion and eversion) with **normal plantarflexion** (supplied by tibial nerve). Sensation may be lost over the dorsum of the foot. Reflexes are normal or diminished, not exaggerated. The pattern here (both plantar and dorsiflexion weak) and hyperreflexia are incompatible.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Common peroneal nerve**: Causes a lower motor neuron foot drop with specific sensory loss. It does not cause hyperreflexia or weakness of plantarflexion (tibial nerve function).\n- **B. LS/51 nerve root**: A nerve root lesion (radiculopathy) presents with lower motor neuron signs (weakness, hyporeflexia, sensory deficit) and usually neuropathic pain in a dermatomal distribution. The exaggerated reflexes and intact sensation are directly contradictory.\n- **D. Brainstem**: A brainstem lesion affecting the corticospinal tract would typically cause **contralateral** body weakness. It might also involve cranial nerves (ipsilateral cranial nerve deficits with contralateral body weakness – crossed signs), which are absent here.\n- **E. Cerebral cortex**: A cortical lesion (e.g., stroke, tumour) would cause contralateral weakness. It might also be associated with other cortical signs like neglect, apraxia, or sensory loss, which are not present.\n\n### 📚 Relevant Guidelines\n- **UpToDate – Approach to the patient with muscle weakness**: Provides a systematic framework for localising neurological lesions (UMN vs LMN, central vs peripheral) based on exam findings. — https://www.uptodate.com/contents/approach-to-the-patient-with-muscle-weakness\n- **NICE Guideline [NG41] – Neurological conditions: recognition and referral**: Includes guidance on recognising signs of spinal cord compression, which can present with progressive UMN weakness. — https://www.nice.org.uk/guidance/ng41\n- **American Academy of Neurology – Practice Parameters for Cervical Spondylotic Myelopathy**: Details the clinical presentation (often with UMN signs in the legs) and diagnosis of cervical spine lesions causing myelopathy. — https://www.aan.com/Guidelines/home/GuidelineDetail/896", "image_path": ""}, {"id": 34304, "date": "2026-01-30T07:40:42+00:00", "stem": "A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "D", "explanation": "### ✅ Correct Answer: D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\n\n**Step-by-step clinical reasoning:**\n\n1. **Primary acid-base disorder identification:**\n   - pH 7.34 indicates acidemia (normal 7.35-7.45)\n   - Bicarbonate 20 mEq/L is low (normal 22-28), indicating metabolic acidosis\n   - PCO2 38 mm Hg is normal (normal 35-45)\n\n2. **Calculate anion gap:**\n   - Anion Gap = Na - (Cl + HCO3) = 140 - (98 + 20) = 22 mEq/L\n   - Normal anion gap is 8-12 mEq/L (or 3-11 with albumin correction)\n   - This is a high anion gap metabolic acidosis (HAGMA)\n\n3. **Albumin correction (important for accuracy):**\n   - Normal albumin = 4.0 g/dL, patient's = 3.0 g/dL\n   - Correction factor: 2.5 × (4.0 - 3.0) = 2.5\n   - Corrected AG = 22 + 2.5 = 24.5 mEq/L (still high)\n\n4. **Check for appropriate respiratory compensation (Winter's formula):**\n   - Expected PCO2 = (1.5 × HCO3) + 8 ± 2 = (1.5 × 20) + 8 = 38 mm Hg\n   - Actual PCO2 = 38 mm Hg → **perfect compensation**\n\n5. **Delta-delta ratio (Δ/Δ) to check for mixed disorder:**\n   - ΔAG = Actual AG - Normal AG = 22 - 12 = 10\n   - ΔHCO3 = Normal HCO3 - Actual HCO3 = 24 - 20 = 4\n   - Δ/Δ = 10/4 = 2.5\n   - Normal range for pure HAGMA: 1-2 (some sources say 1-1.6)\n   - Δ/Δ > 2 suggests concurrent metabolic alkalosis\n   - **BUT** with albumin correction: ΔAG = 24.5 - 12 = 12.5; Δ/Δ = 12.5/4 = 3.1\n\n6. **Clinical context:**\n   - Patient has CKD stage 4 (creatinine 4.5 mg/dL) → uremic acidosis (HAGMA from retained acids)\n   - Vomiting and dehydration could cause metabolic alkalosis\n   - However, bicarbonate is LOW (20), not normal or high, making concurrent metabolic alkalosis unlikely\n   - The Δ/Δ discrepancy may be due to: (1) albumin correction needed, (2) baseline HCO3 may be lower in CKD patients\n\n7. **Conclusion:** This is most consistent with a **simple high anion gap metabolic acidosis** with appropriate respiratory compensation. The vomiting may not be severe enough to generate a significant metabolic alkalosis that raises bicarbonate above normal.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis**: Incorrect because PCO2 is normal (38), not elevated. Respiratory acidosis requires PCO2 > 45 mm Hg.\n- **B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis**: Incorrect because bicarbonate is low (20), not normal or elevated. In mixed HAGMA + metabolic alkalosis, bicarbonate would be normal or high despite acidosis.\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation**: Incorrect because pH is acidic (7.34), not alkaline. Metabolic alkalosis would have pH > 7.45 and bicarbonate > 28.\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis**: Incorrect because PCO2 is normal (38), not low. Respiratory alkalosis requires PCO2 < 35 mm Hg.\n\n### 📚 Relevant Guidelines\n\n- **[Therapeutic Guidelines Australia - Acid-base disorders]**: Comprehensive approach to diagnosing and managing acid-base disturbances in clinical practice — https://tgldcdp.tg.org.au/viewTopic?topicfile=acid-base-disorders\n- **[UpToDate - Approach to the adult with metabolic acidosis]**: Detailed diagnostic algorithm including anion gap, delta-delta, and compensation formulas — https://www.uptodate.com/contents/approach-to-the-adult-with-metabolic-acidosis\n- **[KDIGO Clinical Practice Guideline for Chronic Kidney Disease]**: Management of metabolic acidosis in CKD patients — https://kdigo.org/guidelines/ckd-evaluation-and-management/", "image_path": ""}, {"id": 34308, "date": "2026-01-30T13:02:48+00:00", "stem": "A 45-year-old woman presents to the emergency department with a 2-day history of leg pain and swelling following what she describes as \"a small scratch\" from gardening. On examination, there is mild erythema and tenderness over the anterior shin with minimal induration. Vital signs are BP, 135/82; P, 88; T, 37.9°C (100.2°F). Point-of-care ultrasound of the affected area is performed. Which of the following ultrasound findings is most concerning and requires immediate surgical consultation?", "options": "A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\nB. Hypoechoic strands between subcutaneous fat tissue\nC. Hyperechoic linear structure with multiple parallel reverberation artifacts\nD. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues\nE. Noncompressible hypoechoic tubular structure in the deep posterior compartment", "answer": "A", "explanation": "### ✅ Correct Answer: A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\n\n**Step-by-step clinical reasoning:**\n\n1. **Clinical scenario analysis:**\n   - Gardening injury → potential for soil contamination with Clostridium, Streptococcus, or other necrotizing pathogens\n   - Leg pain and swelling with mild fever (37.9°C)\n   - Key concern: necrotizing fasciitis (surgical emergency)\n\n2. **Ultrasound findings interpretation:**\n   - **Option A**: \"Highly echogenic areas with posterior acoustic shadowing in the fascial planes\"\n     - This describes **gas in tissues** (subcutaneous emphysema)\n     - Gas appears hyperechoic (bright) with \"dirty shadowing\" or reverberation artifacts\n     - **Pathognomonic for necrotizing fasciitis** with gas-forming organisms\n     - Requires immediate surgical consultation for debridement\n\n3. **Why this is the most concerning finding:**\n   - Necrotizing fasciitis has mortality up to 30-50% if not treated promptly\n   - Gas in tissues is a late sign but definitive for surgical emergency\n   - The LRINEC score (Laboratory Risk Indicator for Necrotizing Fasciitis) would be high, but ultrasound provides immediate visual confirmation\n\n4. **Management implications:**\n   - Immediate surgical consultation for emergency fasciotomy/debridement\n   - Broad-spectrum antibiotics (covering MRSA, gram-negatives, anaerobes)\n   - Fluid resuscitation and ICU monitoring\n\n### ❌ Why the Other Options Are Wrong\n\n- **B. Hypoechoic strands between subcutaneous fat tissue**: This describes **cellulitis** - hypoechoic strands represent edema and inflammation in subcutaneous tissue. Concerning but not an immediate surgical emergency.\n- **C. Hyperechoic linear structure with multiple parallel reverberation artifacts**: This describes a **foreign body** (e.g., wood splinter, glass). Requires removal but not an immediate surgical emergency unless there's evidence of deep infection or vascular compromise.\n- **D. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues**: This describes **abscess** - anechoic = fluid collection, posterior enhancement = through transmission. Requires drainage (I&D) but not necessarily immediate surgical consultation unless large/complex.\n- **E. Noncompressible hypoechoic tubular structure in the deep posterior compartment**: This describes **deep vein thrombosis (DVT)**. Hypoechoic = blood clot, noncompressible = diagnostic for DVT. Requires anticoagulation but not surgical emergency unless phlegmasia cerulea dolens (which would have additional findings).\n\n### 📚 Relevant Guidelines\n\n- **[Australian Commission on Safety and Quality in Health Care - Management of Necrotizing Fasciitis]**: Australian guidelines for recognition and management of necrotizing soft tissue infections — https://www.safetyandquality.gov.au/sites/default/files/migrated/NF-Guidelines-July-2012.pdf\n- **[Therapeutic Guidelines Australia - Skin and soft tissue infections]**: Antibiotic recommendations for necrotizing fasciitis and other SSTIs — https://tgldcdp.tg.org.au/viewTopic?topicfile=skin-soft-tissue-infections\n- **[UpToDate - Necrotizing soft tissue infections]**: Comprehensive review including diagnostic approach and ultrasound findings — https://www.uptodate.com/contents/necrotizing-soft-tissue-infections", "image_path": ""}, {"id": 34310, "date": "2026-01-30T13:41:32+00:00", "stem": "A 28-year-old man presents with altered mental status and vomiting after falling from a ladder. Vital signs are BP, 100/65; P, 55. His Glasgow Coma Scale score is 8. Neurological examination reveals anisocoria with sluggish pupillary responses. He requires emergency intubation for airway protection. Which induction agent is most appropriate?", "options": "A. Fentanyl\nB. Propofol\nC. Ketamine\nD. Etomidate\nE. Midazolam", "answer": "C", "explanation": "### ✅ Correct Answer: C. Ketamine\n\n**Step-by-step clinical reasoning:**\n\n1. **Clinical scenario analysis:**\n   - Head trauma from fall → suspected traumatic brain injury (TBI)\n   - GCS 8 → severe brain injury (intubation indicated for airway protection)\n   - Anisocoria with sluggish pupils → possible uncal herniation or raised ICP\n   - Bradycardia (HR 55) with borderline hypotension (BP 100/65) → Cushing's triad component (bradycardia + hypertension + irregular breathing)\n\n2. **Goals for induction in TBI:**\n   - Maintain cerebral perfusion pressure (CPP = MAP - ICP)\n   - Avoid agents that increase intracranial pressure (ICP)\n   - Avoid hypotension which reduces CPP\n   - Provide adequate sedation and analgesia to prevent coughing/gagging which increases ICP\n\n3. **Why ketamine is preferred in this scenario:**\n   - **Historically controversial** but recent evidence supports its use in TBI\n   - **Maintains blood pressure** → preserves CPP (unlike propofol which causes hypotension)\n   - **Does not increase ICP** when used with adequate ventilation (old teaching was wrong)\n   - **Neuroprotective effects** via NMDA receptor antagonism\n   - **Bronchodilatory effects** beneficial if there's concomitant chest trauma\n   - **Analgesic properties** reduce sympathetic response to laryngoscopy\n\n4. **Why other agents are less ideal:**\n   - **Propofol**: Causes significant hypotension → reduces CPP, dangerous in hypovolemic trauma patient\n   - **Etomidate**: Causes adrenal suppression (single dose relevance debated), may cause myoclonus\n   - **Midazolam**: Slow onset, prolonged duration, can cause hypotension\n   - **Fentanyl**: Pure opioid, not an induction agent; causes bradycardia (already present)\n\n5. **Supporting evidence:**\n   - 2019 Cochrane review: No evidence ketamine increases ICP in ventilated patients\n   - KETASED trial: Ketamine vs etomidate in emergency intubation - similar outcomes\n   - Brain Trauma Foundation guidelines: Focus on avoiding hypotension/hypoxia\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Fentanyl**: An opioid analgesic, not an induction agent. Causes bradycardia (dangerous with HR 55) and chest wall rigidity. No amnestic properties.\n- **B. Propofol**: Causes significant dose-dependent hypotension and reduces cerebral metabolic rate. Would dangerously lower BP in this potentially hypovolemic trauma patient, reducing cerebral perfusion pressure.\n- **D. Etomidate**: Causes adrenal suppression which may be detrimental in critical illness. Associated with myoclonus which could increase ICP. While it maintains hemodynamics better than propofol, ketamine is superior in trauma.\n- **E. Midazolam**: Benzodiazepine with slow onset (2-3 minutes) and prolonged duration. Can cause hypotension, especially in hypovolemic patients. Not ideal for rapid sequence intubation in trauma.\n\n### 📚 Relevant Guidelines\n\n- **[Brain Trauma Foundation Guidelines for Management of Severe Traumatic Brain Injury]**: Evidence-based recommendations including airway management and hemodynamic targets — https://braintrauma.org/guidelines/guidelines-for-the-management-of-severe-tbi-4th-ed\n- **[Australian and New Zealand College of Anaesthetists - Guidelines for Emergency Airway Management]**: Australian-specific recommendations for induction agents in various clinical scenarios — https://www.anzca.edu.au/resources/professional-documents/ps51-guidelines-for-the-management-of-emergency-airway\n- **[UpToDate - Rapid sequence intubation for adults outside the operating room]**: Comprehensive review of induction agents including ketamine in traumatic brain injury — https://www.uptodate.com/contents/rapid-sequence-intubation-for-adults-outside-the-operating-room", "image_path": ""}, {"id": 34319, "date": "2026-02-01T10:18:47+00:00", "stem": "A 62-year-old woman comes to the office due to upper extremity weakness and numbness. Three days ago, the patient was involved in a motor vehicle collision in which a truck rear-ended her vehicle. The patient did not hit her head or lose consciousness but experienced a tingling and burning sensation in all extremities, which she attributed to the stress of the accident. Since then, she has had numbness in her upper extremities and clumsiness of her hands. She reports difficulty picking up objects but has had no leg weakness or bowel or bladder disturbance. The patient is upset that the other driver refused to accept fault but reports no other ongoing stressors. She has a history of hypertension and osteoarthritis. Vital signs are within normal limits. Neck and back examination show no deformity or tenderness. There is weakness of hand grip bilaterally, and the triceps reflex is decreased on both sides. Decreased pinprick sensation is present on the fingers. The remainder of the neurologic examination is normal. Cervical spine x-ray reveals no vertebral dislocation or fracture, but diffuse spondylotic changes are present. Which of the following is the most likely cause of this patient’s symptoms?", "options": "A. Acute stress disorder\nB. Brachial plexus injury\nC. Malingering\nD. Postconcussion syndrome\nE. Spinal cord injury", "answer": "E. Spinal cord injury", "explanation": "### ✅ Correct Answer: E. Spinal cord injury\n\nThe patient presents with a classic picture of **central cord syndrome**, a type of incomplete spinal cord injury, following hyperextension trauma in the setting of pre-existing cervical spondylosis (as seen on x-ray).\n\n**Clinical Reasoning:**\n1.  **Mechanism:** A rear-end collision (hyperextension injury) in an older patient with cervical spondylosis is a classic cause of central cord syndrome. The spondylotic changes narrow the spinal canal, making the cord vulnerable to compression between an anterior osteophyte/disk and a posteriorly buckled ligamentum flavum during hyperextension.\n2.  **Symptoms:** The initial 'tingling and burning sensation in all extremities' (paresthesias) is a hallmark of spinal cord injury. The subsequent development of **upper extremity weakness and numbness > lower extremity involvement** is the defining feature of central cord syndrome. This is due to the somatotopic arrangement of the corticospinal tract, where fibers for the upper limbs are more centrally located and more susceptible to central cord edema/hematoma.\n3.  **Examination Findings:** Bilateral hand grip weakness, decreased triceps reflexes (C7), and decreased pinprick sensation in the fingers are consistent with a cervical cord lesion affecting the central gray matter and adjacent tracts. The absence of leg weakness or bowel/bladder symptoms indicates an incomplete injury, which is typical for central cord syndrome.\n4.  **Imaging:** While the x-ray shows no fracture/dislocation, the presence of 'diffuse spondylotic changes' is the key risk factor. A normal x-ray does NOT rule out spinal cord injury, especially in this context. The next step would be an MRI to confirm the cord injury.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Acute stress disorder**: While the patient experienced a stressful event, her symptoms are focal neurological deficits (weakness, numbness, reflex changes) with a clear anatomical pattern, not the intrusive memories, avoidance, negative alterations in cognition/mood, or arousal/reactivity required for this diagnosis. Psychological stress does not cause bilateral triceps reflex depression.\n- **B. Brachial plexus injury**: This typically presents with unilateral motor and sensory deficits in a specific nerve root or peripheral nerve distribution (e.g., Erb's or Klumpke's palsy). The patient has **bilateral** symptoms affecting specific myotomes (C7 for triceps) and dermatomes, which is more consistent with a central (spinal cord) lesion rather than bilateral peripheral nerve plexus injuries from a mechanism that did not involve significant shoulder traction.\n- **C. Malingering**: There is no indication of secondary gain (e.g., litigation is not mentioned as a focus, she is upset about fault but reports no other stressors). The physical exam findings (objective decreased reflexes and weakness) are not under voluntary control and point to an organic neurological lesion.\n- **D. Postconcussion syndrome**: This is defined by a cluster of symptoms (headache, dizziness, cognitive difficulties, fatigue) following a **traumatic brain injury** (which requires an alteration in brain function, such as loss of consciousness, amnesia, or neurological symptoms). The patient specifically **did not hit her head or lose consciousness**. Her symptoms are purely sensorimotor, localized to the upper limbs, and not cognitive/vestibular.\n\n### 📚 Relevant Guidelines\n- **[NEXUS Criteria & Canadian C-Spine Rule / Australian Clinical Practice Guidelines]**: Guidelines for assessing cervical spine injury in trauma. This patient, with a dangerous mechanism (high-speed MVC) and neurological symptoms, requires advanced imaging (CT/MRI) regardless of x-ray findings. — https://www.aci.health.nsw.gov.au/__data/assets/pdf_file/0008/336344/Spinal-Injuries-Clinical-Practice-Guide.pdf\n- **[UpToDate: Central Cord Syndrome]**: Provides detailed pathophysiology, clinical features, and management of central cord syndrome, emphasizing its association with hyperextension injury in spondylotic spines. — https://www.uptodate.com/contents/acute-traumatic-spinal-cord-injury\n- **[Therapeutic Guidelines: Neurology]**: Offers guidance on the acute assessment and management of suspected spinal cord injury, including indications for imaging and specialist referral. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etgcomplete", "image_path": ""}, {"id": 34320, "date": "2026-02-01T10:20:36+00:00", "stem": "A newborn is delivered vaginally at term. The baby breathes quietly during sleep but develops loud noisy breathing when awake or crying. Physical examination is otherwise normal, and oxygen saturation is stable. What is the most likely diagnosis?", "options": "a. Subglottic stenosis\nb. Vocal cord paralysis\nc. Tracheomalacia\nd. Laryngomalacia\ne. Choanal atresia", "answer": "d. Laryngomalacia", "explanation": "### ✅ Correct Answer: d. Laryngomalacia\n\n**Clinical Reasoning:**\nLaryngomalacia is the **most common cause of stridor in infants**, accounting for ~60-75% of cases. The key diagnostic clue is the **inspiratory stridor that worsens with agitation, crying, or feeding and improves when the baby is calm, asleep, or in the prone position.**\n1.  **Pathophysiology:** It is due to a congenital flaccidity of the supraglottic structures (arytenoid cartilages, epiglottis). During inspiration, the negative intrathoracic pressure causes these structures to collapse inward, partially obstructing the airway and creating the characteristic **high-pitched, inspiratory stridor**.\n2.  **Presentation:** Typically presents in the first few weeks of life. The stridor is often intermittent and positional, as described. Crucially, the baby is **otherwise well** (\"physical examination is otherwise normal\") with **no cyanosis or desaturation** (\"oxygen saturation is stable\"), indicating it is usually a benign, self-limiting condition.\n3.  **Classic History:** The scenario of \"quiet during sleep\" (reduced respiratory effort) and \"loud noisy breathing when awake or crying\" (increased respiratory effort) is pathognomonic for laryngomalacia.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Subglottic stenosis**: This causes fixed airway obstruction, leading to **biphasic** (inspiratory and expiratory) stridor that is **constant** and does not significantly improve with sleep or positioning. It is often associated with a history of prolonged intubation.\n- **b. Vocal cord paralysis**: Unilateral paralysis may cause a weak cry and stridor, but it is usually constant. Bilateral paralysis causes severe biphasic stridor and respiratory distress immediately after birth, often requiring intervention, which contradicts the \"stable oxygen saturation\" and normal exam.\n- **c. Tracheomalacia**: This is weakness of the tracheal cartilage, causing **expiratory** stridor or a \"barking\" cough. It worsens with expiration, not inspiration, and may be associated with conditions like vascular rings. The noise is typically lower-pitched than laryngomalacia.\n- **e. Choanal atresia**: This is a **nasal** obstruction. A classic sign is **cyanosis that improves when the baby cries** (opens the mouth) and **worsens when quiet** (attempts nasal breathing). It presents with respiratory distress at birth, not isolated noisy breathing in an awake, well-saturated infant.\n\n### 📚 Relevant Guidelines\n- **[RACGP: The crying baby]**: While focused on crying, it includes differentials for noisy breathing in infants and when to refer. — https://www.racgp.org.au/afp/2018/june/the-crying-baby/\n- **[UpToDate: Laryngomalacia]**: Comprehensive review of etiology, clinical features, diagnosis, and management of laryngomalacia. — https://www.uptodate.com/contents/laryngomalacia\n- **[Sydney Children's Hospitals Network - Stridor in Children]**: A practical clinical guideline for the assessment and management of stridor, highlighting the features of laryngomalacia. — https://www.schn.health.nsw.gov.au/files/fact-sheets/condition-stridor-en.pdf", "image_path": ""}, {"id": 34331, "date": "2026-02-02T11:20:12+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "A. Ondansetron\nB. Methylprednisolone\nC. Folic acid\nD. Potassium chloride\nE. Thiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\nThiamine (vitamin B1) must be administered before dextrose-containing solutions in malnourished patients, particularly those with hyperemesis gravidarum, to prevent precipitating Wernicke encephalopathy. This is a critical safety measure. The patient has classic features of severe hyperemesis gravidarum: persistent nausea/vomiting, weight loss (4 kg in 3 weeks), dehydration, metabolic alkalosis (from loss of gastric acid), and ketonuria (from starvation). In thiamine-deficient states (common in prolonged vomiting/poor intake), administering dextrose without thiamine can rapidly consume the body's remaining thiamine stores during glucose metabolism, leading to acute Wernicke encephalopathy (confusion, ataxia, ophthalmoplegia). This is a neurological emergency with high mortality if untreated. Thiamine is water-soluble and safe in pregnancy; IV administration ensures adequate absorption.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: While ondansetron is an effective antiemetic for hyperemesis, it is not required *immediately before* dextrose infusion. The question specifies a critical safety step to prevent a specific complication (Wernicke's), not ongoing symptom management.\n- **B. Methylprednisolone**: Corticosteroids may be considered for refractory hyperemesis, but they are not a prerequisite for dextrose administration and carry potential risks in early pregnancy. They do not prevent thiamine-deficiency encephalopathy.\n- **C. Folic acid**: Folic acid supplementation is crucial in early pregnancy for neural tube defect prevention, but it is not time-critical before dextrose infusion. It does not address the acute risk of Wernicke's encephalopathy.\n- **D. Potassium chloride**: While hypokalaemia is common in hyperemesis (due to vomiting and metabolic alkalosis) and should be corrected, potassium replacement is not an immediate prerequisite before dextrose to prevent neurological catastrophe. It is part of general electrolyte repletion.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) – Hyperemesis Gravidarum**: Recommends thiamine 100 mg IV or IM before or with IV dextrose in women with prolonged vomiting or malnutrition to prevent Wernicke encephalopathy. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hyperemesis-gravidarum&guidelineName=Women%27s%20Health\n- **RANZCOG (Royal Australian and New Zealand College of Obstetricians and Gynaecologists) – Management of Nausea and Vomiting in Pregnancy**: Advises thiamine supplementation for women with prolonged vomiting, especially before carbohydrate loading. — https://ranzcog.edu.au/womens-health/patient-information-resources/nausea-and-vomiting-in-pregnancy\n- **UpToDate – Treatment of hyperemesis gravidarum**: States thiamine should be given prior to dextrose-containing fluids to prevent Wernicke encephalopathy in patients with poor nutritional intake. — https://www.uptodate.com/contents/treatment-of-hyperemesis-gravidarum", "image_path": ""}, {"id": 34332, "date": "2026-02-02T11:26:24+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "### ✅ Correct Answer: A. Uterine rupture\nUterine rupture is a catastrophic obstetric emergency where there is a full-thickness tear of the uterine wall, often at the site of a previous scar (this patient is gravida 3 para 2, suggesting possible prior cesarean). The classic triad is: 1) **Sudden, severe abdominal pain**; 2) **Cessation of contractions** (due to loss of uterine integrity); 3) **Fetal bradycardia** (from acute hypoxia). Additional signs include maternal hypotension/tachycardia (from intra-abdominal haemorrhage), loss of fetal station (as the fetus or parts extrude into the abdomen), and often **minimal vaginal bleeding** because bleeding is primarily intraperitoneal. This presentation is distinct and requires immediate laparotomy.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding at rupture of membranes, often with fetal bradycardia due to rapid exsanguination from fetal vessels. It does not cause sudden severe abdominal pain, cessation of contractions, or change in fetal station.\n- **C. Amniotic fluid embolism (AFE)**: Presents suddenly with dyspnoea, hypoxia, cardiovascular collapse (hypotension, tachycardia), and coagulopathy, often followed by seizures or cardiac arrest. While it can cause fetal bradycardia, it is not typically associated with a change in fetal station or severe localised abdominal pain. Contractions may continue initially.\n- **D. Placental abruption**: Presents with sudden, constant abdominal pain, often with **significant** dark vaginal bleeding, uterine tenderness, and hypertonic contractions. Fetal distress is common, but contractions usually continue (may become tetanic) and there is no change in fetal station.\n- **E. Cord prolapse**: Presents with sudden fetal bradycardia after rupture of membranes, often with a palpable cord on vaginal examination. It does not cause severe maternal abdominal pain, hypotension, or cessation of contractions. The presenting part may be high, but the key finding is cord palpation.\n\n### 📚 Relevant Guidelines\n- **RANZCOG – Management of Previous Caesarean Birth**: Details risk factors, diagnosis, and management of uterine rupture in labour for women with prior caesarean. — https://ranzcog.edu.au/womens-health/clinical-guidance/management-of-previous-caesarean-birth\n- **UpToDate – Uterine rupture: Unscarred uterus and scarred uterus after previous cesarean**: Describes the clinical features, diagnosis, and immediate management of uterine rupture. — https://www.uptodate.com/contents/uterine-rupture-unscarred-uterus-and-scarred-uterus-after-previous-cesarean\n- **Therapeutic Guidelines Australia (eTG) – Intrapartum emergencies**: Covers the recognition and management of major obstetric emergencies including uterine rupture. — https://tgldcdp.tg.org.au/viewTopic?topicfile=intrapartum-care&guidelineName=Women%27s%20Health", "image_path": ""}, {"id": 34335, "date": "2026-02-02T11:59:58+00:00", "stem": "A 62-year-old man presents with recurrent episodes of dizziness precipitated when he looks upwards while painting his ceiling. Each episode lasts several minutes. He has vascular risk factors including hypertension and diabetes. There is no hearing loss or tinnitus. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo\nB. Vestibular neuritis\nC. Ménière’s disease\nD. Vertebrobasilar ischaemia\nE. Acoustic neuroma", "answer": "D. Vertebrobasilar ischaemia", "explanation": "### ✅ Correct Answer: D. Vertebrobasilar ischaemia\nThis patient presents with **positional vertigo triggered by neck extension** (looking up), episodes lasting **several minutes**, and has significant vascular risk factors (hypertension, diabetes). This constellation points to vertebrobasilar (posterior circulation) ischaemia. Neck extension can compromise vertebral artery flow, especially in the setting of atherosclerosis, leading to transient ischaemia of the brainstem/cerebellar vestibular pathways. Key differentiating features from peripheral causes: duration is minutes (central), lack of auditory symptoms, and presence of vascular risk factors. This is a **warning sign for impending stroke** and requires urgent neurological evaluation and vascular risk factor management.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: Characterised by brief episodes of vertigo (typically **< 1 minute**) triggered by specific head movements (e.g., rolling over in bed, looking up). The classic Dix-Hallpike test is positive. Episodes are paroxysmal and short, not lasting several minutes.\n- **B. Vestibular neuritis**: Presents with a **single, prolonged episode** of severe vertigo lasting days to weeks, often with nausea/vomiting and nystagmus. It is not triggered by specific positions and is not recurrent with brief episodes.\n- **C. Ménière’s disease**: Triad of episodic vertigo (**20 minutes to several hours**), fluctuating sensorineural hearing loss, tinnitus, and aural fullness. The absence of any auditory symptoms rules this out.\n- **E. Acoustic neuroma (Vestibular schwannoma)**: Typically presents with **unilateral, progressive** sensorineural hearing loss and tinnitus, with vertigo being less common and usually mild/unsteadiness rather than acute episodic vertigo. It is not typically triggered by neck position.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation Australia – Clinical Guidelines for Stroke Management**: Includes assessment and management of transient ischaemic attacks (TIAs) involving the posterior circulation, which can present with isolated vertigo. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **UpToDate – Vertigo and dizziness in the emergency department**: Discusses differentiating central (e.g., vertebrobasilar ischaemia) from peripheral causes of vertigo, highlighting red flags like vascular risk factors and prolonged duration. — https://www.uptodate.com/contents/vertigo-and-dizziness-in-the-emergency-department\n- **NICE – Stroke and transient ischaemic attack in over 16s: diagnosis and initial management**: Covers recognition of posterior circulation TIAs, which may present with isolated vertigo. — https://www.nice.org.uk/guidance/ng128", "image_path": ""}, {"id": 34336, "date": "2026-02-02T12:00:33+00:00", "stem": "A 45-year-old man presents with recurrent flushing, pruritus, abdominal cramping, and episodes of syncope after alcohol intake. He has a history of unexplained anaphylaxis following a bee sting. On examination, there are multiple brownish macules consistent with urticaria pigmentosa. Blood tests show a persistently elevated serum tryptase level of 28 ng/mL. What is the most likely diagnosis?", "options": "A. Carcinoid syndrome\nB. Pheochromocytoma\nC. Systemic mastocytosis\nD. Hereditary angioedema\nE. Zollinger–Ellison syndrome", "answer": "C. Systemic mastocytosis", "explanation": "### ✅ Correct Answer: C. Systemic mastocytosis\nSystemic mastocytosis is a clonal proliferation of mast cells in one or more extracutaneous organs. The classic presentation includes: 1) **Symptoms of mast cell mediator release**: flushing, pruritus, abdominal pain (cramping/diarrhoea), syncope (from hypotension). 2) **Specific triggers**: Alcohol, heat, stress, insect stings (explains anaphylaxis post bee sting). 3) **Cutaneous findings**: Urticaria pigmentosa (brownish macules that urticate when rubbed – Darier's sign). 4) **Diagnostic biomarker**: Persistently elevated serum tryptase (>20 ng/mL is a minor criterion). The constellation of symptoms, physical signs, and lab findings is pathognomonic.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Carcinoid syndrome**: Causes flushing, diarrhoea, and abdominal pain, but flushing is typically more prolonged and associated with telangiectasia. It is not triggered by alcohol or insect stings. Urticaria pigmentosa is not a feature. Tryptase is normal; 5-HIAA in urine is elevated.\n- **B. Pheochromocytoma**: Presents with paroxysmal hypertension, headache, sweating, and palpitations. Flushing is rare. Symptoms are not typically triggered by alcohol or associated with urticaria pigmentosa. Diagnosis is by elevated plasma/urinary metanephrines.\n- **D. Hereditary angioedema**: Characterised by recurrent episodes of non-pitting, non-pruritic angioedema (often of face, extremities, GI tract causing abdominal pain) and laryngeal oedema. It does not cause flushing, pruritus, urticaria pigmentosa, or elevated tryptase. Attacks may be triggered by trauma or stress, not specifically alcohol.\n- **E. Zollinger–Ellison syndrome**: Due to gastrin-secreting tumours, causing severe peptic ulcer disease and diarrhoea from gastric acid hypersecretion. It does not cause flushing, pruritus, syncope, urticaria pigmentosa, or elevated tryptase.\n\n### 📚 Relevant Guidelines\n- **UpToDate – Systemic mastocytosis: Clinical manifestations, pathogenesis, and diagnosis**: Details diagnostic criteria (WHO), including major (multifocal mast cell agg
