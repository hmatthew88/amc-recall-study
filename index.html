n\nThis patient presents with an acute inferior STEMI (ST elevation in II, III, aVF). According to Australian and international guidelines for acute coronary syndromes, the immediate management priorities are:\n1. **Aspirin 300 mg chewed** - Antiplatelet therapy to reduce thrombus progression\n2. **Dual antiplatelet therapy** - Adding a P2Y12 inhibitor (clopidogrel, ticagrelor, or prasugrel)\n3. **Reperfusion therapy** - Either primary PCI (preferred if available within 120 minutes) or fibrinolysis\n4. **Analgesia** - Usually opioids for pain relief\n5. **Anticoagulation** - Heparin or enoxaparin\n\nAspirin is the FIRST medication that should be given in suspected STEMI, as it's rapidly acting, reduces mortality, and is readily available. The 300 mg loading dose provides rapid platelet inhibition.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Administer sublingual nitroglycerin**: While nitrates can relieve ischemic pain, they're not the first priority. They should be given after aspirin and only if blood pressure is adequate (SBP >90 mmHg). Nitrates can cause dangerous hypotension in inferior MI which may involve right ventricular infarction.\n- **C. Start intravenous heparin infusion**: Anticoagulation is important but comes AFTER antiplatelet therapy. Heparin should be given but not as the very first intervention.\n- **D. Arrange urgent coronary angiography**: This is crucial (primary PCI is gold standard), but medical therapy must be initiated immediately while arranging catheterization. Aspirin should not be delayed.\n- **E. Administer intravenous metoprolol**: Beta-blockers are contraindicated in acute STEMI until the patient is stable. They can worsen heart failure, bradycardia (especially in inferior MI), and cardiogenic shock.\n\n### 📚 Relevant Guidelines\n- **National Heart Foundation of Australia & Cardiac Society of Australia and New Zealand: Australian Clinical Guidelines for the Management of Acute Coronary Syndromes**: Comprehensive Australian guidelines for STEMI management — https://www.heartfoundation.org.au/conditions/acute-coronary-syndrome-guidelines\n- **Therapeutic Guidelines (eTG) Cardiovascular**: Evidence-based recommendations for ACS management including medication dosing — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Cardiovascular&frompage\n- **European Society of Cardiology (ESC) Guidelines for the management of acute myocardial infarction in patients presenting with ST-segment elevation**: International gold standard for STEMI care — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/ST-Elevation-Myocardial-Infarction-STEMI", "image_path": "photo_2026-04-06_00-54-47.jpg"}];
        let questions = [];
        let currentIndex = 0;


        async function init() {
            try {
                // Data is now embedded directly to bypass CORS
                questions = questionsData;
                document.getElementById('total-count').innerText = questions.length;

                // Load saved progress
                const savedIndex = localStorage.getItem('amc_study_index');
                if (savedIndex !== null) {
                    currentIndex = parseInt(savedIndex, 10);
                    // Boundary check
                    if (currentIndex >= questions.length) currentIndex = 0;
                }

                renderQuestion();
            } catch (e) {
                console.error("Data load failed", e);
                document.getElementById('question-stem').innerText = "加载失败。";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[currentIndex];

            // Stats & Progress
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

            // Save progress
            localStorage.setItem('amc_study_index', currentIndex);

            // Reset UI
            document.getElementById('question-stem').innerText = q.stem;
            document.getElementById('explanation-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';


            // Options
            const options = q.options.split('\n');
            options.forEach(opt => {
                if (!opt.trim()) return;
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 transition-all text-slate-700 font-medium group";
                btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-lg bg-slate-100 group-hover:bg-blue-200 text-center leading-8 mr-4 text-sm font-bold text-slate-500 group-hover:text-blue-600 transition-all">&#8226;</span> ${opt}`;
                btn.onclick = () => selectOption(btn, opt, q.answer, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct, explanation) {
            // Check correct answer (fuzzy match)
            const isCorrect = selected.toLowerCase().includes(correct.toLowerCase()) ||
                correct.toLowerCase().includes(selected.toLowerCase());

            // Style all buttons
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.innerText.toLowerCase().includes(correct.toLowerCase())) {
                    b.classList.add('answer-correct');
                }
            });

            if (!isCorrect) {
                btn.classList.add('answer-wrong');
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = explanation;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Scroll to explanation
            setTimeout(() => {
                document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function exportProgress() {
            prompt('📤 你的进度码（在其他设备上导入）：', 'matt-' + (currentIndex + 1));
        }

        function importProgress() {
            const input = prompt('📥 输入进度码（如 matt-87）：');
            if (!input) return;
            const trimmed = input.trim();
            const match = trimmed.match(/-?(\d+)$/);
            if (match) {
                const num = parseInt(match[1], 10);
                if (num >= 1 && num <= questions.length) {
                    currentIndex = num - 1;
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    alert(`✅ 已跳转到第 ${num} 题。`);
                    return;
                }
            }
            alert(`⚠️ 格式错误，请输入如 matt-87 的进度码。`);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        init();
    </script>
