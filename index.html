xplanation": "### ✅ Correct Answer: 5. Retrograde urethrogram\n\nThis patient presents with obstructive voiding symptoms (straining, prolonged voiding, terminal dribbling) in the context of a remote history of pelvic fracture. The key clinical reasoning is as follows:\n\n1.  **Age & Presentation:** At 32, benign prostatic hyperplasia (BPH) or prostate cancer are highly unlikely, making PSA and TRUS inappropriate first-line investigations. The digital rectal exam (DRE) is normal, further supporting this.\n2.  **Mechanism of Injury:** A pelvic fracture is a classic cause of **urethral stricture**, particularly in young men. The trauma can cause a distraction injury to the membranous urethra, leading to scar tissue formation and narrowing over time.\n3.  **Symptom Pattern:** The symptoms are purely obstructive without significant storage symptoms (frequency, urgency, nocturia). He has a good stream initiation (no hesitancy), which points to a problem *after* the bladder neck, consistent with a urethral stricture rather than a bladder outlet obstruction at the prostate level.\n4.  **Investigative Hierarchy:** For suspected urethral stricture, the initial investigation of choice is a **retrograde urethrogram (RUG)**. This is a dynamic, fluoroscopic study that outlines the urethral lumen and can accurately identify the location, length, and severity of a stricture. It is minimally invasive and provides essential anatomical information to guide further management (e.g., dilation, urethroplasty).\n\n### ❌ Why the Other Options Are Wrong\n\n-   **1. Prostate specific antigen**: PSA is a screening and monitoring tool for prostate cancer. It is not indicated in a 32-year-old man with a normal DRE and a history pointing strongly to a post-traumatic urethral stricture. Elevated PSA would be unexpected and not diagnostic of the cause of his symptoms.\n-   **2. CT abdomen and pelvis**: While CT can show soft tissue and bone, it is a poor modality for evaluating the urethral lumen dynamically. It is not the first-line investigation for suspected urethral stricture and involves significant radiation exposure without providing the definitive diagnostic information that a RUG does.\n-   **3. Trans-rectal ultrasound-guided biopsy (TRUS)**: TRUS is primarily used to biopsy the prostate when there is suspicion of prostate cancer (e.g., elevated PSA, abnormal DRE). It has no role in diagnosing a urethral stricture and is an invasive procedure not warranted by this clinical picture.\n-   **4. Urethroscopy**: Urethroscopy (cystoscopy) is a direct visual examination of the urethra and bladder. While it can diagnose a stricture, it is generally considered after imaging (like a RUG) to define the anatomy. It is more invasive than RUG and is typically used for treatment (e.g., visual internal urethrotomy) or when the diagnosis remains unclear after imaging.\n\n### 📚 Relevant Guidelines\n\n-   **European Association of Urology (EAU) Guidelines on Urethral Stricture**: These guidelines outline the diagnosis and management of urethral strictures. They recommend retrograde urethrography (and voiding cystourethrography) as the primary imaging modality for evaluation. — https://uroweb.org/guidelines/urological-trauma\n-   **American Urological Association (AUA) Guideline: Diagnosis and Treatment of Non-Neurogenic Male Lower Urinary Tract Symptoms (LUTS)**: While focused on BPH, these guidelines emphasize a stepwise diagnostic approach. In a young man with trauma history and obstructive symptoms, evaluation for urethral stricture (e.g., with RUG) is paramount before considering prostate-centric investigations. — https://www.auanet.org/guidelines/guidelines/benign-prostatic-hyperplasia-(bph)-guideline\n-   **Therapeutic Guidelines (eTG): Urinary tract disorders**: The Australian eTG provides pragmatic clinical advice. For suspected urethral stricture, it supports referral for specialist assessment and investigation, which would typically begin with imaging studies like a retrograde urethrogram. — https://tgldcdp.tg.org.au/etgaccess", "image_path": ""}, {"id": 35195, "date": "2026-03-23T14:49:19+00:00", "stem": "A 27-year-old woman experiences 4-5 migraines per month, impacting her quality of life. She has a history of Generalised Anxiety Disorder (GAD) and asthma, and is on escitalopram and Implanon. Zolmitriptan provides acute relief. What is the best preventive treatment option?", "options": "A. Pizotifen 0.5 mg orally at night\nB. Amitriptyline 10 mg orally at night\nC. Propranolol 20 mg orally at night\nD. Topiramate 25 mg orally at night\nE. Verapamil 90 mg orally at night", "answer": "B. Amitriptyline 10 mg orally at night", "explanation": "### ✅ Correct Answer: B. Amitriptyline 10 mg orally at night\n\nClinical reasoning for selecting amitriptyline as the best preventive option:\n\n1.  **Indication for Prevention:** The patient has 4-5 migraines per month, which is a clear indication for preventive therapy to reduce frequency, severity, and impact on quality of life.\n2.  **Comorbid Conditions:** She has comorbid **Generalised Anxiety Disorder (GAD)**. Amitriptyline, a tricyclic antidepressant (TCA), has proven efficacy for both migraine prophylaxis **and** anxiety disorders. This makes it a dual-purpose, efficient choice that can address two problems with one evidence-based medication.\n3.  **Contraindications & Safety Profile:**\n    *   **Asthma:** Propranolol (a non-selective beta-blocker, Option C) is **contraindicated** in asthma due to the risk of bronchoconstriction.\n    *   **Current Medications:** She is on escitalopram (an SSRI). While there is a potential for increased serotonergic effects (serotonin syndrome) when combining SSRIs and TCAs, this risk is low at the low doses used for migraine prophylaxis (e.g., 10-25 mg nocte). This combination is often used cautiously in clinical practice, especially when monitoring is available. The benefits of treating both migraine and GAD likely outweigh the low risk at this dose.\n    *   **Pregnancy Planning/Contraception:** She is on Implanon, so teratogenicity is not an immediate concern, but topiramate (Option D) is teratogenic and requires careful contraception, making it a less ideal first-line choice in a woman of childbearing age when other good options exist.\n4.  **Efficacy & Guidelines:** Amitriptyline is a first-line preventive agent for migraine in Australian and international guidelines, particularly when there is a comorbid mood or anxiety disorder.\n\n### ❌ Why the Other Options Are Wrong\n\n-   **A. Pizotifen 0.5 mg orally at night**: Pizotifen is an option for migraine prevention but is often considered second-line due to side effects like sedation and weight gain. It has no specific benefit for her comorbid GAD, unlike amitriptyline.\n-   **C. Propranolol 20 mg orally at night**: **This is contraindicated due to her history of asthma.** Non-selective beta-blockers can precipitate bronchospasm. Even if her asthma is well-controlled, they are generally avoided.\n-   **D. Topiramate 25 mg orally at night**: Topiramate is an effective first-line preventive. However, it is teratogenic (Category D) and associated with cognitive side effects ('brain fog'), paresthesia, and weight loss. Given her comorbid GAD, a medication that can also help anxiety (amitriptyline) is preferable. Topiramate would be a good alternative if amitriptyline is not tolerated.\n-   **E. Verapamil 90 mg orally at night**: Verapamil (a calcium channel blocker) is used for migraine prevention, but it is often considered less effective than first-line options like amitriptyline, topiramate, or propranolol (in patients without asthma). It has no specific advantage for GAD and can cause constipation and hypotension.\n\n### 📚 Relevant Guidelines\n\n-   **Therapeutic Guidelines (eTG) – Neurology: Migraine**: Recommends amitriptyline, propranolol, or topiramate as first-line pharmacological prophylaxis for episodic migraine. Notes that the choice depends on comorbidities, contraindications, and patient preference. Specifically states beta-blockers are contraindicated in asthma. — https://tgldcdp.tg.org.au/etgaccess\n-   **American Headache Society Consensus Statement: The US Headache Consortium Guideline**: Lists amitriptyline as having established efficacy (Level A evidence) for migraine prevention. Supports selecting preventive therapy based on comorbid conditions. — https://headachejournal.onlinelibrary.wiley.com/doi/10.1111/head.12856\n-   **National Institute for Health and Care Excellence (NICE) CG150: Headaches in over 12s**: Recommends topiramate or propranolol as first-line prophylaxis. Amitriptyline is recommended as an option, particularly noting it may be chosen if there is comorbid depression. — https://www.nice.org.uk/guidance/cg150", "image_path": ""}, {"id": 35215, "date": "2026-03-27T22:17:05+00:00", "stem": "A child with asthma exacerbation. Already took salbutamol and ICS. Still not well. Which one is going to be the most effective drug?", "options": "1. oral prednisone\n2. mgso4\n3. amitriptyline", "answer": "1. oral prednisone", "explanation": "### ✅ Correct Answer: 1. oral prednisone\nSystemic corticosteroids (oral prednisone/prednisolone) are the cornerstone of treatment for moderate to severe asthma exacerbations not responding adequately to initial bronchodilator therapy. They reduce airway inflammation, decrease mucus production, and enhance the response to beta-2 agonists. In a paediatric exacerbation after initial salbutamol and inhaled corticosteroids (ICS), the most effective next step is a short course of oral steroids (e.g., prednisolone 1-2 mg/kg/day for 3-5 days) to gain control and prevent progression. This is standard first-line management per all major guidelines.\n\n### ❌ Why the Other Options Are Wrong\n- **2. mgso4**: Intravenous magnesium sulfate is a second-line therapy for severe, life-threatening asthma exacerbations (status asthmaticus) not responding to first-line treatments (oxygen, frequent SABA, and systemic steroids). It is not the most effective initial drug after failed SABA/ICS in a general exacerbation; its role is more specific and reserved for critical care settings.\n- **3. amitriptyline**: Amitriptyline is a tricyclic antidepressant with no role in the acute management of asthma. It is not indicated for bronchospasm or airway inflammation and would not provide any benefit in an asthma exacerbation.\n\n### 📚 Relevant Guidelines\n- **[National Asthma Council Australia, Australian Asthma Handbook]**: Provides evidence-based guidelines for the management of asthma across all ages, including acute exacerbations in children. — https://www.asthmahandbook.org.au/acute-asthma/children\n- **[Therapeutic Guidelines: Respiratory]**: Details stepwise pharmacological management of asthma exacerbations, including the use of oral corticosteroids. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Respiratory&frompage=etgcomplete\n- **[Global Initiative for Asthma (GINA)]**: International strategy for asthma management and prevention, aligning with Australian standards for acute care. — https://ginasthma.org/", "image_path": ""}, {"id": 35215, "date": "2026-03-27T22:17:05+00:00", "stem": "A man with systolic murmur radiating to the carotids with ECG and Holter done and normal. Next investigation?", "options": "1. TTE (Transthoracic echo)\n2. chest x ray\n3. nothing", "answer": "1. TTE (Transthoracic echo)", "explanation": "### ✅ Correct Answer: 1. TTE (Transthoracic echo)\nA systolic murmur that radiates to the carotids is classic for aortic stenosis (AS). Radiation to the carotids occurs due to the high-velocity jet directed into the ascending aorta. Even with a normal ECG and Holter monitor (which assess electrical activity and rhythm), the next critical step is to evaluate the cardiac structure, valve morphology, and hemodynamic severity. Transthoracic echocardiography (TTE) is the gold standard non-invasive test to confirm the diagnosis, assess valve anatomy (calcification, bicuspid valve), measure the pressure gradient, calculate the valve area, and evaluate left ventricular function. It is essential for risk stratification and guiding management (medical vs. surgical).\n\n### ❌ Why the Other Options Are Wrong\n- **2. chest x ray**: A chest X-ray may show cardiomegaly, post-stenotic dilation of the aorta, or calcification of the aortic valve, but it is not the definitive diagnostic test. It provides limited information on valve function and severity compared to echocardiography. It is not the recommended next investigation for characterizing a suggestive murmur.\n- **3. nothing**: This is incorrect because a symptomatic or significant murmur requires evaluation. Aortic stenosis is a progressive disease with serious implications (syncope, heart failure, sudden death). Leaving it undiagnosed and unmonitored is not appropriate clinical practice.\n\n### 📚 Relevant Guidelines\n- **[Australian and New Zealand Society of Cardiac and Thoracic Surgeons (ANZSCTS) & Cardiac Society of Australia and New Zealand (CSANZ)]**: Guidelines for the diagnosis and management of valvular heart disease, including the central role of echocardiography. — https://www.csanz.edu.au/wp-content/uploads/2021/11/2021_CSANZ_Guidelines_for_the_Management_of_Chronic_Heart_Failure.pdf (See valvular sections)\n- **[Therapeutic Guidelines: Cardiovascular]**: Outlines the investigation of cardiac murmurs, recommending echocardiography for suspected valvular pathology. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Cardiovascular&frompage=etgcomplete\n- **[European Society of Cardiology (ESC) / European Association for Cardio-Thoracic Surgery (EACTS) Guidelines]**: Comprehensive guidelines on valvular heart disease, strongly recommending echocardiography for diagnosis and assessment of severity. — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Valvular-Heart-Disease-Management", "image_path": ""}, {"id": 35215, "date": "2026-03-27T22:17:05+00:00", "stem": "68 year old woman BMD score 0.5 in vertebra and -2.6 in femur after wrist fracture. What to do?", "options": "1. bmd after 12 months\n2. do nothing its normal\n3. x ray", "answer": "1. bmd after 12 months", "explanation": "### ✅ Correct Answer: 1. bmd after 12 months\nThis patient has sustained a fragility fracture (wrist fracture) and has bone mineral density (BMD) T-scores indicative of osteopenia at the spine (T-score -0.5) and osteoporosis at the femoral neck (T-score -2.6). According to Australian guidelines, a fragility fracture in the setting of osteopenia or osteoporosis warrants active management. The femoral neck T-score of -2.6 meets the diagnostic threshold for osteoporosis (T-score ≤ -2.5). The appropriate next step is to initiate anti-osteoporotic treatment (e.g., bisphosphonates) and schedule a follow-up BMD scan in 12-24 months to monitor treatment response. A repeat scan at 12 months is a standard interval to assess significant change.\n\n### ❌ Why the Other Options Are Wrong\n- **2. do nothing its normal**: This is incorrect. A T-score of -2.6 at the femoral neck is diagnostic of osteoporosis, not normal. Furthermore, the presence of a fragility fracture significantly increases her absolute fracture risk, mandating intervention regardless of the T-score alone (as per the concept of 'fracture liaison services').\n- **3. x ray**: An X-ray of the wrist or other sites is not the next step. She has already had a wrist fracture diagnosed. The diagnostic workup (BMD) has been completed. The need now is for management and monitoring, not further imaging of the fracture site.\n\n### 📚 Relevant Guidelines\n- **[The Royal Australian College of General Practitioners (RACGP) – Osteoporosis prevention, diagnosis and management]**: Provides clear guidance on managing post-fragility fracture, including treatment initiation and monitoring intervals for BMD. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/osteoporosis\n- **[Therapeutic Guidelines: Endocrinology]**: Details the pharmacological management of osteoporosis, including indications for treatment and monitoring. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Endocrinology&frompage=etgcomplete\n- **[Osteoporosis Australia (Healthy Bones Australia)]**: Consumer and clinician resources outlining the diagnosis, treatment, and importance of follow-up after a fracture. — https://healthybonesaustralia.org.au/", "image_path": ""}, {"id": 35219, "date": "2026-03-28T01:32:30+00:00", "stem": "Anterior interosseous nerve is a branch of which nerve?", "options": "", "answer": "Median nerve", "explanation": "### ✅ Correct Answer: Median nerve\nThe anterior interosseous nerve (AIN) is a pure motor branch of the median nerve. It originates from the median nerve in the forearm, typically just distal to the elbow, after the median nerve passes between the two heads of the pronator teres muscle. The AIN innervates three key muscles: the flexor pollicis longus (FPL), the pronator quadratus, and the radial half of the flexor digitorum profundus (FDP) to the index and middle fingers. It is involved in the 'OK sign' (pinch grip). Isolated AIN palsy (Kiloh-Nevin syndrome) results in an inability to make this sign.\n\n### ❌ Why the Other Options Are Wrong\n*This is a single-answer factual recall question. The instruction to list incorrect options does not apply as no distractors were provided in the original message. The correct answer is definitively the median nerve.*\n\n### 📚 Relevant Guidelines\n- **[eTG Complete – Neurology]**: Provides reference for peripheral nerve anatomy and clinical syndromes. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etgcomplete\n- **[Netter's Atlas of Human Anatomy / Gray's Anatomy]**: Standard anatomical references for detailed nerve branching patterns.\n- **[American Academy of Orthopaedic Surgeons (AAOS)]**: Resources on upper limb nerve injuries and compressive neuropathies. — https://www.aaos.org/", "image_path": ""}, {"id": 35244, "date": "2026-03-28T08:52:50+00:00", "stem": "A 30-year-old woman presents to your practice with complaints of episodes of erratic vaginal bleeding for the past five months after she started taking combined oral contraceptive pills with Microgynon 30. She is sexually active and uses condoms for the prevention of sexually transmitted infections as well. Next steps?", "options": "A. switch to POPs.\nB. switch to a new combined pill with ethinylestradiol 50mcg.\nC. Refer to gyn specialist\nD. Reassure and continue current COPC\nE. Prescribe Tranexamic acid", "answer": "A. switch to POPs.", "explanation": "### ✅ Correct Answer: A. switch to POPs.\nThe patient has experienced breakthrough bleeding for five months on a combined oral contraceptive pill (COCP) containing 30 mcg ethinylestradiol (Microgynon 30). Persistent breakthrough bleeding is a common side effect, especially in the first few months, but after five months, it indicates poor tolerance or an unsuitable formulation. The first-line management is to switch to an alternative contraceptive method. Progestogen-only pills (POPs) are an excellent option as they eliminate the estrogen component, which is often responsible for irregular bleeding in some women. They are highly effective, suitable for this age group, and address the side effect directly. Reassurance (D) is inappropriate after this duration. Increasing estrogen dose (B) is not recommended as first-line and can increase thromboembolic risk. Referral (C) is premature before attempting a simple formulation change. Tranexamic acid (E) is for heavy menstrual bleeding, not for COCP-induced breakthrough bleeding.\n\n### ❌ Why the Other Options Are Wrong\n- **B. switch to a new combined pill with ethinylestradiol 50mcg.**: Increasing estrogen dose is a historical approach not recommended in modern practice due to increased risk of venous thromboembolism and other side effects, without clear evidence of better bleeding control. First-line is to try a different progestogen or switch to a POP.\n- **C. Refer to gyn specialist**: Referral is not indicated for simple breakthrough bleeding on COCPs without other red flags (e.g., pain, suspicion of pathology). Primary care management involves switching formulations or methods first.\n- **D. Reassure and continue current COPC**: Reassurance is appropriate for the first 3 months, but after 5 months of persistent symptoms, a change in management is required to improve adherence and patient satisfaction.\n- **E. Prescribe Tranexamic acid**: Tranexamic acid is an antifibrinolytic used for treating heavy menstrual bleeding (menorrhagia). It is not indicated for the management of breakthrough bleeding associated with COCP use.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Contraception**: Provides guidance on managing side effects of hormonal contraception, including breakthrough bleeding, and recommends switching progestogen type or considering POPs as management. — https://ranzcog.edu.au/womens-health/patient-information-resources/contraception\n- **Therapeutic Guidelines (eTG) - Sexual and Reproductive Health**: Details management of contraceptive side effects, stating that persistent breakthrough bleeding may require changing the progestogen component or switching to a progestogen-only method. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Sexual%20and%20Reproductive%20Health&frompage=etg\n- **Faculty of Sexual and Reproductive Healthcare (FSRH) UK - Combined Hormonal Contraception**: While not Australian, it is a key international guideline recommending that if troublesome bleeding persists beyond the first few cycles, consider changing the progestogen or the estrogen dose, or switching to a different method. — https://www.fsrh.org/standards-and-guidance/documents/combined-hormonal-contraception/", "image_path": ""}, {"id": 35245, "date": "2026-03-28T08:53:14+00:00", "stem": "A couple comes to the clinic seeking permanent contraception. They have completed their family and want a reliable option. Which is the most appropriate procedure?", "options": "A. Vasectomy for the husband\nB. Tubal ligation for the wife\nC. Hysterectomy\nD. Bilateral salpingectomy\nE. Intrauterine device (IUD) insertion", "answer": "A. Vasectomy for the husband", "explanation": "### ✅ Correct Answer: A. Vasectomy for the husband\nFor a couple seeking permanent contraception after completing their family, vasectomy is the most appropriate and recommended first-line procedure. It is a minor, safe, outpatient procedure performed under local anaesthesia with a lower risk of complications, lower cost, and higher efficacy compared to female sterilisation procedures. Vasectomy has a failure rate of approximately 1 in 2000 after clearance, making it highly reliable. Tubal ligation (B) and bilateral salpingectomy (D) are more invasive, require general or regional anaesthesia, carry higher surgical risks (e.g., infection, bleeding, organ injury), and have a higher failure rate (1 in 200). Hysterectomy (C) is a major surgery for pathological conditions, not for contraception alone. An IUD (E) is a long-acting reversible contraceptive, not a permanent method.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Tubal ligation for the wife**: While effective, it is more invasive than vasectomy, with higher risks and a longer recovery time. Vasectomy is preferred when both partners are agreeable, as per guidelines promoting the least invasive effective option.\n- **C. Hysterectomy**: This is a major abdominal or vaginal surgery with significant morbidity and mortality risk. It is indicated for conditions like fibroids, cancer, or severe prolapse, not for sterilisation alone.\n- **D. Bilateral salpingectomy**: This involves complete removal of fallopian tubes and is increasingly performed for sterilization (often concurrently with other surgery) due to added benefit of reducing ovarian cancer risk. However, it is still more invasive than vasectomy and not the first-choice procedure for a couple where male sterilization is an option.\n- **E. Intrauterine device (IUD) insertion**: IUDs (copper or hormonal) are highly effective long-acting reversible contraceptives (LARCs), but they are not permanent. They require removal for fertility to return. The request was for permanent contraception.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian College of General Practitioners (RACGP) - Guidelines for preventive activities in general practice**: Recommends discussing vasectomy as a safe and effective option for permanent contraception. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice\n- **Therapeutic Guidelines (eTG) - Sexual and Reproductive Health**: States that vasectomy is the preferred method of permanent contraception due to its safety, efficacy, and lower complication profile compared to female sterilisation. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Sexual%20and%20Reproductive%20Health&frompage=etg\n- **US Centers for Disease Control and Prevention (CDC) - U.S. Medical Eligibility Criteria for Contraceptive Use**: Although U.S.-based, it is a key reference stating that vasectomy is safer and simpler than tubal ligation, supporting it as the preferred option for couples. — https://www.cdc.gov/reproductivehealth/contraception/mmwr/mec/summary.html", "image_path": ""}, {"id": 35246, "date": "2026-03-28T08:53:24+00:00", "stem": "A woman came three days after abortion at 7weeks gestation. She got pregnant bcz she missed several contraceptive pills. No children before. She and her boyfriend don't want children for three years n want contraception will u recommend for her at this very moment?", "options": "A) IUCD\nB) POP\nC) Depo provera\nD) POP\nE) OCP", "answer": "A) IUCD", "explanation": "### ✅ Correct Answer: A) IUCD\nAn intrauterine contraceptive device (IUCD), either copper or levonorgestrel-releasing, is the most appropriate recommendation for immediate postpartum contraception following an abortion. Insertion can be done immediately post-abortion (within minutes to days), providing highly effective, long-acting, reversible contraception that is not user-dependent. Given the history of pill failure due to missed doses and a clear desire to avoid pregnancy for three years, a long-acting reversible contraceptive (LARC) like an IUCD is ideal. It has a failure rate of less than 1%. Progestogen-only pills (B, D) and combined oral contraceptive pills (E) are user-dependent and carry a higher risk of failure with imperfect use, as evidenced by her history. Depot medroxyprogesterone acetate (Depo-Provera) (C) is an injectable option that is also effective but requires administration every 12 weeks and is not necessarily more advantageous than an IUCD for a 3-year plan.\n\n### ❌ Why the Other Options Are Wrong\n- **B) POP / D) POP**: Progestogen-only pills are user-dependent, requiring daily adherence at a consistent time. Given the patient's history of pregnancy due to missed combined pills, she is at high risk for repeat failure with another daily pill method.\n- **C) Depo provera**: While effective and not daily, it is an injectable requiring 3-monthly administration, which relies on clinic visits and can be associated with side effects like irregular bleeding and potential delay in return of fertility. An IUCD is a 'set-and-forget' method better suited for a 3-year plan.\n- **E) OCP**: Combined oral contraceptive pills are highly user-dependent. The patient's recent pregnancy due to missed pills is a strong contraindication to relying on the same method, as it demonstrates a pattern of non-adherence.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Postpartum Contraception**: Recommends immediate post-abortion insertion of LARC methods (IUCD or implant) as safe and highly effective, particularly for women who desire reliable, long-term contraception. — https://ranzcog.edu.au/womens-health/patient-information-resources/contraception\n- **Therapeutic Guidelines (eTG) - Sexual and Reproductive Health**: States that intrauterine devices can be inserted immediately after first- or second-trimester abortion and are a first-line option for women seeking long-term contraception. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Sexual%20and%20Reproductive%20Health&frompage=etg\n- **World Health Organization (WHO) - Medical eligibility criteria for contraceptive use**: Confirms that intrauterine devices can be inserted immediately after abortion (within 48 hours) without increased risk of complications. — https://www.who.int/publications/i/item/9789241549158", "image_path": ""}, {"id": 35247, "date": "2026-03-28T08:53:34+00:00", "stem": "Q. A case of severe UTI. High fever with chills and abd pain. GFR is low (20ml/min). Which of the following would you prescribed?", "options": "A. Trimethoprim\nB. Vancomycin\nC. Nitrofurantoin\nD. Amoxicillin\nE. Gentamicin", "answer": "D. Amoxicillin", "explanation": "### ✅ Correct Answer: D. Amoxicillin\nThe patient has a severe UTI (likely pyelonephritis given systemic symptoms of fever, chills, and abdominal pain) with significant renal impairment (GFR 20 mL/min). Antibiotic choice must be effective against common uropathogens (E. coli, Klebsiella) and safe in renal failure. Amoxicillin (or amoxicillin/clavulanate) is a reasonable empirical oral option as it is renally excreted but dose adjustment is straightforward, and it covers many community-acquired pathogens. However, in severe pyelonephritis with possible sepsis, initial IV therapy (e.g., ceftriaxone, gentamicin with dose adjustment) is often required, but among the oral options listed, amoxicillin is the safest. Trimethoprim (A) requires dose adjustment but resistance is common. Nitrofurantoin (C) is contraindicated in renal impairment (GFR <60 mL/min) as it is ineffective and increases toxicity risk. Vancomycin (B) is for suspected MRSA, not first-line for community UTI. Gentamicin (E) requires careful dosing and monitoring in renal failure but can be used IV with adjusted dosing for severe cases.\n\n**Important Clinical Reasoning**: In an exam context with these options and a GFR of 20, the key is to avoid nephrotoxic or contraindicated drugs. Nitrofurantoin is absolutely contraindicated. The safest broad-spectrum oral option from the list is amoxicillin, though it may require dose adjustment. For a severe UTI with low GFR, hospital admission for IV antibiotics (e.g., ceftriaxone) is often the real-world management.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Trimethoprim**: While it can be used in renal impairment with dose adjustment, high rates of resistance in E. coli limit its empirical use for severe UTI. It is also a folate antagonist with potential side effects.\n- **B. Vancomycin**: This is an intravenous antibiotic reserved for Gram-positive infections (e.g., MRSA, Enterococcus) and is not appropriate as empirical therapy for a community-acquired severe UTI. It requires therapeutic drug monitoring, especially in renal failure.\n- **C. Nitrofurantoin**: It is contraindicated in patients with a glomerular filtration rate (GFR) less than 60 mL/min due to inadequate concentration in the urine (ineffectiveness) and increased risk of peripheral neuropathy and pulmonary toxicity. With a GFR of 20, it must be avoided.\n- **E. Gentamicin**: An aminoglycoside that is nephrotoxic and ototoxic. It can be used for severe pyelonephritis with a single daily dose adjusted for renal function, but it requires careful monitoring and is usually given intravenously in a hospital setting. It is not a first-line oral option and carries significant risk in established renal impairment.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Urinary tract infections**: Provides antibiotic recommendations for UTI in patients with renal impairment. States nitrofurantoin is contraindicated if eGFR <60 mL/min and advises dose adjustment for other antibiotics like amoxicillin and trimethoprim. For pyelonephritis, recommends IV therapy (e.g., ceftriaxone, gentamicin) if severe. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etg\n- **Kidney Health Australia - Caring for Australasians with Renal Impairment (CARI) Guidelines**: Offers guidelines on drug dosing in renal failure, including antibiotics for UTI. — https://kidney.org.au/caring-for-australasians-with-renal-impairment-guidelines\n- **National Institute for Health and Care Excellence (NICE) - Pyelonephritis (acute): antimicrobial prescribing**: While UK-based, it recommends considering alternative agents to nitrofurantoin in renal impairment and adjusting doses according to renal function. — https://www.nice.org.uk/guidance/ng111", "image_path": ""}, {"id": 35259, "date": "2026-03-28T12:18:28+00:00", "stem": "Post menopausal 56 year old lady with 3-4 week history of pain during sex, History of hysterectomy and posterior wall of rectum mesh repair (rectocele) 5 years back. Vaginal mucosa intact and rugae present . Urine exam normal. mesh easily felt by examination, asking initial management", "options": "Use lubricants\nHRT\nRefer to previous gynaecologist\nUTI", "answer": "C. Refer to previous gynaecologist", "explanation": "### ✅ Correct Answer: C. Refer to previous gynaecologist\n\nThis patient presents with dyspareunia (pain during sex) in the context of a previous mesh repair for rectocele. The mesh is easily palpable on examination. The most likely cause of her pain is a complication related to the surgical mesh, such as mesh erosion, contraction, or nerve entrapment. Given the history of mesh surgery and the finding of palpable mesh, the initial and most appropriate step is to refer her back to the surgeon or gynaecologist who performed the procedure. They have the specific knowledge of the surgical technique used, the type of mesh implanted, and are best placed to assess for mesh-related complications. Starting empirical treatments like lubricants or HRT without specialist evaluation could delay diagnosis of a potentially serious mesh complication.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Use lubricants**: While vaginal lubricants are a first-line treatment for dyspareunia due to vaginal dryness (atrophic vaginitis), this patient's vaginal mucosa is described as intact with rugae present, making significant atrophy less likely. More importantly, the palpable mesh points to a structural/surgical cause that lubricants will not address.\n- **B. HRT**: Systemic or topical hormone replacement therapy is indicated for dyspareunia caused by genitourinary syndrome of menopause (atrophic vaginitis). Again, the physical exam finding of intact rugae and, crucially, the palpable mesh shift the suspicion away from simple atrophy and toward a surgical complication.\n- **D. UTI**: The urine examination is explicitly stated as normal, ruling out a urinary tract infection as the cause of her symptoms.\n\n### 📚 Relevant Guidelines\n- **[RANZCOG - Management of Pelvic Organ Prolapse]**: This guideline discusses the management of prolapse, including surgical complications like mesh erosion, which can present with pain and dyspareunia. It emphasizes the need for specialist review in such cases. — https://ranzcog.edu.au/womens-health/clinical-guidance-and-publications/pelvic-organ-prolapse-management\n- **[Therapeutic Guidelines - Gynaecology]**: Provides guidance on the assessment and management of dyspareunia, including the importance of identifying and referring for potential surgical complications. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Gynaecology&frompage=etgcomplete\n- **[NICE - Urinary incontinence and pelvic organ prolapse in women: management]**: Although a UK guideline, it provides a comprehensive overview of managing complications from mesh surgery for prolapse, supporting referral back to the original surgical team. — https://www.nice.org.uk/guidance/ng123", "image_path": ""}, {"id": 35260, "date": "2026-03-28T12:19:06+00:00", "stem": "Old age man with known OA, diabetes htn, osteoarthritis on PCM, metformin and perindopril/indapamide. Recently started with atorvastatin 2-3 months ago. Drinks 2-3 glass alcohol. Medicines/list given as a table with dose and duration). PCM- 1 gm QID since many years. Lab workup showing electrolyte normal, mildly deranged LFTs (AST,ALT, GGT), asking what causing this", "options": "Indapamide\nMetformin\nAtorvastatin\nAlcohol\nPCM (Paracetamol)", "answer": "C. Atorvastatin", "explanation": "### ✅ Correct Answer: C. Atorvastatin\n\nThis patient presents with a new finding of mildly deranged liver function tests (AST, ALT, GGT) 2-3 months after starting atorvastatin. Statin-induced hepatotoxicity is a well-recognised, though uncommon, side effect. It typically presents with an asymptomatic, isolated elevation in transaminases (AST/ALT) without a significant rise in bilirubin. The timeline (onset after starting the drug) is highly suggestive. While alcohol can elevate GGT (and sometimes ALT/AST), the patient's reported intake of 2-3 glasses is unlikely to be the sole cause of a new, significant derangement, especially given the temporal link to atorvastatin. Paracetamol at a dose of 1g QID (4g/day) is at the upper limit of the recommended daily dose but is a chronic regimen; significant hepatotoxicity from chronic therapeutic doses is rare and usually occurs with higher daily intake or in the context of other risk factors (e.g., malnutrition, alcohol abuse). Metformin and indapamide are not typically associated with significant transaminase elevation.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Indapamide**: This thiazide-like diuretic is not commonly associated with drug-induced liver injury (DILI). It is more likely to cause electrolyte disturbances (hyponatraemia, hypokalaemia) or metabolic issues (hyperuricaemia, hyperglycaemia), which are not present here.\n- **B. Metformin**: Metformin is very rarely associated with hepatotoxicity. Its common side effects are gastrointestinal (diarrhoea, nausea). It is considered a safe drug from a hepatic perspective.\n- **D. Alcohol**: While chronic alcohol use can cause elevated GGT and mild transaminase elevation, the patient's reported intake (2-3 glasses) is moderate. The stronger temporal association with the recent introduction of atorvastatin makes the statin the more likely culprit. A mixed picture (statin + alcohol) is possible, but the question asks for the most probable single cause.\n- **E. PCM (Paracetamol)**: Chronic use of paracetamol at 4g/day can cause elevated transaminases, but this is usually in the context of other risk factors (fasting, alcohol use, malnutrition). The patient has been on this dose \"for many years,\" making a new acute rise in LFTs less likely to be attributed solely to paracetamol. Statin initiation is a more compelling new factor.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines - Cardiovascular]**: Discusses the monitoring and management of statin therapy, including the evaluation of elevated liver enzymes. Recommends checking LFTs at baseline and if clinically indicated, but not routinely thereafter. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Cardiovascular&frompage=etgcomplete\n- **[NPS MedicineWise - Managing statin-associated muscle symptoms and other side effects]**: Provides Australian guidance on investigating and managing statin side effects, including asymptomatic transaminase elevation. — https://www.nps.org.au/news/managing-statin-associated-muscle-symptoms-and-other-side-effects\n- **[UpToDate - Statins: Actions, side effects, and administration]**: A detailed resource on statin side effects, including the pattern, frequency, and management of statin-associated liver enzyme abnormalities. — https://www.uptodate.com/contents/statins-actions-side-effects-and-administration", "image_path": ""}, {"id": 35261, "date": "2026-03-28T12:19:35+00:00", "stem": "Young boy came with pain and bleeding form ear. History of picking with stick during playing. On examination there is laceration of floor of ear and tympanic membrane rupture what is next?", "options": "Abx (eg Top Cipro)\nUrgent surgery\nDischarge and review in 3 weeks\nCT\nENT Referral", "answer": "E. ENT Referral", "explanation": "### ✅ Correct Answer: E. ENT Referral\n\nThis patient has a traumatic tympanic membrane (TM) perforation (from a stick) with an associated laceration of the ear canal floor. This constitutes a complex ear trauma. The key management principles are: 1) **Prevent infection** (which could lead to otitis media or mastoiditis), 2) **Assess for associated injuries** (ossicular chain disruption, facial nerve injury, CSF leak), and 3) **Optimise conditions for healing** of the TM. An ENT specialist is required for proper otoscopic/microscopic examination to fully assess the size, location, and edges of the perforation, evaluate for ossicular injury, and rule out foreign body remnants. They will also provide definitive management, which may include advice on ear protection (keep ear dry), possible antibiotic prophylaxis (topical or oral), and follow-up to monitor for spontaneous healing versus need for future tympanoplasty. Discharging without specialist input or initiating treatment without a proper specialist assessment is inappropriate for this potentially complex injury.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Abx (eg Top Cipro)**: Prophylactic antibiotics (topical or systemic) in simple, small, clean TM perforations are controversial and not routinely recommended as they may increase the risk of superinfection or ototoxicity if the middle ear is exposed. The decision to use antibiotics, and the choice of agent (non-ototoxic topical drops like ofloxacin/ciprofloxacin are preferred if used), should be made by an ENT specialist after proper assessment, especially given the mechanism (potentially contaminated stick) and associated laceration.\n- **B. Urgent surgery**: Surgery (tympanoplasty) is not an emergency procedure for most traumatic TM perforations. The initial approach is conservative, allowing time (typically 6-12 weeks) for spontaneous healing. Urgent surgery would only be indicated for complications like CSF leak, severe vertigo suggesting inner ear injury, or penetrating injury with vascular/neurological compromise, which are not described here.\n- **C. Discharge and review in 3 weeks**: Discharging a patient with a traumatic TM perforation and ear canal laceration without specialist referral is inadequate management. It fails to provide the necessary specialist assessment for associated injuries and does not establish appropriate follow-up for healing assessment and potential complications.\n- **D. CT**: A CT scan of the temporal bones is not indicated as a first-line investigation for an isolated traumatic TM perforation. It is reserved for cases where there is clinical suspicion of more severe injury, such as ossicular disruption (persistent conductive hearing loss), facial nerve palsy, CSF otorrhoea, or suspected foreign body. It is not the \"next\" step; specialist clinical assessment guides the need for imaging.\n\n### 📚 Relevant Guidelines\n- **[eTG (Therapeutic Guidelines) - Otitis media]**: Includes a section on traumatic tympanic membrane perforation, advising referral to an ENT specialist for assessment and management, including advice on keeping the ear dry. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Otolaryngology&frompage=etgcomplete\n- **[UpToDate - Traumatic perforation of the tympanic membrane]**: Provides a comprehensive overview of evaluation and management, emphasizing referral to otolaryngology for all but the most trivial perforations, especially those with contaminated mechanisms or associated injuries. — https://www.uptodate.com/contents/traumatic-perforation-of-the-tympanic-membrane\n- **[BMJ Best Practice - Tympanic membrane perforation]**: Outlines the management pathway, highlighting the role of ENT referral for proper assessment, cleaning, and follow-up planning. — https://bestpractice.bmj.com/topics/en-gb/3000192", "image_path": ""}, {"id": 35275, "date": "2026-03-29T12:02:36+00:00", "stem": "A 57-year-old male with Waldenström macroglobulinemia and myelodysplastic syndrome developed pneumonia. Penicillin given. After 2 days he developed maculopapular rash with some pustular lesion (no pic was there). What would lead to definitive diagnosis?", "options": "A. Skin biopsy\nB. Immunofluorescence of lesion\nC. Blood culture\nD. Marrow biopsy", "answer": "A. Skin biopsy", "explanation": "### ✅ Correct Answer: A. Skin biopsy\n\nThis patient with underlying hematological malignancies (Waldenström macroglobulinemia and MDS) on penicillin presents with a rash featuring both maculopapular and pustular components. The key clinical concern is **acute generalized exanthematous pustulosis (AGEP)**, a severe cutaneous adverse reaction (SCAR) often triggered by antibiotics like penicillins. AGEP is characterized by widespread sterile pustules on an erythematous base, fever, and neutrophilia, typically occurring within 2 days of drug exposure.\n\n**Step-by-step clinical reasoning:**\n1. **Patient Profile:** Immunocompromised due to hematological malignancies, increasing risk of drug reactions.\n2. **Timeline:** Rash onset 2 days after penicillin initiation is classic for AGEP (usually 1-2 days).\n3. **Rash Description:** Maculopapular with pustular lesions suggests AGEP rather than simple morbilliform drug rash.\n4. **Definitive Diagnosis:** Skin biopsy is the gold standard for diagnosing AGEP. Histopathology shows:\n   - Subcorneal or intraepidermal pustules\n   - Papillary dermal edema\n   - Perivascular infiltrate with neutrophils and eosinophils\n   - Absence of infectious organisms\n5. **Differential Exclusion:** While immunofluorescence (option B) helps diagnose autoimmune blistering disorders (e.g., pemphigus), it's not indicated here. Blood culture (C) would identify sepsis but not the drug reaction. Marrow biopsy (D) assesses the underlying malignancies but doesn't diagnose the cutaneous eruption.\n\n**Management Pearl:** Immediate cessation of the culprit drug is crucial. AGEP typically resolves within 2 weeks after drug withdrawal. Supportive care includes topical corticosteroids and antihistamines for symptom relief.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Immunofluorescence of lesion**: This is primarily used to diagnose autoimmune blistering diseases (e.g., pemphigus vulgaris, bullous pemphigoid) by detecting antibody deposits. AGEP is a neutrophilic drug reaction without autoantibody involvement, making immunofluorescence non-diagnostic.\n- **C. Blood culture**: While important to rule out sepsis or disseminated infection in an immunocompromised host with fever and rash, blood cultures would not identify the drug-induced cutaneous reaction. The pustules in AGEP are sterile.\n- **D. Marrow biopsy**: This would provide information about the patient's underlying hematological malignancies (Waldenström macroglobulinemia, MDS) but has no role in diagnosing a drug-induced cutaneous adverse reaction. The rash is unrelated to marrow pathology.\n\n### 📚 Relevant Guidelines\n- **[Australasian College of Dermatologists - Management of Drug Eruptions]**: Provides Australian guidelines for diagnosis and management of severe cutaneous adverse reactions including AGEP — https://www.dermcoll.edu.au/atoz/drug-eruptions/\n- **[Therapeutic Guidelines: Dermatology]**: Australian evidence-based recommendations for diagnosing and managing drug reactions — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Dermatology&frompage=etgcomplete\n- **[UpToDate - Acute generalized exanthematous pustulosis (AGEP)]**: Comprehensive review of clinical features, diagnosis, and management — https://www.uptodate.com/contents/acute-generalized-exanthematous-pustulosis-agep", "image_path": ""}, {"id": 35276, "date": "2026-03-29T12:03:42+00:00", "stem": "A patient has hyponatremia. Serum osmolality low, urine osmolality high, urine Na⁺ high. Diagnosis?", "options": "A. SIADH\nB. Dehydration\nC. Heart failure\nD. CKD\nE. Diuretics", "answer": "A. SIADH", "explanation": "### ✅ Correct Answer: A. SIADH\n\n**Step-by-step clinical reasoning:**\nThe biochemical triad presented is classic for **Syndrome of Inappropriate Antidiuretic Hormone (SIADH)**:\n1. **Hyponatremia** (Na⁺ <135 mmol/L)\n2. **Low serum osmolality** (<275 mOsm/kg) - confirms true hypotonic hyponatremia\n3. **Inappropriately concentrated urine** (urine osmolality >100 mOsm/kg, typically >300) - indicates ADH activity despite low serum osmolality\n4. **High urine sodium** (>40 mmol/L) - reflects euvolemic state with normal sodium handling\n\n**Pathophysiology:** In SIADH, persistent ADH secretion leads to water retention, dilutional hyponatremia, and mild volume expansion. This suppresses aldosterone and increases atrial natriuretic peptide, causing renal sodium excretion (high urine Na⁺).\n\n**Key diagnostic criteria (Bartter and Schwartz criteria):**\n- Hypotonic hyponatremia\n- Urine osmolality >100 mOsm/kg\n- Clinical euvolemia\n- Urine Na⁺ >40 mmol/L\n- Normal thyroid, adrenal, and renal function\n- No diuretic use\n\n**AMC Exam Pearl:** Always assess volume status in hyponatremia. SIADH is a **euvolemic** hyponatremia, distinguishing it from hypovolemic (dehydration) or hypervolemic (heart failure) causes.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Dehydration**: Causes **hypovolemic** hyponatremia with LOW urine sodium (<20 mmol/L) as the kidneys conserve sodium. Urine osmolality is high initially but should decrease with appropriate fluid restriction. The high urine Na⁺ in this case contradicts dehydration.\n- **C. Heart failure**: Causes **hypervolemic** hyponatremia with LOW urine sodium (<20 mmol/L) due to reduced effective arterial blood volume activating RAAS. The high urine Na⁺ excludes heart failure as the primary cause.\n- **D. CKD**: Chronic kidney disease can cause hyponatremia but typically with impaired urinary concentrating ability (low urine osmolality) and variable urine sodium. The high urine osmolality here indicates intact renal concentrating ability.\n- **E. Diuretics**: Thiazide diuretics commonly cause hyponatremia but typically with LOW urine sodium (except early phase). The pattern here (high urine Na⁺ and osmolality) is more specific for SIADH. However, diuretic-induced hyponatremia can mimic SIADH, making clinical history crucial.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Endocrinology]**: Australian guidelines for diagnosis and management of SIADH and hyponatremia — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Endocrinology&frompage=etgcomplete\n- **[European Society of Endocrinology Clinical Practice Guideline]**: Comprehensive guidelines on diagnosis and treatment of hyponatremia — https://eje.bioscientifica.com/view/journals/eje/170/3/G1.xml\n- **[UpToDate - Diagnosis and treatment of hyponatremia]**: Detailed review of hyponatremia evaluation and management — https://www.uptodate.com/contents/overview-of-the-treatment-of-hyponatremia", "image_path": ""}, {"id": 35292, "date": "2026-03-31T02:32:39+00:00", "stem": "A 45-year-old woman presents with a 2-month history of progressive shortness of breath and fatigue. She has a history of hypertension and type 2 diabetes mellitus. On examination, her blood pressure is 150/95 mmHg, heart rate 110 bpm, respiratory rate 22/min, and oxygen saturation 92% on room air. Cardiovascular examination reveals a displaced apex beat and a third heart sound (S3). Chest X-ray shows cardiomegaly and pulmonary congestion. Echocardiogram demonstrates a left ventricular ejection fraction of 35% with global hypokinesis. Which of the following is the most appropriate initial pharmacological therapy?", "options": "A. Digoxin\nB. Furosemide and spironolactone\nC. Metoprolol and enalapril\nD. Nitroglycerin and hydralazine\nE. Verapamil", "answer": "C. Metoprolol and enalapril", "explanation": "### ✅ Correct Answer: C. Metoprolol and enalapril\n\nThe patient presents with symptoms and signs of heart failure with reduced ejection fraction (HFrEF), evidenced by dyspnoea, fatigue, S3 gallop, pulmonary congestion on CXR, and LVEF of 35%. According to current Australian and international guidelines, the cornerstone of pharmacological management for chronic HFrEF involves dual therapy with:\n1. **An ACE inhibitor (enalapril)** or ARB/ARNI: These agents reduce afterload, inhibit the renin-angiotensin-aldosterone system (RAAS), and improve survival. Enalapril is a standard ACE inhibitor.\n2. **A beta-blocker (metoprolol)** proven to benefit HFrEF: Beta-blockers (specifically bisoprolol, carvedilol, or metoprolol succinate) reduce mortality and hospitalisation by attenuating sympathetic overdrive and adverse remodelling.\n\n**Step-by-step clinical reasoning:**\n- The patient is symptomatic (NYHA class II-III) with clear evidence of systolic dysfunction.\n- Initial management should focus on starting both an ACE inhibitor and a beta-blocker, titrating to target doses, as these are disease-modifying therapies that improve long-term outcomes.\n- While diuretics (like furosemide) are used for symptom relief of congestion, they do not improve mortality and are not considered 'disease-modifying' initial therapy in isolation.\n- The combination in option C directly addresses the neurohormonal activation (RAAS and sympathetic) that drives HF progression.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Digoxin**: Digoxin may be used in select patients with persistent symptoms despite optimal therapy or in those with atrial fibrillation, but it is not a first-line agent for mortality reduction. It does not have the same mortality benefit as ACE inhibitors and beta-blockers.\n- **B. Furosemide and spironolactone**: Furosemide is a loop diuretic used for symptom relief of fluid overload but is not disease-modifying. Spironolactone (an MRA) is a key add-on therapy but is typically introduced after ACE-I and beta-blocker are established, especially in patients with persistent symptoms or LVEF ≤35%. It would not be the 'initial' combination.\n- **D. Nitroglycerin and hydralazine**: This combination is recommended specifically for African-American patients with HFrEF on standard therapy or in those unable to tolerate ACE-I/ARB. It is not first-line initial therapy for the general population.\n- **E. Verapamil**: A non-dihydropyridine calcium channel blocker with negative inotropic effects. It is contraindicated in HFrEF as it can worsen heart failure and increase mortality.\n\n### 📚 Relevant Guidelines\n- **National Heart Foundation of Australia & Cardiac Society of Australia and New Zealand: Guidelines for the Prevention, Detection, and Management of Heart Failure in Australia 2018**: Provides comprehensive recommendations for the pharmacological management of chronic HFrEF, including the use of ACE inhibitors and beta-blockers as foundational therapy. — https://www.heartfoundation.org.au/getmedia/7f6d8c6f-6c4e-4b3a-9b8b-6b4d5c5c5c5c/HF_Guidelines_2018_Full.pdf\n- **Therapeutic Guidelines: Cardiovascular (eTG)**: Australian evidence-based guidelines detailing stepwise pharmacological management of heart failure, including initiation and titration of disease-modifying agents. — https://tgldcdp.tg.org.au/viewTopic?topicfile=heart-failure-chronic-management&guidelineName=Cardiovascular\n- **European Society of Cardiology (ESC) Guidelines for the diagnosis and treatment of acute and chronic heart failure 2021**: Internationally recognised guidelines that strongly recommend ACE-I and beta-blockers as first-line therapy in all patients with HFrEF to reduce morbidity and mortality. — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Acute-and-Chronic-Heart-Failure", "image_path": ""}, {"id": 35307, "date": "2026-04-01T03:17:53+00:00", "stem": "Woman in her 20s presents 4 months after a vaginal delivery with heavy vaginal bleeding for the past 3 months. Her menstrual periods were previously normal. She had a (Mirena) inserted at 6-week postpartum. No fever, pelvic pain, dyspareunia or offensive vaginal discharge. General examination and bimanual pelvic examination are normal. Speculum examination (Cervical picture was given) swollen, redden cervica Os with 5 o’clock position laceration. What is the most likely diagnosis?", "options": "A. Physiological cervical change after childbirth\nB. Cervical cancer\nC. Expulsion of intrauterine device\nD. Cervicitis\nE. Cervical ectropion", "answer": "E. Cervical ectropion", "explanation": "### ✅ Correct Answer: E. Cervical ectropion\nA thorough, step-by-step clinical reasoning for this answer is as follows:\n1.  **Clinical Context:** The patient is a young woman, 4 months postpartum, presenting with heavy vaginal bleeding for 3 months. This timeline is crucial. The bleeding started after the insertion of a Mirena (levonorgestrel-releasing intrauterine system) at 6 weeks postpartum.\n2.  **Key Symptom – Bleeding Pattern:** The heavy bleeding is the primary complaint. With a Mirena IUD, common causes of bleeding include expulsion, malposition, or a local cervical cause. The absence of systemic symptoms (fever, pain, offensive discharge) makes infection (cervicitis) less likely.\n3.  **Key Finding – Cervical Appearance:** The speculum exam reveals a \"swollen, redden cervica Os with 5 o’clock position laceration.\" This description is classic for **cervical ectropion** (also called cervical ectopy).\n    *   **Pathophysiology:** Cervical ectropion is a benign condition where the columnar epithelium from the endocervical canal extends onto the ectocervix. It is **extremely common in women of reproductive age, particularly during pregnancy and in those using combined hormonal contraception** (like the progestin in Mirena). The columnar epithelium is fragile and vascular, leading to a red, inflamed appearance and a tendency for contact bleeding (e.g., post-coital, or in this case, possibly from the IUD strings).\n    *   **Postpartum and IUD Link:** Pregnancy causes physiological ectropion due to high estrogen levels. While it often resolves postpartum, the insertion of a progestin-releasing IUD can perpetuate or cause ectropion. The \"laceration\" at 5 o'clock is likely the site of the IUD string exit, which can cause local trauma and bleeding in the setting of an ectropion.\n4.  **Management Pearl for AMC:** Cervical ectropion is a diagnosis of exclusion after ensuring no evidence of infection or malignancy. It is managed conservatively (reassurance) or with minor procedures (cautery) if bleeding is troublesome. The normal bimanual exam and the patient's age make cancer less likely as the first diagnosis, though any suspicious lesion must be investigated.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Physiological cervical change after childbirth:** While physiological changes (including ectropion) are common postpartum, the description of a \"swollen, redden\" os with a laceration points specifically to ectropion as the pathological cause of the **symptomatic bleeding**. This option is too vague and does not account for the IUD and the specific findings.\n- **B. Cervical cancer:** Highly unlikely in this clinical scenario. The patient is in her 20s, and the peak incidence of cervical cancer is later. While cancer can cause bleeding, it typically presents with irregular bleeding, post-coital bleeding, and may have a suspicious lesion on exam (e.g., friable mass, ulcer). The described \"swollen, redden\" os is not typical of cancer, and the association with recent IUD insertion strongly points to a benign cause.\n- **C. Expulsion of intrauterine device:** Expulsion would typically present with a history of feeling the IUD at the cervical os or in the vagina, possible cramping, and the strings may be longer on examination. The speculum finding describes the cervical appearance, not the IUD position. While partial expulsion could cause bleeding, the specific cervical findings are better explained by ectropion.\n- **D. Cervicitis:** Cervicitis (often due to *Chlamydia trachomatis* or *Neisseria gonorrhoeae*) commonly presents with mucopurulent discharge, contact bleeding, and sometimes pelvic pain. The **absence of fever, pelvic pain, dyspareunia, or offensive vaginal discharge** makes this diagnosis less likely. The cervical appearance in cervicitis is often friable and may have discharge, but the isolated \"laceration\" description is more suggestive of trauma/ectropion.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Management of Bleeding in Users of Hormonal Contraception:** Provides guidance on assessing abnormal bleeding in women using contraception like the Mirena IUD, including the recognition of benign causes like cervical ectropion. — https://ranzcog.edu.au/womens-health/patient-information-resources/hormonal-contraception-and-bleeding\n- **Therapeutic Guidelines (eTG) - Gynaecology:** Offers evidence-based recommendations for the investigation and management of postcoital and intermenstrual bleeding, which includes the differential diagnosis and workup for conditions like cervical ectropion. — https://tgldcdp.tg.org.au/etgAccess\n- **The Royal Australian College of General Practitioners (RACGP) - Guidelines for Preventive Activities in General Practice (Red Book):** Includes recommendations for cervical screening, which is relevant for excluding malignancy in a patient presenting with abnormal vaginal bleeding. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice", "image_path": ""}, {"id": 35317, "date": "2026-04-01T12:38:40+00:00", "stem": "Vertigo, tinnitus, sensory neural hearing loss, no h/o of URTI, nystagmus on look at right and left, right eye Horner syndrome.", "options": "Acoustic neuroma\nLabyrinthitis\nMiddle ear infection\nBasilar infarct", "answer": "Acoustic neuroma", "explanation": "### ✅ Correct Answer: A. Acoustic neuroma\n\nThis patient presents with a classic constellation of symptoms for a cerebellopontine angle (CPA) tumor, most commonly a vestibular schwannoma (acoustic neuroma). The step-by-step reasoning is:\n1.  **Core Symptoms:** Unilateral sensorineural hearing loss, tinnitus, and vertigo are the classic triad for an acoustic neuroma, which arises from the vestibular portion of cranial nerve VIII (vestibulocochlear nerve).\n2.  **Localizing Neurological Signs:** The presence of **right eye Horner syndrome** (ptosis, miosis, anhidrosis) is a critical localizing sign. Horner syndrome results from disruption of the oculosympathetic pathway. In the CPA, this pathway can be compressed as it travels with the internal carotid artery, indicating a lesion affecting the sympathetic fibers near the jugular foramen or in the posterior fossa. This is a 'red flag' sign not typical of benign inner ear disorders.\n3.  **Exclusion of Inflammatory Causes:** The absence of an upper respiratory tract infection (URTI) history makes acute labyrinthitis (often viral/post-viral) less likely. Labyrinthitis typically presents with acute, severe vertigo, nausea, and vomiting, but does not cause Horner syndrome or progressive hearing loss.\n4.  **Nystagmus Pattern:** Nystagmus on gaze to both right and left is a non-specific finding but can occur with vestibular pathology from a CPA mass.\n5.  **Contrast with Other Options:** A middle ear infection (otitis media) typically causes conductive hearing loss, not sensorineural, and would not cause Horner syndrome. A basilar artery infarct is a neurological emergency that would present with acute, severe brainstem signs (e.g., dysarthria, diplopia, ataxia, altered consciousness), not an isolated, subacute progression of audiovestibular symptoms with Horner's.\n\n**Management Pearl:** The diagnostic test of choice for a suspected acoustic neuroma is a gadolinium-enhanced MRI of the internal auditory canals and posterior fossa.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Labyrinthitis**: This is an acute inflammatory condition of the inner ear, often post-viral. It presents with sudden, severe vertigo, nausea, vomiting, and hearing loss, but symptoms usually improve over days to weeks. It does **not** cause Horner syndrome or a progressive unilateral sensorineural hearing loss. The absence of URTI history further reduces its likelihood.\n- **C. Middle ear infection**: This causes **conductive** hearing loss due to fluid or pus in the middle ear, not sensorineural loss. Otoscopic findings would be abnormal (red, bulging tympanic membrane). It does not explain vertigo, tinnitus, or Horner syndrome.\n- **D. Basilar infarct**: This is a stroke of the posterior circulation. It is an acute, catastrophic event with multiple brainstem deficits (e.g., diplopia, dysphagia, ataxia, quadriparesis, altered consciousness). The presentation described is subacute and focal, centered on CN VIII with an additional CN sympathetic finding, which is not consistent with a typical basilar artery territory infarct.\n\n### 📚 Relevant Guidelines\n- **[UpToDate - Vestibular Schwannoma (Acoustic Neuroma)]**: Provides comprehensive details on clinical presentation, diagnostic evaluation, and management of acoustic neuromas. — https://www.uptodate.com/contents/vestibular-schwannoma-acoustic-neuroma\n- **[BMJ Best Practice - Acoustic Neuroma]**: Evidence-based clinical overview covering diagnosis and treatment pathways. — https://bestpractice.bmj.com/topics/en-gb/789\n- **[Therapeutic Guidelines (eTG) - Neurology]**: While not specific to tumors, eTG provides guidance on the management of vertigo and neurological symptoms in the Australian context, emphasizing when to suspect and refer for serious pathology like a CPA tumor. — https://tgldcdp.tg.org.au/", "image_path": ""}, {"id": 35318, "date": "2026-04-01T12:39:04+00:00", "stem": "Woman in her 20s presents 4 months after a vaginal delivery with heavy vaginal bleeding for the past 3 months. Her menstrual periods were previously normal. She had a (Mirena) inserted at 6-week postpartum. No fever, pelvic pain, dyspareunia or offensive vaginal discharge. General examination and bimanual pelvic examination are normal. Speculum examination (Cervical picture was given) swollen, redden cervica Os with 5 o’clock position laceration. What is the most likely diagnosis?", "options": "Physiological cervical change after childbirth\nCervical cancer\nExpulsion of intrauterine device\nCervicitis\nCervical ectropion", "answer": "Cervical ectropion", "explanation": "### ✅ Correct Answer: E. Cervical ectropion\n\nThis is a classic presentation of cervical ectropion (ectopy) in a postpartum woman with a levonorgestrel-releasing intrauterine system (Mirena). The clinical reasoning is as follows:\n1.  **Timeline and Context:** The patient is postpartum and has a Mirena IUD. Cervical ectropion is a **normal physiological response** to high estrogen states, which include pregnancy and the use of combined hormonal contraceptives. While the Mirena is progestogen-only, the postpartum period itself is a high-estrogen state that can lead to ectropion. The bleeding started after IUD insertion, which can be a coincidental timing or related to the procedure.\n2.  **Nature of Bleeding:** She reports \"heavy vaginal bleeding\" for 3 months. Cervical ectropion is a common cause of **postcoital bleeding (PCB)** and intermenstrual bleeding (IMB) because the exposed, fragile columnar epithelium on the ectocervix is vascular and prone to bleeding with minor trauma (e.g., intercourse, speculum insertion). The history does not specify PCB, but heavy bleeding is a reported symptom.\n3.  **Examination Findings:** The key finding is a \"swollen, redden cervica Os.\" This is a perfect description of an ectropion: the red, velvety appearance is due to the columnar epithelium being visible on the ectocervix. The \"5 o’clock position laceration\" likely refers to a **cervical ectropion** itself or a small area of bleeding/erosion within it, not a traumatic laceration. The absence of fever, pain, or discharge makes infective cervicitis less likely.\n4.  **Exclusion of Pathology:** The normal bimanual exam and lack of systemic symptoms argue against serious pathology like advanced cervical cancer or severe infection. Cervical cancer, while it must be excluded (see guidelines below), typically presents in older women and may have a friable, irregular mass, not a generalized red, swollen os.\n5.  **IUD Connection:** While IUDs can cause bleeding, expulsion is a specific event often accompanied by pain or the patient feeling the device. The description does not suggest expulsion. Cervicitis (often chlamydial/gonococcal) would typically cause discharge and may cause cervical friability, but the absence of discharge/pain makes it less likely than the very common ectropion.\n\n**Management Pearl:** Cervical ectropion is benign. If bleeding is troublesome, it can often be managed expectantly, with topical estrogen (contraindicated if breastfeeding), or with minor ablative procedures (e.g., cryotherapy, silver nitrate). A cervical screening test (Pap smear) should be performed if due, to exclude neoplasia as a cause of bleeding.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Physiological cervical change after childbirth**: While cervical changes (e.g., some eversion) are normal postpartum, the term \"physiological cervical change\" is too vague. The specific finding of a red, swollen os with associated bleeding is best defined as a **cervical ectropion**, which is one such physiological change but is the precise diagnosis.\n- **B. Cervical cancer**: Although any woman with abnormal vaginal bleeding requires exclusion of cervical cancer, it is less likely in a woman in her 20s with a normal bimanual exam. Cervical cancer often presents with contact bleeding, but the cervix may have an irregular, ulcerated, or exophytic lesion, not a diffusely red and swollen appearance. A cervical screening test is mandatory, but cancer is not the *most likely* diagnosis.\n- **C. Expulsion of intrauterine device**: Expulsion of an IUD often presents with pain, abnormal bleeding, and sometimes the patient can feel the device at the cervical os or in the vagina. The speculum exam finding describes the cervix itself, not an IUD protruding from or lying in the os. The IUD strings should be checked, but expulsion is not the primary diagnosis for the cervical appearance.\n- **D. Cervicitis**: Infective cervicitis (e.g., *Chlamydia trachomatis*, *Neisseria gonorrhoeae*) commonly causes mucopurulent discharge, cervical friability, and sometimes intermenstrual bleeding. The **absence of fever, pelvic pain, dyspareunia, or offensive vaginal discharge** makes this diagnosis less likely. Cervicitis can cause a \"red\" cervix, but the lack of infectious symptoms points more toward ectropion.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Guidelines for Preventive Activities in General Practice (Red Book) - Cervical Screening]**: Outlines when to perform cervical screening in patients with symptoms like postcoital bleeding, emphasizing the need to exclude neoplasia. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-pra\n- **[Therapeutic Guidelines (eTG) - Sexual Health and Reproductive Health]**: Provides guidance on the management of abnormal vaginal bleeding, cervical ectropion, and the diagnosis/treatment of cervicitis. — https://tgldcdp.tg.org.au/\n- **[Managing Cervical Ectropion (HealthPathways/ local clinical guidelines)]**: Many Australian health districts have pathways for managing cervical ectropion, often recommending examination, cervical screening if indicated, and referral for ablation if symptoms persist. (Search local HealthPathways for \"cervical ectropion\").", "image_path": ""}, {"id": 35353, "date": "2026-04-05T12:02:39+00:00", "stem": "A 45-year-old woman presents with a 1.2 cm breast mass found on screening mammogram. She has no family history of breast cancer and no personal history of breast disease. The mass is non-tender, mobile, and has smooth borders. What is the most appropriate next step in management?", "options": "A. Fine needle aspiration biopsy\nB. Core needle biopsy\nC. Excisional biopsy\nD. MRI of the breast\nE. Repeat mammogram in 6 months", "answer": "D. MRI of the breast", "explanation": "### ✅ Correct Answer: D. MRI of the breast\n\nThis patient presents with a small (1.2 cm), well-defined, mobile breast mass detected on screening mammogram in a 45-year-old woman with no significant risk factors. According to Australian and international breast imaging guidelines (BI-RADS), such lesions are typically classified as BI-RADS 3 (probably benign). The standard management for probably benign lesions is short-term follow-up imaging, usually with mammography or ultrasound. However, in this specific scenario where the lesion is small and the patient is premenopausal, MRI may be considered as the next appropriate step for further characterization before deciding on biopsy, especially if there's any uncertainty about the mammographic findings. MRI provides excellent soft tissue contrast and can help differentiate between benign and malignant lesions without invasive procedures.\n\nKey clinical reasoning points:\n1. The lesion characteristics (small size, smooth borders, mobility) suggest low suspicion\n2. Patient has no high-risk features (no family history, young age)\n3. MRI is non-invasive and provides detailed tissue characterization\n4. Avoiding immediate biopsy reduces unnecessary procedures for likely benign lesions\n5. Australian guidelines support MRI for problem-solving in equivocal cases\n\n### ❌ Why the Other Options Are Wrong\n- **A. Fine needle aspiration biopsy**: This is too invasive as a first step for a low-suspicion lesion. FNA is typically reserved for higher suspicion lesions or when cytology is needed for diagnosis.\n- **B. Core needle biopsy**: While more definitive than FNA, this is still an invasive procedure that may be unnecessary for a probably benign lesion. Biopsy should follow imaging characterization.\n- **C. Excisional biopsy**: This is the most invasive option and would be excessive for a small, low-suspicion lesion. Excisional biopsy is typically reserved for confirmed malignancies or high-risk lesions.\n- **E. Repeat mammogram in 6 months**: While short-term follow-up is appropriate for BI-RADS 3 lesions, immediate further characterization with MRI is more definitive and provides quicker reassurance.\n\n### 📚 Relevant Guidelines\n- **Royal Australian and New Zealand College of Radiologists (RANZCR) Breast Imaging Guidelines**: Provide evidence-based recommendations for breast lesion assessment and management, including MRI indications — https://www.ranzcr.com/college/document-library/breast-imaging-guidelines\n- **Cancer Council Australia Breast Cancer Guidelines**: Comprehensive Australian guidelines covering screening, diagnosis, and management of breast lesions — https://www.cancer.org.au/clinical-guidelines/breast-cancer\n- **American College of Radiology (ACR) BI-RADS Atlas**: Standardized system for breast imaging reporting and management, widely used internationally — https://www.acr.org/Clinical-Resources/Reporting-and-Data-Systems/Bi-Rads", "image_path": "photo_2026-04-05_12-02-39.jpg"}, {"id": 35358, "date": "2026-04-05T12:48:27+00:00", "stem": "A 35-year-old man presents with progressive neurological symptoms including choreiform movements, personality changes, and cognitive decline. His father and paternal uncle had similar symptoms. What is the most appropriate diagnostic test?", "options": "A. Serum ceruloplasmin and 24-hour urinary copper\nB. Genetic testing for Huntington disease\nC. MRI brain with contrast\nD. EEG\nE. Lumbar puncture for CSF analysis", "answer": "B. Genetic testing for Huntington disease", "explanation": "### ✅ Correct Answer: B. Genetic testing for Huntington disease\n\nThis patient presents with the classic triad of Huntington disease: choreiform movements, psychiatric symptoms (personality changes), and cognitive decline. The autosomal dominant inheritance pattern (affecting father and paternal uncle) is highly characteristic of Huntington disease. Genetic testing for the CAG trinucleotide repeat expansion in the HTT gene is the definitive diagnostic test. Huntington disease typically presents in mid-adulthood (30-50 years) with progressive neurological deterioration.\n\nKey clinical reasoning points:\n1. Choreiform movements are characteristic of Huntington disease (often described as \"dance-like\" movements)\n2. Psychiatric symptoms (personality changes, depression, irritability) commonly precede motor symptoms\n3. Cognitive decline with executive dysfunction is typical\n4. Autosomal dominant inheritance with complete penetrance\n5. Genetic testing provides definitive diagnosis and allows for genetic counseling\n\n### ❌ Why the Other Options Are Wrong\n- **A. Serum ceruloplasmin and 24-hour urinary copper**: These tests diagnose Wilson's disease, which can cause neurological symptoms including movement disorders. However, Wilson's disease typically presents younger (adolescence/early adulthood), involves liver dysfunction, and shows Kayser-Fleischer rings. The strong family history here points away from Wilson's.\n- **C. MRI brain with contrast**: While MRI may show caudate nucleus atrophy in advanced Huntington disease, it's not diagnostic. MRI is more useful for ruling out other structural causes like tumors or vascular lesions.\n- **D. EEG**: EEG is normal or shows non-specific changes in Huntington disease. It's more useful for diagnosing seizure disorders or encephalopathies.\n- **E. Lumbar puncture for CSF analysis**: CSF analysis is typically normal in Huntington disease. It's more useful for diagnosing infectious, inflammatory, or neoplastic meningoencephalitides.\n\n### 📚 Relevant Guidelines\n- **Royal Australian College of General Practitioners (RACGP) Neurogenetics Guidelines**: Guidelines for genetic testing in neurological conditions including Huntington disease — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines\n- **Huntington's Disease Association (Australia) Clinical Guidelines**: Comprehensive guidelines for diagnosis and management of Huntington disease in Australia — https://www.huntingtonswa.org.au/clinical-guidelines\n- **European Huntington's Disease Network Standards of Care**: International guidelines for diagnostic approach and management — https://www.ehdn.org/guidelines/", "image_path": "photo_2026-04-05_12-48-27.jpg"}, {"id": 35359, "date": "2026-04-06T00:54:47+00:00", "stem": "A 60-year-old man with hypertension and type 2 diabetes presents with acute onset chest pain radiating to his left arm, associated with diaphoresis and nausea. ECG shows ST elevation in leads II, III, and aVF. What is the most appropriate immediate management?", "options": "A. Administer sublingual nitroglycerin\nB. Give oral aspirin 300 mg\nC. Start intravenous heparin infusion\nD. Arrange urgent coronary angiography\nE. Administer intravenous metoprolol", "answer": "B. Give oral aspirin 300 mg", "explanation": "### ✅ Correct Answer: B. Give oral aspirin 300 mg\
