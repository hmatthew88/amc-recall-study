elvety. It can cause increased vaginal discharge and postcoital spotting. However, it is not associated with heavy bleeding or a discrete laceration. The described \"5 o’clock position laceration\" points to a structural defect, not a benign physiological variant.\n\n### 📚 Relevant Guidelines\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Long-acting reversible contraception**: This guideline covers the insertion, management, and complications of IUDs, including recognition and management of expulsion. — [https://ranzcog.edu.au/womens-health/guidelines/long-acting-reversible-contraception](https://ranzcog.edu.au/womens-health/guidelines/long-acting-reversible-contraception)\n- **Therapeutic Guidelines (eTG) - Contraception**: Provides evidence-based recommendations on contraceptive options, including the management of complications associated with intrauterine devices. — [https://tgldcdp.tg.org.au/viewTopic?topicfile=contraception](https://tgldcdp.tg.org.au/viewTopic?topicfile=contraception)\n- **Faculty of Sexual & Reproductive Healthcare (FSRH) - Intrauterine Contraception**: An international guideline that details clinical standards for IUD use, including diagnosis of expulsion (strings visible at os, bleeding/pain, palpation of device in cervix/vagina). — [https://www.fsrh.org/standards-and-guidance/documents/ceu-clinical-guidance-intrauterine-contraception/](https://www.fsrh.org/standards-and-guidance/documents/ceu-clinical-guidance-intrauterine-contraception/)", "image_path": ""}, {"id": 35317, "date": "2026-04-01T12:38:40+00:00", "stem": "Vertigo, tinnitus, sensorineural hearing loss, no history of URTI, nystagmus on look at right and left, right eye Horner syndrome.", "options": "A. Acoustic neuroma\nB. Labyrinthitis\nC. Middle ear infection\nD. Basilar infarct", "answer": "A. Acoustic neuroma", "explanation": "### ✅ Correct Answer: A. Acoustic neuroma\n\n**Clinical Reasoning:**\nThe presentation is classic for a cerebellopontine angle (CPA) tumor, most commonly a vestibular schwannoma (acoustic neuroma).\n\n1.  **Key Symptoms:** The triad of unilateral sensorineural hearing loss, tinnitus, and vertigo/disequilibrium is the hallmark presentation.\n2.  **Neurological Signs:** The presence of **right eye Horner syndrome** (ptosis, miosis, anhidrosis) is a crucial localizing sign. Horner syndrome results from disruption of the oculosympathetic pathway. In the context of a CPA lesion, this indicates involvement of the brainstem or the cervical sympathetic chain as the tumor expands. Nystagmus (often bidirectional or gaze-evoked) is common due to vestibular nerve or cerebellar compression.\n3.  **Exclusion of Alternatives:** The absence of URTI history and the presence of a progressive, unilateral sensorineural deficit argue against acute inflammatory causes like labyrinthitis or otitis media.\n\n**Management Pearls for AMC:** Acoustic neuromas are typically slow-growing, benign tumors arising from the vestibular portion of cranial nerve VIII. Diagnosis is confirmed with gadolinium-enhanced MRI of the internal auditory canals. Management options include observation with serial imaging for small, asymptomatic tumors, stereotactic radiosurgery, or microsurgical resection.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Labyrinthitis**: This is an acute inflammatory condition of the inner ear, usually viral. It presents with **acute** severe vertigo, nausea, vomiting, and hearing loss, often preceded by a URTI. It is self-limiting over days to weeks. The chronic presentation, unilateral findings, and associated Horner syndrome are not consistent with labyrinthitis.\n- **C. Middle ear infection (Otitis Media)**: This causes **conductive** hearing loss, not sensorineural. Vertigo is uncommon unless complicated by labyrinthitis. Otoscopic findings would be abnormal (red, bulging tympanic membrane). Horner syndrome is not associated with otitis media.\n- **D. Basilar infarct**: While a brainstem stroke (e.g., lateral medullary/Wallenberg syndrome) can cause vertigo, Horner syndrome, and sensorineural hearing loss, it typically has an **acute, sudden onset** and is associated with other brainstem signs like ipsilateral facial numbness, contralateral body numbness, ataxia, dysphagia, and hoarseness. The presentation described lacks these additional acute neurological deficits and suggests a more insidious process.\n\n### 📚 Relevant Guidelines\n- **[UpToDate - Vestibular Schwannoma (Acoustic Neuroma)]**: Comprehensive review of epidemiology, clinical presentation, diagnosis, and management. — https://www.uptodate.com/contents/vestibular-schwannoma-acoustic-neuroma\n- **[Cancer Council Australia - Clinical Guidelines for Brain Tumours]**: Australian guidelines covering the management of benign CNS tumors including acoustic neuromas. — https://wiki.cancer.org.au/australia/Guidelines:Brain_tumours\n- **[RANZCR - Position Statement on Acoustic Neuroma Management]**: Provides Australasian perspectives on imaging and treatment pathways. — https://www.ranzcr.com/college/document-library/position-statement-on-acoustic-neuroma-management", "image_path": ""}, {"id": 35318, "date": "2026-04-01T12:39:04+00:00", "stem": "Woman in her 20s presents 4 months after a vaginal delivery with heavy vaginal bleeding for the past 3 months. Her menstrual periods were previously normal. She had a (Mirena) inserted at 6-week postpartum. No fever, pelvic pain, dyspareunia or offensive vaginal discharge. General examination and bimanual pelvic examination are normal. Speculum examination (Cervical picture was given) swollen, redden cervical Os with 5 o’clock position laceration. What is the most likely diagnosis?", "options": "A. Physiological cervical change after childbirth\nB. Cervical cancer\nC. Expulsion of intrauterine device\nD. Cervicitis\nE. Cervical ectropion", "answer": "E. Cervical ectropion", "explanation": "### ✅ Correct Answer: E. Cervical ectropion\n\n**Clinical Reasoning:**\nThis is a classic presentation of cervical ectropion (ectopy) in a postpartum woman with a levonorgestrel-releasing intrauterine system (Mirena).\n\n1.  **Pathophysiology:** Cervical ectropion is a normal physiological condition where the columnar epithelium from the endocervical canal is visible on the ectocervix. It is **extremely common** in women of reproductive age, especially with high estrogen states: pregnancy, combined oral contraceptive pill use, and adolescence. The postpartum period and the presence of a hormonal IUD (which causes a local progestogenic effect but does not suppress systemic estrogen) are both associated with ectropion.\n2.  **Clinical Features:** Ectropion appears as a **red, velvety, friable area** around the cervical os. It is often completely asymptomatic but can cause **postcoital bleeding (PCB)** or **intermenstrual bleeding (IMB)** due to the fragility of the columnar epithelium. The description \"swollen, redden cervical Os\" fits perfectly. The mention of a \"laceration\" at 5 o'clock is likely describing the appearance of the ectropion or a minor trauma from the IUD insertion, not an active tear.\n3.  **Contextual Fit:** The patient is young (20s), recently postpartum, and has a Mirena IUD—all strong risk factors. The bleeding is heavy vaginal bleeding (likely menorrhagia or IMB), but there are **no signs of infection** (no fever, pain, discharge) to suggest cervicitis. The normal bimanual exam argues against significant pathology like advanced cancer or expulsion where the IUD strings/device might be palpable or visible.\n\n**Management Pearls for AMC:** Ectropion is a benign diagnosis. If asymptomatic, no treatment is needed. For troublesome bleeding, treatment options include reassurance, topical estrogen cream (to promote squamous metaplasia), or ablative procedures (cryotherapy, diathermy). **Crucially, any woman with PCB/IMB must have a cervical screening test (CST) to exclude neoplasia before attributing bleeding to ectropion.**\n\n### ❌ Why the Other Options Are Wrong\n- **A. Physiological cervical change after childbirth**: While the cervix does change after childbirth (e.g., may appear more slit-like), the specific description of a focal, red, swollen area causing bleeding is more characteristic of ectropion than general post-partum change.\n- **B. Cervical cancer**: Although cervical cancer must be excluded in any woman with PCB/IMB, it is less likely in this scenario. Cancer typically presents in older women, may have contact bleeding, but often has a suspicious appearance (friable, exophytic, ulcerated mass) rather than a generalized red area. The normal bimanual exam is reassuring. A CST is mandatory, but ectropion is the more common and likely cause.\n- **C. Expulsion of intrauterine device**: IUD expulsion would typically present with pain, the patient may feel the device protruding, and on speculum exam, the IUD would be visible in the vagina or cervix. The strings may be abnormally long. The described findings do not mention seeing the IUD itself.\n- **D. Cervicitis**: Cervicitis (often due to *Chlamydia trachomatis* or *Neisseria gonorrhoeae*) causes a mucopurulent discharge, cervical friability, and possibly contact bleeding. However, the case explicitly states **no offensive vaginal discharge, dyspareunia, or pelvic pain**, making infection unlikely.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Guidelines for Preventive Activities in General Practice (Red Book) - Cervical Screening]**: Outlines when to perform cervical screening, including in women with symptoms like PCB. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/red-book/cancer/cervical-cancer\n- **[Therapeutic Guidelines (eTG) - Gynaecology]**: Management of abnormal uterine bleeding and benign cervical conditions. — https://tgldcdp.tg.org.au/etgAccess\n- **[Jean Hailes for Women's Health - Cervical Ectropion]**: Australian patient-focused resource explaining the condition. — https://www.jeanhailes.org.au/health-a-z/vagina-vulva/cervical-ectropion", "image_path": ""}];
        let questions = [];
        let currentIndex = 0;


        async function init() {
            try {
                // Data is now embedded directly to bypass CORS
                questions = questionsData;
                document.getElementById('total-count').innerText = questions.length;

                // Load saved progress
                const savedIndex = localStorage.getItem('amc_study_index');
                if (savedIndex !== null) {
                    currentIndex = parseInt(savedIndex, 10);
                    // Boundary check
                    if (currentIndex >= questions.length) currentIndex = 0;
                }

                renderQuestion();
            } catch (e) {
                console.error("Data load failed", e);
                document.getElementById('question-stem').innerText = "加载失败。";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[currentIndex];

            // Stats & Progress
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

            // Save progress
            localStorage.setItem('amc_study_index', currentIndex);

            // Reset UI
            document.getElementById('question-stem').innerText = q.stem;
            document.getElementById('explanation-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';


            // Options
            const options = q.options.split('\n');
            options.forEach(opt => {
                if (!opt.trim()) return;
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 transition-all text-slate-700 font-medium group";
                btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-lg bg-slate-100 group-hover:bg-blue-200 text-center leading-8 mr-4 text-sm font-bold text-slate-500 group-hover:text-blue-600 transition-all">&#8226;</span> ${opt}`;
                btn.onclick = () => selectOption(btn, opt, q.answer, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct, explanation) {
            // Check correct answer (fuzzy match)
            const isCorrect = selected.toLowerCase().includes(correct.toLowerCase()) ||
                correct.toLowerCase().includes(selected.toLowerCase());

            // Style all buttons
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.innerText.toLowerCase().includes(correct.toLowerCase())) {
                    b.classList.add('answer-correct');
                }
            });

            if (!isCorrect) {
                btn.classList.add('answer-wrong');
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = explanation;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Scroll to explanation
            setTimeout(() => {
                document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function exportProgress() {
            prompt('📤 你的进度码（在其他设备上导入）：', 'matt-' + (currentIndex + 1));
        }

        function importProgress() {
            const input = prompt('📥 输入进度码（如 matt-87）：');
            if (!input) return;
            const trimmed = input.trim();
            const match = trimmed.match(/-?(\d+)$/);
            if (match) {
                const num = parseInt(match[1], 10);
                if (num >= 1 && num <= questions.length) {
                    currentIndex = num - 1;
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    alert(`✅ 已跳转到第 ${num} 题。`);
                    return;
                }
            }
            alert(`⚠️ 格式错误，请输入如 matt-87 的进度码。`);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        init();
    </script>
