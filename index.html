and aural fullness. The absence of any auditory symptoms rules this out.\n- **E. Acoustic neuroma (Vestibular schwannoma)**: Typically presents with **unilateral, progressive sensorineural hearing loss** and tinnitus, with vertigo being less common and usually mild/unsteadiness rather than acute episodic vertigo. Positional triggers are not typical.\n\n### 📚 Relevant Guidelines\n- **[Stroke Foundation Australia – Clinical Guidelines for Stroke Management]**: Covers the diagnosis and management of posterior circulation (vertebrobasilar) ischaemic events, including transient ischaemic attacks presenting with vertigo. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[UpToDate – Vertigo and Dizziness in the Emergency Department]**: Provides a diagnostic approach to vertigo, differentiating central (e.g., vertebrobasilar) from peripheral causes based on history and examination. — https://www.uptodate.com/contents/approach-to-the-patient-with-vertigo\n- **[BMJ Best Practice – Vertigo]**: Includes algorithms for diagnosing vertigo, emphasizing red flags (e.g., vascular risk factors, neurological symptoms) that point to central causes like vertebrobasilar ischaemia. — https://bestpractice.bmj.com/topics/en-gb/3000197", "image_path": ""}, {"id": 34336, "date": "2026-02-02T12:00:33+00:00", "stem": "A 45-year-old man presents with recurrent flushing, pruritus, abdominal cramping, and episodes of syncope after alcohol intake. He has a history of unexplained anaphylaxis following a bee sting. On examination, there are multiple brownish macules consistent with urticaria pigmentosa. Blood tests show a persistently elevated serum tryptase level of 28 ng/mL.\n\nWhat is the most likely diagnosis?", "options": "A. Carcinoid syndrome\nB. Pheochromocytoma\nC. Systemic mastocytosis\nD. Hereditary angioedema\nE. Zollinger–Ellison syndrome", "answer": "C. Systemic mastocytosis", "explanation": "### ✅ Correct Answer: C. Systemic mastocytosis\nSystemic mastocytosis is a clonal proliferation of mast cells in one or more extracutaneous organs (bone marrow, GI tract, liver, spleen). The classic presentation includes: 1) **Symptoms of mast cell mediator release**: flushing, pruritus, abdominal pain (cramping, diarrhoea), hypotension (leading to syncope), often triggered by factors like **alcohol**, heat, stress, or medications. 2) **Cutaneous findings**: **Urticaria pigmentosa** (brownish macules/papules that urticate when rubbed – Darier's sign). 3) **Laboratory findings**: Persistently elevated **serum tryptase** (>20 ng/mL is a minor diagnostic criterion). 4) **History of anaphylaxis** to triggers like insect stings (Hymenoptera) is common due to mast cell hyperreactivity. This patient's constellation of symptoms, physical signs, and lab findings is pathognomonic for systemic mastocytosis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Carcinoid syndrome**: Causes flushing, diarrhoea, and abdominal cramping due to secretion of vasoactive substances (e.g., serotonin) from a neuroendocrine tumour. However, flushing in carcinoid is often more prolonged and cyanotic (reddish-purple), and it is not typically triggered by alcohol in the same direct way. It is not associated with urticaria pigmentosa or elevated tryptase. Diagnosis involves elevated urinary 5-HIAA.\n- **B. Pheochromocytoma**: Causes paroxysmal hypertension, headache, palpitations, and sweating due to catecholamine excess. Flushing is rare; patients are usually hypertensive during attacks, not hypotensive/syncopal. Not associated with urticaria pigmentosa or elevated tryptase. Diagnosis involves elevated plasma/urinary metanephrines.\n- **D. Hereditary angioedema (HAE)**: Characterized by recurrent episodes of non-pruritic, non-pitting angioedema (swelling of face, extremities, GI tract causing abdominal pain) and potentially life-threatening laryngeal oedema. It does not cause flushing, pruritus, or urticaria pigmentosa. Attacks are not typically triggered by alcohol in this specific pattern. Serum tryptase is normal. C1 esterase inhibitor deficiency is diagnostic.\n- **E. Zollinger–Ellison syndrome**: Caused by a gastrin-secreting tumour leading to severe peptic ulcer disease and diarrhoea due to gastric acid hypersecretion. It does not cause flushing, pruritus, syncope, or skin findings like urticaria pigmentosa.\n\n### 📚 Relevant Guidelines\n- **[UpToDate – Systemic Mastocytosis: Clinical Manifestations, Pathogenesis, and Diagnosis]**: Details the diagnostic criteria (WHO), including major and minor criteria like serum tryptase >20 ng/mL and typical clinical symptoms. — https://www.uptodate.com/contents/systemic-mastocytosis-clinical-manifestations-pathogenesis-and-diagnosis\n- **[Therapeutic Guidelines Australia (eTG) – Anaphylaxis]**: Mentions mastocytosis as a condition predisposing to severe anaphylaxis and the importance of tryptase measurement. — https://tgldcdp.tg.org.au/viewTopic?topicfile=anaphylaxis&guidelineName=Acute%20care\n- **[Australasian Society of Clinical Immunology and Allergy (ASCIA) – Mastocytosis]**: Provides an overview of diagnosis and management of mastocytosis in the Australian context. — https://www.allergy.org.au/patients/mastocytosis", "image_path": ""}, {"id": 34344, "date": "2026-02-02T22:42:40+00:00", "stem": "A 68-year-old man presents with a 2-year history of gradually progressive muscle weakness. He reports difficulty climbing stairs and rising from a chair. He also notices reduced grip strength and difficulty holding cutlery.\n\nOn examination:\n • Weakness of quadriceps and finger flexors\n • Mild muscle wasting\n • No skin rash\n • CK is mildly elevated\n • EMG shows myopathic changes\n • Muscle biopsy shows rimmed vacuoles\n\nHe has had minimal response to high-dose corticosteroids.\n\nWhat is the most likely diagnosis?", "options": "A. Polymyositis\nB. Dermatomyositis\nC. Immune-mediated necrotizing myopathy\nD. Inclusion body myositis\nE. Antisynthetase syndrome", "answer": "D", "explanation": "### ✅ Correct Answer: D. Inclusion body myositis\n\n**Clinical Reasoning:**\n1. **Demographics & Presentation:** The patient is a 68-year-old man with a **2-year history of gradually progressive weakness**. This chronic, insidious onset is classic for inclusion body myositis (IBM), which is the most common acquired myopathy in patients over 50.\n2. **Pattern of Weakness:** The weakness involves **quadriceps** (difficulty climbing stairs, rising from a chair) and **finger flexors** (reduced grip strength, difficulty holding cutlery). This **asymmetric, distal-predominant pattern** (especially finger flexors and quadriceps) is highly characteristic of IBM and helps distinguish it from other inflammatory myopathies, which are typically symmetric and proximal.\n3. **Examination & Investigations:**\n   - **No skin rash:** Excludes dermatomyositis (B).\n   - **Mild CK elevation:** In IBM, CK is often only mildly elevated (typically <10x ULN), unlike polymyositis or necrotizing myopathy where it can be very high.\n   - **EMG shows myopathic changes:** Consistent with an inflammatory myopathy.\n   - **Muscle biopsy shows rimmed vacuoles:** This is the **pathognomonic histological finding** for IBM. The biopsy would also show endomysial inflammation, amyloid deposits, and filamentous inclusions.\n4. **Treatment Response:** The key clue is **minimal response to high-dose corticosteroids**. IBM is notoriously **refractory to immunosuppressive therapy** (including corticosteroids, IVIG, methotrexate), unlike the other options which are typically responsive. This therapeutic resistance is a major diagnostic criterion.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Polymyositis:** Typically presents with **subacute, symmetric proximal muscle weakness** (shoulders, hips) over weeks to months. It does not preferentially affect finger flexors. CK is usually significantly elevated. It generally **responds well to corticosteroids**. The biopsy would show endomysial inflammation with CD8+ T-cells invading non-necrotic muscle fibers, but **not rimmed vacuoles**.\n- **B. Dermatomyositis:** Characterized by **proximal muscle weakness plus a pathognomonic skin rash** (heliotrope rash, Gottron's papules). The absence of any skin rash makes this highly unlikely. Biopsy shows perivascular, perimysial inflammation and perifascicular atrophy.\n- **C. Immune-mediated necrotizing myopathy:** Presents with acute or subacute severe proximal weakness. CK is **markedly elevated**. Biopsy shows **prominent myofiber necrosis with minimal inflammation**. It is often associated with statin use or anti-SRP or anti-HMGCR antibodies. It typically **responds well to immunosuppression**.\n- **E. Antisynthetase syndrome:** A subset of inflammatory myopathies characterized by **myositis, interstitial lung disease, fever, Raynaud's phenomenon, mechanic's hands, and arthritis**. The presence of these extra-muscular features (especially lung involvement) is key. The patient here has isolated muscle symptoms. It also generally responds to immunosuppression.\n\n### 📚 Relevant Guidelines\n- **[UpToDate: Clinical Manifestations and Diagnosis of Inclusion Body Myositis]**: Comprehensive review of diagnostic criteria, clinical features, and differential diagnosis for IBM. — https://www.uptodate.com/contents/inclusion-body-myositis-clinical-manifestations-and-diagnosis\n- **[European Neuromuscular Centre (ENMC) International Workshop: 224th ENMC International Workshop]**: Provides updated diagnostic criteria and classification for inclusion body myositis. — https://www.enmc.org/wp-content/uploads/2023/05/224th-ENMC-International-Workshop.pdf\n- **[Therapeutic Guidelines (Neurology): Inflammatory Myopathies]**: Australian guidelines for the diagnosis and management of inflammatory myopathies, including IBM. — https://tgldcdp.tg.org.au/viewTopic?topicfile=inflammatory-myopathies&guidelineName=Neurology#toc_d1e289", "image_path": ""}, {"id": 34347, "date": "2026-02-03T06:01:54+00:00", "stem": "An 8-year-old girl presents with recurrent abdominal pain for several months, often missing school. There is no tenderness, normal urinalysis, and no systemic features. What is the most appropriate next step?", "options": "a. Abdominal ultrasound\nb. CT scan\nc. MRI abdomen\nd. No further investigation – reassurance\ne. Stool culture", "answer": "A", "explanation": "### ✅ Correct Answer: a. Abdominal ultrasound\n\n**Clinical Reasoning:**\n1. **Clinical Scenario:** This is a classic presentation of **recurrent abdominal pain in childhood**. The key features are:\n   - **Chronicity:** \"Several months\" of recurrent pain.\n   - **Functional Impact:** Pain is severe enough to cause \"missing school.\"\n   - **Absence of Red Flags:** No tenderness on examination, normal urinalysis (ruling out UTI or renal pathology), and no systemic features (no fever, weight loss, vomiting, night waking, growth failure, or localized signs). This makes serious organic pathology less likely but does not completely rule it out at this initial stage.\n2. **Diagnostic Approach in Paediatrics:** For recurrent abdominal pain without red flags, the initial approach is **targeted, low-risk investigation** to exclude common organic causes before labeling it as functional abdominal pain. Jumping straight to reassurance (option D) without any investigation is premature and may miss treatable conditions, causing parental and patient anxiety.\n3. **Why Abdominal Ultrasound is First-Line:**\n   - **Non-invasive and safe** (no radiation).\n   - **Excellent for screening** for common organic causes in children such as:\n     - **Constipation** (very common, can present as recurrent pain).\n     - **Mesenteric adenitis.**\n     - **Renal/Urinary tract abnormalities** (even with normal urinalysis, structural issues like hydronephrosis can be present).\n     - **Gallstones, ovarian cysts** (less common in this age group).\n   - It provides **objective reassurance** to the family and clinician. A normal ultrasound significantly increases the probability of functional abdominal pain (e.g., abdominal migraine, functional dyspepsia, IBS).\n4. **Contrast with Other Options:**\n   - **CT/MRI (B, C):** Have **no role as first-line** in a child without red flags due to radiation (CT) cost, need for sedation (often for MRI in children), and low pre-test probability for pathology they would best detect.\n   - **Stool culture (E):** Indicated if diarrhea, fever, or travel history is present, which is not described.\n   - **Reassurance only (D):** Is the **subsequent step** after a negative ultrasound. Performing a simple, safe ultrasound first is the standard of care to responsibly exclude organic causes before making a diagnosis of functional pain.\n\n### ❌ Why the Other Options Are Wrong\n- **b. CT scan:** **Inappropriate first-line** due to **significant ionizing radiation exposure** in a child. Reserved for cases of acute abdominal pain with clear red flags suggesting serious intra-abdominal pathology (e.g., appendicitis, trauma) or after inconclusive ultrasound.\n- **c. MRI abdomen:** **Not indicated.** Expensive, often requires sedation in an 8-year-old, and has poor availability for this indication. Used for specific queries (e.g., complex congenital anomalies, tumor staging) not suggested here.\n- **d. No further investigation – reassurance:** While **functional abdominal pain is the most likely final diagnosis**, best practice is to first perform a **minimal, targeted workup** (like an ultrasound) to exclude common organic mimics. This approach is evidence-based, builds trust, and avoids missing low-probability but significant conditions.\n- **e. Stool culture:** Indicated if symptoms suggest an infectious gastroenteritis (e.g., diarrhea, fever, recent travel, exposure). The history describes recurrent pain **without** diarrhea or systemic features, making this low yield.\n\n### 📚 Relevant Guidelines\n- **[RACGP: Recurrent abdominal pain in children]**: Australian guideline outlining the assessment and management of recurrent abdominal pain in children, emphasizing a stepwise approach starting with history, examination, and limited investigations like ultrasound. — https://www.racgp.org.au/afp/2015/december/recurrent-abdominal-pain-in-children/\n- **[North American Society for Pediatric Gastroenterology, Hepatology and Nutrition (NASPGHAN) Clinical Report]**: Evidence-based recommendations for the evaluation and treatment of functional abdominal pain disorders in children. Recommends limited laboratory testing and imaging only when indicated by history or exam. — https://naspghan.org/files/documents/pdfs/position-papers/Functional_Abdominal_Pain.2005.pdf\n- **[Therapeutic Guidelines (Gastroenterology): Paediatric functional gastrointestinal disorders]**: Australian therapeutic guidelines on managing functional abdominal pain in children, including diagnostic criteria and when to investigate. — https://tgldcdp.tg.org.au/viewTopic?topicfile=paediatric-functional-gastrointestinal-disorders&guidelineName=Gastroenterology", "image_path": ""}, {"id": 34370, "date": "2026-02-03T10:33:45+00:00", "stem": "A 35-year-old mother brings her 8-year-old daughter to the pediatric clinic for a routine check-up. The mother expresses concern about the timing of the HPV vaccine for her daughter. She has heard mixed recommendations and is unsure when it is best to start the vaccination. Which of the following is the most appropriate recommendation for the HPV vaccination for Emily?", "options": "a. Give the HPV vaccine now.\nb. Wait until Emily is 10 years old to start the HPV vaccination series.\nc. Delay vaccination until Emily is sexually active.\nd. Start the HPV vaccination series when Emily turns 18 years old.", "answer": "a. Give the HPV vaccine now.", "explanation": "### ✅ Correct Answer: a. Give the HPV vaccine now.\nThe Australian National Immunisation Program (NIP) recommends routine HPV vaccination for adolescents aged 12-13 years. However, the vaccine is approved for use from age 9. The key principle is to vaccinate **before exposure to HPV** to achieve maximum effectiveness. Vaccination at a younger age (like 8 years) is considered 'off-schedule' but is **medically appropriate and recommended** if a parent requests it or if there are specific concerns (e.g., early sexual activity risk, parental anxiety). The immune response in children aged 9-14 is robust, and they only require a 2-dose schedule (0 and 6-12 months), making it efficient. Delaying vaccination until adolescence or sexual activity increases the risk of HPV exposure, negating the vaccine's primary preventive benefit. Therefore, the most appropriate, evidence-based advice is to administer the vaccine now.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Wait until Emily is 10 years old to start the HPV vaccination series.**: While 10 is closer to the routine schedule, there is no clinical or immunological advantage to waiting. The vaccine is safe and effective from age 9. Delaying without a specific medical reason unnecessarily postpones protection.\n- **c. Delay vaccination until Emily is sexually active.**: This is incorrect and dangerous. The HPV vaccine is a **prophylactic** vaccine, not a therapeutic one. Its efficacy is highest when given **prior to HPV exposure**. Waiting until after sexual debut significantly increases the risk of prior infection with vaccine-targeted HPV types, reducing or nullifying the vaccine's benefit.\n- **d. Start the HPV vaccination series when Emily turns 18 years old.**: This is well outside the recommended age for routine vaccination. While catch-up vaccination is funded for people up to age 25, starting at 18 misses the ideal window of pre-exposure immunity and may require a 3-dose schedule if started after age 15.\n\n### 📚 Relevant Guidelines\n- **[Australian Immunisation Handbook (AIH) / Australian Government Department of Health and Aged Care]**: Provides comprehensive recommendations on HPV vaccination, including schedule, target age groups, and catch-up vaccination. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/human-papillomavirus-hpv\n- **[National Immunisation Program (NIP) Schedule / Australian Government Department of Health and Aged Care]**: Outlines the funded routine schedule for HPV vaccination (year 7 or 8 school-based program) and catch-up eligibility. — https://www.health.gov.au/topics/immunisation/immunisation-throughout-life/national-immunisation-program-schedule\n- **[The Royal Australian College of General Practitioners (RACGP) Guidelines for Preventive Activities in General Practice]**: Includes recommendations on HPV vaccination as part of adolescent preventive healthcare. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice", "image_path": ""}, {"id": 34374, "date": "2026-02-03T10:49:35+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia). In acute haemorrhage, the haemoglobin level is an unreliable initial indicator of blood loss because haemodilution has not yet occurred; the key is the clinical picture of shock. Transfusion in this context is a resuscitative measure to restore circulating volume and oxygen-carrying capacity. The other patients have chronic anaemia or mild symptoms where transfusion is not the first-line management and carries more risk than benefit.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is chronic, stable anaemia. The first-line management is **oral iron supplementation** and investigation/treatment of the cause (menorrhagia). Transfusion is rarely indicated in stable chronic anaemia without severe symptoms or comorbidities.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with cardiac disease may be transfused at a higher threshold (e.g., Hb <80 g/L) if symptomatic, this patient is **asymptomatic at rest**. Transfusion is not immediately indicated. The focus should be on diagnosing the cause of the normocytic anaemia.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: Postpartum anaemia is common. If the patient is well and asymptomatic, management is with **oral iron therapy**. Transfusion is reserved for symptomatic anaemia or active bleeding.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: A haemoglobin of 95 g/L is only mildly low. Chemotherapy-induced anaemia is typically managed with **erythropoiesis-stimulating agents (ESAs)** and iron if indicated, not transfusion, unless severely symptomatic or Hb is very low (e.g., <80 g/L). Mild fatigue alone does not warrant the risks of transfusion.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority Australia - Patient Blood Management Guidelines: Module 2 - Perioperative]**: Provides evidence-based recommendations on transfusion thresholds, emphasising restrictive transfusion (Hb <70 g/L) in haemodynamically stable patients without cardiac disease, and the importance of clinical context over a single Hb number. — https://www.blood.gov.au/pbm-module-2\n- **[Therapeutic Guidelines Australia - Blood and blood products]**: Outlines indications for red cell transfusion, highlighting acute blood loss with haemodynamic instability as a key indication. — https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-blood-products\n- **[Choosing Wisely Australia - Red blood cell transfusion]**: Recommends avoiding transfusion in haemodynamically stable patients with Hb >70-80 g/L, reinforcing the principle of restrictive transfusion. — https://www.choosingwisely.org.au/recommendations/ranzco", "image_path": ""}, {"id": 34375, "date": "2026-02-03T10:49:51+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a well-known, potent oxidant drug that can precipitate acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical scenario is classic for acute haemolytic anaemia: sudden onset of symptoms (dark urine from haemoglobinuria, jaundice from unconjugated hyperbilirubinaemia, fatigue from anaemia) following exposure to a triggering agent. The laboratory findings confirm haemolysis: low Hb, elevated reticulocytes (bone marrow response), elevated indirect bilirubin, and the presence of **\"bite cells\" and blister cells** on the blood film, which are characteristic of oxidative damage to red blood cells. G6PD deficiency is an X-linked disorder common in individuals of Middle Eastern, Mediterranean, African, and Southeast Asian descent. The enzyme is crucial for protecting RBCs from oxidative stress; its deficiency makes RBCs susceptible to haemolysis when exposed to oxidant drugs, infections, or fava beans.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is **not** a recognised oxidant trigger for haemolysis in G6PD deficiency. It is considered safe in standard therapeutic doses.\n- **B. Amoxicillin**: While some antibiotics (e.g., sulfonamides, nitrofurantoin) are triggers, penicillins like amoxicillin are **generally safe** and not common causes of haemolysis in G6PD deficiency.\n- **D. Metformin**: This is an antidiabetic drug and is **not associated** with causing oxidative haemolysis in G6PD-deficient individuals.\n- **E. Prednisolone**: This is a corticosteroid used to treat various inflammatory conditions. It is **not an oxidant drug** and does not trigger haemolysis in G6PD deficiency. In fact, steroids are sometimes used in the management of other types of autoimmune haemolytic anaemia.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines Australia - G6PD deficiency]**: Lists drugs to be avoided in G6PD deficiency, including dapsone, sulfonamides, nitrofurantoin, and primaquine. — https://tgldcdp.tg.org.au/viewTopic?topicfile=g6pd-deficiency\n- **[UpToDate - Glucose-6-phosphate dehydrogenase deficiency]**: Comprehensive review of pathophysiology, triggers (including dapsone), diagnosis, and management. — https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-deficiency\n- **[WHO - Glucose-6-phosphate dehydrogenase deficiency]**: Provides a global perspective and list of unsafe medications. — https://www.who.int/news-room/fact-sheets/detail/glucose-6-phosphate-dehydrogenase-deficiency", "image_path": ""}, {"id": 34416, "date": "2026-02-04T10:43:06+00:00", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech. The patient was in his usual state of health last night but awoke this morning with these symptoms. He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease. The patient does not drink alcohol regularly but has a 45-pack-year history. Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia. CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery. The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility. Forty-eight hours later, he becomes obtunded. Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min. Physical examination now shows complete right hemiplegia and deviation of the eyes to the left. Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E. Repeat CT scan of the head", "explanation": "### ✅ Correct Answer: E. Repeat CT scan of the head\n\nThis patient presents with a classic clinical picture of **malignant middle cerebral artery (MCA) infarction** with impending herniation. The key timeline is critical: large left MCA infarct → 48 hours later → neurological deterioration (obtundation, complete hemiplegia, eye deviation). This is the typical timeframe (2-5 days) for malignant cerebral edema to peak following a large hemispheric stroke.\n\n**Clinical Reasoning:**\n1. **Pathophysiology:** Large MCA infarcts cause cytotoxic edema that peaks at 2-5 days post-stroke, leading to increased intracranial pressure (ICP), midline shift, and potential herniation.\n2. **Exam Findings:** Obtundation + complete hemiplegia + eye deviation (toward the lesion) = signs of increased ICP and uncal herniation.\n3. **Management Priority:** Before initiating any specific therapy for cerebral edema (like hyperosmolar agents), you must **confirm the diagnosis and assess for midline shift/herniation** with an urgent non-contrast CT head.\n4. **Why CT over MRI?** CT is faster, more readily available, and equally effective at detecting significant edema, midline shift, and hemorrhage in this acute setting. MRI would provide more detail but takes longer and may delay life-saving intervention.\n5. **Next Steps After CT:** If CT confirms significant edema with midline shift, the patient may require urgent neurosurgical consultation for decompressive hemicraniectomy, which is life-saving and improves functional outcomes in selected patients.\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Blood cultures and empiric antibiotics**: While fever (38.3°C) could suggest infection, the fever in this context is more likely **central fever** due to hypothalamic involvement from the stroke or a systemic inflammatory response to brain injury. The acute neurological deterioration takes precedence over a workup for infection. Antibiotics would not address the life-threatening cerebral edema.\n\n- **B. Intravenous hypertonic saline and observation**: Hypertonic saline is indeed a treatment for cerebral edema. However, administering it without first obtaining imaging is inappropriate. You need to confirm the presence and severity of edema, rule out hemorrhage, and assess for midline shift before initiating therapy. Additionally, \"observation\" alone is insufficient for a patient with signs of herniation.\n\n- **C. Intravenous mannitol and observation**: Similar to option B, mannitol is an osmotic diuretic for cerebral edema. The same criticism applies: you must **image first** to confirm the cause of deterioration. Giving mannitol blindly could be harmful if there are contraindications (e.g., renal failure, severe hypovolemia) and delays definitive diagnosis.\n\n- **D. MRI of the head**: While MRI (especially DWI) is more sensitive for acute ischemia and can better delineate the infarct, it is **not the best *next* step** in this unstable patient. MRI is time-consuming, less readily available emergently, and patients with altered mental status may not tolerate it safely. The urgent need is for a rapid assessment of structural changes (edema, shift) which CT provides adequately and quickly.\n\n### 📚 Relevant Guidelines\n\n- **[Australian Clinical Guidelines for Stroke Management (Stroke Foundation)]**: Provide comprehensive recommendations for the management of acute stroke complications, including monitoring for and managing malignant cerebral edema. They emphasize close neurological monitoring and timely imaging for deterioration. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n\n- **[European Stroke Organisation (ESO) Guidelines on Decompressive Hemicraniectomy in Space-Occupying Hemispheric Infarction]**: Specifically address the management of malignant MCA infarction, including criteria for imaging and surgical intervention. — https://www.eso-stroke.org/eso-stroke/guidelines/\n\n- **[UpToDate: 'Malignant' Middle Cerebral Artery Infarction]**: Details the pathophysiology, clinical course, diagnostic approach (emphasizing repeat CT), and management options for this condition. — https://www.uptodate.com/contents/malignant-middle-cerebral-artery-infarction", "image_path": ""}, {"id": 34417, "date": "2026-02-04T10:43:16+00:00", "stem": "A mother is concerned that her child has stopped seeing friends and discarded his laptop, claiming he was receiving special messages from Facebook. There is social withdrawal and odd beliefs. What is the most important mental function to assess?", "options": "a. Self-esteem\nb. Insight\nc. Mood\nd. Judgment\ne. Reality testing", "answer": "e. Reality testing", "explanation": "### ✅ Correct Answer: e. Reality testing\n\n**Clinical Reasoning:**\nThe core clinical picture here is highly suggestive of a **psychotic disorder**, likely a first episode of psychosis (e.g., schizophrenia). The key features are:\n1. **Social withdrawal:** A negative symptom common in psychosis.\n2. **Odd beliefs/delusions:** The belief about receiving \"special messages from Facebook\" is a **delusion of reference** (where neutral stimuli are believed to have special, personal meaning).\n3. **Age:** While not specified, this scenario is classic for adolescent/young adult onset of psychotic illness.\n\n**Why \"Reality Testing\" is Most Important:**\n- **Definition:** Reality testing is the ability to distinguish between internally generated experiences (thoughts, feelings) and external reality. Its impairment is the **fundamental deficit in psychosis**.\n- **Assessment:** This involves evaluating for the presence of **hallucinations** (false sensory perceptions) and **delusions** (fixed false beliefs). The patient's belief about Facebook messages directly tests this—does he recognize this as a product of his own mind, or does he firmly believe it is real?\n- **Diagnostic Priority:** Establishing impaired reality testing is crucial for diagnosing psychotic disorders (DSM-5/ICD-11). It differentiates psychosis from mood disorders with psychotic features (where mood symptoms are primary) or other conditions like personality disorders.\n\n### ❌ Why the Other Options Are Wrong\n\n- **a. Self-esteem**: While low self-esteem can be associated with many psychiatric conditions (e.g., depression), it is not the core, defining feature of a psychotic disorder. Assessing it does not directly address the most salient pathology (loss of contact with reality).\n\n- **b. Insight**: Insight (the patient's awareness of having an illness) is **very important prognostically and for treatment adherence**, but it is often impaired in acute psychosis. You must first establish *what* the illness is (psychosis, via reality testing) before assessing the patient's insight *into* that illness.\n\n- **c. Mood**: Mood (affect) should always be assessed. However, the presentation is dominated by psychotic symptoms (odd beliefs, withdrawal) rather than clear depressive or manic symptoms. While mood disorders can have psychotic features, the primary task here is to confirm the presence of psychosis itself.\n\n- **d. Judgment**: Judgment refers to the ability to make sound decisions. It can be impaired in psychosis, but this is a **secondary consequence** of impaired reality testing and disorganized thinking. If a patient believes Facebook is sending them secret messages, their subsequent actions (discarding laptop, social withdrawal) represent poor judgment stemming from the primary delusion.\n\n### 📚 Relevant Guidelines\n\n- **[RANZCP Clinical Practice Guidelines for the Management of Schizophrenia and Related Disorders]**: Provide a framework for the assessment and diagnosis of psychotic disorders, emphasizing the evaluation of core symptoms like delusions and hallucinations (impaired reality testing). — https://www.ranzcp.org/clinical-guidelines-and-resources/clinical-practice-guidelines-schizophrenia\n\n- **[NICE Guidelines CG178: Psychosis and Schizophrenia in Adults]**: Recommend a comprehensive assessment including mental state examination, with specific attention to psychotic symptoms. — https://www.nice.org.uk/guidance/cg178\n\n- **[Headspace Clinical Guidelines: Early Psychosis]**: Australian youth mental health guidelines that highlight the assessment of reality testing in young people presenting with possible first-episode psychosis. — https://headspace.org.au/health-professionals/clinical-tools-and-resources/", "image_path": ""}, {"id": 34418, "date": "2026-02-04T10:44:02+00:00", "stem": "A post-op appendectomy patient on day 7 develops diarrhea, right-sided abdominal pain, normal temperature. Likely diagnosis?", "options": "(a) Pelvic abscess\n(b) Wound dehiscence\n(c) Clostridioides difficile colitis\n(d) Small bowel obstruction\n(e) Urinary tract infection", "answer": "(c) Clostridioides difficile colitis", "explanation": "### ✅ Correct Answer: (c) Clostridioides difficile colitis\n\n**Clinical Reasoning:**\nThis is a classic presentation of **antibiotic-associated diarrhea**, specifically *Clostridioides difficile* infection (CDI), following abdominal surgery.\n\n1. **Timeline:** Post-operative day 7 is a typical window for CDI to manifest. Symptoms often begin 5-10 days after antibiotic initiation, but can occur even after antibiotics have been stopped.\n2. **Risk Factors:** Appendectomy (especially if perforated or complicated) frequently involves perioperative broad-spectrum antibiotics (e.g., cephalosporins, metronidazole), which disrupt the normal colonic flora and allow *C. difficile* overgrowth.\n3. **Symptoms:**\n   - **Diarrhea:** The hallmark symptom. Can range from mild to severe, watery, and frequent.\n   - **Abdominal Pain:** Often crampy and can be localized; \"right-sided\" pain may reflect cecal/ascending colon involvement or be non-specific.\n   - **Normal Temperature:** A key differentiator. CDI can present **without fever**, especially in early or mild cases. The absence of fever makes a septic focus like an abscess less likely.\n4. **Pathophysiology:** Antibiotics kill commensal gut bacteria → *C. difficile* spores germinate → produce toxins (A & B) → cause inflammatory diarrhea and colitis.\n\n### ❌ Why the Other Options Are Wrong\n\n- **(a) Pelvic abscess**: A common complication after appendectomy (especially if perforated). However, it typically presents with **fever, leukocytosis, and often a palpable mass on rectal exam**. Diarrhea is not a typical feature. The patient's normal temperature and primary symptom of diarrhea argue against this.\n\n- **(b) Wound dehiscence**: This involves the separation of surgical wound layers. It presents with **wound pain, swelling, discharge, or visible separation**. It does not cause diarrhea. Abdominal pain would be localized to the wound site, not generalized as \"right-sided abdominal pain.\"\n\n- **(d) Small bowel obstruction (SBO)**: Can occur post-operatively due to adhesions. It presents with **obstipation (no flatus/stool), nausea, vomiting, crampy abdominal pain, and distension**. **Diarrhea is not a feature of complete or high-grade SBO.** Early partial obstruction might have diarrhea, but it's less common and pain would be more colicky.\n\n- **(e) Urinary tract infection (UTI)**: Common post-operatively (especially with catheterization). Presents with **dysuria, frequency, urgency, and possibly fever**. It does not cause diarrhea or significant abdominal pain (suprapubic discomfort at most).\n\n### 📚 Relevant Guidelines\n\n- **[Therapeutic Guidelines: Antibiotic (eTG)]**: Provide Australian-specific recommendations for the diagnosis and management of *Clostridioides difficile* infection, including risk factors (recent antibiotics, hospitalization) and first-line treatment (oral vancomycin or fidaxomicin). — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etgge\n\n- **[Australian Commission on Safety and Quality in Health Care (ACSQHC) - Management of CDI]**: Provides national standards for the surveillance and management of CDI in healthcare settings. — https://www.safetyandquality.gov.au/our-work/healthcare-associated-infection/clostridioides-difficile-infection\n\n- **[IDSA/SHEA Clinical Practice Guidelines for Clostridioides difficile Infection]**: International guidelines detailing epidemiology, clinical presentation, and treatment. Confirm that diarrhea is the cardinal symptom, often with abdominal pain/cramping. — https://www.idsociety.org/practice-guideline/clostridioides-difficile/", "image_path": ""}, {"id": 34434, "date": "2026-02-04T13:40:28+00:00", "stem": "A 65-year-old man presents with a 2-day history of severe headache, nausea, vomiting, and unsteady gait. On examination, he has nystagmus, dysmetria, and a wide-based ataxic gait. Non-contrast CT head shows a hyperdense lesion in the right cerebellar hemisphere with surrounding edema. What is the most likely diagnosis?", "options": "A. Cerebellar infarction\nB. Cerebellar hemorrhage\nC. Cerebellar tumor\nD. Multiple sclerosis plaque\nE. Cerebellar abscess", "answer": "B. Cerebellar hemorrhage", "explanation": "### ✅ Correct Answer: B. Cerebellar hemorrhage\n\nThe patient presents with acute onset (2-day history) of cerebellar syndrome symptoms (headache, nausea, vomiting, unsteady gait) with signs of cerebellar dysfunction (nystagmus, dysmetria, ataxic gait). The non-contrast CT head showing a **hyperdense lesion** in the cerebellar hemisphere is the key finding. On CT, acute blood appears hyperdense (bright white) compared to brain tissue. Cerebellar hemorrhage typically presents with:\n- **Sudden onset** of symptoms (vs. tumor which is gradual)\n- **Severe headache, nausea, vomiting** (due to increased intracranial pressure)\n- **Cerebellar signs** (ataxia, dysmetria, nystagmus)\n- **Risk factors**: Hypertension (most common), anticoagulation, vascular malformations\n\nManagement is urgent: ABCs, neuroimaging (CT is first-line for hemorrhage), neurosurgical consultation for possible evacuation if there's mass effect or brainstem compression, and BP control.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Cerebellar infarction**: On non-contrast CT, acute ischemic stroke typically appears as a hypodense (dark) area, not hyperdense. The hyperdensity indicates blood.\n- **C. Cerebellar tumor**: Tumors usually have a more insidious onset (weeks to months) and may show enhancement with contrast. On non-contrast CT, they are typically isodense or hypodense, not acutely hyperdense like blood.\n- **D. Multiple sclerosis plaque**: MS plaques are best seen on MRI, not CT. They are not hyperdense on CT and usually present with relapsing-remitting neurological symptoms, not acute severe headache and vomiting.\n- **E. Cerebellar abscess**: Abscesses often have a subacute presentation with fever and signs of infection. On CT, they appear as hypodense lesions with ring enhancement post-contrast, not homogeneous hyperdensity.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation (Australia) Clinical Guidelines for Stroke Management**: Provides guidance on diagnosis and management of intracerebral hemorrhage including cerebellar hemorrhage — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **eTG (Therapeutic Guidelines) Neurology**: Covers management of spontaneous intracerebral hemorrhage — https://tgldcdp.tg.org.au/etgaccess\n- **UpToDate: Spontaneous intracerebral hemorrhage: Pathogenesis, clinical features, and diagnosis**: Detailed review of cerebellar hemorrhage presentation and imaging findings — https://www.uptodate.com/contents/spontaneous-intracerebral-hemorrhage-pathogenesis-clinical-features-and-diagnosis", "image_path": "photo_2026-02-04_13-40-28.jpg"}, {"id": 34435, "date": "2026-02-04T13:40:28+00:00", "stem": "A 12-year-old girl presents with recurrent episodes of abdominal pain for 3 months. The pain is periumbilical, occurs at least once per week, and is not related to meals or bowel movements. She has no weight loss, fever, or bloody stools. Physical examination is normal. What is the most likely diagnosis?", "options": "A. Inflammatory bowel disease\nB. Peptic ulcer disease\nC. Lactose intolerance\nD. Functional abdominal pain\nE. Appendicitis", "answer": "D. Functional abdominal pain", "explanation": "### ✅ Correct Answer: D. Functional abdominal pain\n\nThis presentation is classic for **functional abdominal pain (FAP)** in children, specifically fitting the Rome IV criteria for Functional Abdominal Pain - Not Otherwise Specified. Key features:\n- **Chronic pain** (>2 months duration)\n- **Periumbilical location** (typical for functional pain)\n- **No organic red flags**: No weight loss, fever, bloody stools, or abnormal physical exam\n- **No temporal relationship** to meals or bowel movements (suggests non-GI cause)\n- **Normal examination**\n- **Age-appropriate**: Common in school-aged children and adolescents\n\nManagement involves reassurance, identifying triggers (stress, school), dietary modifications if needed, and cognitive-behavioral approaches. Pharmacological treatment is rarely needed.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Inflammatory bowel disease**: Typically presents with weight loss, diarrhea (often bloody), fever, extraintestinal manifestations, and growth failure in children. The absence of these red flags makes IBD unlikely.\n- **B. Peptic ulcer disease**: Uncommon in children without specific risk factors (NSAIDs, H. pylori). Pain is usually epigastric, related to meals (relieved by food in duodenal ulcers, worsened in gastric ulcers).\n- **C. Lactose intolerance**: Pain is typically crampy, associated with bloating, flatulence, and diarrhea, and occurs after consuming dairy products. The lack of temporal relationship to meals makes this less likely.\n- **E. Appendicitis**: Presents as acute, not chronic pain. Pain typically starts periumbilical then migrates to RLQ, with associated fever, anorexia, nausea/vomiting, and tenderness on exam.\n\n### 📚 Relevant Guidelines\n- **RACGP: Recurrent abdominal pain in children**: Provides diagnostic approach and management for functional abdominal pain — https://www.racgp.org.au/afp/2013/december/recurrent-abdominal-pain-in-children\n- **Rome IV Criteria: Functional Gastrointestinal Disorders**: Diagnostic criteria for functional abdominal pain disorders in children — https://theromefoundation.org/rome-iv/rome-iv-criteria/\n- **Royal Children's Hospital Melbourne Clinical Practice Guidelines: Abdominal pain**: Algorithm for assessment and management of abdominal pain in children — https://www.rch.org.au/clinicalguide/guideline_index/Abdominal_pain/", "image_path": ""}, {"id": 34436, "date": "2026-02-04T13:40:34+00:00", "stem": "A 45-year-old woman presents with a 6-month history of intermittent palpitations, anxiety, heat intolerance, and weight loss despite increased appetite. On examination, she has a fine tremor, tachycardia, and a diffusely enlarged thyroid gland. What is the most appropriate initial diagnostic test?", "options": "A. Thyroid ultrasound\nB. Radioactive iodine uptake scan\nC. Serum TSH and free T4\nD. Thyroid peroxidase antibodies\nE. Fine needle aspiration biopsy", "answer": "C. Serum TSH and free T4", "explanation": "### ✅ Correct Answer: C. Serum TSH and free T4\n\nThe clinical presentation is classic for **hyperthyroidism**: palpitations, anxiety, heat intolerance, weight loss with increased appetite, tremor, tachycardia, and goiter. According to diagnostic algorithms for suspected thyroid dysfunction:\n1. **First-line test**: Serum TSH (thyroid-stimulating hormone) - sensitive and specific for primary thyroid disorders\n2. **If TSH is suppressed** (low): Measure free T4 (thyroxine) and free T3 (triiodothyronine) to confirm hyperthyroidism and assess severity\n3. **Only after biochemical confirmation** should further tests (like thyroid antibodies or imaging) be considered to determine the etiology (Graves' disease, toxic nodule, thyroiditis)\n\nTSH is the most sensitive screening test because it responds inversely to thyroid hormone levels (low TSH in hyperthyroidism).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Thyroid ultrasound**: Useful for evaluating thyroid morphology (nodules, size) but not for diagnosing hyperthyroidism. It's indicated after biochemical confirmation to assess for nodules or guide FNA.\n- **B. Radioactive iodine uptake scan**: Helps determine etiology of hyperthyroidism (diffuse uptake in Graves' vs. focal in toxic nodule) but is not first-line. It requires prior biochemical confirmation and is contraindicated in pregnancy.\n- **D. Thyroid peroxidase antibodies**: Support autoimmune etiology (Graves' disease or Hashimoto's) but are not diagnostic of hyperthyroidism. Many patients with Graves' have positive TPO antibodies, but the diagnosis is primarily biochemical.\n- **E. Fine needle aspiration biopsy**: Used to evaluate thyroid nodules for malignancy, not for diagnosing hyperthyroidism. It's indicated for suspicious nodules >1cm found on ultrasound.\n\n### 📚 Relevant Guidelines\n- **RACGP: Thyroid disease assessment and management**: Provides algorithm for investigating suspected thyroid dysfunction — https://www.racgp.org.au/afp/2017/june/assessment-of-thyroid-function-in-adults\n- **Therapeutic Guidelines (eTG): Endocrinology - Thyroid disorders**: Diagnostic approach to hyperthyroidism — https://tgldcdp.tg.org.au/etgaccess\n- **American Thyroid Association Guidelines for Diagnosis and Management of Hyperthyroidism**: Evidence-based recommendations for diagnostic testing — https://www.thyroid.org/professionals/ata-professional-guidelines/", "image_path": ""}, {"id": 34481, "date": "2026-02-05T22:25:56+00:00", "stem": "A patient presents with episodic palpitations and hyperventilation. A resting ECG is normal, and the heart rhythm is regular. What is the **most appropriate next investigation**?", "options": "a. Troponin levels\nb. Echocardiography\nc. Chest X-ray\nd. Exercise stress test\ne. Ambulatory ECG", "answer": "e", "explanation": "### ✅ Correct Answer: e. Ambulatory ECG\n\n**Clinical Reasoning:**\nThe patient presents with **episodic palpitations** and **hyperventilation**. A resting ECG is normal and the heart is regular during the exam. This history strongly suggests **paroxysmal arrhythmia** (e.g., supraventricular tachycardia, atrial fibrillation, atrial flutter) or possibly an anxiety-related sinus tachycardia. The key diagnostic challenge is **capturing the heart rhythm during symptoms**.\n\n- **Ambulatory ECG** (Holter monitor for 24-48 hours or an event recorder for longer periods) is the gold standard initial investigation for episodic palpitations when the resting ECG is normal. It allows for continuous ECG monitoring during daily activities to correlate symptoms with heart rhythm.\n- **Hyperventilation** can be a symptom of an arrhythmia (due to anxiety/autonomic response) or a primary anxiety/panic disorder. Capturing the rhythm during an episode is crucial to differentiate cardiac from non-cardiac causes.\n- The **normal resting ECG** rules out persistent arrhythmias or obvious conduction abnormalities but does not exclude paroxysmal ones.\n\n**Management Pearls for AMC:**\n1. First-line investigation for palpitations: **Resting ECG** (already done and normal).\n2. If ECG is normal and symptoms are episodic → **Ambulatory ECG**.\n3. If symptoms are less frequent (e.g., once a week), consider a **patient-activated event recorder**.\n4. Echocardiography is indicated if there is suspicion of structural heart disease (e.g., murmur, heart failure symptoms, abnormal ECG) but not as first-line for isolated episodic palpitations with normal exam/ECG.\n\n### ❌ Why the Other Options Are Wrong\n\n- **a. Troponin levels**: Troponin is a biomarker of myocardial injury. It is indicated in the evaluation of **acute coronary syndromes** (chest pain, ischemic ECG changes) or myocarditis, not for isolated episodic palpitations with a normal resting ECG and no chest pain. It has no role in diagnosing arrhythmias.\n- **b. Echocardiography**: Echocardiography assesses **cardiac structure and function** (valves, chambers, ejection fraction). It is indicated if there is clinical suspicion of structural heart disease (e.g., murmur, heart failure, abnormal ECG). In this case with normal exam and ECG, it is not the most appropriate *next* test.\n- **c. Chest X-ray**: Chest X-ray evaluates lung fields, mediastinum, and cardiac silhouette size. It is low yield for palpitations unless there are associated symptoms like chest pain, dyspnea, or signs of heart failure (which are not mentioned).\n- **d. Exercise stress test**: Stress testing is primarily used to evaluate for **coronary artery disease** (exercise-induced ischemia) or to provoke **exertional arrhythmias**. The patient's symptoms are described as \"episodic\" but not specifically **exertional**. Therefore, ambulatory monitoring is more appropriate as a first step to characterize the rhythm during spontaneous symptoms.\n\n### 📚 Relevant Guidelines\n\n- **[National Institute for Health and Care Excellence (NICE) - Palpitations in adults: assessment and diagnosis]**: Provides an algorithm for investigating palpitations, recommending ambulatory ECG as the next step after a normal resting ECG in patients with episodic symptoms. — https://www.nice.org.uk/guidance/cg109\n- **[American Heart Association/American College of Cardiology/Heart Rhythm Society (AHA/ACC/HRS) Guideline for the Management of Patients With Atrial Fibrillation]**: Although focused on AF, it discusses the diagnostic workup for palpitations and the role of ambulatory monitoring. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000665\n- **[UpToDate - Approach to the patient with palpitations]**: A comprehensive, evidence-based review detailing the diagnostic evaluation, emphasizing ambulatory ECG monitoring for episodic symptoms. — https://www.uptodate.com/contents/approach-to-the-patient-with-palpitations", "image_path": ""}, {"id": 34492, "date": "2026-02-06T05:19:37+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E. Neurocysticercosis", "explanation": "### ✅ Correct Answer: E. Neurocysticercosis\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** An 18-year-old with new-onset generalized tonic-clonic seizures and confusion. This is the most common presentation of neurocysticercosis (NCC), accounting for up to 70% of cases in endemic areas.\n2.  **Pathophysiology:** NCC is caused by the larval stage (cysticerci) of the pork tapeworm, *Taenia solium*. Humans become accidental intermediate hosts by ingesting eggs from contaminated food/water or via fecal-oral transmission. The larvae disseminate via the bloodstream and can encyst in various tissues, most notably the brain parenchyma, subarachnoid space, and ventricles.\n3.  **Imaging Findings:** The description of \"numerous well-defined cystic lesions throughout the cerebral cortex\" is classic for the vesicular (active) stage of parenchymal NCC. These cysts are typically 5-20 mm in size and may contain a visible scolex (\"dot-in-hole\" sign on MRI).\n4.  **Supporting Clinical Clues:** The extra-neurological findings of eye swelling and testicular tenderness suggest disseminated cysticercosis, where cysts have also lodged in the orbit and testes. This systemic involvement strongly supports a parasitic etiology like NCC over other focal neurological conditions.\n5.  **Epidemiology:** While the patient's age and location aren't specified, NCC is a leading cause of acquired epilepsy worldwide, particularly in developing regions and among immigrants from endemic areas (Latin America, sub-Saharan Africa, parts of Asia).\n\n### ❌ Why the Other Options Are Wrong\n\n- **A. Cerebral metastases:** Metastases can present with seizures and multiple brain lesions. However, they are exceedingly rare in an otherwise healthy 18-year-old without a known primary cancer. Metastatic lesions are typically ring-enhancing or solid, not classic \"well-defined cysts,\" and would not explain the concurrent eye and testicular findings.\n- **B. Progressive multifocal leukoencephalopathy (PML):** PML is a demyelinating disease caused by JC virus reactivation, almost exclusively in severely immunocompromised patients (e.g., advanced HIV/AIDS, immunosuppressive therapy). It presents with progressive neurological deficits (e.g., weakness, vision loss, cognitive decline) rather than acute seizures. MRI shows asymmetric, confluent white matter lesions without mass effect, not discrete cortical cysts.\n- **C. Cerebral vasculitis:** CNS vasculitis can cause seizures and multifocal brain lesions due to inflammation and ischemia. However, lesions are typically infarcts in specific vascular territories, not well-defined cysts. It is often associated with systemic symptoms (fever, rash, arthralgia) or markers of inflammation (elevated ESR/CRP), which are absent here. The eye and testicular findings are not typical.\n- **D. Neurosyphilis:** In its late stages, neurosyphilis can cause seizures (from gummas or general paresis). However, gummas are rare, solitary, enhancing mass lesions, not multiple cysts. The classic presentation includes psychiatric symptoms, Argyll Robertson pupils, and tabes dorsalis, none of which are described. The acute presentation and extra-neurological signs do not fit.\n\n### 📚 Relevant Guidelines\n\n- **[World Health Organization (WHO) - Guidelines for the diagnosis and treatment of neurocysticercosis]**: Provides comprehensive guidance on diagnostic criteria (including imaging and serology), staging, and medical/surgical management. — https://www.who.int/publications/i/item/9789241550340\n- **[Therapeutic Guidelines (eTG) - Neurology]**: Australian resource with specific recommendations for the diagnosis and treatment of neurocysticercosis, including the use of albendazole, praziquantel, and corticosteroids. — https://tgldcdp.tg.org.au/viewTopic?topicfile=neurological-infections#toc_d1e329\n- **[Centers for Disease Control and Prevention (CDC) - Parasites - Cysticercosis]**: Detailed information on the life cycle, epidemiology, clinical features, and laboratory diagnosis of cysticercosis. — https://www.cdc.gov/parasites/cysticercosis/index.html", "image_path": "photo_2026-02-06_05-19-37.jpg"}, {"id": 34493, "date": "2026-02-06T05:20:57+00:00", "stem": "A one-day-old boy is reviewed on the maternity ward with his parents. He was born at term via spontaneous vaginal delivery. He has no significant medical history and takes no regular medications. His parents express concern about the appearance of their child's face. On examination, he appears well with vital signs within normal limits. There is a distinct abnormality in the upper lip, characterised by a separation extending from the midline to the base of the nose on the left side. The defect appears to involve only the upper lip and does not extend to the palate.\n\nWhich one of the following is the most likely cause of this condition?", "options": "Maternal alcohol use\nMaternal cytomegalovirus infection\nMaternal folate deficiency\nMaternal cocaine use\nMaternal diabetes", "answer": "Maternal folate deficiency", "explanation": "### ✅ Correct Answer: Maternal folate deficiency\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The description is classic for a **unilateral cleft lip without cleft palate**. This is one of the most common congenital anomalies.\n2.  **Aetiology and Pathogenesis:** Cleft lip (with or without cleft palate) is a multifactorial birth defect involving genetic predisposition and environmental factors. A key modifiable environmental factor is **maternal folate status** during the periconceptional period (from before conception through the first trimester). Folate is crucial for DNA synthesis and methylation, processes vital for the rapid cell division and fusion of the facial prominences (medial nasal, lateral nasal, and maxillary) that occurs between weeks 4 and 7 of gestation. Deficiency disrupts this fusion, leading to orofacial clefts.\n3.  **Evidence:** Strong epidemiological evidence shows that **periconceptional folic acid supplementation (400-800 mcg/day) reduces the risk of cleft lip and palate by approximately 25-50%.** This is why folate supplementation is a cornerstone of prenatal care worldwide.\n4.  **Why This Option Over Others:** While other teratogens can cause facial anomalies, the isolated cleft lip is most specifically and strongly linked to folate deficiency. The baby is otherwise well, arguing against a major syndromic or infectious cause.\n\n### ❌ Why the Other Options Are Wrong\n\n- **Maternal alcohol use:** Alcohol is a potent teratogen causing Fetal Alcohol Spectrum Disorder (FASD). Characteristic features include microcephaly, smooth philtrum, thin vermilion border, short palpebral fissures, and neurodevelopmental impairment. While facial dysmorphism occurs, a classic isolated cleft lip is not a hallmark of FASD.\n- **Maternal cytomegalovirus (CMV) infection:** Congenital CMV can cause microcephaly, intracranial calcifications, sensorineural hearing loss, chorioretinitis, and hepatosplenomegaly. It is not a recognized cause of isolated cleft lip.\n- **Maternal cocaine use:** Cocaine use in pregnancy is associated with placental abruption, preterm birth, intrauterine growth restriction, and neurobehavioral issues in the newborn. It can cause vascular disruption anomalies, but specific craniofacial defects like cleft lip are not consistently or strongly linked to cocaine exposure.\n- **Maternal diabetes:** Poorly controlled pre-gestational diabetes (not gestational diabetes) is a significant teratogen, increasing the risk of congenital malformations 2-5 fold. The classic anomalies are **caudal regression syndrome, congenital heart defects (e.g., transposition), neural tube defects, and sacral agenesis.** Orofacial clefts are increased in diabetic embryopathy but are less specific and common than the defects listed above. Given the options, folate deficiency is the most direct and evidence-based answer.\n\n### 📚 Relevant Guidelines\n\n- **[The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Pre-pregnancy Counselling]**: Recommends folic acid supplementation (at least 400 mcg/day) for all women planning pregnancy, starting at least one month before conception, to prevent neural tube defects and other anomalies including orofacial clefts. — https://ranzcog.edu.au/womens-health/patient-information-resources/pre-pregnancy-counselling\n- **[Therapeutic Guidelines (eTG) - Pregnancy]**: Outlines the recommendation for folic acid supplementation (0.5 mg daily) for all women planning pregnancy or in the first trimester, with a higher dose (5 mg daily) for those at increased risk. — https://tgldcdp.tg.org.au/viewTopic?topicfile=pregnancy-breastfeeding&guidelineName=Women%27s%20Health#toc_d1e138\n- **[World Health Organization (WHO) - Guideline: Daily iron and folic acid supplementation in pregnant women]**: Provides global recommendations for folic acid supplementation to improve maternal and neonatal outcomes, including the prevention of birth defects. — https://www.who.int/publications/i/item/9789241501996", "image_path": ""}, {"id": 34576, "date": "2026-02-14T12:52:13+00:00", "stem": "A 45-year-old man presents with a 2-day history of fever, productive cough with green sputum, and pleuritic chest pain. On examination, he has crackles in the right lower zone. Chest X-ray confirms right lower lobe consolidation. He has no significant comorbidities and has not taken antibiotics in the last 3 months. What is the most appropriate initial antibiotic management?", "options": "A. Amoxicillin 1g TDS orally\nB. Doxycycline 100mg BD orally\nC. Benzylpenicillin IV + Azithromycin orally\nD. Amoxicillin-clavulanate 875/125mg BD orally + Azithromycin orally\nE. Ceftriaxone IV + Azithromycin IV", "answer": "D. Amoxicillin-clavulanate 875/125mg BD orally + Azithromycin orally", "explanation": "### ✅ Correct Answer: D. Amoxicillin-clavulanate 875/125mg BD orally + Azithromycin orally\n\nThis patient has moderate-severe community-acquired pneumonia (CAP) requiring hospital assessment. The Therapeutic Guidelines (Australia) recommend dual therapy with amoxicillin-clavulanate (to cover typical bacteria including S. pneumoniae, H. influenzae, and M. catarrhalis, accounting for beta-lactamase production) PLUS a macrolide (azithromycin) to cover atypical pathogens (Mycoplasma, Chlamydia, Legionella). This combination provides broad-spectrum coverage for both typical and atypical organisms in moderate CAP. The patient's presentation with fever, productive cough, pleuritic pain, and focal signs warrants this empiric therapy while awaiting sputum culture results.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Amoxicillin 1g TDS orally**: While amoxicillin monotherapy is appropriate for mild CAP in primary care, this patient's symptoms suggest moderate severity. Amoxicillin alone does not cover atypical pathogens (Mycoplasma, Legionella) or beta-lactamase producing H. influenzae.\n- **B. Doxycycline 100mg BD orally**: Doxycycline monotherapy is an alternative for mild CAP in penicillin-allergic patients but provides inadequate coverage for moderate-severe CAP. It lacks the broad spectrum needed for hospitalized patients with more severe disease.\n- **C. Benzylpenicillin IV + Azithromycin orally**: Benzylpenicillin has narrow spectrum (mainly covers S. pneumoniae) and does not cover Gram-negative organisms like H. influenzae or beta-lactamase producers. This combination would be inadequate for moderate-severe CAP.\n- **E. Ceftriaxone IV + Azithromycin IV**: This is appropriate for severe CAP requiring ICU admission or patients with risk factors for Pseudomonas or MRSA. This patient has no comorbidities and moderate severity, making oral therapy with amoxicillin-clavulanate + azithromycin sufficient.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Community-acquired pneumonia**: Provides Australian-specific recommendations for CAP management including severity assessment and antibiotic selection — https://tgldcdp.tg.org.au/viewTopic?topicfile=community-acquired-pneumonia\n- **RACGP - Management of community-acquired pneumonia**: Primary care guidelines for diagnosis and management of CAP in Australian practice — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/management-of-community-acquired-pneumonia\n- **Choosing Wisely Australia - Antibiotics for respiratory infections**: Recommendations to avoid unnecessary antibiotic use in viral respiratory infections — https://www.choosingwisely.org.au/recommendations/racgp", "image_path": ""}, {"id": 34594, "date": "2026-02-17T12:56:49+00:00", "stem": "A 40-year-old man with ankylosing spondylitis, who has been in long-term remission on methotrexate (MTX) and ibuprofen, seeks advice as he is about to get married and plans to start a family. What is the most appropriate medication advice?", "options": "A. Discontinue both MTX and ibuprofen\nB. Discontinue MTX but continue ibuprofen\nC. Continue both medications unchanged\nD. Discontinue ibuprofen but continue MTX\nE. Switch to alternative disease-modifying therapy", "answer": "E. Switch to alternative disease-modifying therapy", "explanation": "### ✅ Correct Answer: E. Switch to alternative disease-modifying therapy\n\n**Clinical Reasoning:**\n1. **Methotrexate (MTX) in Pregnancy Planning:** MTX is a known teratogen (Category D in Australia) and is absolutely contraindicated in both men and women planning conception. In men, MTX can cause oligospermia and chromosomal damage to sperm, leading to potential fetal abnormalities. Current guidelines recommend discontinuing MTX at least 3 months before planned conception in both males and females.\n2. **Ibuprofen and Fertility:** NSAIDs like ibuprofen can reversibly inhibit ovulation in females and may impair implantation. In males, chronic NSAID use has been associated with reduced semen quality and reversible infertility. For optimal fertility, discontinuation is advised during the conception period.\n3. **Ankylosing Spondylitis Management:** The patient is in remission, so disease control must be maintained. Simply stopping both medications (Option A) risks disease flare. Continuing MTX (Options C & D) is unsafe. The correct approach is to switch to a pregnancy-compatible DMARD.\n4. **Alternative Therapies:** Sulfasalazine is considered safe in males planning conception and is a first-line alternative. Biologics like TNF-α inhibitors (e.g., adalimumab, etanercept) are also considered relatively safe in males, though data is more limited. A rheumatology consultation is essential for selecting the safest alternative.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Discontinue both MTX and ibuprofen**: While discontinuing MTX is correct, stopping all treatment without a replacement plan risks a disease flare of ankylosing spondylitis, which could cause significant pain, stiffness, and functional decline. Active disease itself can also negatively impact fertility and pregnancy outcomes.\n- **B. Discontinue MTX but continue ibuprofen**: Discontinuing MTX is correct, but continuing ibuprofen is suboptimal. Chronic NSAID use can impair fertility in both partners. For the best chance of conception, NSAIDs should be paused or used minimally.\n- **C. Continue both medications unchanged**: This is dangerous. Continuing methotrexate is a clear teratogenic risk for the future pregnancy. It violates standard pre-conception care guidelines.\n- **D. Discontinue ibuprofen but continue MTX**: This addresses the lesser risk (NSAID) while retaining the major teratogen (MTX). MTX poses a far greater risk to fetal development and must be discontinued first and foremost.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines Australia (eTG) – Rheumatology]**: Provides specific recommendations on the use of DMARDs and biologics in pregnancy and pre-conception planning, including the need to cease methotrexate well in advance. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Rheumatology&frompage=etggep\n- **[Royal Australian College of General Practitioners (RACGP) – Pre-conception care]**: Outlines the importance of medication review and switching to safer alternatives for both partners before pregnancy. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice\n- **[Australian Rheumatology Association]**: Has position statements and resources on the management of inflammatory arthritis during pregnancy and pre-conception, emphasizing the switch from methotrexate to compatible agents like sulfasalazine. — https://rheumatology.org.au/", "image_path": ""}, {"id": 34615, "date": "2026-02-18T12:09:08+00:00", "stem": "A 45-year-old man presents with a 3-month history of hypertension that is difficult to control despite three antihypertensive medications. He has no significant past medical history. On examination, a systolic bruit is heard over the left flank. Renal ultrasound shows asymmetry in kidney size. What is the most likely diagnosis?", "options": "A. Pheochromocytoma\nB. Primary hyperaldosteronism\nC. Renal artery stenosis\nD. Coarctation of the aorta\nE. Cushing syndrome", "answer": "C", "explanation": "### ✅ Correct Answer: C. Renal artery stenosis\n\nThe clinical picture is classic for atherosclerotic renal artery stenosis (RAS), which is a common cause of secondary hypertension in adults. The step-by-step reasoning is:\n\n1.  **Presentation**: The patient has **resistant hypertension** (defined as uncontrolled blood pressure despite three antihypertensive agents, including a diuretic). This immediately raises suspicion for a secondary cause.\n2.  **Key Physical Exam Finding**: A **systolic bruit over the flank** is a highly specific (though not highly sensitive) sign for turbulent blood flow through a stenotic renal artery.\n3.  **Key Imaging Finding**: **Asymmetry in kidney size** on ultrasound (typically a >1.5 cm difference in length) is a hallmark of chronic, hemodynamically significant RAS. The ischemic kidney undergoes atrophy due to reduced perfusion.\n4.  **Pathophysiology**: Atherosclerotic plaque (most common in patients >50) or fibromuscular dysplasia (more common in younger women) narrows the renal artery lumen. This reduces perfusion pressure to the kidney, activating the **renin-angiotensin-aldosterone system (RAAS)**. This leads to angiotensin II-mediated vasoconstriction and aldosterone-mediated sodium/water retention, driving hypertension.\n5.  **Diagnostic Pathway**: The next best test after a suggestive ultrasound and clinical picture is a **CT renal angiogram** or **MR angiogram** to directly visualize the stenosis. Catheter-based angiography remains the gold standard, often combined with revascularization.\n6.  **Management**: Treatment involves optimal medical therapy (ACE inhibitors/ARBs are first-line but require careful monitoring for acute kidney injury) and consideration of **percutaneous transluminal renal angioplasty with stenting** for selected patients with hemodynamically significant stenosis and uncontrolled hypertension.\n\n### ❌ Why the Other Options Are Wrong\n\n-   **A. Pheochromocytoma**: Presents with **paroxysmal** hypertension accompanied by the classic triad of headache, palpitations, and diaphoresis. It is caused by a catecholamine-secreting tumor. Flank bruit and renal size asymmetry are not features. Diagnosis is via plasma/urinary metanephrines.\n-   **B. Primary hyperaldosteronism (Conn's syndrome)**: A common cause of secondary hypertension, characterized by hypertension with **hypokalemia** (muscle weakness, cramps) and metabolic alkalosis. It is due to autonomous aldosterone secretion (e.g., from an adrenal adenoma). Flank bruit and renal asymmetry are absent. Screening involves a raised aldosterone-to-renin ratio.\n-   **D. Coarctation of the aorta**: Typically presents in younger individuals. Hypertension is noted in the upper extremities with **diminished or delayed femoral pulses** and lower blood pressure in the legs. A systolic murmur may be heard over the back, but a flank bruit and renal size asymmetry are not typical.\n-   **E. Cushing syndrome**: Presents with hypertension plus characteristic **centripetal obesity, moon face, buffalo hump, purple striae, and hyperglycemia**. It is due to glucocorticoid excess. Flank bruit and renal asymmetry are not part of the presentation.\n\n### 📚 Relevant Guidelines\n\n-   **Therapeutic Guidelines: Cardiovascular (eTG)**: Provides Australian recommendations for the diagnosis and management of hypertension, including investigation for secondary causes like renal artery stenosis. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hypertension-in-adults\n-   **Kidney Health Australia - Caring for Australasians with Renal Impairance (KHA-CARI)**: Offers guidelines on the diagnosis and management of renovascular disease. — https://www.cari.org.au/\n-   **American Heart Association (AHA) Scientific Statement on Renal Artery Stenosis**: A comprehensive review of the diagnosis, management, and evidence for intervention in atherosclerotic renal artery stenosis. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000837", "image_path": ""}, {"id": 34628, "date": "2026-02-19T09:09:28+00:00", "stem": "A 68-year-old woman on warfarin presents after a minor fall. She is fully conscious (GCS 15). No vomiting. No headache. Normal exam. What is the most appropriate next step?", "options": "A) Discharge\nB) CT brain\nC) Observe for 4 hours\nD) Reassure only", "answer": "B) CT brain", "explanation": "### ✅ Correct Answer: B) CT brain\n\n**Clinical Reasoning:**\n- **Patient Profile:** 68-year-old on warfarin (anticoagulant).\n- **Mechanism:** Minor fall (even without significant symptoms) in an anticoagulated patient is a major red flag for intracranial bleeding.\n- **Pathophysiology:** Warfarin inhibits vitamin K-dependent clotting factors (II, VII, IX, X), increasing the risk of spontaneous and traumatic intracranial hemorrhage (subdural, epidural, intraparenchymal).\n- **Key Point:** Patients on anticoagulants can have significant intracranial bleeding with minimal or no initial symptoms (\"talk and die\" phenomenon). A normal Glasgow Coma Scale (GCS) and absence of headache/vomiting do NOT rule out a bleed.\n- **Guideline-Based Management:** Immediate non-contrast CT brain is mandatory for any head injury in anticoagulated patients, regardless of symptom presence, due to the high risk of delayed deterioration.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Discharge**: Discharging an anticoagulated patient after a head injury without imaging is unsafe and violates standard care guidelines. It misses the risk of occult intracranial hemorrhage.\n- **C) Observe for 4 hours**: Observation alone is insufficient. Intracranial bleeding can develop or expand slowly over hours to days in anticoagulated patients. Imaging is required before any period of observation.\n- **D) Reassure only**: Reassurance is inappropriate and negligent. The patient requires urgent investigation, not just reassurance.\n\n### 📚 Relevant Guidelines\n- **National Institute for Health and Care Excellence (NICE) - Head injury: assessment and early management**: Recommends immediate CT head for any head injury in patients on anticoagulant therapy, regardless of clinical findings. — https://www.nice.org.uk/guidance/cg176\n- **Therapeutic Guidelines Australia (eTG) - Head injury**: States that patients on warfarin with any head injury require urgent CT brain. — https://tgldcdp.tg.org.au/viewTopic?topicfile=head-injury#toc_d1e289\n- **Choosing Wisely Australia - Emergency Medicine**: Highlights avoiding delayed imaging in high-risk patients, including those on anticoagulants. — https://www.choosingwisely.org.au/recommendations/rama", "image_path": ""}, {"id": 34629, "date": "2026-02-19T09:10:07+00:00", "stem": "A 56-year-old poorly controlled diabetic female presents with sudden onset of binocular diplopia. She also has associated headaches. Her left eye appears to be deviated out and downwards. Pupillary examination shows mydriasis in the left eye. Which of the following investigation/examination is MOST relevant to rule out underlying cause in this case? (WHAT IS THE PROBABLE DIAGNOSIS AND THE MOST LIKELY VESSEL INVOLVED)", "options": "A. Blood pressure monitoring\nB. Cerebral angiography\nC. Hirschberg/corneal light reflection test\nD. Thyroid function tests", "answer": "B. Cerebral angiography", "explanation": "### ✅ Correct Answer: B. Cerebral angiography\n\n**Clinical Reasoning:**\n- **Probable Diagnosis:** Posterior communicating artery (PCOM) aneurysm causing a third cranial nerve (CN III) palsy.\n- **Presentation:** Sudden onset binocular diplopia, headache, left eye deviated \"out and down\" (indicating unopposed action of lateral rectus CN VI and superior oblique CN IV), with **mydriasis** (pupillary involvement).\n- **Key Feature:** A **pupil-involving** CN III palsy is a neurosurgical emergency until proven otherwise. It suggests compression of the parasympathetic pupillomotor fibers on the outer surface of the nerve, most commonly by a posterior communicating artery aneurysm.\n- **Vessel Involved:** The **posterior communicating artery** (or junction of internal carotid and PCOM) is the classic site for aneurysms causing CN III palsy.\n- **Most Relevant Investigation:** **Cerebral angiography** (CT angiography or digital subtraction angiography) is the gold s
