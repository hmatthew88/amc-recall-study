oiesis-stimulating agents or iron might be considered.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority (Australia) - Patient Blood Management Guidelines](https://www.blood.gov.au/pbm-guidelines)**: Module 2 - Perioperative, and Module 3 - Medical. These provide evidence-based recommendations on transfusion thresholds, emphasising restrictive transfusion strategies (Hb <70 g/L in stable patients, or <80 g/L in cardiac disease if symptomatic) and that active bleeding with haemodynamic instability is a key indication for transfusion.\n- **[Therapeutic Guidelines (eTG) - Anaemia and transfusion](https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia-transfusion&guidelineName=Blood%20and%20Cancer#toc_d1e137)**: Summarises indications for red cell transfusion, including acute blood loss with haemodynamic compromise, and highlights that single‑unit transfusions and reassessment are often appropriate.\n- **[Choosing Wisely Australia - Transfusion Medicine](https://www.choosingwisely.org.au/recommendations/ranzcp)**: Recommends avoiding red cell transfusion for iron deficiency anaemia without haemodynamic instability, and using restrictive transfusion thresholds.", "image_path": ""}, {"id": 34696, "date": "2026-02-21T05:46:03+00:00", "stem": "A 68‑year‑old woman with long‑standing rheumatoid arthritis presents for review. She feels more tired than usual. There is no history of overt bleeding.\n\nInvestigations:\n\n• Hb: 96 g/L (115–155)\n\n• MCV: 86 fL (80–96)\n\n• Serum iron: 6 µmol/L (10–30)\n\n• Total iron‑binding capacity (TIBC): 30 µmol/L (45–72)\n\n• Ferritin: 400 µg/L (30–300)\n\n• CRP: elevated\n\nWhat is the most likely cause of her anaemia?", "options": "A. Iron deficiency anaemia\nB. Anaemia of chronic disease\nC. Vitamin B₁₂ deficiency\nD. Autoimmune haemolytic anaemia\nE. β‑thalassaemia trait", "answer": "B", "explanation": "### ✅ Correct Answer: B. Anaemia of chronic disease\n\nThe key findings are: **normocytic anaemia** (MCV normal), **low serum iron**, **low TIBC** (indicating reduced iron availability but not true depletion), and **elevated ferritin** in the context of an **elevated CRP** and a chronic inflammatory condition (rheumatoid arthritis). This pattern is classic for anaemia of chronic disease (ACD), also called anaemia of inflammation. In ACD, inflammatory cytokines (e.g., IL-6) increase hepcidin, which blocks iron release from macrophages and reduces intestinal iron absorption, leading to functional iron deficiency. The elevated ferritin acts as an acute phase reactant, masking any underlying absolute iron deficiency. In contrast, true iron deficiency anaemia (IDA) typically shows low serum iron, **high TIBC**, and **low ferritin**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Iron deficiency anaemia**: While serum iron is low, the TIBC is also low (not high as expected in IDA), and ferritin is elevated. Ferritin is an acute phase protein; in inflammation, a 'normal' ferritin can mask iron deficiency, but a level of 400 µg/L is high and makes pure IDA very unlikely.\n- **C. Vitamin B₁₂ deficiency**: This causes macrocytic anaemia (high MCV), not normocytic anaemia. No neurological or other suggestive features are mentioned.\n- **D. Autoimmune haemolytic anaemia**: This typically presents with evidence of haemolysis (e.g., elevated bilirubin, LDH, low haptoglobin, reticulocytosis, spherocytes on film). The history and labs provided do not suggest haemolysis.\n- **E. β‑thalassaemia trait**: This usually causes microcytic, hypochromic anaemia (low MCV, often <80 fL) with a normal or elevated RBC count. The MCV is normal here, and the iron studies point to an inflammatory/functional iron problem, not a genetic haemoglobinopathy.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Anaemia](https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia&guidelineName=Blood%20and%20Cancer#toc_d1e38)**: Describes the investigation of anaemia and distinguishes between iron deficiency anaemia and anaemia of chronic disease based on iron studies, ferritin, and inflammatory markers.\n- **[UpToDate - Anaemia of chronic disease/anemia of inflammation](https://www.uptodate.com/contents/anemia-of-chronic-disease-anemia-of-inflammation)**: Details the pathophysiology (hepcidin-mediated iron sequestration), diagnostic features (low serum iron, low/normal TIBC, normal/high ferritin in setting of inflammation), and management.\n- **[RACGP - Investigating anaemia](https://www.racgp.org.au/afp/2015/januaryfebruary/investigating-anaemia)**: Provides a pragmatic approach for GPs, including interpreting iron studies in the context of inflammation and chronic disease.", "image_path": ""}, {"id": 34805, "date": "2026-02-22T21:34:02+00:00", "stem": "A patient presents with vertical diplopia that worsens when looking down and to the right, and a head tilt to the left. The most likely diagnosis is:", "options": "A. CN 3 Palsy\nB. CN 4 Palsy\nC. CN 6 Palsy\nD. Internuclear ophthalmoplegia", "answer": "B", "explanation": "### ✅ Correct Answer: B. CN 4 Palsy\n\nThe patient's symptoms are classic for a trochlear nerve (CN IV) palsy. CN IV innervates the superior oblique muscle, which primarily intorts the eye and secondarily depresses and abducts it. A palsy results in:\n1. **Vertical diplopia**: Most pronounced when looking down and to the opposite side (contralateral gaze). In this case, diplopia worsens when looking down and to the right, suggesting a left CN IV palsy (the left superior oblique is weak when trying to look down and to the right).\n2. **Head tilt**: Patients often tilt their head to the opposite shoulder (in this case, left) to compensate for the extorsion and vertical misalignment caused by the weak superior oblique. This is known as the Bielschowsky head tilt test.\n3. **Mechanism**: CN IV has the longest intracranial course and is vulnerable to trauma (common cause), microvascular ischemia, or increased intracranial pressure. It is the only cranial nerve that exits dorsally from the brainstem and crosses to the contralateral side.\n\n**Management**: Requires neuroimaging (MRI brain) to rule out structural causes, especially if not typical for microvascular ischemia (e.g., in a young patient or without vascular risk factors).\n\n### ❌ Why the Other Options Are Wrong\n- **A. CN 3 Palsy**: Presents with ptosis, mydriasis (pupil involvement), and eye deviation \"down and out\" due to paralysis of medial, superior, and inferior recti and inferior oblique. Diplopia is horizontal and vertical, not specifically worse on down-and-contralateral gaze. No characteristic head tilt.\n- **C. CN 6 Palsy**: Causes horizontal diplopia worse on ipsilateral gaze (e.g., looking to the left for a left CN VI palsy) due to weakness of the lateral rectus. There is esotropia in primary gaze, not vertical diplopia or head tilt.\n- **D. Internuclear ophthalmoplegia (INO)**: Results from a lesion in the medial longitudinal fasciculus (MLF). Key finding is impaired adduction of the ipsilateral eye with nystagmus of the abducting eye on horizontal gaze. Vertical diplopia and head tilt are not typical features.\n\n### 📚 Relevant Guidelines\n- **[UpToDate: Trochlear nerve palsy (fourth nerve palsy)]**: Comprehensive review of etiology, clinical features, diagnosis, and management of CN IV palsy — https://www.uptodate.com/contents/trochlear-nerve-palsy-fourth-nerve-palsy\n- **[American Academy of Ophthalmology (AAO): Neuro-Ophthalmology/Orbit Preferred Practice Pattern)]**: Guidelines for the evaluation and management of cranial nerve palsies including CN IV — https://www.aao.org/preferred-practice-pattern/neuro-ophthalmology-orbit-ppp\n- **[Journal of Neuro-Ophthalmology: The Diagnosis and Management of Isolated Fourth Nerve Palsies]** — https://journals.lww.com/jneuro-ophthalmology/Fulltext/2019/03000/The_Diagnosis_and_Management_of_Isolated_Fourth.15.aspx", "image_path": ""}, {"id": 34856, "date": "2026-03-03T13:30:02+00:00", "stem": "A 22-year-old lady came for certification for part time job. She had diarrhoea and fever 2-3 days ago and other some people in that area suffering same symptoms and test Salmonella. What should you ask for intervention?", "options": "what is her part time job\nrecent history of school excursion\ninjection adenosine\ncarotid message\ninjection lignocaine", "answer": "A. what is her part time job", "explanation": "### ✅ Correct Answer: A. what is her part time job\n\nThis is a public health scenario involving a **Salmonella outbreak**. The key principle is identifying if the patient works in a **high-risk occupation** where they could transmit infection to vulnerable populations (food handling, childcare, healthcare, aged care). This determines the need for exclusion from work until non-infectious.\n\n**Clinical Reasoning:**\n1. **Outbreak Context:** Multiple people in the area with similar symptoms and confirmed Salmonella indicates a community outbreak.\n2. **Public Health Management:** The core intervention is **breaking the chain of transmission**. Salmonella is typically spread via the faecal-oral route, often through contaminated food or water.\n3. **Occupational Risk Assessment:** The most critical immediate question is her **part-time job**. If she works as a food handler, childcare worker, healthcare worker, or in aged care, she poses a significant risk of transmitting Salmonella to vulnerable individuals. Public health guidelines mandate exclusion from work until she is no longer infectious (usually 48 hours after symptoms resolve and sometimes until negative stool cultures).\n4. **Other Options' Relevance:** While a school excursion might be relevant for exposure history, it doesn't guide the immediate public health *intervention* for certification. The injection options (adenosine, lignocaine) and carotid massage are irrelevant to Salmonella management and relate to cardiac conditions.\n\n### ❌ Why the Other Options Are Wrong\n- **B. recent history of school excursion**: While this might help identify the source of the outbreak (epidemiological tracing), it is not the primary intervention needed for her individual certification. The question asks what you should ask for *intervention* – the action to prevent further spread. Her occupation is the direct determinant of whether she needs to be excluded from work.\n- **C. injection adenosine**: Adenosine is used for terminating supraventricular tachycardia (SVT). It has no role in the management of Salmonella gastroenteritis or public health interventions.\n- **D. carotid message**: Carotid sinus massage is a vagal manoeuvre used in the diagnosis and management of certain tachyarrhythmias (e.g., SVT). It is completely unrelated to infectious diarrhoea.\n- **E. injection lignocaine**: Lignocaine (lidocaine) is a local anaesthetic and antiarrhythmic (Class Ib). It is used for local anaesthesia, nerve blocks, and ventricular arrhythmias. It has no indication in the management of Salmonella infection.\n\n### 📚 Relevant Guidelines\n- **[Australian Government Department of Health - Exclusion periods for infectious conditions]**: Provides guidelines for excluding people with infectious diseases from work, school, and childcare — [https://www.health.gov.au/resources/publications/exclusion-periods-for-infectious-conditions](https://www.health.gov.au/resources/publications/exclusion-periods-for-infectious-conditions)\n- **[Therapeutic Guidelines (eTG) - Gastrointestinal]**: Covers management of infectious diarrhoea including Salmonella, including public health measures — [https://tgldcdp.tg.org.au/etgAccess](https://tgldcdp.tg.org.au/etgAccess)\n- **[National Health and Medical Research Council (NHMRC) - Staying Healthy in Child Care]**: Specific guidelines on exclusion for infectious diseases for those working with children — [https://www.nhmrc.gov.au/about-us/publications/staying-healthy-preventing-infectious-diseases-early-childhood-education-and-care-services](https://www.nhmrc.gov.au/about-us/publications/staying-healthy-preventing-infectious-diseases-early-childhood-education-and-care-services)", "image_path": ""}, {"id": 34857, "date": "2026-03-03T13:31:07+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "Ondansetron\nMethylprednisolone\nFolic acid\nPotassium chloride\nThiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\n\nThis question tests the critical management step for **severe hyperemesis gravidarum** in a malnourished, dehydrated patient before administering dextrose.\n\n**Clinical Reasoning:**\n1. **Diagnosis:** The patient has **hyperemesis gravidarum** (persistent nausea/vomiting in pregnancy leading to >5% weight loss, dehydration, ketonuria, and electrolyte disturbances). Metabolic alkalosis is from loss of gastric acid (HCl) through vomiting.\n2. **Risk of Wernicke's Encephalopathy:** In patients with chronic malnutrition and thiamine (Vitamin B1) deficiency, a rapid infusion of dextrose can precipitate **Wernicke's encephalopathy**. This is a neurological emergency characterized by confusion, ataxia, and ophthalmoplegia, caused by acute thiamine deficiency in the brain.\n3. **Pathophysiology:** Thiamine is a cofactor for enzymes in glucose metabolism. In a thiamine-depleted state, a glucose load increases metabolic demand, rapidly depleting remaining thiamine stores, leading to neuronal injury.\n4. **Standard Protocol:** Before giving any carbohydrate (dextrose) to a malnourished patient or one with prolonged vomiting (risk factors for thiamine deficiency), **parenteral thiamine (100mg IV)** must be administered. This is a safety-critical step to prevent Wernicke's.\n5. **Other Management:** IV rehydration with normal saline is correct for volume depletion. Potassium replacement (option D) is often needed due to vomiting and alkalosis-induced renal losses, but it is not the *immediate* priority before dextrose. Thiamine must come first.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: Ondansetron is an antiemetic used in hyperemesis gravidarum. However, the question states diphenhydramine (another antiemetic) has already been given. Furthermore, ondansetron is not a prerequisite for dextrose infusion and does not prevent Wernicke's encephalopathy.\n- **B. Methylprednisolone**: Corticosteroids are considered a second or third-line therapy for refractory hyperemesis gravidarum. They are not administered as an urgent measure prior to dextrose and are not protective against thiamine deficiency complications.\n- **C. Folic acid**: Folic acid supplementation (400-500 mcg daily) is recommended preconception and in early pregnancy to prevent neural tube defects. While important for prenatal care, it is not an urgent intervention before dextrose infusion and does not address the acute risk of Wernicke's encephalopathy.\n- **D. Potassium chloride**: Hypokalaemia is common in hyperemesis due to vomiting and renal losses from metabolic alkalosis. Potassium replacement is important and should be part of fluid management. However, it is **not the most critical immediate step before dextrose**. Thiamine administration takes precedence to prevent irreversible neurological damage. Potassium can be added to the IV fluids concurrently or after thiamine is given.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Obstetrics]**: Management of hyperemesis gravidarum, including the imperative to give thiamine before dextrose in malnourished patients — [https://tgldcdp.tg.org.au/etgAccess](https://tgldcdp.tg.org.au/etgAccess)\n- **[RANZCOG - Management of Nausea and Vomiting in Pregnancy and Hyperemesis Gravidarum]**: Royal Australian and New Zealand College of Obstetricians and Gynaecologists guideline. Explicitly recommends \"Thiamine supplementation (oral or intravenous) should be given to women with hyperemesis gravidarum before administration of dextrose or parenteral nutrition.\" — [https://ranzcog.edu.au/womens-health/statement-guidelines](https://ranzcog.edu.au/womens-health/statement-guidelines)\n- **[UpToDate - Treatment of hyperemesis gravidarum]**: Details the pathophysiology and emphasizes thiamine repletion to prevent Wernicke's encephalopathy — [https://www.uptodate.com/contents/treatment-of-hyperemesis-gravidarum](https://www.uptodate.com/contents/treatment-of-hyperemesis-gravidarum)", "image_path": ""}, {"id": 34889, "date": "2026-03-03T15:18:35+00:00", "stem": "A 55-year-old woman with rheumatoid arthritis, currently managed with methotrexate 15 mg weekly, presents to her general practitioner after a household contact developed a herpes zoster rash on the trunk two days ago. She has no history of chickenpox or shingles and is concerned about her risk of infection given her immunosuppressive therapy. What is the most appropriate next step to prevent varicella-zoster virus infection?", "options": "A. Administer varicella-zoster immune globulin\nB. Reassure that no action is required\nC. Order varicella-zoster virus IgG serology\nD. Administer the varicella vaccine\nE. Commence oral aciclovir prophylactically", "answer": "A. Administer varicella-zoster immune globulin", "explanation": "### ✅ Correct Answer: A. Administer varicella-zoster immune globulin\n\nThis patient is an immunocompromised adult (on methotrexate) with a significant exposure to varicella-zoster virus (VZV) via a household contact with active herpes zoster (shingles). She has no history of chickenpox or shingles, making her varicella-naïve and highly susceptible to primary VZV infection (chickenpox), which can be severe and even fatal in immunocompromised individuals.\n\n**Clinical Reasoning:**\n1.  **Risk Assessment:** The exposure is significant (household contact), recent (2 days ago), and the source is infectious (active rash). The patient is on a disease-modifying antirheumatic drug (methotrexate), which is immunosuppressive.\n2.  **Goal:** The priority is to prevent or attenuate a primary VZV infection. In this high-risk scenario, post-exposure prophylaxis (PEP) is urgent.\n3.  **First-line PEP:** For immunocompromised, varicella-susceptible individuals with a significant exposure, **Varicella-Zoster Immune Globulin (VZIG)** is the standard of care. VZIG provides passive immunity, can prevent or modify the disease if given within 10 days (ideally within 96 hours) of exposure. It is specifically indicated for this patient group.\n4.  **Why not other options first?** Serology (Option C) may be done *concurrently* to confirm susceptibility, but it should not delay the administration of VZIG in a high-risk exposure. Waiting for results could miss the critical window for effective prophylaxis. Vaccination (Option D) is contraindicated in immunocompromised patients. Aciclovir (Option E) is used for treatment, not first-line prophylaxis in this context. Reassurance (Option B) is incorrect given the high risk.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Reassure that no action is required**: This is incorrect and dangerous. An immunocompromised patient with a significant VZV exposure is at high risk for severe primary infection. Prophylactic action is mandatory.\n- **C. Order varicella-zoster virus IgG serology**: While checking serology to confirm susceptibility is reasonable, it should not be the *most appropriate next step* if it delays definitive prophylaxis. VZIG should be administered promptly based on the clinical history of no prior infection and significant exposure. Serology can be sent at the same time.\n- **D. Administer the varicella vaccine**: Live attenuated vaccines (like the varicella vaccine) are generally contraindicated in patients on significant immunosuppressive therapy (e.g., methotrexate > 0.4 mg/kg/week) due to the risk of vaccine-strain virus dissemination and disease.\n- **E. Commence oral aciclovir prophylactically**: While oral aciclovir/valaciclovir can be used for post-exposure prophylaxis in *some* contexts (e.g., immunocompetent adults), VZIG is the preferred and recommended first-line agent for immunocompromised individuals. Aciclovir is more typically used for treatment of active infection.\n\n### 📚 Relevant Guidelines\n- **[Australian Immunisation Handbook (ATAGI)]**: Guidelines for varicella (chickenpox) and herpes zoster (shingles), including post-exposure prophylaxis recommendations for immunocompromised individuals. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/varicella-chickenpox\n- **[Therapeutic Guidelines (eTG) – Dermatology]**: Management of herpes zoster and varicella, including indications for VZIG and antiviral therapy. — https://tgldcdp.tg.org.au/etgAccess\n- **[Rheumatology Expert Group, Therapeutic Guidelines]**: Guidance on vaccination and infection risk management in patients on immunosuppressive therapies like methotrexate. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34891, "date": "2026-03-03T15:26:50+00:00", "stem": "**A 56-year old lady is brought to the emergency department by an ambulance. She developed right leg weakness and left sided facial droop an hour ago. She has past medical history of hypertension, hyperlipidemia and peptic ulcer disease (GI bleeding two weeks ago). On examination, her blood pressure is 130/85mmHg, respiratory rate is 18 breaths per minute, heart rate is 110 beats per minutes and oxygen saturation is 100% at room air. On the neurological examination, she is found to have hypertonia and reduced power in the right leg, and right-sided facial palsy. The Babinski sign is positive. CT scan of the brain does not show any evidence of an intracranial bleed.ECG shows sinus rhythm. Which of the following is the most appropriate therapy for this patient?**", "options": "A. Heparin\nB. Warfarin\nC. Clopidogrel\nD. Aspirin\nE. Thrombolysis", "answer": "D. Aspirin", "explanation": "### ✅ Correct Answer: D. Aspirin\n\nThis patient presents with an acute ischemic stroke (symptoms for 1 hour, CT brain shows no haemorrhage). The key contraindication to other therapies is her **recent gastrointestinal bleed (2 weeks ago)**.\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** Acute ischemic stroke is confirmed by sudden onset focal neurological deficits (right leg weakness, right-sided facial palsy – note the stem says 'left sided facial droop' in text but 'right-sided facial palsy' on exam, implying a lower motor neuron lesion on the right; the combination with right leg weakness suggests a left brainstem/cortical lesion). The positive Babinski and hypertonia support an upper motor neuron lesion. The normal CT rules out haemorrhage.\n2.  **Time Window:** She presented within 1 hour, which is within the time window for thrombolysis (typically up to 4.5 hours).\n3.  **Critical Contraindication:** Thrombolysis (Option E) with alteplase is **absolutely contraindicated** in patients with a history of **intracranial or intraspinal haemorrhage, or significant active internal bleeding (e.g., gastrointestinal)** within the past 21 days. Her GI bleed 2 weeks ago is a major contraindication.\n4.  **Anticoagulation Risk:** Starting therapeutic heparin (Option A) or warfarin (Option B) acutely carries a high risk of precipitating another GI bleed in this patient with recent ulcer disease.\n5.  **Appropriate Therapy:** According to stroke guidelines, for patients with acute ischemic stroke who are not eligible for thrombolysis, **aspirin 150-300 mg orally (or via NG tube if dysphagic) should be given as soon as possible after haemorrhage has been excluded by imaging**, ideally within 24-48 hours. This provides antiplatelet effect to prevent early stroke recurrence with a relatively lower bleeding risk compared to anticoagulants. Clopidogrel (Option C) is an alternative but is not typically the *first-line* immediate agent in the hyperacute setting unless there is a specific contraindication to aspirin (e.g., allergy). Aspirin is the standard initial therapy.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Heparin**: Full-dose therapeutic heparin is not recommended in the acute phase of ischemic stroke due to an increased risk of haemorrhagic transformation and systemic bleeding, especially in a patient with a very recent GI bleed. It is reserved for specific circumstances like cardioembolic stroke with high recurrence risk, but even then, the recent bleed is a major contraindication.\n- **B. Warfarin**: Warfarin has a delayed onset of action (days) and is not used for acute stroke treatment. It is used for long-term secondary prevention in specific cases (e.g., atrial fibrillation). Initiating it now would be ineffective for acute management and dangerous given the bleeding risk.\n- **C. Clopidogrel**: While clopidogrel is used for secondary stroke prevention, in the hyperacute setting (first 24-48 hours), aspirin is the preferred initial antiplatelet agent based on large trial evidence. Dual antiplatelet therapy (e.g., aspirin + clopidogrel) may be used in minor stroke/TIA, but this patient has a significant recent GI bleed, making even single antiplatelet therapy a careful decision.\n- **E. Thrombolysis**: Alteplase (thrombolysis) is contraindicated due to the history of GI bleeding within the last 3 months (specifically within 21 days). Administering it could cause life-threatening haemorrhage at the site of the recently healed ulcer.\n\n### 📚 Relevant Guidelines\n- **[Stroke Foundation (Australia) – Clinical Guidelines for Stroke Management]**: Comprehensive guidelines for acute stroke management, including indications/contraindications for thrombolysis and recommendations for early antiplatelet therapy. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[Therapeutic Guidelines (eTG) – Neurology]**: Management of acute ischemic stroke, including pharmacological therapy. — https://tgldcdp.tg.org.au/etgAccess\n- **[National Institute for Health and Care Excellence (NICE) – Stroke and transient ischaemic attack in over 16s: diagnosis and initial management]**: International guidelines supporting the use of aspirin within 24 hours of ischemic stroke if thrombolysis not given. — https://www.nice.org.uk/guidance/ng128", "image_path": ""}, {"id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 29-year-old woman has a cervical screening test showing **HPV 16 detected** with negative cytology. She is asymptomatic. What is the most appropriate next step?", "options": "a. Repeat HPV test in 12 months\nb. Refer for colposcopy\nc. Repeat cytology in 6 weeks\nd. Return to routine 5-year screening\ne. Perform excisional biopsy", "answer": "b", "explanation": "### ✅ Correct Answer: b. Refer for colposcopy\n\n**Clinical Reasoning:**\n- **Pathophysiology:** HPV 16 is a high-risk oncogenic type responsible for approximately 50-60% of cervical cancers. Its detection indicates a significant risk for underlying high-grade cervical intraepithelial neoplasia (CIN2/3) or cancer, even in the absence of cytological abnormalities (negative cytology). The virus integrates into the host genome, disrupting tumor suppressor genes (p53, pRb).\n- **Key Diagnostic Feature:** The Australian National Cervical Screening Program guidelines mandate that detection of HPV 16 (or HPV 18) on primary HPV testing triggers an immediate referral for colposcopy, regardless of the cytology result. This is because the risk of significant pathology is high enough to bypass repeat testing intervals.\n- **Management Pearl:** Colposcopy allows for direct visualisation of the cervix with acetic acid and Lugol's iodine, and targeted biopsy if abnormal transformation zones are seen. This step is crucial for diagnosing and grading any precancerous lesions (CIN). Waiting or repeating tests in this scenario is inappropriate and delays definitive diagnosis.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Repeat HPV test in 12 months**: This is the recommended pathway for HPV (non-16/18) types with negative cytology, allowing time for viral clearance. For HPV 16/18, the risk is too high for surveillance; immediate assessment is required.\n- **c. Repeat cytology in 6 weeks**: Repeating cytology alone is not part of the structured management pathway for primary HPV screening. It does not provide additional actionable information over the known high-risk HPV status and would cause unnecessary delay.\n- **d. Return to routine 5-year screening**: This is the pathway for a negative screening result (HPV not detected). A positive HPV 16 result categorically excludes the patient from routine screening until after appropriate investigation and management.\n- **e. Perform excisional biopsy**: This is a therapeutic, not a diagnostic, first step. Excisional procedures like LLETZ/LEEP are performed based on histopathological confirmation of high-grade lesions from a colposcopic biopsy. Performing it without prior colposcopic assessment is inappropriate and overtreats patients who may not have significant disease.\n\n### 📚 Relevant Guidelines\n- **National Cervical Screening Program (Australian Government Department of Health and Aged Care)**: The definitive Australian guideline for cervical screening management pathways, including the specific instruction for immediate colposcopy referral for HPV 16/18 positive results. — https://www.health.gov.au/resources/collections/national-cervical-screening-program-resources\n- **The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG)**: Provides detailed clinical guidance on the management of screen-detected abnormalities, including colposcopic assessment. — https://ranzcog.edu.au/womens-health/clinical-guidance-and-publications\n- **Cancer Council Australia Cervical Cancer Screening Guidelines**: Evidence-based guidelines informing the NCSP, detailing the rationale for the management of HPV 16/18. — https://wiki.cancer.org.au/australia/Guidelines:Cervical_cancer/Screening", "image_path": ""}, {"id": 34922, "date": "2026-03-04T15:30:12+00:00", "stem": "A 3-week-old baby boy presents with non-bilious projectile vomiting after each feed. He is hungry and eager to feed again after vomiting. On examination, there is a palpable 'olive-shaped' mass in the right upper quadrant. What is the most appropriate initial investigation?", "options": "A. Abdominal X-ray\nB. Upper gastrointestinal series (barium swallow)\nC. Abdominal ultrasound\nD. Serum electrolytes\nE. Gastric emptying study", "answer": "C. Abdominal ultrasound", "explanation": "### ✅ Correct Answer: C. Abdominal ultrasound\n\nThe clinical presentation is classic for **congenital hypertrophic pyloric stenosis (CHPS)**:\n- **Demographics**: First-born male infant, 3-6 weeks old.\n- **Symptoms**: Non-bilious, projectile vomiting after feeds, with the infant remaining hungry (\"hungry vomiter\").\n- **Examination**: Palpable \"olive-shaped\" mass in the right upper quadrant (hypertrophied pylorus). Visible peristaltic waves may also be seen.\n\n**Step-by-step clinical reasoning**:\n1. **Diagnostic Pathway**: The history and physical exam are highly suggestive of CHPS. The next step is to confirm the diagnosis with imaging.\n2. **Ultrasound as Gold Standard**: Abdominal ultrasound is the investigation of choice. It is non-invasive, has no radiation exposure, and provides direct visualization of the pylorus. Diagnostic criteria include:\n   - Pyloric muscle thickness > 4 mm.\n   - Pyloric canal length > 16 mm.\n3. **Why Ultrasound First?**: It confirms the diagnosis definitively, allowing for surgical planning (pyloromyotomy). It also helps rule out other causes of vomiting in infants.\n4. **Management Sequence**: Once diagnosed, the priority is to correct fluid and electrolyte imbalances (often a hypochloremic, hypokalemic metabolic alkalosis) before surgery.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Abdominal X-ray**: May show a dilated stomach with little air distal to the pylorus (\"single bubble sign\"), but it is non-specific, exposes the infant to radiation, and is not the definitive diagnostic test for CHPS.\n- **B. Upper gastrointestinal series (barium swallow)**: Was historically used but has been largely replaced by ultrasound. It shows the \"string sign\" or \"railroad track sign\" of a narrowed, elongated pyloric canal. It involves radiation and contrast, and is now typically reserved for cases where ultrasound is equivocal.\n- **D. Serum electrolytes**: This is a **crucial investigation** but not the **initial** one for diagnosis. It is performed **after** the diagnosis is confirmed or strongly suspected to assess for dehydration and metabolic alkalosis prior to surgical correction. It does not confirm the anatomical diagnosis.\n- **E. Gastric emptying study**: Not indicated for CHPS. It is used for evaluating functional gastric motility disorders, not an anatomical obstruction.\n\n### 📚 Relevant Guidelines\n- **RACGP - Infant with vomiting**: Provides a structured approach to the assessment of vomiting in infants, highlighting red flags and appropriate investigations. — [https://www.racgp.org.au/afp/2017/july/the-infant-with-vomiting](https://www.racgp.org.au/afp/2017/july/the-infant-with-vomiting)\n- **Therapeutic Guidelines (eTG) - Paediatric surgery**: Details the diagnosis and management of pyloric stenosis, including pre-operative fluid resuscitation. — [https://tgldcdp.tg.org.au/etgAccess](https://tgldcdp.tg.org.au/etgAccess)\n- **UpToDate - Infantile hypertrophic pyloric stenosis**: Comprehensive review of clinical features, diagnostic imaging criteria, and surgical management. — [https://www.uptodate.com/contents/infantile-hypertrophic-pyloric-stenosis](https://www.uptodate.com/contents/infantile-hypertrophic-pyloric-stenosis)", "image_path": "photo_2026-03-04_15-30-12.jpg"}, {"id": 34924, "date": "2026-03-04T15:32:53+00:00", "stem": "A 65-year-old man presents with a 6-month history of progressive difficulty walking, stiffness, and slowness. On examination, he has a resting tremor in his right hand, cogwheel rigidity, and bradykinesia. His face is expressionless. Which of the following is the most likely diagnosis?", "options": "A. Essential tremor\nB. Parkinson's disease\nC. Drug-induced parkinsonism\nD. Multiple system atrophy\nE. Wilson's disease", "answer": "B. Parkinson's disease", "explanation": "### ✅ Correct Answer: B. Parkinson's disease\n\nThe presentation is classic for **idiopathic Parkinson's disease (PD)**:\n- **Cardinal Motor Features (TRAP)**:\n  1. **T**remor at rest (often pill-rolling, 4-6 Hz).\n  2. **R**igidity (cogwheel type when combined with tremor).\n  3. **A**kinesia/Bradykinesia (slowness of movement).\n  4. **P**ostural instability (appears later in the disease).\n- **Supportive Features**: Asymmetric onset (right hand in this case), hypomimia (expressionless face), shuffling gait, and progressive course.\n\n**Step-by-step clinical reasoning**:\n1. **Core Diagnosis**: The combination of **asymmetric resting tremor, cogwheel rigidity, bradykinesia, and hypomimia** in an older adult is highly specific for PD.\n2. **Pathophysiology**: PD results from the degeneration of dopaminergic neurons in the substantia nigra pars compacta, leading to depletion of dopamine in the striatum.\n3. **Diagnostic Criteria**: Diagnosis is primarily clinical. Supportive positive criteria include a clear response to levodopa. The UK Parkinson's Disease Society Brain Bank clinical diagnostic criteria are commonly used.\n4. **Red Flags for Atypical Parkinsonism**: The absence of early falls, severe autonomic dysfunction, cerebellar signs, or vertical gaze palsy helps rule out other parkinsonian syndromes in this vignette.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Essential tremor**: Characterized by a **bilateral action or postural tremor** (e.g., when holding arms outstretched) that may improve with alcohol. It lacks the resting tremor, rigidity, and bradykinesia of PD. A family history is common.\n- **C. Drug-induced parkinsonism**: Can mimic PD but is usually **symmetric** and the tremor is less prominent. History of exposure to dopamine-blocking agents (e.g., antipsychotics, antiemetics like metoclopramide) is key. Symptoms often resolve after stopping the offending drug.\n- **D. Multiple system atrophy (MSA)**: An atypical parkinsonism (Parkinson-plus syndrome). It presents with parkinsonism **plus** prominent early autonomic failure (orthostatic hypotension, urinary incontinence) and/or cerebellar ataxia. Resting tremor is less common than in PD.\n- **E. Wilson's disease**: A rare autosomal recessive disorder of copper metabolism that can present with neuropsychiatric symptoms and a **wing-beating tremor** (high-amplitude, proximal). It typically presents in younger individuals (<40 years) with Kayser-Fleischer rings on slit-lamp examination and liver involvement.\n\n### 📚 Relevant Guidelines\n- **RACGP - Diagnosis and management of Parkinson's disease**: An Australian guide for primary care on recognizing and managing PD. — [https://www.racgp.org.au/afp/2015/december/diagnosis-and-management-of-parkinson-s-disease](https://www.racgp.org.au/afp/2015/december/diagnosis-and-management-of-parkinson-s-disease)\n- **NICE Guideline [NG71] - Parkinson's disease in adults**: Provides evidence-based recommendations for diagnosis and management. — [https://www.nice.org.uk/guidance/ng71](https://www.nice.org.uk/guidance/ng71)\n- **International Parkinson and Movement Disorder Society (MDS) Clinical Diagnostic Criteria**: The gold standard for the clinical diagnosis of PD. — [https://www.movementdisorders.org/MDS-Files1/PDFs/MDS-Clinical-Diagnostic-Criteria-for-PD.pdf](https://www.movementdisorders.org/MDS-Files1/PDFs/MDS-Clinical-Diagnostic-Criteria-for-PD.pdf)", "image_path": "photo_2026-03-04_15-32-53.jpg"}, {"id": 34979, "date": "2026-03-06T13:11:51+00:00", "stem": "A 45-year-old woman presents with a 6-month history of progressive dyspnea on exertion and fatigue. She has a history of rheumatoid arthritis for 10 years, managed with methotrexate. On examination, she has bibasilar fine inspiratory crackles. Chest X-ray shows bilateral reticular opacities predominantly in the lower lung zones. High-resolution CT scan reveals bilateral ground-glass opacities and traction bronchiectasis. Which of the following is the most likely diagnosis?", "options": "A. Rheumatoid arthritis-associated interstitial lung disease\nB. Methotrexate-induced pneumonitis\nC. Pulmonary tuberculosis\nD. Congestive heart failure\nE. Chronic obstructive pulmonary disease", "answer": "A. Rheumatoid arthritis-associated interstitial lung disease", "explanation": "### ✅ Correct Answer: A. Rheumatoid arthritis-associated interstitial lung disease\n\n**Clinical Reasoning:**\n1. **Patient Profile:** 45-year-old woman with long-standing rheumatoid arthritis (10 years) – this is a key risk factor for developing extra-articular manifestations including interstitial lung disease (ILD).\n2. **Clinical Presentation:** Progressive dyspnea on exertion over 6 months with fatigue – classic insidious onset of ILD.\n3. **Examination Findings:** Bibasilar fine inspiratory crackles – characteristic of ILD, often described as \"Velcro crackles.\"\n4. **Imaging Findings:**\n   - Chest X-ray: Bilateral reticular opacities in lower zones – typical pattern for ILD.\n   - HRCT: Ground-glass opacities and traction bronchiectasis – hallmark findings of fibrotic ILD, specifically suggestive of usual interstitial pneumonia (UIP) or nonspecific interstitial pneumonia (NSIP) patterns.\n5. **Pathophysiology:** Rheumatoid arthritis-associated ILD is a common extra-articular manifestation, occurring in approximately 10-20% of patients. It's characterized by inflammation and fibrosis of the lung interstitium. The usual interstitial pneumonia (UIP) pattern is most common, presenting with basal-predominant reticulation, honeycombing, and traction bronchiectasis.\n6. **Timeline:** The 6-month progressive course argues against acute conditions like drug-induced pneumonitis or infection.\n7. **Management Implications:** Diagnosis requires exclusion of other causes. Treatment involves immunosuppression (often corticosteroids plus disease-modifying antirheumatic drugs like mycophenolate or rituximab), with referral to respiratory specialist and consideration of antifibrotic agents (pirfenidone, nintedanib) for progressive fibrotic disease.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Methotrexate-induced pneumonitis:** While methotrexate can cause pneumonitis, it typically presents more acutely (days to weeks) with fever, cough, and dyspnea. The imaging usually shows diffuse ground-glass opacities without the established fibrotic changes (traction bronchiectasis) seen here. The 6-month progressive course and established fibrotic changes favor chronic ILD over acute drug toxicity.\n- **C. Pulmonary tuberculosis:** TB typically presents with constitutional symptoms (fever, night sweats, weight loss), cough (often productive), and hemoptysis. Imaging usually shows upper lobe cavitary lesions or consolidation, not bilateral lower zone reticular patterns with traction bronchiectasis. The chronic progressive course without systemic symptoms makes TB unlikely.\n- **D. Congestive heart failure:** CHF presents with orthopnea, paroxysmal nocturnal dyspnea, and peripheral edema. Examination would reveal elevated jugular venous pressure, S3 gallop, and possibly peripheral edema. Chest X-ray typically shows cardiomegaly, pulmonary vascular redistribution, and pleural effusions – not the reticular pattern with traction bronchiectasis seen here.\n- **E. Chronic obstructive pulmonary disease:** COPD presents with progressive dyspnea, cough, and sputum production in smokers. Examination shows hyperinflated chest, wheezing, or prolonged expiration. Imaging shows hyperinflation, flattened diaphragms, and bullae – not the interstitial pattern described. The patient's age and lack of smoking history make COPD less likely.\n\n### 📚 Relevant Guidelines\n- **American College of Rheumatology (ACR) Guidelines for Rheumatoid Arthritis Management**: Includes screening and management recommendations for extra-articular manifestations including interstitial lung disease — https://www.rheumatology.org/Portals/0/Files/2021-ACR-Guideline-for-Rheumatoid-Arthritis.pdf\n- **Thoracic Society of Australia and New Zealand (TSANZ) Position Statement on Interstitial Lung Disease**: Provides Australian-specific guidance on diagnosis and management of ILD, including connective tissue disease-associated ILD — https://www.thoracic.org.au/documents/item/200\n- **Therapeutic Guidelines (eTG) – Rheumatology**: Australian guidelines for management of rheumatoid arthritis and its complications — https://tgldcdp.tg.org.au/viewTopic?topicfile=rheumatoid-arthritis&guidelineName=Rheumatology#toc_d1e289", "image_path": ""}, {"id": 35011, "date": "2026-03-07T03:39:58+00:00", "stem": "A 45-year-old man presents with sudden onset vertigo, nausea, vomiting, and hearing loss in the right ear. He has no other neurological symptoms. Examination shows horizontal nystagmus that beats away from the affected ear, and he has difficulty standing without support. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo (BPPV)\nB. Vestibular neuritis\nC. Ménière's disease\nD. Acoustic neuroma\nE. Vertebrobasilar insufficiency", "answer": "C. Ménière's disease", "explanation": "### ✅ Correct Answer: C. Ménière's disease\n\n**Clinical Reasoning:**\n1. **Key Symptom Triad:** The patient presents with the classic triad of Ménière's disease: vertigo (episodic, spontaneous), sensorineural hearing loss (unilateral, fluctuating), and tinnitus (implied by 'hearing loss' context). The sudden onset with nausea/vomiting is characteristic of acute Ménière's attacks.\n2. **Examination Findings:** Horizontal nystagmus beating away from the affected ear is typical in peripheral vestibular disorders like Ménière's during acute attacks. The severe vertigo causing inability to stand aligns with the intensity of Ménière's episodes.\n3. **Pathophysiology:** Ménière's disease involves endolymphatic hydrops - excessive fluid buildup in the inner ear's membranous labyrinth. This leads to episodic attacks of vertigo, fluctuating hearing loss, tinnitus, and aural fullness.\n4. **Differentiating Features:** The presence of **hearing loss** is crucial here. Vestibular neuritis typically causes vertigo without hearing loss. BPPV is triggered by position changes, not spontaneous. Acoustic neuroma presents with progressive, not sudden, symptoms. Vertebrobasilar insufficiency would likely have additional brainstem symptoms.\n5. **AMC Exam Pearl:** When vertigo is accompanied by unilateral hearing loss, Ménière's disease should be the leading diagnosis unless proven otherwise.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: BPPV is characterized by brief episodes of vertigo (usually <1 minute) triggered by specific head movements (e.g., rolling over in bed, looking up). It does NOT cause hearing loss, tinnitus, or spontaneous prolonged vertigo attacks.\n- **B. Vestibular neuritis**: This typically presents with acute, severe vertigo lasting days, nausea/vomiting, but crucially **NO hearing loss**. It's often preceded by viral illness and shows unidirectional nystagmus.\n- **D. Acoustic neuroma (vestibular schwannoma)**: This presents with progressive, not sudden, unilateral sensorineural hearing loss, often with tinnitus and balance issues. Vertigo is less common than unsteadiness, and symptoms develop over months to years.\n- **E. Vertebrobasilar insufficiency**: This causes transient vertebrobasilar ischemia, leading to vertigo but typically with other brainstem symptoms (diplopia, dysarthria, ataxia, weakness). Hearing loss is not a feature, and episodes are brief (<30 minutes).\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Neurology (eTG)]**: Provides diagnostic criteria and management for Ménière's disease and other causes of vertigo — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etg\n- **[American Academy of Otolaryngology-Head and Neck Surgery (AAO-HNS)]**: Clinical practice guidelines for Ménière's disease diagnosis and treatment — https://www.entnet.org/resource/clinical-practice-guideline-menieres-disease/\n- **[BMJ Best Practice: Ménière's Disease]**: Evidence-based overview of diagnosis and management — https://bestpractice.bmj.com/topics/en-gb/466", "image_path": "photo_2026-03-07_03-39-58.jpg"}, {"id": 35015, "date": "2026-03-07T04:27:59+00:00", "stem": "Young man HIT by a squash ball while playing, apart from headache which resolved by analgesic he complained of decreased in vision. On examination, his visual acuity was 6/12 in the left eye; right eye was 6/6 asking the most likely cause?", "options": "A. vitreous hemorrhage\nB. retinal detachment\nC. zygomatic fracture\nD. orbital floor fracture", "answer": "B. retinal detachment", "explanation": "### ✅ Correct Answer: B. Retinal Detachment\n\n**Clinical Reasoning:**\n1. **Mechanism of Injury:** A high-velocity squash ball (small, dense, fast-moving projectile) can cause a **contrecoup injury** to the eye. The sudden compression and decompression of the globe can generate significant tractional forces on the vitreous, which is adherent to the retina.\n2. **Presentation:** The patient reports **decreased vision** (6/12 in the affected eye) following blunt trauma. Headache resolved with analgesics, suggesting the primary issue is ocular, not neurological or skeletal.\n3. **Pathophysiology:** Blunt trauma is a classic cause of **rhegmatogenous retinal detachment**. The impact can cause a retinal tear or break (often at the vitreous base, especially in the peripheral retina), allowing liquefied vitreous to seep behind the retina, leading to detachment. This directly explains the painless visual loss.\n4. **Key Differentiator:** While vitreous hemorrhage (Option A) can also cause vision loss, it typically causes floaters and a more diffuse haze or \"red-out.\" The acuity of 6/12 is more consistent with a localized retinal issue like detachment rather than a dense hemorrhage, which might cause worse vision (e.g., counting fingers).\n5. **Exam Findings (Implied):** The scenario suggests an ophthalmological cause. A thorough exam would likely reveal features of retinal detachment (e.g., relative afferent pupillary defect if extensive, Marcus Gunn pupil; visualization of a pale, elevated retina on fundoscopy).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Vitreous Hemorrhage**: While common after trauma, it usually presents with sudden onset of floaters, cobwebs, or a reddish haze. A significant hemorrhage reducing vision to 6/12 is possible, but retinal detachment is a more specific and direct mechanical consequence of the contrecoup injury and is a more urgent diagnosis to not miss.\n- **C. Zygomatic Fracture**: This would cause **pain, swelling, bruising, and possibly trismus** (difficulty opening mouth due to masseter muscle involvement) and **step deformity** at the infraorbital rim. It does not directly cause isolated decreased visual acuity unless there is associated orbital involvement or optic nerve injury, which is not the most likely primary finding here.\n- **D. Orbital Floor Fracture (Blowout Fracture)**: Classic signs include **diplopia** (especially on upward gaze due to entrapment of inferior rectus/inferior oblique muscles), **enophthalmos**, infraorbital nerve hypoesthesia (numb cheek), and possibly subcutaneous emphysema. Isolated decreased visual acuity is not the hallmark; it's more about binocular vision and eye movement.\n\n### 📚 Relevant Guidelines\n- **[Royal Australian and New Zealand College of Ophthalmologists (RANZCO) - Retinal Detachment]**: Provides guidelines on the diagnosis and management of retinal detachment, including traumatic cases. — https://ranzco.edu\n- **[Therapeutic Guidelines (eTG) - Eye Trauma]**: Offers a structured approach to the assessment and initial management of ocular trauma, highlighting red flags like decreased vision. — https://tgldcdp.tg.org.au/etgaccess\n- **[UpToDate - Evaluation and management of retinal detachment]**: A comprehensive, evidence-based resource detailing the pathophysiology, diagnosis, and treatment of rhegmatogenous retinal detachment. — https://www.uptodate.com/contents/retinal-detachment", "image_path": ""}, {"id": 35046, "date": "2026-03-09T07:42:09+00:00", "stem": "A 42-year-old man, who was involved in a motor vehicle accident, is being evaluated in the Emergency Department. On examination, he has stable vital signs and an oxygen saturation of 96% on room air; however, he has marked difficulty in breathing due to intractable chest wall pain, which is worse on inspiration. He only takes shallow breaths. On examination, multiple bruises and tender points are noted on his chest. A non-contrast CT scan of the chest reveals multiple bilateral rib fractures as well a small pneumothorax on the right side. Which one of the following options is the most appropriate immediate treatment to help him with breathing?", "options": "A. Intubation.\nB. Morphine.\nC. Chest strapping.\nD. Needle aspiration of the pneumothorax.\nE. Underwater-sealed chest drain.", "answer": "B. Morphine.", "explanation": "### ✅ Correct Answer: B. Morphine.\nThe patient has multiple rib fractures and a small pneumothorax but is haemodynamically stable with adequate oxygenation (SpO₂ 96%). His primary issue is **hypoventilation due to pain**, leading to shallow breathing. This increases the risk of atelectasis, pneumonia, and respiratory failure. **Adequate analgesia** is the cornerstone of management for blunt chest trauma with rib fractures. Morphine provides effective pain relief, allowing deeper breaths, improved cough, and prevention of pulmonary complications. The pneumothorax is small and likely asymptomatic (given stable vitals and SpO₂), so it does not require immediate drainage. The priority is to treat the pain to improve ventilation.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Intubation.**: Intubation and mechanical ventilation are reserved for patients with respiratory failure, flail chest with respiratory distress, or significant hypoxia. This patient is stable and oxygenating well; intubation is not indicated and carries risks.\n- **C. Chest strapping.**: Chest strapping or binding is contraindicated in rib fractures as it restricts chest expansion, promotes atelectasis, and increases the risk of pneumonia. Modern management emphasises analgesia and deep breathing exercises.\n- **D. Needle aspiration of the pneumothorax.**: Needle aspiration is typically for primary spontaneous pneumothorax. In trauma, a small (<2 cm rim, asymptomatic) pneumothorax can often be managed conservatively with observation, especially if the patient is stable. Immediate aspiration is not the priority over pain control.\n- **E. Underwater-sealed chest drain.**: Chest drain insertion is indicated for a large or symptomatic pneumothorax, tension pneumothorax, or if the patient is to be ventilated. This small pneumothorax in a stable, spontaneously breathing patient does not require immediate drainage.\n\n### 📚 Relevant Guidelines\n- **Royal Australian College of General Practitioners (RACGP) - Chest trauma**: Management of rib fractures focuses on analgesia, deep breathing, and early mobilisation to prevent complications — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/chest-trauma\n- **Therapeutic Guidelines (eTG) - Analgesia in trauma**: Opioids like morphine are first-line for severe pain in trauma patients to facilitate breathing and prevent atelectasis — https://tgldcdp.tg.org.au/viewTopic?topicfile=analgesia-in-trauma\n- **ATLS (Advanced Trauma Life Support) - Thoracic trauma**: Emphasises that adequate analgesia is critical for patients with rib fractures to maintain ventilation and avoid intubation — https://www.facs.org/quality-programs/trauma/atls", "image_path": ""}, {"id": 35047, "date": "2026-03-09T07:42:21+00:00", "stem": "Mother present to you as her son 16 year old is consuming alcohol and he came home drunken on weekend she left her father because he also use to drink now what about future you will tell mother", "options": "1. He is at risk drinking in future\n2. You can't tell anything it's early\n3. It's safe to drink on weekend", "answer": "1. He is at risk drinking in future", "explanation": "### ✅ Correct Answer: 1. He is at risk drinking in future\nAdolescent alcohol use, especially at age 16, is a significant risk factor for developing alcohol use disorder (AUD) later in life. Early initiation of drinking is strongly associated with increased lifetime risk of dependence. Additionally, the mother's history (leaving the father due to his drinking) suggests a possible genetic and environmental risk for alcohol-related problems. The clinician should provide **honest, evidence-based counselling** to the mother, explaining that early alcohol use increases future risk, and discuss strategies for prevention and monitoring. This aligns with a preventive and family-centred approach.\n\n### ❌ Why the Other Options Are Wrong\n- **2. You can't tell anything it's early**: This is incorrect and non-therapeutic. Medical evidence clearly shows that early alcohol use is a predictor of future problems. Dismissing the mother's concerns misses an opportunity for early intervention and education.\n- **3. It's safe to drink on weekend**: This is dangerously incorrect. Alcohol is harmful to the developing adolescent brain, impairs judgement, and is illegal for minors in Australia. Normalising underage drinking contradicts public health guidelines and clinical advice.\n\n### 📚 Relevant Guidelines\n- **Australian Guidelines to Reduce Health Risks from Drinking Alcohol (NHMRC)**: State that for people under 18, no level of drinking is considered safe, and delaying the initiation of drinking is protective — https://www.nhmrc.gov.au/health-advice/alcohol\n- **RACGP - Adolescent health**: Guidelines highlight the importance of screening for substance use in adolescents and providing brief interventions and family counselling — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/adolescent-health\n- **WHO - Global status report on alcohol and health**: Emphasises that early initiation of alcohol use is a major risk factor for developing alcohol-related harms later in life — https://www.who.int/publications/i/item/9789241565639", "image_path": ""}, {"id": 35070, "date": "2026-03-10T04:57:20+00:00", "stem": "A boy with 6 weeks history of breathlessness, cough, worsening of cough at night. Patient started getting symptoms after starting football at school. History of hay fever (+). Patient had salbutamol for wheeze associated with viral infection in past and asking for management.", "options": "ICS\nICS + LABA\nSalbutamol before sports\nSalbutamol before sports and at night", "answer": "A. ICS", "explanation": "### ✅ Correct Answer: A. ICS\nThis is a classic presentation of **persistent asthma** in a child, likely triggered by exercise and allergic rhinitis (hay fever). The key features are: chronic symptoms (>6 weeks), nocturnal worsening, exercise-induced symptoms (football), and a history of atopy (hay fever) and previous wheeze requiring bronchodilator. According to Australian and international paediatric asthma guidelines, the first-line controller therapy for persistent asthma in children is a **low-dose inhaled corticosteroid (ICS)**. ICS reduces airway inflammation, controls symptoms, prevents exacerbations, and improves lung function. Starting with ICS alone is appropriate before considering combination therapy (ICS+LABA). Using salbutamol only before sports (options 3 & 4) is insufficient as it provides only symptomatic relief without addressing the underlying inflammation, and nocturnal symptoms indicate the need for daily controller therapy.\n\n### ❌ Why the Other Options Are Wrong\n- **B. ICS + LABA**: Combination therapy (ICS+LABA) is typically reserved for **moderate to severe persistent asthma** in children **only after a trial of medium-dose ICS monotherapy has failed to achieve control**. This patient's presentation suggests mild-moderate persistent asthma, making low-dose ICS the appropriate first step.\n- **C. Salbutamol before sports**: This is a **reliever-only strategy** and is inadequate for persistent asthma. It treats bronchoconstriction temporarily but does not address the chronic airway inflammation, leading to poor long-term control, risk of exacerbations, and potential over-reliance on SABA.\n- **D. Salbutamol before sports and at night**: Similar to option C, this is an **inadequate reliever-only regimen**. Adding nocturnal dosing does not change the fact that no controller therapy is prescribed. Nocturnal symptoms are a key indicator of uncontrolled asthma and specifically require anti-inflammatory controller treatment.\n\n### 📚 Relevant Guidelines\n- **National Asthma Council Australia - Australian Asthma Handbook**: Provides evidence-based guidelines for asthma diagnosis and management across all age groups, including stepwise treatment for paediatric asthma. — https://www.asthmahandbook.org.au/\n- **Therapeutic Guidelines (eTG) - Asthma**: Offers concise, practical advice on pharmacological management of asthma, including initial controller therapy choices. — https://tgldcdp.tg.org.au/etgaccess\n- **Global Initiative for Asthma (GINA)**: International strategy for asthma management and prevention, which aligns with Australian guidelines on the central role of ICS in persistent asthma. — https://ginasthma.org/", "image_path": ""}, {"id": 35112, "date": "2026-03-17T09:16:14+00:00", "stem": "25-year-old woman-- ask about cervical screening. She reports never having had any sexual contact of any kind, She is otherwise healthy and vaccinated for HPV. She asks if she needs a screening test now. What is the most appropriate advice?", "options": "Proceed with cervical screening test now\nAdvise that screening is not required at present given no sexual activity\nDelay screening until age 30\nOffer colposcopy instead\nOffer yearly cytology rather than HPV test", "answer": "2. Advise that screening is not required at present given no sexual activity", "explanation": "### ✅ Correct Answer: 2. Advise that screening is not required at present given no sexual activity\nCervical cancer is caused by persistent infection with high-risk human papillomavirus (HPV), which is sexually transmitted. The primary goal of cervical screening is to detect HPV infection and related precancerous changes. This patient has **never had any sexual contact**, which means her risk of acquiring HPV is negligible. Even though she is vaccinated, vaccination protects against the most common oncogenic strains but not all. The fundamental principle is that screening is only indicated for individuals who have been sexually active. The Australian National Cervical Screening Program recommends starting screening at age 25, but this is contingent on having had any sexual contact. Therefore, the most appropriate and evidence-based advice is to defer screening until she becomes sexually active. There is no clinical indication to perform a test, delay until 30, offer colposcopy (an invasive diagnostic procedure for abnormal screening results), or switch to a different screening modality.\n\n### ❌ Why the Other Options Are Wrong\n- **1. Proceed with cervical screening test now**: This is incorrect and represents unnecessary screening. Performing a test on someone with no risk of HPV exposure has no benefit, can cause patient anxiety, and wastes healthcare resources. It goes against the principle of screening only those at risk.\n- **3. Delay screening until age 30**: This is incorrect because the issue is not her age, but her lack of sexual exposure. The guideline recommends starting at 25 for those who are sexually active. Simply delaying to 30 does not address the core reason screening is not indicated.\n- **4. Offer colposcopy instead**: This is incorrect and potentially harmful. Colposcopy is a diagnostic procedure indicated after an abnormal screening test (e.g., positive for HPV 16/18 or persistent HPV with cytological abnormality). It is never a first-line screening tool.\n- **5. Offer yearly cytology rather than HPV test**: This is incorrect and outdated. The Australian program uses primary HPV testing every 5 years due to its higher sensitivity. Yearly cytology is not recommended for anyone, and the screening modality is not the issue—the need for any screening is.\n\n### 📚 Relevant Guidelines\n- **National Cervical Screening Program (Australian Government Department of Health and Aged Care)**: Outlines the guidelines for cervical screening in Australia, including the recommendation to start at age 25 for people who have ever been sexually active. — https://www.health.gov.au/our-work/national-cervical-screening-program\n- **The Royal Australian College of General Practitioners (RACGP) Guidelines for Preventive Activities in General Practice**: Provides guidance on cervical screening, emphasizing targeting sexually active individuals. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice\n- **Cancer Council Australia Cervical Cancer Screening Guidelines**: Evidence-based guidelines supporting the commencement of screening based on sexual activity history. — https://wiki.cancer.org.au/australia/Guidelines:Cervical_cancer/Screening", "image_path": ""}, {"id": 35119, "date": "2026-03-18T13:07:43+00:00", "stem": "A 45-year-old man presents with a 3-month history of chronic cough, intermittent fever, night sweats, weight loss, and occasional hemoptysis. Chest examination reveals crackles in the upper lobes. What is the most likely diagnosis?", "options": "Bronchiectasis\nCommunity-acquired pneumonia\nTuberculosis\nLung abscess\nPulmonary embolism", "answer": "c) Tuberculosis", "explanation": "### ✅ Correct Answer: c) Tuberculosis\nThe classic presentation of pulmonary tuberculosis (TB) includes a **chronic cough (>3 weeks), fever, night sweats, weight loss (constitutional symptoms), and hemoptysis**. Physical exam findings of crackles in the **upper lobes** are highly suggestive because TB has a predilection for the apical and posterior segments of the upper lobes and the superior segments of the lower lobes due to higher oxygen tension. This subacute to chronic timeline (3 months) with systemic symptoms is characteristic of TB, not typical of acute infections. Hemoptysis can occur from caseation necrosis and cavitation. This constellation of symptoms in an adult should always raise suspicion for TB until proven otherwise.\n\n### ❌ Why the Other Options Are Wrong\n- **a) Bronchiectasis**: While bronchiectasis can cause chronic cough and hemoptysis, it is typically associated with copious purulent sputum production and coarse, persistent crackles often in the lower lobes. It does not classically present with the prominent constitutional symptoms (significant fever, night sweats, weight loss) seen here.\n- **b) Community-acquired pneumonia (CAP)**: CAP presents acutely (days to a week or two) with fever, cough, and possibly pleuritic pain. It would not typically cause a 3-month history of progressive weight loss and night sweats. Crackles in CAP are not specific to the upper lobes.\n- **d) Lung abscess**: This usually presents with a more subacute course of fever, cough, and foul-smelling sputum. Weight loss can occur, but the classic finding is a cavity with an air-fluid level on imaging. While it can cause hemoptysis, the very chronic nature and prominent systemic symptoms are more aligned with TB.\n- **e) Pulmonary embolism (PE)**: PE presents acutely with sudden-onset dyspnea, pleuritic chest pain, and possibly hemoptysis. It does not cause a chronic cough, fever, night sweats, or weight loss over months. Crackles are not a typical finding in PE.\n\n### 📚 Relevant Guidelines\n- **Australian Government Department of Health – Tuberculosis**: Provides clinical guidance on the diagnosis and management of TB in Australia, including the classic symptom complex. — https://www.health.gov.au/resources/publications/tuberculosis\n- **Therapeutic Guidelines (eTG) – Tuberculosis**: Details the diagnostic approach and treatment for TB, emphasizing the importance of recognizing the chronic symptomatic presentation. — https://tgldcdp.tg.org.au/viewTopic?topicfile=tuberculosis&guidelineName=Antibiotic#toc_d1e288\n- **World Health Organization (WHO) Global Tuberculosis Report**: Highlights the clinical features and global burden of TB, reinforcing the classic symptomatology. — https://www.who.int/teams/global-tuberculosis-programme/tb-reports", "image_path": ""}, {"id": 35166, "date": "2026-03-23T11:44:50+00:00", "stem": "A 2-year-old child presents with fever, cough, and is now in ED. Temperature 39.2°C, BP unrecordable, fitted. Given intranasal midazolam 2 times but continues to fit for another 15 minutes. Manage to get IV cannula. FBC normal, glucose 3.8 mmol/L. What is the next appropriate step?", "options": "A. Midazolam\nB. Levetiracetam\nC. Diazepam\nD. Paracetamol\nE. Glucose", "answer": "B. Levetiracetam", "explanation": "### ✅ Correct Answer: B. Levetiracetam\nThis is a case of **refractory status epilepticus**. The child has been seizing for >15 minutes despite two doses of a benzodiazepine (intranasal midazolam), meeting the definition. According to paediatric status epilepticus management guidelines, the next step after failure of first-line benzodiazepines is administration of a second-line anti-epileptic drug (AED). Intravenous levetiracetam is a preferred second-line agent due to its rapid onset, good safety profile, and broad-spectrum activity. The glucose level of 3.8 mmol/L is within the normal range (normal paediatric range ~3.5-5.5 mmol/L), so hypoglycaemia is not the cause, making glucose administration incorrect. Further benzodiazepines (midazolam or diazepam) at this stage risk respiratory depression without significantly improved seizure control. Paracetamol is for fever management, not for stopping active seizures.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Midazolam**: The child has already received two doses of a benzodiazepine (midazolam) without cessation of seizure activity. Administering more risks significant respiratory depression and is not the recommended next step in algorithm-based management.\n- **C. Diazepam**: Similar to midazolam, diazepam is a first-line benzodiazepine. Using another benzodiazepine after two failed doses is not standard care and increases the risk of adverse effects without proven additional efficacy for seizure termination.\n- **D. Paracetamol**: While fever management is important, it does not address the immediate life-threatening condition of ongoing status epilepticus. Antipyretics are supportive, not abortive therapy for active seizures.\n- **E. Glucose**: The blood glucose level of 3.8 mmol/L is normal for a child. Hypoglycaemia is typically defined as <3.0 mmol/L in children. Therefore, glucose is not indicated as the cause of the refractory seizure.\n\n### 📚 Relevant Guidelines\n- **[The Royal Children's Hospital Melbourne - Clinical Practice Guideline: Status Epilepticus]**: Provides a clear algorithm for paediatric status epilepticus management, specifying second-line agents (like levetiracetam or phenytoin) after benzodiazepine failure. — https://www.rch.org.au/clinicalguide/guideline_index/Status_epilepticus/\n- **[Epilepsy Society - Guidelines for the management of convulsive status epilepticus in children]**: Evidence-based guidelines outlining the stepwise pharmacological management. — https://www.epilepsysociety.org.uk/sites/default/files/2021-05/Status%20Epilepticus%20in%20Children%20Guideline%202021.pdf\n- **[UpToDate - Management of convulsive status epilepticus in children]**: Detailed review of treatment protocols and agent selection. — https://www.uptodate.com/contents/management-of-convulsive-status-epilepticus-in-children", "image_path": ""}, {"id": 35167, "date": "2026-03-23T11:55:44+00:00", "stem": "A football player is kicked in the abdomen and develops right upper quadrant pain. What is the next investigation?", "options": "1. FAST ultrasound\n2. CT abdomen\n3. X-ray abdomen\n4. MRI abdomen", "answer": "1. FAST ultrasound", "explanation": "### ✅ Correct Answer: 1. FAST ultrasound\nIn the context of **blunt abdominal trauma**, the Focused Assessment with Sonography in Trauma (FAST) scan is the **first-line, bedside investigation** of choice. It is rapid, non-invasive, repeatable, and does not involve radiation. Its primary goal is to detect free fluid (blood) in the peritoneal, pericardial, or pleural spaces, which in this setting of trauma is highly suggestive of solid organ injury (e.g., liver or spleen, given the RUQ pain). A positive FAST in an unstable patient would lead directly to emergency laparotomy. A negative FAST in a stable patient might be followed by further imaging (like CT) if clinical suspicion remains. CT abdomen, while highly accurate for defining specific organ injuries, is not typically the *next* or first investigation in an acute trauma setting; it is used for stable patients or after FAST. X-ray abdomen has very limited utility in blunt trauma for detecting visceral injury. MRI is not used in the acute trauma setting due to long scan times, limited availability, and difficulty monitoring unstable patients.\n\n### ❌ Why the Other Options Are Wrong\n- **2. CT abdomen**: This is a definitive investigation for stable trauma patients to characterise specific organ injuries. However, it is not the *next* step in the initial assessment of acute abdominal trauma. It requires patient stability, transport to the scanner, and involves radiation. FAST should precede CT in the algorithmic approach.\n- **3. X-ray abdomen**: Plain films are poor at detecting intra-abdominal bleeding or solid organ injury. They may show signs like free air (hollow viscus injury) or loss of psoas shadow, but these are insensitive. FAST has largely replaced plain films in the primary survey of trauma.\n- **4. MRI abdomen**: MRI has no role in the acute investigation of abdominal trauma. It is time-consuming, less accessible, and unsuitable for potentially unstable patients. It is reserved for elective, detailed characterisation of specific problems.\n\n### 📚 Relevant Guidelines\n- **[ATLS - Advanced Trauma Life Support, American College of Surgeons]**: Emphasises FAST as part of the primary survey (Circulation with haemorrhage control) in blunt abdominal trauma to rapidly identify free fluid. — https://www.facs.org/quality-programs/trauma/atls\n- **[Royal Australasian College of Surgeons - Management of Blunt Abdominal Trauma]**: Australian guidelines supporting the use of FAST in the initial assessment of trauma patients. — https://www.surgeons.org/media/311321/guideline_management_of_blunt_abdominal_trauma.pdf\n- **[eTG (Therapeutic Guidelines) - Trauma]**: Provides an algorithmic approach to trauma management, including the place of FAST ultrasound. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Trauma&frompage=etg", "image_path": ""}, {"id": 35181, "date": "2026-03-23T12:16:42+00:00", "stem": "A 64-year-old man presents to the emergency department with right arm pain. Two days ago, he fell while weeding the garden, resulting in immediate pain in his right arm. It has not improved, so he attended the emergency department. He has also experienced worsening back pain and constipation over the last six months. He has had no pain elsewhere. His daughter reports he is more forgetful than usual. He has a history of prostate cancer treated with surgery five years ago.\nOn examination, he has tenderness along his right humerus, with significantly reduced range of motion at his right shoulder. His right arm is neurovascularly intact distally. He has tenderness of his lumbar spine, worse on the right, but preserved range of motion. His lower limb neurological examination is unremarkable. His abdominal examination is normal.\nAn X-ray of his right humerus shows a fracture line through some lytic areas in the metaphysis and diaphysis. An X-ray of his lumbar spine shows several small lytic lesions in the vertebral bodies. An abdominal X-ray demonstrates faecal loading. He has no leg oedema. His laboratory results show:\n • Haemoglobin 91 g/l (132-172)\n • Creatinine 70 µmol/l (60-110)\n • Urea 4.1 mmol/L (3.0-8.0)\n • Mean Corpuscular Volume 90fL (80-100)\n • Platelet Count 159 x 10^9/L (150-450)\n • Sodium 137 mmol/L (135-145)\n • Potassium 4.1 mmol/L (3.5-5.1)\n • Chloride 107 mmol/L (98-107)\n • Bicarbonate 24 mmol/L (22-30)\n • Glucose 4.9 mmol/L (3.9-5.8)\n • Calcium 2.85 mmol/L (2.15-2.55)\n\nMost **likely cause of patient current condition?", "options": "Multiple myeloma\nParaneoplastic syndrome\nAmyloidosis\nMetastatic spread\nSpinal cord decompression", "answer": "A. Multiple myeloma", "explanation": "### ✅ Correct Answer: A. Multiple myeloma\nThis patient presents with a classic constellation of findings for multiple myeloma: 1) **Pathological fractures** (right humerus fracture through lytic areas), 2) **Bone pain** (back pain), 3) **Hypercalcaemia** (Ca 2.85 mmol/L), 4) **Anaemia** (Hb 91 g/L, normocytic), 5) **Renal function** currently normal but at risk, and 6) **Lytic bone lesions** on imaging (humerus and spine). The history of prostate cancer is a potential red herring, but the lytic (punched-out) lesions are characteristic of myeloma, whereas prostate cancer metastases are typically **blastic** (sclerotic). The hypercalcaemia, anaemia, and bone pain form the classic 'CRAB' features (Hypercalcaemia, Renal failure, Anaemia, Bone lesions). The forgetfulness could be related to hypercalcaemia. Constipation is also a symptom of hypercalcaemia. The normal platelet count and lack of other cytopenias make other haematological malignancies less likely.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Paraneoplastic syndrome**: While prostate cancer can cause paraneoplastic syndromes (e.g., Lambert-Eaton myasthenia), they do not typically cause widespread lytic bone lesions, hypercalcaemia, and anaemia together. The presentation is more specific to a primary haematological malignancy.\n- **C. Amyloidosis**: Can be associated with multiple myeloma (AL amyloidosis) and may cause renal failure, neuropathy, and macroglossia, but it does not typically cause multiple lytic bone lesions or hypercalcaemia as the primary presentation.\n- **D. Metastatic spread**: Metastatic prostate cancer is a strong consideration given the history. However, prostate cancer metastases to bone are overwhelmingly **osteoblastic** (sclerotic, dense) rather than lytic. The lytic nature of the lesions on X-ray strongly argues against prostate cancer metastases as the primary cause.\n- **E. Spinal cord decompression**: This is a complication (e.g., from vertebral collapse or epidural disease) rather than the underlying cause of the condition. The question asks for the cause of his *current condition*.\n\n### 📚 Relevant Guidelines\n- **[Cancer Council Australia - Multiple Myeloma Guidelines]**: Australian guidelines for the diagnosis and management of multiple myeloma. — https://wiki.cancer.org.au/australia/Guidelines:Myeloma\n- **[UpToDate - Clinical features, laboratory manifestations, and diagnosis of multiple myeloma]**: Detailed resource on the diagnostic criteria and typical presentation of myeloma, including CRAB features. — https://www.uptodate.com/contents/clinical-features-laboratory-manifestations-and-diagnosis-of-multiple-myeloma\n- **[eTG complete - Multiple myeloma]**: Therapeutic Guidelines Australia section on the management of multiple myeloma. — https://tgldcdp.tg.org.au/viewTopic?topicfile=multiple-myeloma&guidelineName=Haematology#toc_d1e289", "image_path": ""}, {"id": 35194, "date": "2026-03-23T14:49:03+00:00", "stem": "A 32-year-old man presents with a six month history of increasing difficulty in urinating. He is able to start without any problems, but has to strain to pass urine. Whilst it does take increasing longer, he feels that he can empty his bladder. There is some dribbling at the end of micturition. He does not have any frequency and he only gets up to void at night if he has a large quantity of liquid to drink in the evenings. His medical history is unremarkable, apart from a pelvic fracture from a motorbike crash when he was 21. The physical examination, including a digital rectal examination is unremarkable and his bladder is not distended. Which one of the following is the most appropriate investigation?", "options": "1. Prostate specific antigen\n2. CT abdomen and pelvis\n3. Trans-rectal ultrasound-guided biopsy (TRUS)\n4. Urethroscopy\n5. Retrograde urethrogram", "answer": "5. Retrograde urethrogram", "e
