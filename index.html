regates) and minor (elevated tryptase, typical symptoms) criteria. — https://www.uptodate.com/contents/systemic-mastocytosis-clinical-manifestations-pathogenesis-and-diagnosis\n- **Therapeutic Guidelines Australia (eTG) – Anaphylaxis**: Notes that mastocytosis is a risk factor for severe anaphylaxis and discusses management. — https://tgldcdp.tg.org.au/viewTopic?topicfile=anaphylaxis&guidelineName=Emergency\n- **WHO Classification of Tumours of Haematopoietic and Lymphoid Tissues**: Provides the definitive diagnostic criteria for systemic mastocytosis. — https://tumourclassification.iarc.who.int/chaptercontent/63/80", "image_path": ""}, {"id": 34344, "date": "2026-02-02T22:42:40+00:00", "stem": "A 68-year-old man presents with a 2-year history of gradually progressive muscle weakness. He reports difficulty climbing stairs and rising from a chair. He also notices reduced grip strength and difficulty holding cutlery.\n\nOn examination:\n • Weakness of quadriceps and finger flexors\n • Mild muscle wasting\n • No skin rash\n • CK is mildly elevated\n • EMG shows myopathic changes\n • Muscle biopsy shows rimmed vacuoles\n\nHe has had minimal response to high-dose corticosteroids.\n\nWhat is the most likely diagnosis?", "options": "A. Polymyositis\nB. Dermatomyositis\nC. Immune-mediated necrotizing myopathy\nD. Inclusion body myositis\nE. Antisynthetase syndrome", "answer": "D", "explanation": "### ✅ Correct Answer: D. Inclusion body myositis\n\n**Clinical Reasoning:**\n1. **Demographics & Presentation:** The patient is a 68-year-old man with a **gradually progressive** (2-year history) pattern of muscle weakness. This chronic, insidious onset is characteristic of inclusion body myositis (IBM), which is the most common acquired myopathy in patients over 50.\n2. **Pattern of Weakness:** The weakness involves **quadriceps** (difficulty climbing stairs, rising from a chair) and **finger flexors** (reduced grip strength, difficulty holding cutlery). This asymmetric, distal-predominant pattern (especially finger/wrist flexor weakness) is a hallmark of IBM and helps distinguish it from other inflammatory myopathies, which are typically proximal and symmetric.\n3. **Examination & Investigations:**\n   - **No skin rash:** Excludes dermatomyositis.\n   - **Mild CK elevation:** In IBM, CK is often only mildly elevated (typically <10x ULN), unlike polymyositis where it can be significantly higher.\n   - **EMG shows myopathic changes:** Consistent with an inflammatory myopathy.\n   - **Muscle biopsy shows rimmed vacuoles:** This is the **pathognomonic histological finding** for IBM. Rimmed vacuoles are basophilic granules within muscle fibers, representing protein aggregates.\n4. **Treatment Response:** The **minimal response to high-dose corticosteroids** is a key diagnostic clue. IBM is notoriously resistant to immunosuppressive therapy, unlike other inflammatory myopathies which often show at least a partial response.\n\n**Pathophysiology:** IBM is characterized by both inflammatory (T-cell mediated) and degenerative (protein misfolding, mitochondrial dysfunction) processes. The rimmed vacuoles contain protein aggregates, including amyloid-β and phosphorylated tau, similar to findings in neurodegenerative diseases.\n\n**Management Pearls:** There is no proven effective disease-modifying therapy for IBM. Management focuses on **physical therapy, occupational therapy, and assistive devices** to maintain function and prevent falls. Immunosuppressants are generally not recommended due to lack of efficacy and significant side-effect profile.", "image_path": ""}, {"id": 34347, "date": "2026-02-03T06:01:54+00:00", "stem": "An 8-year-old girl presents with recurrent abdominal pain for several months, often missing school. There is no tenderness, normal urinalysis, and no systemic features. What is the most appropriate next step?", "options": "a. Abdominal ultrasound\nb. CT scan\nc. MRI abdomen\nd. No further investigation – reassurance\ne. Stool culture", "answer": "D", "explanation": "### ✅ Correct Answer: D. No further investigation – reassurance\n\n**Clinical Reasoning:**\n1. **Clinical Picture:** This is a classic presentation of **functional abdominal pain (FAP)** or **functional abdominal pain syndrome (FAPS)** in a school-aged child. Key features include:\n   - **Recurrent pain** over several months.\n   - **Impact on function** (missing school), which is a key criterion for diagnosis.\n   - **Absence of alarm signs:** No tenderness on examination, normal urinalysis (ruling out UTI), and no systemic features (e.g., fever, weight loss, vomiting, blood in stool, nocturnal waking).\n2. **Diagnostic Approach:** According to paediatric guidelines (e.g., Rome IV criteria, RACP), the diagnosis of functional abdominal pain is primarily **clinical**. Extensive investigation in the absence of alarm features is low-yield, can cause unnecessary anxiety, and may lead to incidental findings that complicate management.\n3. **Appropriate Management:** The most appropriate next step is **positive diagnosis and reassurance**. This involves explaining the benign, functional nature of the pain to the child and parents, emphasizing that it is real but not caused by a serious organic disease. Management then focuses on **non-pharmacological strategies**: dietary modifications (e.g., increased fiber, avoiding trigger foods), stress management, cognitive behavioural therapy, and school support to facilitate attendance.\n4. **Why Not Imaging?**\n   - **Ultrasound (A):** While often considered a low-risk test, performing it without clear indications reinforces the idea of a hidden organic cause and can be an unnecessary use of resources. It is typically reserved for cases with alarm features or specific localized findings.\n   - **CT (B) & MRI (C):** These are inappropriate as first-line investigations due to radiation exposure (CT) and cost/access issues (MRI). They are reserved for complex cases with strong suspicion of specific pathology.\n5. **Why Not Stool Culture (E)?** Recurrent pain over months without diarrhea or other GI symptoms makes an acute infectious cause very unlikely.", "image_path": ""}, {"id": 34370, "date": "2026-02-03T10:33:45+00:00", "stem": "A 35-year-old mother brings her 8-year-old daughter to the pediatric clinic for a routine check-up. The mother expresses concern about the timing of the HPV vaccine for her daughter. She has heard mixed recommendations and is unsure when it is best to start the vaccination. Which of the following is the most appropriate recommendation for the HPV vaccination for Emily?", "options": "a. Give the HPV vaccine now.\nb. Wait until Emily is 10 years old to start the HPV vaccination series.\nc. Delay vaccination until Emily is sexually active.\nd. Start the HPV vaccination series when Emily turns 18 years old.", "answer": "a. Give the HPV vaccine now.", "explanation": "### ✅ Correct Answer: a. Give the HPV vaccine now.\nThe Australian Immunisation Handbook and ATAGI guidelines recommend routine HPV vaccination for adolescents aged 12-13 years. However, vaccination can be given from age 9. The key principle is to vaccinate **before the onset of sexual activity** to ensure maximum protection against HPV infection. An 8-year-old is below the routine schedule age, but if a parent is seeking advice during a routine visit and is concerned about timing, initiating the series now is a proactive and evidence-based approach. It provides early protection and aligns with the goal of completing the series (2 doses if started before age 15, 3 doses if started at or after age 15) well before potential HPV exposure. Recommending vaccination now avoids missed opportunities and leverages the higher immune response typically seen in younger adolescents.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Wait until Emily is 10 years old to start the HPV vaccination series.**: While 10 is closer to the routine schedule age (12-13), there is no clinical or immunological reason to delay if the opportunity exists now. Waiting increases the risk of the child being missed or presenting later, potentially after exposure.\n- **c. Delay vaccination until Emily is sexually active.**: This is incorrect and dangerous. The vaccine is most effective when given **prior to HPV exposure**. Waiting until after sexual debut significantly reduces its efficacy, as the individual may already be infected with one or more HPV types covered by the vaccine.\n- **d. Start the HPV vaccination series when Emily turns 18 years old.**: This is too late according to Australian guidelines. While catch-up vaccination is funded for people up to age 25, the ideal time for vaccination is early adolescence to ensure protection before exposure. Starting at 18 misses the optimal window and may require a 3-dose schedule.\n\n### 📚 Relevant Guidelines\n- **[Australian Technical Advisory Group on Immunisation (ATAGI) / Australian Immunisation Handbook]**: Recommendations for human papillomavirus (HPV) vaccination — [https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/human-papillomavirus-hpv](https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/human-papillomavirus-hpv)\n- **[The Royal Australian College of General Practitioners (RACGP) Guidelines for preventive activities in general practice)]**: Includes recommendations on adolescent vaccination schedules — [https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice](https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice)\n- **[World Health Organization (WHO) Position Paper on HPV Vaccines]**: Recommends vaccination of girls aged 9-14 years prior to sexual debut — [https://www.who.int/publications/i/item/who-wer-92-19-241-268](https://www.who.int/publications/i/item/who-wer-92-19-241-268)", "image_path": ""}, {"id": 34374, "date": "2026-02-03T10:49:35+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia), which are absolute indications for urgent red blood cell (RBC) transfusion. The primary goal is to restore circulating volume and oxygen-carrying capacity to prevent end-organ damage, shock, and death. In acute haemorrhage, the haemoglobin level is a less reliable initial guide than clinical signs of shock, as haemodilution may not have occurred yet. The patient's age and acute bleed also place him at high risk of rapid decompensation. Transfusion in this context is part of a broader resuscitation strategy, which includes securing the source of bleeding (e.g., endoscopy).\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This patient has **chronic, stable anaemia** and is asymptomatic. Transfusion is not indicated as first-line therapy. The correct management is to treat the underlying cause (iron deficiency) with oral iron supplementation and manage the menorrhagia. Transfusion in chronic anaemia is reserved for severe symptoms or specific clinical contexts, not a stable Hb of 70 g/L.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with significant cardiac disease may have a higher transfusion threshold (often Hb <80 g/L), this patient is **asymptomatic** and has a chronic, stable anaemia. There is no acute indication for transfusion. The focus should be on investigating the cause of the normocytic anaemia.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is **postpartum anaemia**, likely due to blood loss at delivery. She is well and asymptomatic. Postpartum Hb levels often naturally improve with time and iron therapy. Transfusion is not indicated in an asymptomatic patient with this haemoglobin level.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This haemoglobin level is **above the typical threshold** for transfusion in chemotherapy-induced anaemia. Guidelines generally recommend transfusion for Hb <80 g/L or <100 g/L if symptomatic (e.g., severe fatigue, dyspnoea, chest pain). 'Mild fatigue only' does not constitute a compelling symptom for transfusion at this level.\n\n### 📚 Relevant Guidelines\n- **National Blood Authority Australia (NBA) Patient Blood Management Guidelines** — Provides evidence-based recommendations on transfusion thresholds in various clinical scenarios, emphasising restrictive transfusion practices. — [https://www.blood.gov.au/pbm-guidelines](https://www.blood.gov.au/pbm-guidelines)\n- **Therapeutic Guidelines Australia (eTG) – Blood and Blood Products** — Offers concise clinical advice on when to transfuse, including specific thresholds for acute haemorrhage, chronic anaemia, and cardiac disease. — [https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-blood-products](https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-blood-products)\n- **Choosing Wisely Australia – Transfusion Medicine** — Promotes avoiding unnecessary transfusions, reinforcing that stable, chronic anaemia is not an indication for transfusion. — [https://www.choosingwisely.org.au/recommendations/ranzco](https://www.choosingwisely.org.au/recommendations/ranzco)", "image_path": ""}, {"id": 34375, "date": "2026-02-03T10:49:51+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a **well-known, potent oxidant trigger** for acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic: a young man of Middle Eastern descent (a high-prevalence population for G6PD deficiency) presents 1-3 days after exposure to an offending agent with symptoms of haemolysis—dark urine (haemoglobinuria), jaundice (from unconjugated hyperbilirubinaemia), fatigue (from anaemia). The lab findings confirm **intravascular haemolysis**: low Hb, elevated reticulocytes (bone marrow compensation), elevated indirect bilirubin, and the pathognomonic peripheral blood film findings of **\"bite cells\" and blister cells**. These are red blood cells damaged by oxidative stress, leading to Heinz body formation and subsequent removal by the spleen, creating the characteristic morphology. Dapsone is frequently used for dermatological conditions (e.g., dermatitis herpetiformis) and as prophylaxis for Pneumocystis jirovecii pneumonia, but its strong oxidant properties make it a classic exam trigger for G6PD haemolysis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is **not a significant oxidant stressor** and is generally considered safe in standard therapeutic doses for patients with G6PD deficiency. It does not typically precipitate acute haemolysis.\n- **B. Amoxicillin**: Penicillins like amoxicillin are **not common causes of oxidative haemolysis** in G6PD deficiency. They are more associated with immune-mediated haemolytic anaemia (e.g., via drug-dependent antibodies), which is a different mechanism and not suggested by the blood film showing bite cells.\n- **D. Metformin**: This antidiabetic drug is **not known to cause oxidant stress** or haemolysis in G6PD deficiency. Its side effects are gastrointestinal or, rarely, lactic acidosis.\n- **E. Prednisolone**: Corticosteroids like prednisolone are **not oxidant drugs** and do not trigger haemolysis in G6PD deficiency. They are, in fact, sometimes used in the management of other types of autoimmune haemolytic anaemia.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) – G6PD Deficiency** — Lists drugs and substances to avoid in G6PD deficiency, including dapsone, sulfonamides, and nitrofurantoin. — [https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia-haemolytic](https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia-haemolytic)\n- **UpToDate – Diagnosis and management of G6PD deficiency** — Comprehensive review of the pathophysiology, triggers, and management, including a detailed list of unsafe medications. — [https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-deficiency-diagnosis-and-management](https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-deficiency-diagnosis-and-management)\n- **WHO Working Group – Glucose-6-phosphate dehydrogenase deficiency** — Provides a global perspective, including prevalence in different ethnic groups and a classification of unsafe drugs. — [https://apps.who.int/iris/handle/10665/44627](https://apps.who.int/iris/handle/10665/44627)", "image_path": ""}, {"id": 34416, "date": "2026-02-04T10:43:06+00:00", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech.  The patient was in his usual state of health last night but awoke this morning with these symptoms.  He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease.  The patient does not drink alcohol regularly but has a 45-pack-year history.  Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia.  CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery.  The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility.  Forty-eight hours later, he becomes obtunded.  Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min.  Physical examination now shows complete right hemiplegia and deviation of the eyes to the left.  Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E. Repeat CT scan of the head", "explanation": "### ✅ Correct Answer: E. Repeat CT scan of the head\n\nThis patient presents with a classic history of a large left middle cerebral artery (MCA) territory ischemic stroke, confirmed on initial CT. The critical development is his neurological deterioration 48 hours later, becoming obtunded with new signs of complete right hemiplegia and left gaze deviation. This timeline and presentation are highly suggestive of **malignant cerebral edema** secondary to a large MCA infarction, which typically peaks at 2-5 days post-stroke.\n\n**Clinical Reasoning:**\n1.  **Pathophysiology:** Large MCA infarcts cause cytotoxic edema as ischemic brain cells swell. This can progress to significant mass effect, midline shift, and transtentorial herniation, leading to decreased consciousness (obtundation), pupillary changes, and Cushing's triad (hypertension, bradycardia, irregular respirations). The low-grade fever (38.3°C) is a common inflammatory response to large brain injury, not necessarily indicative of infection.\n2.  **Key Diagnostic Feature:** The **most urgent next step** is to confirm the suspected edema and assess for midline shift or herniation. A **non-contrast CT head is the fastest, most accessible imaging modality** for this purpose in an emergency setting. It can quickly identify significant edema, effacement of sulci/ventricles, and midline shift, which would guide immediate life-saving interventions.\n3.  **Management Pearls:** If the repeat CT confirms significant edema with mass effect, management may include urgent neurosurgical consultation for possible decompressive hemicraniectomy (which is life-saving for patients <60 years with malignant MCA edema), as well as medical measures like head elevation, hyperosmolar therapy (mannitol or hypertonic saline), and controlled hyperventilation as a temporary bridge.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood cultures and empiric antibiotics:** While fever post-stroke warrants evaluation for infection (e.g., aspiration pneumonia, UTI), the primary driver of his acute neurological decline is far more likely to be cerebral edema. Starting antibiotics without a clear source delays addressing the immediate life-threatening cause.\n- **B. Intravenous hypertonic saline and observation / C. Intravenous mannitol and observation:** Hyperosmolar therapy (mannitol or hypertonic saline) is a **treatment** for cerebral edema, but it should not be initiated empirically without first **confirming the diagnosis and assessing the severity** on imaging. Giving these agents without confirming significant edema is inappropriate and carries risks (e.g., renal injury, electrolyte disturbances, rebound ICP).\n- **D. MRI of the head:** MRI (especially DWI) is superior for detailing acute ischemic stroke and can assess for edema. However, it is **less appropriate as the first test in this acute, deteriorating scenario**. MRI is often less readily available, takes longer, and is less suitable for unstable patients. The clinical question here is about mass effect, which a CT scan answers quickly and adequately.\n\n### 📚 Relevant Guidelines\n- **[National Stroke Foundation (Stroke Foundation Australia) - Clinical Guidelines for Stroke Management]**: Provides comprehensive Australian guidelines for acute stroke management, including monitoring for and managing complications like cerebral edema. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[UpToDate - Management of Acute Ischemic Stroke]**: Details the recognition and management of complications following ischemic stroke, including malignant cerebral edema. — https://www.uptodate.com/contents/management-of-acute-ischemic-stroke\n- **[American Heart Association/American Stroke Association (AHA/ASA) Guidelines for the Early Management of Patients With Acute Ischemic Stroke]**: International guidelines that address the management of neurological deterioration, including the role of repeat imaging and decompressive surgery. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211", "image_path": ""}, {"id": 34417, "date": "2026-02-04T10:43:16+00:00", "stem": "A mother is concerned that her child has stopped seeing friends and discarded his laptop, claiming he was receiving **special messages from Facebook**. There is social withdrawal and odd beliefs. What is the **most important mental function to assess**?", "options": "a. Self-esteem\nb. Insight\nc. Mood\nd. Judgment\ne. Reality testing", "answer": "e. Reality testing", "explanation": "### ✅ Correct Answer: e. Reality testing\n\n**Clinical Reasoning:**\nThe core presentation here is of a **possible psychotic disorder** (e.g., schizophrenia, schizophreniform disorder) emerging in a young person. The key features are:\n1.  **Social withdrawal:** A negative symptom common in psychosis.\n2.  **Odd beliefs/delusions:** The belief in receiving \"special messages from Facebook\" is a **delusion of reference**, where neutral stimuli are believed to have special, personal significance.\n3.  **Potential hallucinations:** The \"messages\" could also imply auditory or visual hallucinations.\n\nIn mental state examination (MSE), the **most critical function to assess when psychosis is suspected is reality testing**. Reality testing refers to the individual's ability to distinguish between internally generated experiences (thoughts, feelings) and external reality. Its impairment is the hallmark of psychosis. Assessing this involves exploring the nature, fixity, and conviction of the odd beliefs (delusions) and any perceptual disturbances (hallucinations). Establishing the presence and severity of impaired reality testing is fundamental to diagnosing a psychotic disorder and gauging its acuity.\n\nWhile other functions are important:\n- **Insight (b)** is crucial for management and prognosis but follows the establishment of a psychotic diagnosis.\n- **Mood (c)** should be assessed to rule out a primary affective psychosis (e.g., psychotic depression, bipolar disorder), but the primary phenomenological disturbance appears psychotic.\n- **Judgment (d)** is often impaired but is a broader, more functional assessment.\n- **Self-esteem (a)** is less directly relevant to the core diagnostic question.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Self-esteem:** While low self-esteem can be associated with many psychiatric conditions, it is not the primary or most specific mental function to assess when the presentation is strongly suggestive of a psychotic disorder with delusions and social withdrawal.\n- **b. Insight:** Insight—the patient's awareness that their experiences are symptoms of an illness—is a **very important** assessment, particularly for treatment adherence. However, it is typically assessed **after** the presence of psychotic symptoms (impaired reality testing) has been established. In early psychosis, insight is often poor or absent.\n- **c. Mood:** Assessment of mood is essential to differentiate a primary psychotic disorder from a mood disorder with psychotic features. However, the vignette's emphasis is on \"odd beliefs\" and withdrawal, pointing directly to the core psychotic symptom domain. Reality testing takes precedence to confirm the psychotic nature of these beliefs.\n- **d. Judgment:** Judgment refers to the ability to make sound decisions. It is frequently impaired in psychosis but is a more general functional consequence of the illness. The most direct path to diagnosis is assessing the specific psychotic symptom (impaired reality testing) that likely underlies the poor judgment.\n\n### 📚 Relevant Guidelines\n- **[RANZCP Clinical Practice Guidelines for the Management of Schizophrenia and Related Disorders]**: The leading Australian/New Zealand guidelines for psychosis. They detail the diagnostic assessment, which prioritises identifying core psychotic symptoms like delusions and hallucinations (impairments in reality testing). — https://www.ranzcp.org/files/resources/college-statements/clinician/cpg/clinician-cpg-cpg-for-schizophrenia-and-relat.aspx\n- **[NICE Guidelines CG178 - Psychosis and schizophrenia in adults: prevention and management]**: Provides a comprehensive framework for assessment, emphasising the importance of a full mental state examination to identify psychotic symptoms. — https://www.nice.org.uk/guidance/cg178\n- **[The Royal Australian and New Zealand College of Psychiatrists (RANZCP) - Mental State Examination (MSE)]**: Describes the components of the MSE, highlighting \"Thought Content\" (including delusions) and \"Perception\" (including hallucinations) as key areas to assess reality testing. — https://www.ranzcp.org/files/resources/college-statements/clinician/cpg/mse-guideline.aspx", "image_path": ""}, {"id": 34418, "date": "2026-02-04T10:44:02+00:00", "stem": "A post-op appendectomy patient on day 7 develops diarrhea, right-sided abdominal pain, normal temperature. Likely diagnosis?", "options": "(a) Pelvic abscess\n(b) Wound dehiscence\n(c) Clostridioides difficile colitis\n(d) Small bowel obstruction\n(e) Urinary tract infection", "answer": "(c) Clostridioides difficile colitis", "explanation": "### ✅ Correct Answer: (c) Clostridioides difficile colitis\n\n**Clinical Reasoning:**\nThis question tests recognition of a common post-operative complication, particularly following abdominal surgery where prophylactic or therapeutic antibiotics are often used.\n1.  **Timeline:** Day 7 post-op is a classic timeframe for *C. difficile* infection (CDI) to manifest following antibiotic exposure.\n2.  **Key Symptoms:** The combination of **diarrhea** and **abdominal pain** is the hallmark of colitis. The pain being \"right-sided\" can be misleading but is plausible with diffuse colonic inflammation or may reflect the surgical site; it does not rule out CDI.\n3.  **Absence of Fever:** A normal temperature is common in CDI, especially in early or mild-moderate cases. The absence of fever argues against options like pelvic abscess, which typically presents with fever, leukocytosis, and often palpable mass on rectal exam.\n4.  **Risk Factor:** Appendectomy often involves peri-operative antibiotics (e.g., for perforated or gangrenous appendicitis), which disrupt the gut microbiota and predispose to *C. difficile* overgrowth.\n\n**Management Pearl:** The next step would be to send a stool sample for *C. difficile* toxin PCR or GDH/toxin testing. Initial management includes stopping unnecessary antibiotics, starting oral metronidazole (for mild-moderate cases) or vancomycin (for severe cases), and implementing contact precautions.\n\n### ❌ Why the Other Options Are Wrong\n- **(a) Pelvic abscess:** This is a common complication of appendicitis, especially if perforated. However, it typically presents with **fever, leukocytosis, and often a palpable tender mass on rectal or vaginal exam**. Diarrhea is not a typical feature. The normal temperature and primary symptom of diarrhea make this less likely.\n- **(b) Wound dehiscence:** This involves the separation of surgical wound layers. It presents with **drainage from the wound, visible separation, or evisceration**. It does not cause diarrhea. Pain would be localized to the wound site, not generalized abdominal pain.\n- **(d) Small bowel obstruction (SBO):** Post-operative SBO (often adhesive) is a classic complication. However, it presents with **obstipation (no flatus/stool), absolute constipation, colicky abdominal pain, distension, and vomiting**. **Diarrhea is not a feature of complete or high-grade SBO.** Early post-op ileus is also possible but usually resolves within 3-5 days.\n- **(e) Urinary tract infection (UTI):** Common post-op due to catheterization. Presents with **dysuria, frequency, urgency, and possibly fever**. It may cause suprapubic pain but not typically right-sided abdominal pain or diarrhea.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Gastrointestinal: Clostridioides difficile infection]**: Australian guidelines for the diagnosis and management of CDI, including post-operative settings. — https://tgldcdp.tg.org.au/etgAccess\n- **[Australian Commission on Safety and Quality in Health Care (ACSQHC) - Antimicrobial Stewardship]**: Highlights strategies to prevent CDI, including appropriate antibiotic use in surgical prophylaxis. — https://www.safetyandquality.gov.au/our-work/antimicrobial-stewardship\n- **[UpToDate - Clostridioides difficile infection in adults: Clinical manifestations and diagnosis]**: Details the clinical presentation and diagnostic approach for CDI. — https://www.uptodate.com/contents/clostridioides-difficile-infection-in-adults-clinical-manifestations-and-diagnosis", "image_path": ""}, {"id": 34434, "date": "2026-02-04T13:40:28+00:00", "stem": "A 45-year-old woman presents with a 2-day history of severe headache, fever, and neck stiffness. On examination, she has a positive Kernig's sign. A lumbar puncture is performed. Which of the following cerebrospinal fluid (CSF) findings is most consistent with bacterial meningitis?", "options": "A. Elevated protein, normal glucose, lymphocytic pleocytosis\nB. Elevated protein, low glucose, neutrophilic pleocytosis\nC. Normal protein, normal glucose, no white cells\nD. Elevated protein, elevated glucose, mixed pleocytosis\nE. Normal protein, low glucose, lymphocytic pleocytosis", "answer": "B. Elevated protein, low glucose, neutrophilic pleocytosis", "explanation": "### ✅ Correct Answer: B. Elevated protein, low glucose, neutrophilic pleocytosis\n\nThe clinical picture of acute severe headache, fever, neck stiffness, and positive Kernig's sign is classic for meningitis. Bacterial meningitis typically produces a characteristic CSF profile due to the intense inflammatory response and bacterial metabolism.\n\n**Step-by-step Clinical Reasoning:**\n1.  **Elevated Protein:** Bacterial infection causes increased permeability of the blood-brain barrier and exudation of plasma proteins into the CSF.\n2.  **Low Glucose (Hypoglycorrhachia):** Bacteria (e.g., *Streptococcus pneumoniae*, *Neisseria meningitidis*) actively consume glucose via glycolysis. Furthermore, the inflammatory response impairs glucose transport across the blood-brain barrier. A CSF glucose level less than 40% of the simultaneous serum glucose is highly suggestive of bacterial (or fungal) meningitis.\n3.  **Neutrophilic Pleocytosis:** The initial host response to pyogenic bacteria is a marked influx of neutrophils, leading to a high white cell count (often >1000 cells/µL) with neutrophil predominance (>80%).\n\nThis triad is a hallmark of acute bacterial meningitis and is a critical diagnostic finding for the AMC exam.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Elevated protein, normal glucose, lymphocytic pleocytosis**: This profile is characteristic of **viral meningitis** or tuberculous meningitis in later stages. Normal glucose argues strongly against an acute bacterial process.\n- **C. Normal protein, normal glucose, no white cells**: This represents **normal CSF**. It would be seen in conditions like tension headache or after a normal LP, completely inconsistent with the clinical signs of meningitis.\n- **D. Elevated protein, elevated glucose, mixed pleocytosis**: Elevated CSF glucose typically mirrors high serum glucose (e.g., in uncontrolled diabetes). It is not a feature of meningitis. This pattern is nonspecific and not classic for any common CNS infection.\n- **E. Normal protein, low glucose, lymphocytic pleocytosis**: This combination is atypical. Low glucose with normal protein and lymphocytes is more suggestive of **tuberculous or fungal meningitis**, which have a more subacute presentation, not the acute bacterial presentation described.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Central Nervous System Infections]**: Provides Australian-specific diagnostic criteria and management for bacterial meningitis, including CSF interpretation. — https://tgldcdp.tg.org.au/viewTopic?topicfile=central-nervous-system-infections#toc_d1e289\n- **[Meningitis (bacterial) and meningococcal disease: antibiotic treatment and prophylaxis (NICE Guideline NG240)]**: Evidence-based UK guideline covering diagnosis and management, including CSF analysis. — https://www.nice.org.uk/guidance/ng240\n- **[UpToDate: Clinical features and diagnosis of acute bacterial meningitis in adults]**: Detailed review of pathophysiology and diagnostic test interpretation. — https://www.uptodate.com/contents/clinical-features-and-diagnosis-of-acute-bacterial-meningitis-in-adults", "image_path": "photo_2026-02-04_13-40-28.jpg"}, {"id": 34469, "date": "2026-02-05T14:20:21+00:00", "stem": "A 45-year-old woman presents with a 2-day history of fever, headache, and myalgia. She has a petechial rash on her legs and trunk. On examination, she is tachycardic and hypotensive. Lumbar puncture shows cloudy CSF with elevated white cell count (predominantly neutrophils), low glucose, and high protein. Gram stain of CSF reveals gram-negative diplococci. What is the most likely causative organism?", "options": "A. Streptococcus pneumoniae\nB. Neisseria meningitidis\nC. Haemophilus influenzae type b\nD. Listeria monocytogenes\nE. Escherichia coli", "answer": "B. Neisseria meningitidis", "explanation": "### ✅ Correct Answer: B. Neisseria meningitidis\n\n**Clinical Reasoning:**\n1. **Presentation:** The patient presents with acute onset of fever, headache, myalgia, petechial rash, and signs of septic shock (tachycardia, hypotension). This constellation is classic for meningococcal meningitis/sepsis.\n2. **CSF Findings:** Cloudy CSF with:\n   - **Elevated neutrophils:** Typical of bacterial meningitis.\n   - **Low glucose:** Due to bacterial consumption.\n   - **High protein:** Due to inflammation and blood-brain barrier disruption.\n3. **Gram Stain:** Gram-negative diplococci are characteristic of *Neisseria meningitidis*. This organism is a common cause of community-acquired bacterial meningitis, especially in outbreaks and in young adults. The petechial/purpuric rash is a hallmark due to endotoxin-mediated vasculitis and disseminated intravascular coagulation (DIC).\n4. **Epidemiology:** *N. meningitidis* is spread via respiratory droplets and can cause rapid progression to septic shock and death if not treated promptly with appropriate antibiotics (e.g., ceftriaxone).\n\n### ❌ Why the Other Options Are Wrong\n- **A. Streptococcus pneumoniae:** This is a gram-positive diplococcus (lancet-shaped) and a common cause of bacterial meningitis, especially in older adults and those with comorbidities. It does not typically cause a petechial rash as prominently as *N. meningitidis*.\n- **C. Haemophilus influenzae type b:** This is a gram-negative coccobacillus. It was a leading cause of childhood meningitis before vaccination. It is uncommon in adults and does not typically present with petechial rash.\n- **D. Listeria monocytogenes:** This is a gram-positive rod. It typically affects neonates, elderly, and immunocompromised individuals. It causes meningitis but is not associated with petechial rash and is not seen on Gram stain as diplococci.\n- **E. Escherichia coli:** This is a gram-negative rod. It is a common cause of neonatal meningitis but rare in immunocompetent adults. It does not present with petechial rash or appear as diplococci.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Antibiotic (eTG) - Meningitis]** — Covers empirical and organism-directed management of bacterial meningitis in Australia, including meningococcal disease. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etg\n- **[Australian Immunisation Handbook - Meningococcal disease]** — Details epidemiology, prevention (vaccination), and public health management. — https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/meningococcal-disease\n- **[CDC - Meningococcal Disease]** — Comprehensive clinical and public health guidelines for diagnosis, treatment, and prevention. — https://www.cdc.gov/meningococcal/index.html", "image_path": ""}, {"id": 34481, "date": "2026-02-05T22:25:56+00:00", "stem": "A patient presents with episodic palpitations and hyperventilation. A resting ECG is normal, and the heart rhythm is regular. What is the **most appropriate next investigation**?", "options": "a. Troponin levels\nb. Echocardiography\nc. Chest X-ray\nd. Exercise stress test\ne. Ambulatory ECG", "answer": "e", "explanation": "### ✅ Correct Answer: e. Ambulatory ECG\n\nThe patient presents with **episodic palpitations** and hyperventilation, with a normal resting ECG and regular rhythm. This clinical picture is classic for **paroxysmal arrhythmias** (e.g., supraventricular tachycardia, atrial fibrillation) or anxiety-related symptoms. The key diagnostic challenge is capturing the heart rhythm **during symptoms**, as the resting ECG is normal between episodes.\n\n**Step-by-step clinical reasoning:**\n1.  **History is paramount:** Episodic, non-exertional palpitations suggest a paroxysmal arrhythmia. Hyperventilation can be a primary anxiety symptom or a secondary response to palpitations.\n2.  **Goal of investigation:** To correlate symptoms with heart rhythm. A normal resting ECG rules out persistent arrhythmias but not intermittent ones.\n3.  **Ambulatory ECG (Holter monitor or event recorder)** is the gold standard first-line investigation for episodic palpitations. It provides continuous ECG monitoring for 24-48 hours (Holter) or longer periods with patient-activated recording (event recorder), aiming to capture an episode.\n4.  **Management implications:** Identifying the specific arrhythmia guides treatment (e.g., AV-nodal blocking agents for SVT, rate control for AF, reassurance for sinus tachycardia with anxiety).\n\n### ❌ Why the Other Options Are Wrong\n- **a. Troponin levels**: This is a biomarker for myocardial injury (e.g., acute coronary syndrome, myocarditis). It is not indicated for the investigation of isolated episodic palpitations without chest pain or other features of acute coronary syndrome.\n- **b. Echocardiography**: This assesses cardiac structure and function (e.g., valves, chamber size, ejection fraction). It is crucial if a structural cause for arrhythmia is suspected (e.g., cardiomyopathy, valvular disease) but is not the first test to diagnose the rhythm abnormality itself. It would typically be ordered **after** an arrhythmia is documented.\n- **c. Chest X-ray**: Primarily evaluates lung fields, mediastinum, and cardiac silhouette size. It has a very low yield in the workup of palpitations unless there are specific signs of heart failure, pulmonary disease, or other structural thoracic abnormalities.\n- **d. Exercise stress test**: This is indicated when symptoms are **exertional** (e.g., palpitations or chest pain provoked by exercise). The vignette specifies \"episodic\" without linking it to exertion, making an ambulatory monitor more appropriate as the initial test.\n\n### 📚 Relevant Guidelines\n- **American Heart Association/American College of Cardiology/Heart Rhythm Society (AHA/ACC/HRS) Guideline for the Management of Patients With Atrial Fibrillation**: Recommends ambulatory monitoring for diagnosing paroxysmal AF in patients with symptoms suggestive of arrhythmia. — [https://www.ahajournals.org/doi/10.1161/CIR.0000000000000935](https://www.ahajournals.org/doi/10.1161/CIR.0000000000000935)\n- **European Society of Cardiology (ESC) Guidelines for the management of patients with supraventricular tachycardia**: States that in patients with palpitations and a normal resting ECG, ambulatory ECG monitoring is a Class I recommendation to establish a symptom-rhythm correlation. — [https://academic.oup.com/eurheartj/article/40/5/655/5078460](https://academic.oup.com/eurheartj/article/40/5/655/5078460)\n- **Choosing Wisely Australia (RACGP)**: Advises against routine echocardiography in the initial evaluation of simple palpitations in patients with a normal physical exam and normal ECG, promoting a more targeted diagnostic approach. — [https://www.choosingwisely.org.au/recommendations/racgp2](https://www.choosingwisely.org.au/recommendations/racgp2)", "image_path": ""}, {"id": 34492, "date": "2026-02-06T05:19:37+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E. Neurocysticercosis", "explanation": "### ✅ Correct Answer: E. Neurocysticercosis\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** The patient is a young adult with new-onset generalized tonic-clonic seizures and confusion. This is the most common presentation of neurocysticercosis (NCC), accounting for up to 70% of cases in endemic areas.\n2.  **Pathognomonic Imaging:** The description of \"numerous well-defined cystic lesions throughout the cerebral cortex\" on MRI is classic for NCC. The cysts are the larval stage of the parasite *Taenia solium* lodged in the brain parenchyma.\n3.  **Supporting Systemic Clues:** The swelling over the right eye and testicular tenderness suggest extra-neural cysticercosis. Cysts can lodge in subcutaneous tissues (causing palpable nodules or swelling) and muscles (causing tenderness), which is consistent with disseminated disease.\n4.  **Epidemiology & Pathophysiology:** NCC is acquired by ingesting eggs of the pork tapeworm, *Taenia solium*, via the fecal-oral route (poor hygiene) or contaminated food/water. The eggs hatch in the intestine, larvae migrate through the bloodstream, and encyst in tissues, most commonly the brain, skeletal muscle, and eyes. Seizures occur due to inflammation around degenerating cysts.\n5.  **Management Pearls:**\n    *   **Diagnosis:** Serology (antibody detection) supports the diagnosis, but imaging is key. The MRI finding is diagnostic in the correct clinical context.\n    *   **Treatment:** For multiple parenchymal cysts (as in this case), management involves:\n        *   **Anticonvulsants** (e.g., levetiracetam) for seizure control.\n        *   **Corticosteroids** (e.g., dexamethasone) to reduce inflammation, especially if starting antiparasitic treatment.\n        *   **Antiparasitic therapy** (albendazole, often with praziquantel) is recommended for viable parenchymal cysts, but must be initiated cautiously with steroid cover to avoid exacerbating cerebral edema.\n    *   **Public Health:** Education on hand hygiene and proper cooking of pork is crucial to prevent transmission.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Cerebral metastases:** Metastases to the brain are typically solid, enhancing lesions, not numerous well-defined *cysts*. They are also exceedingly rare in an otherwise healthy 18-year-old without a known primary cancer. The presentation would be more subacute with focal neurological deficits and headache.\n- **B. Progressive multifocal leukoencephalopathy (PML):** PML is a demyelinating disease caused by JC virus reactivation, almost exclusively seen in severely immunocompromised patients (e.g., advanced HIV/AIDS, immunosuppressive therapy). MRI shows asymmetric, confluent white matter lesions without mass effect, not multiple cortical cysts.\n- **C. Cerebral vasculitis:** Vasculitis can cause seizures and confusion but typically presents with headache, focal deficits, and sometimes systemic symptoms. Imaging may show ischemic strokes, hemorrhages, or vessel wall enhancement, not multiple discrete cystic lesions.\n- **D. Neurosyphilis:** This can present with diverse neurological symptoms (seizures, dementia, tabes dorsalis). MRI may show meningeal enhancement, gummas (rare), or non-specific changes, but not the classic picture of multiple parenchymal cysts. It is also not associated with testicular or periorbital swelling.\n\n### 📚 Relevant Guidelines\n- **[World Health Organization (WHO) - Guidelines for management of neurocysticercosis]**: Provides evidence-based recommendations on diagnosis, treatment with antiparasitics and steroids, and management of complications. — https://www.who.int/publications/i/item/9789241511644\n- **[Infectious Diseases Society of America (IDSA) - Clinical Practice Guidelines for Neurocysticercosis]**: Detailed guidelines on diagnostic criteria, imaging interpretation, and therapeutic approaches for different forms of the disease. — https://academic.oup.com/cid/article/66/8/e49/4851370\n- **[Therapeutic Guidelines Limited (eTG) - Cysticercosis]**: Australian-specific guidance on drug therapy, including albendazole dosing and the critical role of corticosteroid co-administration. — https://tgldcdp.tg.org.au/viewTopic?topicfile=cysticercosis#toc_d1e241", "image_path": ""}, {"id": 34493, "date": "2026-02-06T05:20:57+00:00", "stem": "A one-day-old boy is reviewed on the maternity ward with his parents. He was born at term via spontaneous vaginal delivery. He has no significant medical history and takes no regular medications. His parents express concern about the appearance of their child's face. On examination, he appears well with vital signs within normal limits. There is a distinct abnormality in the upper lip, characterised by a separation extending from the midline to the base of the nose on the left side. The defect appears to involve only the upper lip and does not extend to the palate.\n\nWhich one of the following is the most likely cause of this condition?", "options": "Maternal alcohol use\nMaternal cytomegalovirus infection\nMaternal folate deficiency\nMaternal cocaine use\nMaternal diabetes", "answer": "Maternal folate deficiency", "explanation": "### ✅ Correct Answer: Maternal folate deficiency\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The description is classic for a **unilateral cleft lip without cleft palate**. This is one of the most common congenital anomalies.\n2.  **Established Aetiological Link:** Periconceptional **folate deficiency** is the most strongly and consistently identified modifiable risk factor for neural tube defects (NTDs) and orofacial clefts (cleft lip ± cleft palate). Folate is crucial for DNA synthesis and cellular division during early embryogenesis (weeks 4-8).\n3.  **Prevention Evidence:** Large-scale public health studies and randomized controlled trials have conclusively shown that folic acid supplementation (400-800 mcg daily) starting *before* conception and continuing through the first trimester significantly reduces the incidence of both NTDs and orofacial clefts.\n4.  **Why This is the *Most Likely* Cause:** While other teratogens can cause clefts, folate deficiency is the single most common preventable cause identified in population studies. The question asks for the \"most likely cause,\" pointing to this well-established public health and nutritional factor.\n\n### ❌ Why the Other Options Are Wrong\n- **Maternal alcohol use:** Alcohol is a potent teratogen causing Fetal Alcohol Spectrum Disorder (FASD), which includes characteristic facial features (short palpebral fissures, smooth philtrum, thin vermillion border), growth restriction, and neurodevelopmental issues. While it can be associated with clefts, it is not the *most likely* cause. The classic FASD facies is distinct from an isolated cleft lip.\n- **Maternal cytomegalovirus (CMV) infection:** Congenital CMV is a common viral infection that can cause microcephaly, sensorineural hearing loss, chorioretinitis, and intracranial calcifications. It is not a recognized primary cause of isolated cleft lip.\n- **Maternal cocaine use:** Cocaine use in pregnancy is associated with placental abruption, preterm birth, intrauterine growth restriction, and neurobehavioral effects. It can cause vascular disruption anomalies, but its link to cleft lip is less strong and consistent than that of folate deficiency.\n- **Maternal diabetes:** Poorly controlled pre-gestational diabetes (not gestational diabetes) is a significant teratogen, associated with a spectrum of anomalies including caudal regression syndrome, cardiac defects, and neural tube defects. The risk for orofacial clefts is elevated but again, folate deficiency remains the most common and modifiable risk factor specifically for this defect.\n\n### 📚 Relevant Guidelines\n- **[Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Pre-pregnancy Counselling]**: Recommends daily folic acid supplementation (at least 400 mcg) for at least one month before and three months after conception to prevent neural tube defects and other congenital anomalies like cleft lip/palate. — https://ranzcog.edu.au/womens-health/patient-information-resources/pre-pregnancy-counselling\n- **[Therapeutic Guidelines Limited (eTG) - Preconception care]**: States that \"periconceptional folic acid reduces the risk of neural tube defects and may also reduce the risk of other congenital malformations (e.g., cleft lip and palate).\" — https://tgldcdp.tg.org.au/viewTopic?topicfile=preconception-care&guidelineName=Women%27s%20Health#toc_d1e138\n- **[World Health Organization (WHO) - Periconceptional folic acid supplementation]**: Recommends folic acid supplementation for all women of childbearing age to prevent NTDs and improve pregnancy outcomes. — https://www.who.int/elena/titles/folate_periconceptional/en/", "image_path": ""}, {"id": 34576, "date": "2026-02-14T12:52:13+00:00", "stem": "A 45-year-old man presents with a 2-day history of fever, productive cough with green sputum, and right-sided pleuritic chest pain. On examination, he is febrile (38.5°C), tachypnoeic (22 breaths/min), and has bronchial breathing and dullness to percussion at the right lung base. A chest X-ray confirms consolidation in the right lower lobe. He has no significant past medical history, takes no regular medications, and has no known drug allergies. He is not immunocompromised. Which of the following is the most appropriate initial empiric antibiotic therapy?", "options": "A. Amoxicillin 1g PO TDS\nB. Benzylpenicillin IV + Doxycycline PO\nC. Ceftriaxone IV + Azithromycin PO\nD. Piperacillin-tazobactam IV\nE. Co-trimoxazole PO", "answer": "C. Ceftriaxone IV + Azithromycin PO", "explanation": "### ✅ Correct Answer: C. Ceftriaxone IV + Azithromycin PO\nThis patient has moderate-severe community-acquired pneumonia (CAP) requiring hospitalisation, as evidenced by fever, tachypnoea, and focal chest signs. According to Australian and international guidelines, empiric therapy for hospitalised patients with non-severe penicillin allergy and no risk factors for Pseudomonas aeruginosa should cover the most common pathogens: Streptococcus pneumoniae, Haemophilus influenzae, and atypical organisms (Mycoplasma pneumoniae, Chlamydia pneumoniae, Legionella species). A combination of a beta-lactam (like ceftriaxone) and a macrolide (like azithromycin) is the standard first-line regimen. This combination provides broad coverage, including atypical pathogens which are not covered by beta-lactams alone, and is supported by mortality benefit evidence. The patient's presentation warrants intravenous therapy initially.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Amoxicillin 1g PO TDS**: This is appropriate for mild CAP in the community in patients without comorbidities, as per Australian guidelines. However, this patient's severity (tachypnoea, likely requiring hospitalisation) necessitates broader IV coverage and coverage for atypical pathogens, which amoxicillin alone does not provide.\n- **B. Benzylpenicillin IV + Doxycycline PO**: While doxycycline covers atypical pathogens, benzylpenicillin has a narrow spectrum primarily targeting Gram-positive cocci (like S. pneumoniae) but has poor activity against H. influenzae and no activity against atypical pathogens. This combination is not a standard first-line regimen for moderate-severe CAP in Australian guidelines.\n- **D. Piperacillin-tazobactam IV**: This is a broad-spectrum antipseudomonal beta-lactam/beta-lactamase inhibitor. It is not first-line for CAP and is typically reserved for hospital-acquired pneumonia, severe CAP with risk factors for Pseudomonas (e.g., bronchiectasis, recent antibiotics, severe COPD), or patients in ICU. Its use here would be unnecessarily broad.\n- **E. Co-trimoxazole PO**: This antibiotic is primarily used for specific infections like Pneumocystis jirovecii pneumonia (in immunocompromised hosts), urinary tract infections, or some skin infections. It is not a recommended empiric therapy for CAP and does not provide reliable coverage against S. pneumoniae or atypical pathogens.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) — Community-acquired pneumonia]**: Provides Australian recommendations for the management of CAP in adults, including severity assessment and empiric antibiotic choices for community and hospital settings. — https://tgldcdp.tg.org.au/viewTopic?topicfile=community-acquired-pneumonia-adults\n- **[British Thoracic Society (BTS) Guidelines for CAP in Adults]**: International guideline providing evidence-based recommendations for the management of CAP, including criteria for hospital admission and antibiotic therapy. — https://www.brit-thoracic.org.uk/quality-improvement/guidelines/cap/\n- **[Choosing Wisely Australia — Antibiotics for Respiratory Infections]**: Promotes the appropriate use of antibiotics, including not using broad-spectrum antibiotics for simple CAP. — https://www.choosingwisely.org.au/recommendations/racgp", "image_path": "photo_2026-02-14_12-52-13.jpg"}, {"id": 34594, "date": "2026-02-17T12:56:49+00:00", "stem": "A 40-year-old man with ankylosing spondylitis, who has been in long-term remission on methotrexate (MTX) and ibuprofen, seeks advice as he is about to get married and plans to start a family. What is the most appropriate medication advice?", "options": "A. Discontinue both MTX and ibuprofen\nB. Discontinue MTX but continue ibuprofen\nC. Continue both medications unchanged\nD. Discontinue ibuprofen but continue MTX\nE. Switch to alternative disease-modifying therapy", "answer": "E. Switch to alternative disease-modifying therapy", "explanation": "### ✅ Correct Answer: E. Switch to alternative disease-modifying therapy\n\n**Clinical Reasoning:**\n1. **Methotrexate (MTX) in Pregnancy Planning:** MTX is a known teratogen (Category D in Australia) and is contraindicated in both males and females planning conception. It causes chromosomal damage to sperm and is associated with multiple congenital abnormalities (methotrexate embryopathy). Current guidelines recommend discontinuing MTX at least 3 months (some recommend 6 months) prior to conception in males to allow for a complete spermatogenesis cycle.\n2. **Ibuprofen and Male Fertility:** While NSAIDs like ibuprofen are generally considered safer than MTX, chronic use can potentially impair male fertility by reducing prostaglandin synthesis, which is important for normal sperm function and seminal fluid quality. However, the primary and immediate concern is the teratogenic MTX.\n3. **Disease Control in Ankylosing Spondylitis:** The patient is in remission, and maintaining disease control is crucial for quality of life and function. Simply stopping all therapy (Option A) risks a disease flare. The goal is to transition to a pregnancy-compatible DMARD.\n4. **Appropriate Alternative Therapy:** Sulfasalazine is the classic DMARD considered safe for use in men planning conception and during pregnancy. Biologic agents like TNF-alpha inhibitors (e.g., adalimumab, etanercept) are also increasingly used and considered relatively safe, though data is more robust for continued use in women during pregnancy. The advice should be to **switch** from MTX to a safer alternative, not merely to stop medication.\n\nTherefore, the most comprehensive and appropriate advice is to switch his disease-modifying therapy to a safer option while managing his symptoms, making Option E correct.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Discontinue both MTX and ibuprofen**: Incorrect because stopping all treatment risks a disease flare of ankylosing spondylitis, which can be debilitating. Management should involve switching therapy, not cessation.\n- **B. Discontinue MTX but continue ibuprofen**: Incorrect because while discontinuing MTX is correct, continuing ibuprofen long-term may not be ideal for fertility concerns, and more importantly, this option fails to address the need for ongoing disease-modifying therapy to maintain remission.\n- **C. Continue both medications unchanged**: Incorrect and dangerous. Continuing methotrexate while planning conception is contraindicated due to its teratogenic risk to the fetus.\n- **D. Discontinue ibuprofen but continue MTX**: Incorrect and the most dangerous option. It prioritizes stopping a relatively lower-risk medication (ibuprofen) while continuing the high-risk teratogen (MTX).\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines Australia (eTG) – Rheumatology]**: Advises that methotrexate is contraindicated in pregnancy and should be ceased well in advance of conception in both men and women. Recommends sulfasalazine as a safer alternative. — https://tgldcdp.tg.org.au/viewTopic?topicfile=rheumatological-conditions-pregnancy&guidelineName=Rheumatology#toc_d1e289\n- **[Australian Rheumatology Association]**: Provides position statements and consensus recommendations on the use of DMARDs and biologics before and during pregnancy, including advice for men planning fatherhood. — https://rheumatology.org.au/patients/pregnancy-and-rheumatic-disease\n- **[UpToDate – Methotrexate: Drug Information]**: Details the teratogenic risk, recommending cessation at least 3 months before conception in men due to effects on spermatogenesis. — https://www.uptodate.com/contents/methotrexate-drug-information", "image_path": ""}, {"id": 34610, "date": "2026-02-18T12:04:57+00:00", "stem": "A 65-year-old man with a history of hypertension presents with worsening renal function and poorly controlled blood pressure despite multiple antihypertensive medications. Physical examination reveals an abdominal bruit. Laboratory tests show elevated serum creatinine and hypokalaemia. What is the most likely diagnosis?", "options": "A. Essential hypertension\nB. Primary hyperaldosteronism\nC. Renal artery stenosis\nD. Pheochromocytoma\nE. Chronic glomerulonephritis", "answer": "C. Renal artery stenosis", "explanation": "### ✅ Correct Answer: C. Renal artery stenosis\n\n**Clinical Reasoning:**\n1. **Patient Profile:** Elderly patient with hypertension that is difficult to control (resistant hypertension).\n2. **Key Clinical Features:**\n   - **Abdominal bruit:** Classic physical finding suggestive of turbulent blood flow through a stenotic renal artery.\n   - **Worsening renal function:** Atherosclerotic renal artery stenosis can lead to ischemic nephropathy and progressive renal impairment.\n   - **Hypokalaemia:** Often seen due to secondary hyperaldosteronism. The reduced renal perfusion activates the renin-angiotensin-aldosterone system (RAAS), leading to increased aldosterone secretion, which causes potassium wasting.\n3. **Pathophysiology:** Atherosclerosis (most common in older adults) or fibromuscular dysplasia can narrow the renal artery. This reduces perfusion pressure to the kidney, triggering RAAS activation → angiotensin II-mediated vasoconstriction and aldosterone-mediated sodium retention → hypertension and hypokalaemia.\n4. **Diagnostic Approach:** First-line imaging is Doppler ultrasound of the renal arteries. CT angiography or MR angiography can confirm. Renal arteriography is the gold standard but invasive.\n5. **Management:** Includes optimal medical therapy (ACE inhibitors/ARBs are particularly effective but require monitoring for renal function decline), and revascularization (angioplasty/stenting) may be considered in select cases.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Essential hypertension:** Does not typically present with an abdominal bruit, sudden worsening of renal function, or hypokalaemia. It is a diagnosis of exclusion.\n- **B. Primary hyperaldosteronism:** Presents with hypertension and hypokalaemia but is usually associated with metabolic alkalosis and suppressed plasma renin activity. An abdominal bruit and worsening renal function are not typical.\n- **D. Pheochromocytoma:** Characterised by paroxysmal hypertension, headache, sweating, and palpitations. Hypokalaemia and abdominal bruit are not classic features.\n- **E. Chronic glomerulonephritis:** May cause hypertension and renal impairment but typically presents with other signs like haematuria, proteinuria, or oedema. Hypokalaemia and abdominal bruit are not characteristic.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Cardiovascular (eTG)**: Provides guidance on the diagnosis and management of renovascular hypertension, including investigation and treatment options — https://tgldcdp.tg.org.au/viewTopic?topicfile=hypertension-renovascular\n- **Kidney Health Australia: Chronic Kidney Disease (CKD) Management Handbook**: Includes recommendations for investigating and managing CKD, including secondary causes like renal artery stenosis — https://kidney.org.au/cms_uploads/docs/ckd-management-handbook-2023.pdf\n- **American Heart Association (AHA) Scientific Statement on Renal Artery Stenosis**: Offers detailed diagnostic and therapeutic algorithms — https://www.ahajournals.org/doi/10.1161/HYP.0000000000000084", "image_path": ""}, {"id": 34628, "date": "2026-02-19T09:09:28+00:00", "stem": "A 68-year-old woman on warfarin presents after a minor fall. She is fully conscious (GCS 15). No vomiting. No headache. Normal exam. What is the most appropriate next step?", "options": "A) Discharge\nB) CT brain\nC) Observe for 4 hours\nD) Reassure only", "answer": "B) CT brain", "explanation": "### ✅ Correct Answer: B. CT brain\n\n**Clinical Reasoning:**\n- **Patient Profile:** 68-year-old on warfarin (anticoagulant).\n- **Mechanism:** Minor fall (even without significant symptoms) in an anticoagulated patient significantly increases the risk of **intracranial hemorrhage (ICH)**, including subdural hematoma.\n- **Key Points:**\n  - Warfarin inhibits vitamin K-dependent clotting factors (II, VII, IX, X), prolonging INR and increasing bleeding risk.\n  - **Traumatic ICH can be asymptomatic or have delayed presentation** in elderly patients, even with normal GCS and no focal neurological signs initially.\n  - **Normal neurological exam does NOT rule out ICH** in anticoagulated patients after head trauma.\n- **Guideline-Based Management:** Immediate non-contrast CT brain is mandatory for any head injury in patients on therapeutic anticoagulation, regardless of symptoms, due to high risk and potential for catastrophic deterioration.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Discharge**: Discharging an anticoagulated patient after head trauma without imaging is unsafe and violates standard care guidelines. The risk of delayed hemorrhage is significant.\n- **C) Observe for 4 hours**: Observation alone is insufficient. Intracranial bleeding can evolve slowly, and a normal exam for 4 hours does not exclude a developing hematoma. Imaging is required first.\n- **D) Reassure only**: Reassurance without investigation is negligent. The presence of anticoagulation changes the risk-benefit analysis, making imaging imperative.\n\n### 📚 Relevant Guidelines\n- **National Institute for Health and Care Excellence (NICE) - Head injury: assessment and early management**: Recommends immediate CT head for head injury in patients on anticoagulant therapy (even with no other risk factors). — https://www.nice.org.uk/guidance/cg176\n- **Therapeutic Guidelines Australia (eTG) - Head injury**: States that patients on warfarin or other anticoagulants with head injury require urgent CT brain. — https://tgldcdp.tg.org.au/viewTopic?topicfile=head-injury\n- **Choosing Wisely Australia - Emergency Medicine**: Avoids discharging patients on anticoagulants after head trauma without appropriate imaging. — https://www.choosingwisely.org.au/recommendations/rama", "image_path": ""}, {"id": 34629, "date": "2026-02-19T09:10:07+00:00", "stem": "A 56-year-old poorly controlled diabetic female presents with sudden onset of binocular diplopia. She also has associated headaches. Her left eye appears to be deviated out and downwards. Pupillary examination shows mydriasis in the left eye. Which of the following investigation/examination is MOST relevant to rule out underlying cause in this case? (WHAT IS THE PROBABLE DIAGNOSIS AND THE MOST LIKELY VESSEL INVOLVED)", "options": "A. Blood pressure monitoring\nB. Cerebral angiography\nC. Hirschberg/corneal light reflection test\nD. Thyroid function tests", "answer": "B. Cerebral angiography", "explanation": "### ✅ Correct Answer: B. Cerebral angiography\n\n**Clinical Reasoning:**\n- **Probable Diagnosis:** **Posterior communicating artery (PCom) aneurysm** causing a **third cranial nerve (CN III) palsy**.\n- **Key Clinical Features:**\n  - **Sudden onset** binocular diplopia (suggests acute cranial nerve pathology).\n  - **Left eye deviated out and down:** Classic for CN III palsy (unopposed action of lateral rectus [CN VI] and superior oblique [CN IV]).\n  - **Left pupillary mydriasis:** **Pupil-involving** CN III palsy. This is a **surgical emergency** as it strongly suggests external compression of the nerve, most commonly by a **PCom aneurysm**.\n  - **Poorly controlled diabetes:** Is a risk factor for **microvascular CN III palsy**, but that typically **spares the pupil** (pupil-sparing). The presence of mydriasis points away from diabetic mononeuropathy and towards a compressive lesion.\n  - **Associated headaches:** Can be due to aneurysm expansion or sentinel bleed.\n- **Most Likely Vessel Involved:** **Posterior communicating artery (PCom)** aneurysm compressing the CN III as it passes between the posterior cerebral and superior cerebellar arteries.\n- **Most Relevant Investigation:** **Cerebral angiography** (CT angiography or digital subtraction angiography) is the gold standard to detect and characterize an intracranial aneurysm. This is urgent to rule out a life-threatening cause.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood pressure monitoring**: While hypertension is a risk factor for aneurysm formation and rupture, monitoring BP does not diagnose the underlying structural cause (aneurysm) in this acute setting with focal neurological signs.\n- **C. Hirschberg/corneal light reflection test**: This is a **diagnostic test for strabismus** and confirms the direction of eye deviation. It has already been effectively performed by the clinical description (eye deviated out and down). It does not rule out the underlying cause (aneurysm).\n- **D. Thyroid function tests**: These are relevant for thyroid eye disease (which can cause diplopia and proptosis) but not for a sudden-onset, pupil-involving CN III palsy. The timeline and pupil findings are inconsistent with thyroid ophthalmopathy.\n\n### 📚 Relevant Guidelines\n- **UpToDate - Third cranial nerve (oculomotor nerve) palsy in adults**: Highlights that an acute, pupil-involving CN III palsy is a neurologic emergency requiring urgent neuroimaging (CTA/MRA/DSA) to rule out a PCom aneurysm. — https://www.uptodate.com/contents/third-cranial-nerve-oculomotor-nerve-palsy-in-adults\n- **American Heart Association/American Stroke Association - Guidelines for the Management of Patients With Unruptured Intracranial Aneurysms**: Discusses diagnosis and management, including the role of angiography. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n- **Royal Australian and New Zealand College of Ophthalmologists (RANZCO) - Neuro-ophthalmology**: Emphasizes the urgent need for vascular imaging in acute pupil-involving CN III palsy. — https://ranzco.edu", "image_path": ""}, {"id": 34631, "date": "2026-02-19T10:02:53+00:00", "stem": "A Child with Hemophilia A. Without trauma he has a pain in his knee which started 30 mins ago. Knee is swollen and the movement is restricted. What is the first action in management ?", "options": "A) Factor VI\nB) Factor VII\nC) Factor VIII\nD) Aspiration of the fluid", "answer": "C) Factor VIII", "explanation": "### ✅ Correct Answer: C. Factor VIII\n\n**Clinical Reasoning:**\n- **Diagnosis:** **Acute hemarthrosis** (bleeding into the joint) in a child with **Hemophilia A**.\n- **Pathophysiology:** Hemophilia A is caused by a deficiency of **Factor VIII**. Spontaneous bleeding into joints (especially knees, elbows, ankles) is a classic presentation.\n- **Clinical Picture:** Acute onset pain, swelling, and restricted movement in a knee without trauma is highly suggestive of hemarthrosis.\n- **First Action:** **Immediate administration of Factor VIII concentrate** is the cornerstone of management. The goals are:\n  1. **Stop the bleeding** to prevent further joint distension and damage.\n  2. **Alleviate pain**.\n  3. **Prevent long-term complications** like chronic synovitis, joint contractures, and arthropathy.\n- **Pearls:** Management follows the **RICE** protocol (**R**est, **I**ce, **C**ompression, **E**levation) **concurrently** with factor replacement. Analgesia (avoiding NSAIDs/aspirin) is also important.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Factor VI**: Factor VI does not exist in the modern coagulation cascade schema. It is a historical misnomer and is not a therapeutic product.\n- **B) Factor VII**: Recombinant Factor VIIa is used for **bypassing therapy** in patients with inhibitors (antibodies) to Factor VIII or IX. It is not the first-line treatment for standard Hemophilia A bleeding episodes.\n- **D) Aspiration of the fluid**: **Arthrocentesis (aspiration) is generally contraindicated** in acute hemarthrosis of hemophilia. It should only be considered in exceptional circumstances (e.g., suspected septic arthritis) **after** adequate factor replacement has been given, due to the risk of introducing infection or causing re-bleeding.\n\n### 📚 Relevant Guidelines\n- **World Federation of Hemophilia (WFH) - Guidelines for the Management of Hemophilia**: Recommends early and adequate factor replacement therapy as the primary treatment for acute hemarthrosis. — https://www1.wfh.org/publication/files/pdf-1472.pdf\n- **Therapeutic Guidelines Australia (eTG) - Haemophilia A**: Details management of bleeding episodes, stating that factor VIII concentrate is the treatment of choice for joint bleeds. — https://tgldcdp.tg.org.au/viewTopic?topicfile=haemophilia-a\n- **National Hemophilia Foundation (USA) - Masac Guidelines**: Emphasizes prompt factor infusion for joint bleeds to preserve long-term joint health. — https://www.hemophilia.org/healthcare-professionals/guidelines-on-care/masac-documents", "image_path": ""}, {"id": 34636, "date": "2026-02-19T12:22:34+00:00", "stem": "19 year old child with abnormal LFT, tremor, behaviour changes, decline academic performance. Physical exam show mild hepatomegaly, no alcohol use, Wilson disease suspected. Patient tachypnoeic, no murmur. Most likely diagnosis?", "options": "Aortic stenosis\nCardiomyopathy\nPDA\nVSD\nASD", "answer": "B. Cardiomyopathy", "explanation": "### ✅ Correct Answer: B. Cardiomyopathy\nWilson's disease (hepatolenticular degeneration) is an autosomal recessive disorder of copper metabolism. Copper accumulation primarily affects the liver and basal ganglia, leading to the described hepatic and neurological symptoms (tremor, behavioural changes, cognitive decline). A key and potentially fatal extra-hepatic manifestation is cardiac involvement, specifically a **dilated cardiomyopathy**. This can present with symptoms of heart failure, such as tachypnoea, as described. The absence of a murmur argues against the structural valvular or shunt lesions listed (AS, PDA, VSD, ASD). In Wilson's disease, copper deposition in the myocardium leads to inflammation, fibrosis, and impaired contractility, resulting in cardiomyopathy. This is a classic 'high-yield' association for exams.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Aortic stenosis**: Typically presents with a systolic ejection murmur (often radiating to the carotids), syncope, angina, and dyspnoea. It is not a recognised direct complication of Wilson's disease. The vignette specifically states 'no murmur'.\n- **C. PDA**: Presents with a continuous 'machinery' murmur. It is a congenital heart defect, not an acquired complication of Wilson's disease. The patient is 19, making a newly symptomatic, previously undiagnosed PDA unlikely without the characteristic murmur.\n- **D. VSD**: Presents with a pansystolic murmur, often associated with signs of heart failure or pulmonary hypertension. Like PDA, it is a congenital defect, not a complication of Wilson's disease.\n- **E. ASD**: Often presents with a wide, fixed split S2 and a systolic flow murmur. It can cause dyspnoea and heart failure in adulthood but is congenital. There is no pathophysiological link to Wilson's disease.\n\n### 📚 Relevant Guidelines\n- **[European Association for the Study of the Liver (EASL) Clinical Practice Guidelines: Wilson's disease]**: Comprehensive guidelines on diagnosis and management, including discussion of extra-hepatic manifestations like cardiomyopathy. — https://www.journal-of-hepatology.eu/article/S0168-8278(12)00104-5/fulltext\n- **[UpToDate: Wilson Disease: Clinical Manifestations, Diagnosis, and Natural History]**: Details the multisystem involvement, including rare cardiac complications. — https://www.uptodate.com/contents/wilson-disease-clinical-manifestations-diagnosis-and-natural-history\n- **[American Heart Association (AHA) Scientific Statement on Cardiac Involvement in Genetic Disorders]**: Discusses cardiomyopathy as a manifestation of inborn errors of metabolism, including Wilson's disease. — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000965", "image_path": ""}, {"id": 34667, "date": "2026-02-20T23:29:21+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia), indicating hypovolaemic shock. In acute bleeding, the haemoglobin level is an unreliable initial marker of severity, as haemodilution hasn't yet occurred. Transfusion is indicated to restore circulating volume and oxygen-carrying capacity. The combination of an acute bleed with signs of shock overrides any specific Hb threshold and mandates urgent resuscitation, which includes blood transfusion.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is a **chronic, stable anaemia**. The patient is haemodynamically stable and asymptomati
