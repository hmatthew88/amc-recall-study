anagement is oral iron supplementation and treating the cause (menorrhagia). Transfusion is reserved for severe symptoms or acute decompensation, which are absent here.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: Although patients with cardiac disease have a lower transfusion threshold (often Hb <80 g/L), he is asymptomatic and stable. Transfusion is not immediately indicated; investigation of the anaemia's cause is priority.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is mild postpartum anaemia in a well patient. Management involves iron therapy and monitoring. Transfusion is not indicated in the absence of symptoms or active bleeding.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This haemoglobin level is near-normal. Chemotherapy-induced anaemia is typically managed with erythropoiesis-stimulating agents if symptomatic, not transfusion, especially at this level.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority (Australia) - Patient Blood Management Guidelines: Module 2 - Perioperative]**: Provides evidence-based recommendations for red blood cell transfusion, emphasizing a restrictive strategy (Hb <70 g/L for most stable patients) and the importance of clinical context over a single Hb number. — https://www.blood.gov.au/pbm-module-2\n- **[Therapeutic Guidelines Australia - Blood and blood products]**: Outlines indications for transfusion, including active bleeding with haemodynamic instability, symptomatic anaemia, and specific thresholds for cardiac disease. — https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-blood-products\n- **[Choosing Wisely Australia - Transfusion Medicine]**: Recommends avoiding transfusion for stable, non-bleeding patients with Hb >70-80 g/L, reinforcing restrictive transfusion practices. — https://www.choosingwisely.org.au/recommendations/transfusion-medicine", "image_path": ""}, {"id": 34375, "date": "2026-02-03T10:49:51+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a well-known, potent oxidant drug that can trigger acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic: a young man of Middle Eastern descent (high prevalence area) presents with acute haemolysis (dark urine from haemoglobinuria, jaundice from unconjugated hyperbilirubinaemia, fatigue from anaemia) following exposure to a triggering agent. The lab findings confirm intravascular haemolysis: low Hb, elevated reticulocytes (bone marrow response), elevated indirect bilirubin, and peripheral smear showing **\"bite cells\" and blister cells** – these are erythrocytes with Heinz bodies (denatured haemoglobin) removed by the spleen, pathognomonic for oxidative damage. Dapsone, used for conditions like dermatitis herpetiformis or Pneumocystis jirovecii pneumonia prophylaxis, is a classic high-risk drug for G6PD-deficient individuals.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is generally safe in standard therapeutic doses for individuals with G6PD deficiency. It is not a significant oxidant stressor. Massive overdose can cause methaemoglobinaemia via a different mechanism, but it is not a common trigger for G6PD haemolysis.\n- **B. Amoxicillin**: Penicillins, including amoxicillin, are considered safe in G6PD deficiency. They are not oxidant drugs. Haemolysis with penicillins is typically immune-mediated (IgG-mediated, causing a positive direct antiglobulin test), not related to G6PD.\n- **D. Metformin**: This antidiabetic drug is not associated with oxidative haemolysis. It is safe in G6PD deficiency. Its main adverse effects are gastrointestinal upset and rare lactic acidosis.\n- **E. Prednisolone**: Corticosteroids are not oxidant drugs and do not precipitate haemolysis in G6PD deficiency. They are, in fact, sometimes used in the management of other types of autoimmune haemolytic anaemia.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines Australia - G6PD deficiency]**: Lists drugs to avoid in G6PD deficiency, including dapsone, sulfonamides, nitrofurantoin, and primaquine. — https://tgldcdp.tg.org.au/viewTopic?topicfile=g6pd-deficiency\n- **[UpToDate - Glucose-6-phosphate dehydrogenase deficiency]**: Comprehensive review of pathophysiology, triggers (including dapsone), diagnosis, and management. — https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-deficiency\n- **[WHO - Glucose-6-phosphate dehydrogenase deficiency]**: Provides a global perspective, prevalence data, and a list of unsafe medications. — https://www.who.int/news-room/fact-sheets/detail/glucose-6-phosphate-dehydrogenase-deficiency", "image_path": ""}, {"id": 34401, "date": "2026-02-04T01:14:35+00:00", "stem": "A 12-year-old girl presents with a 6-month history of recurrent, episodic abdominal pain. The pain is periumbilical, occurs at least once per week, and is not related to meals, bowel movements, or physical activity. She has missed several days of school. Physical examination is entirely normal, including growth parameters. Basic investigations (FBC, CRP, coeliac serology, faecal calprotectin) are normal. What is the most likely diagnosis?", "options": "A. Inflammatory bowel disease\nB. Functional abdominal pain\nC. Coeliac disease\nD. Peptic ulcer disease\nE. Chronic appendicitis", "answer": "B. Functional abdominal pain", "explanation": "### ✅ Correct Answer: B. Functional abdominal pain\n\nThis is the correct diagnosis based on the Rome IV criteria for functional gastrointestinal disorders in children. The clinical picture is classic: chronic abdominal pain (≥2 months) in a school-aged child, with a normal physical examination and negative basic screening investigations. The pain is periumbilical, episodic, and not associated with alarm features (no weight loss, no nocturnal symptoms, no haematochezia, normal inflammatory markers). The significant impact on school attendance is a hallmark of functional abdominal pain disorders, which are diagnoses of exclusion after organic causes have been ruled out. Management focuses on reassurance, education, and non-pharmacological strategies (dietary modifications, cognitive-behavioral therapy) rather than invasive testing.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Inflammatory bowel disease**: Typically presents with alarm features such as weight loss, growth failure, diarrhoea (often with blood), anaemia, elevated inflammatory markers (CRP, ESR), and abnormal faecal calprotectin. This patient has normal investigations and no systemic symptoms.\n- **C. Coeliac disease**: Can present with abdominal pain, but is usually associated with other features like diarrhoea, bloating, weight loss, fatigue, or failure to thrive. Coeliac serology (tTG-IgA) was normal in this case, effectively ruling out the diagnosis.\n- **D. Peptic ulcer disease**: Uncommon in children without specific risk factors (NSAID use, H. pylori infection). Pain is typically epigastric, related to meals (relieved by food in duodenal ulcers, worsened by food in gastric ulcers), and may be associated with vomiting or bleeding. Not consistent with periumbilical, non-meal-related pain.\n- **E. Chronic appendicitis**: A rare entity. Pain would be expected in the right lower quadrant, not periumbilical. There would often be a history of acute episodes, and examination might reveal localized tenderness. Normal inflammatory markers make this unlikely.\n\n### 📚 Relevant Guidelines\n- **Rome Foundation - Rome IV Criteria**: The definitive diagnostic criteria for functional gastrointestinal disorders, including functional abdominal pain in children. — https://theromefoundation.org/rome-iv/rome-iv-criteria/\n- **RACGP - Recurrent abdominal pain in children**: Australian guideline covering assessment, red flags, and management of functional abdominal pain in primary care. — https://www.racgp.org.au/afp/2013/december/recurrent-abdominal-pain-in-children/\n- **Therapeutic Guidelines (eTG) - Gastrointestinal**: Provides evidence-based recommendations on the diagnosis and management of functional abdominal pain disorders in children. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34416, "date": "2026-02-04T10:43:06+00:00", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech. The patient was in his usual state of health last night but awoke this morning with these symptoms. He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease. The patient does not drink alcohol regularly but has a 45-pack-year history. Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia. CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery. The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility. Forty-eight hours later, he becomes obtunded. Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min. Physical examination now shows complete right hemiplegia and deviation of the eyes to the left. Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E. Repeat CT scan of the head", "explanation": "### ✅ Correct Answer: E. Repeat CT scan of the head\n\nThis patient presents with a classic scenario of **malignant middle cerebral artery (MCA) infarction** with **cerebral edema and herniation**. The key clinical timeline is:\n1. **Initial presentation**: Large left MCA territory ischemic stroke (right-sided weakness, hemisensory loss, homonymous hemianopsia, aphasia).\n2. **48-hour deterioration**: Development of obtundation, complete hemiplegia, and **forced eye deviation to the left** (indicating rightward brainstem compression from left hemispheric swelling).\n3. **Pathophysiology**: Large MCA infarcts cause cytotoxic edema that peaks at 2-5 days post-stroke, leading to increased intracranial pressure (ICP), midline shift, and potential uncal herniation. The Cushing triad (hypertension, bradycardia, irregular respirations) may develop, though here we see bradycardia (pulse 64/min) and hypertension (154/86 mmHg).\n4. **Immediate management priority**: Confirm the suspected **hemorrhagic transformation or significant edema with mass effect** before initiating specific therapies. A non-contrast CT head is rapid, widely available, and can identify midline shift, effacement of basal cisterns, and hemorrhagic conversion.\n5. **Why not immediate osmotic therapy?** While osmotic agents (mannitol, hypertonic saline) are used for cerebral edema, they should be guided by imaging findings and ICP monitoring when available. Starting them empirically without confirming the extent of edema/mass effect is less appropriate than first obtaining imaging.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood cultures and empiric antibiotics**: While fever (38.3°C) could suggest infection (e.g., aspiration pneumonia), the acute neurological deterioration with signs of herniation (obtundation, eye deviation) is the life-threatening emergency that must be addressed first. Fever can also occur post-stroke (central fever) without infection.\n- **B. Intravenous hypertonic saline and observation**: Hypertonic saline is effective for reducing cerebral edema, but initiating it without repeat imaging to assess the degree of swelling, midline shift, or rule out hemorrhagic conversion is premature and potentially dangerous if there is significant hemorrhage.\n- **C. Intravenous mannitol and observation**: Similar to option B, mannitol is a first-line osmotic agent for cerebral edema, but it requires confirmation of the diagnosis and monitoring of serum osmolality. Immediate imaging is needed to guide therapy and assess for contraindications (e.g., significant hemorrhage, renal failure).\n- **D. MRI of the head**: MRI provides superior detail for stroke evaluation (diffusion-weighted imaging for ischemia, susceptibility-weighted imaging for hemorrhage). However, it is time-consuming, less readily available emergently, and patient instability (obtundation) may preclude safe MRI. CT is faster and sufficient to diagnose mass effect and guide urgent intervention.\n\n### 📚 Relevant Guidelines\n- **Australian Clinical Guidelines for Stroke Management**: Provides comprehensive recommendations for monitoring and managing complications of acute ischemic stroke, including cerebral edema and herniation. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **Therapeutic Guidelines: Neurology (eTG)**: Includes management of raised intracranial pressure and cerebral edema in the context of stroke. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Neurology&frompage=etg\n- **American Heart Association/American Stroke Association Guidelines for the Early Management of Patients With Acute Ischemic Stroke**: Details management of malignant edema and herniation, including indications for repeat imaging and surgical decompression. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211", "image_path": ""}, {"id": 34417, "date": "2026-02-04T10:43:16+00:00", "stem": "A mother is concerned that her child has stopped seeing friends and discarded his laptop, claiming he was receiving special messages from Facebook. There is social withdrawal and odd beliefs. What is the most important mental function to assess?", "options": "a. Self-esteem\nb. Insight\nc. Mood\nd. Judgment\ne. Reality testing", "answer": "e. Reality testing", "explanation": "### ✅ Correct Answer: e. Reality testing\n\nThis clinical scenario describes a **possible first-episode psychosis**, with key features:\n1. **Core symptoms**: Social withdrawal, odd beliefs (delusions of reference — 'special messages from Facebook'), and potential auditory/visual hallucinations (implied by 'receiving messages').\n2. **Reality testing** refers to the ability to distinguish between internally generated experiences (thoughts, feelings, perceptions) and external reality. Its impairment is fundamental to psychotic disorders like schizophrenia.\n3. **Assessment priority**: In suspected psychosis, determining whether the patient has **loss of reality testing** (i.e., holds fixed false beliefs [delusions] or perceives things that aren't there [hallucinations]) is the most critical initial step. This distinguishes psychotic disorders from mood disorders with psychotic features, personality disorders, or other conditions.\n4. **Why not other options?** While insight, mood, judgment, and self-esteem are important, they are secondary to establishing the presence of psychosis. For example, poor insight is common in psychosis but assessing it presupposes that psychotic symptoms have been identified.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Self-esteem**: Low self-esteem is common in many psychiatric conditions (depression, anxiety, personality disorders) but is not specific to psychosis and not the most urgent assessment in this acute presentation with possible psychotic features.\n- **b. Insight**: Insight (awareness of having a mental illness) is typically impaired in psychosis, but assessing insight is only relevant after establishing the presence of psychotic symptoms. It is not the *most important* initial mental function to assess.\n- **c. Mood**: Mood assessment is important to differentiate between a primary psychotic disorder (e.g., schizophrenia) and a mood disorder with psychotic features (e.g., major depression with psychotic features). However, the presence of **odd beliefs and social withdrawal** points more directly to a psychotic process, making reality testing the priority.\n- **d. Judgment**: Judgment refers to the ability to make appropriate decisions. It can be impaired in psychosis but is also affected in many other conditions (mania, dementia, substance use). It is less specific and not the primary diagnostic focus here.\n\n### 📚 Relevant Guidelines\n- **RANZCP Clinical Practice Guidelines for the Management of Schizophrenia and Related Disorders**: Provides guidance on assessment and diagnosis of first-episode psychosis, emphasizing the evaluation of reality testing. — https://www.ranzcp.org/files/resources/college_statements/clinician/cpg/schizophrenia-related-disorders-cpg.aspx\n- **Therapeutic Guidelines: Psychotropic (eTG)**: Includes assessment of psychotic symptoms and differentiation from other psychiatric conditions. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Psychotropic&frompage=etg\n- **NICE Guidelines: Psychosis and schizophrenia in adults**: Outlines initial assessment and management of suspected psychosis, including mental state examination. — https://www.nice.org.uk/guidance/cg178", "image_path": ""}, {"id": 34418, "date": "2026-02-04T10:44:02+00:00", "stem": "A post-op appendectomy patient on day 7 develops diarrhea, right-sided abdominal pain, normal temperature. Likely diagnosis?", "options": "(a) Pelvic abscess\n(b) Wound dehiscence\n(c) Clostridioides difficile colitis\n(d) Small bowel obstruction\n(e) Urinary tract infection", "answer": "(c) Clostridioides difficile colitis", "explanation": "### ✅ Correct Answer: (c) Clostridioides difficile colitis\n\nThis is a classic presentation of **antibiotic-associated diarrhea** due to *Clostridioides difficile* infection following abdominal surgery:\n1. **Timeline**: Symptoms appear on **post-operative day 7**, which is typical for C. difficile colitis given antibiotic exposure perioperatively (commonly for appendicitis).\n2. **Clinical features**: Diarrhea (often watery, may be bloody), abdominal pain (can be localized or diffuse), and **absence of high fever** (normal temperature) is common, especially in early or mild cases.\n3. **Risk factors**: Recent surgery, hospitalization, and antibiotic use (especially broad-spectrum antibiotics like cephalosporins, clindamycin) disrupt normal gut flora, allowing C. difficile overgrowth.\n4. **Why not other post-op complications?** Pelvic abscess typically presents with fever, leukocytosis, and possibly palpable mass on rectal exam. Wound dehiscence involves the surgical incision. Small bowel obstruction presents with nausea, vomiting, distension, and constipation, not diarrhea. UTI may cause fever and urinary symptoms, not typically diarrhea or localized abdominal pain.\n\n### ❌ Why the Other Options Are Wrong\n- **(a) Pelvic abscess**: Usually presents with **fever**, leukocytosis, and possibly rectal or vaginal discomfort. Diarrhea is not a typical feature. Pain might be suprapubic or pelvic, not specifically right-sided unless localized.\n- **(b) Wound dehiscence**: Involves the surgical incision site with possible drainage, separation, or evisceration. It does not cause diarrhea and abdominal pain would be localized to the wound, not generalized right-sided pain.\n- **(d) Small bowel obstruction**: Presents with **obstipation** (no flatus or stool), nausea, vomiting, abdominal distension, and colicky pain. Diarrhea is atypical in complete or partial SBO.\n- **(e) Urinary tract infection**: May cause fever, dysuria, frequency, and suprapubic pain. Diarrhea and right-sided abdominal pain are not typical features.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines: Antibiotic (eTG)**: Provides guidance on diagnosis and management of Clostridioides difficile infection, including in post-surgical settings. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Antibiotic&frompage=etg\n- **Australian Commission on Safety and Quality in Health Care: Management of Clostridioides difficile infection**: Includes diagnostic criteria and treatment algorithms. — https://www.safetyandquality.gov.au/our-work/healthcare-associated-infection/clostridioides-difficile-infection\n- **Surgical Infection Society: Guidelines for the Treatment of Complicated Intra-abdominal Infections**: Discusses post-operative infections including C. difficile colitis. — https://journals.lww.com/surgicalinfections/Fulltext/2017/02000/Guidelines_for_the_Treatment_of_Complicated.2.aspx", "image_path": ""}, {"id": 34434, "date": "2026-02-04T13:40:28+00:00", "stem": "A 7-year-old boy presents with a 2-month history of recurrent, crampy abdominal pain. The pain is periumbilical, occurs at least once a week, and is severe enough to interrupt his play. There is no associated fever, vomiting, diarrhoea, or weight loss. Physical examination is unremarkable, with no abdominal tenderness or masses. He is otherwise healthy and growing well along the 50th percentile. What is the most likely diagnosis?", "options": "A. Inflammatory bowel disease\nB. Coeliac disease\nC. Functional abdominal pain\nD. Acute appendicitis\nE. Gastro-oesophageal reflux disease", "answer": "C. Functional abdominal pain", "explanation": "### ✅ Correct Answer: C. Functional abdominal pain\nThis is a classic presentation of functional abdominal pain (FAP) in a school-aged child. The diagnosis is based on the Rome IV criteria for childhood functional gastrointestinal disorders. The key features are:\n1.  **Chronicity:** Pain present for >2 months.\n2.  **Frequency:** Episodes occurring at least weekly.\n3.  **Character:** Periumbilical, crampy pain severe enough to affect activity.\n4.  **Absence of Alarm Signs:** No fever, vomiting, diarrhoea, weight loss, or abnormal physical findings (no tenderness, masses).\n5.  **Normal Growth:** The child is growing well along a normal percentile, which strongly argues against an organic pathology like IBD or coeliac disease.\n6.  **Lack of Association with Meals or Bowel Habits:** While not explicitly stated, the absence of mention of postprandial pain or change in stool pattern further supports FAP over other functional disorders like irritable bowel syndrome.\nThe management involves reassurance, identifying and managing stressors, and a normal diet. Extensive investigations are not indicated in the absence of alarm features.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Inflammatory bowel disease**: IBD typically presents with alarm features such as chronic diarrhoea (often with blood), weight loss, fatigue, growth faltering, and extra-intestinal manifestations (e.g., arthritis, mouth ulcers). The absence of these features, coupled with normal growth, makes IBD very unlikely.\n- **B. Coeliac disease**: While it can present with isolated abdominal pain, it is commonly associated with other symptoms like diarrhoea, bloating, fatigue, and failure to thrive or poor weight gain. A normal growth trajectory is a strong negative predictor for coeliac disease in this context.\n- **D. Acute appendicitis**: This is an acute surgical condition characterised by a short history (hours to days) of pain that typically migrates from the periumbilical region to the right iliac fossa, accompanied by anorexia, nausea/vomiting, fever, and signs of localised peritonitis (tenderness, guarding, rebound). A 2-month history with a completely normal abdominal exam rules this out.\n- **E. Gastro-oesophageal reflux disease**: GERD typically presents with retrosternal or epigastric burning pain (heartburn), regurgitation, and possibly chronic cough or wheezing. Periumbilical crampy pain is not a typical feature of GERD.\n\n### 📚 Relevant Guidelines\n- **Rome Foundation - Rome IV Criteria**: The diagnostic criteria for functional abdominal pain disorders in children and adolescents. — [https://theromefoundation.org/rome-iv/rome-iv-criteria/](https://theromefoundation.org/rome-iv/rome-iv-criteria/)\n- **RACGP - Recurrent abdominal pain in children**: An Australian guideline for GPs on the assessment and management of recurrent abdominal pain, emphasising the identification of alarm features and the diagnosis of functional pain. — [https://www.racgp.org.au/afp/2017/june/recurrent-abdominal-pain-in-children/](https://www.racgp.org.au/afp/2017/june/recurrent-abdominal-pain-in-children/)\n- **Therapeutic Guidelines (eTG) - Paediatric gastroenterology**: Provides evidence-based recommendations on the approach to chronic abdominal pain in children, including when to investigate and how to manage functional disorders. — [https://tgldcdp.tg.org.au/etgAccess](https://tgldcdp.tg.org.au/etgAccess)", "image_path": "photo_2026-02-04_13-40-28 (1).jpg"}, {"id": 34481, "date": "2026-02-05T22:25:56+00:00", "stem": "A patient presents with episodic palpitations and hyperventilation. A resting ECG is normal, and the heart rhythm is regular. What is the **most appropriate next investigation**?", "options": "a. Troponin levels\nb. Echocardiography\nc. Chest X-ray\nd. Exercise stress test\ne. Ambulatory ECG", "answer": "e", "explanation": "### ✅ Correct Answer: e. Ambulatory ECG\n\n**Clinical Reasoning:**\n1.  **Presentation:** The patient has *episodic* palpitations and hyperventilation. The key word is 'episodic,' meaning the symptoms are not constant. A normal resting ECG confirms the patient is in sinus rhythm *at the time of the test*, but it does not capture the rhythm *during symptoms*.\n2.  **Goal of Investigation:** The primary goal is to correlate the patient's symptoms with their heart rhythm. This is the gold standard for diagnosing paroxysmal arrhythmias (e.g., supraventricular tachycardia, atrial fibrillation, ventricular ectopy) or confirming a normal rhythm during symptoms (which may point to an anxiety-related cause for the hyperventilation).\n3.  **Tool Selection:** An **Ambulatory ECG** (e.g., 24-48 hour Holter monitor or a longer-term event recorder) is specifically designed for this purpose. It allows for continuous or symptom-activated ECG recording during the patient's normal daily activities, providing the highest diagnostic yield for intermittent symptoms.\n4.  **Management Pathway:** Identifying the rhythm guides definitive management. If an arrhythmia is found, targeted treatment (medication, ablation) can be planned. If the ECG is normal during symptoms, the focus can shift to managing anxiety or other non-cardiac causes.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Troponin levels**: Troponin is a biomarker of myocardial injury. It is indicated in the acute assessment of suspected myocardial infarction or myocarditis. In a stable patient with episodic palpitations and a normal resting ECG, there is no indication of acute coronary syndrome, making troponin an inappropriate first-line test.\n- **b. Echocardiography**: Echocardiography is an excellent tool for assessing cardiac structure and function (e.g., valve abnormalities, cardiomyopathy, heart failure). It is crucial in the workup of palpitations *if* an arrhythmia is confirmed or if there are signs of structural heart disease (e.g., murmur, heart failure symptoms). However, as a *next* investigation after a normal ECG, it does not address the primary question of rhythm during symptoms.\n- **c. Chest X-ray**: A chest X-ray is useful for evaluating cardiac size, pulmonary congestion, or lung pathology. It has a very low diagnostic yield for the primary complaint of palpitations in an otherwise well patient with a normal physical exam and ECG.\n- **d. Exercise stress test**: An exercise stress test assesses for exercise-induced arrhythmias or myocardial ischemia. It is the test of choice if the patient's palpitations are **predictably and reproducibly triggered by exertion**. The stem does not specify this; it only states 'episodic,' which may occur at rest. Therefore, ambulatory monitoring is more appropriate as a first-line test for non-exertional, episodic symptoms.\n\n### 📚 Relevant Guidelines\n- **American Heart Association/American College of Cardiology/Heart Rhythm Society (AHA/ACC/HRS) Guideline for the Management of Patients With Atrial Fibrillation**: Recommends ambulatory ECG monitoring as a Class I indication for patients with symptoms suggestive of arrhythmia, such as palpitations, when the initial ECG is inconclusive. — [https://www.ahajournals.org/doi/10.1161/CIR.0000000000000935](https://www.ahajournals.org/doi/10.1161/CIR.0000000000000935)\n- **National Institute for Health and Care Excellence (NICE) CG191: Palpitations in adults: diagnosis and management**: Specifically recommends offering ambulatory ECG (24-hour or event recorder) to people with suspected paroxysmal arrhythmia if the diagnosis is not confirmed by a 12-lead ECG. — [https://www.nice.org.uk/guidance/cg191](https://www.nice.org.uk/guidance/cg191)\n- **UpToDate, 'Approach to the patient with palpitations'**: Details the diagnostic approach, emphasizing that ambulatory ECG monitoring is the principal diagnostic tool for patients with intermittent symptoms and a normal resting ECG. — [https://www.uptodate.com/contents/approach-to-the-patient-with-palpitations](https://www.uptodate.com/contents/approach-to-the-patient-with-palpitations)", "image_path": ""}, {"id": 34492, "date": "2026-02-06T05:19:37+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E. Neurocysticercosis", "explanation": "### ✅ Correct Answer: E. Neurocysticercosis\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** The patient is an 18-year-old with new-onset generalized tonic-clonic seizures and confusion. This is a classic presentation of neurocysticercosis (NCC), the most common cause of acquired epilepsy worldwide, particularly in young adults from endemic regions.\n2.  **Pathophysiology:** NCC is caused by the larval stage (cysticerci) of the pork tapeworm, *Taenia solium*. Humans become infected by ingesting eggs from contaminated food/water or via fecal-oral transmission. The larvae disseminate hematogenously and can encyst in various tissues, most notably the brain parenchyma, subarachnoid space, ventricles, eyes, and muscles.\n3.  **Imaging Findings:** The description of \"numerous well-defined cystic lesions throughout the cerebral cortex\" on MRI is pathognomonic for the vesicular (active) stage of parenchymal NCC. These cysts are often small, round, and contain a visible scolex.\n4.  **Supporting Clinical Clues:** The extra-neurological findings of swelling over the eye and testicular tenderness suggest disseminated cysticercosis with possible orbital and muscular involvement, which strongly supports a systemic parasitic infection like NCC.\n5.  **Management Context:** While the provided note mentions palliation, the standard initial management for active, symptomatic parenchymal NCC involves a combination of antiparasitic therapy (albendazole, often with praziquantel), corticosteroids (to manage treatment-induced inflammation), and antiepileptic drugs. Palliative/symptomatic care is indeed crucial, especially in cases of massive cyst burden or disseminated disease where definitive cure is challenging.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Cerebral metastases:** While metastases can present with seizures and multiple brain lesions, they are exceedingly rare in an otherwise healthy 18-year-old without a known primary cancer. Metastatic lesions typically have a different appearance (e.g., ring-enhancing, surrounding edema) and are not classically described as \"numerous well-defined cystic lesions.\"\n- **B. Progressive multifocal leukoencephalopathy (PML):** PML is a demyelinating disease caused by JC virus reactivation, almost exclusively seen in severely immunocompromised patients (e.g., AIDS, immunosuppressive therapy). It presents with progressive neurological deficits (e.g., hemiparesis, visual field loss, cognitive decline) rather than acute seizures. MRI shows multifocal, confluent, asymmetric white matter lesions without mass effect, not discrete cortical cysts.\n- **C. Cerebral vasculitis:** CNS vasculitis can cause seizures and multifocal neurological deficits due to ischemia. However, imaging typically shows multiple infarcts of varying ages in different vascular territories, sometimes with vessel wall enhancement on angiography. It does not cause multiple discrete cystic lesions.\n- **D. Neurosyphilis:** While neurosyphilis can have diverse presentations (meningitis, general paresis, tabes dorsalis), it is not associated with multiple cystic brain lesions. Its classic MRI findings include arteritis, gummas (rare), or non-specific white matter changes.\n\n### 📚 Relevant Guidelines\n- **World Health Organization (WHO) - Guidelines for management of Taenia solium neurocysticercosis**: Provides evidence-based recommendations on diagnosis, antiparasitic treatment, and management of complications. — https://www.who.int/publications/i/item/9789241516076\n- **Infectious Diseases Society of America (IDSA) - Clinical Practice Guidelines for the Diagnosis and Treatment of Neurocysticercosis**: Comprehensive guidelines covering diagnostic criteria, imaging, serology, and therapeutic approaches. — https://academic.oup.com/cid/article/66/8/e49/4851370\n- **Therapeutic Guidelines Ltd (eTG) - Neurocysticercosis**: Australian-specific therapeutic recommendations for drug treatment regimens. — https://tgldcdp.tg.org.au/", "image_path": "photo_2026-02-06_05-19-37.jpg"}, {"id": 34493, "date": "2026-02-06T05:20:57+00:00", "stem": "A one-day-old boy is reviewed on the maternity ward with his parents. He was born at term via spontaneous vaginal delivery. He has no significant medical history and takes no regular medications. His parents express concern about the appearance of their child's face. On examination, he appears well with vital signs within normal limits. There is a distinct abnormality in the upper lip, characterised by a separation extending from the midline to the base of the nose on the left side. The defect appears to involve only the upper lip and does not extend to the palate.\n\nWhich one of the following is the most likely cause of this condition?", "options": "Maternal alcohol use\nMaternal cytomegalovirus infection\nMaternal folate deficiency\nMaternal cocaine use\nMaternal diabetes", "answer": "Maternal folate deficiency", "explanation": "### ✅ Correct Answer: Maternal folate deficiency\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The described defect is a **unilateral cleft lip without cleft palate**. This is one of the most common congenital facial anomalies.\n2.  **Aetiology & Pathophysiology:** The primary aetiology of isolated cleft lip (with or without cleft palate) is multifactorial, involving both genetic susceptibility and environmental factors. A well-established and modifiable environmental risk factor is **maternal folate deficiency** during the periconceptional period (from before conception through the first trimester). Folate is crucial for DNA synthesis and methylation, processes vital for neural crest cell migration and fusion of the facial processes (medial nasal, lateral nasal, and maxillary) around weeks 4-7 of gestation. Deficiency disrupts this fusion, leading to orofacial clefts.\n3.  **Epidemiological Evidence:** Large-scale studies and public health interventions (e.g., folic acid fortification of food) have consistently demonstrated a significant reduction in the incidence of neural tube defects and a concurrent reduction in the rate of cleft lip and palate, providing strong evidence for the causal link.\n4.  **Exclusion of Other Options:** While other teratogens can cause facial anomalies, they are not the *most likely* cause for an isolated cleft lip in an otherwise well neonate.\n\n### ❌ Why the Other Options Are Wrong\n- **Maternal alcohol use:** Alcohol is a potent teratogen causing Fetal Alcohol Spectrum Disorder (FASD). Characteristic facial features include short palpebral fissures, smooth philtrum, and thin vermilion border of the upper lip, **not** a cleft lip. It is associated with neurodevelopmental disability, growth restriction, and other systemic issues.\n- **Maternal cytomegalovirus (CMV) infection:** Congenital CMV is the most common viral cause of congenital infection. It primarily causes sensorineural hearing loss, microcephaly, intracranial calcifications, chorioretinitis, and hepatosplenomegaly. It is not a recognized cause of isolated cleft lip.\n- **Maternal cocaine use:** Cocaine use in pregnancy is associated with placental abruption, preterm birth, intrauterine growth restriction, and congenital anomalies involving the cardiovascular, genitourinary, and limb systems. While some older studies suggested an association with clefts, more recent meta-analyses have not confirmed it as a major cause. It is not the most likely or established cause compared to folate deficiency.\n- **Maternal diabetes:** Poorly controlled pre-gestational diabetes (not gestational diabetes) is a significant teratogen. It is associated with a spectrum of anomalies including caudal regression syndrome, congenital heart defects, neural tube defects, and sacral agenesis. The risk for orofacial clefts is elevated but is considered a **minor** association compared to its link with the other major malformations listed. Folate deficiency is a stronger and more direct risk factor for isolated cleft lip.\n\n### 📚 Relevant Guidelines\n- **Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Pre-pregnancy Counselling**: Recommends folic acid supplementation (at least 400 mcg/day, higher dose if high risk) starting at least one month before conception to prevent neural tube defects and reduce the risk of orofacial clefts. — https://ranzcog.edu.au/womens-health/patient-information-resources/pre-pregnancy-counselling\n- **The Royal Australian College of General Practitioners (RACGP) - Guidelines for preventive activities in general practice**: Includes recommendation for periconceptional folic acid supplementation. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice\n- **World Health Organization (WHO) - Recommendations on antenatal care for a positive pregnancy experience**: Recommends daily oral iron and folic acid supplementation as part of routine antenatal care. — https://www.who.int/publications/i/item/9789241549912", "image_path": ""}, {"id": 34576, "date": "2026-02-14T12:52:13+00:00", "stem": "A 55-year-old man presents with a 3-day history of fever, productive cough with rusty sputum, and pleuritic chest pain. On examination, he has dullness to percussion and bronchial breathing over the right lower lobe. Chest X-ray confirms right lower lobe consolidation. What is the most likely causative organism?", "options": "A. Mycoplasma pneumoniae\nB. Haemophilus influenzae\nC. Staphylococcus aureus\nD. Streptococcus pneumoniae\nE. Klebsiella pneumoniae", "answer": "D. Streptococcus pneumoniae", "explanation": "### ✅ Correct Answer: D. Streptococcus pneumoniae\n\n**Clinical Reasoning:**\n- The patient presents with a classic acute community-acquired pneumonia (CAP) syndrome: acute onset (<1 week) of fever, productive cough with rusty sputum (suggestive of alveolar hemorrhage), pleuritic chest pain, and focal consolidation on exam and CXR.\n- **Streptococcus pneumoniae (pneumococcus)** is the most common bacterial cause of CAP in adults worldwide and in Australia, accounting for approximately 30-50% of cases where an organism is identified.\n- The 'rusty sputum' is a classic, though not pathognomonic, feature of pneumococcal lobar pneumonia, resulting from the intense inflammatory response and intra-alveolar hemorrhage.\n- The physical findings of dullness (due to consolidation) and bronchial breath sounds (as sound transmission improves through consolidated lung) are typical of lobar pneumonia.\n- Management pearls for AMC: For non-severe CAP in Australia, first-line treatment is amoxicillin (or doxycycline if penicillin allergic). For severe CAP requiring hospitalisation, combination therapy with a beta-lactam (e.g., benzylpenicillin or ceftriaxone) PLUS a macrolide (e.g., azithromycin) is recommended.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mycoplasma pneumoniae**: Typically causes a more subacute, 'atypical' pneumonia in younger adults. Symptoms are often milder, with prominent extrapulmonary features like headache, myalgia, and sore throat. A dry cough is more common than productive rusty sputum. Chest X-ray findings are often more diffuse and disproportionate to clinical symptoms.\n- **B. Haemophilus influenzae**: More common in patients with underlying COPD or other chronic lung disease. It is a less frequent cause of classic lobar pneumonia in otherwise healthy adults compared to S. pneumoniae.\n- **C. Staphylococcus aureus**: An important cause of pneumonia, but typically in specific settings: post-influenza infection, intravenous drug users, or patients with hematogenous spread (e.g., endocarditis). It often causes a more necrotizing pneumonia with cavitation, not typically presenting with classic lobar consolidation and rusty sputum.\n- **E. Klebsiella pneumoniae**: Classically associated with 'currant jelly' sputum (thick, bloody, and mucoid) and occurs more frequently in older men with comorbidities like alcoholism, diabetes, or chronic lung disease. It often causes a severe, necrotizing lobar pneumonia, frequently in the upper lobes, but is less common than S. pneumoniae as a cause of CAP.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Community-acquired pneumonia**: Provides Australian-specific empirical antibiotic recommendations based on severity and setting (community vs. hospital). — https://tgldcdp.tg.org.au/etgAccess\n- **RACGP – Management of community-acquired pneumonia**: A guideline for general practitioners on diagnosis and initial management in the community. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/community-acquired-pneumonia\n- **Choosing Wisely Australia – Imaging for community-acquired pneumonia**: Recommends against routine chest X-rays for adults with suspected CAP in the absence of specific clinical indicators. — https://www.choosingwisely.org.au/recommendations/racgp", "image_path": ""}, {"id": 34594, "date": "2026-02-17T12:56:49+00:00", "stem": "A 40-year-old man with ankylosing spondylitis, who has been in long-term remission on methotrexate (MTX) and ibuprofen, seeks advice as he is about to get married and plans to start a family. What is the most appropriate medication advice?", "options": "A. Discontinue both MTX and ibuprofen\nB. Discontinue MTX but continue ibuprofen\nC. Continue both medications unchanged\nD. Discontinue ibuprofen but continue MTX\nE. Switch to alternative disease-modifying therapy", "answer": "E. Switch to alternative disease-modifying therapy", "explanation": "### ✅ Correct Answer: E. Switch to alternative disease-modifying therapy\n\n**Clinical Reasoning:**\n1.  **Methotrexate (MTX) and Pregnancy:** Methotrexate is a known teratogen (Category D in Australia). It is contraindicated in men and women planning conception. For men, MTX can cause oligospermia and chromosomal damage to sperm, posing a risk to fetal development. Current guidelines recommend discontinuing MTX for at least 3 months (one spermatogenesis cycle) before attempting conception.\n2.  **Ibuprofen and Pregnancy:** While ibuprofen (an NSAID) is generally not recommended in the third trimester due to risks of premature closure of the ductus arteriosus and oligohydramnios, its use in the preconception period for the male partner is not a primary concern. The main issue is the MTX.\n3.  **Disease Management:** The patient is in remission, so active treatment to maintain this state is important. Simply stopping all therapy (Option A) risks a disease flare. The correct approach is to proactively switch from the teratogenic MTX to a safer disease-modifying antirheumatic drug (DMARD) for the preconception period and beyond. Sulfasalazine is often considered a first-line alternative in this scenario for both men and women planning pregnancy, as it is not associated with significant teratogenic risk.\n4.  **Conclusion:** The most appropriate advice is to plan a switch from MTX to a pregnancy-compatible DMARD, ensuring disease control is maintained while eliminating the teratogenic risk.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Discontinue both MTX and ibuprofen**: This is incorrect because it leaves the patient with no disease-modifying therapy, risking a flare of ankylosing spondylitis. While discontinuing MTX is correct, discontinuing ibuprofen is not the primary concern for the male partner preconception, and stopping all treatment is not optimal management.\n- **B. Discontinue MTX but continue ibuprofen**: This is partially correct in stopping MTX but is incomplete management. It does not address the need for ongoing disease control. Continuing only an NSAID (ibuprofen) is insufficient as a disease-modifying strategy for ankylosing spondylitis in the long term, especially if the patient has required MTX to achieve remission.\n- **C. Continue both medications unchanged**: This is dangerous and incorrect. Continuing methotrexate while planning conception is contraindicated due to its teratogenic effects on sperm.\n- **D. Discontinue ibuprofen but continue MTX**: This is the most incorrect option. It removes the less harmful drug (for the male partner) while continuing the teratogenic drug (MTX), which is the primary agent of concern.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Rheumatology**: Provides Australian recommendations on the use of DMARDs like methotrexate, including contraindications in pregnancy and preconception counselling for both men and women. — https://tgldcdp.tg.org.au/viewTopic?topicfile=rheumatological-conditions-drug-therapy&guidelineName=Rheumatology#toc_d1e394\n- **Royal Australian College of General Practitioners (RACGP) – Guidelines for Preventive Activities in General Practice (Red Book)**: Includes guidance on preconception care, which involves reviewing medications for teratogenic potential. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practi\n- **Australian Rheumatology Association**: Often provides position statements and practical guides on the management of rheumatic diseases in pregnancy and preconception, aligning with international best practices. — https://rheumatology.org.au", "image_path": ""}, {"id": 34610, "date": "2026-02-18T12:04:57+00:00", "stem": "A 65-year-old man with a history of hypertension presents with worsening renal function. He has a history of smoking and hyperlipidaemia. On examination, he has an abdominal bruit. Renal ultrasound shows asymmetry in kidney size. Which of the following is the most likely diagnosis?", "options": "A. Polycystic kidney disease\nB. Diabetic nephropathy\nC. Renal artery stenosis\nD. Chronic glomerulonephritis\nE. Hypertensive nephrosclerosis", "answer": "C. Renal artery stenosis", "explanation": "### ✅ Correct Answer: C. Renal artery stenosis\n\n**Clinical Reasoning:**\n1. **Patient Profile:** Elderly male with atherosclerotic risk factors (smoking, hyperlipidaemia, hypertension).\n2. **Key Clinical Features:**\n   - **Abdominal bruit:** Classic physical finding suggesting turbulent blood flow in a stenosed renal artery.\n   - **Worsening renal function in the context of hypertension:** RAS is a classic cause of secondary hypertension and can lead to ischaemic nephropathy.\n   - **Asymmetric kidney size on ultrasound:** Unilateral renal artery stenosis often leads to a smaller kidney on the affected side due to chronic hypoperfusion.\n3. **Pathophysiology:** Atherosclerotic renal artery stenosis (most common in older adults) reduces renal perfusion, activating the renin-angiotensin-aldosterone system (RAAS). This leads to refractory hypertension and, if bilateral or in a solitary kidney, can cause progressive renal failure (ischaemic nephropathy).\n4. **Diagnostic Approach:** The clinical triad of hypertension, renal impairment, and vascular bruit is highly suggestive. Confirmatory tests include Doppler ultrasound (showing elevated resistive indices), CT angiography, or MR angiography. Renal arteriography remains the gold standard.\n5. **Management Pearls:**\n   - Medical management with ACE inhibitors/ARBs (cautiously, monitoring renal function), statins, and antiplatelet therapy.\n   - Revascularisation (angioplasty ± stenting) is considered for refractory hypertension, deteriorating renal function, or flash pulmonary oedema.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Polycystic kidney disease:** Presents with bilateral enlarged kidneys with multiple cysts, often with a family history. It does not typically cause an abdominal bruit or unilateral kidney size asymmetry.\n- **B. Diabetic nephropathy:** A common cause of chronic kidney disease but is typically associated with long-standing diabetes, proteinuria, and symmetrically small kidneys in late stages. It does not present with an abdominal bruit.\n- **D. Chronic glomerulonephritis:** Presents with hypertension, renal impairment, and often active urinary sediment (haematuria, red cell casts). Kidney size is usually symmetrically reduced, and an abdominal bruit is not a feature.\n- **E. Hypertensive nephrosclerosis:** Results from long-standing, poorly controlled hypertension leading to benign arteriolar nephrosclerosis. Kidneys are symmetrically small and scarred. While hypertension is present, an abdominal bruit and significant asymmetry are not typical.\n\n### 📚 Relevant Guidelines\n- **[Kidney Health Australia - Caring for Australasians with Renal Impairment (KHA-CARI)]**: Guidelines on diagnosis and management of renovascular disease — https://kidney.org.au/cms_uploads/docs/cari-guidelines-renovascular-disease.pdf\n- **[Therapeutic Guidelines: Cardiovascular]**: Management of hypertension, including investigation for secondary causes like renal artery stenosis — https://tgldcdp.tg.org.au/viewTopic?topicfile=hypertension-in-adults&guidelineName=Cardiovascular#toc_d1e289\n- **[European Society of Cardiology/European Society of Hypertension (ESC/ESH)]**: Guidelines for the management of arterial hypertension, covering diagnosis of secondary hypertension — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Arterial-Hypertension-Management-of", "image_path": ""}, {"id": 34628, "date": "2026-02-19T09:09:28+00:00", "stem": "A 68-year-old woman on warfarin presents after a minor fall. She is fully conscious (GCS 15). No vomiting. No headache. Normal exam. What is the most appropriate next step?", "options": "A) Discharge\nB) CT brain\nC) Observe for 4 hours\nD) Reassure only", "answer": "B) CT brain", "explanation": "### ✅ Correct Answer: B) CT brain\n\n**Clinical Reasoning:**\n1. **High-Risk Patient:** The patient is 68 years old and on warfarin (an anticoagulant). Anticoagulation significantly increases the risk of intracranial hemorrhage (ICH) even after minor head trauma.\n2. **Clinical Presentation:** While she is currently asymptomatic (GCS 15, no headache, no vomiting, normal exam), this does not rule out a developing intracranial bleed. Patients on anticoagulants can have a \"lucid interval\" before neurological deterioration.\n3. **Guideline-Based Management:** Standard emergency guidelines (e.g., NICE, local Australian protocols) mandate urgent CT brain imaging for any patient on anticoagulation who sustains a head injury, regardless of the presence or absence of immediate symptoms. Observation alone is insufficient due to the delayed bleeding risk.\n4. **Risk Stratification:** The mechanism (fall) combined with anticoagulant use places her in the highest risk category, necessitating definitive imaging to exclude a life-threatening hemorrhage before considering discharge.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Discharge**: Discharging a patient on warfarin after a head injury without imaging is unsafe and violates standard care guidelines. It fails to assess for the potentially fatal complication of an intracranial bleed.\n- **C) Observe for 4 hours**: Observation is inadequate for patients on anticoagulants. A bleed can develop or become symptomatic well beyond a 4-hour window. Imaging is required to make a safe disposition decision.\n- **D) Reassure only**: Similar to discharge, reassurance without investigation ignores the significant, guideline-mandated need to rule out intracranial hemorrhage in this high-risk population.\n\n### 📚 Relevant Guidelines\n- **NICE Guideline [NG232] - Head injury: assessment and early management**: Recommends a CT head within 1 hour for any head injury in a patient taking anticoagulants, regardless of clinical findings. — https://www.nice.org.uk/guidance/ng232\n- **Therapeutic Guidelines (eTG) - Neurology**: Supports urgent neuroimaging for head injury in patients on anticoagulants due to the high risk of intracranial hemorrhage. — https://tgldcdp.tg.org.au/etgaccess\n- **Choosing Wisely Australia - Emergency Medicine**: Highlights the importance of not underestimating head injury in older adults or those on anticoagulants, advocating for appropriate imaging. — https://www.choosingwisely.org.au/recommendations/rama", "image_path": ""}, {"id": 34629, "date": "2026-02-19T09:10:07+00:00", "stem": "A 56-year-old poorly controlled diabetic female presents with sudden onset of binocular diplopia. She also has associated headaches. Her left eye appears to be deviated out and downwards. Pupillary examination shows mydriasis in the left eye. Which of the following investigation/examination is MOST relevant to rule out underlying cause in this case? (WHAT IS THE PROBABLE DIAGNOSIS AND THE MOST LIKELY VESSEL INVOLVED)", "options": "A. Blood pressure monitoring\nB. Cerebral angiography\nC. Hirschberg/corneal light reflection test\nD. Thyroid function tests", "answer": "B. Cerebral angiography", "explanation": "### ✅ Correct Answer: B. Cerebral angiography\n\n**Clinical Reasoning:**\n1. **Probable Diagnosis:** The presentation is classic for a **posterior communicating artery (PComA) aneurysm** causing a **third cranial nerve (CN III) palsy**.\n2. **Key Features:**\n   - **Sudden onset** in a middle-aged patient with headache suggests a vascular event (e.g., aneurysm expansion or rupture).\n   - **CN III Palsy Pattern:** The left eye is deviated \"out and down\" due to unopposed action of the lateral rectus (CN VI) and superior oblique (CN IV). This is the classic \"down and out\" position.\n   - **Pupillary Involvement:** Mydriasis (pupil dilation) indicates **compressive** etiology affecting the parasympathetic pupillomotor fibers that run on the outside of the nerve. This is a **red flag** distinguishing it from a \"medical\" or microvascular CN III palsy (e.g., from diabetes), which is typically **pupil-sparing**.\n3. **Most Likely Vessel:** The **posterior communicating artery (PComA)** is the most common site for an aneurysm causing an isolated, painful CN III palsy with pupillary involvement.\n4. **Most Relevant Investigation:** **Cerebral angiography** (CT angiography or digital subtraction angiography) is the definitive imaging modality to detect and characterize an intracranial aneurysm. It is the most relevant test to \"rule out the underlying cause\" (a potentially life-threatening aneurysm) in this acute, high-risk presentation.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood pressure monitoring**: While hypertension is a risk factor for aneurysm formation/rupture, monitoring BP does not diagnose the underlying structural lesion (aneurysm) causing the acute neurological deficit.\n- **C. Hirschberg/corneal light reflection test**: This is a simple test to **demonstrate** the presence of strabismus (eye misalignment) but does not diagnose the **cause** of the CN III palsy. The diagnosis (deviation) is already clinically apparent; the urgent need is to identify the etiology.\n- **D. Thyroid function tests**: These are relevant for thyroid eye disease (which can cause diplopia and proptosis) but not for a sudden-onset, painful, pupil-involving CN III palsy. The clinical picture is not suggestive of thyroid ophthalmopathy.\n\n### 📚 Relevant Guidelines\n- **UpToDate - 'Third cranial nerve (oculomotor nerve) palsy in adults'**: Details the urgent need for neuroimaging (CTA/MRA/DSA) in any acute CN III palsy with pupillary involvement or pain to rule out aneurysm. — https://www.uptodate.com/contents/third-cranial-nerve-oculomotor-nerve-palsy-in-adults\n- **American Heart Association/American Stroke Association (AHA/ASA) Guidelines for the Management of Patients With Unruptured Intracranial Aneurysms**: Supports the use of angiography for diagnosis and characterization of suspected intracranial aneurysms. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n- **Therapeutic Guidelines (eTG) - Neurology**: Discusses the approach to acute painful ophthalmoplegia, emphasizing the need for urgent imaging to exclude compressive lesions like aneurysms. — https://tgldcdp.tg.org.au/etgaccess", "image_path": ""}, {"id": 34631, "date": "2026-02-19T10:02:53+00:00", "stem": "A Child with Hemophilia A. Without trauma he has a pain in his knee which started 30 mins ago. Knee is swollen and the movement is restricted. What is the first action in management?", "options": "A) Factor VI\nB) Factor VII\nC) Factor VIII\nD) Aspiration of the fluid", "answer": "C) Factor VIII", "explanation": "### ✅ Correct Answer: C) Factor VIII\n\n**Clinical Reasoning:**\n1. **Diagnosis:** This is a classic presentation of a **spontaneous hemarthrosis** (bleeding into a joint) in a child with **Hemophilia A**.\n2. **Pathophysiology:** Hemophilia A is caused by a deficiency of **Factor VIII**. Acute joint bleeding is a common and serious complication.\n3. **First Action - Immediate Factor Replacement:** The cornerstone of acute management is **urgent administration of the missing clotting factor (Factor VIII)**. This is a time-critical intervention to stop the bleeding, limit joint damage, relieve pain, and preserve function.\n   - **Goal:** Raise the Factor VIII level to hemostatic levels (typically 40-80% for a major joint bleed).\n   - **Administration:** Can be via recombinant Factor VIII concentrate or plasma-derived concentrate.\n4. **Rationale for Sequence:** Factor replacement must come **before** any invasive procedure (like aspiration). Aspiration (option D) is **contraindicated** as an initial step because:\n   - It can exacerbate bleeding if the clotting factor deficiency is not corrected first.\n   - It increases the risk of introducing infection.\n   - It is rarely needed if factor replacement is given promptly and effectively.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Factor VI**: There is no recognized \"Factor VI\" in the coagulation cascade. This is a distractor.\n- **B) Factor VII**: Factor VII is used in the management of Hemophilia with inhibitors (e.g., recombinant Factor VIIa) or in Factor VII deficiency. It is not the first-line replacement therapy for standard Hemophilia A.\n- **D) Aspiration of the fluid**: While joint aspiration may be considered in rare, refractory cases **after** adequate factor replacement, it is **never** the first action. Performing it first is dangerous and incorrect management.\n\n### 📚 Relevant Guidelines\n- **World Federation of Hemophilia (WFH) Guidelines for the Management of Hemophilia**: State that the immediate treatment for acute hemarthrosis is factor replacement therapy (Factor VIII for Hemophilia A). Aspiration is not recommended routinely. — https://www1.wfh.org/publication/files/pdf-1472.pdf\n- **Therapeutic Guidelines (eTG) - Haematology**: Recommends prompt administration of factor concentrate for acute bleeds in hemophilia. Joint aspiration is reserved for specific circumstances after factor replacement. — https://tgldcdp.tg.org.au/etgaccess\n- **Australian Haemophilia Centre Directors' Organisation (AHCDO)**: Provides Australian-specific guidelines on the management of hemophilia, emphasizing early factor replacement to prevent long-term arthropathy. — http://www.ahcdo.org.au/", "image_path": ""}, {"id": 34636, "date": "2026-02-19T12:22:34+00:00", "stem": "19 year old child with abnormal LFT, tremor, behaviour changes, decline academic performance. Physical exam show mild hepatomegaly, no alcohol use, Wilson disease suspected. Patient tachypnoeic, no murmur. Most likely diagnosis?", "options": "Aortic stenosis\nCardiomyopathy\nPDA\nVSD\nASD", "answer": "B. Cardiomyopathy", "explanation": "### ✅ Correct Answer: B. Cardiomyopathy\n\n**Clinical Reasoning:**\n1.  **Wilson's Disease Context:** The patient's presentation (young adult, abnormal LFTs, tremor, neuropsychiatric changes, hepatomegaly) is classic for Wilson's disease (hepatolenticular degeneration), an autosomal recessive disorder of copper metabolism.\n2.  **Cardiac Manifestation:** Wilson's disease can cause copper deposition in the myocardium, leading to a **cardiomyopathy**. This most commonly presents as left ventricular hypertrophy or a dilated cardiomyopathy, which can result in heart failure. The symptom of **tachypnoea** in the vignette is a key clue pointing towards cardiac decompensation/pulmonary edema, a consequence of heart failure from cardiomyopathy.\n3.  **Exclusion of Other Options:** The absence of a murmur makes structural valvular or shunt lesions (AS, PDA, VSD, ASD) highly unlikely, as these almost invariably produce audible murmurs. The tachypnoea is not explained by these silent lesions in a 19-year-old without other findings.\n4.  **AMC Pearl:** In a patient with a systemic disease known to have multi-organ involvement (like Wilson's), always consider its extra-hepatic/extra-neurological manifestations when presented with new symptoms. Cardiac involvement, though less common, is a recognized complication.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Aortic Stenosis**: This would typically present with a systolic ejection murmur (often radiating to the carotids), possibly syncope, angina, and signs of left ventricular hypertrophy. The absence of a murmur and the context of Wilson's disease make this incorrect.\n- **C. PDA**: A patent ductus arteriosus causes a continuous \"machinery\" murmur. It is usually diagnosed in infancy/childhood and is not associated with Wilson's disease. The absence of a murmur rules this out.\n- **D. VSD**: A ventricular septal defect produces a pansystolic murmur, often loud and associated with a thrill. It is a congenital lesion, not typically presenting for the first time with tachypnoea in a 19-year-old without a murmur.\n- **E. ASD**: An atrial septal defect typically causes a wide, fixed split S2 and a systolic flow murmur over the pulmonary area. While it can be asymptomatic until adulthood, the absence of any auscultatory findings and the direct link between Wilson's disease and cardiomyopathy make this a less likely cause of the tachypnoea.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Wilson's disease](https://www.racgp.org.au/afp/2012/september/wilson's-disease/)**: An Australian review covering the diagnosis and multi-system management of Wilson's disease, including its extra-hepatic complications. \n- **[American Association for the Study of Liver Diseases (AASLD) Guideline on Wilson Disease](https://aasldpubs.onlinelibrary.wiley.com/doi/full/10.1002/hep.29849)**: A comprehensive, evidence-based guideline detailing the clinical presentation, diagnosis, and treatment of Wilson's disease, including notes on less common manifestations.\n- **[UpToDate - Wilson disease: Clinical manifestations, diagnosis, and natural history](https://www.uptodate.com/contents/wilson-disease-clinical-manifestations-diagnosis-and-natural-history)**: A detailed resource that lists cardiomyopathy as a recognized, though infrequent, complication of copper overload in Wilson's disease.", "image_path": ""}, {"id": 34667, "date": "2026-02-20T23:29:21+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia). In acute haemorrhage, the haemoglobin level is a poor initial guide to transfusion need, as haemodilution has not yet occurred; the true deficit is masked. The priority is to restore circulating volume and oxygen-carrying capacity to prevent end-organ ischaemia and death. Transfusion is indicated for patients with active bleeding and signs of hypovolaemic shock, regardless of the initial Hb. This aligns with a 'restrictive' transfusion strategy for haemodynamically stable patients, but an active bleed with shock is an absolute indication for immediate intervention.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is a **chronic, stable anaemia**. The patient is haemodynamically stable and asymptomatic. The first-line management is **oral iron supplementation** and investigation/treatment of the underlying cause (menorrhagia). Transfusion is rarely indicated in chronic, stable iron deficiency anaemia and carries risks (e.g., fluid overload, transfusion reactions).\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with cardiac disease have a higher transfusion threshold (often Hb <80 g/L or if symptomatic), this patient is **asymptomatic at rest** with a chronic anaemia. Immediate transfusion is not indicated. The focus should be on diagnosing the cause of the chronic anaemia (e.g., renal disease, myelodysplasia).\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is a **stable, postpartum anaemia**. The patient is well and asymptomatic. Postpartum anaemia is common and, if stable, is managed with **oral iron therapy**. Transfusion is reserved for symptomatic patients or those with active bleeding.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This Hb level (95 g/L) is only mildly low. Chemotherapy-induced anaemia is common, but a threshold for transfusion is typically **Hb <80 g/L or symptomatic anaemia** (e.g., significant fatigue, dyspnoea). 'Mild fatigue only' does not warrant immediate transfusion; erythropoiesis-stimulating agents or watchful waiting may be appropriate.\n\n### 📚 Relevant Guidelines\n- **National Blood Authority Australia (NBA) Patient Blood Management Guidelines**: Provide evidence-based recommendations for transfusion, emphasising a restrictive strategy (Hb <70 g/L for most stable patients) and outlining clear indications for transfusion in acute haemorrhage. — https://www.blood.gov.au/pbm-guidelines\n- **Therapeutic Guidelines (eTG) – Haematology**: Outline specific transfusion thresholds for different clinical scenarios, including active bleeding and chronic anaemia. — https://tgldcdp.tg.org.au/etgaccess\n- **Choosing Wisely Australia – Haematology**: Recommends avoiding red cell transfusion for stable, chronic anaemia without symptoms. — https://www.choosingwisely.org.au/recommendations/haematology", "image_path": ""}, {"id": 34668, "date": "2026-02-20T23:29:29+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a **potent oxidising agent** and a **well-known, high-risk trigger** for acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic for oxidant-induced haemolysis in G6PD deficiency: acute onset of symptoms (dark urine from haemoglobinuria, jaundice from unconjugated hyperbilirubinaemia, fatigue from anaemia) following exposure to a triggering agent. The laboratory findings confirm **intravascular haemolysis** (low Hb, elevated reticulocytes, elevated indirect bilirubin) and the blood film shows **bite cells and blister cells**, which are characteristic of oxidative damage to red cell membranes. Dapsone is frequently implicated in such cases, even at therapeutic doses.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is **not a common oxidant trigger** for G6PD deficiency haemolysis. It is generally considered safe in standard therapeutic doses for individuals with G6PD deficiency. High doses can cause toxicity via a different mechanism (hepatotoxicity), but not typically acute haemolysis.\n- **B. Amoxicillin**: Penicillins like amoxicillin are **not significant oxidising drugs**. They are not listed as common triggers for haemolysis in G6PD deficiency. They can cause other adverse reactions like rash or diarrhoea, but not this acute haemolytic picture.\n- **D. Metformin**: Metformin is an anti-diabetic drug and is **not known to cause oxidant stress** or haemolysis in G6PD deficiency. Its side effects are primarily gastrointestinal or, rarely, lactic acidosis.\n- **E. Prednisolone**: Prednisolone is a corticosteroid used to treat various inflammatory conditions. It is **not an oxidising agent** and does not precipitate haemolysis in G6PD deficiency. In fact, steroids may sometimes be used in the management of other types of autoimmune haemolytic anaemia, but not for G6PD deficiency.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Haematology**: Includes a list of drugs to avoid in G6PD deficiency, highlighting dapsone, sulfonamides, nitrofurantoin, and certain antimalarials as high-risk agents. — https://tgldcdp.tg.org.au/etgaccess\n- **UpToDate – G6PD Deficiency**: Provides a comprehensive list of drugs and chemicals that can induce haemolysis in G6PD deficiency, categorising them by risk level. — https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-g6pd-deficiency-drugs-to-avoid\n- **WHO Working Group – G6PD Deficiency**: Classifies drugs based on their potential to cause haemolysis in G6PD deficient individuals. — https://apps.who.int/iris/handle/10665/44629", "image_path": ""}, {"id": 34669, "date": "2026-02-20T23:29:39+00:00", "stem": "A 64‑year‑old woman presents with progressive numbness and tingling in her feet and difficulty walking. She also reports fatigue. She has no history of alcohol misuse. Examination shows pallor, a broad‑based gait and impaired vibration sense in the lower limbs.\n\nInvestigations:\n\n• Hb: 82 g/L (115–155)\n\n• MCV: 112 fL (80–96)\n\n• Peripheral blood film: macro‑ovalocytes and hypersegmented neutrophils\n\n• Serum vitamin B₁₂: markedly low\n\n• Serum folate: normal\n\nWhat is the most appropriate initial treatment?", "options": "A. Oral folic acid\nB. Intramuscular hydroxocobalamin\nC. Oral vitamin B₁₂ tablets alone\nD. Red blood cell transfusion only", "answer": "B", "explanation": "### ✅ Correct Answer: B. Intramuscular hydroxocobalamin\n\nThe patient has a **severe vitamin B12 (cobalamin) deficiency** with **neurological complications** (subacute combined degeneration of the cord – evidenced by sensory neuropathy, broad-based gait, and impaired vibration sense). In this scenario, **intramuscular (IM) hydroxocobalamin is the standard, first-line treatment**. Oral B12 is unreliable in severe deficiency, especially with neurological involvement, due to potential malabsorption (e.g., pernicious anaemia is a likely cause). IM administration ensures rapid and complete correction of the deficiency, which is critical to halt and potentially reverse neurological damage. Treatment typically starts with a loading dose (e.g., 1 mg IM on alternate days for 2 weeks), followed by maintenance therapy.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Oral folic acid**: This is **contraindicated as initial monotherapy**. Administering folate alone in B12 deficiency can correct the anaemia (by allowing DNA synthesis to proceed) but **exacerbate or unmask the neurological damage**. This is because folate metabolism 'traps' methyl groups, worsening the neurological sequelae of B12 deficiency. Folate should only be given if a concomitant folate deficiency is confirmed, and always alongside B12 replacement.\n- **C. Oral vitamin B₁₂ tablets alone**: High-dose oral B12 can be effective for some patients with dietary deficiency, but it is **not the first choice for severe deficiency with neurological signs**, especially when malabsorption is suspected. The absorption is variable and less reliable than IM injection in this acute, high-stakes situation.\n- **D. Red blood cell transfusion only**: Transfusion is **rarely indicated** in chronic, stable B12 deficiency anaemia, even with an Hb of 82 g/L. The patient is not described as haemodynamically unstable. The definitive treatment is B12 replacement, which will correct the anaemia over weeks. Transfusion carries risks (fluid overload, transfusion reactions) and does not address the underlying deficiency or the neurological pathology.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Endocrinology**: Provides detailed protocols for the diagnosis and management of vitamin B12 deficiency, including loading and maintenance regimens with intramuscular hydroxocobalamin. — https://tgldcdp.tg.org.au/etgaccess\n- **British Society for Haematology (BSH) Guidelines on Cobalamin and Folate Disorders**: Recommends intramuscular hydroxocobalamin as first-line treatment for patients with neurological involvement. — https://onlinelibrary.wiley.com/doi/full/10.1111/bjh.16278\n- **RACGP – Vitamin B12 deficiency**: A practical guide for GPs, outlining when to use intramuscular versus oral replacement. — https://www.racgp.org.au/afp/2017/januaryfebruary/investigating-vitamin-b12-deficiency", "image_path": ""}, {"id": 34695, "date": "2026-02-21T05:45:57+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** accompanied by **haemodynamic instability** (hypotension and tachycardia). In acute bleeding, the haemoglobin level is a poor initial indicator of severity as haemodilution hasn't fully occurred; the key is the clinical picture of shock. Immediate transfusion is indicated to restore circulating volume and oxygen-carrying capacity while definitive haemostasis is achieved (e.g., via endoscopy). The other patients have chronic anaemia or mild acute anaemia without instability, where transfusion is rarely the first-line management.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is chronic, stable iron deficiency anaemia. First-line treatment is oral iron supplementation and management of the underlying cause (menorrhagia). Transfusion is not indicated in stable chronic anaemia without severe symptoms or active bleeding.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: Although he has IHD, he is asymptomatic at rest with a chronic, modest anaemia. Transfusion threshold in stable cardiac patients is typically lower (e.g., Hb <80 g/L or if symptomatic). Without symptoms or active ischaemia, transfusion is not immediately indicated; investigation of the cause is priority.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is likely postpartum anaemia, but she is well and asymptomatic. Postpartum anaemia is common and, if stable, is managed with iron therapy, not transfusion, unless severe symptoms or ongoing bleeding are present.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This Hb level is only mildly reduced. Chemotherapy-induced anaemia is common, but a threshold for transfusion is typically lower (e.g., Hb <80 g/L or symptomatic anaemia). Mild fatigue alone does not warrant immediate transfusion; erythrop
