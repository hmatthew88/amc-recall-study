c. The first-line management is **oral iron supplementation** and investigation/treatment of the underlying cause (menorrhagia). Transfusion is rarely indicated in stable chronic anaemia and carries risks without clear benefit.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with cardiac disease may have a higher transfusion threshold (often Hb <80 g/L) to prevent myocardial ischaemia, this patient is **chronic, stable, and asymptomatic**. There is no acute indication for transfusion. The focus should be on diagnosing the cause of the chronic normocytic anaemia.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is a **stable, postpartum anaemia**. The patient is well and functioning. Postpartum anaemia is common and, if symptomatic, can often be managed with **oral iron therapy**. Transfusion is reserved for severe, symptomatic anaemia or active bleeding.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: A Hb of 95 g/L is only mildly low. **Mild fatigue** is a common side effect of chemotherapy and is not a specific indicator for transfusion. Guidelines typically recommend transfusion for chemotherapy-induced anaemia when Hb is ≤80 g/L or for symptomatic anaemia (e.g., dyspnoea, chest pain, profound fatigue) at higher levels. Mild fatigue alone does not meet this criterion.\n\n### 📚 Relevant Guidelines\n- **[National Blood Authority (Australia) - Patient Blood Management Guidelines](https://www.blood.gov.au/pbm-guidelines)**: Module 2 - Perioperative, and Module 4 - Critical Care/Massive Transfusion. These emphasise restrictive transfusion strategies (Hb threshold of 70 g/L for most stable patients) and the importance of clinical context over Hb number alone.\n- **[Therapeutic Guidelines (eTG) - Anaemia and transfusion](https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia-transfusion&guidelineName=Blood%20and%20Cancer#toc_d1e289)**: Provides clear indications for red cell transfusion, highlighting acute blood loss with haemodynamic compromise as a key indication.\n- **[Choosing Wisely Australia - RBC Transfusion Recommendations](https://www.choosingwisely.org.au/recommendations/racp)**: Recommends against transfusion for stable, non-bleeding patients with Hb >70-80 g/L, reinforcing a restrictive strategy.", "image_path": ""}, {"id": 34668, "date": "2026-02-20T23:29:29+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a **well-known oxidant drug** that can precipitate acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic for acute haemolysis: sudden onset of symptoms (dark urine from haemoglobinuria, jaundice from unconjugated hyperbilirubinaemia, fatigue from anaemia) following an oxidative insult. The laboratory findings confirm intravascular haemolysis: low Hb, elevated reticulocytes (bone marrow response), elevated indirect bilirubin, and the presence of **\"bite cells\" and blister cells** on the blood film, which are characteristic of oxidative damage to red cell membranes. Dapsone is metabolised to hydroxylamine, a potent oxidant, making it a high-risk medication for G6PD-deficient individuals.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is **not a common trigger** for haemolysis in G6PD deficiency. In massive overdose, it can cause methaemoglobinaemia, but it is not a classic oxidant stressor associated with G6PD deficiency haemolysis.\n- **B. Amoxicillin**: Penicillins like amoxicillin are **not typical oxidant drugs**. They are generally safe in G6PD deficiency. Drug-induced haemolysis with penicillins is usually due to an immune mechanism (IgG-mediated, causing a positive direct antiglobulin test), not oxidative stress.\n- **D. Metformin**: Metformin is an antidiabetic drug and is **not associated** with causing oxidative haemolysis in G6PD deficiency. It is considered safe for use in these patients.\n- **E. Prednisolone**: Prednisolone is a corticosteroid and is **not an oxidant stressor**. It is often used therapeutically in some forms of autoimmune haemolytic anaemia but does not precipitate haemolysis in G6PD deficiency.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - G6PD Deficiency](https://tgldcdp.tg.org.au/viewTopic?topicfile=g6pd-deficiency&guidelineName=Blood%20and%20Cancer#toc_d1e46)**: Lists drugs to be avoided in G6PD deficiency, including dapsone, sulfonamides, nitrofurantoin, and primaquine.\n- **[UpToDate - G6PD Deficiency: Drug List](https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-g6pd-deficiency-drug-list)**: Provides a comprehensive, evidence-based list of drugs that are unsafe, potentially unsafe, and safe in G6PD deficiency, categorising dapsone as a high-risk agent.\n- **[WHO - G6PD Deficiency](https://www.who.int/news-room/fact-sheets/detail/glucose-6-phosphate-dehydrogenase-deficiency)**: Highlights the importance of avoiding specific oxidant drugs to prevent haemolysis.", "image_path": ""}, {"id": 34669, "date": "2026-02-20T23:29:39+00:00", "stem": "A 64‑year‑old woman presents with progressive numbness and tingling in her feet and difficulty walking. She also reports fatigue. She has no history of alcohol misuse. Examination shows pallor, a broad‑based gait and impaired vibration sense in the lower limbs.\n\nInvestigations:\n\n• Hb: 82 g/L (115–155)\n\n• MCV: 112 fL (80–96)\n\n• Peripheral blood film: macro‑ovalocytes and hypersegmented neutrophils\n\n• Serum vitamin B₁₂: markedly low\n\n• Serum folate: normal\n\nWhat is the most appropriate initial treatment?", "options": "A. Oral folic acid\nB. Intramuscular hydroxocobalamin\nC. Oral vitamin B₁₂ tablets alone\nD. Red blood cell transfusion only", "answer": "B", "explanation": "### ✅ Correct Answer: B. Intramuscular hydroxocobalamin\n\nThis patient has a **severe vitamin B12 (cobalamin) deficiency** causing **megaloblastic anaemia** (low Hb, high MCV, macro-ovalocytes, hypersegmented neutrophils) and **neurological complications** (subacute combined degeneration of the cord – presenting with sensory neuropathy, broad-based gait, and impaired vibration sense). **Intramuscular (IM) hydroxocobalamin is the standard, first-line treatment** for symptomatic B12 deficiency, especially with neurological involvement. The reasons are:\n1.  **Rapid and Reliable Absorption**: Bypasses the gut, which is crucial as the most common cause (pernicious anaemia) involves impaired intestinal absorption due to lack of intrinsic factor.\n2.  **Neurological Protection**: Rapid repletion is essential to halt and potentially reverse neurological damage. Oral therapy is less reliable initially in severe deficiency with malabsorption.\n3.  **Standard Regimen**: The typical loading dose is 1 mg IM daily for 5-7 days, then weekly until haematological recovery, followed by maintenance 3-monthly injections.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Oral folic acid**: This is **contraindicated as initial monotherapy**. While folate can correct the haematological abnormalities of B12 deficiency, it **exacerbates the neurological damage** by \"masking\" the anaemia while allowing the neurological degeneration to progress unchecked. Folate should only be given if a concomitant folate deficiency is confirmed, and always alongside B12 replacement.\n- **C. Oral vitamin B₁₂ tablets alone**: High-dose oral B12 (1-2 mg daily) can be effective for maintenance therapy in some patients, but **it is not the first choice for initial treatment of severe, symptomatic deficiency with neurological signs**. IM therapy ensures 100% bioavailability and is the recommended standard of care to guarantee adequate repletion, especially when malabsorption is likely.\n- **D. Red blood cell transfusion only**: Transfusion is **rarely indicated** in chronic, stable megaloblastic anaemia, even with a Hb of 82 g/L. The patient is described with progressive symptoms but not in acute distress or haemodynamic compromise. The priority is to treat the underlying deficiency, not just correct the Hb number. Transfusion carries risks and does not address the neurological pathology. It might be considered in extreme, life-threatening anaemia (e.g., Hb <60 g/L with cardiac failure), but that is not the case here.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Vitamin B12 and Folate Deficiencies](https://tgldcdp.tg.org.au/viewTopic?topicfile=vitamin-b12-folate-deficiencies&guidelineName=Blood%20and%20Cancer#toc_d1e137)**: Clearly states that for B12 deficiency with neurological symptoms, treatment is with intramuscular hydroxocobalamin, providing the specific dosing schedule.\n- **[British Society for Haematology - Guidelines for the Diagnosis and Treatment of Cobalamin and Folate Disorders](https://b-s-h.org.uk/guidelines/guidelines/cobalamin-and-folate/)**: Recommends intramuscular hydroxocobalamin as first-line therapy for patients with neurological involvement.\n- **[RACGP - Investigating and managing vitamin B12 deficiency](https://www.racgp.org.au/afp/2013/may/vitamin-b12-deficiency/)**: A practical Australian guide confirming IM B12 as the standard treatment, particularly for pernicious anaemia or severe deficiency.", "image_path": ""}, {"id": 34695, "date": "2026-02-21T05:45:57+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient requires immediate transfusion because he presents with **active haemorrhage and haemodynamic instability** (hypotension and tachycardia), indicating hypovolaemic shock. In acute bleeding, the haemoglobin level is an unreliable initial guide to transfusion need as haemodilution hasn't occurred yet; the key indicators are signs of shock and ongoing blood loss. Transfusion in this context is life-saving to restore circulating volume and oxygen-carrying capacity while definitive haemostasis is achieved. The other patients have chronic anaemia or stable presentations where transfusion is either not indicated or would be a last resort after addressing the underlying cause.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: Chronic iron deficiency anaemia in a young, stable patient should be treated with iron supplementation, not transfusion. Transfusion is reserved for severe symptomatic anaemia or acute decompensation.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with cardiac disease may be transfused at higher haemoglobin thresholds (often <80 g/L), this patient is asymptomatic and stable. Transfusion is not immediately indicated; investigation and management of the underlying cause of anaemia is appropriate.\n- **D. A 45‑year‑woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: Postpartum anaemia is common and, if the patient is well and asymptomatic, can be managed with oral iron therapy. Transfusion is not indicated in the absence of symptoms or haemodynamic compromise.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: A haemoglobin of 95 g/L is only mildly low. Chemotherapy-induced anaemia is typically managed with erythropoiesis-stimulating agents and iron if indicated, not transfusion, unless severely symptomatic or haemoglobin drops significantly lower.\n\n### 📚 Relevant Guidelines\n- **National Blood Authority Australia (Patient Blood Management Guidelines)**: Provides evidence-based recommendations on appropriate transfusion triggers, emphasising restrictive transfusion strategies (Hb <70 g/L in stable patients, <80 g/L in cardiac disease) and that active bleeding with haemodynamic instability is a key indication for transfusion. — https://www.blood.gov.au/pbm-guidelines\n- **Therapeutic Guidelines Australia (Blood and Blood Products)**: Outlines clinical scenarios for red cell transfusion, including acute blood loss with hypovolaemia. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Blood+and+Blood+Products&frompage=tg\n- **Choosing Wisely Australia (RACP – Transfusion Medicine)**: Recommends avoiding transfusion for stable, chronic anaemia without symptoms, aligning with a restrictive transfusion strategy. — https://www.choosingwisely.org.au/recommendations/racp2", "image_path": ""}, {"id": 34696, "date": "2026-02-21T05:46:03+00:00", "stem": "A 68‑year‑old woman with long‑standing rheumatoid arthritis presents for review. She feels more tired than usual. There is no history of overt bleeding.\n\nInvestigations:\n\n• Hb: 96 g/L (115–155)\n\n• MCV: 86 fL (80–96)\n\n• Serum iron: 6 µmol/L (10–30)\n\n• Total iron‑binding capacity (TIBC): 30 µmol/L (45–72)\n\n• Ferritin: 400 µg/L (30–300)\n\n• CRP: elevated\n\nWhat is the most likely cause of her anaemia?", "options": "A. Iron deficiency anaemia\nB. Anaemia of chronic disease\nC. Vitamin B₁₂ deficiency\nD. Autoimmune haemolytic anaemia\nE. β‑thalassaemia trait", "answer": "B", "explanation": "### ✅ Correct Answer: B. Anaemia of chronic disease\n\nThe key to this diagnosis is the **biochemical pattern in the context of a chronic inflammatory condition** (rheumatoid arthritis with elevated CRP). Anaemia of chronic disease (ACD) is characterised by:\n- **Normocytic, normochromic anaemia** (MCV 86 fL is normal).\n- **Low serum iron** (6 µmol/L).\n- **Low/normal TIBC** (30 µmol/L is low) – this is a crucial differentiator from iron deficiency.\n- **Normal or elevated ferritin** (400 µg/L) – ferritin is an acute phase reactant and is elevated in inflammation, masking any concurrent iron deficiency. In pure iron deficiency, ferritin is low.\n- Underlying chronic inflammation (elevated CRP).\nThis pattern results from cytokine-mediated diversion of iron into storage (reticuloendothelial system) and impaired erythropoiesis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Iron deficiency anaemia**: In pure iron deficiency, you expect **low serum iron, HIGH TIBC** (as the body increases transferrin production), and **low ferritin**. The low TIBC and elevated ferritin here are incompatible with isolated iron deficiency, though a combination (ACD + iron deficiency) is possible but not the *most likely* single cause.\n- **C. Vitamin B₁₂ deficiency**: This causes a **macrocytic** anaemia (high MCV), not a normocytic one. The MCV of 86 fL is normal, ruling this out.\n- **D. Autoimmune haemolytic anaemia**: While rheumatoid arthritis can be associated with autoimmune phenomena, haemolytic anaemia typically shows evidence of haemolysis (e.g., elevated bilirubin, LDH, low haptoglobin, reticulocytosis) and is often normocytic or slightly macrocytic. The provided iron studies are classic for ACD, not haemolysis.\n- **E. β‑thalassaemia trait**: This causes a **microcytic, hypochromic** anaemia with a **very low MCV** (often <75 fL) disproportionate to the degree of anaemia, and a normal/high RBC count. The normal MCV and the biochemical iron profile do not support this diagnosis.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (Anaemia)**: Provides a diagnostic approach to anaemia, including the differentiation of iron deficiency anaemia from anaemia of chronic disease using iron studies and inflammatory markers. — https://tgldcdp.tg.org.au/guideLine?guidelinePage=Anaemia&frompage=tg\n- **UpToDate (Anaemia of Chronic Disease)**: Details the pathophysiology, diagnosis, and management of anaemia of inflammation/chronic disease. — https://www.uptodate.com/contents/anemia-of-chronic-disease\n- **RACGP (Investigating iron deficiency anaemia)**: Although focused on IDA, it discusses interpreting ferritin in the context of inflammation, which is key to this question. — https://www.racgp.org.au/afp/2013/december/iron-deficiency-anaemia", "image_path": ""}, {"id": 34856, "date": "2026-03-03T13:30:02+00:00", "stem": "A 22-year-old lady came for certification for part time job. She had diarrhoea and fever 2-3 days ago and other some people in that area suffering same symptoms and test Salmonella. What should you ask for intervention?", "options": "what is her part time job\nrecent history of school excursion\ninjection adenosine\ncarotid message\ninjection lignocaine", "answer": "A. what is her part time job", "explanation": "### ✅ Correct Answer: A. what is her part time job\n\nThis is a public health question about managing a potential Salmonella outbreak. The key clinical reasoning is:\n1. **Public Health Priority**: When multiple people in an area have the same symptoms and Salmonella is confirmed, this indicates a potential outbreak. The primary intervention is to identify the source to prevent further cases.\n2. **Occupational History**: Asking about her part-time job is crucial because Salmonella is commonly foodborne. If she works in food handling (restaurant, cafe, childcare, aged care), she could be a source of ongoing transmission. Public health guidelines require excluding food handlers with gastroenteritis until they are no longer infectious (typically 48 hours symptom-free).\n3. **Outbreak Management**: The immediate intervention is not treatment (she's recovering) but source identification and containment. Her job determines if she poses a risk to others and what public health actions (like exclusion from work) are needed.\n4. **AMC Context**: This tests knowledge of notifiable diseases and public health responsibilities under Australian guidelines.\n\n### ❌ Why the Other Options Are Wrong\n- **B. recent history of school excursion**: While relevant for exposure history, it's not the most immediate intervention for public health containment. The job question directly informs necessary public health actions (exclusion from work).\n- **C. injection adenosine**: Adenosine is used for supraventricular tachycardia. It has no role in managing gastroenteritis or public health interventions.\n- **D. carotid message**: Likely meaning 'carotid massage', used diagnostically for certain arrhythmias. Irrelevant to this infectious disease scenario.\n- **E. injection lignocaine**: Lidocaine is a local anesthetic/antiarrhythmic. No indication in Salmonella infection or public health management.\n\n### 📚 Relevant Guidelines\n- **[Australian National Notifiable Diseases List (Department of Health)]**: Salmonella infection is a notifiable disease in all Australian states/territories — [https://www.health.gov.au/health-topics/notifiable-diseases](https://www.health.gov.au/health-topices/notifiable-diseases)\n- **[Food Standards Australia New Zealand (FSANZ)]**: Guidelines for food handlers with gastroenteritis — [https://www.foodstandards.gov.au/publications/Pages/foodsafetyprogramforthefoodserviceindustry.aspx](https://www.foodstandards.gov.au/publications/Pages/foodsafetyprogramforthefoodserviceindustry.aspx)\n- **[Therapeutic Guidelines: Gastrointestinal]**: Management of acute infectious diarrhoea and public health measures — [https://tgldcdp.tg.org.au/guideLine?guidelinePage=Gastrointestinal&frompage=etg](https://tgldcdp.tg.org.au/guideLine?guidelinePage=Gastrointestinal&frompage=etg)", "image_path": ""}, {"id": 34857, "date": "2026-03-03T13:31:07+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "Ondansetron\nMethylprednisolone\nFolic acid\nPotassium chloride\nThiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\n\nThis is a critical management question for hyperemesis gravidarum with risk of Wernicke's encephalopathy:\n1. **Pathophysiology**: The patient has severe hyperemesis gravidarum with significant weight loss (4kg in 3 weeks), dehydration, ketonuria, and inability to tolerate oral intake for weeks. This creates high risk for thiamine (Vitamin B1) deficiency.\n2. **Thiamine Deficiency Risk**: Thiamine stores are limited (≈18 days). Prolonged vomiting and malnutrition deplete thiamine. Administering dextrose without thiamine can precipitate Wernicke's encephalopathy in deficient patients because glucose metabolism requires thiamine as a cofactor, accelerating consumption of remaining thiamine.\n3. **Clinical Priority**: Before any carbohydrate load (dextrose infusion), thiamine must be given prophylactically. This is a standard safety measure in patients with alcoholism, malnutrition, or prolonged vomiting.\n4. **AMC Pearl**: \"Glucose before thiamine can be dangerous\" is a high-yield fact. Thiamine should be given first, ideally 30-60 minutes before dextrose.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: Already given diphenhydramine (antihistamine antiemetic). While ondansetron is used in hyperemesis, it's not required immediately before dextrose. Thiamine prophylaxis takes precedence.\n- **B. Methylprednisolone**: Used in refractory hyperemesis gravidarum after failed first-line treatments. Not indicated here and not a prerequisite for dextrose.\n- **C. Folic acid**: Important in pregnancy for neural tube defect prevention, but not urgent before dextrose. Thiamine deficiency risk is more immediate and life-threatening.\n- **D. Potassium chloride**: The patient likely has hypokalaemia from vomiting (metabolic alkalosis suggests gastric acid loss). Potassium should be replaced in IV fluids, but it's not required \"immediately before\" dextrose. Thiamine must come first to prevent Wernicke's.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines: Endocrinology]**: Management of hyperemesis gravidarum and thiamine administration — [https://tgldcdp.tg.org.au/guideLine?guidelinePage=Endocrinology&frompage=etg](https://tgldcdp.tg.org.au/guideLine?guidelinePage=Endocrinology&frompage=etg)\n- **[RANZCOG Guideline: Hyperemesis Gravidarum]**: Recommends thiamine supplementation in women with prolonged vomiting — [https://ranzcog.edu.au/womens-health/statement-guidelines](https://ranzcog.edu.au/womens-health/statement-guidelines)\n- **[eTG Complete: Pregnancy]**: Specific protocols for managing severe hyperemesis including thiamine before dextrose — [https://tgldcdp.tg.org.au/ac](https://tgldcdp.tg.org.au/ac)", "image_path": ""}, {"id": 34889, "date": "2026-03-03T15:18:35+00:00", "stem": "A 55-year-old woman with rheumatoid arthritis, currently managed with methotrexate 15 mg weekly, presents to her general practitioner after a household contact developed a herpes zoster rash on the trunk two days ago. She has no history of chickenpox or shingles and is concerned about her risk of infection given her immunosuppressive therapy. What is the most appropriate next step to prevent varicella-zoster virus infection?", "options": "A. Administer varicella-zoster immune globulin\nB. Reassure that no action is required\nC. Order varicella-zoster virus IgG serology\nD. Administer the variclovir prophylactically", "answer": "C", "explanation": "### ✅ Correct Answer: C. Order varicella-zoster virus IgG serology\n\n**Clinical Reasoning:**\n1.  **Key Clinical Scenario:** The patient is immunocompromised (on methotrexate for RA) and has had a significant exposure to varicella-zoster virus (VZV) via a household contact with active shingles. She reports no history of chickenpox, which means her immune status is unknown.\n2.  **Primary Goal:** The immediate priority is to determine if she is susceptible to primary VZV infection (chickenpox), which can be severe and even life-threatening in immunocompromised individuals.\n3.  **Pathophysiology & Risk:** Over 90% of adults are seropositive for VZV IgG, even without a clear history of chickenpox. A negative history is an unreliable predictor of susceptibility. Therefore, serological testing (VZV IgG) is the standard first step to guide management.\n4.  **Management Pathway:**\n    *   If serology is **positive** (indicating prior infection and immunity), she is not at risk for primary infection from this exposure. She may be at risk for shingles herself in the future, but no immediate prophylactic action is needed.\n    *   If serology is **negative** (indicating susceptibility), she requires **post-exposure prophylaxis** with **Varicella-Zoster Immune Globulin (VZIG)**, which is option A, but only after susceptibility is confirmed. VZIG is most effective if given within 96 hours (ideally within 48-72 hours) of exposure.\n5.  **Why Not Other Options First?** Administering VZIG (A) without confirming susceptibility is not appropriate, as it is a blood product with associated costs and risks. Reassurance (B) is dangerous without knowing immune status. Vaccination (D) is contraindicated in immunocompromised patients and is for primary prevention, not post-exposure. Aciclovir (E) is used for treatment or, in some high-risk scenarios, as secondary prophylaxis, but VZIG is the preferred first-line post-exposure prophylaxis for susceptible immunocompromised individuals.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Administer varicella-zoster immune globulin**: This is the correct intervention for a *susceptible* immunocompromised individual, but it should not be given empirically. It must be preceded by serological confirmation of susceptibility (negative VZV IgG). Giving it without testing is not cost-effective or guideline-based.\n- **B. Reassure that no action is required**: This is incorrect and potentially dangerous. An immunocompromised patient with a significant VZV exposure requires assessment. Assuming immunity based on a negative history is unreliable and could lead to a missed opportunity to prevent severe primary varicella.\n- **D. Administer the varicella vaccine**: The live attenuated varicella vaccine is contraindicated in immunocompromised patients, including those on methotrexate. It is used for primary prevention, not post-exposure prophylaxis in this population.\n- **E. Commence oral aciclovir prophylactically**: While oral aciclovir can be used for post-exposure prophylaxis in some contexts (e.g., immunocompetent adults), for susceptible immunocompromised patients, VZIG is the recommended first-line agent. Aciclovir prophylaxis might be considered if VZIG is unavailable or if exposure was more than 96 hours ago, but it is not the most appropriate *next step*.\n\n### 📚 Relevant Guidelines\n- **Australian Immunisation Handbook (ATAGI)**: Provides detailed guidance on varicella post-exposure prophylaxis, specifically recommending VZV serology for immunocompromised individuals with uncertain history, followed by VZIG if susceptible. — [https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/varicella-chickenpox](https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/varicella-chickenpox)\n- **Therapeutic Guidelines (eTG)**: Offers clinical recommendations for the management of varicella-zoster virus infection and post-exposure prophylaxis, including the use of VZIG and aciclovir. — [https://tgldcdp.tg.org.au/](https://tgldcdp.tg.org.au/)\n- **UpToDate**: Reviews the approach to post-exposure prophylaxis against varicella, emphasizing serologic testing in immunocompromised hosts. — [https://www.uptodate.com/contents/post-exposure-prophylaxis-against-varicella-zoster-virus-infection](https://www.uptodate.com/contents/post-exposure-prophylaxis-against-varicella-zoster-virus-infection)", "image_path": ""}, {"id": 34891, "date": "2026-03-03T15:26:50+00:00", "stem": "A 56-year old lady is brought to the emergency department by an ambulance. She developed right leg weakness and left sided facial droop an hour ago. She has past medical history of hypertension, hyperlipidemia and peptic ulcer disease (GI bleeding two weeks ago). On examination, her blood pressure is 130/85mmHg, respiratory rate is 18 breaths per minute, heart rate is 110 beats per minutes and oxygen saturation is 100% at room air. On the neurological examination, she is found to have hypertonia and reduced power in the right leg, and right-sided facial palsy. The Babinski sign is positive. CT scan of the brain does not show any evidence of an intracranial bleed. ECG shows sinus rhythm. Which of the following is the most appropriate therapy for this patient?", "options": "A. Heparin\nB. Warfarin\nC. Clopidogrel\nD. Aspirin\nE. Thrombolysis", "answer": "D", "explanation": "### ✅ Correct Answer: D. Aspirin\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The patient presents with an acute ischemic stroke. Key features include acute onset (1 hour ago) of focal neurological deficits (right leg weakness, right-sided facial palsy – note the stem says 'left sided facial droop' but examination finds 'right-sided facial palsy', implying a contralateral finding consistent with an upper motor neuron lesion; the Babinski sign is positive), with a normal non-contrast CT brain ruling out haemorrhage.\n2.  **Time Window & Thrombolysis (E):** The patient is within the time window for thrombolysis (presented at 1 hour). However, a **major absolute contraindication** exists: **recent gastrointestinal bleeding within the past 2 weeks**. This is a high risk for life-threatening intracranial haemorrhage if thrombolytics are given. Therefore, thrombolysis is not appropriate.\n3.  **Antiplatelet Therapy:** In acute ischemic stroke where thrombolysis is contraindicated, the immediate standard of care is the administration of antiplatelet therapy, specifically aspirin.\n4.  **Why Aspirin (D) and not Clopidogrel (C)?** For the **acute** treatment of ischemic stroke (within 48 hours), guidelines recommend aspirin (160-300 mg loading dose) as first-line antiplatelet therapy. Clopidogrel is typically used for secondary prevention after the acute phase (e.g., from day 2 onwards) or in specific high-risk scenarios (like minor stroke/TIA), but not as the immediate first agent in the emergency department for a moderate-severe stroke. Aspirin has the strongest evidence base for acute use.\n5.  **Anticoagulants (A & B):** Heparin and warfarin are **not** recommended for the acute treatment of ischemic stroke. They do not improve outcomes and increase the risk of haemorrhagic transformation, especially given her recent GI bleed. Anticoagulation is reserved for specific causes like cardioembolic stroke (e.g., atrial fibrillation), but only after a delay (often 1-2 weeks) to reduce haemorrhage risk.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Heparin**: Full-dose therapeutic heparin is not indicated for acute ischemic stroke treatment. It increases the risk of intracranial and systemic bleeding without proven net benefit. It is contraindicated here due to the recent GI bleed.\n- **B. Warfarin**: Warfarin is a long-term anticoagulant used for secondary prevention (e.g., for atrial fibrillation). It has no role in the acute management of stroke in the ED. Its onset is slow, and it would be dangerous to initiate in a patient with a recent bleed.\n- **C. Clopidogrel**: While an important antiplatelet for secondary prevention, it is not the first-line agent for *immediate* treatment in the emergency department for an acute ischemic stroke. Aspirin is the guideline-recommended initial therapy. Dual antiplatelet therapy (e.g., aspirin + clopidogrel) may be considered for minor stroke/TIA, but this patient has a significant deficit (leg weakness, facial palsy).\n- **E. Thrombolysis (Alteplase)**: This is the most effective treatment for acute ischemic stroke within the time window. However, it is **absolutely contraindicated** due to the **history of gastrointestinal bleeding within the last 21 days**. Administering it would carry an unacceptably high risk of fatal intracranial haemorrhage.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation - Clinical Guidelines for Stroke Management (Australia)**: Clearly outlines that for acute ischemic stroke, if thrombolysis is contraindicated, aspirin (160-300 mg) should be given as soon as possible after intracranial haemorrhage is excluded. It lists recent GI haemorrhage as a contraindication to thrombolysis. — [https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management](https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management)\n- **National Institute for Health and Care Excellence (NICE) - Stroke and transient ischaemic attack in over 16s**: Recommends offering aspirin 300 mg immediately after haemorrhage is excluded, unless thrombolysis is planned. — [https://www.nice.org.uk/guidance/ng128](https://www.nice.org.uk/guidance/ng128)\n- **American Heart Association/American Stroke Association (AHA/ASA) Guidelines for the Early Management of Patients With Acute Ischemic Stroke**: Supports the use of aspirin within 24-48 hours of stroke onset and details contraindications for intravenous alteplase. — [https://www.ahajournals.org/doi/10.1161/STR.0000000000000211](https://www.ahajournals.org/doi/10.1161/STR.0000000000000211)", "image_path": ""}, {"id": 34910, "date": "2026-03-04T00:44:03+00:00", "stem": "A 29-year-old woman has a cervical screening test showing **HPV 16 detected** with negative cytology. She is asymptomatic. What is the most appropriate next step?", "options": "a. Repeat HPV test in 12 months\nb. Refer for colposcopy\nc. Repeat cytology in 6 weeks\nd. Return to routine 5-year screening\ne. Perform excisional biopsy", "answer": "b", "explanation": "### ✅ Correct Answer: b. Refer for colposcopy\nHPV 16 is a high-risk oncogenic genotype with a strong association with cervical intraepithelial neoplasia (CIN) grade 2/3 and invasive cervical cancer. The Australian National Cervical Screening Program (NCSP) guidelines mandate immediate referral for colposcopy for any woman with HPV 16 or 18 detected on primary HPV screening, regardless of the cytology result (even if negative). This is because HPV 16/18 are responsible for approximately 70% of cervical cancers, and their presence indicates a significant risk of underlying high-grade pathology that may not be evident on cytology alone. The goal is to identify and treat precancerous lesions (CIN2/3) before they progress to invasive cancer.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Repeat HPV test in 12 months**: This is the recommended pathway for women with *non-16/18 oncogenic HPV* detected and negative cytology. For HPV 16/18, the risk is too high to delay assessment.\n- **c. Repeat cytology in 6 weeks**: This is not a standard management pathway in the Australian NCSP. Cytology is not used as a triage test when HPV 16/18 is detected.\n- **d. Return to routine 5-year screening**: This is only appropriate for women who are HPV *not detected* on their screening test. A positive HPV 16 result requires active management.\n- **e. Perform excisional biopsy**: This is a therapeutic procedure, not a first-line diagnostic step. Colposcopy with directed biopsy is the appropriate initial diagnostic procedure to determine if excision (e.g., LLETZ) is needed.\n\n### 📚 Relevant Guidelines\n- **Australian National Cervical Screening Program (NCSP) – Clinical Guidelines**: Provides the definitive algorithm for managing cervical screening results in Australia, including the imperative for colposcopy referral for HPV 16/18 positivity. — [https://www.health.gov.au/resources/publications/national-cervical-screening-program-clinical-guidelines](https://www.health.gov.au/resources/publications/national-cervical-screening-program-clinical-guidelines)\n- **Therapeutic Guidelines (eTG) – Gynaecology**: Offers concise, evidence-based summaries on the management of abnormal cervical screening results. — [https://tgldcdp.tg.org.au/viewTopic?topicfile=gynaecological-cancers-cervical-screening#toc_d1e235](https://tgldcdp.tg.org.au/viewTopic?topicfile=gynaecological-cancers-cervical-screening#toc_d1e235)\n- **Cancer Council Australia – Cervical Cancer Screening Guidelines**: Endorses and details the evidence behind the NCSP clinical guidelines. — [https://wiki.cancer.org.au/australia/Guidelines:Cervical_cancer/Screening](https://wiki.cancer.org.au/australia/Guidelines:Cervical_cancer/Screening)", "image_path": ""}, {"id": 34922, "date": "2026-03-04T15:30:12+00:00", "stem": "A 4-week-old baby boy presents with non-bilious projectile vomiting after feeds. On examination, there is a palpable 'olive-shaped' mass in the epigastrium. What is the most appropriate initial investigation?", "options": "A. Abdominal X-ray\nB. Abdominal ultrasound\nC. Upper gastrointestinal contrast study\nD. Serum electrolytes\nE. Gastric emptying study", "answer": "B. Abdominal ultrasound", "explanation": "### ✅ Correct Answer: B. Abdominal ultrasound\n\n**Clinical Reasoning:**\n1.  **Presentation:** The history is classic for **infantile hypertrophic pyloric stenosis (IHPS)**: a 4-week-old male with non-bilious, projectile vomiting and a palpable epigastric ('olive') mass. This is a surgical emergency due to the risk of dehydration and electrolyte imbalance (hypochloraemic, hypokalaemic metabolic alkalosis).\n2.  **Investigation Rationale:**\n    *   **First-line & Gold Standard:** Abdominal ultrasound is the investigation of choice. It is non-invasive, has no radiation exposure, and has high sensitivity (>95%) and specificity. It directly visualises the hypertrophied pyloric muscle, measuring muscle thickness (>3-4 mm) and pyloric channel length (>15-17 mm).\n    *   **Confirming the Diagnosis:** The ultrasound findings confirm the clinical suspicion, allowing for definitive surgical planning (pyloromyotomy).\n    *   **Management Pathway:** A positive ultrasound leads to correction of fluid and electrolyte deficits followed by surgery. It avoids the need for more invasive or less definitive tests.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Abdominal X-ray:** May show a dilated stomach with little distal gas ('single bubble' sign), but it is **not diagnostic** for IHPS. It exposes the infant to radiation and does not visualise the pyloric muscle. It is more useful for ruling out other causes of obstruction (e.g., malrotation).\n- **C. Upper gastrointestinal contrast study:** Was historically used but is **now rarely indicated**. It exposes the infant to radiation and contrast medium. It may show the 'string sign' or 'shoulder sign', but it is inferior to ultrasound due to its invasiveness and lack of direct muscle measurement. It is reserved for cases where ultrasound is equivocal and other diagnoses (e.g., malrotation) are strongly suspected.\n- **D. Serum electrolytes:** This is a **crucial supportive test but not the *initial* diagnostic investigation**. Severe IHPS causes a hypochloraemic, hypokalaemic metabolic alkalosis. Electrolytes must be checked and corrected **after** the diagnosis is confirmed or while it is being investigated, as they guide fluid resuscitation prior to surgery. It does not image the pathology.\n- **E. Gastric emptying study:** This is **not indicated** for diagnosing IHPS. It is used for evaluating functional gastroparesis in older children or adults, not for identifying an anatomical obstruction in an infant.\n\n### 📚 Relevant Guidelines\n- **The Royal Children's Hospital Melbourne - Clinical Practice Guidelines: Pyloric Stenosis:** Provides a comprehensive overview of the clinical presentation, diagnostic approach (ultrasound first), and management of IHPS. — https://www.rch.org.au/clinicalguide/guideline_index/Pyloric_stenosis/\n- **UpToDate: Infantile hypertrophic pyloric stenosis:** Details the epidemiology, clinical features, diagnostic evaluation (highlighting ultrasound), and treatment. — https://www.uptodate.com/contents/infantile-hypertrophic-pyloric-stenosis\n- **Surgical Management of Children (Australian Paediatric Surveillance Unit):** Discusses the surgical management (pyloromyotomy) which is indicated after ultrasound confirmation and metabolic stabilisation. — https://www.apsu.org.au/assets/Uploads/IHPS-guideline-2016.pdf", "image_path": ""}, {"id": 34924, "date": "2026-03-04T15:32:53+00:00", "stem": "A 65-year-old man presents with a 6-month history of progressive difficulty walking, stiffness, and slowness. On examination, he has a resting tremor in his right hand, cogwheel rigidity at the right wrist, and bradykinesia. His gait is shuffling with reduced arm swing. What is the most likely diagnosis?", "options": "A. Essential tremor\nB. Parkinson's disease\nC. Drug-induced parkinsonism\nD. Multiple system atrophy\nE. Normal pressure hydrocephalus", "answer": "B. Parkinson's disease", "explanation": "### ✅ Correct Answer: B. Parkinson's disease\n\n**Clinical Reasoning:**\n1.  **Core Features (Parkinsonism):** The patient exhibits the cardinal motor features of parkinsonism: **bradykinesia** (slowness), **rigidity** (cogwheel), and **rest tremor**. The presence of all three, especially in an asymmetric onset (right-sided), is highly characteristic.\n2.  **Supportive Features:** The progressive history over 6 months, shuffling gait, and reduced arm swing are classic supportive features of idiopathic Parkinson's disease (PD).\n3.  **Diagnostic Criteria:** According to the UK Parkinson's Disease Society Brain Bank Criteria, a diagnosis of PD requires bradykinesia plus at least one of: muscular rigidity, 4–6 Hz rest tremor, or postural instability (not yet present in this case). This patient meets these criteria.\n4.  **Pathophysiology:** PD involves the degeneration of dopaminergic neurons in the substantia nigra pars compacta, leading to depletion of striatal dopamine. The asymmetric onset is a hallmark.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Essential tremor:** This is a **kinetic/postural tremor**, not a rest tremor. It is typically bilateral, symmetric, and often improves with alcohol. It is not associated with bradykinesia or rigidity, which are key findings here.\n- **C. Drug-induced parkinsonism:** Can present with identical motor features (bradykinesia, rigidity, tremor). However, the history lacks exposure to common offending drugs (e.g., antipsychotics, antiemetics like metoclopramide). The time course is also subacute to chronic with drug use, not progressive over months without such a history. It is often symmetric.\n- **D. Multiple system atrophy (MSA):** This is an **atypical parkinsonian syndrome** (parkinsonism-plus). While it can present with parkinsonism, early and prominent **autonomic dysfunction** (orthostatic hypotension, urinary incontinence), cerebellar signs (ataxia), or pyramidal signs would be expected, which are not described here. The classic \"red flags\" for MSA are absent.\n- **E. Normal pressure hydrocephalus (NPH):** Presents with the classic triad of **gait apraxia** (magnetic gait), **urinary incontinence**, and **cognitive decline** (dementia). While gait is abnormal, it lacks the specific parkinsonian features of rest tremor, cogwheel rigidity, and asymmetric bradykinesia. The tremor in NPH, if present, is not typically a pill-rolling rest tremor.\n\n### 📚 Relevant Guidelines\n- **RACGP - Parkinson's disease: diagnosis and management:** An Australian guideline covering diagnosis (including red flags for atypical parkinsonism), management, and referral. — https://www.racgp.org.au/afp/2015/december/parkinson-s-disease-diagnosis-and-management\n- **Therapeutic Guidelines (Neurology): Parkinson's disease:** Provides evidence-based recommendations on the pharmacological and non-pharmacological management of PD. — https://tgldcdp.tg.org.au/viewTopic?topicfile=parkinsons-disease\n- **International Parkinson and Movement Disorder Society (MDS) Clinical Diagnostic Criteria for Parkinson's Disease:** The gold-standard diagnostic criteria used in clinical practice and research, emphasizing supportive and absolute exclusion criteria. — https://www.movementdisorders.org/MDS-Files1/PDFs/MDS-Clinical-Diagnostic-Criteria-for-PD.pdf", "image_path": ""}, {"id": 34953, "date": "2026-03-05T08:45:26+00:00", "stem": "A 72-year-old woman has the abrupt onset of right face and hand weakness, disturbed speech production, and a right homonymous hemianopsia. This is most likely attributable to occlusion of which of the following arteries?", "options": "A. Left middle cerebral artery\nB. Left anterior cerebral artery\nC. Left vertebrobasilar artery\nD. Right anterior choroidal artery\nE. Left posterior inferior cerebellar artery (PICA)", "answer": "A", "explanation": "### ✅ Correct Answer: A. Left middle cerebral artery\n\nThe patient presents with a classic triad of symptoms indicating a left MCA stroke:\n1. **Right face and hand weakness**: The MCA supplies the primary motor cortex for the face and upper extremity (particularly the hand area), which are located in the lateral convexity of the hemisphere.\n2. **Disturbed speech production (Broca's aphasia)**: This suggests involvement of the left hemisphere (dominant for language in most individuals). Broca's area is supplied by the superior division of the MCA.\n3. **Right homonymous hemianopsia**: This indicates involvement of the optic radiations (Meyer's loop) in the temporal lobe, which is also supplied by the MCA.\n\n**Clinical Reasoning**: The combination of contralateral motor weakness (face and arm > leg), language disturbance (aphasia from left hemisphere lesion), and contralateral visual field defect localizes the lesion to the left MCA territory. The MCA is the most common site of ischemic stroke. The anterior cerebral artery (ACA) primarily affects the leg, and vertebrobasilar strokes cause brainstem or cerebellar signs, not isolated cortical deficits like aphasia.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Left anterior cerebral artery**: ACA occlusion primarily affects the medial frontal and parietal lobes, causing contralateral leg weakness (paracentral lobule) and possibly executive dysfunction. It spares the face, hand, and language areas typically.\n- **C. Left vertebrobasilar artery**: Vertebrobasilar occlusions cause brainstem (e.g., cranial nerve deficits, crossed signs, ataxia) or cerebellar symptoms, not isolated cortical deficits like aphasia and hemianopsia without brainstem findings.\n- **D. Right anterior choroidal artery**: This artery supplies the posterior limb of the internal capsule, optic tract, and choroid plexus. Its occlusion can cause contralateral hemiplegia, hemianesthesia, and hemianopsia, but it is unilateral and does not typically cause aphasia (which requires left hemisphere involvement).\n- **E. Left posterior inferior cerebellar artery (PICA)**: PICA occlusion causes lateral medullary (Wallenberg) syndrome (ipsilateral Horner, ataxia, facial numbness; contralateral pain/temp loss). It does not cause cortical signs like aphasia or hemiparesis.\n\n### 📚 Relevant Guidelines\n- **[National Stroke Foundation (Australia) Clinical Guidelines for Stroke Management]**: Comprehensive guidelines for diagnosis and management of acute stroke — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[Royal Australian College of General Practitioners (RACGP) - Stroke]**: Guidelines for primary care management and prevention — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/stroke\n- **[UpToDate - Ischemic Stroke Syndromes]**: Detailed review of vascular territories and clinical presentations — https://www.uptodate.com/contents/ischemic-stroke-syndromes", "image_path": ""}, {"id": 34954, "date": "2026-03-05T08:45:44+00:00", "stem": "A 65-year-old woman comes to the physician complaining of periodic headaches in the temporal region, visual disturbances, and neck stiffness.  Appropriate empiric medical therapy is initiated, and biopsy of a scalp artery confirms giant cell arteritis.  The patient is very compliant with treatment.  She comes to the physician 6 months later with slowly progressive muscle weakness.  Her headaches have resolved, but she has difficulty climbing stairs and getting up from a chair.  Her blood pressure is 120/70 mm Hg, pulse is 82/min, and respirations are 12/min.  Physical examination shows 4/5 muscle power in her proximal lower extremities bilaterally.  Her serum creatine kinase level and erythrocyte sedimentation rate are normal.  Which of the following is the most likely cause of this patient’s current complaints?", "options": "A. Drug-induced myopathy\nB. Inflammatory myositis\nC. Mononeuritis multiplex\nD. Multiple sclerosis\nE. Neuromuscular junction disease", "answer": "A", "explanation": "### ✅ Correct Answer: A. Drug-induced myopathy\n\n**Clinical Reasoning**: This patient has giant cell arteritis (GCA), which is treated with high-dose corticosteroids (e.g., prednisone). After 6 months of treatment, she presents with **proximal muscle weakness** (difficulty climbing stairs, getting up from chair—classic for proximal myopathy) with **normal CK and normal ESR**. This pattern is highly suggestive of **steroid-induced myopathy**.\n\n**Key Points**:\n1. **Timing**: Weakness developed after 6 months of corticosteroid therapy, which is a typical timeframe for steroid myopathy.\n2. **Presentation**: Proximal muscle weakness (hip girdle > shoulder girdle) is characteristic.\n3. **Lab Findings**: Normal CK rules out inflammatory myositis (like polymyositis). Normal ESR indicates her GCA is controlled (no active inflammation).\n4. **Resolution of original symptoms**: Headaches resolved, confirming treatment efficacy for GCA.\n\nSteroid myopathy is a common adverse effect of long-term glucocorticoid use, affecting type II muscle fibers, and is not associated with elevated muscle enzymes.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Inflammatory myositis**: Inflammatory myopathies (e.g., polymyositis) typically present with proximal weakness but are associated with **elevated CK** and often other systemic symptoms. The normal CK and controlled ESR make this unlikely.\n- **C. Mononeuritis multiplex**: This presents with asymmetric sensory and motor deficits in the distribution of specific peripheral nerves, not symmetric proximal weakness. It can be associated with vasculitis but would not explain the bilateral proximal pattern.\n- **D. Multiple sclerosis**: MS causes CNS demyelination with relapsing-remitting neurological deficits (e.g., optic neuritis, sensory changes, ataxia), not isolated, slowly progressive proximal myopathy with normal exam aside from strength.\n- **E. Neuromuscular junction disease**: Conditions like myasthenia gravis cause fatigable weakness, often with ocular/bulbar involvement, and typically worsen through the day. Proximal weakness may occur, but it is usually fluctuating, not steadily progressive, and CK is normal. However, the temporal relationship with steroid therapy makes drug-induced myopathy far more likely.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (Australia) - Rheumatology]**: Guidelines for management of giant cell arteritis and monitoring of corticosteroid therapy — https://tgldcdp.tg.org.au/viewTopic?topicfile=rheumatology#toc_d1e346\n- **[Royal Australian College of General Practitioners (RACGP) - Musculoskeletal】**: Guidelines on managing corticosteroid side effects — https://www.racgp.org.au/clinical-resources/clinical-guidelines/musculoskeletal\n- **[UpToDate - Glucocorticoid-induced myopathy]**: Detailed review of diagnosis and management — https://www.uptodate.com/contents/glucocorticoid-induced-myopathy", "image_path": ""}, {"id": 34956, "date": "2026-03-05T08:46:19+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E", "explanation": "### ✅ Correct Answer: E. Neurocysticercosis\n\n**Clinical Reasoning**: This presentation is classic for neurocysticercosis, the most common parasitic infection of the CNS worldwide.\n\n**Key Diagnostic Clues**:\n1. **Demographics**: Young adult from an endemic region (implied by presentation).\n2. **Seizures**: The most common presentation of neurocysticercosis is new-onset seizures.\n3. **Cystic lesions on MRI**: \"Numerous well-defined cystic lesions throughout the cerebral cortex\" is characteristic of the vesicular stage of neurocysticercosis. The scolex may be visible within cysts (\"hole-with-dot\" sign).\n4. **Extra-neurological signs**: Swelling over the eye (could be subcutaneous cyst) and testicular tenderness (may indicate cysticercal involvement) support systemic cysticercosis.\n5. **Confusion**: May be due to seizure post-ictal state or increased intracranial pressure from multiple cysts.\n\nNeurocysticercosis is caused by larval cysts of *Taenia solium* (pork tapeworm). Humans acquire it by ingesting eggs from contaminated food/water or via autoinfection.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Cerebral metastases**: Metastases can cause seizures and multiple brain lesions, but they are uncommon in an 18-year-old without known primary cancer. They are usually irregular, enhancing lesions with edema, not typically numerous well-defined cysts throughout the cortex. No history of malignancy.\n- **B. Progressive multifocal leukoencephalopathy**: PML is a demyelinating disease caused by JC virus in immunocompromised patients (e.g., AIDS). It presents with progressive neurological deficits (not acute seizures) and MRI shows multifocal white matter lesions without mass effect, not cortical cysts.\n- **C. Cerebral vasculitis**: Can cause seizures and multifocal lesions but typically presents with headache, cognitive changes, and multifocal neurological deficits. MRI may show infarcts or hemorrhages, not well-defined cystic lesions. No systemic symptoms of vasculitis described.\n- **D. Neurosyphilis**: Can cause seizures and various CNS manifestations (meningovascular, general paresis, tabes dorsalis), but MRI findings are typically non-specific (arteritis, gummas, atrophy), not multiple cortical cysts. The patient's age and lack of other syphilis symptoms make this less likely.\n\n### 📚 Relevant Guidelines\n- **[World Health Organization (WHO) - Taeniasis/Cysticercosis]**: Diagnostic and management guidelines — https://www.who.int/news-room/fact-sheets/detail/taeniasis-cysticercosis\n- **[Therapeutic Guidelines (Australia) - Central Nervous System Infections]**: Guidelines for antimicrobial therapy including parasitic infections — https://tgldcdp.tg.org.au/viewTopic?topicfile=central-nervous-system-infections\n- **[UpToDate - Neurocysticercosis]**: Comprehensive review of clinical features, diagnosis, and treatment — https://www.uptodate.com/contents/neurocysticercosis", "image_path": "photo_2026-03-05_08-46-19.jpg"}, {"id": 34967, "date": "2026-03-05T23:11:17+00:00", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech.  The patient was in his usual state of health last night but awoke this morning with these symptoms.  He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease.  The patient does not drink alcohol regularly but has a 45-pack-year history.  Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia.  CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery.  The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility.  Forty-eight hours later, he becomes obtunded.  Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min.  Physical examination now shows complete right hemiplegia and deviation of the eyes to the left.  Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E", "explanation": "### ✅ Correct Answer: E. Repeat CT scan of the head\n\n**Clinical Reasoning**: This patient with a **large left MCA territory infarct** presents 48 hours later with **neurological deterioration** (obtundation, complete hemiplegia, eye deviation) and **signs of increased intracranial pressure** (Cushing's triad: hypertension, bradycardia, irregular respirations—though only hypertension and bradycardia are mentioned). Fever (38.3°C) may be due to central fever from the stroke.\n\nThe most likely cause of deterioration at 48-72 hours post-large hemispheric infarct is **malignant cerebral edema** with risk of **herniation**. This is a neurological emergency.\n\n**Best Next Step**: An **urgent repeat non-contrast CT head** is needed to:\n1. Assess the degree of edema, midline shift, and effacement of basal cisterns.\n2. Rule out hemorrhagic transformation (though less likely with this presentation).\n3. Guide further management (e.g., need for osmotic therapy, neurosurgical consultation for decompressive hemicraniectomy).\n\nMRI (option D) provides more detail but takes longer, is less readily available, and may be unsafe in an unstable patient. The clinical picture strongly suggests edema, and CT is fast and sufficient to confirm this and assess severity.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood cultures and empiric antibiotics**: Infection is unlikely to cause such rapid neurological decline with focal signs and Cushing's triad. While stroke patients can develop infections (e.g., aspiration pneumonia), the priority is to assess for life-threatening cerebral edema/herniation.\n- **B. Intravenous hypertonic saline and observation** and **C. Intravenous mannitol and observation**: Osmotic therapy (hypertonic saline or mannitol) is appropriate for symptomatic cerebral edema **after** imaging confirms the diagnosis and assesses severity. Giving these empirically without repeat imaging is dangerous, as it could mask clinical deterioration and delay definitive management (e.g., surgery). Also, the patient may have hemorrhagic transformation, which could be worsened by mannitol.\n- **D. MRI of the head**: While MRI (especially DWI) is superior for infarct characterization, it is time-consuming, less accessible emergently, and the patient may not be stable for a longer scan. CT is faster, readily available, and sufficient to diagnose significant edema/midline shift requiring intervention.\n\n### 📚 Relevant Guidelines\n- **[National Stroke Foundation (Australia) Clinical Guidelines for Stroke Management]**: Management of acute complications including cerebral edema — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **[Brain Foundation Australia - Stroke]**: Information on stroke complications and management — https://brainfoundation.org.au/disorders/stroke\n- **[UpToDate - Management of Acute Ischemic Stroke]**: Includes management of complications like cerebral edema — https://www.uptodate.com/contents/management-of-acute-ischemic-stroke", "image_path": ""}, {"id": 34979, "date": "2026-03-06T13:11:51+00:00", "stem": "A 35-year-old woman presents with a 2-month history of progressive dyspnoea on exertion and fatigue. She has no significant past medical history. On examination, she is afebrile, heart rate is 110 bpm, blood pressure 100/60 mmHg, respiratory rate 22/min, and oxygen saturation 92% on room air. Cardiovascular examination reveals a loud P2, a right ventricular heave, and a systolic murmur heard best at the left lower sternal border that increases with inspiration. Jugular venous pressure is elevated with prominent a waves. Chest X-ray shows clear lung fields and prominent pulmonary arteries. ECG shows right axis deviation and right ventricular hypertrophy. What is the most likely diagnosis?", "options": "A. Mitral stenosis\nB. Primary pulmonary hypertension\nC. Chronic obstructive pulmonary disease\nD. Atrial septal defect\nE. Pulmonary embolism", "answer": "B. Primary pulmonary hypertension", "explanation": "### ✅ Correct Answer: B. Primary pulmonary hypertension\n\nThe clinical presentation is classic for primary pulmonary hypertension (now termed idiopathic pulmonary arterial hypertension). The patient is a young woman with progressive dyspnoea, fatigue, and signs of right heart failure (elevated JVP, right ventricular heave). The physical exam findings are characteristic: loud P2 (due to pulmonary hypertension), systolic murmur at left lower sternal border (tricuspid regurgitation secondary to right ventricular dilation), and the murmur increasing with inspiration (Carvallo's sign, specific for tricuspid regurgitation). The ECG shows right axis deviation and RV hypertrophy, while CXR shows clear lung fields with prominent pulmonary arteries, ruling out primary lung disease. Primary pulmonary hypertension typically affects young to middle-aged women and presents with insidious onset of dyspnoea and right heart failure signs without an identifiable cause.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mitral stenosis**: Would typically present with dyspnoea, fatigue, and possibly right heart failure, but the murmur would be a diastolic rumble at the apex, not a systolic murmur at the left lower sternal border. Mitral stenosis also commonly causes atrial fibrillation and left atrial enlargement on ECG, not the RV hypertrophy pattern seen here.\n- **C. Chronic obstructive pulmonary disease**: Could cause pulmonary hypertension and right heart failure (cor pulmonale), but the patient has clear lung fields on CXR and no smoking history or chronic cough/sputum production. COPD typically shows hyperinflated lungs and other parenchymal changes on CXR.\n- **D. Atrial septal defect**: Can cause pulmonary hypertension over time, but typically presents with a fixed split S2 and a pulmonary flow murmur. The systolic murmur described here is at the left lower sternal border (tricuspid area), not the pulmonary area. ASD might show right ventricular volume overload rather than pure pressure overload initially.\n- **E. Pulmonary embolism**: Would cause acute dyspnoea, not a 2-month progressive history. Massive PE could cause acute right heart failure with similar signs, but the timeline is wrong. Also, PE typically doesn't cause prominent pulmonary arteries on CXR unless chronic thromboembolic pulmonary hypertension has developed.\n\n### 📚 Relevant Guidelines\n- **European Society of Cardiology/European Respiratory Society Guidelines for Pulmonary Hypertension**: Provide comprehensive diagnostic algorithms and management recommendations for pulmonary arterial hypertension — https://www.escardio.org/Guidelines/Clinical-Practice-Guidelines/Pulmonary-Hypertension\n- **Therapeutic Guidelines Australia (Cardiovascular)**: Include management of pulmonary hypertension in the Australian context — https://tgldcdp.tg.org.au/viewTopic?topicfile=pulmonary-hypertension\n- **American Heart Association/American Thoracic Society Guidelines**: Offer evidence-based recommendations for diagnosis and treatment of pulmonary hypertension — https://www.ahajournals.org/doi/10.1161/CIR.0000000000000105", "image_path": "photo_2026-03-06_13-11-51.jpg"}, {"id": 35011, "date": "2026-03-07T03:39:58+00:00", "stem": "A 65-year-old man presents with sudden onset vertigo, nausea, vomiting, and hearing loss. Examination reveals nystagmus, ipsilateral facial weakness, and Horner syndrome. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo (BPPV)\nB. Ménière's disease\nC. Vestibular neuritis\nD. Lateral medullary syndrome (Wallenberg syndrome)\nE. Acoustic neuroma", "answer": "D. Lateral medullary syndrome (Wallenberg syndrome)", "explanation": "### ✅ Correct Answer: D. Lateral medullary syndrome (Wallenberg syndrome)\n\n**Clinical Reasoning:**\nThe patient presents with the classic triad of lateral medullary (Wallenberg) syndrome: 1) **Vertigo, nausea, vomiting** (vestibular nucleus involvement), 2) **Ipsilateral facial sensory loss** (trigeminal nucleus/spinal tract), and 3) **Contralateral loss of pain/temperature sensation** in the body (spinothalamic tract). Additional features include: ipsilateral Horner syndrome (descending sympathetic fibers), ipsilateral ataxia (inferior cerebellar peduncle), dysphagia/hoarseness (nucleus ambiguus), and hiccups. The key distinguishing feature from peripheral causes (like vestibular neuritis or Ménière's) is the presence of **crossed neurological signs** (ipsilateral cranial nerve deficits with contralateral body sensory loss). This syndrome results from occlusion of the posterior inferior cerebellar artery (PICA) or vertebral artery, affecting the lateral medulla.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: Characterized by brief episodes of vertigo triggered by head movement (e.g., rolling over in bed), without hearing loss, facial weakness, or Horner syndrome. No neurological deficits beyond nystagmus.\n- **B. Ménière's disease**: Presents with episodic vertigo, fluctuating hearing loss, tinnitus, and aural fullness. Attacks last hours, not seconds/minutes. No focal neurological signs like facial weakness or Horner syndrome.\n- **C. Vestibular neuritis**: Acute, severe vertigo with nausea/vomiting, but **no hearing loss** (cochlear nerve spared). May have nystagmus but no other cranial nerve or brainstem signs (e.g., facial weakness, Horner syndrome).\n- **E. Acoustic neuroma (vestibular schwannoma)**: Typically presents with progressive unilateral sensorineural hearing loss and tinnitus, with vertigo being less prominent. May cause facial numbness (CN V) or weakness (CN VII) as it enlarges, but Horner syndrome and crossed sensory deficits are not typical; it's a slow-growing cerebellopontine angle tumor.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation Australia (Clinical Guidelines for Stroke Management)**: Provides diagnostic criteria and management for acute ischemic stroke syndromes including lateral medullary syndrome — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **UpToDate (Wallenberg Syndrome)**: Detailed review of lateral medullary infarction, including anatomy, clinical features, and etiology — https://www.uptodate.com/contents/lateral-medullary-syndrome-wallenberg-syndrome\n- **National Institute of Neurological Disorders and Stroke (NINDS)**: Information on brainstem stroke syndromes — https://www.ninds.nih.gov/health-information/disorders/wallenberg-syndrome", "image_path": "photo_2026-03-07_03-39-58.jpg"}, {"id": 35015, "date": "2026-03-07T04:27:59+00:00", "stem": "Young man HIT by a squash ball while playing, apart from headache which resolved by analgesic he complained of decreased in vision. On examination, his visual acuity was 6/12 in the left eye; right eye was 6/6 asking the most likely cause?", "options": "A. vitreous hemorrhage\nB. retinal detachment\nC. zygomatic fracture\nD. orbital floor fracture", "answer": "B. retinal detachment", "explanation": "### ✅ Correct Answer: B. Retinal Detachment\n\n**Clinical Reasoning:**\n1. **Mechanism:** A high-velocity projectile like a squash ball can cause a sudden, sharp increase in intraocular pressure and transmit significant force to the globe. This can lead to a **tractional or rhegmatogenous retinal detachment**, especially in younger individuals who may have predisposing factors like lattice degeneration.\n2. **Presentation:** The key symptom is **painless, progressive vision loss** (decreased vision to 6/12) following blunt trauma. Headache resolved with analgesics, suggesting the primary issue is ocular, not just facial trauma.\n3. **Examination Findings:** Isolated reduction in visual acuity (6/12) is highly suggestive of a posterior segment injury like retinal detachment rather than an orbital fracture, which typically presents with diplopia, enophthalmos, or infraorbital numbness.\n4. **Why Not Other Options:**\n   - **Vitreous hemorrhage (A)** can occur but usually causes sudden vision loss described as \"floaters\" or \"cobwebs,\" and visual acuity might be more severely affected (e.g., counting fingers). It's often associated with diabetic retinopathy or posterior vitreous detachment in older adults.\n   - **Orbital floor fracture (D)** classically presents with **diplopia** (especially on upward gaze), enophthalmos, infraorbital numbness, and possible entrapment of inferior rectus muscle. Isolated vision loss without these signs is unlikely.\n   - **Zygomatic fracture (C)** presents with facial asymmetry, trismus, and possible diplopia but not isolated visual acuity reduction.\n\n**Management Pearl:** Any patient with vision loss after blunt ocular trauma requires **urgent ophthalmology referral** for dilated fundus examination (indirect ophthalmoscopy) to rule out retinal detachment, which is a sight-threatening emergency requiring surgical repair (e.g., scleral buckle, vitrectomy).", "image_path": ""}, {"id": 35046, "date": "2026-03-09T07:42:09+00:00", "stem": "A 42-year-old man, who was involved in a motor vehicle accident, is being evaluated in the Emergency Department. On examination, he has stable vital signs and an oxygen saturation of 96% on room air; however, he has marked difficulty in breathing due to intractable chest wall pain, which is worse on inspiration. He only takes shallow breaths. On examination, multiple bruises and tender points are noted on his chest. A non-contrast CT scan of the chest reveals multiple bilateral rib fractures as well a small pneumothorax on the right side. Which one of the following options is the most appropriate immediate treatment to help him with breathing?", "options": "A. Intubation.\nB. Morphine.\nC. Chest strapping.\nD. Needle aspiration of the pneumothorax.\nE. Underwater-sealed chest drain.", "answer": "B. Morphine.", "explanation": "### ✅ Correct Answer: B. Morphine.\nThe patient presents with **flail chest** (implied by multiple bilateral rib fractures) and a **small pneumothorax**. His primary issue is **hypoventilation due to severe pain**, leading to shallow breathing and risk of atelectasis and pneumonia. Vital signs are stable, and oxygen saturation is adequate (96%), indicating no immediate respiratory failure requiring mechanical ventilation.\n\n**Clinical Reasoning:**\n1. **Pathophysiology:** Multiple rib fractures cause severe pain on inspiration, leading to splinting and inadequate tidal volumes. This results in hypoventilation, atelectasis, and potential respiratory failure.\n2. **Management Priority:** The cornerstone of managing blunt chest trauma with rib fractures is **adequate analgesia** to enable deep breathing and coughing, preventing pulmonary complications.\n3. **Why Morphine?** Opioid analgesia (like morphine) is first-line for severe traumatic chest wall pain. It allows the patient to take deeper breaths, improves ventilation, and reduces the risk of pneumonia. In this stable patient with a small pneumothorax, pain control is the most appropriate immediate intervention.\n4. **Context of Pneumothorax:** The pneumothorax is described as 'small' in a patient with stable oxygenation. Small traumatic pneumothoraces in stable patients can often be managed conservatively with monitoring, as they may resolve spontaneously. Immediate drainage is not indicated unless there is tension physiology or clinical deterioration.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Intubation.**: Intubation and mechanical ventilation are reserved for patients with **respiratory failure** (e.g., hypoxia, hypercapnia, fatigue), severe flail chest with significant paradoxical movement, or impending airway compromise. This patient is stable with adequate oxygen saturation, so intubation is not the immediate treatment.\n- **C. Chest strapping.**: Chest strapping or binding is **contraindicated** in rib fractures as it restricts chest expansion further, promoting atelectasis and pneumonia. Modern management emphasizes analgesia and pulmonary hygiene, not immobilization.\n- **D. Needle aspiration of the pneumothorax.**: Needle aspiration (or simple aspiration) is a potential first step for a **primary spontaneous pneumothorax** in a stable patient. However, this is a **traumatic pneumothorax** with underlying rib fractures. In trauma, especially with potential ongoing air leak, tube thoracostomy is the standard if drainage is needed. Aspiration alone is less reliable and not the most appropriate immediate treatment here.\n- **E. Underwater-sealed chest drain.**: While a chest drain (tube thoracostomy) is indicated for a **traumatic pneumothorax** that is large, symptomatic, or in a patient requiring positive pressure ventilation, this patient has a **small pneumothorax** and is stable. The primary problem is pain, not the pneumothorax. Inserting a chest drain is invasive and carries risks (e.g., infection, pain, organ injury) and is not the *immediate* treatment to help his breathing. Analgesia should be tried first; the pneumothorax can be monitored.\n\n### 📚 Relevant Guidelines\n- **eTG (Therapeutic Guidelines) – Trauma / Analgesia**: Recommends multimodal analgesia including opioids for severe pain from rib fractures to facilitate deep breathing and prevent pulmonary complications. — https://tgldcdp.tg.org.au/viewTopic?topicfile=trauma-chest#toc_d1e301\n- **Eastern Association for the Surgery of Trauma (EAST) Practice Management Guidelines for Pain Control in Blunt Thoracic Trauma**: Strongly recommends epidural analgesia or multimodal systemic analgesia (including opioids) for patients with blunt thoracic trauma to improve pulmonary function. — https://www.east.org/guidelines/practice-guidelines\n- **ATLS (Advanced Trauma Life Support) – Musculoskeletal Trauma**: Emphasizes that adequate analgesia is critical in the management of patients with multiple rib fractures to improve ventilation. — https://www.facs.org/quality-programs/trauma/atls", "image_path": ""}, {"id": 35070, "date": "2026-03-10T04:57:20+00:00", "stem": "Boy with 6 weeks h/o breathlessness, cough, worsening of cough at night, patient started getting symptoms after starting football at school, h/o hay fever(+) patient had salbutamol for wheeze a/w viral infection in past and asking for management", "options": "ICS\nICS + LABA\nSalbutamol before sports\nSalbutamol before sports and at night", "answer": "A. ICS", "explanation": "### ✅ Correct Answer: A. ICS\n\nThis is a classic presentation of **persistent asthma** in a child, likely **exercise-induced bronchoconstriction (EIB)** triggered by football. The key features are:\n- **Duration**: Symptoms for 6 weeks (persistent, not intermittent).\n- **Pattern**: Worsening cough at night (nocturnal symptoms are a marker of asthma severity).\n- **Triggers**: Exercise (football) and likely allergens (hay fever history).\n- **Past history**: Previous wheeze with viral infection treated with salbutamol (indicating airway hyperresponsiveness).\n\n**Step-by-step clinical reasoning**:\n1. **Diagnosis**: This meets criteria for **mild persistent asthma** (symptoms >2 days/week but not daily, or nocturnal awakenings 1-2x/month).\n2. **First-line controller therapy**: According to Australian and international paediatric asthma guidelines, the first-line maintenance therapy for persistent asthma in children is a **low-dose inhaled corticosteroid (ICS)**.\n3. **Why not other options**:\n   - **ICS+LABA**: Reserved for moderate-severe persistent asthma not controlled on ICS alone (step-up therapy). This patient is treatment-naïve for maintenance therapy.\n   - **Salbutamol only (before sports or before sports+night)**: This is a short-acting beta-agonist (SABA) for symptom relief only. Using SABA alone ≥3 times weekly indicates need for controller therapy. Regular SABA use without ICS increases risk of exacerbations and masks underlying inflammation.\n4. **Management plan**: Start low-dose ICS daily, continue salbutamol as needed for breakthrough symptoms, and consider salbutamol 15-20 minutes before exercise if EIB persists despite ICS.\n\n### ❌ Why the Other Options Are Wrong\n- **B. ICS + LABA**: This combination therapy is indicated for moderate-severe persistent asthma uncontrolled on medium-dose ICS alone. This patient is treatment-naïve and has mild persistent asthma, so starting with ICS+LABA is overtreatment and not guideline-recommended.\n- **C. Salbutamol before sports**: Using SABA alone as a preventive measure without controller therapy is inappropriate for persistent asthma. It treats bronchoconstriction but not the underlying inflammation, leading to poor long-term control and risk of exacerbations.\n- **D. Salbutamol before sports and at night**: Similar to option C, this provides only symptomatic relief without addressing airway inflammation. Regular nocturnal symptoms specifically indicate the need for anti-inflammatory controller therapy (ICS).\n\n### 📚 Relevant Guidelines\n- **National Asthma Council Australia - Australian Asthma Handbook**: Provides stepwise management for paediatric asthma, recommending low-dose ICS as first-line controller for persistent asthma — https://www.asthmahandbook.org.au/clinical-issues/children\n- **Therapeutic Guidelines (eTG) - Asthma in children**: Recommends inhaled corticosteroids as first-line preventive therapy for children with persistent asthma symptoms — https://tgldcdp.tg.
