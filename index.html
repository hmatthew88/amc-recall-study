tandard for detecting and characterizing intracranial aneurysms. It is the most direct way to \"rule out the underlying cause\" (aneurysm) in this acute, pupil-involving presentation.\n- **Context:** The patient's diabetes is a red herring. Diabetic mononeuropathy typically causes a **pupil-sparing** CN III palsy (due to microvascular ischemia affecting the central core of the nerve, sparing the peripherally located pupillary fibers). The presence of mydriasis shifts concern to a compressive lesion.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Blood pressure monitoring**: While hypertension is a risk factor for aneurysm formation/rupture, monitoring BP does not diagnose the underlying structural cause (aneurysm). It is a supportive measure, not the most relevant diagnostic step.\n- **C. Hirschberg/corneal light reflection test**: This is a **diagnostic examination** that confirms the presence of strabismus/deviation (which the clinical description has already provided). It does not rule out the life-threatening underlying cause (aneurysm). It assesses the *what* (ocular misalignment), not the *why* (compressive lesion).\n- **D. Thyroid function tests**: These are relevant for thyroid eye disease (which can cause diplopia and proptosis), but the presentation is acute, pupil-involving, and associated with headache—not consistent with the chronic, pupil-sparing, restrictive ophthalmopathy of thyroid disease.\n\n### 📚 Relevant Guidelines\n- **UpToDate - Third cranial nerve (oculomotor nerve) palsy in adults**: Clearly differentiates between pupil-involving (surgical/compressive) and pupil-sparing (medical/microvascular) causes, emphasizing urgent neuroimaging for the former. — https://www.uptodate.com/contents/third-cranial-nerve-oculomotor-nerve-palsy-in-adults\n- **American Heart Association/American Stroke Association - Guidelines for the Management of Patients With Unruptured Intracranial Aneurysms**: Discusses diagnostic evaluation, including the role of angiography. — https://www.ahajournals.org/doi/10.1161/STR.0000000000000211\n- **Royal Australian and New Zealand College of Ophthalmologists (RANZCO) - Neuro-ophthalmology Guidelines**: Highlights the need for urgent investigation of acute pupil-involving third nerve palsy. — https://ranzco.edu.au/", "image_path": ""}, {"id": 34631, "date": "2026-02-19T10:02:53+00:00", "stem": "A Child with Hemophilia A. Without trauma he has a pain in his knee which started 30 mins ago. Knee is swollen and the movement is restricted. What is the first action in management ?", "options": "A) Factor VI\nB) Factor VII\nC) Factor VIII\nD) Aspiration of the fluid", "answer": "C) Factor VIII", "explanation": "### ✅ Correct Answer: C) Factor VIII\n\n**Clinical Reasoning:**\n- **Diagnosis:** Hemophilia A is caused by a deficiency of **Factor VIII**.\n- **Presentation:** Acute onset of knee pain, swelling, and restricted movement in a child with Hemophilia A, even without obvious trauma, is highly suggestive of a **spontaneous hemarthrosis** (bleeding into the joint space).\n- **Pathophysiology:** The lack of Factor VIII impairs the intrinsic pathway of the coagulation cascade, leading to uncontrolled bleeding into joints (especially weight-bearing ones like knees, ankles, elbows).\n- **First Action:** The immediate, life-saving (and joint-saving) management is **Factor VIII replacement therapy**. This aims to raise the plasma factor level to stop active bleeding, relieve pain, and prevent long-term joint damage (arthropathy).\n- **Pearls:** Treatment should be administered as soon as possible (ideally within 2 hours of symptom onset). Do **NOT** aspirate the joint (option D) as the initial step, as this can introduce infection and potentially worsen bleeding unless done under strict factor cover for a tense, refractory hemarthrosis.\n\n### ❌ Why the Other Options Are Wrong\n- **A) Factor VI**: Factor VI does not exist in modern coagulation theory. It is a historical misnomer. This is a distractor.\n- **B) Factor VII**: Factor VII is part of the extrinsic pathway. Recombinant Factor VIIa is used as a \"bypassing agent\" for patients with inhibitors (antibodies) to Factor VIII or IX, but it is **not** the first-line, specific replacement therapy for Hemophilia A.\n- **D) Aspiration of the fluid**: Joint aspiration (arthrocentesis) is **contraindicated** as the first action. The priority is to stop the bleeding with factor replacement. Aspiration may be considered in rare cases of a tense, painful hemarthrosis not responding to factor therapy, but only after adequate factor levels have been achieved and by an experienced specialist.\n\n### 📚 Relevant Guidelines\n- **World Federation of Hemophilia (WFH) - Guidelines for the Management of Hemophilia**: Recommends immediate factor replacement (Factor VIII for Hemophilia A) at the first sign of joint bleeding. — https://www1.wfh.org/publication/files/pdf-1712.pdf\n- **Therapeutic Guidelines Australia (eTG) - Haemophilia**: Outlines the management of acute bleeds, emphasizing prompt factor concentrate administration. — https://tgldcdp.tg.org.au/viewTopic?topicfile=haemophilia#toc_d1e137\n- **National Hemophilia Foundation (USA) - Medical and Scientific Advisory Council (MASAC) Recommendations**: Provides detailed protocols for treating hemarthrosis, with factor replacement as the cornerstone. — https://www.hemophilia.org/healthcare-professionals/guidelines-on-care/masac-documents", "image_path": ""}, {"id": 34636, "date": "2026-02-19T12:22:34+00:00", "stem": "19 year old child with abnormal LFT, tremor, behaviour changes, decline academic performance. Physical exam show mild hepatomegaly, no alcohol use, Wilson disease suspected. Patient tachypnoeic, no murmur. Most likely diagnosis?", "options": "Aortic stenosis\nCardiomyopathy\nPDA\nVSD\nASD", "answer": "B. Cardiomyopathy", "explanation": "### ✅ Correct Answer: B. Cardiomyopathy\n\n**Clinical Reasoning:**\n1.  **Wilson's Disease (Hepatolenticular Degeneration):** This is an autosomal recessive disorder of copper metabolism. Copper accumulates in various organs, primarily the liver and the basal ganglia of the brain.\n2.  **Presenting Features:** The stem describes classic features: a young adult (19 years) with liver involvement (abnormal LFTs, hepatomegaly), neurological/psychiatric symptoms (tremor, behaviour changes, academic decline), and no alcohol use. The tremor in Wilson's is often a 'wing-beating' tremor.\n3.  **Cardiac Manifestation:** A well-known but sometimes under-emphasized extra-hepatic manifestation of Wilson's disease is **cardiomyopathy**. Copper deposition can occur in the myocardium, leading to various forms of cardiomyopathy (most commonly dilated cardiomyopathy) and conduction abnormalities. This explains the patient's tachypnoea (sign of heart failure) in the absence of a murmur (which would point towards a valvular lesion like AS, PDA, VSD, or ASD).\n4.  **Key Diagnostic Link:** In a patient with established or suspected Wilson's disease presenting with respiratory distress (tachypnoea), cardiomyopathy/heart failure is the most likely cardiac cause.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Aortic stenosis**: This causes a characteristic systolic ejection murmur, which is explicitly stated as absent ('no murmur'). It is also not a typical complication of Wilson's disease.\n- **C. PDA**: A patent ductus arteriosus causes a continuous 'machinery' murmur. The absence of a murmur rules this out. It is a congenital defect, not acquired from Wilson's disease.\n- **D. VSD**: A ventricular septal defect causes a pansystolic murmur. Again, 'no murmur' makes this highly unlikely. It is congenital, not related to copper accumulation.\n- **E. ASD**: An atrial septal defect typically causes a mid-systolic flow murmur and a fixed split S2. The absence of a murmur argues against it. It is a congenital condition, not a complication of Wilson's disease.\n\n### 📚 Relevant Guidelines\n- **[American Association for the Study of Liver Diseases (AASLD) - Diagnosis and Treatment of Wilson's Disease]**: Comprehensive guideline covering the multi-system manifestations of Wilson's, including rare cardiac involvement. — https://aasldpubs.onlinelibrary.wiley.com/doi/full/10.1002/hep.29800\n- **[European Association for the Study of the Liver (EASL) - Wilson's disease]**: Another major guideline that discusses the clinical presentation and management of Wilson's disease, acknowledging extra-hepatic sites like the heart. — https://www.journal-of-hepatology.eu/article/S0168-8278(12)00540-5/fulltext\n- **[UpToDate - Wilson disease: Clinical manifestations, diagnosis, and natural history]**: A detailed clinical resource that lists cardiomyopathy under 'Other manifestations' of Wilson's disease. — https://www.uptodate.com/contents/wilson-disease-clinical-manifestations-diagnosis-and-natural-history", "image_path": ""}, {"id": 34660, "date": "2026-02-20T23:22:55+00:00", "stem": "A 70-year-old woman presents with syncope. ECG shows complete heart block. What is the best treatment?", "options": "A. Atropine only\nB. Beta blocker\nC. Permanent pacemaker\nD. Digoxin\nE. Calcium channel blocker", "answer": "C", "explanation": "### ✅ Correct Answer: C. Permanent pacemaker\nComplete (third-degree) heart block is characterized by the complete dissociation of atrial and ventricular activity, with the ventricles being driven by a slow escape rhythm. In a symptomatic patient (presenting with syncope), this constitutes a Class I indication for permanent pacemaker implantation. Atropine is a temporary measure for acute bradycardia, often in the context of vagal tone or acute inferior MI, but it is ineffective in chronic, structural heart block. The definitive treatment for symptomatic complete heart block is a permanent pacemaker to prevent recurrent syncope, sudden cardiac death, and improve quality of life.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Atropine only**: Atropine works by blocking vagal tone and may be used as a temporary measure in acute, hemodynamically unstable bradycardia (e.g., in the setting of an inferior MI). However, it is ineffective for chronic, structural complete heart block where the issue is fixed conduction system disease, not excessive vagal tone. It is not a definitive treatment.\n- **B. Beta blocker**: Beta blockers are contraindicated as they are negative chronotropes and dromotropes. They would further suppress the already inadequate ventricular escape rhythm, potentially worsening bradycardia and symptoms.\n- **D. Digoxin**: Digoxin slows AV nodal conduction and can paradoxically worsen heart block. It is used for rate control in atrial fibrillation, not for treating complete heart block.\n- **E. Calcium channel blocker**: Non-dihydropyridine calcium channel blockers (e.g., verapamil, diltiazem) also slow AV nodal conduction and are contraindicated in complete heart block, as they would further depress the ventricular rate.\n\n### 📚 Relevant Guidelines\n- **[CSANZ / HRSA Cardiac Implantable Electronic Devices Guidelines]**: Australian guidelines for pacemaker implantation. Class I recommendation for permanent pacing in symptomatic third-degree AV block. — https://www.heartlungcirc.org/article/S1443-9506(21)01166-0/fulltext\n- **[ESC Guidelines on cardiac pacing and cardiac resynchronization therapy]**: International guidelines stating permanent pacemaker implantation is indicated for symptomatic third-degree AV block. — https://academic.oup.com/eurheartj/article/42/35/3427/6358713\n- **[Therapeutic Guidelines: Cardiovascular]**: Australian therapeutic resource discussing management of bradyarrhythmias and indications for pacing. — https://tgldcdp.tg.org.au/viewTopic?topicfile=cardiac-arrhythmias-bradycardia#toc_d1e241", "image_path": ""}, {"id": 34662, "date": "2026-02-20T23:27:45+00:00", "stem": "A 65-year-old man presents with chest pain for 2 hours. ECG shows ST elevation in leads II, III, and aVF. Which artery is most likely occluded?", "options": "A. Left anterior descending\nB. Left circumflex\nC. Right coronary artery\nD. Diagonal branch\nE. Posterior descending artery", "answer": "C", "explanation": "### ✅ Correct Answer: C. Right coronary artery\nST elevation in the inferior leads (II, III, aVF) indicates an acute inferior wall myocardial infarction. In approximately 80-90% of individuals (right-dominant circulation), the right coronary artery (RCA) supplies the inferior wall of the left ventricle via its posterior descending artery branch. Lead III typically shows the most pronounced ST elevation in RCA occlusions. Associated findings like ST depression in aVL and/or I help confirm an RCA lesion. Prompt recognition is crucial as RCA occlusions can lead to bradyarrhythmias (e.g., heart block) and right ventricular infarction.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Left anterior descending (LAD)**: The LAD supplies the anterior wall and septum. Occlusion typically causes ST elevation in precordial leads V1-V4, not the inferior leads.\n- **B. Left circumflex (LCx)**: The LCx supplies the lateral wall. Occlusion typically causes ST elevation in leads I, aVL, V5, and V6. It can cause inferior MI in about 10-20% of cases (left-dominant circulation), but this is less common than RCA occlusion.\n- **D. Diagonal branch**: A branch of the LAD, it supplies parts of the anterior-lateral wall. Its occlusion would cause changes in the anterior or high lateral territories, not isolated inferior leads.\n- **E. Posterior descending artery (PDA)**: The PDA is typically a terminal branch of either the RCA (85%) or LCx (15%). It supplies the inferior-posterior wall. While involved in an inferior MI, the question asks for the 'artery most likely occluded.' The proximal RCA, before it gives off the PDA, is the culprit. Isolated PDA occlusion is rare and might present as a posterior MI (ST depression in V1-V3 with tall R waves), not classic inferior ST elevation.\n\n### 📚 Relevant Guidelines\n- **[CSANZ / ANZACS-QI Guidelines for the management of acute coronary syndromes]**: Australian guidelines detailing ECG interpretation and coronary anatomy in STEMI. — https://www.csanz.edu.au/wp-content/uploads/2021/11/ACS_Guidelines_2021_FINAL.pdf\n- **[ESC Guidelines for the management of acute myocardial infarction in patients presenting with ST-segment elevation]**: Comprehensive guide on STEMI management and correlation of ECG findings with infarct-related artery. — https://academic.oup.com/eurheartj/article/39/2/119/4095042\n- **[Life in the Fast Lane: ECG Library - Inferior MI]**: A key educational resource for AMC candidates explaining ECG-localisation of MI. — https://litfl.com/inferior-myocardial-infarction-ecg-library/", "image_path": ""}, {"id": 34664, "date": "2026-02-20T23:28:58+00:00", "stem": "A patient presents with sudden chest pain radiating to the back. BP in right arm is 160/90 and left arm is 120/80. What is the most likely diagnosis?", "options": "A. Pulmonary embolism\nB. Aortic dissection\nC. MI\nD. Pericarditis\nE. Pneumonia", "answer": "B", "explanation": "### ✅ Correct Answer: B. Aortic dissection\nThe classic presentation of aortic dissection is sudden, severe, tearing or ripping chest pain that often radiates to the back. A difference in systolic blood pressure of >20 mmHg between the arms (as seen here: 160/90 vs 120/80) is a highly specific sign, indicating involvement of the aortic arch and partial occlusion of the left subclavian artery or brachiocephalic trunk by the dissection flap. This is a **surgical emergency** requiring immediate imaging (CT aortogram) and blood pressure control.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Pulmonary embolism**: Typically presents with pleuritic chest pain, dyspnoea, and tachycardia. Pain does not typically radiate to the back, and a significant inter-arm BP difference is not a feature.\n- **C. MI (Myocardial Infarction)**: Presents with central crushing chest pain, often radiating to the left arm or jaw, but not classically to the back. While pain can be severe, a difference in BP between arms is not typical unless there is concomitant aortic dissection involving the coronaries (which would still point to dissection as the primary diagnosis).\n- **D. Pericarditis**: Presents with sharp, pleuritic chest pain that is often positional (relieved by sitting forward). Pain may radiate to the trapezius ridge. Physical exam may reveal a pericardial friction rub. Inter-arm BP difference is not a feature.\n- **E. Pneumonia**: Presents with fever, cough, sputum production, and pleuritic chest pain. It does not cause sudden tearing pain radiating to the back or a difference in BP between arms.\n\n### 📚 Relevant Guidelines\n- **[ESC Guidelines on the Diagnosis and Treatment of Aortic Diseases]**: Comprehensive guidelines covering the diagnosis (including the importance of pulse deficits) and management of aortic dissection. — https://academic.oup.com/eurheartj/article/35/41/2873/2467161\n- **[Therapeutic Guidelines: Cardiovascular]**: Australian resource discussing the acute management of hypertensive emergencies including aortic dissection. — https://tgldcdp.tg.org.au/viewTopic?topicfile=hypertension-hypertensive-emergencies#toc_d1e291\n- **[Radiology Across Borders - Aortic Dissection]**: Australian-focused imaging guidelines for this critical diagnosis. — https://www.radiologyacrossborders.org/aortic_dissection", "image_path": ""}, {"id": 34666, "date": "2026-02-20T23:29:13+00:00", "stem": "A 70‑year‑old man with long‑standing type 2 diabetes and hypertension has stage 4 chronic kidney disease (eGFR 20 mL/min/1.73 m²). He reports fatigue but no bleeding. Examination is unremarkable.\n\nInvestigations:\n\n• Hb: 88 g/L (130–170)\n\n• MCV: 90 fL (80–96)\n\n• Ferritin: 250 µg/L (30–300)\n\n• Transferrin saturation: 30% (20–45%)\n\n• Vitamin B₁₂ and folate: normal\n\nWhat is the most appropriate treatment specifically for his anaemia?", "options": "A. Regular red blood cell transfusions\nB. Oral iron supplementation\nC. High‑dose folic acid\nD. Erythropoiesis‑stimulating agent (e.g. erythropoietin)\nE. Prednisolone", "answer": "D", "explanation": "### ✅ Correct Answer: D. Erythropoiesis‑stimulating agent (e.g. erythropoietin)\nThis patient has anaemia of chronic kidney disease (CKD). The key features are: moderate anaemia (Hb 88), normocytic indices (MCV 90), adequate iron stores (ferritin 250, TSAT 30%), and normal B12/folate, in the context of stage 4 CKD (eGFR 20). The primary pathophysiology is relative deficiency of erythropoietin production by the failing kidneys. The first-line specific treatment, after ensuring iron stores are replete, is an erythropoiesis-stimulating agent (ESA) like epoetin alfa or darbepoetin alfa. ESAs are indicated in CKD to reduce transfusion requirements and improve quality of life, with a target Hb typically around 100-115 g/L to avoid cardiovascular risks of over-correction.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Regular red blood cell transfusions**: Transfusions are reserved for severe, symptomatic anaemia (e.g., Hb <70 g/L with symptoms, active bleeding, or acute coronary syndrome). They are not a first-line chronic treatment due to risks of iron overload, transfusion reactions, and sensitisation for future transplantation.\n- **B. Oral iron supplementation**: While iron deficiency is common in CKD and must be corrected for ESA efficacy, this patient has adequate iron stores (ferritin >100 µg/L and TSAT >20%). Therefore, iron supplementation is not currently indicated.\n- **C. High‑dose folic acid**: Folate levels are normal, so supplementation is unnecessary. Folate deficiency causes macrocytic anaemia, which is not present here.\n- **E. Prednisolone**: Prednisolone is used for autoimmune haemolytic anaemia or other immune-mediated cytopenias. There is no evidence of haemolysis or an immune basis for this patient's anaemia. It is not indicated for anaemia of CKD and carries significant side effects.\n\n### 📚 Relevant Guidelines\n- **[CARI Guidelines - Anaemia in Chronic Kidney Disease]**: Australian guidelines for the investigation and management of anaemia in CKD, including ESA and iron therapy. — https://www.cariguidelines.org/view/guidelines/view/KDIGO/4/4-1-anaemia-in-ckd/\n- **[KDIGO Clinical Practice Guideline for Anemia in Chronic Kidney Disease]**: International evidence-based standard for managing anaemia in CKD. — https://kdigo.org/wp-content/uploads/2016/10/KDIGO-2012-Anemia-Guideline-English.pdf\n- **[Therapeutic Guidelines: Renal]**: Australian therapeutic resource detailing the use of ESAs and iron in CKD. — https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia-chronic-kidney-disease#toc_d1e138", "image_path": ""}, {"id": 34667, "date": "2026-02-20T23:29:21+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient is the most appropriate for immediate transfusion because he presents with **active, life-threatening haemorrhage** and **haemodynamic instability** (hypotension and tachycardia). In acute haemorrhage, the initial haemoglobin level is a poor indicator of blood loss as haemodilution has not yet occurred; the key indication for transfusion is the clinical picture of shock. Transfusion in this context is part of **resuscitation** to restore circulating volume and oxygen-carrying capacity, aiming to prevent end-organ damage (e.g., myocardial ischaemia, acute kidney injury). The other patients have chronic or stable anaemia where transfusion is rarely the first-line intervention.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is a **chronic, stable anaemia**. The patient is haemodynamically stable and asymptomatic. First-line management is **oral iron supplementation** and investigation/treatment of the underlying cause (menorrhagia). Transfusion is reserved for severe symptoms or acute decompensation, which are absent here.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: While patients with cardiac disease may have a higher transfusion threshold (often Hb <80 g/L) to prevent myocardial ischaemia, this patient is **asymptomatic at rest** with a chronic, stable anaemia. The priority is to investigate the cause of the normocytic anaemia (e.g., chronic kidney disease, malignancy) rather than immediate transfusion.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: This is a **postpartum anaemia**, likely due to blood loss at delivery. The patient is well and asymptomatic. Management involves **oral iron therapy** and monitoring. Transfusion is not indicated in a stable, asymptomatic patient.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: This Hb level is only mildly low. **Chemotherapy-induced anaemia** is common. Guidelines typically recommend transfusion only for Hb ≤80 g/L or for symptomatic anaemia (e.g., severe fatigue, dyspnoea, chest pain). Mild fatigue alone does not warrant immediate transfusion.\n\n### 📚 Relevant Guidelines\n- **National Blood Authority Australia (Patient Blood Management Guidelines)**: Provides evidence-based recommendations on appropriate use of blood products, emphasising transfusion thresholds based on clinical context rather than Hb alone. — https://www.blood.gov.au/pbm-guidelines\n- **Choosing Wisely Australia (RACP)**: Recommends avoiding red cell transfusion for stable, non-bleeding patients with Hb >80 g/L. — https://www.choosingwisely.org.au/recommendations/racp2\n- **Therapeutic Guidelines (Haematology)**: Outlines indications for red cell transfusion, highlighting active bleeding with haemodynamic instability as a key indication. — https://tgldcdp.tg.org.au/haem", "image_path": ""}, {"id": 34668, "date": "2026-02-20T23:29:29+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n\n• Hb: 70 g/L (130–170)\n\n• Reticulocyte count: elevated\n\n• Indirect bilirubin: elevated\n\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "### ✅ Correct Answer: C. Dapsone\n\nDapsone is a **potent oxidant drug** and a well-known, common trigger for acute haemolytic anaemia in patients with Glucose-6-Phosphate Dehydrogenase (G6PD) deficiency. The clinical picture is classic for acute intravascular haemolysis: sudden onset of dark urine (haemoglobinuria), jaundice (from unconjugated hyperbilirubinaemia), fatigue (from anaemia), and laboratory findings of anaemia with elevated reticulocytes (compensatory bone marrow response) and indirect bilirubin. The peripheral blood film showing **\"bite cells\" and blister cells** is pathognomonic for oxidative haemolysis, where Heinz bodies (denatured haemoglobin) are pitted from red cells by the spleen, leaving characteristic morphologies. Dapsone is frequently used for dermatological conditions (e.g., dermatitis herpetiformis) and as prophylaxis for Pneumocystis jirovecii pneumonia, making it a high-yield trigger to remember.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Paracetamol**: Paracetamol (acetaminophen) is **not** a significant oxidant stressor and is generally considered **safe** in standard therapeutic doses for patients with G6PD deficiency. It does not typically precipitate haemolysis.\n- **B. Amoxicillin**: Penicillins like amoxicillin are **not** common triggers for haemolysis in G6PD deficiency. They are generally safe. Haemolysis associated with penicillins is more typically immune-mediated (e.g., drug-induced immune haemolytic anaemia), not oxidative.\n- **D. Metformin**: This is an oral hypoglycaemic agent with **no oxidant properties**. It is not associated with triggering haemolysis in G6PD deficiency.\n- **E. Prednisolone**: Corticosteroids like prednisolone are **not** oxidant drugs. They are used therapeutically in some forms of autoimmune haemolytic anaemia but do not cause haemolysis in G6PD deficiency.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (Haematology)**: Lists drugs to avoid in G6PD deficiency, including dapsone, sulfonamides, nitrofurantoin, and primaquine. — https://tgldcdp.tg.org.au/haem\n- **UpToDate (Glucose-6-phosphate dehydrogenase deficiency)**: Comprehensive review of pathophysiology, diagnosis, and management, including a detailed list of offending drugs. — https://www.uptodate.com/contents/glucose-6-phosphate-dehydrogenase-deficiency\n- **WHO Working Group (Glucose-6-phosphate dehydrogenase deficiency)**: Provides a global perspective and consensus on diagnosis and management, including drug safety. — https://apps.who.int/iris/handle/10665/44627", "image_path": ""}, {"id": 34669, "date": "2026-02-20T23:29:39+00:00", "stem": "A 64‑year‑old woman presents with progressive numbness and tingling in her feet and difficulty walking. She also reports fatigue. She has no history of alcohol misuse. Examination shows pallor, a broad‑based gait and impaired vibration sense in the lower limbs.\n\nInvestigations:\n\n• Hb: 82 g/L (115–155)\n\n• MCV: 112 fL (80–96)\n\n• Peripheral blood film: macro‑ovalocytes and hypersegmented neutrophils\n\n• Serum vitamin B₁₂: markedly low\n\n• Serum folate: normal\n\nWhat is the most appropriate initial treatment?", "options": "A. Oral folic acid\nB. Intramuscular hydroxocobalamin\nC. Oral vitamin B₁₂ tablets alone\nD. Red blood cell transfusion only", "answer": "B", "explanation": "### ✅ Correct Answer: B. Intramuscular hydroxocobalamin\n\nThis patient has a **severe vitamin B12 (cobalamin) deficiency** evidenced by macrocytic anaemia (low Hb, high MCV), characteristic blood film findings (macro-ovalocytes, hypersegmented neutrophils), and **neurological complications** (subacute combined degeneration of the cord). The neurological symptoms—numbness, tingling, broad-based gait, impaired vibration sense—are due to demyelination of the dorsal columns and corticospinal tracts. **Intramuscular (IM) hydroxocobalamin is the standard initial treatment** for severe or symptomatic B12 deficiency, especially with neurological involvement. Oral B12 absorption is unreliable in pernicious anaemia (the most common cause in this age group without alcohol history) due to lack of intrinsic factor. IM therapy ensures rapid and complete correction, which is critical to halt and potentially reverse neurological damage. Treatment is typically a loading dose regimen (e.g., 1 mg IM on alternate days for 2 weeks) followed by maintenance.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Oral folic acid**: **Contraindicated as initial monotherapy**. While folate can correct the haematological abnormalities of B12 deficiency (\"masking\" the anaemia), it **does not treat and may exacerbate the neurological damage**. Giving folate alone can precipitate or worsen subacute combined degeneration. Folate is only given if a concomitant folate deficiency is confirmed.\n- **C. Oral vitamin B₁₂ tablets alone**: **Inappropriate for initial treatment of severe, symptomatic deficiency**, particularly with neurological signs. Oral B12 requires intact intrinsic factor and a functional terminal ileum for absorption. In pernicious anaemia, intrinsic factor is absent, making oral absorption negligible. High-dose oral B12 (1-2 mg daily) can be used for maintenance in some patients but is not first-line for acute correction.\n- **D. Red blood cell transfusion only**: **Incorrect and potentially harmful**. Transfusion is rarely indicated in chronic, stable B12 deficiency anaemia, even with Hb as low as 82 g/L, if the patient is haemodynamically stable. The priority is to correct the underlying deficiency with B12. Transfusion carries risks (volume overload, transfusion reactions) and does not address the neurological pathology. It might be considered only in life-threatening, symptomatic anaemia (e.g., cardiac ischaemia, heart failure), which is not described here.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (Haematology)**: Details the diagnosis and management of vitamin B12 deficiency, recommending intramuscular hydroxocobalamin as first-line treatment for symptomatic or severe deficiency. — https://tgldcdp.tg.org.au/haem\n- **British Society for Haematology (Guidelines for the diagnosis and treatment of cobalamin and folate disorders)**: Provides comprehensive guidance on investigation and treatment, strongly supporting parenteral therapy for initial management. — https://onlinelibrary.wiley.com/doi/full/10.1111/bjh.14359\n- **RACGP (Vitamin B12 deficiency – investigation and management)**: A practical guide for Australian GPs, outlining when to suspect, test for, and treat B12 deficiency. — https://www.racgp.org.au/afp/2017/july/vitamin-b12-deficiency", "image_path": ""}, {"id": 34695, "date": "2026-02-21T05:45:57+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient requires immediate transfusion due to **active haemorrhage with haemodynamic instability** (hypotension and tachycardia), indicating hypovolaemic shock. In acute bleeding, the haemoglobin level is an unreliable initial indicator of severity because haemodilution hasn't occurred yet; the key is the clinical signs of shock. Transfusion is urgent to restore circulating volume and oxygen-carrying capacity. The other patients have chronic anaemia or mild symptoms where transfusion is not indicated as first-line management.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: Chronic iron deficiency anaemia in a young, stable patient should be treated with iron supplementation, not transfusion. Transfusion is reserved for severe symptoms or cardiac compromise.\n- **B. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest**: Although he has IHD, he is asymptomatic at rest with Hb >80 g/L. Transfusion threshold in stable cardiac patients is typically Hb <80 g/L or if symptomatic. No immediate indication here.\n- **D. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant**: Postpartum anaemia is common and well-tolerated. If asymptomatic, iron therapy is appropriate. Transfusion is not indicated for mild, chronic anaemia without symptoms.\n- **E. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only**: Hb >90 g/L with only mild fatigue does not meet transfusion criteria in chemotherapy patients. Guidelines typically use a threshold of Hb <80 g/L or symptomatic anaemia affecting quality of life.\n\n### 📚 Relevant Guidelines\n- **National Blood Authority (Australia) - Patient Blood Management Guidelines**: Provide evidence-based recommendations for transfusion thresholds in various clinical scenarios, emphasising restrictive transfusion strategies. — https://www.blood.gov.au/pbm-guidelines\n- **Therapeutic Guidelines (Australia) - Blood and Blood Products**: Outline indications for red cell transfusion, including acute haemorrhage with haemodynamic instability. — https://tgldcdp.tg.org.au/viewTopic?topicfile=blood-transfusion\n- **Choosing Wisely Australia - Red Blood Cell Transfusion**: Recommends against transfusion for stable, non-bleeding patients with Hb >80 g/L. — https://www.choosingwisely.org.au/recommendations/racp", "image_path": ""}, {"id": 34696, "date": "2026-02-21T05:46:03+00:00", "stem": "A 68‑year‑old woman with long‑standing rheumatoid arthritis presents for review. She feels more tired than usual. There is no history of overt bleeding.\n\nInvestigations:\n\n• Hb: 96 g/L (115–155)\n\n• MCV: 86 fL (80–96)\n\n• Serum iron: 6 µmol/L (10–30)\n\n• Total iron‑binding capacity (TIBC): 30 µmol/L (45–72)\n\n• Ferritin: 400 µg/L (30–300)\n\n• CRP: elevated\n\nWhat is the most likely cause of her anaemia?", "options": "A. Iron deficiency anaemia\nB. Anaemia of chronic disease\nC. Vitamin B₁₂ deficiency\nD. Autoimmune haemolytic anaemia\nE. β‑thalassaemia trait", "answer": "B", "explanation": "### ✅ Correct Answer: B. Anaemia of chronic disease\n\nThis is a classic presentation of **anaemia of chronic disease (ACD)**, also known as anaemia of inflammation, in a patient with rheumatoid arthritis (a chronic inflammatory condition). The key biochemical pattern is:\n- **Low serum iron** (6 µmol/L)\n- **Low TIBC** (30 µmol/L) – this distinguishes it from iron deficiency where TIBC is high\n- **Normal or high ferritin** (400 µg/L) – ferritin is an acute phase reactant elevated in inflammation, masking true iron stores\n- **Normocytic anaemia** (MCV 86 fL)\n- **Elevated CRP** confirms active inflammation\n\nIn ACD, hepcidin production is increased due to cytokines (e.g., IL-6), leading to iron sequestration in macrophages and reduced iron availability for erythropoiesis.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Iron deficiency anaemia**: In true iron deficiency, you would expect **low serum iron, HIGH TIBC, and low ferritin**. Here, TIBC is low and ferritin is high, ruling out pure iron deficiency. However, note that ACD and iron deficiency can coexist.\n- **C. Vitamin B₁₂ deficiency**: This causes **macrocytic** anaemia (high MCV), not normocytic. Also, no neurological symptoms or specific risk factors mentioned.\n- **D. Autoimmune haemolytic anaemia**: Would show evidence of haemolysis (e.g., elevated bilirubin, LDH, low haptoglobin, reticulocytosis, positive Coombs test). None of these features are present.\n- **E. β‑thalassaemia trait**: Typically presents with **microcytic, hypochromic** anaemia (low MCV often <80 fL) with normal or elevated RBC count. The MCV here is normal, and the iron studies point to an inflammatory pattern.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (Australia) - Anaemia**: Discusses investigation and management of anaemia, including differentiating iron deficiency from anaemia of chronic disease. — https://tgldcdp.tg.org.au/viewTopic?topicfile=anaemia\n- **Royal College of Pathologists of Australasia (RCPA) - Iron Studies Manual**: Provides interpretation of iron studies in various conditions including chronic disease. — https://www.rcpa.edu.au/Manuals/Clinical-Problems/I/Iron-studies\n- **UpToDate - Anaemia of Chronic Disease**: Detailed pathophysiology, diagnosis, and management of ACD. — https://www.uptodate.com/contents/anemia-of-chronic-disease", "image_path": ""}, {"id": 34805, "date": "2026-02-22T21:34:02+00:00", "stem": "A patient presents with vertical diplopia that worsens when looking down and to the right, and a head tilt to the left. The most likely diagnosis is:", "options": "A. CN 3 Palsy\nB. CN 4 Palsy\nC. CN 6 Palsy\nD. Internuclear Ophthalmoplegia", "answer": "B. CN 4 Palsy", "explanation": "### ✅ Correct Answer: B. CN 4 Palsy\n\nThe patient's symptoms are classic for a trochlear nerve (CN IV) palsy. The key clinical reasoning is as follows:\n1.  **CN IV Function:** The trochlear nerve innervates the superior oblique muscle. Its primary action is to depress the eye (look down), and its secondary action is to intort the eye (rotate inward).\n2.  **Characteristic Findings:**\n    *   **Vertical Diplopia:** This is the hallmark, as the unopposed action of the inferior oblique muscle causes the affected eye to be slightly elevated.\n    *   **Worsens on Downward Gaze:** The superior oblique is a depressor. Weakness is most apparent when the patient tries to look down, especially when combined with adduction (looking down and in). The stem specifies 'down and to the right', which would test the left superior oblique (if the left eye is affected).\n    *   **Head Tilt:** To compensate for the loss of intorsion from the weak superior oblique, patients often tilt their head *away* from the side of the lesion. A head tilt to the left suggests a problem with the right superior oblique/CN IV, as tilting left uses the intact left superior oblique to intort the left eye and align images.\n3.  **Common Causes:** Isolated CN IV palsy is often due to microvascular ischemia (diabetes, hypertension), trauma (due to its long intracranial course), or idiopathic causes. It is the most common cause of isolated vertical diplopia.\n\n### ❌ Why the Other Options Are Wrong\n- **A. CN 3 Palsy**: A complete CN III palsy presents with ptosis, a 'down and out' eye (due to unopposed lateral rectus and superior oblique), and a dilated, non-reactive pupil. It does not typically cause isolated vertical diplopia that worsens on downward gaze. A partial palsy might, but the head tilt is highly specific for CN IV.\n- **C. CN 6 Palsy**: This affects the lateral rectus, causing horizontal diplopia that worsens on lateral gaze to the side of the lesion. The eye is unable to abduct. It does not cause vertical diplopia or a compensatory head tilt.\n- **D. Internuclear Ophthalmoplegia (INO)**: This is a disorder of conjugate lateral gaze due to a lesion in the medial longitudinal fasciculus (MLF). The cardinal sign is impaired adduction of the eye on the side of the MLF lesion with nystagmus in the abducting eye. It causes horizontal, not vertical, diplopia.\n\n### 📚 Relevant Guidelines\n- **[UpToDate: Trochlear Nerve Palsy](https://www.uptodate.com/contents/trochlear-nerve-palsy-fourth-nerve-palsy)**: Comprehensive review of etiology, clinical features, and diagnostic approach to CN IV palsy.\n- **[American Academy of Ophthalmology (AAO): Isolated Ocular Motor Nerve Palsies](https://www.aao.org/bcscsnippetdetail.aspx?id=75f3a6a7-3c6a-4c8a-8e5b-9c9f9c9f9c9f)**: Provides a structured clinical approach to differentiating between CN III, IV, and VI palsies.\n- **[Therapeutic Guidelines: Neurology (eTG)](https://tgldcdp.tg.org.au/viewTopic?topicfile=neurological-examination&guidelineName=Neurology)**: While not specific to palsies, eTG is a key Australian reference for neurological assessment and management principles.", "image_path": ""}, {"id": 34856, "date": "2026-03-03T13:30:02+00:00", "stem": "A 22-year-old lady came for certification for part time job. She had diarrhoea and fever 2-3 days ago and other some people in that area suffering same symptoms and test Salmonella. What should you ask for intervention.", "options": "what is her part time job\nrecent history of school excursion\ninjection adenosine\ncarotid message\ninjection lignocaine", "answer": "A. what is her part time job", "explanation": "### ✅ Correct Answer: A. what is her part time job\n\nThis is a public health scenario involving a Salmonella outbreak. The key intervention is identifying whether the patient works in a **high-risk occupation** where she could transmit Salmonella to vulnerable populations, particularly **food handling**. Under Australian public health legislation, individuals with enteric infections like Salmonella must be excluded from work in food handling, healthcare, childcare, or aged care until they are no longer infectious (typically 48 hours after symptoms resolve and with negative stool cultures if required). Asking about her part-time job is the critical first step to implement appropriate exclusion and prevent further transmission.\n\n**Clinical Reasoning:**\n1. **Outbreak Context:** Multiple people in the area with similar symptoms and confirmed Salmonella indicates a community outbreak.\n2. **Public Health Priority:** The primary intervention is **source control and prevention of spread**, not acute cardiac management (options C-E are irrelevant).\n3. **Occupational Risk Assessment:** Salmonella is a notifiable disease. Food handlers, childcare workers, and healthcare workers pose a significant risk of transmitting the infection. Determining her job allows for appropriate exclusion advice under the **Australian National Health and Medical Research Council (NHMRC) guidelines**.\n4. **School Excursion (Option B):** While relevant for identifying a common source, it is secondary to determining immediate public health risk through occupation.\n\n### ❌ Why the Other Options Are Wrong\n- **B. recent history of school excursion**: While this might help identify a common source of the outbreak (e.g., contaminated food on a trip), it is not the most immediate intervention for public health control. The priority is preventing further transmission via her occupation.\n- **C. injection adenosine**: This is a medication used for terminating supraventricular tachycardia (SVT). It has no role in the management of Salmonella gastroenteritis or public health intervention.\n- **D. carotid message**: Likely a misspelling of \"carotid massage,\" a vagal maneuver used in SVT. It is completely unrelated to infectious diarrhoea management.\n- **E. injection lignocaine**: A local anesthetic/antiarrhythmic. It is not indicated for Salmonella infection or its public health implications.\n\n### 📚 Relevant Guidelines\n- **[NHMRC - Staying Healthy: Preventing infectious diseases in early childhood education and care services]**: Provides exclusion criteria for children and staff with gastroenteritis in childcare settings — https://www.nhmrc.gov.au/about-us/publications/staying-healthy-preventing-infectious-diseases-early-childhood-education-and-care-services\n- **[The Australian Immunisation Handbook - Management of cases and contacts of gastroenteritis in food handlers]**: Outlines public health recommendations for exclusion of food handlers with enteric infections — https://immunisationhandbook.health.gov.au/vaccine-preventable-diseases/gastroenteritis\n- **[Food Standards Australia New Zealand (FSANZ) - Food Safety Standards]**: Legally requires food handlers to notify their employer if they have a gastrointestinal illness — https://www.foodstandards.gov.au/foodsafety/standards/Pages/default.aspx", "image_path": ""}, {"id": 34857, "date": "2026-03-03T13:31:07+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "Ondansetron\nMethylprednisolone\nFolic acid\nPotassium chloride\nThiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\n\nThis patient has **hyperemesis gravidarum (HG)** with severe malnutrition and ketosis. Before administering dextrose (glucose), it is **critical to give thiamine (Vitamin B1)** to prevent **Wernicke's encephalopathy**, a life-threatening neurological complication.\n\n**Clinical Reasoning:**\n1. **Pathophysiology:** Prolonged vomiting and malnutrition lead to thiamine depletion. Thiamine is a cofactor for glucose metabolism. Administering dextrose without thiamine can rapidly consume the remaining thiamine stores, precipitating Wernicke's encephalopathy (characterized by confusion, ataxia, and ophthalmoplegia).\n2. **Patient Profile:** The scenario describes classic HG: first-trimester pregnancy, significant weight loss (4 kg in 3 weeks), dehydration, ketonuria, and metabolic alkalosis (from loss of gastric acid).\n3. **Management Sequence:** Rehydration with normal saline is correct. However, before adding dextrose for caloric support, thiamine (typically 100-300 mg IV) must be given. This is a **safety-critical step** emphasized in all guidelines for managing malnutrition or alcoholism before glucose administration.\n4. **Other Options:** While potassium may be needed due to losses (Option D), it is not an immediate prerequisite before dextrose. Antiemetics (A) and steroids (B) are used for HG but are not urgent prior to dextrose. Folic acid (C) is important in pregnancy but does not prevent Wernicke's.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: This is an antiemetic used in HG management, but it is not required *immediately before* dextrose infusion to prevent a specific complication. Thiamine prophylaxis takes precedence.\n- **B. Methylprednisolone**: May be considered in refractory HG, but it is not a prerequisite for dextrose administration and carries risks in early pregnancy.\n- **C. Folic acid**: Essential for neural tube defect prevention, but its administration is not time-critical in relation to dextrose infusion and does not prevent Wernicke's encephalopathy.\n- **D. Potassium chloride**: Hypokalaemia is common due to vomiting and may require correction. However, it is not the *immediate* priority before dextrose to prevent neurological catastrophe. Thiamine must come first.\n\n### 📚 Relevant Guidelines\n- **[The Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) - Hyperemesis Gravidarum]**: States that thiamine supplementation should be given to all women admitted with HG, especially before dextrose infusion — https://ranzcog.edu.au/womens-health/patient-information-resources/hyperemesis-gravidarum\n- **[Therapeutic Guidelines (eTG) - Nutrition in pregnancy]**: Recommends thiamine 100 mg IV daily for women with HG requiring IV fluids, particularly if dextrose-containing solutions are used — https://tgldcdp.tg.org.au/viewTopic?topicfile=nutrition-in-pregnancy\n- **[UpToDate - Treatment of hyperemesis gravidarum]**: Emphasizes thiamine repletion prior to carbohydrate loading to prevent Wernicke's encephalopathy — https://www.uptodate.com/contents/treatment-of-hyperemesis-gravidarum", "image_path": ""}, {"id": 34889, "date": "2026-03-03T15:18:35+00:00", "stem": "A 55-year-old woman with rheumatoid arthritis, currently managed with methotrexate 15 mg weekly, presents to her general practitioner after a household contact developed a herpes zoster rash on the trunk two days ago. She has no history of chickenpox or shingles and is concerned about her risk of infection given her immunosuppressive therapy. What is the most appropriate next step to prevent varicella-zoster virus infection?", "options": "A. Administer varicella-zoster immune globulin\nB. Reassure that no action is required\nC. Order varicella-zoster virus IgG serology\nD. Administer the varicella vaccine\nE. Commence oral aciclovir prophylactically", "answer": "A", "explanation": "### ✅ Correct Answer: A. Administer varicella-zoster immune globulin\n\n**Clinical Reasoning:**\n1.  **Patient Risk:** The patient is immunocompromised (on methotrexate for RA) and has a significant exposure to varicella-zoster virus (VZV) from a household contact with active herpes zoster (shingles).\n2.  **Unknown Immunity Status:** She has no history of chickenpox or shingles, which makes her VZV IgG status unknown. In immunocompromised individuals, a negative or unknown history is not reliable for determining immunity.\n3.  **Immediate Post-Exposure Prophylaxis (PEP):** For immunocompromised, susceptible individuals with a significant exposure, the standard of care is to administer **Varicella-Zoster Immune Globulin (VZIG)** as soon as possible, ideally within 96 hours (and up to 10 days) of exposure. VZIG provides passive immunity and can prevent or modify the course of infection.\n4.  **Why Not Other Options First:**\n    *   **Serology (C)** would confirm susceptibility, but there is no time to wait for results before initiating PEP in this high-risk scenario. PEP should be given first, and serology can be sent concurrently.\n    *   **Vaccine (D)** is a live attenuated vaccine and is **contraindicated** in immunocompromised patients due to the risk of causing vaccine-strain disease.\n    *   **Aciclovir (E)** is used for treatment, not standard PEP. While sometimes considered in specific scenarios if VZIG is unavailable, it is not the first-line recommended intervention.\n    *   **Reassurance (B)** is incorrect due to the high risk of severe varicella in an immunocompromised host.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Reassure that no action is required**: This is incorrect because the patient is immunocompromised and at high risk for severe primary VZV infection (chickenpox). Inaction could lead to life-threatening complications.\n- **C. Order varicella-zoster virus IgG serology**: While checking serology is part of the workup, it should not delay the administration of VZIG in a high-risk exposure. PEP should be given immediately, and serology can be done concurrently.\n- **D. Administer the varicella vaccine**: The varicella vaccine is a live attenuated vaccine and is absolutely contraindicated in immunocompromised patients, including those on methotrexate, due to the risk of disseminated vaccine-strain disease.\n- **E. Commence oral aciclovir prophylactically**: Antiviral prophylaxis is not the standard first-line post-exposure prophylaxis for VZV in immunocompromised hosts. VZIG is the preferred agent. Aciclovir may be considered if VZIG is unavailable, but it is not the most appropriate initial step.\n\n### 📚 Relevant Guidelines\n- **Australian Immunisation Handbook (ATAGI)**: Provides specific recommendations for VZIG use in immunocompromised individuals following exposure to VZV. — [https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/varicella-chickenpox](https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/varicella-chickenpox)\n- **Therapeutic Guidelines (eTG)**: Details the management of VZV exposure and infection, including indications for VZIG and antiviral therapy. — [https://tgldcdp.tg.org.au/](https://tgldcdp.tg.org.au/)\n- **Centers for Disease Control and Prevention (CDC)**: Guidelines for the Prevention and Treatment of Opportunistic Infections in Adults and Adolescents with HIV, which includes VZV management principles applicable to other immunocompromised states. — [https://clinicalinfo.hiv.gov/en/guidelines/adult-and-adolescent-opportunistic-infection/varicella-zoster-virus-disease](https://clinicalinfo.hiv.gov/en/guidelines/adult-and-adolescent-opportunistic-infection/varicella-zoster-virus-disease)", "image_path": ""}, {"id": 34891, "date": "2026-03-03T15:26:50+00:00", "stem": "A 56-year old lady is brought to the emergency department by an ambulance. She developed right leg weakness and left sided facial droop an hour ago. She has past medical history of hypertension, hyperlipidemia and peptic ulcer disease (GI bleeding two weeks ago). On examination, her blood pressure is 130/85mmHg, respiratory rate is 18 breaths per minute, heart rate is 110 beats per minutes and oxygen saturation is 100% at room air. On the neurological examination, she is found to have hypertonia and reduced power in the right leg, and right-sided facial palsy. The Babinski sign is positive. CT scan of the brain does not show any evidence of an intracranial bleed.ECG shows sinus rhythm. Which of the following is the most appropriate therapy for this patient?", "options": "A. Heparin\nB. Warfarin\nC. Clopidogrel\nD. Aspirin\nE. Thrombolysis", "answer": "D", "explanation": "### ✅ Correct Answer: D. Aspirin\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The patient presents with an acute ischemic stroke (onset 1 hour ago). Clinical findings (right leg weakness/face droop, hypertonia, positive Babinski) suggest a left-sided motor cortex lesion affecting the face and leg. The non-contrast CT brain is normal, which is typical in the hyperacute phase of ischemic stroke, ruling out haemorrhage.\n2.  **Key Contraindication to Thrombolysis:** The most critical factor is her **recent GI bleed (2 weeks ago)**. This is a major contraindication to thrombolytic therapy (Alteplase) due to a high risk of causing life-threatening haemorrhage. Therefore, option E is excluded.\n3.  **Immediate Antiplatelet Therapy:** For patients with acute ischemic stroke who are not eligible for thrombolysis, the immediate administration of **aspirin** (160-300 mg) is the standard of care. It reduces the risk of early stroke recurrence and improves long-term outcomes.\n4.  **Why Not Anticoagulants:** Anticoagulants like heparin (A) or warfarin (B) are not recommended in the acute phase of ischemic stroke due to an increased risk of haemorrhagic transformation, especially without a clear indication like atrial fibrillation (her ECG shows sinus rhythm). Her recent GI bleed is an additional strong contraindication.\n5.  **Why Not Clopidogrel:** While clopidogrel (C) is used for secondary prevention, aspirin is the first-line immediate therapy in the acute setting. Dual antiplatelet therapy (e.g., aspirin + clopidogrel) may be used in specific minor stroke/TIA scenarios, but the standard initial agent for most acute ischemic strokes is aspirin.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Heparin**: Full-dose intravenous heparin is not recommended in the acute management of ischemic stroke due to the risk of haemorrhagic transformation and lack of proven net benefit. It is contraindicated with recent major bleeding (GI bleed 2 weeks ago).\n- **B. Warfarin**: Warfarin is an oral anticoagulant used for long-term secondary prevention in specific cases (e.g., atrial fibrillation). It has no role in the acute management of stroke, takes days to become therapeutic, and is contraindicated with recent active bleeding.\n- **C. Clopidogrel**: While an effective antiplatelet for secondary prevention, aspirin is the first-line agent for immediate administration in acute ischemic stroke not receiving thrombolysis. Clopidogrel loading is not the standard initial therapy in this context.\n- **E. Thrombolysis (Alteplase)**: Although the patient presents within the time window (1 hour), she has an **absolute contraindication** due to her **major GI bleed within the last 3 months**. Administering thrombolytics would carry an unacceptably high risk of causing catastrophic haemorrhage.\n\n### 📚 Relevant Guidelines\n- **Australian Clinical Guidelines for Stroke Management**: Provide clear algorithms for acute stroke management, including contraindications to thrombolysis and recommendations for immediate aspirin therapy. — [https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management](https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management)\n- **Therapeutic Guidelines (eTG) - Neurology**: Details the pharmacological management of acute ischemic stroke, including antiplatelet and thrombolytic therapy. — [https://tgldcdp.tg.org.au/](https://tgldcdp.tg.org.au/)\n- **American Heart Association/American Stroke Association (AHA/ASA) Guidelines**: International standards for the early management of acute ischemic stroke, which align with Australian practice on contraindications to thrombolysis. — [https://www.ahajournals.org/doi/10.1161/STR.0000000000000211](https://www.ahajournals.org/doi/10.1161/STR.0000000000000211)", "image_path": ""}, {"id": 34922, "date": "2026-03-04T15:30:12+00:00", "stem": "A 6-week-old male infant presents with a 2-day history of non-bilious projectile vomiting after feeds. He appears hungry and feeds vigorously. On examination, there is a palpable 'olive-shaped' mass in the epigastrium. What is the most appropriate initial investigation?", "options": "A. Abdominal X-ray\nB. Upper gastrointestinal series (barium swallow)\nC. Abdominal ultrasound\nD. Serum electrolytes and blood gas\nE. Upper endoscopy", "answer": "C. Abdominal ultrasound", "explanation": "### ✅ Correct Answer: C. Abdominal ultrasound\n\n**Clinical Reasoning:**\nThis infant presents with the classic triad for **congenital hypertrophic pyloric stenosis (HPS)**: non-bilious projectile vomiting, visible peristalsis, and a palpable 'olive' mass in the epigastrium. The vomiting is typically projectile and occurs shortly after feeds, with the infant remaining hungry (\"hungry vomiter\").\n\n1.  **Pathophysiology:** HPS involves hypertrophy of the pyloric muscle, causing gastric outlet obstruction. This leads to progressive, non-bilious vomiting, dehydration, and a hypochloremic, hypokalemic metabolic alkalosis if untreated.\n2.  **Diagnostic Approach:** The diagnosis is primarily clinical, confirmed by palpation of the pyloric 'olive'. When the mass is not palpable or the presentation is atypical, **abdominal ultrasound is the investigation of choice**.\n3.  **Why Ultrasound First?** It is non-invasive, has no radiation exposure (crucial in infants), and has high sensitivity (>95%) and specificity for HPS. Diagnostic criteria include a pyloric muscle thickness >3-4 mm and a pyloric channel length >14-16 mm. It can also assess for other causes of obstruction and evaluate hydration status.\n4.  **Management Pearls:** Once diagnosed, the priority is **correction of fluid and electrolyte imbalances** (hypochloremic metabolic alkalosis) prior to the definitive treatment, which is **pyloromyotomy**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Abdominal X-ray**: May show a dilated stomach with little gas distal to the pylorus (single bubble sign), but it is non-specific, exposes the infant to radiation, and is not the preferred first-line imaging. It is more useful for suspected intestinal obstruction or perforation.\n- **B. Upper gastrointestinal series (barium swallow)**: Was historically used but is now largely replaced by ultrasound. It involves radiation and contrast administration. It may show the 'string sign' (elongated, narrow pyloric channel) or 'shoulder sign' (indentation of the antrum), but it is reserved for cases where ultrasound is equivocal.\n- **D. Serum electrolytes and blood gas**: This is a **critical test** but is for **assessment and management, not diagnosis**. It is performed *after* the clinical or sonographic diagnosis to guide preoperative fluid resuscitation, as infants with HPS often have a hypochloremic, hypokalemic metabolic alkalosis.\n- **E. Upper endoscopy**: Has no role in the diagnosis of HPS. It is invasive and requires sedation. It is used for evaluating mucosal lesions, gastroesophageal reflux disease, or upper GI bleeding, not for structural muscular hypertrophy.\n\n### 📚 Relevant Guidelines\n- **Royal Children's Hospital Melbourne - Clinical Practice Guideline: Pyloric Stenosis**: Provides a comprehensive algorithm for assessment, investigation (ultrasound as first line), and preoperative management of fluid/electrolytes. — https://www.rch.org.au/clinicalguide/guideline_index/Pyloric_stenosis/\n- **Therapeutic Guidelines (eTG) - Gastrointestinal: Infantile hypertrophic pyloric stenosis**: Summarizes diagnostic criteria and management, including the central role of ultrasound. — https://tgldcdp.tg.org.au/viewTopic?topicfile=gastrointestinal-disorders-children&guidelineName=Gastrointestinal#toc_d1e289\n- **UpToDate - Infantile hypertrophic pyloric stenosis**: Details clinical features, diagnostic evaluation (highlighting ultrasound), and surgical management. — https://www.uptodate.com/contents/infantile-hypertrophic-pyloric-stenosis", "image_path": "photo_2026-03-04_15-30-12.jpg"}, {"id": 34924, "date": "2026-03-04T15:32:53+00:00", "stem": "A 45-year-old man presents with a 3-month history of progressive difficulty walking, stiffness in his legs, and urinary urgency. Neurological examination reveals spastic paraparesis, hyperreflexia in the lower limbs, and extensor plantar responses. Vibration sense is impaired at the ankles. What is the most likely underlying nutritional deficiency?", "options": "A. Vitamin B1 (Thiamine)\nB. Vitamin B6 (Pyridoxine)\nC. Vitamin B9 (Folate)\nD. Vitamin B12 (Cobalamin)\nE. Vitamin E", "answer": "D. Vitamin B12 (Cobalamin)", "explanation": "### ✅ Correct Answer: D. Vitamin B12 (Cobalamin)\n\n**Clinical Reasoning:**\nThis patient presents with a **subacute combined degeneration of the cord (SACD)**, a classic neurological manifestation of **vitamin B12 deficiency**.\n\n1.  **Pathophysiology:** Vitamin B12 is essential for myelin synthesis. Its deficiency leads to demyelination, preferentially affecting the **dorsal columns** (carrying vibration and proprioception) and **corticospinal tracts** (carrying motor signals). This results in the characteristic combination of sensory ataxia and upper motor neuron signs.\n2.  **Key Diagnostic Features:**\n    *   **Motor:** Spastic paraparesis, hyperreflexia, extensor plantars (Babinski sign) – due to corticospinal tract involvement.\n    *   **Sensory:** Impaired vibration and proprioception (sensory ataxia) – due to dorsal column involvement. Pain and temperature sensation are typically spared (spinothalamic tracts unaffected).\n    *   **Autonomic:** Urinary urgency or incontinence is common.\n    *   **Other Associations:** May be accompanied by megaloblastic anaemia, glossitis, and neuropsychiatric symptoms. However, neurological deficits can occur *without* anaemia.\n3.  **Management Pearls:** Diagnosis is confirmed with low serum B12 levels and elevated methylmalonic acid/homocysteine. Treatment involves **intramuscular hydroxocobalamin** replacement. Neurological recovery may be slow and incomplete, especially if treatment is delayed.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Vitamin B1 (Thiamine)**: Deficiency causes **Wernicke-Korsakoff syndrome** (confusion, ataxia, ophthalmoplegia) and **beriberi** (wet: high-output cardiac failure; dry: peripheral neuropathy). It does not cause the specific combination of dorsal column and corticospinal tract signs seen here.\n- **B. Vitamin B6 (Pyridoxine)**: Deficiency causes a sensory peripheral neuropathy, dermatitis, and cheilosis. Excess can cause a sensory neuropathy. It is not associated with myelopathy or upper motor neuron signs.\n- **C. Vitamin B9 (Folate)**: Deficiency causes megaloblastic anaemia indistinguishable from B12 deficiency anaemia. However, **folate deficiency does NOT cause neurological deterioration** (like SACD). In fact, giving folate to a B12-deficient patient may correct the anaemia but allow neurological damage to progress.\n- **E. Vitamin E**: Deficiency causes a **spinocerebellar syndrome** with ataxia, areflexia, and loss of proprioception/vibration (similar to dorsal column involvement), but it also includes significant **ophthalmoplegia** and **myopathy**. It typically lacks the prominent upper motor neuron signs (spasticity, hyperreflexia) that are hallmark features of B12 deficiency.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) - Neurology: Vitamin B12 deficiency**: Covers causes, diagnostic testing (including the importance of measuring MMA/Hcy), and treatment regimens for neurological involvement. — https://tgldcdp.tg.org.au/viewTopic?topicfile=neurological&guidelineName=Neurology#toc_d1e517\n- **BMJ Best Practice - Vitamin B12 deficiency**: Provides a detailed overview of clinical features, with emphasis on neurological manifestations and diagnostic approach. — https://bestpractice.bmj.com/topics/en-gb/300\n- **UpToDate - Clinical manifestations and diagnosis of vitamin B12 deficiency**: Specifically details the neurological syndromes, including subacute combined degeneration. — https://www.uptodate.com/contents/clinical-manifestations-and-diagnosis-of-vitamin-b12-deficiency", "image_path": "photo_2026-03-04_15-32-53.jpg"}, {"id": 34979, "date": "2026-03-06T13:11:51+00:00", "stem": "A 45-year-old man presents with a 3-month history of progressive dyspnoea on exertion and fatigue. He has a history of hypertension and type 2 diabetes mellitus. On examination, his blood pressure is 150/95 mmHg, heart rate 92 bpm, and oxygen saturation 96% on room air. Cardiovascular examination reveals a displaced apex beat and a pansystolic murmur heard best at the apex radiating to the axilla. Chest X-ray shows cardiomegaly and pulmonary venous congestion. What is the most likely diagnosis?", "options": "A. Dilated cardiomyopathy\nB. Hypertrophic cardiomyopathy\nC. Restrictive cardiomyopathy\nD. Constrictive pericarditis\nE. Mitral regurgitation", "answer": "E. Mitral regurgitation", "explanation": "### ✅ Correct Answer: E. Mitral regurgitation\n\nThe clinical presentation is classic for chronic mitral regurgitation (MR). The key features include:\n1. **Progressive dyspnoea and fatigue**: These are hallmark symptoms of left ventricular volume overload and reduced forward cardiac output in chronic MR.\n2. **Pansystolic murmur at apex radiating to axilla**: This is the characteristic auscultatory finding of MR. The radiation pattern to the axilla distinguishes it from tricuspid regurgitation (which radiates to the left sternal border) and ventricular septal defect (which radiates widely).\n3. **Displaced apex beat**: Indicates left ventricular dilation due to chronic volume overload from the regurgitant flow.\n4. **Chest X-ray findings**: Cardiomegaly (from left atrial and ventricular enlargement) and pulmonary venous congestion (from elevated left atrial pressure) are consistent with MR.\n5. **Risk factors**: Hypertension and diabetes are common comorbidities that can contribute to mitral valve dysfunction through ischemic heart disease or direct myocardial effects.\n\n**Pathophysiology**: In chronic MR, the left ventricle ejects blood both forward into the aorta and backward into the left atrium. This creates volume overload, leading to left ventricular dilation and eccentric hypertrophy. Over time, this compensatory mechanism fails, resulting in systolic dysfunction and heart failure symptoms.\n\n**AMC Exam Pearl**: Always correlate the murmur characteristics with the clinical scenario. A pansystolic murmur at the apex + signs of left heart failure = MR until proven otherwise.", "image_path": "photo_2026-03-06_13-11-51.jpg"}, {"id": 34980, "date": "2026-03-06T13:20:44+00:00", "stem": "A 28-year-old woman presents with a 2-day history of fever, sore throat, and painful cervical lymphadenopathy. She has no significant past medical history. On examination, her temperature is 38.5°C, pharynx is erythematous with exudates, and there are tender anterior cervical lymph nodes. Rapid antigen detection test for Group A Streptococcus is negative. Which of the following is the most appropriate next step in management?", "options": "A. Prescribe amoxicillin\nB. Prescribe azithromycin\nC. Order throat culture\nD. Reassure and advise symptomatic treatment\nE. Order Epstein-Barr virus serology", "answer": "D. Reassure and advise symptomatic treatment", "explanation": "### ✅ Correct Answer: D. Reassure and advise symptomatic treatment\n\nThis patient presents with acute pharyngitis. The negative rapid antigen detection test (RADT) for Group A Streptococcus (GAS) makes bacterial pharyngitis unlikely. In adults with acute sore throat, the majority of cases are viral (80-90%). The Centor criteria (fever, exudate, tender anterior cervical lymphadenopathy, absence of cough) would give this patient a score of 3, but the negative RADT overrides this for management decisions.\n\n**Clinical Reasoning**:\n1. **Negative RADT**: Has high specificity (>95%) for excluding GAS pharyngitis when performed properly.\n2. **Viral etiology likely**: Features are consistent with viral pharyngitis (which can include exudates).\n3. **Antibiotics not indicated**: Without confirmed GAS, antibiotics provide no benefit and contribute to antimicrobial resistance and potential side effects.\n4. **Symptomatic management**: Includes analgesics (paracetamol/ibuprofen), throat lozenges, hydration, and rest.\n5. **Throat culture not routinely needed**: When RADT is negative in adults, throat culture is not recommended as it has low yield and delays appropriate management.\n\n**AMC Exam Pearl**: In Australia, follow the Therapeutic Guidelines for antibiotic stewardship. Never prescribe antibiotics for viral pharyngitis based on clinical features alone when RADT is negative.", "image_path": "photo_2026-03-07_10-07-25.jpg"}];
        let questions = [];
        let currentIndex = 0;


        async function init() {
            try {
                // Data is now embedded directly to bypass CORS
                questions = questionsData;
                document.getElementById('total-count').innerText = questions.length;

                // Load saved progress
                const savedIndex = localStorage.getItem('amc_study_index');
                if (savedIndex !== null) {
                    currentIndex = parseInt(savedIndex, 10);
                    // Boundary check
                    if (currentIndex >= questions.length) currentIndex = 0;
                }

                renderQuestion();
            } catch (e) {
                console.error("Data load failed", e);
                document.getElementById('question-stem').innerText = "加载失败。";
            }
        }

        function renderQuestion() {
            if (questions.length === 0) return;
            const q = questions[currentIndex];

            // Stats & Progress
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / questions.length) * 100}%`;

            // Save progress
            localStorage.setItem('amc_study_index', currentIndex);

            // Reset UI
            document.getElementById('question-stem').innerText = q.stem;
            document.getElementById('explanation-container').classList.add('hidden');
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';


            // Options
            const options = q.options.split('\n');
            options.forEach(opt => {
                if (!opt.trim()) return;
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-100 hover:border-blue-300 hover:bg-blue-50 transition-all text-slate-700 font-medium group";
                btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-lg bg-slate-100 group-hover:bg-blue-200 text-center leading-8 mr-4 text-sm font-bold text-slate-500 group-hover:text-blue-600 transition-all">&#8226;</span> ${opt}`;
                btn.onclick = () => selectOption(btn, opt, q.answer, q.explanation);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btn, selected, correct, explanation) {
            // Check correct answer (fuzzy match)
            const isCorrect = selected.toLowerCase().includes(correct.toLowerCase()) ||
                correct.toLowerCase().includes(selected.toLowerCase());

            // Style all buttons
            const allBtns = document.getElementById('options-container').querySelectorAll('button');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.innerText.toLowerCase().includes(correct.toLowerCase())) {
                    b.classList.add('answer-correct');
                }
            });

            if (!isCorrect) {
                btn.classList.add('answer-wrong');
            }

            // Show explanation
            document.getElementById('explanation-text').innerText = explanation;
            document.getElementById('explanation-container').classList.remove('hidden');

            // Scroll to explanation
            setTimeout(() => {
                document.getElementById('explanation-container').scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function exportProgress() {
            prompt('📤 你的进度码（在其他设备上导入）：', 'matt-' + (currentIndex + 1));
        }

        function importProgress() {
            const input = prompt('📥 输入进度码（如 matt-87）：');
            if (!input) return;
            const trimmed = input.trim();
            const match = trimmed.match(/-?(\d+)$/);
            if (match) {
                const num = parseInt(match[1], 10);
                if (num >= 1 && num <= questions.length) {
                    currentIndex = num - 1;
                    renderQuestion();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    alert(`✅ 已跳转到第 ${num} 题。`);
                    return;
                }
            }
            alert(`⚠️ 格式错误，请输入如 matt-87 的进度码。`);
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        init();
    </script>
</body>
