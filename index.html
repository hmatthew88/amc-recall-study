    <script>
        const questionsData = [{ "id": 34160, "date": "2026-01-20T13:51:31+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "The clinical presentation is classic for uterine rupture. Key diagnostic features include: 1. Sudden, severe abdominal pain. 2. Abrupt cessation of previously regular uterine contractions. 3. Recession of the presenting part (change in fetal station) as the fetus may move into the peritoneal cavity. 4. Maternal hemodynamic instability (hypotension, tachycardia). 5. Fetal distress, most commonly manifested as persistent bradycardia. While placental abruption also causes pain and fetal distress, it would not typically cause a loss of fetal station or the cessation of contractions.", "image_path": "" }, { "id": 34161, "date": "2026-01-20T13:52:26+00:00", "stem": "A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis", "explanation": "1. Acidemia: pH 7.34 (low). 2. Metabolic Acidosis: HCO3 20 (low). 3. Anion Gap (AG): Na - (Cl + HCO3) = 140 - (98 + 20) = 22. This is a High AG (HAGMA). Even after adjusting for low albumin (Expected AG ≈ 7.5-8), the measured AG of 22 is significantly elevated. 4. Compensation: Winters' Formula (Expected PCO2 = 1.5 * HCO3 + 8 ± 2) = (1.5 * 20) + 8 = 38 ± 2. Actual PCO2 is 38, so compensation is appropriate (no respiratory disorder). 5. Delta Gap: Delta AG = 22 - 12 = 10. Delta HCO3 = 24 - 20 = 4. Delta-Delta Ratio = 10 / 4 = 2.5. A ratio > 2 indicates a concurrent metabolic alkalosis, likely due to the patient's persistent vomiting (loss of HCl).", "image_path": "" }, { "id": 34170, "date": "2026-01-21T08:55:39+00:00", "stem": "A 54-year-old woman presents to the emergency department with complaints of sudden onset vertigo, nausea, vomiting and hearing loss in her left ear. Vertigo is provoked with changes in head position. On examination, her vitals are within the normal range. Hearing is decreased on the left side on whisper test. Rinne and Weber tests establish sensorineural deafness of the left ear. She also has nystagmus with the rapid eye to the left side. The rest of the examination is inconclusive. Which one of the following is the most likely diagnosis?", "options": "A. Labyrinthitis\nB. Vestibular neuronitis\nC. Acoustic neuroma\nD. Meniere's disease\nE. Lateral medullary syndrome", "answer": "A. Labyrinthitis", "explanation": "Labyrinthitis is characterized by the sudden onset of continuous vertigo, nausea, vomiting, and sensorineural hearing loss. Vestibular neuronitis presents with similar vestibular symptoms but notably lacks hearing loss. Meniere's disease causes episodic vertigo and hearing loss, but it is typically recurrent and associated with ear fullness and tinnitus. Acoustic neuroma causes progressive hearing loss rather than sudden onset vertigo. The clinical picture of vertigo plus hearing loss after an acute onset is classic for labyrinthitis.", "image_path": "" }, { "id": 34171, "date": "2026-01-21T08:55:53+00:00", "stem": "A 65-year-old woman presents to a hospital with confusion. Her heart rate is 52 beats/min, SaO2 is 89% on room air, respiratory rate is 9/min, temperature is 29°C, and blood sugar level is 7.0 mmol/l. Pupils are equal and reactive. Past medical history includes hypothyroidism diagnosed 10 years ago. ECG shows sinus bradycardia. Laboratory investigations confirm mild normocytic normochromic anaemia, mild hyponatremia, and primary hypothyroidism. All of the following are treatment options except?", "options": "A. IV T4 given\nB. Give oral T4 when patient is stable\nC. IV steroids\nD. Nalaxone and glucose\nE. O2 inhalation", "answer": "D. Nalaxone and glucose", "explanation": "The patient is presenting with Myxedema Coma (severe hypothyroidism characterized by hypothermia, bradycardia, respiratory depression, and altered mental status). Management includes IV thyroid hormone replacement (T4 or T3), supportive care (O2 inhalation, gradual rewarming), and IV corticosteroids (hydrocortisone) to cover for potential co-existing adrenal insufficiency. Naloxone and glucose are part of a general 'coma cocktail' for unknown etiologies (opioid overdose or hypoglycemia), but they are not specific or indicated treatments for myxedema coma when the diagnosis of hypothyroidism is known and BSL is normal (7.0 mmol/L).", "image_path": "" }, { "id": 34172, "date": "2026-01-21T08:56:10+00:00", "stem": "A 72-year-old male with a past medical history of pulmonary embolism presented with fever 5 days post-chemotherapy for Hodgkin’s lymphoma. His neutrophil count is zero. He is given intravenous antibiotics and isolation is maintained. His current medications include warfarin, cefepime, candesartan, and omeprazole. After a few days of admission, his platelet count decreased to 22,000/microlitre. What will you do next?", "options": "A. Cease omeprazole\nB. Cease warfarin\nC. Cease candesartan\nD. Cease cefepime\nE. No action needed", "answer": "D. Cease cefepime", "explanation": "While bone marrow suppression from chemotherapy is a possible cause for thrombocytopenia, certain medications can cause Drug-Induced Immune Thrombocytopenia (DITP). Beta-lactam antibiotics, such as cefepime and ceftriaxone, are known potential triggers. In the context of a sudden drop in platelets after starting a new drug, the suspected offending agent should be ceased. Warfarin affects coagulation factors but not typically the platelet count.", "image_path": "" }, { "id": 34173, "date": "2026-01-21T08:56:22+00:00", "stem": "A 54-year-old woman complains of pain and burning over the bottom of the forefoot; her symptoms are relieved by going barefoot. What is the appropriate disease?", "options": "A. Plantar Fasciitis\nB. Metatarsal stress fracture\nC. Tarsal tunnel syndrome\nD. Hallux Valgus\nE. Morton neuroma", "answer": "E. Morton neuroma", "explanation": "Morton neuroma is a benign neuroma of an intermetatarsal plantar nerve, most commonly between the third and fourth metatarsal heads. It typically causes burning pain and paresthesia in the forefoot that is exacerbated by walking in tight shoes and relieved by removing shoes (going barefoot) or massaging the area.", "image_path": "" }, { "id": 34174, "date": "2026-01-21T09:00:29+00:00", "stem": "A 67-year-old woman with a past medical history of hypertension, hypercholesterolemia, and type 2 diabetes presents with severe dyspnea, orthopnea, and chest pain. BP is 170/100 mmHg, pulse 120/min. S3 and bilateral crackles are present. Oxygen saturation is 78%. She is intubated in the field. After initial measures, breath sounds on the left side are markedly decreased. Her repeat blood pressure is 168/96 mmHg. Which of the following is most likely to restore breath sounds to the left hemithorax?", "options": "A. Left-sided chest tube\nB. Left-sided needle thoracostomy\nC. Pericardiocentesis\nD. Repositioning the endotracheal tube\nE. Tidal volume increase", "answer": "D. Repositioning the endotracheal tube", "explanation": "In an intubated patient, the sudden finding of unilateral (usually left-sided) decreased breath sounds is most commonly due to a right mainstem bronchus intubation. This occurs because the right bronchus is more vertical. Withdrawing the tube slightly to the correct position (usually 2-3 cm above the carina) will restore bilateral ventilation. Tension pneumothorax (options A and B) would typically present with hypotension, but her BP remains elevated (168/96).", "image_path": "" }, { "id": 34175, "date": "2026-01-21T09:00:45+00:00", "stem": "A 55-year-old man comes to the office due to a hard lump on the palm of his right hand that has been present for several months. It is painless and does not affect hand function. Medical history is significant for type 2 diabetes mellitus and hypertension. The patient works as a gardener. On examination, a hard, fibrous, nodular band is present at the base of the ring finger. He has full movement of his fingers. What is the most likely cause of this patient’s current condition?", "options": "A. Calcific peritendinitis\nB. Diabetic cheiroarthropathy\nC. Fibrosis of the palmar fascia\nD. Flexor tenosynovitis\nE. Median nerve injury", "answer": "C. Fibrosis of the palmar fascia", "explanation": "Dupuytren's contracture is characterized by the fibrosis of the palmar fascia. It often starts as painless nodules or bands (usually at the base of the ring or small finger) and can progress to contractures. It is associated with manual labor (gardening), diabetes mellitus, and male gender.", "image_path": "" }, { "id": 34176, "date": "2026-01-21T09:18:12+00:00", "stem": "A 40-year-old woman with a 4-year history of rheumatoid arthritis (RA) is taking disease-modifying therapy. She reports improvement in symptoms. Labs show Hemoglobin 11.2 g/dL and Mean Corpuscular Volume (MCV) 108 µm3. Other labs are normal. Which of the following is the most likely additional adverse effect of this patient’s pharmacotherapy?", "options": "A. Hepatotoxicity\nB. Neurotoxicity\nC. Osteoporosis\nD. Retinal toxicity\nE. Tuberculosis reactivation", "answer": "A. Hepatotoxicity", "explanation": "The patient’s macrocytic anemia (MCV 108) while on RA treatment suggests the use of Methotrexate, which acts as a folate antagonist. A common and significant adverse effect of Methotrexate is hepatotoxicity (elevated LFTs, fibrosis). Retinal toxicity is associated with hydroxychloroquine, and TB reactivation is associated with TNF-alpha inhibitors.", "image_path": "" }, { "id": 34179, "date": "2026-01-21T09:21:59+00:00", "stem": "A 30-year-old woman comes to the office due to pain over the lateral side of the right wrist for the last 4 days. She is 6 weeks postpartum, and the pain is most severe when she lifts the infant. Examination shows tenderness over the radial side of the wrist. With the hand in a fist and the fingers closed over the thumb, passive adduction of the wrist (Finkelstein test) reproduces the pain. Which of the following is the most likely diagnosis?", "options": "A. De Quervain tendinopathy\nB. Flexor carpi radialis tenosynovitis\nC. Osteoarthritis of first metacarpophalangeal joint\nD. Scaphoid fracture\nE. Trigger thumb", "answer": "A. De Quervain tendinopathy", "explanation": "De Quervain tendinopathy is an inflammation of the abductor pollicis longus and extensor pollicis brevis tendons. It is classically seen in postpartum women due to repetitive lifting of the baby. The positive Finkelstein test (pain with ulnar deviation/passive adduction of the wrist while the thumb is tucked in a fist) is diagnostic.", "image_path": "" }, { "id": 34187, "date": "2026-01-22T12:46:55+00:00", "stem": "A 45-year-old male presented with sharp, burning, stabbing pain in the lateral aspect of the right foot. You suspect L5-S1 radiculopathy. Which of the following is lost in L5-S1 disc prolapse?", "options": "A. Knee jerk\nB. Dorsiflexion of big toe and foot\nC. Inversion of foot\nD. Eversion of foot\nE. Ankle jerk", "answer": "E. Ankle jerk", "explanation": "In an L5-S1 disc prolapse, the S1 nerve root is typically compressed. The S1 nerve root is responsible for the ankle jerk (Achilles reflex). Other S1 findings include weakness in plantar flexion, weakness in eversion of the foot, and sensory loss on the lateral aspect of the foot/pinky toe. Knee jerk is associated with L3-L4, and dorsiflexion of the big toe is associated with L5.", "image_path": "" }, { "id": 34188, "date": "2026-01-22T12:56:19+00:00", "stem": "After a left elbow injury, a 55-year-old man develops weakness of the long flexors of the right thumb and index finger. He is also unable to do forearm pronation on the same side. Which one of the nerves is involved?", "options": "A. Radial nerve\nB. Median nerve\nC. Anterior interosseous nerve\nD. Posterior interosseous nerve\nE. Ulnar nerve", "answer": "B. Median nerve", "explanation": "A lesion of the median nerve at or above the elbow affects the pronator teres and the flexor muscles of the forearm. The anterior interosseous nerve (a branch of the median nerve) specifically supplies the flexor pollicis longus (long flexor of the thumb), the lateral half of the flexor digitorum profundus (long flexor of the index finger), and the pronator quadratus. Since the patient has lost total forearm pronation (involving pronator teres) and the long flexors, the lesion is most likely at the level of the median nerve at the elbow before the branch of the anterior interosseous nerve.", "image_path": "" }, { "id": 34189, "date": "2026-01-22T12:57:17+00:00", "stem": "You are working as a resident medical officer at a local children hospital in Adelaide. You are seeing a 1-week old baby for complete neonatal examination. All the physical examination is unremarkable except the following findings:\n\n– The knees were at different heights when the hips and knees were flexed.\n\n– Asymmetric skin folds and limited abduction of the affected hip were also seen.\n\nWhat is the most likely diagnosis?", "options": "A. Osgood -Schlatter disease\nB. Slipped capital femoral epiphysis\nC. Developmental dysplasia of the hip\nD. Femoral head fracture\nE. Legg-Calve-Perthes disease", "answer": "C. Developmental dysplasia of the hip", "explanation": "The clinical findings described are pathognomonic for Developmental Dysplasia of the Hip (DDH). Specifically, the 'knees at different heights' refers to the Galeazzi sign (apparent shortening of the femur). Asymmetric skin folds and limited hip abduction are common clinical indicators in neonates and infants. In Australia, hip screening with Barlow and Ortolani maneuvers is standard for newborns.", "image_path": "" }, { "id": 34190, "date": "2026-01-22T12:57:37+00:00", "stem": "Three months ago you started Mary, aged 73, on risedronate 35mg weekly, after she was diagnosed with osteoporosis confirmed with bone mineral density (BMD). Her presenting symptom at that time was back pain. Examination revealed height decrease and mild kyphosis, as well as tenderness over thoracic vertebrae. Despite being on risedronate, not only did her symptoms persist, she also developed pain over new areas of her thoracic. Investigations have established new osteoporotic fractures. Which one of the following would be the most appropriate management option for her?", "options": "A. Continue risedronate at the same dose\nB. Switch to alendronate\nC. Increase the dose of risedronate\nD. Switch to zoledronic acid\nE. Switch to teriparatide", "answer": "E. Switch to teriparatide", "explanation": "This patient is experiencing 'treatment failure' or represents a very high-risk case (new fractures while on bisphosphonate therapy). According to RACGP and Australian osteoporosis guidelines, patients with severe osteoporosis who continue to fracture despite being on anti-resorptive therapy (like risedronate) are candidates for anabolic agents. Teriparatide is a parathyroid hormone analogue that stimulates bone formation and is indicated in such cases to reduce the risk of further vertebral and non-vertebral fractures.", "image_path": "" }, { "id": 34211, "date": "2026-01-23T13:24:33+00:00", "stem": "A 32-year-old woman is brought to the hospital due to sudden-onset left-sided weakness. According to the family, she has had fatigue, malaise, and decreased appetite over the last several weeks. She attributed these symptoms to a “viral infection” and treated herself with over-the-counter acetaminophen. Her temperature is 37.4 C (99.4 F), blood pressure is 140/86 mm Hg, and pulse is 82/min. The patient appears confused and agitated. Lungs are clear to auscultation. A 2/6 holosystolic murmur is heard at the cardiac apex. Extremity examination reveals left-sided muscle strength is 1/5 with hyperactive deep tendon reflexes. Babinski sign is present on the left side. Laboratory results are as follows:\n\nHemoglobin 10.2 g/dL\nPlatelets 64,000/mm3\nLeukocytes 6,800/mm3\nBlood urea nitrogen 18 mg/dL\nCreatinine 70 umol/L\nAntinuclear antibody (ANA) positive\nRapid plasma reagin (RPR) positive\nCerebrospinal fluid cell counts are normal, and cultures are negative. Which of the following is the most likely diagnosis in this patient?", "options": "A. Antiphospholipid syndrome\nB. Multiple sclerosis\nC. Neurosyphilis\nD. Polyarteritis nodosa\nE. Rheumatic fever", "answer": "A. Antiphospholipid syndrome", "explanation": "The clinical presentation points toward Systemic Lupus Erythematosus (SLE) and secondary Antiphospholipid Syndrome (APS). Key findings include: 1. Stroke in a young patient (sudden left-sided weakness, hyperreflexia, positive Babinski). 2. Systemic symptoms and laboratory evidence of SLE (fatigue, malaise, positive ANA, anemia, and thrombocytopenia). 3. Cardiac involvement (holosystolic murmur at the apex likely representing Libman-Sacks endocarditis). 4. False-positive RPR: Patients with APS often have a false-positive syphilis screen (RPR/VDRL) because the test antigen contains cardiolipin, which reacts with antiphospholipid antibodies. APS is a Hypercoagulable state characterized by venous or arterial thrombosis (e.g., ischemic stroke) and is frequently associated with SLE. Neurosyphilis (Option C) is ruled out by the normal CSF findings. Multiple sclerosis (Option B) would not explain the cardiac murmur or the laboratory abnormalities (ANA+, RPR+, low platelets).", "image_path": "" }, { "id": 34234, "date": "2026-01-25T13:17:30+00:00", "stem": "A 28-year-old female presents to the emergency department with a sudden onset of right-sided weakness and slurred speech. She has no significant medical history and does not smoke. Investigations confirm an ischemic stroke. Laboratory results show a positive Rapid Plasma Reagin (RPR) test, but a negative Treponema pallidum particle agglutination (TPPA) test. What is the most likely underlying cause of her condition?", "options": "A. Antiphospholipid Syndrome (APS)\nB. Multiple Sclerosis\nC. Neurosyphilis\nD. Polyarteritis Nodosa\nE. Rheumatic Fever", "answer": "A. Antiphospholipid Syndrome (APS)", "explanation": "In a young patient with an unexplained stroke, Antiphospholipid Syndrome (APS) is a primary consideration. APS is characterized by arterial or venous thrombosis and/or pregnancy complications in the presence of antiphospholipid antibodies (lupus anticoagulant, anti-cardiolipin, or anti-beta2-glycoprotein I). A biological false-positive RPR/VDRL occurs in APS because the reagin antibodies cross-react with the cardiolipin component of the syphilis test. Multiple Sclerosis (B) typically presents with symptoms separated in time and space, not sudden stroke. Neurosyphilis (C) is ruled out by the negative treponemal-specific test (TPPA). Polyarteritis Nodosa (D) usually involves systemic symptoms and renal involvement. Rheumatic Fever (E) follows a streptococcal infection and presents with migratory arthritis and carditis, not acute stroke.", "image_path": "" }, { "id": 34235, "date": "2026-01-25T14:05:33+00:00", "stem": "A 68-year-old woman is admitted with high fever, rigors, and right-sided flank pain. On examination, her blood pressure is 80/50 mmHg and remains low despite the administration of 2 liters of intravenous normal saline. Urinalysis reveals 3+ leukocytes and nitrites. She has no recent hospitalizations or history of multi-drug resistant (MDR) infections. What is the most appropriate initial antibiotic choice for this patient?", "options": "A. Meropenem\nB. Oral Amoxicillin\nC. Intravenous Gentamicin and Ampicillin\nD. Nitrofurantoin", "answer": "C. Intravenous Gentamicin and Ampicillin", "explanation": "The patient is in septic shock (hypotension unresponsive to fluid resuscitation) secondary to pyelonephritis (uropsepsis). According to Australian Therapeutic Guidelines, empirical treatment for severe pyelonephritis or uropsepsis involves broad-spectrum intravenous antibiotics that cover common gram-negative bacilli like E. coli. Gentamicin combined with Ampicillin is a standard Australian recommendation. Meropenem (A) is reserved for suspected MDR organisms. Oral amoxicillin (B) is insufficient for sepsis. Nitrofurantoin (D) is only indicated for uncomplicated cystitis as it does not achieve therapeutic concentrations in the renal parenchyma or blood.", "image_path": "" }, { "id": 34236, "date": "2026-01-25T15:35:48+00:00", "stem": "A 75-year-old postmenopausal woman with known osteoporosis has been compliant with Alendronate therapy for the past 4 years. Despite this, she presents with a new-onset back pain, and imaging confirms a new vertebral compression fracture. Her Bone Mineral Density (BMD) has also significantly declined. What is the most appropriate next step in her pharmacological management?", "options": "A. Increase the dose of Alendronate\nB. Switch to Raloxifene\nC. Add Calcium and Vitamin D only\nD. Continue Alendronate and retest in 2 years\nE. Switch to Teriparatide", "answer": "E. Switch to Teriparatide", "explanation": "Teriparatide (recombinant human parathyroid hormone) is an anabolic agent that stimulates bone formation. It is indicated for patients at very high risk of fracture or those who experience 'treatment failure' on antiresorptive therapy (e.g., sustaining a new fracture or significant BMD loss while on bisphosphonates). Guidelines suggest switching to an anabolic agent like Teriparatide in these scenarios to improve bone density and reduce subsequent fracture risk more effectively than continuing bisphosphonates.", "image_path": "" }, { "id": 34239, "date": "2026-01-25T20:00:58+00:00", "stem": "A 35-year-old patient is found to be HBsAg positive on a routine screening. Further testing shows HBeAg negative, Anti-HBe positive, and HBV DNA levels of 1,200 IU/mL. Aminotransferase (ALT) levels are persistently normal. What is the most likely clinical state?", "options": "A. Acute Hepatitis B\nB. Chronic Hepatitis B (Inactive carrier/HBeAg-negative infection)\nC. HBeAg-positive Chronic Hepatitis\nD. Hepatitis B immunity due to vaccination", "answer": "B. Chronic Hepatitis B (Inactive carrier/HBeAg-negative infection)", "explanation": "Chronic Hepatitis B is defined by the presence of HBsAg for >6 months. This patient fits the 'Inactive Carrier' or 'HBeAg-negative chronic infection' profile: HBsAg positive, HBeAg negative, low viral load (HBV DNA <2,000 IU/mL), and normal ALT levels.", "image_path": "photo_2026-01-25_20-00-58.jpg" }, { "id": 34240, "date": "2026-01-25T20:01:42+00:00", "stem": "A 55-year-old man presents with chronic burning epigastric pain that is temporarily relieved by eating. He frequently uses ibuprofen for back pain. An upper endoscopy is performed. What is the most likely diagnosis based on this presentation?", "options": "A. Gastric Cancer\nB. Gastroesophageal Reflux Disease (GERD)\nC. Peptic Ulcer Disease\nD. Achalasia", "answer": "C. Peptic Ulcer Disease", "explanation": "The clinical history of epigastric pain relieved by food is classic for a duodenal ulcer, a form of Peptic Ulcer Disease (PUD). The use of NSAIDs (ibuprofen) is a major risk factor for the development of PUD. Endoscopy is the gold standard for diagnosis.", "image_path": "photo_2026-01-25_20-01-42.jpg" }, { "id": 34248, "date": "2026-01-26T09:42:53+00:00", "stem": "Which of the following descriptions correctly identifies the clinical features associated with an injury to the Anterior Interosseous Nerve (AIN)?", "options": "A. Wrist drop\nB. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger\nC. Branch of median nerve which is purely motor; injury results in the inability to make the 'OK sign' and weak pronation\nD. Branch of radial nerve, purely motor; responsible for wrist, finger, and thumb extension\nE. Injury causes claw hand, decreased finger abduction, and sensory loss of the little finger", "answer": "C", "explanation": "The Anterior Interosseous Nerve (AIN) is a purely motor branch of the median nerve. It innervates the flexor pollicis longus (FPL), the lateral half of the flexor digitorum profundus (FDP), and the pronator quadratus. An injury to the AIN leads to the inability to flex the distal phalanges of the thumb and index finger, meaning the patient cannot form a circle with their fingers (the 'OK sign'); instead, they demonstrate a 'pincer' or flat-fingered grip. Weakness in pronation may also be noted. Choice A refers to the radial nerve. Choice B is a mix of median and ulnar symptoms. Choice D refers to the Posterior Interosseous Nerve (PIN). Choice E refers to the ulnar nerve.", "image_path": "" }, { "id": 34268, "date": "2026-01-29T03:16:29+00:00", "stem": "A 24-year-old man presents with refractory hypertension detected during a routine medical exam. He has no family history of hypertension.\n\nInvestigations:\n • BP: 170/105 mmHg\n • K⁺: 2.8 mmol/L\n • pH: 7.50\n • HCO₃⁻: 36 mmol/L\n • Plasma renin: low\n • Aldosterone: low\n\nUrinary sodium is low.\n\nWhat is the most likely diagnosis?", "options": "A. Conn syndrome\nB. Pheochromocytoma\nC. Gitelman syndrome\nD. Liddle syndrome\nE. Renal artery stenosis", "answer": "D", "explanation": "The patient presents with the triad of hypertension, hypokalemia, and metabolic alkalosis (pH 7.50, high bicarbonate). This clinical picture suggests a state of mineralocorticoid excess. In Conn syndrome (Primary Hyperaldosteronism), renin is low but aldosterone is high. In this case, both renin and aldosterone are low, which points toward 'pseudo-hyperaldosteronism'. Liddle syndrome is an autosomal dominant condition characterized by a gain-of-function mutation in the epithelial sodium channel (ENaC) in the distal tubule, leading to sodium reabsorption and potassium secretion independent of aldosterone. Renal artery stenosis would show high renin and high aldosterone.", "image_path": "" }, { "id": 34270, "date": "2026-01-29T04:05:42+00:00", "stem": "A 29-year-old woman presents with concerns about osteoporosis. She is an elite athlete and has a body mass index (BMI) of 15 kg/m2. She has two daughters aged 2 and 4 years. You order a bone densitometry with DEXA scan, the result of which reveals a T-score of -3 and -1.7 for the femur and vertebrae, respectively. In addition to supplemental calcium, which one of the following should be given to her?", "options": "A. Alendronate\nB. Estrogen replacement therapy\nC. Vitamin D\nD. Weight bearing exercise\nE. Anabolic agent", "answer": "C", "explanation": "This patient presents with the 'Female Athlete Triad' (low energy availability/low BMI, menstrual dysfunction, and low bone mineral density). For a pre-menopausal woman with osteoporosis, the first-line management is lifestyle modification (increasing caloric intake) and ensuring adequate Calcium and Vitamin D supplementation. Bisphosphonates (Alendronate) are generally avoided in women of childbearing age due to potential teratogenicity. While estrogen therapy can be used if nutrition fails to restore the menstrual cycle and bone density, Vitamin D is a standard baseline requirement alongside calcium in the management of low bone density.", "image_path": "" }, { "id": 34271, "date": "2026-01-29T04:05:57+00:00", "stem": "A 45-year-old man develops weakness and wasting of the small muscles of the right hand. Which of the following is LEAST likely to be the cause?", "options": "A. Old injury to the right elbow joint\nB. Bronchogenic carcinoma of the right upper lobe\nC. Multiple Sclerosis\nD. Syringomyelia\nE. Motor Neuron Disease (MND)", "answer": "C", "explanation": "Wasting of the small muscles of the hand indicates a Lower Motor Neuron (LMN) lesion. \n- Old elbow injury can cause ulnar nerve palsy.\n- Bronchogenic carcinoma (Pancoast tumor) can invade the T1 nerve root/brachial plexus.\n- Syringomyelia affects the anterior horn cells in the cervical cord.\n- MND is a progressive disease affecting both upper and lower motor neurons.\nMultiple Sclerosis (MS) is primarily a demyelinating disease of the Central Nervous System (CNS) and typically presents with Upper Motor Neuron (UMN) signs (spasticity, hyperreflexia). Isolated focal muscle wasting is not a characteristic feature of MS.", "image_path": "" }, { "id": 34272, "date": "2026-01-29T04:06:28+00:00", "stem": "A patient presents with a right-sided headache followed by severe facial pain. The patient has right-sided weakness of the face and limbs. CT brain is normal. What is the most likely cause?", "options": "A. Herpetic encephalitis\nB. Right temperoparietal infarct\nC. Right pontine infarct\nD. Right medullary infarct", "answer": "C", "explanation": "The combination of cranial nerve involvement (facial pain/weakness) and limb weakness suggests a brainstem localization. An infarct in the pons can affect the corticospinal tract and cranial nerve nuclei. CT scans are notoriously insensitive for acute ischemic strokes, especially in the posterior fossa (brainstem) within the early hours. While a right-sided lesion typically causes contralateral body weakness, a pontine infarct is the most likely localized lesion among the options provided that could explain both facial and limb deficits with an initially normal CT.", "image_path": "" }, { "id": 34273, "date": "2026-01-29T04:06:47+00:00", "stem": "A patient presents with severe abdominal pain out of proportion to physical findings. They have a history of atrial fibrillation and an increased lactate level. What is the best diagnostic test?", "options": "A. Colonoscopy\nB. Plain abdominal film\nC. CT angiography\nD. D-dimer\nE. Ultrasound", "answer": "C", "explanation": "The clinical presentation of 'pain out of proportion to findings' in a patient with atrial fibrillation (a risk factor for emboli) and elevated lactate is classic for Acute Mesenteric Ischemia. CT Angiography (CTA) is the gold standard and the preferred first-line imaging modality to diagnose arterial or venous mesenteric occlusion.", "image_path": "" }, { "id": 34274, "date": "2026-01-29T04:07:39+00:00", "stem": "A 12-year-old girl presents with a sudden history of loss of sensation in her lower limbs associated with decreased reflexes and progressive ataxia. Which of the following is most likely the cause of her condition?", "options": "A. B12 deficiency\nB. Friedreich’s ataxia\nC. Charcot-Marie-Tooth disease\nD. Dermatomyositis", "answer": "B", "explanation": "Friedreich's ataxia is the most common hereditary ataxia and typically presents before age 25. Key features include progressive limb and gait ataxia, loss of joint position and vibration sense (sensory loss), and absent deep tendon reflexes (due to peripheral neuropathy). B12 deficiency is rare in children unless there is a specific malabsorption/dietary issue. CMT is a chronic, slowly progressive hereditary motor and sensory neuropathy usually presenting with foot deformities (pes cavus).", "image_path": "" }, { "id": 34282, "date": "2026-01-29T06:43:15+00:00", "stem": "A 34-year-old multigravida presents for prenatal care in the second trimester. She admits to a past history of substance abuse but states she has been clean for 6 months. With her second pregnancy she experienced a preterm delivery at 34 weeks' gestation of a male neonate who died within the first day of life. She states that at delivery the baby was swollen with skin lesions and that the placenta was very large. She was treated with antibiotics but she does not remember the name or other details. On a routine prenatal panel with this current pregnancy she is found to have a positive VDRL (Venereal Disease Research Laboratory) test. What is the recommended mode of delivery?", "options": "a. Vaginal\nb. Cesarean\nc. Forcep assisted\nd. Vacuum assisted", "answer": "a. Vaginal", "explanation": "The patient's history (hydrops fetalis, skin lesions, and a large placenta in a previous pregnancy) combined with a positive VDRL test indicates a diagnosis of syphilis. According to RANZCOG and Australian Therapeutic Guidelines, the primary management of syphilis in pregnancy is treatment with parenteral Penicillin G to prevent congenital syphilis and its complications. Syphilis infection is not an indication for Cesarean delivery; vaginal delivery is the recommended mode unless there are other specific obstetric indications (e.g., fetal distress, malpresentation). Unlike active genital herpes (HSV) or HIV with a high viral load, the risk of transmission during vaginal delivery is not the primary concern once maternal treatment is initiated.", "image_path": "" }, { "id": 34283, "date": "2026-01-29T06:44:14+00:00", "stem": "A 58-year-old man presents with complaint of progressive difficulty in walking for the past few months. He denies any pain or pins and needles. On examinations, he drags his left foot while walking. On the left side, ankle tendon reflexes are exaggerated, the strength of plantar flexion and dorsifiexion are decreased and are 4/5. Sensation is intact. The right foot is completely normal. Plantar reflexes are equivocal bilaterally. The rest of physical examination including neurologic exam of the face and upper extremities are unremarkable. Lesions of which one of the following parts could be the mostly likely cause to this presentation?", "options": "A. Common peroneal nerve\nB. L5/S1 nerve root\nC. Cervical spine\nD. Brainstem\nE. Cerebral cortex", "answer": "E. Cerebral cortex", "explanation": "The clinical presentation involves localized weakness and Upper Motor Neuron (UMN) signs (exaggerated ankle reflexes, dragging of the foot) in a single limb (monoparesis), while sensation and other neurological findings are normal. In the motor homunculus of the cerebral cortex, the area representing the lower limb is located on the medial surface of the hemisphere (paracentral lobule). A lesion here, such as a parasagittal meningioma, can cause isolated UMN weakness in the contralateral leg. Peripheral lesions (Options A and B) would cause Lower Motor Neuron (LMN) signs such as diminished reflexes. A brainstem lesion (Option D) would typically cause crossed hemiplegia or cranial nerve deficits. A cervical spine lesion (Option C) would usually cause bilateral signs or involve the upper extremities.", "image_path": "" }, { "id": 34304, "date": "2026-01-30T07:40:42+00:00", "stem": "A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "B", "explanation": "To interpret the acid-base status: 1. pH (7.34) is low, indicating acidosis. 2. Bicarbonate (20 mEq/L) is low, indicating metabolic acidosis. 3. Check for respiratory compensation using Winters' Formula: Expected PCO2 = (1.5 × HCO3) + 8 ± 2. Expected PCO2 = (1.5 × 20) + 8 = 38. Since the actual PCO2 is 38, the respiratory compensation is appropriate (no respiratory disorder). 4. Calculate Anion Gap (AG): Na - (Cl + HCO3) = 140 - (98 + 20) = 22. A normal AG is ~12 (lower if adjusted for albumin). 22 is significantly elevated, indicating a High Anion Gap Metabolic Acidosis (HAGMA), likely due to uremia (CKD) or ketoacidosis. 5. Check the Delta Ratio to look for other metabolic disorders: Delta AG / Delta HCO3. Delta AG = 22 - 12 = 10. Delta HCO3 = 24 - 20 = 4. Ratio = 10 / 4 = 2.5. A ratio > 2 suggests a concurrent metabolic alkalosis, which is consistent with the patient's history of persistent vomiting.", "image_path": "" }, { "id": 34308, "date": "2026-01-30T13:02:48+00:00", "stem": "A 45-year-old woman presents to the emergency department with a 2-day history of leg pain and swelling following what she describes as \"a small scratch\" from gardening. On examination, there is mild erythema and tenderness over the anterior shin with minimal induration. Vital signs are BP, 135/82; P, 88; T, 37.9°C (100.2°F). Point-of-care ultrasound (POCUS) of the affected area is performed. Which of the following ultrasound findings is most concerning and requires immediate surgical consultation?", "options": "A. Highly echogenic areas with posterior acoustic shadowing in the fascial planes\nB. Hypoechoic strands between subcutaneous fat tissue\nC. Hyperechoic linear structure with multiple parallel reverberation artifacts\nD. Discrete anechoic regions with posterior acoustic enhancement in subcutaneous tissues\nE. Noncompressible hypoechoic tubular structure in the deep posterior compartment", "answer": "A", "explanation": "The clinical presentation (pain out of proportion to exam and fever after a minor injury) raises suspicion for necrotizing fasciitis. Ultrasound finding A describes subcutaneous gas ('dirty shadowing' or echogenic foci with posterior shadowing) within the fascial planes, which is a hallmark of necrotizing fasciitis and constitutes a surgical emergency. Finding B (cobblestoning) is characteristic of cellulitis. Finding C describes a metallic foreign body. Finding D describes a subcutaneous abscess. Finding E describes a deep vein thrombosis (DVT).", "image_path": "" }, { "id": 34310, "date": "2026-01-30T13:41:32+00:00", "stem": "A 28-year-old man presents with altered mental status and vomiting after falling from a ladder. Vital signs are BP, 100/65; P, 55. His Glasgow Coma Scale score is 8. Neurological examination reveals anisocoria with sluggish pupillary responses. He requires emergency intubation for airway protection. Which induction agent is most appropriate?", "options": "A. Fentanyl\nB. Propofol\nC. Ketamine\nD. Etomidate\nE. Midazolam", "answer": "D", "explanation": "The patient has signs of a traumatic brain injury (TBI) and increased intracranial pressure (ICP), indicated by the GCS of 8, anisocoria, and relative bradycardia (possible Cushing's reflex). During Rapid Sequence Induction (RSI) for TBI, the goal is to maintain hemodynamic stability to ensure adequate Cerebral Perfusion Pressure (CPP = MAP - ICP). Etomidate is the preferred induction agent in this scenario because it is hemodynamically neutral, typically maintaining blood pressure better than propofol (which causes hypotension) and avoiding the potential (though debated) sympathetic surge associated with ketamine. In exam settings, Etomidate is the classic answer for maintaining BP in trauma-related inductions.", "image_path": "" }, { "id": 34319, "date": "2026-02-01T10:18:47+00:00", "stem": "A 62-year-old woman comes to the office due to upper extremity weakness and numbness. Three days ago, the patient was involved in a motor vehicle collision in which a truck rear-ended her vehicle. The patient did not hit her head or lose consciousness but experienced a tingling and burning sensation in all extremities, which she attributed to the stress of the accident. Since then, she has had numbness in her upper extremities and clumsiness of her hands. She reports difficulty picking up objects but has had no leg weakness or bowel or bladder disturbance. She has a history of hypertension and osteoarthritis. Vital signs are within normal limits. Neck and back examination show no deformity or tenderness. There is weakness of hand grip bilaterally, and the triceps reflex is decreased on both sides. Decreased pinprick sensation is present on the fingers. Cervical spine x-ray reveals no vertebral dislocation or fracture, but diffuse spondylotic changes are present. Which of the following is the most likely cause of this patient’s symptoms?", "options": "A. Acute stress disorder\nB. Brachial plexus injury\nC. Malingering\nD. Postconcussion syndrome\nE. Spinal cord injury", "answer": "E. Spinal cord injury", "explanation": "This patient presents with Central Cord Syndrome (CCS), a form of incomplete spinal cord injury. CCS typically occurs in older patients with pre-existing cervical spondylosis (osteoarthritis of the spine) who sustain a hyperextension injury, such as a rear-end motor vehicle accident. The mechanism involves compression of the spinal cord between the hypertrophied ligamentum flavum and anterior spondylotic spurs. Key clinical features include: 1. Weakness that is more pronounced in the upper extremities than the lower extremities (due to the central location of the upper extremity fibers in the corticospinal tract). 2. Sensory loss (often burning or tingling) below the level of the lesion. 3. Possible localized loss of reflexes (e.g., decreased triceps reflex). X-rays often show degenerative changes (spondylosis) without acute fractures.", "image_path": "" }, { "id": 34320, "date": "2026-02-01T10:20:36+00:00", "stem": "A newborn is delivered vaginally at term. The baby breathes quietly during sleep but develops loud noisy breathing when awake or crying. Physical examination is otherwise normal, and oxygen saturation is stable. What is the most likely diagnosis?", "options": "a. Subglottic stenosis\nb. Vocal cord paralysis\nc. Tracheomalacia\nd. Laryngomalacia\ne. Choanal atresia", "answer": "d. Laryngomalacia", "explanation": "Laryngomalacia is the most common cause of congenital stridor in infants. It is characterized by inspiratory stridor caused by the collapse of supraglottic structures (like the epiglottis or arytenoid cartilages) during inhalation. The stridor typically worsens when the infant is active, crying, feeding, or in a supine position, and often improves or becomes quiet when the infant is sleeping or prone. Diagnosis is confirmed by flexible fiberoptic laryngoscopy showing inward collapse of the supraglottic tissues. Most cases resolve spontaneously by 18-24 months of age. Note: Choanal atresia would present with respiratory distress that *improves* with crying.", "image_path": "" }, { "id": 34331, "date": "2026-02-02T11:20:12+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "A. Ondansetron\nB. Methylprednisolone\nC. Folic acid\nD. Potassium chloride\nE. Thiamine", "answer": "E. Thiamine", "explanation": "In patients with severe hyperemesis gravidarum who are malnourished or have been vomiting for a prolonged period, thiamine (Vitamin B1) must be administered before or along with dextrose-containing intravenous fluids. Administering dextrose alone can acutely deplete remaining thiamine stores as it acts as a co-factor in glucose metabolism, potentially precipitating Wernicke Encephalopathy. This is characterized by the triad of ophthalmoplegia, ataxia, and confusion.", "image_path": "" }, { "id": 34332, "date": "2026-02-02T11:26:24+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "The clinical presentation of sudden onset abdominal pain, cessation of contractions (loss of uterine tone), maternal hemodynamic instability (hypotension, tachycardia), and 'recession' of the presenting part (change in fetal station) is classic for uterine rupture. Fetal bradycardia is the most common fetal heart rate abnormality. This is an obstetric emergency requiring immediate laparotomy.", "image_path": "" }, { "id": 34335, "date": "2026-02-02T11:59:58+00:00", "stem": "A 62-year-old man presents with recurrent episodes of dizziness precipitated when he looks upwards while painting his ceiling. Each episode lasts several minutes. He has vascular risk factors including hypertension and diabetes. There is no hearing loss or tinnitus. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo\nB. Vestibular neuritis\nC. Ménière’s disease\nD. Vertebrobasilar ischaemia\nE. Acoustic neuroma", "answer": "D. Vertebrobasilar ischaemia", "explanation": "Vertebrobasilar ischaemia (VBI) should be suspected in older patients with vascular risk factors who experience vertigo triggered by neck extension (which can compress the vertebral arteries). Key features distinguishing VBI from Benign Paroxysmal Positional Vertigo (BPPV) include the duration of symptoms (minutes in VBI vs. seconds in BPPV) and the specific trigger of neck movement rather than just change in head position relative to gravity.", "image_path": "" }, { "id": 34336, "date": "2026-02-02T12:00:33+00:00", "stem": "A 45-year-old man presents with recurrent flushing, pruritus, abdominal cramping, and episodes of syncope after alcohol intake. He has a history of unexplained anaphylaxis following a bee sting. On examination, there are multiple brownish macules consistent with urticaria pigmentosa. Blood tests show a persistently elevated serum tryptase level of 28 ng/mL. What is the most likely diagnosis?", "options": "A. Carcinoid syndrome\nB. Pheochromocytoma\nC. Systemic mastocytosis\nD. Hereditary angioedema\nE. Zollinger–Ellison syndrome", "answer": "C. Systemic mastocytosis", "explanation": "Systemic mastocytosis is a clonal disorder characterized by mast cell accumulation in tissues. Clinical clues include urticaria pigmentosa (brownish macules that wheal when rubbed - Darier sign), symptoms of mediator release (flushing, GI upset, syncope) often triggered by alcohol or stings, and a high risk of anaphylaxis. A baseline serum tryptase level > 20 ng/mL is a major diagnostic criterion for systemic mastocytosis.", "image_path": "" }, { "id": 34344, "date": "2026-02-02T22:42:40+00:00", "stem": "A 68-year-old man presents with a 2-year history of gradually progressive muscle weakness. He reports difficulty climbing stairs and rising from a chair. He also notices reduced grip strength and difficulty holding cutlery.\n\nOn examination:\n • Weakness of quadriceps and finger flexors\n • Mild muscle wasting\n • No skin rash\n • CK is mildly elevated\n • EMG shows myopathic changes\n • Muscle biopsy shows rimmed vacuoles\n\nHe has had minimal response to high-dose corticosteroids.\n\nWhat is the most likely diagnosis?", "options": "A. Polymyositis\nB. Dermatomyositis\nC. Immune-mediated necrotizing myopathy\nD. Inclusion body myositis\nE. Antisynthetase syndrome", "answer": "D. Inclusion body myositis", "explanation": "Inclusion body myositis (IBM) is the most common inflammatory myopathy in patients over age 50. Key diagnostic features in this case include: 1) The specific distribution of weakness involving the quadriceps (proximal) and finger flexors (distal); 2) Insidious onset over years; 3) Minimal response to corticosteroid therapy; and 4) Muscle biopsy showing 'rimmed vacuoles.' These vacuoles are characteristic of IBM and help differentiate it from polymyositis or dermatomyositis.", "image_path": "" }, { "id": 34347, "date": "2026-02-03T06:01:54+00:00", "stem": "An 8-year-old girl presents with recurrent abdominal pain for several months, often missing school. There is no tenderness, normal urinalysis, and no systemic features. What is the most appropriate next step?", "options": "a. Abdominal ultrasound\nb. CT scan\nc. MRI abdomen\nd. No further investigation – reassurance\ne. Stool culture", "answer": "d. No further investigation – reassurance", "explanation": "This clinical picture is typical for Functional Abdominal Pain (FAP), formerly known as Recurrent Abdominal Pain of childhood. In the absence of 'red flag' symptoms (e.g., weight loss, growth failure, fever, nocturnal diarrhea, gastrointestinal bleeding, or localized tenderness) and with a normal physical exam and screening urinalysis, the Royal Children's Hospital (RCH) guidelines suggest that extensive investigations are not required. Management involves reassurance, explaining the gut-brain axis, and addressing psychosocial factors (like school avoidance) to restore normal function.", "image_path": "" }, { "id": 34370, "date": "2026-02-03T10:33:45+00:00", "stem": "A 35-year-old mother brings her 8-year-old daughter to the pediatric clinic for a routine check-up. The mother expresses concern about the timing of the HPV vaccine for her daughter, as she has heard mixed recommendations and is unsure when it is best to start the vaccination. Which of the following is the most appropriate recommendation for the HPV vaccination for the daughter?", "options": "a. Give the HPV vaccine now.\nb. Wait until Emily is 10 years old to start the HPV vaccination series.\nc. Delay vaccination until Emily is sexually active.\nd. Start the HPV vaccination series when Emily turns 18 years old.", "answer": "b", "explanation": "According to the Australian Immunisation Handbook and the National Immunisation Program (NIP), the human papillomavirus (HPV) vaccine (Gardasil 9) is routinely administered to adolescents aged 12–13 years through school-based programs. However, the vaccine is licensed for use and can be administered starting from 9 years of age. Vaccination is most effective when given before the onset of sexual activity. Since the child is currently 8 years old, she is below the minimum recommended age (9 years). Therefore, the most appropriate recommendation among the choices is to wait until she is at least 9 or 10 years old.", "image_path": "" }, { "id": 34374, "date": "2026-02-03T10:49:35+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "According to the National Blood Authority (NBA) Australia guidelines, red blood cell transfusion is indicated in patients with evidence of hemodynamic instability or acute blood loss. Patient C presents with an acute upper GI bleed and clinical signs of shock (hypotension and tachycardia), making immediate transfusion necessary as part of resuscitation, regardless of the hemoglobin level. For stable patients, a restrictive threshold (usually Hb < 70 g/L, or < 80 g/L in patients with pre-existing cardiovascular disease) is recommended. Patient A, B, D, and E are hemodynamically stable and do not meet the criteria for immediate transfusion.", "image_path": "" }, { "id": 34375, "date": "2026-02-03T10:49:51+00:00", "stem": "A 25‑year‑old man of Middle Eastern descent presents with sudden onset dark urine, jaundice and fatigue 2 days after being treated for a urinary tract infection. He has no past medical history. Examination reveals pallor and scleral icterus.\n\nInvestigations:\n• Hb: 70 g/L (130–170)\n• Reticulocyte count: elevated\n• Indirect bilirubin: elevated\n• Peripheral blood film: “bite cells” and blister cells\n\nHe is suspected to have G6PD deficiency.\n\nWhich of the following drugs is most likely to have precipitated his haemolysis?", "options": "A. Paracetamol\nB. Amoxicillin\nC. Dapsone\nD. Metformin\nE. Prednisolone", "answer": "C", "explanation": "Glucose-6-phosphate dehydrogenase (G6PD) deficiency is an X-linked recessive disorder where oxidative stress causes hemoglobin to denature (forming Heinz bodies), leading to hemolysis. Peripheral blood film typically shows 'bite cells' (where macrophages have removed Heinz bodies) and blister cells. Common triggers include fava beans, infections, and oxidative drugs. Dapsone is a potent oxidant drug and a classic trigger for hemolysis in G6PD deficiency. While Nitrofurantoin is a common antibiotic for UTIs that triggers G6PD, it is not listed; among the given options, Dapsone is the definitive cause. Paracetamol, Amoxicillin, Metformin, and Prednisolone are generally considered safe.", "image_path": "" }, { "id": 34416, "date": "2026-02-04T10:43:06+00:00", "stem": "A 67-year-old man is brought to the emergency department due to right-sided weakness, numbness, and slurred speech. The patient was in his usual state of health last night but awoke this morning with these symptoms. He has a history of hypertension, hyperlipidemia, type 2 diabetes mellitus, and peripheral arterial disease. The patient does not drink alcohol regularly but has a 45-pack-year history. Physical examination shows an awake and alert patient with right-sided weakness, hemisensory loss, homonymous hemianopsia, and aphasia. CT scan of the head reveals a large left hemispheric infarction due to an occluded middle cerebral artery. The patient is hospitalized but is not treated with fibrinolytic therapy or mechanical thrombectomy due to ineligibility. Forty-eight hours later, he becomes obtunded. Temperature is 38.3 C, blood pressure is 154/86 mm Hg, and pulse is 64/min. Physical examination now shows complete right hemiplegia and deviation of the eyes to the left. Which of the following is the best next step in management of this patient?", "options": "A. Blood cultures and empiric antibiotics\nB. Intravenous hypertonic saline and observation\nC. Intravenous mannitol and observation\nD. MRI of the head\nE. Repeat CT scan of the head", "answer": "E. Repeat CT scan of the head", "explanation": "This patient is presenting with 'Malignant MCA Syndrome'. Large middle cerebral artery (MCA) infarcts often lead to significant cerebral edema, which typically peaks 3–5 days after the initial event. The patient's deterioration (obtundation, fever, and worsening neurological signs) 48 hours later is highly suggestive of increased intracranial pressure and potential herniation due to mass effect from edema. The best next step is to repeat a non-contrast CT scan of the head to evaluate the degree of midline shift, assess for possible hemorrhagic transformation, and determine the need for life-saving interventions such as decompressive hemicraniectomy or osmotic therapy (e.g., hypertonic saline or mannitol).", "image_path": "" }, { "id": 34417, "date": "2026-02-04T10:43:16+00:00", "stem": "A mother is concerned that her child has stopped seeing friends and discarded his laptop, claiming he was receiving special messages from Facebook. There is social withdrawal and odd beliefs. What is the most important mental function to assess?", "options": "a. Self-esteem\nb. Insight\nc. Mood\nd. Judgment\ne. Reality testing", "answer": "e. Reality testing", "explanation": "The clinical presentation (delusions of reference/control regarding Facebook and social withdrawal) is highly suggestive of a psychotic disorder. Reality testing is the ability to distinguish between internal thoughts/feelings and external reality. Assessing reality testing is fundamental in evaluating psychosis, as the presence of delusions indicates a breakdown in this function.", "image_path": "" }, { "id": 34418, "date": "2026-02-04T10:44:02+00:00", "stem": "A post-op appendectomy patient on day 7 develops diarrhea, right-sided abdominal pain, normal temperature. Likely diagnosis?", "options": "(a) Pelvic abscess\n(b) Wound dehiscence\n(c) Clostridioides difficile colitis\n(d) Small bowel obstruction\n(e) Urinary tract infection", "answer": "(c) Clostridioides difficile colitis", "explanation": "Post-operative diarrhea occurring approximately one week after surgery in a patient who likely received perioperative antibiotics is a classic presentation for Clostridioides difficile infection. While a pelvic abscess (a common post-appendectomy complication) can cause diarrhea due to rectal irritation, it is almost always accompanied by a fever (swinging pyrexia) and elevated inflammatory markers. The absence of fever in this stem makes C. difficile more likely.", "image_path": "" }, { "id": 34481, "date": "2026-02-05T22:25:56+00:00", "stem": "A patient presents with episodic palpitations and hyperventilation. A resting ECG is normal, and the heart rhythm is regular. What is the **most appropriate next investigation**?", "options": "a. Troponin levels\nb. Echocardiography\nc. Chest X-ray\nd. Exercise stress test\ne. Ambulatory ECG", "answer": "e. Ambulatory ECG", "explanation": "For episodic palpitations with a normal resting ECG, the most appropriate next investigation is ambulatory ECG monitoring (Holter monitor or event recorder). This allows correlation of symptoms with cardiac rhythm during episodes. Troponin is for suspected acute coronary syndrome. Echocardiography assesses structural heart disease but not rhythm during symptoms. Chest X-ray has low yield for palpitations. Exercise stress test is only indicated if symptoms are exertional. According to clinical guidelines (e.g., ESC, ACC/AHA), ambulatory ECG is the first-line investigation for unexplained palpitations when initial ECG is normal.", "image_path": "" }, { "id": 34492, "date": "2026-02-06T05:19:37+00:00", "stem": "An 18-year-old man presented to the emergency department with generalized tonic–clonic seizures. On physical examination, the patient was confused. He had swelling over the right eye and tenderness in the right testis. Magnetic resonance imaging of the head showed numerous well-defined cystic lesions throughout the cerebral cortex. What is the diagnosis?", "options": "A. Cerebral metastases\nB. Progressive multifocal leukoencephalopathy\nC. Cerebral vasculitis\nD. Neurosyphilis\nE. Neurocysticercosis", "answer": "E. Neurocysticercosis", "explanation": "The clinical presentation of seizures, confusion, and multiple cystic brain lesions on MRI is highly suggestive of neurocysticercosis, caused by Taenia solium larvae. The presence of extra-neurological manifestations (eye swelling, testicular tenderness) indicates systemic dissemination. Neurocysticercosis is the most common parasitic infection of the CNS worldwide and a leading cause of acquired epilepsy in endemic regions. Diagnosis is supported by neuroimaging findings of multiple cystic lesions, often with scolex visible ('hole-with-dot' sign). Serological tests (ELISA, Western blot) can confirm exposure. Treatment involves antiparasitic medications (albendazole or praziquantel), corticosteroids to manage inflammation, and antiepileptics for seizure control. In cases with high cyst burden, antiparasitic treatment must be carefully managed due to risk of exacerbating cerebral edema.", "image_path": "photo_2026-02-06_05-19-37.jpg" }, { "id": 34493, "date": "2026-02-06T05:20:57+00:00", "stem": "A one-day-old boy is reviewed on the maternity ward with his parents. He was born at term via spontaneous vaginal delivery. He has no significant medical history and takes no regular medications. His parents express concern about the appearance of their child's face. On examination, he appears well with vital signs within normal limits. There is a distinct abnormality in the upper lip, characterised by a separation extending from the midline to the base of the nose on the left side. The defect appears to involve only the upper lip and does not extend to the palate. Which one of the following is the most likely cause of this condition?", "options": "Maternal alcohol use\nMaternal cytomegalovirus infection\nMaternal folate deficiency\nMaternal cocaine use\nMaternal diabetes", "answer": "Maternal folate deficiency", "explanation": "The infant has a unilateral cleft lip without cleft palate. Folate deficiency during early pregnancy (first trimester) is a well-established risk factor for neural tube defects and orofacial clefts. Periconceptional folic acid supplementation (400-800 mcg daily) reduces the risk of cleft lip/palate by approximately 25-50%. While other options (alcohol, cocaine, diabetes, infections) can cause congenital anomalies, folate deficiency is the most strongly associated with isolated cleft lip. Alcohol use is more associated with fetal alcohol spectrum disorder (FASD) with characteristic facial features but not typically isolated cleft lip. Cocaine use increases risk of vascular disruption anomalies. Maternal diabetes increases risk of cardiac and neural tube defects. CMV infection can cause microcephaly, hearing loss, and chorioretinitis but not specifically isolated cleft lip.", "image_path": "" }, { "id": 34518, "date": "2026-02-06T23:17:48+00:00", "stem": "A 54-year-old woman is admitted to the hospital with a day of right-sided weakness. The stroke team was activated, but no intervention was performed due to long length of time since symptom onset. The patient also notes 6 weeks of headaches and generalized weakness. She has not had recent fever, shortness of breath, cough, chest pain, palpitations, or syncope. She has no chronic medical conditions and does not take medications. The patient smoked a pack of cigarettes daily for 20 years but quit 15 years ago. She does not use alcohol or illicit drugs. Temperature is 37.1 C, blood pressure is 160/96 mm Hg, and pulse is 80/min and regular. Oxygen saturation is 99% on room air. BMI is 25 kg/m2. Cardiopulmonary examination shows no abnormalities. Abdomen is soft and tender; there is no hepatosplenomegaly. Extremities have no cyanosis, clubbing, or edema. A right facial droop is present. Motor strength is 2/5 in right upper extremity, 3/5 in right lower extremity, and 5/5 in left upper and left lower extremities. Sensation is intact diffusely. Laboratory results are as follows: Hemoglobin 20.2 g/dL, Hematocrit 61%, Leukocytes 7,200/mm3, Platelets 180,000/mm3, Creatinine 106 umol/L, LDL cholesterol 3.11 mmol/L, Erythropoietin level 22.9 mU/mL (normal: 4.1-19.5). MRI of the brain reveals an acute infarction involving the left internal capsule. Chest x-ray is normal. ECG shows normal sinus rhythm. Echocardiogram shows no abnormalities. Which of the following is most likely to establish a diagnosis in this patient?", "options": "A. Bone marrow aspiration\nB. CT scan of the abdomen\nC. Factor V Leiden mutation testing\nD. Lupus anticoagulant\nE. Serologic test for syphilis", "answer": "B. CT scan of the abdomen", "explanation": "The patient presents with an acute ischemic stroke (right-sided weakness, left internal capsule infarct on MRI) and has significant polycythemia (Hb 20.2 g/dL, Hct 61%). The elevated erythropoietin level (22.9 mU/mL) suggests secondary polycythemia rather than primary polycythemia vera (where EPO is typically low). Secondary polycythemia can be due to chronic hypoxia (e.g., COPD, sleep apnea) or erythropoietin-secreting tumors. Given the normal chest x-ray, absence of cardiopulmonary symptoms, and normal oxygen saturation, a hypoxic cause is less likely. The history of 6 weeks of headaches and generalized weakness, along with abdominal tenderness, raises suspicion for a renal or hepatic tumor secreting erythropoietin, most commonly renal cell carcinoma (RCC) or hepatocellular carcinoma. A CT scan of the abdomen is the most appropriate initial imaging modality to evaluate for such tumors. Bone marrow aspiration (A) is more indicated for primary polycythemia (polycythemia vera), where EPO is low. Factor V Leiden (C) and lupus anticoagulant (D) are thrombophilia tests; while hypercoagulability contributes to stroke in polycythemia, the primary diagnosis here is the cause of polycythemia. Syphilis (E) is a rare cause of stroke but does not explain the polycythemia.", "image_path": "" }, { "id": 34519, "date": "2026-02-07T00:03:46+00:00", "stem": "A 32-year-old male presents to your clinic concerning about the two occasions over the past week during which he has noticed blood in his semen. He has never noticed this before. There is no pain with urination or ejaculation and no urinary frequency. He reports no anorexia, bone pain or weight loss. He has had several casual sexual relationships with women over the past 12 months. He has no significant past medical history and takes no regular medications. There is no family history or other risk factors for prostate cancer. On examination, his temperature is 36.8C and blood pressure is 135/85 mmHg and genital examination and digital rectal examination are unremarkable. Systems review shows no clinical signs of chronic liver disease, leukaemia or lymphoma. Which initial investigations would be most appropriate for him at this stage?", "options": "A. Urine microscopy, culture & sensitivities; urine cytology; full blood count; coagulation studies; chlamydia & gonorrhoea PCR\nB. Urine microscopy, culture & sensitivities; full blood count; prostate specific antigen; chlamydia & gonorrhoea PCR; coagulation studies\nC. Urine microscopy, culture & sensitivities; urine cytology; prostate specific antigen; pelvic computed tomography; chlamydia & gonorrhoea PCR\nD. Urine microscopy, culture & sensitivities; full blood count; urine cytology; scrotal ultrasound; cystoscopy\nE. Urine microscopy, culture & sensitivities; chlamydia & gonorrhoea PCR; full blood count; pelvic computed tomography; cystoscopy", "answer": "A. Urine microscopy, culture & sensitivities; urine cytology; full blood count; coagulation studies; chlamydia & gonorrhoea PCR", "explanation": "Haematospermia (blood in semen) in a young man with no risk factors for prostate cancer is most commonly due to benign causes such as infection/inflammation (e.g., prostatitis, urethritis), calculi, or trauma. Malignancy is very rare in this age group. According to guidelines (e.g., RACGP, Therapeutic Guidelines), the initial approach is conservative with minimal invasive testing. Appropriate initial investigations include: 1) Urine MCS to rule out UTI/prostatitis; 2) STI screening (chlamydia/gonorrhoea PCR) given multiple sexual partners; 3) Urine cytology to screen for urothelial malignancy (though low yield); 4) Full blood count to check for bleeding disorders or haematological malignancy; 5) Coagulation studies if bleeding disorder is suspected. Prostate-specific antigen (PSA) is not recommended in young men without risk factors, as prostate cancer is extremely unlikely. Imaging (CT, ultrasound) and invasive procedures (cystoscopy) are reserved for persistent or recurrent haematospermia, or if red flag symptoms (e.g., weight loss, bone pain) are present, which are absent here.", "image_path": "" }, { "id": 34526, "date": "2026-02-07T04:12:38+00:00", "stem": "A 26-year-old man comes to the office for follow-up related to painless progressive visual loss in the right eye. Recent ophthalmological evaluation revealed macular edema due to 2 retinal lesions consistent with capillary hemangioblastoma. He underwent laser photocoagulation treatment, and the vision in his right eye has improved. The patient has no other medical conditions. His father died from a cerebral hemorrhage at age 52. MRI of the brain with gadolinium reveals 2 small, cystic, enhancing nodules in the cerebellum. Renal ultrasonography reveals multiple cysts in both kidneys. Which of the following is the most likely diagnosis?", "options": "A. Autosomal dominant polycystic kidney disease\nB. Autosomal recessive polycystic kidney disease\nC. Li-Fraumeni syndrome\nD. Neurofibromatosis type 2\nE. Von Hippel-Lindau disease", "answer": "E. Von Hippel-Lindau disease", "explanation": "The classic triad of retinal capillary hemangioblastoma (causing visual loss), cerebellar hemangioblastoma (cystic enhancing nodules on MRI), and renal cysts is diagnostic of Von Hippel-Lindau (VHL) disease, an autosomal dominant disorder caused by mutations in the VHL tumor suppressor gene. VHL is associated with benign and malignant tumors including hemangioblastomas of the CNS and retina, renal cell carcinoma (often preceded by cysts), pheochromocytoma, and pancreatic neuroendocrine tumors. The family history of cerebral hemorrhage (likely from a cerebellar hemangioblastoma) supports the diagnosis. Autosomal dominant polycystic kidney disease (A) causes renal cysts and intracranial aneurysms (not hemangioblastomas). Autosomal recessive polycystic kidney disease (B) presents in infancy with renal and hepatic fibrosis. Li-Fraumeni syndrome (C) involves TP53 mutations and early-onset cancers like sarcomas and breast cancer. Neurofibromatosis type 2 (D) features bilateral vestibular schwannomas and meningiomas, not hemangioblastomas.", "image_path": "" }, { "id": 34594, "date": "2026-02-17T12:56:49+00:00", "stem": "A 40-year-old man with ankylosing spondylitis, who has been in long-term remission on methotrexate (MTX) and ibuprofen, seeks advice as he is about to get married and plans to start a family. What is the most appropriate medication advice?", "options": "Discontinue both MTX and ibuprofen\nDiscontinue MTX but continue ibuprofen\nContinue both medications unchanged\nDiscontinue ibuprofen but continue MTX\nSwitch to alternative disease-modifying therapy", "answer": "E. Switch to alternative disease-modifying therapy", "explanation": "Methotrexate is teratogenic and must be discontinued at least 3 months before conception in males planning to father a child, due to risks of chromosomal abnormalities and miscarriage. According to Australian guidelines (RACGP, Therapeutic Guidelines), men should cease methotrexate and use effective contraception during this washout period. Ibuprofen (an NSAID) can be continued if needed for symptom control, as it does not affect male fertility or pose teratogenic risks. However, the patient requires ongoing disease control. Therefore, the most appropriate advice is to switch to an alternative disease-modifying antirheumatic drug (DMARD) that is safe for conception, such as sulfasalazine, which is considered safe in males trying to conceive. This approach maintains disease remission while eliminating teratogenic risk.", "image_path": "" }, { "id": 34610, "date": "2026-02-18T12:04:57+00:00", "stem": "A 65-year-old man presents with poorly controlled hypertension despite being on three antihypertensive medications. He has a history of smoking and peripheral vascular disease. On examination, he has an abdominal bruit. Laboratory tests show elevated serum creatinine and hypokalaemia. Which of the following is the most likely diagnosis?", "options": "Essential hypertension\nPrimary hyperaldosteronism\nRenal artery stenosis\nPheochromocytoma\nCushing syndrome", "answer": "Renal artery stenosis", "explanation": "The clinical presentation of refractory hypertension, abdominal bruit, elevated creatinine, and hypokalaemia is classic for renal artery stenosis (RAS), most commonly due to atherosclerotic disease in this age group. The hypokalaemia results from secondary hyperaldosteronism triggered by renal hypoperfusion. According to RACGP and Therapeutic Guidelines, RAS should be suspected in patients with: 1) Onset of hypertension after age 50, 2) Refractory hypertension on ≥3 medications, 3) Abdominal bruit, 4) Unexplained renal dysfunction, 5) Flash pulmonary edema. Diagnosis is confirmed with Doppler ultrasound, CT angiography, or MR angiography. Treatment involves medical management (ACE inhibitors/ARBs with caution), and revascularization (angioplasty/stenting) in selected cases.", "image_path": "" }, { "id": 34628, "date": "2026-02-19T09:09:28+00:00", "stem": "A 68-year-old woman on warfarin presents after a minor fall. She is fully conscious (GCS 15). No vomiting. No headache. Normal exam. What is the most appropriate next step?", "options": "A) Discharge\nB) CT brain\nC) Observe for 4 hours\nD) Reassure only", "answer": "B) CT brain", "explanation": "According to current guidelines (e.g., NICE, RACGP), patients on anticoagulants (like warfarin) who sustain head trauma, even if minor and with no immediate neurological symptoms, require urgent CT brain imaging. This is because anticoagulation significantly increases the risk of intracranial hemorrhage, which may not be immediately apparent. A normal neurological exam does not rule out a developing bleed. Observation alone is insufficient. Discharge or reassurance without imaging is contraindicated due to the high-risk profile.", "image_path": "" }, { "id": 34629, "date": "2026-02-19T09:10:07+00:00", "stem": "A 56-year-old poorly controlled diabetic female presents with sudden onset of binocular diplopia. She also has associated headaches. Her left eye appears to be deviated out and downwards. Pupillary examination shows mydriasis in the left eye. Which of the following investigation/examination is MOST relevant to rule out underlying cause in this case? (WHAT IS THE PROBABLE DIAGNOSIS AND THE MOST LIKELY VESSEL INVOLVED)", "options": "A. Blood pressure monitoring\nB. Cerebral angiography\nC. Hirschberg/corneal light reflection test\nD. Thyroid function tests", "answer": "B. Cerebral angiography", "explanation": "The clinical picture is classic for a left third cranial nerve (CN III) palsy. The key features are: binocular diplopia (eyes misaligned), left eye deviated 'out and down' (due to unopposed action of lateral rectus and superior oblique), and pupillary involvement (mydriasis). In a diabetic patient, a 'medical' CN III palsy (often due to microvascular ischemia) typically spares the pupil. The presence of pupillary involvement ('surgical' pupil) is a red flag for a compressive lesion, such as a posterior communicating artery (PCOM) aneurysm, which is the most critical diagnosis to rule out. Cerebral angiography (CT or MR angiography) is the most relevant investigation to identify such an aneurysm. The Hirschberg test (C) is a simple exam to detect strabismus but does not rule out the underlying cause. Blood pressure (A) and thyroid tests (D) are less relevant to this acute, pupil-involving presentation.", "image_path": "" }, { "id": 34631, "date": "2026-02-19T10:02:53+00:00", "stem": "A Child with Hemophilia A. Without trauma he has a pain in his knee which started 30 mins ago. Knee is swollen and the movement is restricted. What is the first action in management?", "options": "A) Factor VI\nB) Factor VII\nC) Factor VIII\nD) Aspiration of the fluid", "answer": "C) Factor VIII", "explanation": "Hemophilia A is a deficiency of clotting factor VIII. The presentation describes a spontaneous acute hemarthrosis (bleeding into the joint), which is a common complication. The first and most urgent action in management is to administer the missing clotting factor (Factor VIII concentrate) to stop the bleeding, control pain, and prevent joint damage. This should be done as soon as possible, ideally within 2 hours of symptom onset. Aspiration of the joint (D) is generally contraindicated initially as it may introduce infection and is not necessary if factor replacement is prompt and effective. Factor VI (A) does not exist. Factor VII (B) is used in some bleeding disorders (e.g., Hemophilia with inhibitors) but is not the first-line replacement for Hemophilia A.", "image_path": "" }, { "id": 34636, "date": "2026-02-19T12:22:34+00:00", "stem": "A 19-year-old presents with abnormal LFTs, tremor, behavi
