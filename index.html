    <script>
        const questionsData = [{"id": 34160, "date": "2026-01-20T13:51:31+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A", "explanation": "### ✅ Correct Answer: A. Uterine rupture\n\n**Clinical Reasoning:**\nThe presentation is classic for uterine rupture. The patient is a multiparous woman (gravida 3 para 2), which is a risk factor. The key features are:\n1.  **Sudden, severe abdominal pain during labor:** A hallmark symptom.\n2.  **Abrupt cessation of contractions:** The uterus loses its ability to contract effectively after rupture.\n3.  **Hemodynamic instability (BP 92/58, P 124):** Indicates hypovolemic shock from intra-abdominal bleeding.\n4.  **Change in fetal station with presenting part no longer engaged:** The fetus or part of it may extrude from the uterine cavity into the abdomen, causing the presenting part to recede.\n5.  **Persistent fetal bradycardia:** Due to acute placental separation and compromised uteroplacental blood flow.\n6.  **Minimal vaginal bleeding:** Significant bleeding is often concealed intra-abdominally, making vaginal bleeding an unreliable sign. This combination of maternal shock, fetal distress, and loss of station is pathognomonic for uterine rupture in labor.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding and fetal bradycardia or decelerations **after rupture of membranes**, not with maternal shock, severe pain, or change in fetal station. The bleeding is fetal in origin.\n- **C. Amniotic fluid embolism**: Presents acutely with respiratory distress (dyspnea, hypoxia), cardiovascular collapse, and often coagulopathy (DIC). While it can cause fetal bradycardia, it does not typically cause a change in fetal station or cessation of contractions in the same way. The classic triad is hypoxia, hypotension, and coagulopathy.\n- **D. Placental abruption**: Presents with **painful**, tense uterus, often with **significant** dark vaginal bleeding. Fetal distress is common. However, contractions typically continue (may become hypertonic), and there is **no change in fetal station**.\n- **E. Cord prolapse**: Presents with **variable or prolonged decelerations or bradycardia** on fetal monitoring, often **after rupture of membranes**. A loop of cord may be palpable on vaginal exam. It does not cause maternal shock, severe abdominal pain, or cessation of contractions unless it leads to prolonged fetal compromise.\n\n### 📚 Relevant Guidelines\n- **RANZCOG Management of Uterine Rupture (Statement C-Obs 43)**: Provides diagnostic criteria and management guidelines for uterine rupture, including risk factors and the classic clinical presentation described. — https://ranzcog.edu.au/statements-guidelines/obstetrics/uterine-rupture-(c-obs-43)\n- **eTG (Therapeutic Guidelines) – Obstetrics Emergencies**: Covers the acute management of obstetric emergencies including uterine rupture, highlighting the need for immediate resuscitation and laparotomy. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate – Uterine Rupture: Unscarred and Scarred Uterus**: Details the epidemiology, risk factors, clinical presentation, diagnosis, and management of uterine rupture. — https://www.uptodate.com/contents/uterine-rupture-unscarred-and-scarred-uterus", "image_path": ""}, {"id": 34161, "date": "2026-01-20T13:52:26+00:00", "stem": "A 62-year-old woman with stage 4 chronic kidney disease presents to the emergency department with 3 days of progressive nausea and vomiting. She appears dehydrated and reports decreased urine output. Vital signs are BP, 90/55; P, 115; R, 24. Arterial blood gas shows pH 7.34, PCO2 38 mm Hg, and bicarbonate 20 mEq/L. Basic metabolic panel shows sodium 140 mEq/L, chloride 98 mEq/L, BUN 95 mg/dL, creatinine 4.5 mg/dL, and glucose 92 mg/dL. Albumin level is 3.0 g/dL. What is the correct interpretation of this patient's acid-base status?", "options": "A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis\nB. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\nC. Simple metabolic alkalosis with appropriate respiratory compensation\nD. Simple high anion gap metabolic acidosis with appropriate respiratory compensation\nE. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis", "answer": "B", "explanation": "### ✅ Correct Answer: B. Mixed disorder: high anion gap metabolic acidosis and metabolic alkalosis\n\n**Clinical Reasoning:**\nWe must analyze this step-by-step.\n1.  **Primary Disorder Identification:**\n    *   **Arterial Blood Gas (ABG):** pH 7.34 (acidemia), PaCO2 38 mm Hg (normal), HCO3- 20 mEq/L (low). This suggests a primary **metabolic acidosis**.\n    *   **Anion Gap Calculation:** Na - (Cl + HCO3) = 140 - (98 + 20) = **22 mEq/L** (normal ~8-12). This is a **high anion gap metabolic acidosis (HAGMA)**. In CKD, retained organic acids (sulfates, phosphates, urates) cause the elevated gap.\n2.  **Assessment of Compensation:**\n    *   **Winter's Formula:** For primary metabolic acidosis, expected PaCO2 = (1.5 x HCO3) + 8 ± 2.\n    *   Expected PaCO2 = (1.5 * 20) + 8 = 38 mm Hg. The measured PaCO2 is 38 mm Hg. This indicates **appropriate respiratory compensation**. There is no primary respiratory disorder.\n3.  **Delta-Delta / Gap-Gap Analysis:**\n    *   This checks for a hidden metabolic alkalosis. Delta Anion Gap = Measured AG - Normal AG (use 12) = 22 - 12 = **10**.\n    *   Delta Bicarbonate = Normal HCO3 (24) - Measured HCO3 (20) = **4**.\n    *   If Delta Gap ≈ Delta HCO3, it's a simple HAGMA. Here, Delta Gap (10) > Delta HCO3 (4). This difference of 6 suggests an **elevated bicarbonate** relative to the anion gap, indicating a **concurrent metabolic alkalosis**.\n4.  **Clinical Correlation:** The patient has vomiting (causing loss of gastric acid, leading to metabolic alkalosis) and dehydration/pre-renal state (which maintains the alkalosis by enhancing bicarbonate reabsorption). The underlying CKD provides the HAGMA. Therefore, this is a **mixed high anion gap metabolic acidosis and metabolic alkalosis**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Mixed disorder: high anion gap metabolic acidosis and respiratory acidosis**: Incorrect. The PaCO2 is 38 mm Hg, which is **exactly** what Winter's Formula predicts for compensation. There is no respiratory acidosis (which would require a PaCO2 > 40-42 mm Hg in this context).\n- **C. Simple metabolic alkalosis with appropriate respiratory compensation**: Incorrect. The pH is acidotic (7.34), not alkalotic. A simple metabolic alkalosis would have a pH >7.45. The low bicarbonate (20) also contradicts this.\n- **D. Simple high anion gap metabolic acidosis with appropriate respiratory compensation**: Incorrect. While the respiratory compensation is appropriate, the delta-delta analysis reveals a co-existing metabolic alkalosis, making it a mixed disorder, not a simple one.\n- **E. Mixed disorder: high anion gap metabolic acidosis and respiratory alkalosis**: Incorrect. Respiratory alkalosis would require a PaCO2 significantly **below** the value predicted by Winter's Formula (e.g., < 36 mm Hg). The PaCO2 of 38 mm Hg matches the expected compensation, ruling out a primary respiratory alkalosis.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) – Acid-base disorders**: Provides a structured approach to diagnosing simple and mixed acid-base disorders, including the use of anion gap and delta-delta calculations. — https://tgldcdp.tg.org.au/etgAccess\n- **UpToDate – Approach to the adult with metabolic acidosis**: Details the diagnostic steps, including anion gap calculation, Winter's formula, and delta-delta analysis to uncover mixed disorders. — https://www.uptodate.com/contents/approach-to-the-adult-with-metabolic-acidosis\n- **KDIGO Clinical Practice Guideline for Chronic Kidney Disease**: While focused on CKD management, it acknowledges that metabolic acidosis (often a normal anion gap/hyperchloremic type) is a common complication, and mixed disorders can occur with intercurrent illness. — https://kdigo.org/guidelines/ckd-evaluation-and-management/", "image_path": ""}, {"id": 34187, "date": "2026-01-22T12:46:55+00:00", "stem": "A 45-year-old male presented with sharp,burning, stabbing pain in the lateral aspect of the right foot.You suspect L5-S1 radiculopathy. Which of the following is lost in L5-S1 disc prolapse?", "options": "A. Knee jerk\nB. Dorsiflexion of big toe and foot\nC. Inversion of foot\nD. Eversion of foot\nE. Ankle jerk", "answer": "E. Ankle jerk", "explanation": "### ✅ Correct Answer: E. Ankle jerk\n\n**Clinical Reasoning:**\n- **Anatomy:** The L5-S1 disc prolapse typically compresses the **S1 nerve root**.\n- **S1 Nerve Root Function:**\n  - **Motor:** Supplies the gastrocnemius and soleus muscles (plantar flexion).\n  - **Sensory:** Supplies the lateral foot and sole (S1 dermatome).\n  - **Reflex:** Mediates the **ankle jerk (Achilles reflex)** via the S1 segment.\n- **Key Diagnostic Features:** L5-S1 disc herniation commonly presents with:\n  - Pain radiating down the posterior thigh and calf to the lateral foot (S1 dermatome).\n  - Weakness in plantar flexion (difficulty standing on tiptoes).\n  - **Loss of ankle jerk** is a classic objective sign of S1 radiculopathy.\n  - Numbness/paresthesia in the lateral foot.\n- **Why Not L5?** While the L5 root can also be affected (especially in large central herniations), the **lateral foot pain** described is classic for S1. The primary reflex lost at S1 is the ankle jerk.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Knee jerk**: Mediated by the L3-L4 nerve roots (patellar reflex). Not typically affected in L5-S1 pathology.\n- **B. Dorsiflexion of big toe and foot**: Primarily an L5 function (via tibialis anterior and extensor hallucis longus). While L5 can be involved, the question specifies L5-S1 disc prolapse, and the most consistent *loss* is the ankle jerk (S1). Dorsiflexion weakness is more specific to L5.\n- **C. Inversion of foot**: Primarily an L4 function (via tibialis posterior). Not a primary S1 function.\n- **D. Eversion of foot**: Primarily an L5/S1 function (via peroneus longus and brevis), but weakness is less consistent and not a reflex loss. The ankle jerk is a more reliable and tested sign for S1 involvement.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Management of lumbar radiculopathy]**: Provides Australian primary care guidance on assessment and red flags for lumbar disc herniation and radiculopathy. — https://www.racgp.org.au/afp/2016/januaryfebruary/radiculopathy/\n- **[Therapeutic Guidelines (eTG) - Neurological]**: Details the clinical features, diagnosis, and management of lumbar disc prolapse and radiculopathy. — https://tgldcdp.tg.org.au/etgAccess\n- **[UpToDate - Lumbar spinal stenosis: Pathophysiology, clinical features, and diagnosis]**: Comprehensive review of nerve root anatomy and clinical correlates. — https://www.uptodate.com/contents/lumbar-spinal-stenosis-pathophysiology-clinical-features-and-diagnosis", "image_path": ""}, {"id": 34188, "date": "2026-01-22T12:56:19+00:00", "stem": "After a left elbow injury, a 55-year-old man develops weakness of the long flexors of the right thumb and index finger. He is also unable to do forearm pronation on the same side. Which one of the nerves is involved?", "options": "A. Radial nerve\nB. Median nerve\nC. Anterior interosseous nerve\nD. Posterior interosseous nerve\nE. Ulnar nerve", "answer": "C. Anterior interosseous nerve", "explanation": "### ✅ Correct Answer: C. Anterior interosseous nerve\n\n**Clinical Reasoning:**\n- **Anatomy:** The **Anterior Interosseous Nerve (AIN)** is a pure motor branch of the **median nerve** that arises in the forearm.\n- **Functions of the AIN:**\n  - **Flexor pollicis longus (FPL)**: Flexes the interphalangeal joint of the thumb.\n  - **Flexor digitorum profundus (FDP)** to the index (and sometimes middle) finger: Flexes the distal interphalangeal joints.\n  - **Pronator quadratus**: The primary muscle for forearm pronation when the elbow is flexed.\n- **Clinical Presentation (AIN Syndrome):**\n  - **Weakness of pinch grip:** Inability to form an \"OK\" sign due to lack of thumb IP and index finger DIP flexion (FPL and FDP weakness).\n  - **Weakness of forearm pronation:** Especially with the elbow flexed (isolates pronator quadratus).\n  - **NO sensory loss:** The AIN is a pure motor nerve.\n- **Mechanism:** Trauma or compression near the elbow (e.g., supracondylar fracture, forearm deep laceration) can injure the AIN.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Radial nerve**: Injury causes wrist drop (weakness of wrist and finger extensors) and sensory loss over the dorsal hand. It does not affect thumb/index flexion or pronation.\n- **B. Median nerve (main trunk)**: A proximal median nerve injury would cause weakness of the AIN muscles PLUS thenar eminence weakness (opponens pollicis, abductor pollicis brevis) and sensory loss over the palmar aspect of the thumb, index, middle, and radial half of the ring finger. The case describes isolated AIN palsy.\n- **D. Posterior interosseous nerve**: A branch of the radial nerve. Injury causes weakness of finger and thumb extension, and wrist extension with radial deviation (extensor carpi ulnaris weakness). No effect on flexion or pronation.\n- **E. Ulnar nerve**: Injury causes claw hand deformity, weakness of finger abduction/adduction, Froment's sign, and sensory loss over the little finger and ulnar half of the ring finger. It does not innervate the muscles described.\n\n### 📚 Relevant Guidelines\n- **[eTG - Neurological]**: Covers the diagnosis and management of peripheral nerve injuries. — https://tgldcdp.tg.org.au/etgAccess\n- **[UpToDate - Anterior interosseous neuropathy]**: Detailed review of AIN anatomy, etiology, and clinical features. — https://www.uptodate.com/contents/anterior-interosseous-neuropathy\n- **[American Academy of Orthopaedic Surgeons (AAOS) - Nerve Injuries About the Elbow]**: Provides clinical examination pearls for differentiating elbow-level nerve injuries. — https://www.aaos.org/", "image_path": ""}, {"id": 34189, "date": "2026-01-22T12:57:17+00:00", "stem": "You are working as a resident medical officer at a local children hospital in Adelaide. You are seeing a 1-week old baby for complete neonatal examination. All the physical examination is unremarkable except the following findings:\n\n– The knees were at different heights when the hips and knees were flexed.\n\n– Asymmetric skin folds and limited abduction of the affected hip were also seen.\n\nWhat is the most likely diagnosis?", "options": "A. Osgood -Schlatter disease\nB. Slipped capital femoral epiphysis\nC. Developmental dysplasia of the hip\nD. Femoral head fracture\nE. Legg-Calve-Perthes disease", "answer": "C. Developmental dysplasia of the hip", "explanation": "### ✅ Correct Answer: C. Developmental dysplasia of the hip\n\n**Clinical Reasoning:**\n- **Definition:** Developmental Dysplasia of the Hip (DDH) encompasses a spectrum of abnormal development of the hip joint, from instability to complete dislocation, present from birth or developing in early infancy.\n- **Key Examination Findings in a Neonate (1-week-old):**\n  - **Galeazzi Sign (Allis Sign):** \"The knees were at different heights when the hips and knees were flexed.\" This indicates apparent shortening of the femur on the affected side due to posterior displacement of the femoral head.\n  - **Asymmetric Skin Folds:** Asymmetric gluteal or thigh folds due to the displaced femoral head.\n  - **Limited Abduction:** \"Limited abduction of the affected hip\" is a classic sign of DDH, especially in unilateral cases. Abduction is restricted due to adductor tightness and the dislocated position.\n  - **Barlow and Ortolani maneuvers** are the primary provocative tests for instability in newborns but may be negative in a fixed dislocation.\n- **Epidemiology & Screening:** DDH is a classic target of newborn and 6-8 week infant screening in Australia. Risk factors include breech presentation, family history, and female sex.\n- **Why This Fits:** The triad of findings (Galeazzi sign, asymmetric folds, limited abduction) in a **1-week-old** is classic for DDH. The other options present in older children.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Osgood-Schlatter disease**: An overuse injury causing apophysitis of the tibial tubercle in **adolescents** (typically 10-15 years old). Presents with anterior knee pain and tenderness. Not seen in neonates.\n- **B. Slipped capital femoral epiphysis (SCFE)**: A disorder of the **adolescent** hip (typically 10-16 years old, often obese) where the femoral head epiphysis displaces posteriorly. Presents with pain and limping. Not a neonatal condition.\n- **D. Femoral head fracture**: An acute traumatic injury, highly unlikely in a 1-week-old without a clear history of significant trauma (e.g., birth injury, which is rare). Would present with severe pain, swelling, and pseudoparalysis.\n- **E. Legg-Calve-Perthes disease**: Idiopathic avascular necrosis of the femoral head occurring in **children** (typically 4-8 years old). Presents with a painless limp or hip/knee pain. Not a neonatal condition.\n\n### 📚 Relevant Guidelines\n- **[RACGP - Developmental dysplasia of the hip: Early detection in infants]**: Australian guidelines for GP screening and referral. — https://www.racgp.org.au/afp/2013/september/developmental-dysplasia-of-the-hip\n- **[Paediatric Society of New Zealand - Guidelines for Developmental Dysplasia of the Hip]**: Evidence-based guidelines for detection and management, widely referenced in Australasia. — https://www.paediatrics.org.nz/assets/Guidelines/DDH-Guideline.pdf\n- **[Royal Children's Hospital Melbourne - Clinical Practice Guideline: Developmental Dysplasia of the Hip]**: Practical assessment and management guide. — https://www.rch.org.au/clinicalguide/guideline_index/Developmental_dysplasia_of_the_hip/", "image_path": ""}, {"id": 34190, "date": "2026-01-22T12:57:37+00:00", "stem": "Three months ago you started Mary, aged 73, on residronate 35mg weekly, after she was diagnosed with osteoporosis confirmed with bone mineral density (BMD). Her presenting symptom at that time was back pain. Examination revealed height decrease and mild kyphosis, as well as tenderness over thoracic vertebrae. Despite being on residronate, not only did her symptoms persist, she also developed pain over new areas of her thoracic. Investigations have established new osteoporotic fractures. Which one of the following would be the most appropriate management option for her?", "options": "A. Continue residronate at the same dose\nB. Switch to alendronate\nC. Increase the dose of residronate\nD. Switch to zoledronic acid\nE. Switch to teriparatide", "answer": "E. Switch to teriparatide", "explanation": "### ✅ Correct Answer: E. Switch to teriparatide\n\n**Clinical Reasoning:**\n- **Scenario:** This patient has **severe osteoporosis with incident fractures** (new vertebral fractures) **while on oral bisphosphonate therapy** (risedronate). This defines **treatment failure**.\n- **Pathophysiology:** Bisphosphonates (like risedronate, alendronate, zoledronic acid) are **antiresorptive** agents. They slow bone loss but have limited ability to stimulate new bone formation.\n- **Teriparatide (recombinant PTH 1-34):**\n  - Is an **anabolic** agent. It stimulates osteoblast activity, increases bone formation, and significantly improves bone density and strength.\n  - **Indication:** First-line for patients with **severe osteoporosis (multiple fractures, very low BMD)** or, crucially, **those who fracture while on antiresorptive therapy**.\n  - **Australian PBS Criteria:** Subsidised for severe osteoporosis with fractures despite prior therapy.\n- **Why Other Bisphosphonates Are Not Best:** Switching to another bisphosphonate (alendronate or IV zoledronic acid) is still an antiresorptive strategy and is less likely to be effective after a clear failure on the same class. An anabolic agent is the logical next step.\n- **Management Pearls:**\n  - Treatment is usually for 18-24 months, followed by an antiresorptive (e.g., a bisphosphonate) to maintain gains.\n  - Ensure adequate calcium and vitamin D intake.\n  - Investigate for secondary causes of osteoporosis if not already done.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Continue residronate at the same dose**: The patient has had **new fractures** on this therapy, indicating it is insufficient. Continuing unchanged is inappropriate.\n- **B. Switch to alendronate**: Alendronate is another oral bisphosphonate with a similar mechanism of action. Switching within the same drug class after a treatment failure is not the optimal strategy when a more potent anabolic agent is available and indicated.\n- **C. Increase the dose of residronate**: Standard weekly dosing (35mg) is the approved therapeutic dose for osteoporosis. There is no evidence that increasing the dose improves efficacy in this scenario, and it may increase side effects (e.g., GI upset).\n- **D. Switch to zoledronic acid**: While zoledronic acid (IV yearly) is a more potent bisphosphonate and may be used in patients intolerant of oral bisphosphonates, it is still an **antiresorptive**. In a patient who has fractured on an oral bisphosphonate, guidelines favour moving to an anabolic agent like teriparatide.\n\n### 📚 Relevant Guidelines\n- **[Therapeutic Guidelines (eTG) - Osteoporosis]**: Australian guidelines on the pharmacological management of osteoporosis, including treatment failure. — https://tgldcdp.tg.org.au/etgAccess\n- **[Royal Australian College of General Practitioners (RACGP) - Osteoporosis prevention, diagnosis and management in postmenopausal women and men over 50 years of age]**: Comprehensive Australian guideline. — https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/osteoporosis\n- **[Endocrine Society of Australia - Position Statement: Management of Osteoporosis]**: Provides detailed guidance on the use of anabolic vs. antiresorptive agents. — https://www.endocrinesociety.org.au/", "image_path": ""}, {"id": 34211, "date": "2026-01-23T13:24:33+00:00", "stem": "A 32-year-old woman is brought to the hospital due to sudden-onset left-sided weakness. According to the family, she has had fatigue, malaise, and decreased appetite over the last several weeks. She attributed these symptoms to a “viral infection” and treated herself with over-the-counter acetaminophen. Her temperature is 37.4 C (99.4 F), blood pressure is 140/86 mm Hg, and pulse is 82/min. The patient appears confused and agitated. Lungs are clear to auscultation. A 2/6 holosystolic murmur is heard at the cardiac apex. Extremity examination reveals left-sided muscle strength is 1/5 with hyperactive deep tendon reflexes. Babinski sign is present on the left side. Laboratory results are as follows:\n\nHemoglobin 10.2 g/dL\nPlatelets 64,000/mm3\nLeukocytes 6,800/mm3\nBlood urea nitrogen 18 mg/dL\nCreatinine 70 umol/L\nAntinuclear antibody (ANA) positive\nRapid plasma reagin (RPR) positive\nCerebrospinal fluid cell counts are normal, and cultures are negative. Which of the following is the most likely diagnosis in this patient?", "options": "A. Antiphospholipid syndrome\nB. Multiple sclerosis\nC. Neurosyphilis\nD. Polyarteritis nodosa\nE. Rheumatic fever", "answer": "C. Neurosyphilis", "explanation": "### ✅ Correct Answer: C. Neurosyphilis\n\n**Clinical Reasoning:**\n1.  **Key Presentation:** The patient presents with acute focal neurological deficits (left-sided weakness, hyperreflexia, Babinski sign) consistent with a stroke-like event. This is a classic presentation of **meningovascular syphilis**, a form of neurosyphilis where *Treponema pallidum* causes an endarteritis obliterans, leading to ischemic stroke, particularly in young adults.\n2.  **Supporting Systemic Symptoms:** The preceding weeks of fatigue, malaise, and decreased appetite align with the secondary stage of syphilis. The low-grade fever is also common.\n3.  **Cardiac Finding:** The apical holosystolic murmur is highly suggestive of **mitral regurgitation**. In the context of syphilis, this could indicate **syphilitic aortitis** with aortic root dilation, leading to aortic valve regurgitation. While the murmur is described as apical (mitral), the description \"holosystolic\" is the key feature; aortic regurgitation is typically diastolic. However, syphilitic cardiovascular disease is a well-known complication of tertiary syphilis and supports the diagnosis.\n4.  **Laboratory Findings:**\n    *   **Positive RPR:** This is a non-treponemal screening test for syphilis. A positive result is the most direct laboratory evidence supporting the diagnosis.\n    *   **Positive ANA:** This can be a false positive, which is a known phenomenon in syphilis (\"biologic false positive\"). It should not automatically steer the diagnosis toward primary autoimmune conditions like SLE or APS.\n    *   **Mild Anemia & Thrombocytopenia:** These can be seen in chronic infections like syphilis.\n    *   **Normal CSF:** In meningovascular syphilis, the CSF may be normal or show only mild lymphocytic pleocytosis and elevated protein. A normal CSF does **not** rule out neurosyphilis, especially the vascular form.\n5.  **Pathophysiology:** *Treponema pallidum* invades the central nervous system early. In meningovascular syphilis, it causes inflammation of the medium and large vessels (Heubner arteritis), leading to thrombosis and infarction. This explains the sudden-onset focal deficit.\n\n**Management Pearl for AMC:** Any young adult (<50) presenting with a stroke must have syphilis (RPR/VDRL) ruled out as a potential cause. Neurosyphilis is a treatable cause of stroke with penicillin G.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Antiphospholipid syndrome (APS):** While APS causes hypercoagulability and stroke in young patients, it is not associated with a positive RPR or a holosystolic murmur from valvular disease (Libman-Sacks endocarditis in APS is typically sterile and non-valvular-destroying). The positive RPR is the key differentiating factor.\n- **B. Multiple sclerosis (MS):** MS typically presents with relapsing-remitting neurological symptoms (e.g., optic neuritis, sensory deficits, internuclear ophthalmoplegia) over time, not with a single, sudden, severe stroke-like hemiparesis. It is not associated with positive serology (RPR) or cardiac murmurs.\n- **D. Polyarteritis nodosa (PAN):** PAN is a vasculitis affecting medium-sized arteries and can cause neurological symptoms (mononeuritis multiplex) and stroke. However, it is strongly associated with **Hepatitis B virus** infection, not syphilis. It would not explain the positive RPR. Classic PAN also spares the lungs, but renal involvement (hypertension, renal failure) is common, which is not prominent here.\n- **E. Rheumatic fever:** This is a post-streptococcal condition characterized by **migratory polyarthritis**, carditis (which could cause a murmur), chorea, erythema marginatum, and subcutaneous nodules. It does not cause focal neurological stroke or positive syphilis serology. The neurological manifestation of rheumatic fever is Sydenham's chorea, not acute hemiparesis.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) — Syphilis**: Provides comprehensive diagnosis and management guidelines for all stages of syphilis, including neurosyphilis and its treatment with penicillin. — https://tgldcdp.tg.org.au/viewTopic?topicfile=syphilis\n- **Australian STI Management Guidelines (ASHM)**: Contains detailed, up-to-date recommendations on the diagnosis, investigation (including CSF analysis in neurosyphilis), and treatment of syphilis. — https://sti.guidelines.org.au/sexually-transmissible-infections/syphilis/\n- **UpToDate — Meningovascular Syphilis**: A reliable clinical resource detailing the clinical features, diagnosis, and treatment of meningovascular syphilis, emphasizing its presentation as a stroke syndrome. — https://www.uptodate.com/contents/meningovascular-syphilis", "image_path": ""}, {"id": 34248, "date": "2026-01-26T09:42:53+00:00", "stem": "Identify the nerve injury based on the clinical description.", "options": "A. Wrist drop\nB. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger\nC. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\nD. Branch of radial nerve, purely motor; for wrist, finger and thumb extension\nE. Injury causes claw hand, decreased finger abduction and sensory loss of little finger", "answer": "C", "explanation": "### ✅ Correct Answer: C. Branch of median nerve which is purely motor, injury = can't make OK sign and weak pronation\n\nThe description matches an injury to the **Anterior Interosseous Nerve (AIN)**, a purely motor branch of the median nerve. The 'OK sign' (making a circle with the thumb and index finger) tests the function of the flexor pollicis longus (FPL) and flexor digitorum profundus (FDP) to the index finger, both innervated by the AIN. Weakness of pronation occurs due to involvement of the pronator quadratus. This injury spares sensation, distinguishing it from a main median nerve lesion.\n\n**Key Clinical Reasoning:**\n- **Anatomy:** The AIN arises from the median nerve in the forearm, supplying FPL, FDP to index/middle fingers, and pronator quadratus.\n- **Examination:** The 'pinch test' or inability to make the 'OK sign' is pathognomonic. Patient forms a flattened pinch instead of a circle.\n- **Common Causes:** Trauma (e.g., forearm fractures), compression (e.g., deep forearm masses), or Parsonage-Turner syndrome (neuralgic amyotrophy).\n- **Management:** Initial conservative management (splinting, physiotherapy). Surgical exploration/decompression considered if no improvement after 3-6 months or if due to a compressive lesion.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Wrist drop**: This is classic for **radial nerve injury** (e.g., Saturday night palsy, humeral shaft fracture). It affects wrist, finger, and thumb extensors. The description in option C is purely motor but involves median-innervated forearm flexors, not extensors.\n- **B. Inability to do thumb opposition as well as loss of sensation on digits starting from medial area to medial half of ring finger**: This describes a **main median nerve injury at the wrist** (e.g., carpal tunnel syndrome). Thumb opposition is lost due to thenar muscle (recurrent branch of median) involvement. The sensory loss pattern (palmar aspect of thumb, index, middle, and lateral half of ring finger) is classic. Option C describes a purely motor deficit with no sensory loss.\n- **D. Branch of radial nerve, purely motor; for wrist, finger and thumb extension**: This describes the **Posterior Interosseous Nerve (PIN)**, a motor branch of the radial nerve. Injury causes finger and thumb extension weakness but **spares wrist extension** (radial nerve proper innervates extensor carpi radialis longus/brevis). This results in 'finger drop,' not the 'OK sign' impairment.\n- **E. Injury causes claw hand, decreased finger abduction and sensory loss of little finger**: This is classic for **ulnar nerve injury** (e.g., at the elbow - cubital tunnel). The 'clawing' (hyperextension at MCPJs, flexion at PIPJs/DIPJs) is due to loss of intrinsic muscle function (lumbricals to ring/little, interossei). Sensory loss involves the little finger and medial half of ring finger. This is a mixed motor-sensory deficit, unlike the purely motor AIN injury.\n\n### 📚 Relevant Guidelines\n- **[eTG complete - Neurology]**: Provides detailed assessment and management of peripheral nerve injuries, including median nerve branches. — https://tgldcdp.tg.org.au/viewTopic?topicfile=peripheral-nerve-disorders\n- **[American Academy of Neurology (AAN) - Practice Parameter for Carpal Tunnel Syndrome]**: While focused on CTS, it provides excellent background on median nerve anatomy and differential diagnoses for its various injuries. — https://www.aan.com/Guidelines/home/GuidelineDetail/583\n- **[UpToDate - Anterior interosseous neuropathy]**: Comprehensive review of etiology, clinical features, diagnosis, and treatment of AIN syndrome. — https://www.uptodate.com/contents/anterior-interosseous-neuropathy", "image_path": ""}, {"id": 34282, "date": "2026-01-29T06:43:15+00:00", "stem": "A 34-year-old multigravida presents for prenatal care in the second trimester. She admits to a past history of substance abuse but states she has been clean for 6 months. With her second pregnancy she experienced a preterm delivery at 34 weeks' gestation of a male neonate who died within the first day of life. She states that at delivery the baby was swollen with skin lesions and that the placenta was very large. She was treated with antibiotics but she does not remember the name or other details. On a routine prenatal panel with this current pregnancy she is found to have a positive VDRL (Venereal Disease Research Laboratory) test. What is the recommended mode of delivery?", "options": "a. Vaginal\nb. Cesarean\nc. Forcep assisted\nd. Vacuum assisted", "answer": "a. Vaginal", "explanation": "### ✅ Correct Answer: a. Vaginal\n\n**Clinical Reasoning:**\n1.  **Diagnosis:** The patient has a positive VDRL test, indicating syphilis. The history of a previous pregnancy with a stillborn, hydropic (swollen) neonate with skin lesions and a large placenta is classic for **congenital syphilis**. This confirms she has had untreated syphilis in the past.\n2.  **Key Principle:** The mode of delivery for a pregnant patient with syphilis is **NOT altered by the infection itself**. Syphilis is a systemic spirochetal infection (*Treponema pallidum*) transmitted transplacentally to the fetus, not via the birth canal during delivery. Transmission risk depends on the stage of maternal infection and duration of fetal exposure, not the route of delivery.\n3.  **Management Priority:** The critical intervention is **immediate maternal treatment** to prevent transmission to the current fetus. The recommended regimen for syphilis in pregnancy is **Penicillin G** (Benzathine penicillin G for early syphilis; often a more intensive regimen for late latent or tertiary syphilis, especially with a history of a poor obstetric outcome). Treatment is effective at preventing congenital syphilis, especially if initiated before the third trimester.\n4.  **Delivery Planning:** There is no indication for Cesarean section solely for maternal syphilis. The decision for mode of delivery should be based on standard obstetric indications (e.g., fetal distress, failure to progress, placenta previa). Therefore, vaginal delivery is the recommended and expected mode.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Cesarean**: Cesarean section is not indicated for preventing transmission of syphilis. It is reserved for standard obstetric indications. Performing a Cesarean for this reason alone would be an unnecessary surgical procedure with associated risks.\n- **c. Forcep assisted**: Forceps-assisted delivery is an operative vaginal delivery used for specific indications during the second stage of labor (e.g., prolonged second stage, maternal exhaustion, certain fetal heart rate patterns). It is not a primary mode of delivery dictated by maternal syphilis.\n- **d. Vacuum assisted**: Similar to forceps, vacuum-assisted delivery is an operative vaginal delivery for specific intrapartum indications. It is not the recommended *mode of delivery* for a patient with syphilis; the recommendation is for vaginal delivery, with operative assistance only if needed for other reasons.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines (eTG) – Syphilis**: Provides the Australian standard for diagnosis, staging, and treatment of syphilis, including specific regimens for pregnant patients. — https://tgldcdp.tg.org.au/viewTopic?topicfile=syphilis\n- **Royal Australian and New Zealand College of Obstetricians and Gynaecologists (RANZCOG) – Prenatal Screening for Syphilis**: Outlines the importance of screening and management in pregnancy to prevent congenital syphilis. — https://ranzcog.edu.au/womens-health/patient-information-resources/syphilis-in-pregnancy\n- **Australian STI Management Guidelines (ASHM) – Syphilis**: Comprehensive guidelines for the public health and clinical management of syphilis, including in pregnancy. — https://www.sti.guidelines.org.au/sexually-transmissible-infections/syphilis/", "image_path": ""}, {"id": 34283, "date": "2026-01-29T06:44:14+00:00", "stem": "A 58-year-old man presents with complaint of progressive difficulty in walking for the past few months. He denies any pain or pins and needles. On examinations, he drags his left foot while walking. On the left side, ankle tendon reflexes are exaggerated, the strength of plantar flexion and dorsifiexion are decreased and are 4/5. Sensation is intact. The right foot is completely normal. Plantar reflexes are equivocal bilaterally. The rest of physical examination including neurologic exam of the face and upper extremities are unremarkable. Lesions of which one of the following parts could be the mostly likely cause to this presentation?", "options": "A. Common peroneal nerve\nB. LS/S1 nerve root\nC. Cervical spine\nD. Brainstem\nE. Cerebral cortex", "answer": "E. Cerebral cortex", "explanation": "### ✅ Correct Answer: E. Cerebral cortex\n\n**Clinical Reasoning:**\n1.  **Localising the Deficit:** The patient has a unilateral (left-sided) motor deficit affecting the lower limb (foot drop, weakness of ankle movements) with **exaggerated (hyperreflexic) ankle jerks** and **equivocal plantar responses**. Sensation is intact.\n2.  **Upper Motor Neuron (UMN) vs. Lower Motor Neuron (LMN):**\n    *   **Weakness + Hyperreflexia + (Equivocal) Plantars = UMN Pattern.** This rules out peripheral nerve or nerve root lesions (LMN signs), which cause weakness with *areflexia/hyporeflexia* and often sensory loss and pain.\n    *   **Intact sensation** further argues against a primary lesion in the nerve root (which would affect a specific dermatome) or peripheral nerve (specific sensory distribution).\n3.  **Anatomical Localisation within the UMN Pathway:** The UMN pathway descends from the cerebral cortex through the internal capsule, brainstem, and spinal cord.\n    *   **Brainstem (D)**: A brainstem lesion (e.g., stroke) typically causes \"crossed signs\" – ipsilateral cranial nerve deficits and contralateral body weakness. The face and upper limbs are normal here, making this less likely.\n    *   **Cervical Spine (C)**: A cervical cord lesion affecting the corticospinal tract would cause UMN signs **below the level of the lesion**. However, it would typically affect *both* lower limbs (spastic paraparesis) or possibly one entire side (Brown-Séquard syndrome, which includes *ipsilateral* UMN weakness and *contralateral* pain/temperature loss). A pure, unilateral leg weakness is an unusual presentation for a cervical lesion without arm or sensory findings.\n    *   **Cerebral Cortex (E)**: A lesion in the **primary motor cortex** (precentral gyrus), specifically in the medial (parasagittal) area that controls the lower limb, can cause a **contralateral** monoplegia (weakness of one limb) with UMN signs. This fits perfectly: isolated left foot/leg weakness, UMN signs, no sensory or cranial nerve involvement. The equivocal plantars may be an early sign of a Babinski response. This is a classic presentation for a **small cortical infarct or tumour** affecting the leg area of the motor homunculus.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Common peroneal nerve**: A common peroneal nerve palsy causes foot drop and weakness of ankle dorsiflexion/eversion, but it is an **LMN lesion**. Findings would include *decreased/absent ankle reflex*, *sensory loss* over the dorsum of the foot and lateral calf, and often *flaccid weakness*. The presence of hyperreflexia rules this out.\n- **B. L5/S1 nerve root**: An L5 or S1 radiculopathy (e.g., from a herniated disc) causes **LMN signs** in a myotomal distribution. L5 root affects ankle dorsiflexion; S1 affects plantar flexion. It is almost always associated with **pain** (sciatica), **sensory symptoms** (numbness in specific dermatome), and **depressed reflexes** (S1 affects ankle jerk). The absence of pain, intact sensation, and hyperreflexia are incompatible.\n- **C. Cervical spine**: As above, a cervical cord lesion severe enough to cause leg weakness would almost invariably affect other tracts. A pure, unilateral leg monoplegia is highly atypical. It would more likely cause spastic paraparesis or hemiparesis including the arm.\n- **D. Brainstem**: Brainstem lesions affect cranial nerve nuclei and long tracts. The absence of any cranial nerve findings (diplopia, facial weakness, dysarthria, dysphagia) or sensory findings makes a brainstem lesion unlikely to present with an isolated foot drop.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation (Australia) – Clinical Guidelines for Stroke Management**: Provides guidance on the diagnosis and management of stroke, including cortical strokes presenting with focal neurological deficits like monoplegia. — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **UpToDate – Overview of the Clinical Manifestations of Stroke**: Details the localisation of neurological deficits, including cortical vs. subcortical stroke syndromes. — https://www.uptodate.com/contents/overview-of-the-clinical-manifestation-and-diagnosis-of-stroke-in-adults\n- **Neurological Society of Australasia**: Resources on the approach to localising neurological lesions. — https://www.neurology.org.au/", "image_path": ""}, {"id": 34319, "date": "2026-02-01T10:18:47+00:00", "stem": "A 62-year-old woman comes to the office due to upper extremity weakness and numbness. Three days ago, the patient was involved in a motor vehicle collision in which a truck rear-ended her vehicle. The patient did not hit her head or lose consciousness but experienced a tingling and burning sensation in all extremities, which she attributed to the stress of the accident. Since then, she has had numbness in her upper extremities and clumsiness of her hands. She reports difficulty picking up objects but has had no leg weakness or bowel or bladder disturbance. The patient is upset that the other driver refused to accept fault but reports no other ongoing stressors. She has a history of hypertension and osteoarthritis. Vital signs are within normal limits. Neck and back examination show no deformity or tenderness. There is weakness of hand grip bilaterally, and the triceps reflex is decreased on both sides. Decreased pinprick sensation is present on the fingers. The remainder of the neurologic examination is normal. Cervical spine x-ray reveals no vertebral dislocation or fracture, but diffuse spondylotic changes are present. Which of the following is the most likely cause of this patient’s symptoms?", "options": "A. Acute stress disorder\nB. Brachial plexus injury\nC. Malingering\nD. Postconcussion syndrome\nE. Spinal cord injury", "answer": "E. Spinal cord injury", "explanation": "### ✅ Correct Answer: E. Spinal cord injury\nThis patient presents with a **central cord syndrome**, a classic incomplete spinal cord injury, most commonly resulting from hyperextension injury in an older individual with pre-existing cervical spondylosis (as seen on x-ray). The mechanism (rear-end MVA causing hyperextension) is classic. The clinical findings—**bilateral upper extremity weakness and sensory loss (especially hands), with preserved lower extremity function and no bowel/bladder involvement**—are hallmark features. Weakness is more pronounced in the upper limbs (especially hands) than lower limbs due to the somatotopic arrangement of the corticospinal tract (cervical fibers are more central). Decreased triceps reflex (C7) and hand grip weakness localize to the cervical cord. The absence of fracture/dislocation on x-ray does not rule out spinal cord injury; in older patients with spinal stenosis, even minor trauma can cause cord compression. This is a **non-contiguous, central spinal cord injury**.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Acute stress disorder**: While the patient experienced stress, her symptoms are focal neurological deficits (weakness, numbness, decreased reflexes) with a clear anatomical distribution (C7-T1 dermatomes/myotomes), not consistent with the diffuse anxiety, re-experiencing, and avoidance seen in acute stress disorder.\n- **B. Brachial plexus injury**: Typically presents with unilateral weakness and sensory loss in a peripheral nerve/plexus pattern (e.g., Erb's or Klumpke's palsy). This patient has **bilateral** symptoms with a clear spinal level (triceps reflex loss points to C7 root/cord level), which is more consistent with a central cord lesion than a peripheral plexus injury.\n- **C. Malingering**: There is no secondary gain suggested (the other driver already refused fault), and the physical exam findings (decreased reflexes, objective weakness) are not easily feigned. The consistency with a known clinical syndrome (central cord) makes organic pathology far more likely.\n- **D. Postconcussion syndrome**: Requires a history of traumatic brain injury or concussion. The patient specifically did **not** hit her head or lose consciousness. Symptoms are purely motor/sensory, not cognitive (headache, dizziness, confusion, etc.).\n\n### 📚 Relevant Guidelines\n- **NICE Guideline [NG41] - Spinal injury: assessment and initial management**: Provides clear pathways for assessment of spinal cord injury after trauma, including recognition of central cord syndrome. — https://www.nice.org.uk/guidance/ng41\n- **UpToDate - Central cord syndrome**: Detailed review of pathophysiology, clinical features, and management of this specific incomplete spinal cord injury. — https://www.uptodate.com/contents/central-cord-syndrome\n- **Therapeutic Guidelines (eTG) - Neurological trauma**: Australian guidelines for the initial assessment and management of spinal injuries. — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34320, "date": "2026-02-01T10:20:36+00:00", "stem": "A newborn is delivered vaginally at term. The baby breathes quietly during sleep but develops loud noisy breathing when awake or crying. Physical examination is otherwise normal, and oxygen saturation is stable. What is the most likely diagnosis?", "options": "a. Subglottic stenosis\nb. Vocal cord paralysis\nc. Tracheomalacia\nd. Laryngomalacia\ne. Choanal atresia", "answer": "d. Laryngomalacia", "explanation": "### ✅ Correct Answer: d. Laryngomalacia\nLaryngomalacia is the **most common congenital laryngeal anomaly** and the most frequent cause of stridor in infants. The key diagnostic clue is **inspiratory stridor that worsens with agitation, crying, or feeding, and improves when the baby is calm, supine, or asleep**. This occurs due to the floppy, immature epiglottis and arytenoid cartilages that collapse inward during inspiration, especially when negative intrathoracic pressure increases (e.g., with crying). The condition is often benign, self-resolving by 12-24 months, and associated with normal oxygen saturation unless severe. The absence of cyanosis or distress points to a mild, classic presentation.\n\n### ❌ Why the Other Options Are Wrong\n- **a. Subglottic stenosis**: Typically presents with **biphasic** or expiratory stridor, often persistent and may be associated with a history of prolonged intubation. It does not typically improve significantly with sleep/quiet breathing.\n- **b. Vocal cord paralysis**: Usually presents with a **weak cry, biphasic stridor, and may be associated with aspiration**. It is often unilateral and does not characteristically improve with sleep; it may be linked to birth trauma or neurological conditions.\n- **c. Tracheomalacia**: Causes **expiratory stridor or wheeze** (collapsing during expiration), often exacerbated by agitation but not typically quiet during sleep in the same way. It's commonly associated with vascular rings or chronic lung disease.\n- **e. Choanal atresia**: Presents with **severe respiratory distress at birth** because newborns are obligate nasal breathers. It causes **cyanosis that improves with crying** (when the mouth opens), which is the opposite pattern described here (stridor with crying, quiet when calm).\n\n### 📚 Relevant Guidelines\n- **RACP - Position Statement on Infant Airway Health**: Discusses assessment and management of congenital airway abnormalities including laryngomalacia. — https://www.racp.edu.au/docs/default-source/advocacy-library/position-statement-infant-airway-health.pdf\n- **UpToDate - Laryngomalacia: Disease characteristics and evaluation**: Comprehensive review of pathophysiology, clinical features, and natural history. — https://www.uptodate.com/contents/laryngomalacia\n- **American Academy of Pediatrics - Clinical Practice Guideline: Diagnosis and Management of Childhood Obstructive Sleep Apnea Syndrome**: Includes differential for noisy breathing in infants. — https://pediatrics.aappublications.org/content/130/3/576", "image_path": ""}, {"id": 34331, "date": "2026-02-02T11:20:12+00:00", "stem": "A 26-year-old nulliparous woman at 8 weeks' gestation presents to the emergency department with a 2-week history of persistent nausea and vomiting. She reports being unable to keep down fluids or food for the past 24 hours. On examination, she appears dehydrated and malnourished. Her weight has decreased from 65 kg to 61 kg since her last prenatal visit 3 weeks ago. Initial laboratory results show metabolic alkalosis and ketonuria. After administering diphenhydramine and initiating IV fluid resuscitation with normal saline, the decision is made to add dextrose-containing solution for metabolic support. What should be administered immediately prior to the dextrose infusion?", "options": "A. Ondansetron\nB. Methylprednisolone\nC. Folic acid\nD. Potassium chloride\nE. Thiamine", "answer": "E. Thiamine", "explanation": "### ✅ Correct Answer: E. Thiamine\nThiamine (vitamin B1) must be administered before dextrose-containing solutions in this patient with hyperemesis gravidarum to prevent precipitating Wernicke encephalopathy. The patient has classic features of severe hyperemesis gravidarum: persistent nausea/vomiting at 8 weeks, inability to keep down fluids/food for 24 hours, dehydration, weight loss (4 kg in 3 weeks), metabolic alkalosis from vomiting, and ketonuria from starvation. These features indicate prolonged vomiting and poor nutritional intake, leading to thiamine depletion. Administering dextrose without thiamine can precipitate acute Wernicke encephalopathy in thiamine-deficient patients because glucose metabolism requires thiamine as a cofactor. Thiamine should be given as 100-250 mg IV or IM before or with dextrose-containing fluids. This is a critical safety measure in hyperemesis gravidarum management.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Ondansetron**: This is an antiemetic that may be used in hyperemesis gravidarum, but it is not required immediately before dextrose infusion. The patient has already received diphenhydramine, and ondansetron does not prevent complications from dextrose administration in thiamine-deficient patients.\n- **B. Methylprednisolone**: Corticosteroids may be considered for refractory hyperemesis gravidarum, but they are not a prerequisite for dextrose administration and do not prevent Wernicke encephalopathy.\n- **C. Folic acid**: While important for neural tube defect prevention in early pregnancy, folic acid supplementation is not urgent before dextrose infusion and does not prevent the neurological complications of thiamine deficiency.\n- **D. Potassium chloride**: The patient likely has hypokalemia from vomiting and may require potassium replacement, but this is not the immediate priority before dextrose. Potassium can be added to IV fluids but does not prevent Wernicke encephalopathy.\n\n### 📚 Relevant Guidelines\n- **Therapeutic Guidelines Australia (eTG) - Hyperemesis gravidarum**: Recommends thiamine supplementation (100 mg daily orally or IV) for women with hyperemesis gravidarum, especially before dextrose administration — https://tgldcdp.tg.org.au/etgAccess\n- **RANZCOG Guidelines - Management of Nausea and Vomiting in Pregnancy**: States that thiamine should be administered to all women admitted with hyperemesis gravidarum, particularly before carbohydrate loading — https://ranzcog.edu.au/statements-guidelines\n- **UpToDate - Hyperemesis gravidarum**: Emphasizes thiamine repletion before dextrose administration to prevent Wernicke encephalopathy in patients with prolonged vomiting — https://www.uptodate.com/contents/hyperemesis-gravidarum", "image_path": ""}, {"id": 34332, "date": "2026-02-02T11:26:24+00:00", "stem": "A 28-year-old woman, gravida 3 para 2, at 38 weeks' gestation develops sudden, severe abdominal pain during labor. Contractions stop abruptly. Vital signs are BP, 92/58; and P, 124. Physical examination shows a change in fetal station with the presenting part no longer engaged, and minimal vaginal bleeding. Fetal monitoring shows persistent bradycardia. Which of the following is the most likely diagnosis?", "options": "A. Uterine rupture\nB. Vasa previa\nC. Amniotic fluid embolism\nD. Placental abruption\nE. Cord prolapse", "answer": "A. Uterine rupture", "explanation": "### ✅ Correct Answer: A. Uterine rupture\nUterine rupture is the most likely diagnosis given the classic triad of: (1) sudden severe abdominal pain with abrupt cessation of contractions, (2) maternal hypotension and tachycardia (BP 92/58, P 124 indicating hypovolemic shock), and (3) fetal bradycardia with change in fetal station (presenting part no longer engaged). The patient's multiparity (gravida 3 para 2) increases risk, especially if she has a history of previous cesarean section or uterine surgery. Minimal vaginal bleeding occurs because blood often accumulates intra-abdominally rather than vaginally. The change in fetal station occurs as the fetus or parts extrude through the uterine defect. This is an obstetric emergency requiring immediate laparotomy and delivery.\n\n### ❌ Why the Other Options Are Wrong\n- **B. Vasa previa**: Presents with painless vaginal bleeding and fetal bradycardia/tachycardia following rupture of fetal vessels, typically during membrane rupture. It does not cause sudden severe abdominal pain, cessation of contractions, or change in fetal station.\n- **C. Amniotic fluid embolism**: Presents with acute respiratory distress, cardiovascular collapse, and coagulopathy during or immediately after delivery. While it can cause fetal bradycardia, it typically does not cause change in fetal station or severe abdominal pain with cessation of contractions.\n- **D. Placental abruption**: Presents with painful vaginal bleeding, uterine tenderness, and fetal distress. However, contractions typically continue or increase in frequency (tetanic contractions), and there is no change in fetal station. The bleeding is usually significant and visible.\n- **E. Cord prolapse**: Presents with sudden fetal bradycardia after membrane rupture, with cord palpable on vaginal examination. It does not cause severe maternal abdominal pain, hypotension, or cessation of contractions.\n\n### 📚 Relevant Guidelines\n- **RANZCOG Guidelines - Management of Uterine Rupture**: Describes the classic presentation of uterine rupture and emphasizes immediate surgical intervention — https://ranzcog.edu.au/statements-guidelines\n- **UpToDate - Uterine rupture**: Details risk factors, clinical presentation, and management of uterine rupture during labor — https://www.uptodate.com/contents/uterine-rupture-after-previous-cesarean-delivery\n- **Therapeutic Guidelines Australia (eTG) - Obstetric emergencies**: Covers diagnosis and management of uterine rupture and other obstetric emergencies — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34335, "date": "2026-02-02T11:59:58+00:00", "stem": "A 62-year-old man presents with recurrent episodes of dizziness precipitated when he looks upwards while painting his ceiling. Each episode lasts several minutes. He has vascular risk factors including hypertension and diabetes. There is no hearing loss or tinnitus. What is the most likely diagnosis?", "options": "A. Benign paroxysmal positional vertigo\nB. Vestibular neuritis\nC. Ménière's disease\nD. Vertebrobasilar ischaemia\nE. Acoustic neuroma", "answer": "D. Vertebrobasilar ischaemia", "explanation": "### ✅ Correct Answer: D. Vertebrobasilar ischaemia\nVertebrobasilar ischaemia (also called vertebrobasilar insufficiency) is the most likely diagnosis given: (1) dizziness/vertigo provoked by neck extension (looking upward), which compromises vertebral artery flow; (2) episodes lasting several minutes (consistent with transient ischemic attacks); (3) presence of vascular risk factors (hypertension, diabetes); and (4) absence of auditory symptoms. The vertebrobasilar system supplies the brainstem and cerebellum, including vestibular nuclei. Neck extension can compress the vertebral arteries, especially with pre-existing atherosclerosis, reducing posterior circulation blood flow and causing transient vertigo. This is a warning sign for potential posterior circulation stroke.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Benign paroxysmal positional vertigo (BPPV)**: Characterized by brief episodes of vertigo (typically <1 minute) triggered by specific head movements (like rolling over in bed), not specifically neck extension. Episodes last seconds, not minutes. Nystagmus is fatigable and has a latency period.\n- **B. Vestibular neuritis**: Presents with acute, persistent vertigo lasting days (not episodic minutes), often with nausea/vomiting, and is typically preceded by viral illness. Not triggered by specific positions.\n- **C. Ménière's disease**: Characterized by episodic vertigo lasting 20 minutes to several hours, but always associated with auditory symptoms (hearing loss, tinnitus, aural fullness), which are absent here.\n- **E. Acoustic neuroma**: Typically presents with unilateral hearing loss and tinnitus, with vertigo being less common and not typically position-triggered. Growth is slow, causing progressive symptoms rather than episodic minutes-long vertigo.\n\n### 📚 Relevant Guidelines\n- **Stroke Foundation Australia - Clinical Guidelines for Stroke Management**: Includes assessment of vertebrobasilar ischemia as a TIA variant and management of posterior circulation ischemia — https://informme.org.au/guidelines/clinical-guidelines-for-stroke-management\n- **UpToDate - Vertebrobasilar insufficiency**: Details pathophysiology, clinical features, and diagnosis of vertebrobasilar ischemia — https://www.uptodate.com/contents/vertebrobasilar-insufficiency\n- **Therapeutic Guidelines Australia (eTG) - Neurology**: Covers assessment and management of vertigo including central causes — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34336, "date": "2026-02-02T12:00:33+00:00", "stem": "A 45-year-old man presents with recurrent flushing, pruritus, abdominal cramping, and episodes of syncope after alcohol intake. He has a history of unexplained anaphylaxis following a bee sting. On examination, there are multiple brownish macules consistent with urticaria pigmentosa. Blood tests show a persistently elevated serum tryptase level of 28 ng/mL. What is the most likely diagnosis?", "options": "A. Carcinoid syndrome\nB. Pheochromocytoma\nC. Systemic mastocytosis\nD. Hereditary angioedema\nE. Zollinger-Ellison syndrome", "answer": "C. Systemic mastocytosis", "explanation": "### ✅ Correct Answer: C. Systemic mastocytosis\nSystemic mastocytosis is the most likely diagnosis given: (1) recurrent symptoms of mast cell mediator release (flushing, pruritus, abdominal cramping, syncope); (2) specific triggers (alcohol is a known mast cell degranulator); (3) history of anaphylaxis to bee sting (common in mastocytosis); (4) physical findings of urticaria pigmentosa (brownish macules that are cutaneous mastocytomas); and (5) persistently elevated serum tryptase (>20 ng/mL is a minor criterion for diagnosis). Systemic mastocytosis involves clonal proliferation of mast cells in various organs, leading to excessive mediator release. The syncope likely represents mast cell-mediated hypotension. Diagnostic criteria require one major (multifocal dense infiltrates of mast cells in bone marrow) and one minor criterion (elevated tryptase, specific genetic mutation, etc.) or three minor criteria.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Carcinoid syndrome**: Causes flushing and abdominal symptoms, but typically associated with diarrhea (not prominent here), right-sided heart valve lesions, and elevated urinary 5-HIAA (not tryptase). Flushing in carcinoid is often longer-lasting and not specifically triggered by alcohol. Urticaria pigmentosa is not a feature.\n- **B. Pheochromocytoma**: Causes episodic hypertension (not hypotension/syncope), headache, sweating, and palpitations. Flushing is less common. Serum tryptase is normal, and urticaria pigmentosa is not associated.\n- **D. Hereditary angioedema**: Characterized by recurrent episodes of angioedema without urticaria/pruritus, often involving face, extremities, or bowel (causing abdominal pain). Does not cause flushing or elevated tryptase. Typically has low C1 esterase inhibitor levels.\n- **E. Zollinger-Ellison syndrome**: Causes severe peptic ulcer disease and diarrhea due to gastrin-secreting tumors. Does not cause flushing, urticaria pigmentosa, or elevated tryptase. Abdominal pain is from ulcers, not cramping.\n\n### 📚 Relevant Guidelines\n- **Australasian Mastocytosis Society - Diagnosis and Management**: Provides criteria for diagnosing systemic mastocytosis and management recommendations — https://www.mastocytosis.org.au/clinical-guidelines\n- **UpToDate - Systemic mastocytosis**: Details diagnostic criteria, clinical manifestations, and treatment — https://www.uptodate.com/contents/systemic-mastocytosis-clinical-presentations-diagnosis-and-prognosis\n- **Therapeutic Guidelines Australia (eTG) - Allergy and immunology**: Includes management of mast cell disorders — https://tgldcdp.tg.org.au/etgAccess", "image_path": ""}, {"id": 34344, "date": "2026-02-02T22:42:40+00:00", "stem": "A 68-year-old man presents with a 2-year history of gradually progressive muscle weakness. He reports difficulty climbing stairs and rising from a chair. He also notices reduced grip strength and difficulty holding cutlery.\n\nOn examination:\n • Weakness of quadriceps and finger flexors\n • Mild muscle wasting\n • No skin rash\n • CK is mildly elevated\n • EMG shows myopathic changes\n • Muscle biopsy shows rimmed vacuoles\n\nHe has had minimal response to high-dose corticosteroids.\n\nWhat is the most likely diagnosis?", "options": "A. Polymyositis\nB. Dermatomyositis\nC. Immune-mediated necrotizing myopathy\nD. Inclusion body myositis\nE. Antisynthetase syndrome", "answer": "D", "explanation": "### ✅ Correct Answer: D. Inclusion body myositis\n\n**Clinical Reasoning:**\n1. **Demographics & Presentation:** The patient is a 68-year-old man with a **gradually progressive** (2-year history) pattern of weakness. This insidious onset is classic for inclusion body myositis (IBM), which is the most common acquired myopathy in patients over 50.\n2. **Pattern of Weakness:** The weakness involves **quadriceps** (difficulty climbing stairs, rising from a chair) and **finger flexors** (reduced grip, difficulty with cutlery). This **asymmetric, distal-predominant** pattern (especially finger/wrist flexor weakness) is highly characteristic of IBM and helps distinguish it from other inflammatory myopathies, which are typically proximal and symmetric.\n3. **Examination & Investigations:**\n   - **No skin rash:** Excludes dermatomyositis (B).\n   - **Mild CK elevation:** IBM typically shows only mild to moderate CK elevation (often <10x ULN), unlike polymyositis or necrotizing myopathy where it can be very high.\n   - **EMG shows myopathic changes:** Consistent with an inflammatory myopathy.\n   - **Muscle biopsy shows rimmed vacuoles:** This is the **pathognomonic histological finding** for IBM. These are autophagic vacuoles with amyloid deposits and filamentous inclusions.\n4. **Treatment Response:** The key clue is **minimal response to high-dose corticosteroids.** IBM is notoriously **refractory to immunosuppressive therapy** (including steroids, IVIG, methotrexate), unlike the other options which are typically steroid-responsive. This treatment resistance is a major diagnostic criterion.\n\n### ❌ Why the Other Options Are Wrong\n- **A. Polymyositis:** Typically presents with subacute, symmetric **proximal** muscle weakness (shoulders, hips). It lacks the distinctive distal/finger flexor involvement and rimmed vacuoles on biopsy. It is usually **responsive to corticosteroids**, which this patient is not.\n- **B. Dermatomyositis:** Characterized by **proximal muscle weakness plus a pathognomonic skin rash** (heliotrope rash, Gottron's papules). The absence of any skin rash makes this diagnosis very unlikely. Biopsy would show perifascicular atrophy, not rimmed vacuoles.\n- **C. Immune-mediated necrotizing myopathy:** Presents with acute/subacute severe weakness and very **high CK levels**. Muscle biopsy shows prominent **necrosis of muscle fibers without significant inflammation or rimmed vacuoles**. It is often associated with statin use or anti-SRP/HMGCR antibodies and is typically **steroid-responsive**.\n- **E. Antisynthetase syndrome:** A subset of inflammatory myopathy characterized by myositis, **interstitial lung disease**, **fever**, **arthritis**, **Raynaud's phenomenon**, and **mechanic's hands**. The absence of these systemic features (especially lung involvement) and the presence of rimmed vacuoles argue against it.\n\n### 📚 Relevant Guidelines\n- **[UpToDate: Clinical manifestations and diagnosis of inclusion body myositis]**: Comprehensive review of diagnostic criteria, clinical features, and histopathology — https://www.uptodate.com/contents/clinical-manifestations-and-diagnosis-of-inclusion-body-myositis\n- **[Muscle Study Group / European Neuromuscular Centre (ENMC) Diagnostic Criteria for IBM]**: International consensus diagnostic criteria emphasizing clinical features and biopsy findings — (Refer to ENMC publications)\n- **[Therapeutic Guidelines (Neurology): Inflammatory Myopathies]**: Australian guidelines for the diagnosis and management of myositis, including IBM — https://tgldcdp.tg.org.au/viewTopic?topicfile=inflammatory-myopathies&guidelineName=Neurology#toc_d1e288", "image_path": ""}, {"id": 34347, "date": "2026-02-03T06:01:54+00:00", "stem": "An 8-year-old girl presents with recurrent abdominal pain for several months, often missing school. There is no tenderness, normal urinalysis, and no systemic features. What is the most appropriate next step?", "options": "a. Abdominal ultrasound\nb. CT scan\nc. MRI abdomen\nd. No further investigation – reassurance\ne. Stool culture", "answer": "A", "explanation": "### ✅ Correct Answer: a. Abdominal ultrasound\n\n**Clinical Reasoning:**\n1. **Clinical Picture:** This is a classic presentation of **recurrent abdominal pain in childhood**. The key features are: chronicity (several months), functional impact (missing school), absence of **red flags** (no tenderness, no systemic features like fever/weight loss, normal urinalysis).\n2. **Diagnostic Approach in Paediatrics:** For recurrent abdominal pain without alarm symptoms, the priority is to **rule out common organic causes** in a **stepwise, minimally invasive manner** before labeling it as functional. Jumping straight to reassurance (D) without any investigation is premature and may miss treatable conditions.\n3. **Why Ultrasound First?**\n   - **First-line Imaging:** Abdominal ultrasound is the **recommended initial imaging modality** in children. It is non-invasive, lacks radiation, and is excellent for visualizing the abdomen and pelvis.\n   - **Targets Common Causes:** It can effectively screen for many potential organic causes of recurrent pain in this age group, such as:\n     - **Constipation** (very common)\n     - **Mesenteric adenitis**\n     - **Renal abnormalities** (even with normal urinalysis, e.g., hydronephrosis)\n     - **Gallstones** (less common in children)\n     - **Ovarian pathology** (relevant in an 8-year-old girl approaching puberty)\n   - **Guideline-Concordant:** Major paediatric guidelines (RACP, NICE) recommend a limited workup including basic bloods and ultrasound before diagnosing functional abdominal pain disorders.\n4. **Why Not the Others?**\n   - **Reassurance (D)** is appropriate **after** a limited negative workup (like ultrasound and basic bloods) confirms no organic disease.\n   - **CT (B) and MRI (C)** are **not first-line** due to radiation (CT) cost, need for sedation in children (often for MRI), and low pre-test probability for conditions they would best detect.\n   - **Stool culture (E)** is indicated if there is diarrhea, fever, or suspicion of infectious colitis, which are absent here.\n\n### ❌ Why the Other Options Are Wrong\n- **b. CT scan:** Involves **significant ionizing radiation**, which is particularly concerning in children due to increased cancer risk. It is reserved for cases of **acute, severe abdominal pain** with suspicion of surgical emergencies (e.g., appendicitis, obstruction) or after inconclusive ultrasound. It is **not appropriate** for first-line evaluation of chronic pain without red flags.\n- **c. MRI abdomen:** **Expensive, resource-intensive**, and often requires sedation or general anesthesia in young children to remain still. It is not a first-line screening tool. It is used for specific questions (e.g., biliary/pancreatic detail, Crohn's disease) usually after other tests.\n- **d. No further investigation – reassurance:** While **functional abdominal pain** (e.g., abdominal migraine, functional dyspepsia) is a likely final diagnosis, current best practice dictates a **limited, targeted workup** to exclude organic causes. This provides confidence to the family, avoids missing pathology, and is therapeutic in itself. Premature reassurance can lead to parental anxiety and repeated presentations.\n- **e. Stool culture:** Indicated for **acute or persistent diarrhea**, dysentery, or suspected bacterial gastroenteritis. The history describes recurrent pain **without** mention of diarrhea, making this a low-yield test.\n\n### 📚 Relevant Guidelines\n- **[RACP: Management of recurrent abdominal pain in children]**: Australian position statement advocating for a positive diagnosis of functional pain after limited investigation to exclude organic disease — https://www.racp.edu.au/docs/default-source/advocacy-library/management-of-recurrent-abdominal-pain-in-children.pdf\n- **[NICE Guideline NG128: Suspected cancer: recognition and referral]**: While not cancer, it outlines that unexplained abdominal pain in children is a symptom requiring consideration of referral; a sensible workup like ultrasound is part of assessment — https://www.nice.org.uk/guidance/ng128\n- **[Rome IV Criteria for Functional Gastrointestinal Disorders in Children]**: Diagnostic criteria for functional abdominal pain disorders. Diagnosis requires the absence of organic disease, which typically involves basic investigations — https://theromefoundation.org/rome-iv/rome-iv-criteria/", "image_path": ""}, {"id": 34370, "date": "2026-02-03T10:33:45+00:00", "stem": "A 35-year-old mother brings her 8-year-old daughter to the pediatric clinic for a routine check-up. The mother expresses concern about the timing of the HPV vaccine for her daughter. She has heard mixed recommendations and is unsure when it is best to start the vaccination. Which of the following is the most appropriate recommendation for the HPV vaccination for Emily?", "options": "a. Give the HPV vaccine now.\nb. Wait until Emily is 10 years old to start the HPV vaccination series.\nc. Delay vaccination until Emily is sexually active.\nd. Start the HPV vaccination series when Emily turns 18 years old.", "answer": "a. Give the HPV vaccine now.", "explanation": "### ✅ Correct Answer: a. Give the HPV vaccine now.\nThe Australian Immunisation Handbook and ATAGI guidelines recommend routine HPV vaccination for adolescents aged 12–13 years. However, vaccination can be given from **age 9 years** and is most effective when administered **before the onset of sexual activity** to ensure immunity prior to potential HPV exposure. For an 8-year-old, the vaccine is not contraindicated, but the routine schedule starts at age 12–13. In this clinical scenario, the mother is seeking proactive advice. The best practice is to align with the earliest recommended age and provide the vaccine now to ensure protection before potential exposure. Starting at age 8 is acceptable off-label and provides early protection. The key is to vaccinate before sexual debut, not to delay.\n\n### ❌ Why the Other Options Are Wrong\n- **b. Wait until Emily is 10 years old to start the HPV vaccination series.**: While vaccination can start at age 9, waiting until 10 is not necessary and delays protection without clinical benefit. The routine schedule is 12–13, but earlier administration is acceptable if parents are concerned.\n- **c. Delay vaccination until Emily is sexually active.**: This is incorrect and dangerous. The vaccine is most effective **before** exposure to HPV. Delaying until after sexual activity begins significantly reduces its efficacy in preventing HPV-related cancers and genital warts.\n- **d. Start the HPV vaccination series when Emily turns 18 years old.**: This is too late. The vaccine is recommended for adolescents to ensure immunity prior to sexual debut. While catch-up vaccination is available for adults up to age 26 (and in some cases beyond), starting at 18 misses the optimal window for pre-exposure protection.\n\n### 📚 Relevant Guidelines\n- **[Australian Technical Advisory Group on Immunisation (ATAGI) / Australian Immunisation Handbook]**: Recommendations for HPV vaccination — [https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/human-papillomavirus-hpv](https://immunisationhandbook.health.gov.au/contents/vaccine-preventable-diseases/human-papillomavirus-hpv)\n- **[The Royal Australian College of General Practitioners (RACGP) Guidelines for Preventive Activities in General Practice)]**: Includes HPV vaccination schedule — [https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice](https://www.racgp.org.au/clinical-resources/clinical-guidelines/key-racgp-guidelines/view-all-racgp-guidelines/guidelines-for-preventive-activities-in-general-practice)\n- **[World Health Organization (WHO) HPV Vaccine Position Paper]**: Global recommendations for HPV vaccination — [https://www.who.int/publications/i/item/who-recommendations-for-human-papillomavirus-vaccine](https://www.who.int/publications/i/item/who-recommendations-for-human-papillomavirus-vaccine)", "image_path": ""}, {"id": 34374, "date": "2026-02-03T10:49:35+00:00", "stem": "Which one of the following patients is most appropriate for immediate red blood cell transfusion?", "options": "A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms\nB. A 65‑year‑old man with stable ischaemic heart disease, chronic normocytic anaemia with Hb 85 g/L, no chest pain or dyspnoea at rest\nC. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\nD. A 45‑year‑old woman 1 month postpartum, Hb 82 g/L, well and caring for her infant\nE. A 50‑year‑old man on chemotherapy with Hb 95 g/L, complaining of mild fatigue only", "answer": "C", "explanation": "### ✅ Correct Answer: C. A 78‑year‑old man with an acute upper gastrointestinal bleed, hypotension (BP 85/50 mmHg), tachycardia, Hb 78 g/L\n\nThis patient requires immediate transfusion due to **active haemorrhage with haemodynamic instability**. The hypotension (BP 85/50 mmHg) and tachycardia indicate hypovolaemic shock, which is a life-threatening emergency. In acute bleeding, the initial haemoglobin level can be misleading due to haemodilution not yet occurring; the key is the clinical picture of shock. Transfusion is critical for volume resuscitation and oxygen-carrying capacity to prevent end-organ damage (e.g., myocardial infarction, acute kidney injury). The other patients are either stable, asymptomatic, or have chronic anaemia where transfusion is not the first-line therapy.\n\n### ❌ Why the Other Options Are Wrong\n- **A. A 30‑year‑old woman with chronic iron deficiency from menorrhagia, Hb 70 g/L, haemodynamically stable and minimal symptoms**: This is chronic, well-compensated anaemia. First-line m
